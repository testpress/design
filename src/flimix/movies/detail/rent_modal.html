<!-- Rental Confirmation Modal -->
<div id="hs-rent-modal" class="hs-overlay hidden size-full fixed top-0 inset-s-0 z-[99] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-rent-modal-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl pointer-events-auto shadow-xl">

      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
        <h2 id="hs-rent-modal-label" class="font-medium text-gray-800 dark:text-neutral-200">
          Confirm Rental
        </h2>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-rent-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="p-4">
          <!-- Two-column: cover left, info right -->
          <div class="flex gap-x-4 items-start">

            <!-- Big Cover -->
            <img
              id="hs-rent-modal-thumb"
              src="https://images-eu.ssl-images-amazon.com/images/S/pv-target-images/e40e50510afe106bb1c3d0d38451db12f800c66c80432c6d9a5ce260e9b0d6e1._SX1080_FMjpg_.jpg"
              alt="Jailer"
              class="shrink-0 w-20 rounded-lg object-cover self-stretch"
            />

            <!-- Right: title, price, bullets -->
            <div class="flex-1 min-w-0 flex flex-col gap-y-3">

              <!-- Title + Price -->
              <div>
                <p id="hs-rent-modal-title" class="font-bold text-neutral-100 text-xl">Jailer</p>
                <p class="mt-1 text-neutral-400 text-sm">Rent for <span id="hs-rent-modal-price" class="font-extrabold text-white text-xl">₹99</span></p>
              </div>

              <!-- Rental Details -->
              <ul class="list-disc list-inside flex flex-col gap-y-1 text-sm text-neutral-300">
                <li>Access starts immediately after payment.</li>
                <li>Watch for 48 hours after playback begins.</li>
                <li>Rental is non-refundable after activation.</li>
              </ul>

            </div>
          </div>

        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2 dark:border-neutral-700">
        <div class="flex-1 flex justify-end items-center gap-2">
          <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none" data-hs-overlay="#hs-rent-modal">
            Cancel
          </button>
          <button id="hs-rent-modal-proceed" type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-blue-600 dark:bg-blue-500 border border-transparent text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-blue-700 dark:hover:bg-blue-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-blue-700 dark:focus:bg-blue-600" data-hs-overlay="#hs-rent-modal">
            Continue to Payment
          </button>
        </div>
      </div>
      <!-- End Footer -->

    </div>
  </div>
</div>
<!-- End Rental Confirmation Modal -->
