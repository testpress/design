<!-- Rent Modal -->
<form id="rent_movie" class="hs-overlay hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none"
      role="dialog" tabindex="-1" aria-labelledby="rent_modal-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-gray-800 rounded-xl pointer-events-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)]">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b dark:border-gray-700">
        <h3 id="rent_modal-label" class="font-medium text-gray-800 dark:text-gray-200">
          Rent Jailer for ₹99
        </h3>
        <button type="button"
                class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-200 dark:focus:bg-gray-600"
                aria-label="Close" data-hs-overlay="#rent_modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto p-4 space-y-4">
        <p class="text-gray-700 dark:text-gray-300">
          Rent Jailer for ₹99 and get 48 hours of access. Your rental starts when playback begins.
        </p>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2 border-t dark:border-gray-700">
        <button type="button" class="py-2 px-4 text-sm font-medium text-gray-800 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 focus:outline-none"
                data-hs-overlay="#rent_modal">
          Cancel
        </button>
        <button type="button" class="py-2 px-4 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg focus:outline-none">
          Continue to Payment
        </button>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</form>
<!-- End Rent Modal -->
