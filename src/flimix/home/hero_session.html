<section
  x-data="flimixHeroCarousel()"
  x-init="start()"
  @mouseenter="stop()"
  @mouseleave="start()"
  class="relative min-h-[calc(100vh-3.55rem)] bg-neutral-950 text-white overflow-hidden group"
>
  <!-- Slides -->
  <template x-for="(slide, index) in slides" :key="index">
    <div
      x-show="activeIndex === index"
      x-transition.opacity.duration.500ms
      class="absolute inset-0"
    >
      <div
        class="absolute inset-0 bg-cover bg-center"
        :style="`background-image: url('${slide.image}')`"
      >
        <div class="absolute inset-0 bg-gradient-to-t from-neutral-900 via-neutral-900/70 to-transparent"></div>

      </div>

      <div class="relative h-full">
        <div class="absolute inset-x-0 bottom-10 z-20">
          <div class="max-w-[85rem] mx-auto px-4 md:px-10">
            <div class="max-w-2xl">
              <h1
                class="text-3xl md:text-5xl font-bold text-white drop-shadow-[0_2px_8px_rgba(0,0,0,0.8)]"
                x-text="slide.title"
              ></h1>

              <p
                class="mt-2 text-sm text-gray-200 drop-shadow-[0_1px_4px_rgba(0,0,0,0.8)]"
              >
                <span class="inline hover:underline hover:cursor-pointer" x-text="slide.year"></span>
                <span class="inline">•</span>
                <span class="inline hover:underline hover:cursor-pointer" x-text="slide.genre"></span>
              </p>

              <p
                class="mt-4 text-sm md:text-base text-gray-200 leading-relaxed max-w-xl drop-shadow-[0_1px_4px_rgba(0,0,0,0.8)]"
                x-text="slide.description"
              ></p>

              <div class="mt-5 flex flex-wrap gap-3 w-full">
                <a
                  :href="slide.playUrl"
                  class="bg-white text-black font-semibold px-6 py-3 rounded-lg hover:bg-gray-100 w-full sm:w-auto flex items-center justify-center gap-2 transition-colors"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path fill-rule="evenodd"
                      d="M4.5 5.653c0-1.427 1.529-2.33 2.779-1.643l11.54 6.347c1.295.712 1.295 2.573 0 3.286L7.28 19.99c-1.25.687-2.779-.217-2.779-1.643V5.653Z"
                      clip-rule="evenodd" />
                  </svg>
                  <span x-text="slide.ctaLabel"></span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- Arrows (desktop, within max width) -->
  <div
    class="hidden md:block absolute inset-y-0 inset-x-0 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none group-hover:pointer-events-auto"
  >
    <div class="h-full max-w-[85rem] mx-auto px-4 md:px-10 flex items-center justify-between">
      <button
        type="button"
        @click="prev()"
        class="inline-flex items-center justify-center text-white hover:text-neutral-200"
        aria-label="Previous"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>

      <button
        type="button"
        @click="next()"
        class="inline-flex items-center justify-center text-white hover:text-neutral-200"
        aria-label="Next"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile arrows -->
  <div class="md:hidden absolute inset-x-0 top-1/2 -translate-y-1/2 flex items-center justify-between px-4">
    <button
      type="button"
      @click="prev()"
      class="inline-flex items-center justify-center text-white hover:text-neutral-200"
      aria-label="Previous"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <button
      type="button"
      @click="next()"
      class="inline-flex items-center justify-center text-white hover:text-neutral-200"
      aria-label="Next"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
  </div>

  <!-- Dots -->
  <div class="absolute inset-x-0 bottom-8 flex items-center justify-center gap-3">
    <template x-for="(slide, index) in slides" :key="`dot-${index}`">
      <button
        type="button"
        class="relative h-2 w-2 rounded-full transition-all duration-300"
        :class="activeIndex === index ? 'w-6 bg-neutral-50' : 'bg-neutral-500/60 hover:bg-neutral-300/80'"
        @click="goTo(index)"
        :aria-label="`Go to slide ${index + 1}`"
        :aria-current="activeIndex === index ? 'true' : 'false'"
      >
        <span class="sr-only" x-text="slide.title"></span>
      </button>
    </template>
  </div>
</section>

<script>
  function flimixHeroCarousel() {
    return {
      activeIndex: 0,
      intervalId: null,
      slides: [
        {
          label: 'Movie',
          year: '2019',
          genre: 'Superhero, Action',
          title: 'Avengers: Endgame',
          description:
            'The remaining Avengers assemble one final time to undo the devastation caused by Thanos and restore balance to the universe.',
          image: 'https://image.tmdb.org/t/p/original/7RyHsO4yDXtBv1zUU3mTpHeQ0d5.jpg',
          playUrl: '#',
          infoUrl: '#',
          ctaLabel: 'Watch Now',
        },
        {
          label: 'Movie',
          year: '2014',
          genre: 'Sci-Fi Adventure',
          title: 'Interstellar',
          description:
            'With Earth on the brink of collapse, a team of explorers travels through a wormhole in search of a new home for humanity.',
          image: 'https://image.tmdb.org/t/p/original/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg',
          playUrl: '#',
          infoUrl: '#',
          ctaLabel: 'Watch Now',
        },
        {
          label: 'Movie',
          year: '2010',
          genre: 'Sci-Fi, Thriller',
          title: 'Inception',
          description:
            "A skilled thief who steals secrets through dreams is offered a chance at redemption if he can successfully plant an idea inside a target's mind.",
          image: 'https://image.tmdb.org/t/p/original/s3TBrRGB1iav7gFOCNx3H31MoES.jpg',
          playUrl: '#',
          infoUrl: '#',
          ctaLabel: 'Watch Now',
        },
        {
          label: 'Series',
          year: '2016 – ',
          genre: 'Sci-Fi, Horror',
          title: 'Stranger Things',
          description:
            'In a small town in the 1980s, a group of kids uncovers secret experiments, terrifying creatures, and a mysterious girl with incredible powers.',
          image: 'https://image.tmdb.org/t/p/original/56v2KjBlU4XaOv9rVYEQypROD7P.jpg',
          playUrl: '#',
          infoUrl: '#',
          ctaLabel: 'Watch Now',
        },
      ],
      start() {
        if (this.intervalId !== null) return;
        this.intervalId = setInterval(() => {
          this.next();
        }, 8000);
      },
      stop() {
        if (this.intervalId === null) return;
        clearInterval(this.intervalId);
        this.intervalId = null;
      },
      next() {
        this.activeIndex = (this.activeIndex + 1) % this.slides.length;
      },
      prev() {
        this.activeIndex =
          (this.activeIndex - 1 + this.slides.length) % this.slides.length;
      },
      goTo(index) {
        this.activeIndex = index;
      },
    };
  }
</script>
