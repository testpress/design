<style>
  .swiper-button-next:after,
  .swiper-button-prev:after {
    display: none;
  }

  .swiper-button-next,
  .swiper-button-prev {
    color: #ffffff;
    background: transparent;
  }

  /* Arrows: same size as hero (40px), prevent Swiper from shrinking */
  .flimix-next-session-prev,
  .flimix-next-session-next {
    width: 2.5rem !important;
    height: 2.5rem !important;
    min-width: 2.5rem !important;
    min-height: 2.5rem !important;
  }

  /* Arrows fully hidden by default; only visible on section hover and when enabled */
  .group .flimix-next-session-prev,
  .group .flimix-next-session-next {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
    transition: opacity 0.2s ease, visibility 0.2s ease !important;
  }
  .group:hover .flimix-next-session-prev:not(.swiper-button-disabled),
  .group:hover .flimix-next-session-next:not(.swiper-button-disabled) {
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
  }
  /* Disabled arrow: fully hidden (no prev/next content) */
  .flimix-next-session-swiper .swiper-button-disabled {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (!window.Swiper) return;

    const swiper = new Swiper('.flimix-next-session-swiper', {
      slidesPerView: 2,
      spaceBetween: 16,
      loop: false,
      autoplay: false,
      navigation: {
        nextEl: '.flimix-next-session-next',
        prevEl: '.flimix-next-session-prev',
      },
      breakpoints: {
        640: {
          slidesPerView: 3,
        },
        768: {
          slidesPerView: 4,
        },
        1024: {
          slidesPerView: 5,
        },
        1280: {
          slidesPerView: 6,
        },
      },
    });

    const container = document.querySelector('.flimix-next-session-swiper');
    if (container) {
      container.addEventListener('wheel', (event) => {
        if (!event.shiftKey) return;
        event.preventDefault();
        if (event.deltaY > 0) {
          swiper.slideNext();
        } else {
          swiper.slidePrev();
        }
      });
    }
  });
</script>
