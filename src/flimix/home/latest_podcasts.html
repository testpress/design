<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (!window.Swiper) return;

    const swiper = new Swiper('.flimix-next-session-swiper', {
      slidesPerView: 2,
      spaceBetween: 16,
      loop: false,
      autoplay: false,
      navigation: {
        nextEl: '.flimix-next-session-next',
        prevEl: '.flimix-next-session-prev',
      },
      breakpoints: {
        640: {
          slidesPerView: 3,
        },
        768: {
          slidesPerView: 4,
        },
        1024: {
          slidesPerView: 5,
        },
        1280: {
          slidesPerView: 6,
        },
      },
    });

    const container = document.querySelector('.flimix-next-session-swiper');
    if (container) {
      container.addEventListener('wheel', (event) => {
        if (!event.shiftKey) return;
        event.preventDefault();
        if (event.deltaY > 0) {
          swiper.slideNext();
        } else {
          swiper.slidePrev();
        }
      });
    }
  });
</script>
