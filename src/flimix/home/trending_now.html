<style>
  .swiper-button-next:after,
  .swiper-button-prev:after {
    display: none;
  }

  .swiper-button-next,
  .swiper-button-prev {
    color: #ffffff;
    background: transparent;
  }

   /* Hide arrows completely when Swiper marks them as disabled
      (i.e., no more slides in that direction) */
  .swiper-button-disabled {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* Allow cards to overflow when scaled */
  .flimix-trending-swiper .swiper-slide {
    overflow: visible !important;
  }

  .flimix-trending-swiper .swiper-wrapper {
    overflow: visible !important;
  }
</style>

  <div class="swiper flimix-trending-swiper">
    <div class="swiper-wrapper">

          </div>
        </div>
      </div>

      <!-- Barbie -->

          <div class="rounded overflow-hidden bg-neutral-800 aspect-[2/3]">

              src="https://image.tmdb.org/t/p/original/iuFNMS8U5cb6xfzi51Dbkovj7vM.jpg"

          </div>
        </div>
      </div>

      <!-- Spider-Man: No Way Home -->
      <div class="swiper-slide">
        <div class="relative transition-all duration-300 cursor-pointer hover:scale-105 transition-transform duration-500 ease-in-out  hover:cursor-pointer">

              src="https://image.tmdb.org/t/p/original/6izwz7rsy95ARzTR3poZ8H6c5pp.jpg"

      <!-- Dune: Part Two -->

              alt="Dune: Part Two" class="w-full h-full object-cover">
          </div>

      </div>

      <!-- Mission: Impossible – Dead Reckoning Part One -->
      <div class="swiper-slide">

          <div class="rounded overflow-hidden bg-neutral-800 aspect-[2/3]">

              alt="Mission: Impossible – Dead Reckoning Part One" class="w-full h-full object-cover">

        </div>
      </div>

      <!-- John Wick: Chapter 4 -->
      <div class="swiper-slide">
        <div class="relative transition-all duration-300 cursor-pointer hover:scale-105 transition-transform duration-500 ease-in-out  hover:cursor-pointer">
          <div class="rounded overflow-hidden bg-neutral-800 aspect-[2/3]">
            <img
              src="https://image.tmdb.org/t/p/w780/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg"

      <!-- Avatar: The Way of Water -->

          <div class="rounded overflow-hidden bg-neutral-800 aspect-[2/3]">

              src="https://image.tmdb.org/t/p/original/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg"
              alt="Avatar: The Way of Water" class="w-full h-full object-cover">
          </div>
        </div>
      </div>
  </div>

  <!-- Arrows outside the carousel, at left/right edges -->
  <button
    type="button"
    class="hidden md:flex swiper-button-prev flimix-trending-prev absolute top-1/2 -translate-y-1/2 -left-6 items-center justify-center text-white hover:text-neutral-200 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-10"
    aria-label="Previous row"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6" />
    </svg>
  </button>

  <button
    type="button"
    class="hidden md:flex swiper-button-next flimix-trending-next absolute top-1/2 -translate-y-1/2 -right-6 items-center justify-center text-white hover:text-neutral-200 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-10"
    aria-label="Next row"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  </button>
</div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (!window.Swiper) return;

    const swiper = new Swiper('.flimix-trending-swiper', {
      slidesPerView: 3,
      spaceBetween: 16,
      loop: false,
      autoplay: false,
      navigation: {
        nextEl: '.flimix-trending-next',
        prevEl: '.flimix-trending-prev',
      },
      breakpoints: {
        640: {
          slidesPerView: 3,
        },
        768: {
          slidesPerView: 4,
        },
        1024: {
          slidesPerView: 5,
        },
        1280: {
          slidesPerView: 6,
        },
        1536: {
          slidesPerView: 7,
        },
      },
    });

    const container = document.querySelector('.flimix-trending-swiper');
    if (container) {
      container.addEventListener('wheel', (event) => {
        if (!event.shiftKey) return;
        event.preventDefault();
        if (event.deltaY > 0) {
          swiper.slideNext();
        } else {
          swiper.slidePrev();
        }
      });
    }
  });
</script>
