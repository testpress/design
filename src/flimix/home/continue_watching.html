<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (!window.Swiper) return;

    const swiper = new Swiper('.flimix-continue-swiper', {
      slidesPerView: 2,
      spaceBetween: 16,
      loop: false,
      autoplay: false,
      navigation: {
        nextEl: '.flimix-continue-next',
        prevEl: '.flimix-continue-prev',
      },
      breakpoints: {
        640: {
          slidesPerView: 2,
        },
        768: {
          slidesPerView: 3,
        },
        1024: {
          slidesPerView: 4,
        },
        1280: {
          slidesPerView: 5,
        },
      },
    });

    const container = document.querySelector('.flimix-continue-swiper');
    if (container) {
      container.addEventListener('wheel', (event) => {
        if (!event.shiftKey) return;
        event.preventDefault();
        if (event.deltaY > 0) {
          swiper.slideNext();
        } else {
          swiper.slidePrev();
        }
      });
    }
  });
</script>
