<div class="flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="py-3 px-5 flex justify-between items-center gap-x-5 border-b border-gray-200 dark:border-neutral-700 rounded-t-xl">
    <h2 class="inline-block font-semibold text-gray-800 dark:text-neutral-200">
      Basic Information
    </h2>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="p-5 space-y-4">


    <!-- Row 1: Title & Release Year -->
    <div class="grid sm:grid-cols-2 gap-3 sm:gap-5">
      <div>
        <label for="movie-title" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
          Title <span class="text-red-500">*</span>
        </label>
        <input id="movie-title" type="text" x-model="movieTitle" placeholder="Movie title" class="py-1.5 sm:py-2 px-3 block w-full bg-white border border-gray-200 rounded-lg sm:text-sm text-gray-800 placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:placeholder:text-white/60">
      </div>
      <div>
        <label for="movie-release-year" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
          Release Year <span class="text-red-500">*</span>
        </label>
        <input id="movie-release-year" type="text" x-model="movieReleaseYear" placeholder="Movie release year" class="py-1.5 sm:py-2 px-3 block w-full bg-white border border-gray-200 rounded-lg sm:text-sm text-gray-800 placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:placeholder:text-white/60">
      </div>
    </div>

    <!-- Row 2: Genres -->
      <div class="space-y-2">
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-gray-800 dark:text-neutral-200">
            Genres
          </label>
          <button type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="create-genre"
            data-hs-overlay="#create-genre"
            class="whitespace-nowrap text-xs cursor-pointer text-blue-600 hover:text-blue-700 hover:underline focus:outline-none dark:text-blue-500 dark:hover:text-blue-400">
            Create New Genre
          </button>
        </div>

        <!-- Input Form -->
        <div class="w-full">
          <!-- Select -->
          <div class="relative w-full" x-ignore>
            <select multiple data-hs-select='{
                "placeholder": "Select Genre for the Movie",
                "wrapperClasses": "hs-select-active:ring-1 hs-select-active:ring-blue-500 pe-9 rounded-lg flex items-center flex-wrap text-nowrap w-full text-start text-sm border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 hs-select-active:dark:outline-none hs-select-active:dark:ring-1 hs-select-active:dark:ring-gray-600",
                "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative flex text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm focus:bg-gray-100 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
                "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white rounded-lg overflow-hidden overflow-y-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:bg-neutral-900",
                "optionClasses": "hs-selected:bg-gray-100 dark:hs-selected:bg-neutral-800 py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 dark:text-neutral-200 dark:focus:bg-neutral-800",
                "mode": "tags",
                "tagsClasses": "relative ps-0.5 pe-9 min-h-[38px] flex items-center flex-wrap text-nowrap w-full border border-gray-200 rounded-lg text-start text-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-neutral-900 dark:text-neutral-400",
                "tagsItemTemplate": "<div class=\"flex flex-nowrap items-center relative z-10 bg-white border border-gray-200 rounded-full p-[3px] m-0.5 dark:bg-neutral-900 dark:border-neutral-700\"><div class=\"size-6 me-1\" data-icon></div><div class=\"whitespace-nowrap ms-1\" data-title></div><div class=\"inline-flex shrink-0 justify-center items-center size-5 ms-2 rounded-full text-gray-800 bg-gray-200 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-neutral-400 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-400 cursor-pointer\" data-remove><svg class=\"shrink-0 size-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"/><path d=\"m6 6 12 12\"/></svg></div></div>",
                "tagsInputClasses": "py-[9px] px-4 grow order-1 text-sm bg-transparent rounded-lg focus-visible:outline-none dark:bg-neutral-800 dark:bg-neutral-700 dark:text-neutral-400 dark:placeholder:text-neutral-400 focus:outline-none focus:ring-0 border-0",
                "optionTemplate": "<div class=\"flex items-center\"><div class=\"size-8 me-2\" data-icon></div><div><div class=\"text-sm font-semibold text-gray-800 dark:text-neutral-200\" data-title></div><div class=\"text-xs text-gray-500 dark:text-neutral-500\" data-description></div></div><div class=\"ms-auto\"><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-4\" xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" fill=\"currentColor\" viewBox=\"0 0 16 16\"><path d=\"M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z\"/></svg></span></div></div>"
              }' class="hidden">
              <option value="">Choose</option>
              <option value="1">Action</option>

              <option value="2">Comedy</option>

              <option value="3">Thriller</option>

              <option value="4">Drama</option>

              <option value="5">Science Friction</option>
            </select>

            <div class="absolute top-1/2 end-2.5 -translate-y-1/2">
              <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m7 15 5 5 5-5" />
                <path d="m7 9 5-5 5 5" />
              </svg>
            </div>
          </div>
        </div>
        <!-- End Input Form -->
      </div>

    <!-- Row 3: Description -->
    <div class="space-y-2">
      <label for="movie-description" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
        Description
      </label>
      <textarea id="movie-description" x-model="movieDescription" class="py-1.5 sm:py-2 px-3 block w-full bg-white border border-gray-200 rounded-lg sm:text-sm text-gray-800 placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:placeholder:text-white/60" rows="3" placeholder="What is the movie about?..."></textarea>
    </div>
  </div>
</div>
