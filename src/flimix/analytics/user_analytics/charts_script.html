<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
  (function () {
    const dateRangeInput = document.getElementById('user-analytics-date-range');
    let activeChart = null;
    let watchTimeChart = null;

    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    function getRangeBucket(val) {
      const v = parseInt(val, 10) || 30;
      if (v <= 14) return '7';
      if (v <= 60) return '30';
      if (v <= 180) return '90';
      return '365';
    }

    function getWeekLabels(days) {
      const n = Math.ceil(days / 7);
      const labels = [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = n - 1; i >= 0; i--) {
        const weekEnd = new Date(today);
        weekEnd.setDate(weekEnd.getDate() - (i * 7));
        const weekStart = new Date(weekEnd);
        weekStart.setDate(weekStart.getDate() - 6);
        if (weekStart.getMonth() === weekEnd.getMonth()) {
          labels.push(MONTHS[weekStart.getMonth()] + ' ' + weekStart.getDate() + '–' + weekEnd.getDate());
        } else {
          labels.push(
            MONTHS[weekStart.getMonth()] + ' ' + weekStart.getDate() +
            ' – ' +
            MONTHS[weekEnd.getMonth()] + ' ' + weekEnd.getDate()
          );
        }
      }
      return labels;
    }

    function getMonthLabels(count) {
      const labels = [];
      const d = new Date();
      for (let i = count - 1; i >= 0; i--) {
        const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
        labels.push(MONTHS[m.getMonth()]);
      }
      return labels;
    }

    function trendSeries(n, direction, base) {
      const arr = [];
      const step = base * 0.06;
      for (let i = 0; i < n; i++) {
        if (direction === 'up') arr.push(Math.round(base + i * step));
        else if (direction === 'down') arr.push(Math.round(base + (n - 1 - i) * step));
        else {
          const tiny = base * 0.002;
          arr.push(Math.round(base + (i % 3 - 1) * tiny));
        }
      }
      return arr;
    }

    function getActivityScenario(range) {
      const raw = parseInt(range != null && range !== '' ? range : (dateRangeInput ? dateRangeInput.value : '30'), 10);
      if (isNaN(raw) || raw <= 14) {
        return { pattern: 'up_up', status: 'Good' };
      }
      if (raw <= 60) {
        return { pattern: 'flat_flat', status: 'Attention' };
      }
      if (raw <= 180) {
        return { pattern: 'down_flat', status: 'Attention' };
      }
      return { pattern: 'down_down', status: 'Critical' };
    }

    function getActivityData(range) {
      const raw = range || (dateRangeInput ? dateRangeInput.value : '30');
      const bucket = getRangeBucket(raw);
      const days = parseInt(raw, 10) || 30;
      const scenario = getActivityScenario(raw);

      let categories;
      let activeBase;
      let watchBase;

      if (bucket === '7') {
        categories = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        activeBase = 14000;
        watchBase = 95000;
      } else if (bucket === '30') {
        categories = getWeekLabels(days);
        activeBase = 15000;
        watchBase = 110000;
      } else if (bucket === '90') {
        const monthCount = days <= 90 ? 3 : 6;
        categories = getMonthLabels(monthCount);
        activeBase = 16000;
        watchBase = 120000;
      } else {
        categories = getMonthLabels(12);
        activeBase = 15500;
        watchBase = 118000;
      }

      let activeDir = 'flat';
      let watchDir = 'flat';
      if (scenario.pattern === 'up_up') {
        activeDir = 'up'; watchDir = 'up';
      } else if (scenario.pattern === 'down_down') {
        activeDir = 'down'; watchDir = 'down';
      } else if (scenario.pattern === 'down_flat') {
        activeDir = 'down'; watchDir = 'flat';
      } else if (scenario.pattern === 'flat_down') {
        activeDir = 'flat'; watchDir = 'down';
      }

      const n = categories.length;

      return {
        categories,
        active: trendSeries(n, activeDir, activeBase),
        watch: trendSeries(n, watchDir, watchBase)
      };
    }

    function renderActiveChart(range) {
      const data = getActivityData(range);
      const el = document.getElementById('user-analytics-active-viewers-chart');
      if (!el) return;

      const options = {
        chart: {
          type: 'area',
          height: 260,
          toolbar: { show: false },
          zoom: { enabled: false },
          fontFamily: 'Inter, ui-sans-serif, system-ui, sans-serif'
        },
        grid: {
          borderColor: '#e7e5e4',
          strokeDashArray: 2,
          xaxis: { lines: { show: false } },
          padding: { left: 14, right: 8 }
        },
        dataLabels: { enabled: false },
        series: [
          { name: 'Active viewers', data: data.active }
        ],
        xaxis: {
          categories: data.categories,
          axisBorder: { show: false },
          axisTicks: { show: false },
          labels: { style: { colors: '#78716c', fontSize: '12px' } }
        },
        yaxis: {
          min: 0,
          tickAmount: 4,
          labels: {
            style: { colors: '#78716c', fontSize: '12px' },
            formatter: function (v) {
              if (v >= 100000) return (v / 100000).toFixed(1) + 'L';
              if (v >= 1000) return (v / 1000).toFixed(0) + 'k';
              return Math.round(v);
            }
          }
        },
        legend: { show: false },
        colors: ['#0ea5e9'],
        stroke: { curve: 'smooth', width: 2 },
        markers: { size: 0 },
        fill: {
          type: 'gradient',
          gradient: {
            shadeIntensity: 0.8,
            opacityFrom: 0.18,
            opacityTo: 0,
            stops: [0, 90, 100]
          }
        }
      };

      if (activeChart) {
        activeChart.updateOptions({
          series: options.series,
          xaxis: { categories: data.categories }
        });
      } else {
        activeChart = new ApexCharts(el, options);
        activeChart.render();
      }
    }

    function renderWatchTimeChart(range) {
      const data = getActivityData(range);
      const el = document.getElementById('user-analytics-watch-time-chart');
      if (!el) return;

      const options = {
        chart: {
          type: 'area',
          height: 260,
          toolbar: { show: false },
          zoom: { enabled: false },
          fontFamily: 'Inter, ui-sans-serif, system-ui, sans-serif'
        },
        grid: {
          borderColor: '#e7e5e4',
          strokeDashArray: 2,
          xaxis: { lines: { show: false } },
          padding: { left: 14, right: 8 }
        },
        dataLabels: { enabled: false },
        series: [
          { name: 'Watch time (hours)', data: data.watch }
        ],
        xaxis: {
          categories: data.categories,
          axisBorder: { show: false },
          axisTicks: { show: false },
          labels: { style: { colors: '#78716c', fontSize: '12px' } }
        },
        yaxis: {
          min: 0,
          tickAmount: 4,
          labels: {
            style: { colors: '#78716c', fontSize: '12px' },
            formatter: function (v) {
              if (v >= 100000) return (v / 1000).toFixed(0) + 'k hours';
              if (v >= 1000) return (v / 1000).toFixed(1) + 'k hours';
              return Math.round(v) + ' hours';
            }
          }
        },
        legend: { show: false },
        colors: ['#22c55e'],
        stroke: { curve: 'smooth', width: 2 },
        markers: { size: 0 },
        fill: {
          type: 'gradient',
          gradient: {
            shadeIntensity: 0.8,
            opacityFrom: 0.18,
            opacityTo: 0,
            stops: [0, 90, 100]
          }
        }
      };

      if (watchTimeChart) {
        watchTimeChart.updateOptions({
          series: options.series,
          xaxis: { categories: data.categories }
        });
      } else {
        watchTimeChart = new ApexCharts(el, options);
        watchTimeChart.render();
      }
    }

    function updateStatusBadgeAndTooltip(range) {
      const scenario = getActivityScenario(range);
      const badgeEl = document.getElementById('user-activity-status-badge');
      const labelEl = badgeEl ? badgeEl.querySelector('.user-activity-status-label') : null;
      const dotEl = badgeEl ? badgeEl.querySelector('.user-activity-status-dot') : null;
      const tooltipEl = document.querySelector('.user-activity-tooltip-text');

      const TOOLTIP_BY_PATTERN = {
        'up_up': 'More people are watching and consuming more content. Maintain content release schedule and monitor sustained growth.',
        'flat_flat': 'Viewer activity has plateaued. Refresh content catalog, improve discovery, and review engagement features.',
        'down_flat': 'Fewer viewers are visiting but remaining viewers watch normally. Focus on retention campaigns and onboarding improvements.',
        'down_down': 'Both audience size and content consumption are declining. Investigate platform issues, content freshness, and user experience problems immediately.'
      };

      let badgeClass = 'bg-stone-100 text-stone-700 dark:bg-neutral-700/60 dark:text-neutral-200';
      let dotClass = 'bg-stone-500 after:bg-stone-500 dark:bg-neutral-300 dark:after:bg-neutral-300';
      let label = 'Neutral';
      let tooltip = TOOLTIP_BY_PATTERN[scenario.pattern] || TOOLTIP_BY_PATTERN['flat_flat'];

      if (scenario.status === 'Good') {
        badgeClass = 'bg-green-100 text-green-700 dark:bg-green-500/10 dark:text-green-400';
        dotClass = 'bg-green-700 after:bg-green-700 dark:bg-green-400 dark:after:bg-green-400';
        label = 'Good';
      } else if (scenario.status === 'Attention') {
        badgeClass = 'bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400';
        dotClass = 'bg-amber-600 after:bg-amber-600 dark:bg-amber-400 dark:after:bg-amber-400';
        label = 'Attention';
      } else if (scenario.status === 'Critical') {
        badgeClass = 'bg-red-100 text-red-700 dark:bg-red-500/10 dark:text-red-400';
        dotClass = 'bg-red-700 after:bg-red-700 dark:bg-red-400 dark:after:bg-red-400';
        label = 'Critical';
      }

      if (badgeEl) {
        badgeEl.className = 'hs-tooltip-toggle py-1 px-2.5 inline-flex items-center gap-x-2 text-start whitespace-nowrap font-medium text-[13px] rounded-full cursor-pointer ' + badgeClass;
      }
      if (labelEl) labelEl.textContent = label;
      if (dotEl) {
        dotEl.className = 'user-activity-status-dot relative w-2.5 h-px after:absolute after:top-1/2 after:-start-1 after:size-1.5 after:rounded-full after:-translate-y-1/2 ' + dotClass;
      }
      if (tooltipEl) tooltipEl.textContent = tooltip;
    }

    function updateCharts(range) {
      renderActiveChart(range);
      renderWatchTimeChart(range);
      updateStatusBadgeAndTooltip(range);
    }

    if (dateRangeInput) {
      dateRangeInput.addEventListener('change', function () {
        updateCharts(this.value);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () { updateCharts(); }, 100);
      });
    } else {
      setTimeout(function () { updateCharts(); }, 100);
    }
  })();
</script>
