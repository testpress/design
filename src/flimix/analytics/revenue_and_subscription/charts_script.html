<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
  (function () {
    const dateRangeSelect = document.getElementById('analytics-date-range');
    let trendChart = null;
    let planChart = null;
    let lifecycleChart = null;

    function getTrendData(range) {
      const rangeKey = range || (dateRangeSelect ? dateRangeSelect.value : '30');
      if (rangeKey === '7') {
        return {
          categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          subscription: [42000, 45000, 41000, 48000, 46000, 44000, 47000],
          tvod: [12000, 15000, 11000, 16000, 14000, 13000, 15000]
        };
      }
      if (rangeKey === '90') {
        return {
          categories: ['W1', 'W2', 'W3', 'W4', 'W5', 'W6', 'W7', 'W8', 'W9', 'W10', 'W11', 'W12', 'W13'],
          subscription: [285000, 292000, 278000, 301000, 295000, 288000, 310000, 298000, 305000, 292000, 308000, 302000, 315000],
          tvod: [82000, 85000, 78000, 90000, 88000, 84000, 92000, 86000, 89000, 85000, 91000, 88000, 93000]
        };
      }
      if (rangeKey === '365') {
        return {
          categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
          subscription: [980000, 1020000, 995000, 1050000, 1030000, 1080000, 1060000, 1100000, 1085000, 1120000, 1090000, 1150000],
          tvod: [320000, 340000, 315000, 360000, 350000, 370000, 355000, 380000, 365000, 390000, 375000, 400000]
        };
      }
      return {
        categories: ['W1', 'W2', 'W3', 'W4'],
        subscription: [285000, 292000, 278000, 301000],
        tvod: [82000, 85000, 78000, 90000]
      };
    }

    function getPlanData(range) {
      const rangeKey = range || (dateRangeSelect ? dateRangeSelect.value : '30');
      if (rangeKey === '7') {
        return [180000, 220000, 320000, 130000];
      }
      if (rangeKey === '90') {
        return [1850000, 2280000, 3320000, 1350000];
      }
      if (rangeKey === '365') {
        return [7200000, 8900000, 12800000, 5200000];
      }
      return [620000, 820000, 1200000, 510000];
    }

    function getLifecycleData(range) {
      const rangeKey = range || (dateRangeSelect ? dateRangeSelect.value : '30');
      if (rangeKey === '7') {
        return {
          categories: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          new: [52, 48, 61, 55, 58, 72, 74],
          renewal: [320, 310, 335, 340, 318, 290, 285],
          cancelled: [12, 18, 15, 14, 16, 22, 19],
          upgrade: [8, 12, 10, 14, 11, 15, 13],
          downgrade: [5, 7, 6, 8, 6, 9, 7]
        };
      }
      if (rangeKey === '90') {
        return {
          categories: ['W1', 'W2', 'W3', 'W4', 'W5', 'W6', 'W7', 'W8', 'W9', 'W10', 'W11', 'W12', 'W13'],
          new: [185, 192, 178, 195, 188, 202, 190, 198, 205, 192, 200, 208, 215],
          renewal: [2100, 2180, 2050, 2220, 2150, 2280, 2200, 2250, 2320, 2180, 2300, 2280, 2350],
          cancelled: [85, 92, 78, 95, 88, 102, 90, 98, 95, 92, 100, 98, 105],
          upgrade: [42, 48, 45, 52, 48, 55, 50, 58, 52, 55, 60, 58, 62],
          downgrade: [28, 32, 30, 35, 32, 38, 35, 40, 38, 35, 42, 40, 45]
        };
      }
      if (rangeKey === '365') {
        return {
          categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
          new: [620, 580, 720, 650, 680, 710, 690, 730, 700, 750, 720, 780],
          renewal: [3200, 3180, 3350, 3280, 3320, 3400, 3380, 3450, 3420, 3500, 3480, 3550],
          cancelled: [280, 265, 310, 290, 305, 320, 315, 330, 325, 340, 335, 350],
          upgrade: [165, 158, 182, 170, 178, 188, 185, 195, 190, 200, 198, 208],
          downgrade: [125, 118, 138, 130, 135, 142, 140, 148, 145, 152, 150, 158]
        };
      }
      return {
        categories: ['W1', 'W2', 'W3', 'W4'],
        new: [98, 112, 105, 135],
        renewal: [2080, 2120, 2050, 2100],
        cancelled: [72, 78, 75, 87],
        upgrade: [32, 38, 35, 45],
        downgrade: [22, 26, 24, 30]
      };
    }

    function renderTrendChart(range) {
      const data = getTrendData(range);
      const options = {
        chart: {
          type: 'line',
          height: 300,
          toolbar: { show: false },
          zoom: { enabled: false },
          fontFamily: 'Inter, ui-sans-serif, system-ui, sans-serif'
        },
        series: [
          { name: 'Subscription', data: data.subscription },
          { name: 'Pay per view', data: data.tvod }
        ],
        xaxis: {
          categories: data.categories,
          axisBorder: { show: false },
          axisTicks: { show: false },
          labels: { style: { colors: '#78716c', fontSize: '12px' } }
        },
        yaxis: {
          labels: {
            style: { colors: '#78716c', fontSize: '12px' },
            formatter: function (v) {
              if (v >= 100000) return '₹' + (v / 100000).toFixed(1) + 'L';
              if (v >= 1000) return '₹' + (v / 1000).toFixed(0) + 'k';
              return '₹' + v;
            }
          }
        },
        legend: {
          position: 'bottom',
          horizontalAlign: 'center',
          fontSize: '13px',
          fontWeight: 500,
          labels: { colors: '#44403c' }
        },
        grid: {
          borderColor: '#e7e5e4',
          strokeDashArray: 2,
          xaxis: { lines: { show: false } }
        },
        colors: ['#10b981', '#2563eb'],
        stroke: { curve: 'smooth', width: 3 },
        markers: {
          size: 5,
          strokeWidth: 0,
          strokeColors: '#fff',
          hover: { size: 7 }
        },
        tooltip: {
          y: {
            formatter: function (v) {
              if (v >= 100000) return '₹' + (v / 100000).toFixed(2) + 'L';
              if (v >= 1000) return '₹' + (v / 1000).toFixed(1) + 'k';
              return '₹' + v;
            }
          }
        }
      };
      const el = document.getElementById('analytics-revenue-trend-chart');
      if (!el) return;
      if (trendChart) {
        trendChart.updateOptions({
          series: options.series,
          xaxis: { categories: data.categories }
        });
      } else {
        trendChart = new ApexCharts(el, options);
        trendChart.render();
      }
    }

    function renderPlanChart(range) {
      const data = getPlanData(range);
      const options = {
        chart: {
          type: 'donut',
          height: 300,
          fontFamily: 'Inter, ui-sans-serif, system-ui, sans-serif'
        },
        series: data,
        labels: ['Basic', 'Standard', 'Premium', 'Family'],
        legend: {
          position: 'bottom',
          fontSize: '13px',
          fontWeight: 500,
          labels: { colors: '#44403c' }
        },
        colors: ['#2563eb', '#8b5cf6', '#10b981', '#f59e0b'],
        plotOptions: {
          pie: {
            donut: {
              size: '65%',
              labels: {
                show: true,
                total: {
                  show: true,
                  label: 'Total',
                  fontSize: '14px',
                  fontWeight: 600,
                  color: '#44403c',
                  formatter: function (w) {
                    const sum = w.globals.seriesTotals.reduce((a, b) => a + b, 0);
                    if (sum >= 100000) return '₹' + (sum / 100000).toFixed(1) + 'L';
                    if (sum >= 1000) return '₹' + (sum / 1000).toFixed(0) + 'k';
                    return '₹' + sum;
                  }
                }
              }
            }
          }
        },
        tooltip: {
          y: {
            formatter: function (v) {
              if (v >= 100000) return '₹' + (v / 100000).toFixed(2) + 'L';
              if (v >= 1000) return '₹' + (v / 1000).toFixed(1) + 'k';
              return '₹' + v;
            }
          }
        }
      };
      const el = document.getElementById('analytics-revenue-by-plan-chart');
      if (!el) return;
      if (planChart) {
        planChart.updateOptions({ series: data });
      } else {
        planChart = new ApexCharts(el, options);
        planChart.render();
      }
    }

    function renderLifecycleChart(range) {
      const data = getLifecycleData(range);
      const options = {
        chart: {
          type: 'bar',
          height: 300,
          toolbar: { show: false },
          fontFamily: 'Inter, ui-sans-serif, system-ui, sans-serif'
        },
        series: [
          { name: 'New', data: data.new },
          { name: 'Renewal', data: data.renewal },
          { name: 'Cancelled', data: data.cancelled },
          { name: 'Upgrade', data: data.upgrade },
          { name: 'Downgrade', data: data.downgrade }
        ],
        xaxis: {
          categories: data.categories,
          axisBorder: { show: false },
          axisTicks: { show: false },
          labels: { style: { colors: '#78716c', fontSize: '12px' } }
        },
        yaxis: {
          labels: {
            style: { colors: '#78716c', fontSize: '12px' }
          }
        },
        plotOptions: {
          bar: {
            horizontal: false,
            borderRadius: 4,
            columnWidth: '75%',
            dataLabels: { position: 'top' }
          }
        },
        colors: ['#10b981', '#2563eb', '#ef4444', '#8b5cf6', '#f59e0b'],
        grid: {
          borderColor: '#e7e5e4',
          strokeDashArray: 2,
          xaxis: { lines: { show: false } }
        },
        legend: {
          position: 'bottom',
          horizontalAlign: 'center',
          fontSize: '13px',
          fontWeight: 500,
          labels: { colors: '#44403c' }
        },
        dataLabels: {
          enabled: false
        }
      };
      const el = document.getElementById('analytics-subscription-lifecycle-chart');
      if (!el) return;
      if (lifecycleChart) {
        lifecycleChart.updateOptions({
          series: [
            { name: 'New', data: data.new },
            { name: 'Renewal', data: data.renewal },
            { name: 'Cancelled', data: data.cancelled },
            { name: 'Upgrade', data: data.upgrade },
            { name: 'Downgrade', data: data.downgrade }
          ],
          xaxis: { categories: data.categories }
        });
      } else {
        lifecycleChart = new ApexCharts(el, options);
        lifecycleChart.render();
      }
    }

    function updateCharts(range) {
      renderTrendChart(range);
      renderPlanChart(range);
      renderLifecycleChart(range);
    }

    if (dateRangeSelect) {
      dateRangeSelect.addEventListener('change', function () {
        updateCharts(this.value);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () { updateCharts(); }, 100);
      });
    } else {
      setTimeout(function () { updateCharts(); }, 100);
    }
  })();
</script>
