<div class="divide-y divide-gray-100 dark:divide-neutral-700 border-b border-gray-100 dark:border-neutral-700">
    {% for report_card in student_report_card %}
        <div class="py-4 px-4 sm:px-6  transition-colors hover:bg-gray-50 dark:hover:bg-neutral-700">
        <a href="#" class="flex gap-x-3 items-center focus:outline-none">
            <div class="min-w-0 flex-1">
            <h2 class="font-medium text-gray-800 dark:text-neutral-200">
                {{ report_card.title }}
            </h2>
            <ul class="flex flex-wrap items-center whitespace-nowrap gap-1.5 mt-0.5">
                <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
                <p class="text-xs text-gray-500 dark:text-neutral-400">{{ report_card.course_name }}</p>
                </li>
            </ul>
            </div>
    <div class="flex shrink-0 items-center gap-x-4">
      <div class="flex flex-col items-end">
        <p class="text-sm/6 text-gray-900 dark:text-white">{{ report_card.score.value }}</p>
        <p class="mt-1 text-xs/5 text-gray-500 dark:text-gray-400">{{ report_card.score.min }} - {{ report_card.score.max }}</p>
      </div>
      <svg viewBox="0 0 20 20" fill="currentColor" data-slot="icon" aria-hidden="true" class="size-5 flex-none text-gray-400 dark:text-gray-500">
        <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
      </svg>
    </div>
        </a>
        </div>
    {% endfor %}
</div>
