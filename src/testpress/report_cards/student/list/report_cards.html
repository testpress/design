<div class="divide-y divide-gray-100 dark:divide-neutral-700 border-b border-gray-100 dark:border-neutral-700">
    {% for report_card in student_report_card %}
        <div class="py-3 px-4 sm:px-6 transition-colors hover:bg-gray-50 dark:hover:bg-neutral-700">
        <a href="{% if report_card.has_detail %}{{ previewPath }}/testpress/report_cards/detail/{% else %}#{% endif %}" class="flex gap-x-3 items-center focus:outline-none">
            <div class="min-w-0 flex-1">
                <h2 class="text-[13px] sm:text-[15px] font-medium text-gray-800 dark:text-neutral-200 truncate line-clamp-1">
                    {{ report_card.report.title }}
                </h2>
                <p class="text-xs text-gray-500 dark:text-neutral-400 truncate line-clamp-1 mt-0.5">{{ report_card.report.course }}</p>
            </div>
            <div class="flex shrink-0 items-center gap-x-3">
                <div class="flex flex-col items-end">
                    <p class="text-sm sm:text-base text-gray-900 dark:text-white font-medium leading-tight">
                        {{ report_card.summary.total_score }}
                    </p>
                    <p class="text-[10px] text-gray-500 dark:text-neutral-400">{{ report_card.summary.score_range }}</p>
                </div>
            </div>
        </a>
        </div>
    {% endfor %}
</div>
