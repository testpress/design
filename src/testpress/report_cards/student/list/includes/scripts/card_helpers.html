<script>
  function rcParsePercent(val) {
    if (val === null || val === undefined || val === '') return 0;
    if (typeof val === 'number') return Math.min(Math.max(val, 0), 100);
    const s = String(val).replace('%', '').trim();
    const n = parseFloat(s);
    return isNaN(n) ? 0 : Math.min(Math.max(n, 0), 100);
  }

  function rcSectionPercent(section) {
    const groups = section.groups || [];
    if (groups.length === 0) return 0;
    const total = groups.reduce((sum, g) => {
      if (g.average_percentage) return sum + rcParsePercent(g.average_percentage);
      const score = parseFloat(g.average_score) || 0;
      const max = parseFloat((g.items && g.items[0]) ? g.items[0].max : 0) || 100;
      return sum + Math.min((score / max) * 100, 100);
    }, 0);
    return total / groups.length;
  }

  function rcScoreColor(pct) {
    if (pct >= 70) return 'green';
    if (pct >= 40) return 'amber';
    return 'red';
  }

  const RC_COLORS = {
    green: { text: 'text-green-600 dark:text-green-500', bg: 'bg-green-600 dark:bg-green-500' },
    amber: { text: 'text-amber-500 dark:text-amber-400', bg: 'bg-amber-500 dark:bg-amber-400' },
    red:   { text: 'text-red-500 dark:text-red-400',     bg: 'bg-red-500 dark:bg-red-400'     },
  };

  function rcTextClass(pct) {
    return RC_COLORS[rcScoreColor(pct)].text;
  }

  function rcBgClass(pct) {
    return RC_COLORS[rcScoreColor(pct)].bg;
  }

  function rcOverallPercent(report) {
    const sections = report.sections || [];
    if (sections.length === 0) return 0;
    const total = sections.reduce((s, sec) => s + rcSectionPercent(sec), 0);
    return total / sections.length;
  }

  function rcTrend(pct) {
    if (pct >= 85) return { label: 'Outstanding progress!', color: 'text-green-600 dark:text-green-500' };
    if (pct >= 70) return { label: 'Keep up the great work!', color: 'text-green-600 dark:text-green-500' };
    if (pct >= 50) return { label: 'Building momentum!', color: 'text-amber-500 dark:text-amber-400' };
    return { label: "You've got this, keep pushing!", color: 'text-red-500 dark:text-red-400' };
  }

  function rcScoreLabel(pct) {
    if (pct >= 90) return 'Excellent';
    if (pct >= 75) return 'Very Good';
    if (pct >= 50) return 'Satisfactory';
    return 'Needs Improvement';
  }

  function numberToWords(num) {
    const words = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten"];
    return words[num] || num;
  }
  
  function rcSectionContext(section) {
    const groups = section.groups || [];
    const countInWords = numberToWords(groups.length);
    return "across " + countInWords + " key areas";
  }

  function rcTestStatusLabel(pct) {
    if (pct >= 100) return 'Completed';
    if (pct >= 75)  return 'On track';
    if (pct >= 50)  return 'In progress';
    return 'Needs attention';
  }

  function rcTestStatusColor(pct) {
    if (pct >= 75) return 'text-green-600 dark:text-green-500';
    if (pct >= 50) return 'text-amber-500 dark:text-amber-400';
    return 'text-red-500 dark:text-red-400';
  }

  function rcTotalTests(report) {
    return (report.sections || []).reduce((acc, sec) => {
      return acc + (sec.groups || []).reduce((gAcc, g) => gAcc + (g.items || []).length, 0);
    }, 0);
  }

  function rcSegments(pct) {
    const TOTAL = 5;
    const filled = Math.round((pct / 100) * TOTAL);
    return Array.from({ length: TOTAL }, (_, i) => ({ filled: i < filled }));
  }

  function rcRadialSvg(pct) {
    const color = rcScoreColor(pct);
    const COLOR_HEX = { green: '#16a34a', amber: '#f59e0b', red: '#ef4444' };
    const MUTED = '#d1d5db';
    const filledCount = Math.round((pct / 100) * 12);
    const rects = Array.from({ length: 12 }, (_, i) => {
      const fill = i < filledCount ? COLOR_HEX[color] : MUTED;
      return `<rect x="-3" y="-28" width="6" height="12" rx="3" fill="${fill}" transform="rotate(${i * 30})"/>`;
    }).join('');
    return `<svg width="40" height="40" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><g transform="translate(32,32)">${rects}</g></svg>`;
  }

  function rcScoreIcon(pct) {
    const baseClass = "shrink-0 size-3 sm:size-3.5";    
    if (pct >= 90) {
      return `<svg class="${baseClass}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    }
    if (pct >= 75) {
      return `<svg class="${baseClass}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`;
    }
    if (pct >= 50) {
      return `<svg class="${baseClass}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>`;
    }
    return `<svg class="${baseClass}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`;
  }

  function reportCardItem(report) {
    return {
      get overallPct()       { return rcOverallPercent(report); },
      get trend()            { return rcTrend(this.overallPct); },
      get totalTests()       { return rcTotalTests(report); },
      get totalAssessments() { return report.summary?.total_assessments || Math.max(this.totalTests, 1); },
      get completionPct()    { return (this.totalTests / this.totalAssessments) * 100; }
    };
  }
</script>
