<template x-if="reportCards.length > 0">
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 lg:gap-6">
    <template x-for="report in reportCards" :key="report.id">
      <div>
        {% include "./card.html" %}
      </div>
    </template>
    {% include "./loader.html" %}
  </div>
</template>

<template x-if="reportCards.length === 0">
  {% include "./empty_state.html" %}
</template>
