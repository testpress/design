<div class="p-5 bg-white border border-gray-200 hover:border-emerald-500 hover:ring-1 hover:ring-emerald-500 hover:shadow-lg transition-all rounded-2xl dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-emerald-500 flex flex-col justify-between h-full">

  <div class="space-y-4 flex-grow">
    <div class="flex flex-col gap-1">
      <div class="flex items-center gap-x-2">
        <div class="hs-tooltip [--placement:bottom] hover:cursor-pointer inline-block max-w-full">
          <h2 class="hs-tooltip-toggle font-medium text-gray-800 dark:text-neutral-200 line-clamp-1 max-w-full" x-text="report.report.title">
          </h2>
          <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 max-w-72 hs-tooltip-shown:visible opacity-0 transition-opacity invisible absolute z-[99] py-1 px-2 bg-gray-900 text-sm font-medium text-white rounded-md shadow-2xl dark:bg-neutral-700" x-text="report.report.title">
          </span>
        </div>
        <template x-if="report.report.description">
          <div class="hs-tooltip [--trigger:click] [--placement:bottom] hover:cursor-pointer inline-block shrink-0">
            <button type="button" class="hs-tooltip-toggle inline-flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-gray-400 hover:cursor-pointer dark:text-neutral-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"></path>
              </svg>
              <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 absolute invisible text-left z-[99] w-72 py-1 px-2 bg-gray-900 text-sm text-white rounded-md shadow-md hidden dark:text-white dark:bg-neutral-700 dark:border-none" x-text="report.report.description">
              </span>
            </button>
          </div>
        </template>
      </div>
      <div class="flex justify-between items-center mt-1">
        <p class="text-xs text-gray-500 dark:text-neutral-500 w-full truncate pr-2" x-text="report.report.course"></p>
        <span class="text-xs text-gray-500 dark:text-neutral-500 whitespace-nowrap">By: <span class="font-medium text-gray-700 dark:text-neutral-300" x-text="report.report.staff_name || 'N/A'"></span></span>
      </div>
    </div>

    <hr class="border-gray-200 dark:border-neutral-700 border-dashed">

    <div class="space-y-2">
      <div class="flex justify-between items-center">
        <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="'Total Score'"></span>
        <span class="inline-flex items-center py-1.5 px-3 rounded-md text-sm font-semibold bg-gray-100 border border-gray-200 text-gray-800 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200" x-text="report.summary.total_score || 'N/A'">
        </span>
      </div>

      <div class="flex flex-wrap items-center gap-x-2 gap-y-2 mt-2">
        <template x-for="section in (report.sections || []).slice(0, 2)">
          <span class="inline-flex items-center bg-layer border border-layer-line text-layer-foreground text-xs rounded-md border-gray-200 dark:border-neutral-700">
            <span class="py-[5px] px-2 text-muted-foreground-1 flex items-center gap-1 text-gray-500 dark:text-neutral-400" x-text="section.title">
            </span>
            <span class="bg-surface border-s border-layer-line font-medium text-xs rounded-e-md border-gray-200 dark:border-neutral-700 bg-gray-50 dark:bg-neutral-800 text-gray-800 dark:text-neutral-200">
              <span class="py-[5px] px-2 inline-flex items-center gap-1.5" x-text="(section.groups || []).reduce((acc, g) => acc + (parseFloat(g.average_score) || 0), 0)">
              </span>
            </span>
          </span>
        </template>
        <template x-if="(report.sections || []).length > 2">
          <span class="inline-flex items-center bg-gray-50 border border-gray-200 text-gray-500 text-xs rounded-md dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400">
            <span class="py-[5px] px-2 font-medium" x-text="'+' + ((report.sections || []).length - 2) + ' more'"></span>
          </span>
        </template>
      </div>
    </div>
  </div>

  <div class="mt-5 shrink-0 flex flex-col gap-4">
    <div class="min-h-[32px] flex items-start">
      <p class="text-xs text-gray-600 dark:text-neutral-400 italic line-clamp-2">
        💬 <span x-text="report.report.remarks || 'No remarks given.'"></span>
      </p>
    </div>

    <div class="flex justify-end">
      <a :href="'./detail/?id=' + report.id" class="inline-flex items-center gap-x-1 text-sm underline underline-offset-4 text-gray-800 hover:text-primary-600 focus:outline-none focus:text-primary-600 dark:text-neutral-200 dark:hover:text-primary-400 dark:focus:text-primary-400 group">
        <span>View Full Report</span>
        <svg class="shrink-0 size-4 transition ease-in-out group-hover:translate-x-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </a>
    </div>
  </div>

</div>
