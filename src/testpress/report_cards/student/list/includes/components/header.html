<!-- Header -->
<div class="flex justify-between items-center gap-x-5">
  <h2 class="inline-block text-lg font-semibold text-gray-800 dark:text-neutral-200">
    My Report Cards
  </h2>

  <div class="flex flex-wrap items-center gap-2">
    <!-- Filter Dropdown -->
    <button type="button" class="py-1.5 px-2.5 inline-flex items-center gap-x-1.5 text-[13px] whitespace-nowrap rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-report-filter-offcanvas" data-hs-overlay="#hs-report-filter-offcanvas">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filter
    </button>
    
    <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-right] relative inline-flex">
      <button id="hs-pro-dashe" type="button"
        class="py-1.5 px-2.5 inline-flex items-center gap-x-1.5 text-[13px] whitespace-nowrap rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 16 4 4 4-4"></path>
          <path d="M7 20V4"></path>
          <path d="m21 8-4-4-4 4"></path>
          <path d="M17 4v16"></path>
        </svg>
        Recent Activity
      </button>

      <div
        class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-auto transition-[opacity,margin] duration opacity-0 hidden z-[99] bg-white border border-gray-200 rounded-xl shadow-xl dark:bg-neutral-800 dark:border-neutral-700 dark:shadow-neutral-900/50"
        role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dashe">
        <div class="p-1 space-y-0.5">
          <button
            class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
            Recent Activity
          </button>
          <button
            class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
            Oldest First
          </button>
          <button
            class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
            Best Performance
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
