<!-- Report Card Component Container -->
<div class="p-5 min-h-[250px] h-auto flex flex-col justify-between bg-card border border-card-line rounded-xl shadow-2xs"
  x-data="{
    get overallPct()  { return rcOverallPercent(report); },
    get trend()       { return rcTrend(this.overallPct); }
  }">

  <!-- Card Header: Course Title & Staff Name -->
  <div class="flex justify-between items-start shrink-0 gap-4">
    <div class="grow min-w-0">
      <div class="mb-1 flex items-center gap-x-1.5">
        <svg class="shrink-0 size-4 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        <span class="block text-[13px] text-muted-foreground-1 truncate">
          Course: <span x-text="report.report.course || 'N/A'"></span>
          &middot; By: <span x-text="report.report.staff_name || 'N/A'"></span>
        </span>
      </div>
      <span class="block font-medium text-foreground truncate" x-text="report.report.title"></span>
    </div>

    <!-- Dropdown Actions Menu -->
    <div class="shrink-0">
      <div class="hs-dropdown [--placement:bottom-right] relative inline-flex">
        <button :id="'hs-rc-menu-' + report.id" type="button" class="size-8 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
          <span class="sr-only">Actions</span>
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="19" cy="12" r="1"></circle>
            <circle cx="5" cy="12" r="1"></circle>
          </svg>
        </button>
        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 z-10 transition-[opacity,margin] duration opacity-0 bg-dropdown border border-dropdown-line rounded-xl shadow-lg hidden" role="menu" aria-orientation="vertical" :aria-labelledby="'hs-rc-menu-' + report.id" tabindex="-1">
          <div class="p-1 space-y-0.5">
            <a class="relative group py-2 px-3 flex items-center gap-x-2.5 text-[13px] text-dropdown-item-foreground hover:bg-dropdown-item-hover rounded-lg focus:outline-hidden focus:bg-dropdown-item-focus" :href="report.has_detail ? './detail/?id=' + report.id : '#'">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              View full report card
            </a>
            <a class="relative group py-2 px-3 flex items-center gap-x-2.5 text-[13px] text-dropdown-item-foreground hover:bg-dropdown-item-hover rounded-lg focus:outline-hidden focus:bg-dropdown-item-focus" href="#">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" x2="12" y1="15" y2="3"/>
              </svg>
              Download PDF
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Card Body: Scoring, Trends, and Section Performance -->
  <div class="flex-1 py-4 lg:py-2 my-2 lg:my-0">
    <div class="flex items-start lg:items-center h-full">
      <div class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 lg:gap-4 pr-1 lg:pr-2">
        
        <template x-for="section in (report.sections || [])" :key="section.id">
          <div x-data="{ pct: rcSectionPercent(section) }">
            <span class="block mb-1 text-[13px] text-muted-foreground-1 truncate">
              <span x-text="section.title"></span>:
              <span class="font-medium" :class="rcTextClass(pct)" x-text="pct.toFixed(0) + '%'"></span>
            </span>

            <p class="text-[13px]/4 mt-1">
              <span class="font-semibold" :class="rcTextClass(pct)" x-text="pct.toFixed(0) + '%'"></span>
              <span class="text-muted-foreground-1"> score </span>
              <span class="text-muted-foreground-1 line-clamp-1" :title="rcSectionContext(section)" x-text="rcSectionContext(section)"></span>
            </p>

            <div class="mt-2 flex items-center gap-1">
              <template x-for="(seg, i) in rcSegments(pct)" :key="i">
                <span class="shrink-0 w-5 h-1 inline-block rounded-full"
                  :class="seg.filled ? rcBgClass(pct) : 'bg-surface-2'">
                </span>
              </template>
            </div>
          </div>
        </template>

      </div>
    </div>
  </div>

  <!-- Overall Trend and Score -->
  <div class="flex justify-between items-end shrink-0 gap-4 mt-2">
    <div class="min-w-0">
      <span class="block mb-1 text-[13px] text-muted-foreground-1 truncate">
        Current trend:
        <span class="font-medium" :class="trend.color" x-text="trend.label"></span>
      </span>

      <div class="flex items-center gap-x-2">
        <span x-html="rcRadialSvg(overallPct)" class="shrink-0 size-8 block"></span>
        <p class="font-medium text-xl text-foreground leading-none" x-text="overallPct.toFixed(0) + '%'"></p>
        <span class="flex items-center gap-x-1 text-[13px] ml-1 truncate" :class="trend.color">
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          <span class="truncate" x-text="rcScoreLabel(overallPct)"></span>
        </span>
      </div>
    </div>

    <!-- Teacher Remarks (With Tooltip) -->
    <div class="shrink-0 flex items-center gap-x-2 pb-1">
      <span class="text-[13px] text-muted-foreground-1 hidden sm:inline-block">
        Teacher remarks
      </span>

      <template x-if="report.report.remarks">
        <div class="relative group inline-block">
          <div class="inline-flex justify-center items-center size-6 rounded-full bg-green-100 text-green-600 dark:bg-green-500/10 dark:text-green-500 cursor-help transition-colors hover:bg-green-200 dark:hover:bg-green-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          </div>
          
          <div class="absolute bottom-full right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-20 pointer-events-none">
            <div class="py-1.5 px-2.5 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max max-w-[200px] sm:max-w-xs whitespace-normal text-left dark:bg-neutral-700" x-text="report.report.remarks"></div>
            <div class="absolute -bottom-1 right-2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700"></div>
          </div>
        </div>
      </template>

      <template x-if="!report.report.remarks">
        <div class="relative group inline-block">
          <div class="inline-flex justify-center items-center size-6 rounded-full bg-gray-100 text-gray-500 dark:bg-neutral-800 dark:text-neutral-400 cursor-help transition-colors hover:bg-gray-200 dark:hover:bg-neutral-700">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5">
              <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
          </div>
          
          <div class="absolute bottom-full right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-20 pointer-events-none">
            <div class="py-1.5 px-2.5 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max whitespace-nowrap text-left dark:bg-neutral-700">
              No remarks given.
            </div>
            <div class="absolute -bottom-1 right-2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700"></div>
          </div>
        </div>
      </template>
    </div>

  </div>

</div>
