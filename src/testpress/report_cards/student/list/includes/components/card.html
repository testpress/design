<!-- Report Card Component Container -->
<div class="p-4 sm:p-5 flex flex-col gap-y-5 sm:gap-y-6 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700"
  x-data="reportCardItem(report)">
  <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start shrink-0 gap-3 sm:gap-4">
    <div class="grow min-w-0 w-full sm:w-auto">
      <div class="mb-1 flex items-center gap-x-1.5">
        <svg class="shrink-0 size-3.5 sm:size-4 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
          <path d="M22 10v6"/>
          <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
        </svg>
        <div class="grow min-w-0">
          <span class="block text-[11px] sm:text-[13px] text-gray-500 dark:text-neutral-400 truncate">
            Course: <span x-text="report.report.course || 'N/A'"></span>
            &middot; By: <span x-text="report.report.staff_name || 'N/A'"></span>
          </span>
        </div>
      </div>

      <div class="flex items-center gap-x-2 mt-0.5">
        <span class="block text-sm sm:text-base font-medium text-gray-800 dark:text-neutral-200 truncate" x-text="report.report.title"></span>
        
        <template x-if="report.report.description">
          <div class="relative group inline-block flex-shrink-0">
            <svg class="size-3.5 sm:size-4 text-gray-400 cursor-help hover:text-gray-600 dark:text-neutral-500 dark:hover:text-neutral-300 transition-colors" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
            <div class="absolute top-full sm:bottom-full sm:top-auto left-0 sm:left-1/2 sm:-translate-x-1/2 mt-2 sm:mt-0 sm:mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-[99] pointer-events-none">
              <div class="py-1.5 px-2.5 bg-gray-900 text-[11px] sm:text-xs text-white rounded-lg shadow-sm w-max max-w-[220px] sm:max-w-[250px] whitespace-normal text-left dark:bg-neutral-700 dark:border dark:border-neutral-600" x-text="report.report.description"></div>
              <div class="absolute -top-1 sm:-bottom-1 sm:top-auto left-4 sm:left-1/2 sm:-translate-x-1/2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-t dark:border-l sm:dark:border-t-0 sm:dark:border-l-0 sm:dark:border-b sm:dark:border-r dark:border-neutral-600"></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="shrink-0 flex justify-start items-center -space-x-px w-full sm:w-auto mt-1 sm:mt-0">
      <a :href="report.has_detail ? './detail/?id=' + report.id : '#'" class="h-8 sm:h-9 px-3 inline-flex items-center gap-x-1.5 text-[11px] sm:text-xs font-medium first:rounded-s-lg last:rounded-e-lg bg-white border border-gray-200 text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
        <svg class="shrink-0 size-3 sm:size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        View full report
      </a>
      
      <div class="hs-dropdown relative inline-flex [--auto-close:inside] [--placement:bottom-right] first:rounded-s-lg last:rounded-e-lg bg-white border border-gray-200 shadow-2xs hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700">
        <button :id="'hs-rc-menu-' + report.id" type="button" class="h-8 w-8 sm:h-9 sm:w-9 inline-flex justify-center items-center gap-x-2 rounded-e-lg text-gray-800 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:text-neutral-300 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
          <svg class="shrink-0 size-3 sm:size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>

        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-52 transition-[opacity,margin] duration opacity-0 hidden z-[99] bg-white border border-gray-200 rounded-xl shadow-xl dark:bg-neutral-800 dark:border-neutral-700 dark:shadow-neutral-900/50" role="menu" aria-orientation="vertical" :aria-labelledby="'hs-rc-menu-' + report.id">
          <div class="p-1">
            <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
              <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
              Download report
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
              <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
              Send push notification
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Card Body: Scoring, Trends, and Section Performance -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-5 sm:gap-6">
    
    <div>
      <span class="block mb-1.5 text-[12px] sm:text-[13px] text-gray-500 dark:text-neutral-400 truncate">
        Overall performance
      </span>

      <div class="flex items-center gap-x-1.5">
        <span x-html="rcRadialSvg(overallPct)" class="shrink-0 size-8 sm:size-10 block"></span>
        <div class="grow truncate">
          <p class="font-medium text-xl sm:text-2xl text-gray-800 dark:text-neutral-200" x-text="overallPct.toFixed(0) + '%'"></p>
        </div>
      </div>

      <span class="flex items-center gap-x-1 text-[12px] sm:text-[13px] mt-1 truncate" :class="trend.color">
        <span x-html="rcScoreIcon(overallPct)"></span>
        <span class="truncate" x-text="rcScoreLabel(overallPct)"></span>
      </span>
    </div>

    <div>
      <span class="block mb-1.5 text-[12px] sm:text-[13px] text-gray-500 dark:text-neutral-400">
        Tests: <span class="font-medium" :class="rcTestStatusColor(completionPct)" x-text="rcTestStatusLabel(completionPct)"></span>
      </span>

      <p class="text-[12px] sm:text-[13px]/4">
        <span class="font-semibold text-gray-800 dark:text-neutral-200" x-text="totalTests"></span> 
        <span class="text-gray-500 dark:text-neutral-400">out of</span>
        <span class="font-semibold text-gray-800 dark:text-neutral-200" x-text="totalAssessments"></span>
        <span class="text-gray-500 dark:text-neutral-400">completed</span>
      </p>

      <div class="mt-2 flex items-center gap-1">
        <template x-for="(seg, i) in rcSegments(completionPct)" :key="i">
          <span class="shrink-0 w-4 h-1 sm:w-5 inline-block rounded-full"
            :class="seg.filled ? rcBgClass(completionPct) : 'bg-gray-100 dark:bg-neutral-700'">
          </span>
        </template>
      </div>
    </div>

    <div>
      <span class="block mb-1.5 text-[12px] sm:text-[13px] text-gray-500 dark:text-neutral-400">
        Total Sections: <span class="font-medium text-gray-800 dark:text-neutral-300" x-text="(report.sections || []).length"></span>
      </span>

      <div class="mt-2 flex flex-col gap-y-1">
        <template x-for="section in (report.sections || []).slice(0, 2)" :key="section.id">
          <div class="flex items-center justify-between gap-x-2 text-[12px] sm:text-[13px]">
            <span class="text-gray-600 dark:text-neutral-400 truncate" x-text="section.title"></span>
            <span class="font-medium text-gray-800 dark:text-neutral-200 shrink-0" x-text="rcSectionPercent(section).toFixed(0) + '%'"></span>
          </div>
        </template>

        <template x-if="(report.sections || []).length > 2">
          <div class="relative group inline-block mt-0.5">
            <span class="text-[11px] sm:text-xs font-medium text-gray-600 dark:text-neutral-400 cursor-help border-b border-dashed border-gray-400/50 hover:text-gray-800 dark:hover:text-neutral-200 hover:border-gray-600 dark:hover:border-neutral-400 transition-colors" x-text="'+ ' + ((report.sections || []).length - 2) + ' more'"></span>
            
            <div class="absolute bottom-full left-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-[99] pointer-events-none">
              <div class="py-2 px-3 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max max-w-[250px] dark:bg-neutral-700 dark:border dark:border-neutral-600 flex flex-col gap-y-1.5">
                <template x-for="section in (report.sections || []).slice(2)" :key="section.id">
                  <div class="flex items-center justify-between gap-x-4">
                    <span class="truncate text-gray-300 dark:text-neutral-300" x-text="section.title"></span>
                    <span class="font-medium text-white" x-text="rcSectionPercent(section).toFixed(0) + '%'"></span>
                  </div>
                </template>
              </div>
              <div class="absolute -bottom-1 left-4 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-b dark:border-r dark:border-neutral-600"></div>
            </div>
          </div>
        </template>
        
        <template x-if="(report.sections || []).length === 0">
          <span class="text-[11px] sm:text-xs text-gray-400 dark:text-neutral-500 italic">No section data.</span>
        </template>
      </div>
    </div>

    <div class="md:text-right">
      <span class="block mb-1.5 text-[12px] sm:text-[13px] text-gray-500 dark:text-neutral-400 truncate">
        Teacher remarks
      </span>

    <!-- Teacher Remarks (With Tooltip) -->
      <template x-if="report.report.remarks">
        <div class="relative group inline-block mt-1 cursor-help text-left md:text-right">
          <p class="text-[12px] sm:text-[13px]/snug text-gray-600 dark:text-neutral-400 line-clamp-2">
            <span x-text="report.report.remarks"></span>
          </p>
          
          <div class="absolute bottom-full left-0 md:left-auto md:right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-[99] pointer-events-none">
            <div class="py-1.5 px-2.5 bg-gray-900 text-[11px] sm:text-xs text-white rounded-lg shadow-sm w-max max-w-[250px] whitespace-normal text-left dark:bg-neutral-700 dark:border dark:border-neutral-600" x-text="report.report.remarks"></div>
            <div class="absolute -bottom-1 left-4 md:left-auto md:right-4 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-b dark:border-r dark:border-neutral-600"></div>
          </div>
        </div>
      </template>
      
      <template x-if="!report.report.remarks ">
        <p class="text-[12px] sm:text-[13px]/snug text-gray-400 dark:text-neutral-500 mt-1 italic text-left md:text-right">
          No remarks provided.
        </p>
      </template>
    </div>

  </div>

</div>
