<!-- Report Card Component Container -->
<div class="p-5 min-h-[250px] h-auto flex flex-col justify-between bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700"
  x-data="{
    get overallPct()  { return rcOverallPercent(report); },
    get trend()       { return rcTrend(this.overallPct); }
  }">

  <div class="flex justify-between items-start shrink-0 gap-4">
    <div class="grow min-w-0">
      <div class="mb-1 flex items-center gap-x-1.5">
        <svg class="shrink-0 size-4 text-primary-600 dark:text-primary-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
          <path d="M22 10v6"/>
          <path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
        </svg>
        <span class="block text-[13px] text-gray-500 dark:text-neutral-400 truncate">
          Course: <span x-text="report.report.course || 'N/A'"></span>
          &middot; By: <span x-text="report.report.staff_name || 'N/A'"></span>
        </span>
      </div>
      <span class="block font-medium text-gray-800 dark:text-neutral-200 truncate" x-text="report.report.title"></span>
      <p class="text-[13px] text-gray-500 dark:text-neutral-400 mt-0.5 truncate" x-text="report.report.description"></p>
    </div>

    <!-- Dropdown Actions Menu -->
    <div class="shrink-0">
      <div class="hs-dropdown [--placement:bottom-right] relative inline-flex">
        <button :id="'hs-rc-menu-' + report.id" type="button" class="size-8 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
          <span class="sr-only">Actions</span>
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="19" cy="12" r="1"></circle>
            <circle cx="5" cy="12" r="1"></circle>
          </svg>
        </button>
        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 z-[99] transition-[opacity,margin] duration opacity-0 bg-white border border-gray-200 rounded-xl shadow-lg hidden dark:bg-neutral-800 dark:border-neutral-700 dark:shadow-neutral-900/50" role="menu" aria-orientation="vertical" :aria-labelledby="'hs-rc-menu-' + report.id" tabindex="-1">
          <div class="p-1 space-y-0.5">
            <a class="relative group py-2 px-3 flex items-center gap-x-2.5 text-[13px] text-gray-800 hover:bg-gray-100 rounded-lg focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" :href="report.has_detail ? './detail/?id=' + report.id : '#'">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              View full report card
            </a>
            <a class="relative group py-2 px-3 flex items-center gap-x-2.5 text-[13px] text-gray-800 hover:bg-gray-100 rounded-lg focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" href="#">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" x2="12" y1="15" y2="3"/>
              </svg>
              Download PDF
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Card Body: Scoring, Trends, and Section Performance -->
  <div class="flex-1 py-4 lg:py-2 my-2 lg:my-0">
    <div class="flex items-start lg:items-center h-full">
      <div class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 lg:gap-4 pr-1 lg:pr-2">
        
        <template x-for="section in (report.sections || [])" :key="section.id">
          <div x-data="{ pct: rcSectionPercent(section) }">
            
            <span class="block mb-1 text-[13px] text-gray-800 dark:text-neutral-200 uppercase tracking-wide truncate" x-text="section.title"></span>
            <p class="text-[13px]/4 mt-1 text-gray-500 dark:text-neutral-400 truncate">
              <span class="font-semibold" :class="rcTextClass(pct)" x-text="pct.toFixed(0) + '%'"></span>
              <span> score </span>
              <span class="line-clamp-1" :title="rcSectionContext(section)" x-text="rcSectionContext(section)"></span>
            </p>

            <div class="mt-2 flex items-center gap-1">
              <template x-for="(seg, i) in rcSegments(pct)" :key="i">
                <span class="shrink-0 w-5 h-1 inline-block rounded-full"
                  :class="seg.filled ? rcBgClass(pct) : 'bg-gray-100 dark:bg-neutral-700'">
                </span>
              </template>
            </div>
          </div>
        </template>

      </div>
    </div>
  </div>

  <!-- Overall Trend and Score -->
  <div class="flex justify-between items-end shrink-0 gap-4 mt-2">
    <div class="min-w-0">
      <span class="block mb-2 text-[13px] truncate">
        <span class="text-gray-500 dark:text-neutral-400">Insight: </span>
        <span class="font-medium" :class="trend.color" x-text="trend.label"></span>
      </span>

      <div class="flex flex-col gap-0.5">
        <div class="flex items-center gap-x-2">
          <span x-html="rcRadialSvg(overallPct)" class="shrink-0 size-8 block"></span>
          <p class="font-bold text-2xl text-gray-800 dark:text-neutral-200 leading-none" x-text="overallPct.toFixed(0) + '%'"></p>
        </div>
        <span class="flex items-center gap-x-1 mt-1.5 text-[13px] truncate" :class="trend.color">
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>
          </svg>
          <span class="truncate" x-text="rcScoreLabel(overallPct)"></span>
        </span>
      </div>
    </div>

    <!-- Teacher Remarks (With Tooltip) -->
    <div class="shrink-0 flex items-center gap-x-2 pb-1">
      <span class="text-[13px] text-gray-500 dark:text-neutral-400 hidden sm:inline-block">
        Teacher remarks
      </span>

      <template x-if="report.report.remarks">
        <div class="relative group inline-block">
          <div class="inline-flex justify-center items-center size-6 rounded-full bg-green-100 text-green-600 dark:bg-green-500/10 dark:text-green-500 cursor-help transition-colors hover:bg-green-200 dark:hover:bg-green-500/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          </div>
          
          <div class="absolute bottom-full right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-20 pointer-events-none">
            <div class="py-1.5 px-2.5 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max max-w-[200px] sm:max-w-xs whitespace-normal text-left dark:bg-neutral-700 dark:border dark:border-neutral-600" x-text="report.report.remarks"></div>
            <div class="absolute -bottom-1 right-2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-b dark:border-r dark:border-neutral-600"></div>
          </div>
        </div>
      </template>

      <template x-if="!report.report.remarks">
        <div class="relative group inline-block">
          <div class="inline-flex justify-center items-center size-6 rounded-full bg-gray-100 text-gray-500 dark:bg-neutral-700 dark:text-neutral-400 cursor-help transition-colors hover:bg-gray-200 dark:hover:bg-neutral-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5">
              <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
          </div>
          
          <div class="absolute bottom-full right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-20 pointer-events-none">
            <div class="py-1.5 px-2.5 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max whitespace-nowrap text-left dark:bg-neutral-700 dark:border dark:border-neutral-600">
              No remarks given.
            </div>
            <div class="absolute -bottom-1 right-2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-b dark:border-r dark:border-neutral-600"></div>
          </div>
        </div>
      </template>
    </div>

  </div>

</div>
