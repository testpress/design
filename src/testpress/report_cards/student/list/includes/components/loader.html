{% for _ in range(3) %}
<div class="bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 overflow-hidden animate-pulse">
  <div class="flex flex-col md:flex-row md:items-stretch">

    <!-- Left panel skeleton -->
    <div class="p-5 md:w-72 lg:w-80 shrink-0 border-b md:border-b-0 md:border-r border-gray-100 dark:border-neutral-700 space-y-3">
      <div class="h-5 bg-gray-200 rounded-full dark:bg-neutral-700 w-3/4"></div>
      <div class="h-3.5 bg-gray-200 rounded-full dark:bg-neutral-700 w-1/2"></div>
      <div class="h-3 bg-gray-200 rounded-full dark:bg-neutral-700 w-1/3"></div>
      <div class="pt-3 mt-2 border-t border-dashed border-gray-100 dark:border-neutral-700 space-y-2">
        <div class="h-3 bg-gray-200 rounded-full dark:bg-neutral-700 w-full"></div>
        <div class="h-3 bg-gray-200 rounded-full dark:bg-neutral-700 w-2/3"></div>
      </div>
    </div>

    <!-- Middle panel skeleton -->
    <div class="flex-1 p-5 space-y-4">
      <div class="h-3 bg-gray-200 rounded-full dark:bg-neutral-700 w-24"></div>
      <div class="space-y-3">
        {% for _ in range(3) %}
        <div class="space-y-1.5">
          <div class="flex justify-between">
            <div class="h-3.5 bg-gray-200 rounded-full dark:bg-neutral-700 w-28"></div>
            <div class="h-3.5 bg-gray-200 rounded-full dark:bg-neutral-700 w-10"></div>
          </div>
          <div class="h-2 bg-gray-200 rounded-full dark:bg-neutral-700 w-full"></div>
        </div>
        {% endfor %}
      </div>
    </div>

    <!-- Right panel skeleton -->
    <div class="p-5 md:w-44 lg:w-52 shrink-0 border-t md:border-t-0 md:border-l border-gray-100 dark:border-neutral-700 bg-gray-50/50 dark:bg-neutral-800 flex flex-col items-center justify-center gap-4">
      <div class="size-20 rounded-full bg-gray-200 dark:bg-neutral-700"></div>
      <div class="h-3 bg-gray-200 rounded-full dark:bg-neutral-700 w-20"></div>
      <div class="h-8 bg-gray-200 rounded-lg dark:bg-neutral-700 w-28"></div>
    </div>

  </div>
</div>
{% endfor %}
