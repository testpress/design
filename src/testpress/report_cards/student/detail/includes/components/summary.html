<div class="flex flex-col bg-white border border-gray-200 overflow-hidden rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <div class="py-4 px-5 border-b border-gray-200 dark:border-neutral-700">
    <h3 class="font-semibold text-gray-800 dark:text-neutral-200">Performance Summary</h3>
  </div>

  <div class="p-5 space-y-4">
    <div class="bg-emerald-50 border border-emerald-200 dark:bg-emerald-900/20 dark:border-emerald-800 p-4 rounded-lg">
      <p class="text-xs text-emerald-800 dark:text-emerald-300 font-medium uppercase tracking-wide">
        Total Score
      </p>
      <p class="text-3xl font-bold text-emerald-900 dark:text-emerald-100 mt-1" x-text="reportData.summary?.total_score || 'N/A'"></p>
    </div>

    <div class="space-y-3">
      <template x-for="(value, label) in filteredSummary" :key="label">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-600 dark:text-neutral-400 capitalize" x-text="formatSummaryKey(label)"></span>
          <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="value"></span>
        </div>
      </template>
    </div>

    <div class="border-t border-gray-200 pt-4 space-y-3 dark:border-neutral-700">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-600 dark:text-neutral-400">Total Assessments</span>
        <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.summary?.total_assessments || '0'"></span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-600 dark:text-neutral-400">Last Updated</span>
        <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.summary?.last_updated || 'N/A'"></span>
      </div>
    </div>
  </div>
</div>
