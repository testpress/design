<!-- Performance Summary Card -->
<div class="bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Card Header -->
  <div class="py-3.5 px-5 border-b border-gray-200 dark:border-neutral-700">
    <h3 class="text-sm font-semibold text-gray-800 dark:text-neutral-200">Report Card Summary</h3>
  </div>

  <div class="p-5">
    <!-- Total Score -->
    <div class="text-center pb-5 mb-5 border-b border-gray-100 dark:border-neutral-700/50">
      <p class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Total Score</p>
      <p class="text-4xl font-bold text-gray-900 dark:text-neutral-100" x-text="reportData.summary?.total_score || 'N/A'"></p>
    </div>

    <!-- Summary Rows -->
    <div class="space-y-3.5 mb-5">
      <template x-for="(value, label) in filteredSummary" :key="label">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-500 dark:text-neutral-400" x-text="formatSummaryKey(label)"></span>
          <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="value"></span>
        </div>
      </template>
    </div>

    <!-- Footer Stats: Total Assessments and Last Updated -->
    <div class="pt-4 border-t border-gray-100 dark:border-neutral-700/50 space-y-3">
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-500 dark:text-neutral-400">Total Assessments</span>
        <span class="text-sm font-medium text-gray-800 dark:text-neutral-200 bg-gray-100 dark:bg-neutral-700 px-2 py-0.5 rounded" x-text="reportData.summary?.total_assessments || '0'"></span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-500 dark:text-neutral-400">Last Updated</span>
        <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.summary?.last_updated || 'N/A'"></span>
      </div>
    </div>
  </div>
</div>
