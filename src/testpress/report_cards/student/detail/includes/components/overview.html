<!-- Overview Card -->
<div class="bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-800 dark:border-neutral-700 p-5 sm:p-6">
  <!-- Course Meta -->
  <div class="flex items-center gap-x-2 text-sm text-emerald-600 dark:text-emerald-400 font-medium mb-3">
    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
    <span x-text="reportData.report.course"></span>
  </div>
  
  <!-- Description -->
  <p class="text-sm text-gray-600 dark:text-neutral-400 leading-relaxed max-w-3xl" x-text="reportData.report.description"></p>

  <hr class="my-5 border-gray-200 dark:border-neutral-700">

  <!-- Report Metadata: Student, Staff, Institute, Date -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-5">
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Student</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.student_name"></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Evaluated By</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.staff_name"></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Institute</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.institute"></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Created On</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.created_at || reportData.summary.last_updated"></p>
    </div>
  </div>
</div>
