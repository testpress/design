<div class="space-y-6">
  <template x-for="(section, index) in reportData.sections" :key="section.id">
    
    <div x-data="{ expanded: true }" class="bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700 overflow-hidden">
      
      <button @click="expanded = !expanded" class="w-full flex items-center justify-between py-4 px-5 bg-white hover:bg-gray-50 focus:outline-none dark:bg-neutral-800 dark:hover:bg-neutral-700/50 transition-colors border-b border-gray-200 dark:border-neutral-700">
        <div class="flex items-center gap-x-3">
          <h2 class="text-base font-semibold text-gray-800 dark:text-neutral-200" x-text="section.title"></h2>
          <span class="hidden sm:inline-flex items-center py-0.5 px-2 rounded-md text-[11px] font-medium bg-gray-100 text-gray-600 dark:bg-neutral-700 dark:text-neutral-300 capitalize" x-text="section.type.replace('_', ' ')"></span>
        </div>
        
        <div class="flex items-center gap-x-3">
          <span x-show="!expanded" x-transition.opacity class="text-xs text-gray-500 dark:text-neutral-400" x-text="section.groups.length + ' Groups'"></span>
          
          <svg class="shrink-0 size-4 text-gray-500 transition-transform duration-300 dark:text-neutral-400" 
               :class="expanded ? '-rotate-180' : ''" 
               xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"/>
          </svg>
        </div>
      </button>

      <div x-show="expanded" x-collapse>
        <div class="p-5 sm:p-6">
          <template x-for="(group, gIndex) in section.groups" :key="group.title">
            
            <div class="mb-8 last:mb-0">
              
              <div class="mb-4">
                <h3 class="text-sm font-semibold text-gray-800 dark:text-neutral-200" x-text="group.title"></h3>
                
                <div class="flex flex-wrap items-center gap-x-2.5 mt-1.5 text-sm text-gray-500 dark:text-neutral-400">
                  <span>Avg: <span class="font-medium text-gray-800 dark:text-neutral-200" x-text="group.average_score || '--'"></span></span>
                  <span class="text-gray-300 dark:text-neutral-600">&bull;</span>
                  <span>Total: <span class="font-medium text-gray-800 dark:text-neutral-200" x-text="group.total_score || '--'"></span></span>
                  <span class="text-gray-300 dark:text-neutral-600">&bull;</span>
                  <span>Attempts: <span class="font-medium text-gray-800 dark:text-neutral-200" x-text="group.attempt_count || group.items.length"></span></span>
                  
                  <template x-if="group.average_percentage">
                    <div class="flex items-center gap-x-2.5 ml-1">
                      <span class="text-gray-300 dark:text-neutral-600">&bull;</span>
                      <span class="font-medium text-emerald-600 dark:text-emerald-500" x-text="group.average_percentage"></span>
                    </div>
                  </template>
                </div>
              </div>

              <template x-if="group.items && group.items.length > 0">
                <div class="border border-gray-200 dark:border-neutral-700 rounded-lg overflow-hidden">
                  <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
                    <thead class="bg-gray-50 dark:bg-neutral-800/50">
                      <tr>
                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400">Item Details</th>
                        <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-32 hidden sm:table-cell">Date</th>
                        
                        <template x-if="section.type === 'scholastic'">
                          <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-24">Score</th>
                        </template>
                        <template x-if="section.type === 'scholastic'">
                          <th scope="col" class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-20">Grade</th>
                        </template>

                        <template x-if="section.type === 'co_scholastic'">
                          <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-24">Grade</th>
                        </template>

                        <template x-if="section.type === 'attendance'">
                          <th scope="col" class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-24">Classes</th>
                        </template>
                        <template x-if="section.type === 'attendance'">
                          <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-24">Att. %</th>
                        </template>

                        <template x-if="section.type !== 'scholastic'">
                          <th scope="col" class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-neutral-400 w-16">Remarks</th>
                        </template>
                      </tr>
                    </thead>
                    
                    <tbody class="divide-y divide-gray-200 dark:divide-neutral-700 bg-white dark:bg-neutral-800">
                      <template x-for="item in group.items" :key="item.name">
                        <tr class="hover:bg-gray-50 dark:hover:bg-neutral-800/80 transition-colors">
                          <td class="px-4 py-3">
                            <span class="block text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.name"></span>
                            <span class="block text-xs text-gray-500 sm:hidden mt-0.5" x-text="item.date || '--'"></span>
                          </td>
                          <td class="px-4 py-3 text-sm text-gray-500 dark:text-neutral-400 hidden sm:table-cell" x-text="item.date || '--'"></td>
                          
                          <template x-if="section.type === 'scholastic'">
                            <td class="px-4 py-3 text-right whitespace-nowrap">
                              <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.score"></span>
                              <span class="text-xs text-gray-400 dark:text-neutral-500" x-text="'/ ' + item.max"></span>
                              <span class="block text-xs text-gray-500 dark:text-neutral-400 mt-0.5" x-text="item.percentage"></span>
                            </td>
                          </template>
                          <template x-if="section.type === 'scholastic'">
                            <td class="px-4 py-3 text-center">
                              <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.grade || '--'"></span>
                            </td>
                          </template>

                          <template x-if="section.type === 'co_scholastic'">
                            <td class="px-4 py-3 text-right">
                              <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.grade || '--'"></span>
                            </td>
                          </template>

                          <template x-if="section.type === 'attendance'">
                            <td class="px-4 py-3 text-center whitespace-nowrap">
                              <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.attended_classes"></span>
                              <span class="text-xs text-gray-400 dark:text-neutral-500" x-text="'/ ' + item.total_classes"></span>
                            </td>
                          </template>
                          <template x-if="section.type === 'attendance'">
                            <td class="px-4 py-3 text-right">
                              <span class="text-sm font-medium" :class="parseFloat(item.attendance_percentage) >= 75 ? 'text-emerald-600 dark:text-emerald-500' : 'text-red-600 dark:text-red-500'" x-text="item.attendance_percentage || '--'"></span>
                            </td>
                          </template>

                          <template x-if="section.type !== 'scholastic'">
                            <td class="px-4 py-3 text-center">
                              <template x-if="item.teacher_remarks">
                                <div class="relative group inline-block cursor-help">
                                  <svg class="shrink-0 size-4 text-blue-500 hover:text-blue-600 dark:text-blue-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                                  <div class="absolute bottom-full right-0 mb-2 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-200 z-[99] pointer-events-none">
                                    <div class="py-1.5 px-2.5 bg-gray-900 text-xs text-white rounded-lg shadow-sm w-max max-w-[200px] whitespace-normal text-left dark:bg-neutral-700 dark:border dark:border-neutral-600" x-text="item.teacher_remarks"></div>
                                    <div class="absolute -bottom-1 right-2 w-2 h-2 bg-gray-900 rotate-45 dark:bg-neutral-700 dark:border-b dark:border-r dark:border-neutral-600"></div>
                                  </div>
                                </div>
                              </template>
                              <template x-if="!item.teacher_remarks">
                                <span class="text-gray-300 dark:text-neutral-600">-</span>
                              </template>
                            </td>
                          </template>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
              </template>

              <template x-if="!group.items || group.items.length === 0">
                <div class="text-center py-6 bg-gray-50 rounded-lg border border-dashed border-gray-200 dark:bg-neutral-800/50 dark:border-neutral-700">
                  <p class="text-sm text-gray-500 dark:text-neutral-400">No individual items recorded for this group.</p>
                </div>
              </template>

            </div>
          </template>
        </div>
      </div>

    </div>
  </template>
</div>
