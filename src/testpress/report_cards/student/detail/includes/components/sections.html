<div class="space-y-6">
  <template x-for="section in reportData.sections" :key="section.id">
    <div class="flex flex-col bg-white border border-gray-200 overflow-hidden rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
      
      <div class="py-4 px-5 bg-gray-50 border-b border-gray-200 dark:bg-neutral-800/50 dark:border-neutral-700">
        <h2 class="text-sm font-bold text-gray-800 dark:text-neutral-200 uppercase tracking-wide" x-text="section.title"></h2>
      </div>

      <div class="p-5 space-y-8">
        <template x-for="group in section.groups" :key="group.title">
          <div class="space-y-3">
            
            <div class="flex items-center justify-between border-b pb-2 border-gray-200 dark:border-neutral-700">
              <h3 class="text-base font-semibold text-gray-800 dark:text-neutral-200" x-text="group.title"></h3>
              <div class="text-sm">
                <span class="text-gray-500 dark:text-neutral-400">Avg Score:</span>
                <span class="font-medium text-gray-800 dark:text-neutral-200 ml-1" x-text="group.average_score || 'N/A'"></span>
                <template x-if="group.average_percentage">
                  <span class="font-medium text-emerald-600 dark:text-emerald-500 ml-1" x-text="'(' + group.average_percentage + ')'"></span>
                </template>
              </div>
            </div>

            <template x-if="group.items && group.items.length > 0">
              <div class="flex flex-col">
                <div class="-m-1.5 overflow-x-auto">
                  <div class="p-1.5 min-w-full inline-block align-middle">
                    <div class="border rounded-lg overflow-hidden dark:border-neutral-700">
                      <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
                        <thead class="bg-gray-50 dark:bg-neutral-800/50">
                          <tr>
                            <th scope="col" class="px-4 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Assessment Name</th>
                            <th scope="col" class="px-4 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400 w-24">Date</th>
                            <th scope="col" class="px-4 py-3 text-end text-xs font-medium text-gray-500 uppercase dark:text-neutral-400 w-20">Score</th>
                            <th scope="col" class="px-4 py-3 text-end text-xs font-medium text-gray-500 uppercase dark:text-neutral-400 w-20">Max</th>
                            <th scope="col" class="px-4 py-3 text-end text-xs font-medium text-gray-500 uppercase dark:text-neutral-400 w-20">%</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
                          <template x-for="item in group.items" :key="item.name">
                            <tr>
                              <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="item.name"></td>
                              <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400" x-text="item.date || '--'"></td>
                              <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200 text-end" x-text="item.score"></td>
                              <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 text-end" x-text="item.max"></td>
                              <td class="px-4 py-3 whitespace-nowrap text-sm font-medium text-emerald-600 dark:text-emerald-500 text-end" x-text="item.percentage"></td>
                            </tr>
                          </template>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </template>

            <template x-if="!group.items || group.items.length === 0">
              <div class="text-center py-4 bg-gray-50 rounded-lg border border-dashed border-gray-200 dark:bg-neutral-800/40 dark:border-neutral-700">
                <p class="text-sm text-gray-500 dark:text-neutral-400">No assessments recorded for this group.</p>
              </div>
            </template>

          </div>
        </template>
      </div>

    </div>
  </template>
</div>
