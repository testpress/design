<script>
  function reportDetail() {
    const allReports = {{ student_report_card | dump | safe }};
    
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id');

    let reportData = reportId ? allReports.find(r => String(r.id) === String(reportId)) : null;
    if (!reportData) {
      reportData = allReports.find(r => r.has_detail) || allReports[0];
    }

    return {
      reportData: reportData,

      get filteredSummary() {
        const summary = this.reportData.summary || {};
        const excludedKeys = ['total_score', 'total_assessments', 'last_updated'];
        
        return Object.keys(summary)
          .filter(key => !excludedKeys.includes(key))
          .reduce((obj, key) => {
            obj[key] = summary[key];
            return obj;
          }, {});
      },

      formatSummaryKey(key) {
        return key
          .replace(/_avg$/, ' Average') 
          .split('_')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
      },
      
      getSectionAvg(section) {
        const groups = section.groups || [];
        if (groups.length === 0) return 0;
        
        const parsePct = (val) => {
          if (!val) return 0;
          const s = String(val).replace('%', '').trim();
          const n = parseFloat(s);
          return isNaN(n) ? 0 : n;
        };

        let total = 0;
        groups.forEach(g => {
          if (g.average_percentage) {
            total += parsePct(g.average_percentage);
          } else {
            const score = parseFloat(g.average_score) || 0;
            const max = parseFloat((g.items && g.items[0]) ? g.items[0].max : 0) || 100;
            total += Math.min((score / max) * 100, 100);
          }
        });
        return (total / groups.length).toFixed(0);
      }
    };
  }
</script>
