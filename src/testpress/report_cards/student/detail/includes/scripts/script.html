<script>
  function reportDetail() {
    const allReports = {{ student_report_card | dump | safe }};    
    const urlParams = new URLSearchParams(window.location.search);
    const reportId = urlParams.get('id');

    let reportData;
    
    if (reportId) {
      reportData = allReports.find(r => String(r.id) === String(reportId));
    }
    
    if (!reportData) {
      reportData = allReports.find(r => r.has_detail) || allReports[0];
    }

    return {
      reportData: reportData,

      get filteredSummary() {
        const summary = this.reportData.summary || {};
        const excludedKeys = ['total_score', 'total_assessments', 'last_updated'];
        
        return Object.keys(summary)
          .filter(key => !excludedKeys.includes(key))
          .reduce((obj, key) => {
            obj[key] = summary[key];
            return obj;
          }, {});
      },

      formatSummaryKey(key) {
        return key
          .split('_')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(' ');
      }
    };
  }
</script>
