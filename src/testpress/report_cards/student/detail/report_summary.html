<div class="bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Card Header -->
  <div class="py-3.5 px-5 border-b border-gray-200 dark:border-neutral-700">
    <h3 class="text-sm font-medium text-gray-800 dark:text-neutral-200">Report Card Summary</h3>
  </div>

  <div class="p-5">
    <!-- Total Score -->
    <div class="text-center pb-5 mb-5 border-b border-gray-100 dark:border-neutral-700/50">
      <p class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Total Score</p>
      <p class="text-4xl font-medium text-gray-900 dark:text-neutral-100">
        {{ student_report_card[0].total_score }}
      </p>
      <p class="text-xs font-medium text-gray-400 dark:text-neutral-500 mt-1">400-1600</p>
    </div>

    <!-- Summary Rows -->
    <div class="space-y-4">
      <div class="flex items-center justify-between border-b border-gray-100 dark:border-neutral-700/50 pb-4">
        <div>
          <span class="block text-sm font-medium text-gray-800 dark:text-neutral-200">Reading and Writing</span>
          <span class="text-[11px] font-medium text-gray-400 dark:text-neutral-500">200-800</span>
        </div>
        <span class="text-xl font-medium text-gray-900 dark:text-neutral-100">{{ student_report_card[0].metrics.english_avg }}</span>
      </div>
      <div class="flex items-center justify-between">
        <div>
          <span class="block text-sm font-medium text-gray-800 dark:text-neutral-200">Math</span>
          <span class="text-[11px] font-medium text-gray-400 dark:text-neutral-500">200-800</span>
        </div>
        <span class="text-xl font-medium text-gray-900 dark:text-neutral-100">{{ student_report_card[0].metrics.math_avg }}</span>
      </div>
    </div>
  </div>
</div>
