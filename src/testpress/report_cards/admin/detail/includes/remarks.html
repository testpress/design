<!-- Teacher Remarks Card -->
<div x-cloak x-show="reportData.report.remarks">
  <div class="bg-gray-50 border-l-4 border-emerald-500 rounded-l-lg p-4 dark:bg-neutral-800 dark:border-emerald-500">
    <!-- Header: Icon and Title -->
    <div class="flex justify-between">
    <div class="flex items-center gap-x-2 mb-2">
      <svg class="size-4.5 text-gray-400 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3 class="text-sm font-medium text-gray-800 dark:text-neutral-200">Teacher Remarks</h3>
    </div>
    <svg 
      data-hs-overlay="#teacher-remark-modal"
      class="size-4 text-gray-800 dark:text-neutral-200 cursor-pointer"
      xmlns="http://www.w3.org/2000/svg" 
      width="24" height="24" 
      viewBox="0 0 24 24" 
      fill="none" 
      stroke="currentColor" 
      stroke-width="2" 
      stroke-linecap="round" 
      stroke-linejoin="round"
  >
    <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/>
  </svg>
    </div>
    <!-- Remarks Text -->
    <p class="text-sm text-gray-600 dark:text-neutral-300 leading-relaxed max-h-64 overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500" 
      x-text="reportData.report.remarks">
    </p>
  </div>
</div>

<div x-show="!reportData.report.remarks">
  <div data-hs-overlay="#teacher-remark-modal"
    class="group bg-gray-50 dark:bg-neutral-800
           border-2 border-dashed border-gray-400 dark:border-neutral-600
           rounded-lg p-6 text-center flex flex-col justify-center items-center space-y-6
           hover:border-gray-500 dark:hover:border-neutral-500
           focus:border-gray-500 dark:focus:border-neutral-500
           transition-colors">
    
    <svg class="size-14 text-gray-400 dark:text-neutral-400 group-hover:text-gray-500 dark:group-hover:text-neutral-300 transition-colors" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="currentColor"/>
      <line x1="8" y1="12" x2="16" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="8" x2="12" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <span class="text-sm font-medium text-gray-400 dark:text-neutral-200 group-hover:text-gray-500 dark:group-hover:text-neutral-300 transition-colors">
      Add Teacher Remark
    </span>
  </div>
</div>
