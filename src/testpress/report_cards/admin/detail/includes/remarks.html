<!-- Teacher Remarks Card -->
<div x-cloak x-show="reportData.report.remarks">
  <div class="bg-gray-50 border-l-4 border-emerald-500 rounded-l-lg p-4 dark:bg-neutral-800 dark:border-emerald-500">
    <!-- Header: Icon and Title -->
    <div class="flex justify-between">
    <div class="flex items-center gap-x-2 mb-2">
      <svg class="size-4.5 text-gray-400 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3 class="text-sm font-medium text-gray-800 dark:text-neutral-200">Teacher Remarks</h3>
    </div>
    <svg 
      data-hs-overlay="#teacher-remark-modal"
      class="size-4 text-gray-800 dark:text-neutral-200 cursor-pointer"
      xmlns="http://www.w3.org/2000/svg" 
      width="24" height="24" 
      viewBox="0 0 24 24" 
      fill="none" 
      stroke="currentColor" 
      stroke-width="2" 
      stroke-linecap="round" 
      stroke-linejoin="round"
  >
    <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/>
  </svg>
    </div>
    <!-- Remarks Text -->
    <p class="text-sm text-gray-600 dark:text-neutral-300 leading-relaxed max-h-64 overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500" 
      x-text="reportData.report.remarks">
    </p>
  </div>
</div>

<div x-show="!reportData.report.remarks">
  <div class="cursor-pointer p-6 flex justify-center bg-white shadow-sm dark:bg-neutral-800
              border border-dashed border-gray-400 dark:border-neutral-600
              rounded-xl
              transition-colors group">

    <div class="text-center">
      
      <span class="inline-flex justify-center items-center size-16">
        <svg class="w-16 h-16 text-gray-400"
            viewBox="0 0 64 48"
            fill="none"
            xmlns="http://www.w3.org/2000/svg">

        <rect x="10" y="6" width="44" height="32" rx="6"
              stroke="currentColor" stroke-width="2"/>

        <line x1="18" y1="16" x2="46" y2="16"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="22" x2="38" y2="22"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

        <circle cx="48" cy="34" r="8"
                fill="currentColor"/>

        <line x1="48" y1="30" x2="48" y2="38"
              stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="44" y1="34" x2="52" y2="34"
              stroke="white" stroke-width="2" stroke-linecap="round"/>

      </svg>
    </span>

    <div class="max-w-sm mx-auto">
        <p class="mt-2 font-medium text-gray-600">
          No remarks
        </p>
        <p class="mb-5 text-sm text-gray-400">
          Add feedback to highlight performance and guide student progress.
        </p>
      </div>
      <button type="button" 
        data-hs-overlay="#teacher-remark-modal"
        class="py-2 px-3 inline-flex items-center gap-x-2 text-xs font-medium rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden">
        Add Remark
      </button>

    </div>
  </div>
</div>
