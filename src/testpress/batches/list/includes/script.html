<!-- Alpine.js Popover Helper (HS CSS styling) -->
<script>
  // Alpine component to manage a table popover.
  // Usage: add x-data="tablePopover()" and x-ref="trigger" to a container, then use @click="toggle($el)"
  // Add x-ref="popover" inside the teleported popover element.
  function tablePopover(initialTags) {
    return {
      open: false,
      top: 0,
      left: 0,
      triggerEl: null,
      popoverId: null,
      search: '',
      tags: initialTags || [],
      options: ['Premium', 'UPSC 2024', 'Priority', 'Pro', 'Weekend', 'Sci & Tech', 'Crash Course', 'Monthly', 'Current Affairs'],
      activeFilters: [],
      shouldShowRow() {
        if (this.activeFilters.length === 0) return true;
        return this.activeFilters.some(f => this.tags.includes(f));
      },
      toggle(triggerEl, popoverId) {
        this.open = !this.open;
        console.log('[tablePopover] toggle called. New open state:', this.open, 'popoverId:', popoverId);
        if (this.open) {
          this.triggerEl = triggerEl;
          this.popoverId = popoverId;
          this.reposition();
        } else {
          this.triggerEl = null;
          this.popoverId = null;
        }
      },
      reposition() {
        if (!this.open || !this.triggerEl || !this.popoverId) return;
        
        // Wait for DOM update to ensure element is rendered
        this.$nextTick(() => {
          const pop = document.getElementById(this.popoverId);
          if (!pop) return;
          
          const triggerRect = this.triggerEl.getBoundingClientRect();
          const popRect = pop.getBoundingClientRect();
          const spaceBelow = window.innerHeight - triggerRect.bottom;
          
          // Position above or below based on space (using fixed viewport coordinates)
          if (spaceBelow >= popRect.height + 10) {
            this.top = triggerRect.bottom + 4;
          } else {
            this.top = triggerRect.top - popRect.height - 4;
          }
          
          // Align left edge of popover with trigger
          this.left = triggerRect.left;
        });
      },
      filteredOptions() {
        const query = this.search.toLowerCase().trim();
        return this.options.filter(opt => 
          opt.toLowerCase().includes(query) && !this.tags.includes(opt)
        );
      },
      toggleSelect(tag) {
        if (this.tags.includes(tag)) {
          this.tags = this.tags.filter(t => t !== tag);
        } else {
          this.tags.push(tag);
        }
        this.reposition();
      },
      removeTag(tag) {
        this.tags = this.tags.filter(t => t !== tag);
        this.reposition();
      },
      createNewTag(name) {
        const cleanName = name.trim();
        if (cleanName && !this.tags.includes(cleanName)) {
          this.tags.push(cleanName);
          if (!this.options.includes(cleanName)) {
            this.options.push(cleanName);
          }
        }
        this.search = '';
        this.reposition();
      }
    };
  }

  function tagFilterDropdown() {
    return {
      allTags: [
        'Premium',
        'UPSC 2024',
        'Priority',
        'Pro',
        'Weekend',
        'Sci & Tech',
        'Crash Course',
        'Monthly',
        'Current Affairs'
      ],
      searchQuery: '',
      stagedTags: [],
      appliedTags: [],
      activeTagFilterCount: 0,

      get filteredTags() {
        const query = this.searchQuery.toLowerCase().trim();
        return this.allTags.filter(tag => 
          tag.toLowerCase().includes(query) && !this.stagedTags.includes(tag)
        );
      },
      toggleStagedTag(tag) {
        if (this.stagedTags.includes(tag)) {
          this.stagedTags = this.stagedTags.filter(t => t !== tag);
        } else {
          this.stagedTags.push(tag);
        }
      },
      clearAll() {
        this.stagedTags = [];
        this.appliedTags = [];
        this.activeTagFilterCount = 0;
        window.dispatchEvent(new CustomEvent('filter-tags', { detail: { tags: [] } }));
      },
      applyFilter() {
        this.appliedTags = [...this.stagedTags];
        this.activeTagFilterCount = this.appliedTags.length;
        window.dispatchEvent(new CustomEvent('filter-tags', { detail: { tags: this.appliedTags } }));
      },
      init() {
        this.$el.addEventListener('close.hs.dropdown', () => {
          this.stagedTags = [...this.appliedTags];
          this.searchQuery = '';
        });
      }
    };
  }
</script>
