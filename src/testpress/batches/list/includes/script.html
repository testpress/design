<!-- Alpine.js Popover Helper (HS CSS styling) -->
<script>
  // Alpine component to manage a table popover.
  // Usage: add x-data="tablePopover()" and x-ref="trigger" to a container, then use @click="toggle($el)"
  // Add x-ref="popover" inside the teleported popover element.
  function tablePopover() {
    return {
      open: false,
      top: 0,
      left: 0,
      toggle(triggerEl, popoverId) {
        this.open = !this.open;
        console.log('[tablePopover] toggle called. New open state:', this.open, 'popoverId:', popoverId);
        if (this.open) {
          // Wait for DOM update then compute placement coordinates
          this.$nextTick(() => {
            const pop = document.getElementById(popoverId);
            console.log('[tablePopover] popover element reference:', pop);
            console.log('[tablePopover] trigger element reference:', triggerEl);
            if (!pop || !triggerEl) {
              console.warn('[tablePopover] Popover element or Trigger element is missing!');
              return;
            }
            
            const triggerRect = triggerEl.getBoundingClientRect();
            const popRect = pop.getBoundingClientRect();
            const spaceBelow = window.innerHeight - triggerRect.bottom;
            
            console.log('[tablePopover] Trigger Rect:', triggerRect);
            console.log('[tablePopover] Popover Rect:', popRect);
            console.log('[tablePopover] Space below trigger:', spaceBelow);
            
            // Position above or below based on space (using fixed viewport coordinates)
            if (spaceBelow >= popRect.height + 10) {
              this.top = triggerRect.bottom + 4;
              console.log('[tablePopover] Positioning: BOTTOM at top =', this.top);
            } else {
              this.top = triggerRect.top - popRect.height - 4;
              console.log('[tablePopover] Positioning: TOP at top =', this.top);
            }
            
            // Align left edge of popover with trigger
            this.left = triggerRect.left;
            console.log('[tablePopover] Positioning: left =', this.left);
          });
        }
      }
    };
  }
</script>
