{% for batch in batches_list %}
  <tr class="group" x-data="{ batch: { id: {{ batch.id }}, name: {{ batch.name | dump }} } }">

    <!-- Batch Name -->
    <td class="size-px whitespace-nowrap px-5 py-3 align-top">
      <div class="w-full flex flex-col group">
        <div class="grow flex items-center gap-x-2">
          <a class="text-sm font-medium text-gray-800 hover:text-emerald-600 decoration-2 hover:underline"
            href="{{ '/batches/detail'|url }}">
            {{ batch.name }}
          </a>
        </div>
        
      </div>
    </td>



    <!-- Users -->
    <td class="size-px whitespace-nowrap px-4 py-3 text-start">
      <span class="text-sm text-gray-600">
        {{ batch.members.length }}
      </span>
    </td>

    <!-- Courses -->
    <td class="size-px whitespace-nowrap px-4 py-3 text-start">
      <span class="text-sm text-gray-600">
        {{ batch.assigned_courses.length }}
      </span>
    </td>



    <!-- Actions -->
    {% include "./options_menu.html" %}

  </tr>
{% endfor %}
