<div class="pb-4 grid md:grid-cols-2 gap-y-4 md:gap-y-0 md:gap-x-5 border-b border-gray-200">
  <div>
    <!-- Search Input -->
    <form method="get" class="relative">
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-4 pl-4">
          <i data-lucide="search" class="shrink-0 size-4 text-gray-500"></i>
        </div>
        <input type="text"
          name="q"
          value=""
          class="py-[7px] pl-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none"
          placeholder="Search batches">
        <div class="hidden absolute inset-y-0 end-0 flex items-center pointer-events-none z-20 pe-1">
          <button type="button"
            class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600"
            aria-label="Close">
            <span class="sr-only">Close</span>
            <i data-lucide="x-circle" class="shrink-0 size-4"></i>
          </button>
        </div>
      </div>
    </form>
    <!-- End Search Input -->
  </div>

  <div class="flex justify-end md:justify-end items-center gap-x-2">
    <!-- Filter by tag dropdown -->
    <div class="hs-dropdown [--auto-close:outside] [--placement:bottom-right] relative inline-flex" x-data="tagFilterDropdown()">
      <button id="hs-pro-filter-by-tag" type="button" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-neutral-200 shadow-sm hover:bg-gray-50 dark:hover:bg-neutral-700/50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <i data-lucide="tag" class="shrink-0 size-3.5"></i>
        Filter by tag
        <span x-show="activeTagFilterCount > 0" x-text="activeTagFilterCount" class="font-medium text-[10px] py-0.5 px-2 bg-stone-900 dark:bg-neutral-100 text-white dark:text-neutral-900 leading-3 rounded-full"></span>
      </button>

      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-80 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white border border-gray-200 rounded-xl shadow-md p-4 dark:bg-neutral-900 dark:border-neutral-700" @click.stop aria-labelledby="hs-pro-filter-by-tag">
        <div>
          <!-- Selected Tags (Emerald Badges) -->
          <div x-show="stagedTags.length > 0" class="flex flex-wrap gap-1 mt-1 mb-3">
            <template x-for="tag in stagedTags" :key="tag">
              <span class="inline-flex items-center py-0.5 pl-2 pr-0.5 rounded-full text-xs bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400">
                <span x-text="tag"></span>
                <button @click.stop="toggleStagedTag(tag)" type="button" class="flex-shrink-0 ml-0.5 h-4 w-4 rounded-full inline-flex items-center justify-center text-emerald-400 dark:text-emerald-500 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 hover:text-emerald-600 dark:hover:text-emerald-300 focus:outline-none">
                  <span class="sr-only">Remove option</span>
                  <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
                    <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7"></path>
                  </svg>
                </button>
              </span>
            </template>
          </div>

          <!-- Search Input -->
          <div class="mb-3">
            <input type="text"
                   x-model="searchQuery"
                   placeholder="Search tags..."
                   class="block w-full text-xs sm:text-sm bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-md text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:outline-none focus:ring-1 focus:ring-emerald-600 dark:focus:ring-emerald-500 focus:border-emerald-600 dark:focus:border-emerald-500 py-1.5 px-2">
          </div>

          <!-- Scrollable Option List -->
          <div class="overflow-y-auto max-h-40 mb-3 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
            <template x-for="tag in filteredTags" :key="tag">
              <div @click.stop="toggleStagedTag(tag)" class="py-1.5 px-2 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-md flex items-center justify-between">
                <span x-text="tag"></span>
              </div>
            </template>
            <div x-show="filteredTags.length === 0" class="w-full text-xs text-gray-400 text-center py-4">
              No tags available
            </div>
          </div>

          <!-- Actions -->
          <div class="flex justify-end items-center gap-2 ">
            <button type="button" 
                    @click="clearAll()" 
                    class="hs-dropdown-close py-1.5 px-2.5 inline-flex justify-center items-center text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 dark:bg-neutral-900 dark:border-neutral-800 dark:text-neutral-300 dark:hover:bg-neutral-800">
              Clear All
            </button>
            <button type="button" 
                    @click="applyFilter()" 
                    class="hs-dropdown-close py-1.5 px-2.5 inline-flex justify-center items-center text-xs font-medium rounded-lg bg-emerald-600 border border-emerald-600 text-white shadow-2xs hover:bg-emerald-700 focus:outline-none focus:ring-1 focus:ring-emerald-300 dark:focus:ring-emerald-500">
              Apply Filter
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="hs-dropdown [--auto-close:true] [--placement:bottom-right] relative inline-flex">
      <button id="hs-pro-dptied" type="button"
        class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <i data-lucide="list" class="shrink-0 size-4"></i>
        Action
        <i data-lucide="chevron-down" class="shrink-0 size-4"></i>
      </button>
      <div
        class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-48 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900"
        role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptied"
      >
        <div class="p-1">
          <a href='#'
            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
            data-hs-overlay="#hs-pro-eipm">
            <i data-lucide="receipt" class="shrink-0 size-3.5"></i>              
            Billing Categories
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
