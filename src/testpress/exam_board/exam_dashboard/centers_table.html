                <th scope="col" class="min-w-20">
                  <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                    <button id="hs-centers-sort-battery" type="button" class="whitespace-nowrap px-4 py-3 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                      Battery
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu" aria-labelledby="hs-centers-sort-battery">
                      <div class="p-1">
                        <button type="button" @click="setSort('battery','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort ascending</button>
                        <button type="button" @click="setSort('battery','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort descending</button>
                      </div>
                    </div>
                  </div>
                </th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
              <template x-for="row in sortedRows" :key="row.id">
                <tr>
                  <td class="px-4 py-3 w-[280px] max-w-[280px] overflow-hidden">
                    <div class="min-w-0 overflow-hidden">
                      <div class="flex items-center gap-x-1.5 min-w-0 overflow-hidden">
                        <a :href="row.detailHref || '#'" class="block font-medium text-gray-800 dark:text-neutral-200 truncate whitespace-nowrap min-w-0 overflow-hidden underline-offset-2 hover:underline hover:decoration-2 hover:text-emerald-600 focus:outline-none focus:underline focus:decoration-2 focus:text-emerald-600 dark:hover:text-emerald-500 dark:focus:text-emerald-500" x-text="row.name"></a>
                        <div class="hs-dropdown [--auto-close:inside] [--placement:right] relative inline-flex shrink-0">
                          <button type="button" :id="'hs-center-info-' + row.id" class="text-gray-500 hover:text-gray-700 dark:text-neutral-400 dark:hover:text-neutral-300 focus:outline-none shrink-0" aria-haspopup="menu" aria-expanded="false" aria-label="Center info">
                            <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                          </button>
                          <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-72 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl p-4" role="menu" :aria-labelledby="'hs-center-info-' + row.id">
                            <div class="space-y-3">
                              <div class="flex items-start gap-x-3">
                                <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">State</p>
                                <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.state"></p>
                              </div>
                              <div class="flex items-start gap-x-3">
                                <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Venue</p>
                                <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.venue"></p>
                              </div>
                              <div class="flex items-start gap-x-3">
                                <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Address</p>
                                <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.address"></p>
                              </div>
                              <div class="flex items-start gap-x-3">
                                <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Contact name</p>
                                <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.contactName"></p>
                              </div>
                              <div class="flex items-center gap-x-3">
                                <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Contact number</p>
                                <div class="grow flex items-center gap-x-2">
                                  <p class="text-sm text-gray-800 dark:text-neutral-200"><span :id="'copy-phone-' + row.id" x-text="row.contactPhone"></span></p>
                                  <button type="button" class="js-clipboard [--is-toggle-tooltip:false] hs-tooltip shrink-0 inline-flex p-1 rounded text-gray-500 hover:bg-gray-100 dark:hover:bg-neutral-700" :data-clipboard-target="'#copy-phone-' + row.id" data-clipboard-action="copy" data-clipboard-success-text="Copied" title="Copy number">
                                    <svg class="size-3.5 js-clipboard-default" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                    <svg class="size-3.5 js-clipboard-success hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                    <span class="js-clipboard-success-text sr-only">Copy</span>
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                      <p class="mt-0.5 text-xs text-gray-500 dark:text-neutral-400 truncate whitespace-nowrap overflow-hidden" x-text="(row.sessionCount || 0) + ' sessions · ' + (row.capacity || 0) + ' capacity'"></p>
                    </div>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.allocated"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.registered"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.biometrics"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.photos"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.present"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.submitted"></td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.absent"></td>
                  <td class="px-4 py-3 whitespace-nowrap">
                    <div class="flex items-center gap-x-1.5">
                      <svg x-show="row.online" class="size-4 text-emerald-500 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 20 0"/><circle cx="12" cy="20" r="1"/></svg>
                      <svg x-show="!row.online" class="size-4 text-red-500 dark:text-red-400 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><path d="M19 12.859a10 10 0 0 0-2.007-1.523"/><path d="M2 8.82a15 15 0 0 1 4.177-2.643"/><path d="M22 8.82a15 15 0 0 0-11.288-3.764"/><path d="m2 2 20 20"/></svg>
                      <span class="text-xs font-medium" :class="row.online ? 'text-emerald-700 dark:text-emerald-400' : 'text-red-700 dark:text-red-400'" x-text="row.online ? 'Online' : 'Offline'"></span>
                    </div>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap">
                    <div class="flex items-center gap-x-1.5">
                      <svg class="size-4 shrink-0" :class="batteryColor(row.battery)" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 14v-4"/><path d="M6 14v-4"/><rect x="2" y="6" width="16" height="12" rx="2"/></svg>
                      <span class="text-sm tabular-nums" :class="batteryColor(row.battery)" x-text="row.battery + '%'"></span>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
