  <script>
  (function () {
    var total = 600;
    var pipeline = [
      { id: 'exam-pipeline-chart-scheduled', completed: 500, color: '#0ea5e9', colorDark: '#38bdf8' },
      { id: 'exam-pipeline-chart-registered', completed: 450, color: '#10b981', colorDark: '#34d399' },
      { id: 'exam-pipeline-chart-biometrics', completed: 380, color: '#f59e0b', colorDark: '#fbbf24' },
      { id: 'exam-pipeline-chart-photo', completed: 350, color: '#f97316', colorDark: '#fb923c' },
      { id: 'exam-pipeline-chart-present', completed: 320, color: '#6366f1', colorDark: '#818cf8' },
      { id: 'exam-pipeline-chart-absent', completed: 100, color: '#f43f5e', colorDark: '#fb7185' }
    ];
    var pendingColor = '#d1d5db';
    var pendingColorDark = '#525252';

    function getOptions(completed, totalVal, accentColor) {
      var pending = totalVal - completed;
      return {
        chart: { type: 'donut', height: 132, width: 132, sparkline: { enabled: false } },
        series: [completed, pending],
        labels: ['Completed', 'Pending'],
        legend: { show: false },
        dataLabels: { enabled: false },
        plotOptions: {
          pie: {
            donut: { size: '75%' },
            expandOnClick: false
          }
        },
        stroke: { width: 2, colors: ['#fff', '#fff'] },
        colors: [accentColor, document.documentElement.classList.contains('dark') ? pendingColorDark : pendingColor],
        states: { hover: { filter: { type: 'none' } }, active: { filter: { type: 'none' } } },
        tooltip: { enabled: false }
      };
    }

    function render() {
      var isDark = document.documentElement.classList.contains('dark');
      pipeline.forEach(function (item) {
        var el = document.getElementById(item.id);
        if (!el) return;
        var color = isDark ? item.colorDark : item.color;
        var opts = getOptions(item.completed, total, color);
        if (el._chart) {
          el._chart.updateOptions(opts);
          return;
        }
        el._chart = new ApexCharts(el, opts);
        el._chart.render();
      });
    }

    if (typeof ApexCharts !== 'undefined') {
      render();
      document.documentElement.addEventListener('theme-change', render);
    } else {
      window.addEventListener('load', function () {
        if (typeof ApexCharts !== 'undefined') render();
      });
    }
  })();
  </script>
