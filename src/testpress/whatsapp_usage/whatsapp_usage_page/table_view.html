<!-- Table View: daily notifications for selected month -->
<div class="p-5 bg-white border border-gray-200 shadow-2xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700 overflow-hidden">
  <div class="min-w-full overflow-x-auto align-middle">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
      <thead class="bg-gray-50 dark:bg-neutral-800">
        <tr>
          <th scope="col" class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-neutral-400 uppercase tracking-wider">Date</th>
          <th scope="col" class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-neutral-400 uppercase tracking-wider">Notifications Sent</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200 dark:bg-neutral-800 dark:divide-neutral-700">
        <template x-for="day in daysInSelectedMonth" :key="day.date">
          <tr class="dark:bg-neutral-800">
            <td class="px-4 py-3 text-sm text-gray-800 dark:text-neutral-200" x-text="day.dayOfMonth + ' ' + (selectedMonthLabel ? selectedMonthLabel.split(' ')[0] : '')"></td>
            <td class="px-4 py-3 text-sm text-right text-gray-800 dark:text-neutral-200" x-text="day.count"></td>
          </tr>
        </template>
        <tr class="bg-gray-50 dark:bg-neutral-700 font-semibold">
          <td class="px-4 py-3 text-sm text-gray-800 dark:text-neutral-200">Month Total</td>
          <td class="px-4 py-3 text-sm text-right text-gray-800 dark:text-neutral-200" x-text="totalNotifications"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
