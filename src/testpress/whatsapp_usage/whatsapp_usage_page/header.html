<header class="flex flex-wrap justify-between items-center gap-2 pt-4">

  <div>
    <h1 class="text-lg md:text-xl font-semibold text-stone-800 dark:text-neutral-200">WhatsApp Usage</h1>
    <p class="text-sm text-stone-500 dark:text-neutral-400">Daily WhatsApp notification usage overview</p>
  </div>

  <div class="flex md:justify-end items-center gap-x-2">
    <!-- Month Dropdown -->
    <div class="hs-dropdown [--auto-close:true] relative inline-flex">
      <button type="button" @click="goToPreviousMonth"
        :disabled="selectedMonth === monthOptions[monthOptions.length - 1]?.value" class="size-[1.875rem] inline-flex justify-center items-center gap-x-1 text-xs
             first:rounded-s-md last:rounded-e-md
             border border-gray-200
             bg-white text-gray-800 shadow-2xs
             hover:bg-gray-50
             focus:outline-hidden focus:bg-gray-50
             disabled:pointer-events-none disabled:cursor-default
             disabled:text-gray-400 disabled:hover:bg-white
             dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300
             dark:hover:bg-neutral-600 dark:focus:bg-neutral-600
             dark:disabled:border-neutral-600 dark:disabled:text-neutral-500 dark:disabled:hover:bg-neutral-800">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>


      <div class="hs-dropdown [--auto-close:true] relative inline-flex">
        <!-- Button -->

        <button type="button"
          class="py-1.5 px-2 inline-flex items-center gap-x-1 text-xs  border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600">
          <span x-text="selectedMonthLabel"></span>
        </button>

        <!-- End Button -->

        <!-- Dropdown -->
        <div
          class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-auto transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
          role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptied">

          <div class="p-1">
            <template x-for="month in monthOptions" :key="month.value">
              <button type="button" @click="selectedMonth = month.value"
                class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <span x-text="month.label"></span>
              </button>
            </template>
          </div>
        </div>


        <button type="button" @click="goToNextMonth" :disabled="selectedMonth === currentMonth" class="size-[1.875rem] inline-flex justify-center items-center gap-x-1 text-xs
         first:rounded-s-md last:rounded-e-md
         border border-gray-200
         bg-white text-gray-800 shadow-2xs
         hover:bg-gray-50
         focus:outline-hidden focus:bg-gray-50
         disabled:pointer-events-none disabled:cursor-not-allowed
         disabled:text-gray-400 disabled:hover:bg-white
         dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300
         dark:hover:bg-neutral-600 dark:focus:bg-neutral-600
         dark:disabled:border-neutral-600 dark:disabled:text-neutral-500 dark:disabled:hover:bg-neutral-800">
          <svg class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
        </button>

        <!-- End Dropdown -->
      </div>

    </div>

    <a href="/settings/whatsapp-usage-logs/"
      class="py-1.5 px-2 inline-flex items-center gap-x-1 text-xs rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600">
      View Logs
    </a>

    <!-- Graph / Table view toggle - icons only, compact, selected = gray -->
    <div class="inline-flex items-center gap-x-1 rounded-md border border-gray-200 bg-white p-0.5 shadow-2xs dark:border-neutral-700 dark:bg-neutral-800">
      <div class="hs-tooltip [--placement:top] inline-block">
        <button
          type="button"
          @click="setViewMode('graph')"
          class="hs-tooltip-toggle size-6 rounded inline-flex items-center justify-center transition-colors focus:outline-hidden"
          :class="viewMode === 'graph'
            ? 'bg-gray-100 text-gray-600 dark:bg-neutral-600 dark:text-neutral-200'
            : 'text-gray-600 hover:bg-gray-50 dark:text-neutral-400 dark:hover:bg-neutral-700'"
          aria-label="Graph view"
        >
          <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16c.5-2 1.5-7 4-7 2 0 2 3 4 3 2.5 0 4.5-5 5-7"/></svg>
          <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded-md shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200" role="tooltip">Graph view</span>
        </button>
      </div>
      <div class="hs-tooltip [--placement:top] inline-block">
        <button
          type="button"
          @click="setViewMode('table')"
          class="hs-tooltip-toggle size-6 rounded inline-flex items-center justify-center transition-colors focus:outline-hidden"
          :class="viewMode === 'table'
            ? 'bg-gray-100 text-gray-600 dark:bg-neutral-600 dark:text-neutral-200'
            : 'text-gray-600 hover:bg-gray-50 dark:text-neutral-400 dark:hover:bg-neutral-700'"
          aria-label="Table view"
        >
          <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
          <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded-md shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200" role="tooltip">Table view</span>
        </button>
      </div>
    </div>

  </div>
</header>
