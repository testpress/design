<div class="lg:sticky lg:top-0 z-20 bg-gray-100 dark:bg-neutral-900">
  <div class="h-5"></div>
  <div class="p-4 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-xs rounded-xl">
    <div class="flex flex-wrap gap-2">
      <!-- All entries -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'all' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="all" x-model="selectedFilter" class="hidden">
          <span class="block max-w-56 truncate">All entries</span>
      </label>

      <!-- Session Note -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'SESSION_NOTE' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="SESSION_NOTE" x-model="selectedFilter" class="hidden">
          <span class="block max-w-56 truncate">Session Note</span>
      </label>

      <!-- Academic Concern -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'ACADEMIC_CONCERN' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="ACADEMIC_CONCERN" x-model="selectedFilter" class="hidden">

      <!-- Support Issue -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'SUPPORT_ISSUE' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="SUPPORT_ISSUE" x-model="selectedFilter" class="hidden">
          <span class="block max-w-56 truncate">Support Issue</span>
      </label>

      <!-- Follow-up Required -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'FOLLOW_UP_REQUIRED' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="FOLLOW_UP_REQUIRED" x-model="selectedFilter" class="hidden">
          <span class="block max-w-56 truncate">Follow-up Required</span>
      </label>

      <!-- General Note -->
      <label class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
          :class="selectedFilter === 'GENERAL_NOTE' ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500' : 'text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-emerald-600'">
          <input type="radio" name="guidance_filter" value="GENERAL_NOTE" x-model="selectedFilter" class="hidden">
