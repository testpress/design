{% from "src/ui-system/components/popover.html" import popover %}
<div class="relative h-full overflow-hidden flex">
  <!-- Days -->
  <div class="size-full grid grid-cols-7">
    {% set days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'] %}
    {% for day in days %}
    {% set dayIndex = loop.index0 %}
    <!-- Day Col -->
    <div class="flex flex-auto flex-col ">
      {% for i in range(0, 24) %}
      <div
        class="h-20 relative flex flex-1 border-e border-b border-e-gray-300 border-b-gray-100 dark:border-e-neutral-500 dark:border-b-neutral-700">

        <div class="size-full space-y-1" x-data="{
             hourSessions: [
               {% for session in my_learning_session %}
                 {% set s_day = loop.index0 % 7 %}
                 {% set s_hour = 9 + (loop.index0 % 10) %}
                 {% if loop.index0 == 0 %}{% set s_hour = 17 %}{% endif %}
                 {% if loop.index0 == 1 %}{% set s_hour = 14 %}{% endif %}
                 {% if loop.index0 == 2 %}{% set s_hour = 10 %}{% endif %}
                 {% if loop.index0 == 3 %}{% set s_hour = 16 %}{% endif %}
                 {% if loop.index0 == 4 %}{% set s_hour = 9 %}{% endif %}
                 {% if loop.index0 == 5 %}{% set s_hour = 18 %}{% endif %}
                 {% if loop.index0 == 6 %}{% set s_hour = 15 %}{% endif %}
                 {% if loop.index0 == 8 %}{% set s_hour = 19 %}{% endif %}
                 
                 {% set s_status = session.status | lower %}
                 {% if s_day < 1 and s_status != 'cancelled' %}
                   {% set s_status = 'completed' %}
                 {% elif s_day > 1 and s_status != 'cancelled' %}
                   {% set s_status = 'upcoming' %}
                 {% endif %}

                 {% if s_day == dayIndex and s_hour == i %}
                   {
                     id: '{{ session.id }}',
                     name: '{{ session.title }}',
                     status: '{{ s_status }}',
                     time_range: '{{ session.scheduled_time }} • {{ session.duration }}',
                     date: '{{ session.instructor.name }}',
                     action: '{{ session.action }}',
                   },
                 {% endif %}
               {% endfor %}
             ]
           }">

          <template x-for="(session, idx) in hourSessions.slice(0, 2)" :key="session.id">

            {% set class_trigger %}
              <button :id="`hs-pro-dnnd-${session.id}`" type="button" class="py-0.5 px-1 relative w-full flex text-start border-s-4 text-xs rounded-sm session-btn
         relative focus:shadow-2xs dark:bg-neutral-800 dark:before:absolute dark:before:inset-0 
         dark:before:rounded-e" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown" :class="{
    'bg-orange-100 border-orange-600 text-orange-800 focus:bg-orange-200 dark:before:bg-orange-800/20 dark:focus:before:bg-orange-800/30 dark:text-orange-500': session.status === 'live',
    'bg-sky-100 border-sky-600 text-sky-800 focus:bg-sky-200 dark:before:bg-sky-800/20 dark:focus:before:bg-sky-800/30 dark:text-sky-500': session.status === 'upcoming',
    'bg-green-100 border-green-600 text-green-800 focus:bg-green-200 dark:before:bg-green-800/20 dark:focus:before:bg-green-800/30 dark:text-green-500': session.status === 'completed',
    'bg-gray-100 border-gray-600 text-gray-800 focus:bg-gray-200 dark:before:bg-gray-800/20 dark:focus:before:bg-gray-800/30 dark:text-gray-500': session.status === 'cancelled'
  }">
                <span class="block truncate">
                  <span class="block font-semibold truncate" x-text="session.name"></span>
                </span>
              </button>
            {% endset %}

            {% set class_content %}
                <div class="p-4 h-full relative flex flex-col bg-white  dark:bg-neutral-800  rounded-xl">
                  <div
                    class="relative before:absolute before:start-0 before:top-1/2 before:w-1 before:h-10/12 before:-translate-y-1/2 before:rounded-full before:bg-gray-300 dark:before:bg-neutral-600">
                    <div class="space-y-1">
                      <h3 class="font-medium text-gray-800 dark:text-neutral-200">
                        <span x-text="session.name"></span>
                      </h3>
                      <div class="flex flex-wrap items-center gap-1.5 text-sm text-gray-500 dark:text-neutral-400">
                        <span x-text="session.date"></span>
                        <span class="text-gray-400 dark:text-neutral-500">&bull;</span>
                        <span x-text="session.time_range"></span>
                      </div>
                    </div>
                  </div>


                  <div class="mt-auto pt-3 relative z-2 flex  items-center gap-2">
                    <div class="flex flex-wrap items-center gap-2">
                      <a :href="`/testpress/my_learning_session/${session.id}/`"
                        class="group flex justify-center items-center gap-x-2 py-1.5 px-2.5 text-sm whitespace-nowrap bg-primary-50 border border-transparent text-primary-600 rounded-lg transition hover:bg-primary-100 focus:outline-hidden focus:bg-primary-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-primary-500/20 dark:text-primary-500 dark:hover:bg-primary-500/30 dark:focus:bg-primary-500/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                          class="shrink-0 size-4 group-hover:scale-110 group-focus:scale-110 transition">
                          <path
                            d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                          <circle cx="12" cy="12" r="3" />
                        </svg>
                        View Detail
                      </a>
                      <button x-cloak x-show="session.status == 'live'" type="button"
                        class="group flex justify-center items-center gap-x-2 py-1.5 px-2.5 text-sm whitespace-nowrap bg-primary-600 border border-transparent text-white rounded-lg transition hover:bg-primary-700 focus:outline-hidden focus:bg-primary-700 disabled:opacity-50 disabled:pointer-events-none dark:bg-primary-500 dark:text-neutral-200 dark:hover:bg-primary-600 dark:focus:bg-primary-600">
                        <svg class="shrink-0 size-4 group-hover:scale-110 group-focus:scale-110 transition"
                          xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                          <path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5"></path>
                          <rect x="2" y="6" width="14" height="12" rx="2"></rect>
                        </svg>
                        Join Session
                      </button>
                    </div>
                  </div>
                </div>
            {% endset %}

            <div class="relative inline-flex w-full mb-1">
              {{ popover(trigger=class_trigger, content=class_content, trigger_type='click', width="w-80", placement='right', trigger_class='w-full') }}
            </div>

          </template>

          <!-- Show +N more if > 2 -->
          <template x-if="hourSessions.length > 2">


            <div
              class="hs-dropdown [--auto-close:inside] [--placement:bottom] sm:[--placement:right] relative inline-flex w-full">
              <button type="button" :id="`hs-pro-dnnd-{{ i }}`" aria-haspopup="menu" aria-expanded="false"
                aria-label="Dropdown"
                class="line-clamp-1 truncate px-1 pt-2 w-full text-start text-gray-800 text-xs rounded-sm focus:text-gray-600 dark:text-neutral-200 dark:focus:text-neutral-400">
                + <span x-text="hourSessions.length - 2"></span> more
              </button>
              <!-- End Favorites Button Icon -->

              <!-- Favorites Dropdown -->
              <div
                class="p-4 max-h-[30rem] overflow-y-auto hs-dropdown-menu transition-[opacity,margin] duration-[0.1ms] md:duration-[150ms] hs-dropdown-open:opacity-100 opacity-0 w-auto max-w-96 hidden z-[99] bg-white border-x sm:border-y border-gray-200 sm:border-gray-100 sm:mt-2 sm:rounded-xl shadow-lg before:absolute before:-top-4 before:start-0 before:w-full before:h-5 dark:bg-neutral-800 dark:border-neutral-700"
                role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dnnd">
                <template x-for="(session, idx) in hourSessions.slice(2)" :key="session.id">
                  <div     :class="{
      'border-b border-gray-200 dark:border-neutral-700 mb-4 pb-4': idx !== hourSessions.slice(2).length - 1
    }" class="h-full relative flex flex-col bg-white dark:bg-neutral-800">
                    <div 
                      class="relative before:absolute before:start-0 before:top-1/2 before:w-1 before:h-10/12 before:-translate-y-1/2 before:rounded-full before:bg-gray-300 dark:before:bg-neutral-600">
                      <div class="space-y-1">
                        <h3 class="font-medium text-gray-800 dark:text-neutral-200">
                          <span x-text="session.name"></span>
                        </h3>
                        <div class="flex flex-wrap items-center gap-1.5 text-sm text-gray-500 dark:text-neutral-400">
                          <span x-text="session.date"></span>
                          <span class="text-gray-400 dark:text-neutral-500">&bull;</span>
                          <span x-text="session.time_range"></span>
                        </div>
                      </div>
                    </div>


                    <div class="mt-auto pt-3 relative z-2 flex  items-center gap-2">
                      <div class="flex flex-wrap items-center gap-2">
                        <a :href="`/testpress/my_learning_session/${session.id}/`"
                          class="group flex justify-center items-center gap-x-2 py-1.5 px-2.5 text-sm whitespace-nowrap bg-primary-50 border border-transparent text-primary-600 rounded-lg transition hover:bg-primary-100 focus:outline-hidden focus:bg-primary-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-primary-500/20 dark:text-primary-500 dark:hover:bg-primary-500/30 dark:focus:bg-primary-500/30">
                          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="shrink-0 size-4 group-hover:scale-110 group-focus:scale-110 transition">
                            <path
                              d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                            <circle cx="12" cy="12" r="3" />
                          </svg>
                          View Detail
                        </a>
                        <button x-cloak x-show="session.status == 'live'" type="button"
                          class="group flex justify-center items-center gap-x-2 py-1.5 px-2.5 text-sm whitespace-nowrap bg-primary-600 border border-transparent text-white rounded-lg transition hover:bg-primary-700 focus:outline-hidden focus:bg-primary-700 disabled:opacity-50 disabled:pointer-events-none dark:bg-primary-500 dark:text-neutral-200 dark:hover:bg-primary-600 dark:focus:bg-primary-600">
                          <svg class="shrink-0 size-4 group-hover:scale-110 group-focus:scale-110 transition"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5"></path>
                            <rect x="2" y="6" width="14" height="12" rx="2"></rect>
                          </svg>
                          Join Session
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

        </div>
      </div>
      {% endfor %}
    </div>
    {% endfor %}
    <!-- End Day Col -->
  </div>

  <!-- Days -->
</div>
