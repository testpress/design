<!-- Card -->
<div class="flex flex-col bg-white dark:bg-neutral-800 border-gray-200 border-t dark:border-neutral-700 shadow-xs overflow-hidden">
  <!-- Table Content -->
  <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2" @click.away="openOrganization = null">
    <div class="min-w-[900px]">
      <!-- TABLE HEADER -->
      <div class="grid grid-cols-[50px_1.5fr_1fr_200px_200px] border-gray-200 dark:border-neutral-700">
        <div class="py-2 px-5"></div>
        <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
          <button id="hs-cohort-name" type="button" class="px-5 py-2.5 whitespace-nowrap text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
            Organization
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 15 5 5 5-5"></path>
              <path d="m7 9 5-5 5 5"></path>
            </svg>
          </button>
          {% include 'src/simba/partials/dropdowns/table_sort.html' %}
        </div>

        <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
          <button id="hs-cohort-name" type="button" class="px-5 py-2.5 whitespace-nowrap text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
            Organization ID
          </button>
        </div>

        <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
          <button id="hs-cohort-name" type="button" class="px-5 py-2.5 whitespace-nowrap text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
            Total Learners
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 15 5 5 5-5"></path>
              <path d="m7 9 5-5 5 5"></path>
            </svg>
          </button>
          {% include 'src/simba/partials/dropdowns/table_sort.html' %}
        </div>

        <div class="py-2 px-5"></div>
      </div>


      <!-- Organization GROUPS -->
      <template x-for="organization in filteredReadyToStart" :key="organization.organizationID">
        <div class="divide-y border-t">
          <!-- ORGANIZATION ROW -->
          <div
            class="grid grid-cols-[50px_1.5fr_1fr_200px_200px] cursor-pointer">
            <div class="py-2 px-5 flex items-center">
              <button @click="toggleOrganization(organization.organizationID)" class="mr-2">
                <svg
                  class="w-4 h-4 transition-transform"
                  :class="{ 'rotate-90': openOrganization === organization.organizationID }"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24">
                  <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M9 5l7 7-7 7"/>
                </svg>
              </button>
            </div>

            <div class="py-2 px-5 flex items-center gap-2">
              <span class="text-sm font-medium text-gray-800 hover:text-emerald-600 decoration-2 hover:underline focus:outline-none focus:underline focus:text-emerald-600 dark:text-neutral-200 dark:hover:text-emerald-500 dark:focus:text-emerald-500"
                    x-text="organization.organization">
              </span>
            </div>

            <div class="py-2 px-5 flex items-center gap-2">
              <span class="text-sm text-gray-800  decoration-2focus:outline-none dark:text-neutral-200" x-text="organization.organizationID"></span>
            </div>

            <div class="py-2 px-5 flex items-center gap-2">
              <span class="text-sm text-gray-800  decoration-2focus:outline-none dark:text-neutral-200" x-text="organization.learners_count"></span>
            </div>

            <div class="py-2 px-5 text-center">
              <button
                class="text-xs text-gray-600 hover:underline"
                @click="organization.cohorts.forEach(c => toggleCohortSelection(c.id))">
                Select All
              </button>
            </div>
          </div>

          <!-- COHORT ROWS -->
          <template x-for="cohort in organization.cohorts" :key="cohort.id">
            <div
              x-show="openOrganization === organization.organizationID" x-cloak
              x-transition
              class="grid grid-cols-[50px_1.5fr_1fr_200px_200px] bg-gray-100 dark:bg-neutral-700">

              <!-- checkbox -->
              <div class="py-2 px-5 flex items-center">
                  <input type="checkbox" :checked="selectedCohorts.includes(cohort.id)" @change="toggleCohortSelection(cohort.id)" class="hs-datatable-select-row shrink-0 border-gray-300 rounded-sm text-green-600 focus:ring-green-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-600 dark:checked:bg-green-500 dark:checked:border-green-500 dark:focus:ring-offset-neutral-800">
              </div>

              <!-- cohort -->
              <div class="py-2 px-5 flex items-center gap-3">
                <span class="text-sm text-gray-600 dark:text-neutral-300" x-text="cohort.name">
                </span>
                <span  x-show="cohort.partially_presented" x-cloak class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-500/20 dark:text-blue-400">
                  Partially Presented
                </span>
              </div>

              <!-- course -->
              <div class="py-2 px-5 flex items-center gap-3">
                <span class="text-sm text-gray-600 dark:text-neutral-300" x-text="cohort.course_name">
                </span>
              </div>

              <div class="py-2 px-5 flex items-center text-sm text-gray-600 dark:text-neutral-300">
                <span x-text="cohort.learners_count || 0"></span>
              </div>

              <!-- action -->
              <div class="py-2 px-5 text-center">
                <button type="button" @click="openPresentationForCohort(cohort)" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
                  Start Presenting
                </button>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>
</div>
