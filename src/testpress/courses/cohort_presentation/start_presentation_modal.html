<!-- Start Presentation Modal (shared for single + group) -->
<div id="cohort-start-presentation-modal"
  class="hs-overlay hidden size-full fixed top-0 start-0 z-[30] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none"
  role="dialog" tabindex="-1" aria-labelledby="cohort-start-presentation-modal-label">
  <div
    class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center">
    <div
      class="w-full max-h-full flex flex-col bg-white border border-gray-200 rounded-xl pointer-events-auto shadow-xl dark:bg-neutral-800 dark:border-neutral-700">

      <!-- Header -->
      <div class="py-2.5 px-4 border-b border-gray-200 dark:border-neutral-700">
        <div class="flex justify-between items-center">
          <div class="flex-1 min-w-0 pr-4">
            <h3 id="cohort-start-presentation-modal-label"
              class="font-medium text-gray-800 truncate line-clamp-1 dark:text-neutral-200">
              Select Participants for <span x-text="presentationCourseName"></span>
            </h3>
          </div>
          <button type="button"
            class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:text-neutral-400 dark:focus:bg-neutral-600"
            aria-label="Close" data-hs-overlay="#cohort-start-presentation-modal">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
      </div>
      <!-- End Header -->

      <!-- Search Section -->
      <div class="p-4 border-b border-gray-200 dark:border-neutral-700">
        <!-- Search Input -->
        <div class="relative w-full mb-3">
          <input type="text" x-model="modalSearchQuery"
            class="py-2 px-3 ps-9 block w-full bg-white border-gray-200 rounded-lg text-sm text-gray-800 placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-400"
            placeholder="Search participants...">
          <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-3">
            <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg"
              width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
          </div>
        </div>
        <!-- End Search Input -->

        <!-- Select All Checkbox -->
        <div class="flex items-center justify-between">
          <label class="flex items-center cursor-pointer">
            <input type="checkbox"
              class="shrink-0 size-4 border-gray-300 rounded text-emerald-600 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500"
              id="select-all-participants" :checked="allVisibleUsersSelected" @change="toggleSelectAllVisible()">
            <span class="ms-2 text-sm text-gray-600 dark:text-neutral-400">
              Select all (<span x-text="getAllVisibleUserIds().length"></span> participants)
            </span>
          </label>
          <span class="text-sm font-medium" :class="selectedUsersCount >= maxBatchSize ? 'text-red-600 dark:text-red-400' : 'text-gray-700 dark:text-neutral-300'">
            <span x-text="selectedUsersCount"></span>/<span x-text="maxBatchSize"></span>
          </span>
        </div>
        <!-- End Select All -->

        <!-- Capacity Alert -->
        <div x-show="selectedUsersCount >= maxBatchSize" x-cloak
          class="mt-3 px-3 py-2 bg-red-50 border border-red-200 rounded-md flex items-center gap-2 dark:bg-red-900/10 dark:border-red-900/20">
          <svg class="w-4 h-4 text-red-600 flex-shrink-0 dark:text-red-400" xmlns="http://www.w3.org/2000/svg"
            width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" x2="12" y1="8" y2="12" />
            <line x1="12" x2="12.01" y1="16" y2="16" />
          </svg>
          <p class="text-sm text-red-700 dark:text-red-300">
            Maximum capacity of <span x-text="maxBatchSize"></span> reached. Deselect to add others.
          </p>
        </div>
        <!-- End Capacity Alert -->
      </div>
      <!-- End Search Section -->

      <!-- Body -->
      <div
        class="flex-1 min-h-[300px] max-h-[calc(85vh-200px)] overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="p-4">
          
          <!-- Loop through organizations -->
          <template x-for="(org, orgIndex) in organizations" :key="org.id">
            <div x-show="orgHasVisibleUsers(org)" :class="orgIndex > 0 ? 'mt-8' : ''">
              
              <!-- Organization Header with Select All -->
              <div class="mb-4">
                <div class="flex items-center gap-x-2 mb-1">
                  <input type="checkbox"
                    class="shrink-0 size-4 border-gray-300 rounded text-emerald-600 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500"
                    :id="'select-org-' + org.id"
                    :checked="allVisibleInOrgSelected(org)"
                    @change="toggleAllInOrg(org)">
                  <label :for="'select-org-' + org.id" class="flex-1 text-sm font-semibold text-gray-800 dark:text-neutral-200 cursor-pointer truncate">
                    <span x-text="org.name"></span>
                  </label>
                  <span class="text-xs font-medium text-gray-700 dark:text-neutral-300 whitespace-nowrap">
                    <span x-text="selectedCountInOrg(org)"></span>/<span x-text="getVisibleUsersInOrg(org).length"></span>
                  </span>
                </div>
                <div class="ps-6 text-xs text-gray-600 dark:text-neutral-400">
                  ONO: <span x-text="org.ono_contact"></span>
                </div>
              </div>
              
              <!-- Loop through cohorts in organization -->
              <template x-for="cohort in org.cohorts" :key="cohort.id">
                <div x-show="cohortHasVisibleUsers(cohort)" class="mb-4 ps-4">
                  
                  <!-- Cohort Header with Select All -->
                  <div class="flex items-center gap-x-2 mb-2">
                    <input type="checkbox"
                      class="shrink-0 size-4 border-gray-300 rounded text-emerald-600 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500"
                      :id="'select-cohort-' + cohort.id"
                      :checked="allVisibleInCohortSelected(cohort)"
                      @change="toggleAllInCohort(cohort)">
                    <label :for="'select-cohort-' + cohort.id" class="flex-1 text-sm font-medium text-gray-700 dark:text-neutral-300 cursor-pointer truncate">
                      <span x-text="cohort.name"></span>
                    </label>
                    <span class="text-xs font-medium text-gray-700 dark:text-neutral-300 whitespace-nowrap">
                      <span x-text="selectedCountInCohort(cohort)"></span>/<span x-text="getVisibleUsersInCohort(cohort).length"></span> participants
                    </span>
                  </div>

                  <!-- Users List -->
                  <div class="space-y-1 ps-2">
                    
                    <template x-for="user in cohort.users" :key="user.id">
                      <label x-show="matchesModalSearch(user)" 
                        class="flex items-center gap-x-3 py-2 px-3 rounded-lg hover:bg-gray-50 dark:hover:bg-neutral-700 cursor-pointer transition-colors"
                        :class="!canSelectMore() && !isUserSelected(user.id) ? 'opacity-50' : ''">
                        <input type="checkbox"
                          class="shrink-0 size-4 border-gray-300 rounded text-emerald-600 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500"
                          :checked="isUserSelected(user.id)"
                          :disabled="!canSelectMore() && !isUserSelected(user.id)"
                          @change="toggleUserSelection(user.id)">
                        
                        <!-- Avatar: Image if available, otherwise initial -->
                        <img x-show="user.avatar" :src="user.avatar" :alt="user.name" 
                          class="shrink-0 size-8 rounded-full object-cover">
                        <span x-show="!user.avatar" 
                          class="flex shrink-0 justify-center items-center size-8 text-xs font-semibold rounded-full text-white"
                          :class="{
                            'bg-blue-500': getAvatarNumber(user.id) % 5 === 0,
                            'bg-indigo-500': getAvatarNumber(user.id) % 5 === 1,
                            'bg-purple-500': getAvatarNumber(user.id) % 5 === 2,
                            'bg-emerald-500': getAvatarNumber(user.id) % 5 === 3,
                            'bg-orange-500': getAvatarNumber(user.id) % 5 === 4
                          }"
                          x-text="user.name.charAt(0).toUpperCase()">
                        </span>
                        
                        <div class="grow min-w-0">
                          <span class="block text-sm font-medium text-gray-800 truncate dark:text-neutral-200" x-text="user.name"></span>
                          <span class="block text-xs text-gray-500 truncate dark:text-neutral-400" x-text="user.id"></span>
                        </div>
                      </label>
                    </template>

                  </div>
                </div>
              </template>

            </div>
          </template>

          <!-- Empty State -->
          <div x-show="!organizations.some(org => orgHasVisibleUsers(org))" class="flex flex-col items-center justify-center py-12 text-center">
            <svg class="w-12 h-12 text-gray-400 dark:text-neutral-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <p class="text-sm text-gray-600 dark:text-neutral-400">No participants found</p>
            <p class="text-xs text-gray-500 dark:text-neutral-500 mt-1">Try adjusting your search</p>
          </div>

        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-between items-center gap-x-3 border-t border-gray-200 dark:border-neutral-700">
        <div class="text-xs text-gray-600 dark:text-neutral-400">
          <span x-show="selectedUsersCount === 0">Please select participants to continue</span>
          <span x-show="selectedUsersCount > 0 && selectedUsersCount <= maxBatchSize">
            <span x-text="selectedUsersCount"></span> participant<span x-show="selectedUsersCount !== 1">s</span> selected
          </span>
          <span x-show="selectedUsersCount > maxBatchSize" class="text-red-600 dark:text-red-400">
            Exceeded capacity by <span x-text="selectedUsersCount - maxBatchSize"></span>
          </span>
        </div>
        <div class="flex gap-x-2">
          <button type="button"
            class="py-2 px-3 inline-flex justify-center items-center text-start bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-xs align-middle hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
            data-hs-overlay="#cohort-start-presentation-modal">
            Cancel
          </button>
          <button type="button"
            class="py-2 px-3 inline-flex justify-center items-center gap-x-2 text-start bg-emerald-600 border border-emerald-600 text-white text-sm font-medium rounded-lg shadow-xs align-middle hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:ring-1 focus:ring-emerald-300 dark:focus:ring-emerald-500"
            :disabled="!selectedUsersCount || selectedUsersCount > maxBatchSize">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Start Presentation
          </button>
        </div>
      </div>
      <!-- End Footer -->

    </div>
  </div>
</div>
