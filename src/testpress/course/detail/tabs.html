<div class="" x-data="{ activeTab: 'home' }">
  <div class="xl:hidden px-4 mt-6">
    <label for="tabs" class="sr-only">Select a tab</label>
    <!-- Use an "onChange" listener to redirect the user to the selected tab URL. -->
    <select id="tabs" name="tabs" @change="activeTab = $event.target.value"
      class="block w-full rounded-md border-gray-300 py-2 pl-3 pr-10 text-base focus:border-emerald-500 focus:outline-none focus:ring-emerald-500 sm:text-sm">
      <option :selected="activeTab == 'home'" value="home">Home</option>
      <option :selected="activeTab == 'running'" value="running">Running</option>
      <option :selected="activeTab == 'upcoming'" value="upcoming">Upcoming</option>
      <option :selected="activeTab == 'history'" value="history">History</option>
      <option :selected="activeTab == 'leaderboard'" value="leaderboard">LeaderBoard</option>
      <option :selected="activeTab == 'discussions'" value="discussions">Discussions</option>
    </select>
  </div>
  <div class="hidden xl:block">
    <div class=" flex justify-between border-b border-gray-200">
      <nav class="-mb-px flex space-x-6 xl:space-x-8 h-16 ml-4" aria-label="Tabs">
        <a href="/course/detail/"
          :class="activeTab == 'home' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium border-emerald-500 text-emerald-600"
          aria-current="page">Home</a>
        <a href="{{'/content_detail_page/running'|url}}"
          :class="activeTab == 'running' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center"
          aria-current="page">Running <span
            :class="activeTab == 'running' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">3</span></a>
        <a href="{{'/content_detail_page/upcoming'|url}}"
          :class="activeTab == 'upcoming' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center">Upcoming
          <span
            :class="activeTab == 'upcoming' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">5</span></a>
        <a href="{{'/content_detail_page/history'|url}}"
          :class="activeTab == 'history' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center">History
          <span
            :class="activeTab == 'history' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">12</span></a>
        <a href="{{'/content_detail_page/leaderboard'|url}}"
          :class="activeTab == 'leaderboard' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium"
          :aria-current="activeTab == 'leaderboard' ? 'page' : undefined">Leaderboard</a>
        <a href="{{'/content_detail_page/discussions'|url}}"
          :class="activeTab == 'discussions' ? 'border-emerald-500 text-emerald-600': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium"
          :aria-current="activeTab == 'discussions' ? 'page' : undefined">Discussions</a>
      </nav>
      <nav class="-mb-px flex items-center gap-x-2 h-16 mr-4 ml-4 shrink-0" aria-label="Quick links">
        <a href="#"
          class="inline-flex flex-col items-center justify-center gap-0.5 p-2 text-gray-500 hover:text-emerald-600 focus:outline-none transition-colors"
          aria-label="Custom Test">
          <svg class="size-5 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" />
          </svg>
          <span class="hidden xl:block text-xs font-medium">Custom Test</span>
        </a>
        <a href="#"
          class="inline-flex flex-col items-center justify-center gap-0.5 p-2 text-gray-500 hover:text-emerald-600 focus:outline-none transition-colors"
          aria-label="Certificate">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-5 shrink-0">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84 51.39 51.39 0 0 0-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
          </svg>
          <span class="hidden xl:block text-xs font-medium">Certificate</span>
        </a>
      </nav>
    </div>
  </div>



</div>
