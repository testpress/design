<script>
function zoomIntegrationHandler() {
  return {
    sharingEnabled: false,
    preventReserving: false,
    isFetching: false,
    deleteAfterImport: false,
    noImport: false,
    zoomUsers: [
      { id: 1, email: 'host.alpha@institute.com' },
      { id: 2, email: 'host.beta@institute.com' }
    ],
    fetchUsers() {
      this.isFetching = true;
      setTimeout(() => {
        this.isFetching = false;
        this.zoomUsers.push({ id: 3, email: 'new.host@institute.com' });
        this.$nextTick(() => {
          if (window.HSSelect) {
            window.HSSelect.autoInit();
          }
        });
      }, 800);
    }
  }
}
</script>
