<section class="bg-white shadow sm:rounded-lg border border-gray-200">
  <div class="px-4 py-5 sm:p-6">
      <div class="flex items-center justify-between">
          <div class="max-w-2xl">
              <h3 class="text-base font-semibold leading-6 text-gray-900">License Sharing Mode</h3>
              <p class="mt-1 text-sm text-gray-500">
                  Enable this to allow any staff member to dynamically host classes using available licenses. 
                  If disabled, you must manually map each Zoom license to a specific Testpress staff member below.
              </p>
          </div>
          <button type="button" 
                  @click="sharingEnabled = !sharingEnabled"
                  :class="sharingEnabled ? 'bg-emerald-600' : 'bg-gray-200'"
                  class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:ring-offset-2">
              <span :class="sharingEnabled ? 'translate-x-5' : 'translate-x-0'" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
          </button>
      </div>
  </div>
</section>
