<section class="bg-white shadow sm:rounded-lg overflow-hidden border border-gray-200">
  <div class="px-4 py-5 sm:px-6 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
    <div>
      <h3 class="text-base font-semibold leading-6 text-gray-900">License Management</h3>
      <p class="mt-1 text-xs text-gray-500">Control how Zoom licenses are assigned and utilized</p>
    </div>
    <a
      href="#"
      @click.prevent="fetchUsers()"
      :class="{ 'opacity-60 cursor-not-allowed': isFetching }"
      class="inline-flex items-center gap-x-1.5 text-xs text-layer-foreground bg-layer border border-layer-line hover:bg-muted-hover py-1.5 px-2.5 rounded-full focus:outline-hidden focus:bg-muted-focus transition"
      :aria-disabled="isFetching"
    >
      <template x-if="isFetching">
        <svg class="shrink-0 size-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0a12 12 0 00-8 12h4z"></path>
        </svg>
      </template>
      <template x-if="!isFetching">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-3.5 lucide lucide-user-search-icon lucide-user-search">
          <circle cx="10" cy="7" r="4"/>
          <path d="M10.3 15H7a4 4 0 0 0-4 4v2"/>
          <circle cx="17" cy="17" r="3"/>
          <path d="m21 21-1.9-1.9"/>
        </svg>
      </template>
      <span class="ml-0.5">Fetch zoom users</span>
    </a>
  </div>
  <div class="px-4 sm:px-6 overflow-x-auto min-h-[200px]">
    <table class="divide-table-line min-w-full divide-y">
      <thead>
        <colgroup>
          <col class="w-12 sm:w-16">
          <col class="w-40 sm:w-52">
          <col class="w-56 sm:w-72">
          <col class="w-56 sm:w-60" x-show="!sharingEnabled">
        </colgroup>
        <tr>
          <th scope="col">
            <div class="text-foreground py-3 pe-4 text-start text-sm font-medium">No.</div>
          </th>
          <th scope="col">
            <div class="text-foreground py-3 pe-4 text-start text-sm font-medium">Name</div>
          </th>
          <th scope="col">
            <div class="text-foreground px-4 py-3 text-start text-sm font-medium">Email</div>
          </th>
          <th scope="col" x-show="!sharingEnabled">
            <div class="text-foreground px-4 py-3 text-start text-sm font-medium">Assigned Staff</div>
          </th>
        </tr>
      </thead>

      <tbody class="divide-table-line divide-y">
        <template x-for="(user, index) in zoomUsers" :key="user.id">
          <tr>
            <td class="text-muted-foreground-2 py-3 pe-4 text-sm" x-text="index + 1"></td>
            <td class="text-muted-foreground-2 py-3 pe-4 text-sm">
              <div class="w-full flex items-center gap-x-2">
                <template x-if="user.avatarUrl">
                  <img
                    class="shrink-0 size-7 rounded-full"
                    :src="user.avatarUrl"
                    alt="Avatar"
                  >
                </template>
                <template x-if="!user.avatarUrl">
                  <div class="shrink-0 size-7 rounded-full bg-emerald-50 text-emerald-700 flex items-center justify-center text-xs font-semibold">
                    <span x-text="user.name ? user.name.charAt(0) : ''"></span>
                  </div>
                </template>
                <div class="grow">
                  <span class="text-sm font-medium text-foreground" x-text="user.name"></span>
                </div>
              </div>
            </td>
            <td class="text-muted-foreground-2 px-4 py-3 text-sm">
              <div class="flex items-center gap-x-2">
                <span x-text="user.email"></span>
                <div class="col-start-3">
                  <div class="hs-dropdown [--auto-close:inside] [--placement:right] relative inline-flex">
                    <button
                      :id="'license-id-trigger-' + user.id"
                      type="button"
                      class="hs-tooltip-toggle hover:cursor-pointer"
                      aria-haspopup="menu"
                      aria-expanded="false"
                      aria-label="Dropdown"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-5 text-gray-600"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    </button>
              
                    <div
                      class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-auto transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)]"
                      role="menu"
                      aria-orientation="vertical"
                      :aria-labelledby="'license-id-trigger-' + user.id"
                    >
                      <div class="p-4 flex flex-col gap-y-4">
                        <div class="flex items-center gap-x-4">
                          <div class="flex items-center">
                            <p class="min-w-20 text-sm text-gray-500">
                              License ID
                            </p>
                            <div class="grow flex items-center gap-x-2">
                              <p class="font-medium text-sm text-gray-800">
                                <span :id="'copy-license-id-' + user.id" x-text="user.licenseId"></span>
                              </p>
                              <button
                                type="button"
                                class="js-clipboard [--is-toggle-tooltip:false] text-gray-500 hs-tooltip shrink-0 inline-flex justify-center items-center gap-x-2"
                                :data-clipboard-target="'#copy-license-id-' + user.id"
                                data-clipboard-action="copy"
                                data-clipboard-success-text="Copied"
                              >
                                <svg class="js-clipboard-default shrink-0 size-4 text-grey-600" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                <svg class="js-clipboard-success hidden size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity hidden invisible z-10 py-1 px-2 bg-gray-900 text-xs font-medium text-white rounded-lg shadow-sm" role="tooltip">
                                  <span class="js-clipboard-success-text">Copy</span>
                                </span>
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </td>
            <td class="px-4 py-3" x-show="!sharingEnabled">
              <div class="flex items-center gap-x-2">
                <span class="text-sm text-foreground" x-text="user.assigned ? user.assignedStaff : 'Unassigned'"></span>
                <div class="hs-dropdown relative inline-flex [--auto-close:inside] [--placement:bottom-right]">
                  <button
                    type="button"
                    class="bg-layer border-layer-line text-layer-foreground hover:bg-layer-hover focus:bg-layer-focus inline-flex size-7 items-center justify-center gap-x-2 rounded-lg border shadow-2xs focus:outline-hidden disabled:pointer-events-none disabled:opacity-50"
                    :data-hs-overlay="user.assigned ? '#hs-unassign-staff-modal' : '#hs-assign-staff-modal'"
                    aria-haspopup="dialog"
                    aria-expanded="false"
                    :aria-label="user.assigned ? 'Edit staff assignment' : 'Assign staff'"
                  >
                    <svg class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                      <path d="m15 5 4 4" />
                    </svg>
                  </button>
                </div>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</section>
