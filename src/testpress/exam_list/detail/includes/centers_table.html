<div class="flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="px-5 py-4 flex justify-between items-center gap-x-4">
    <div>
      <h2 class="inline-block font-semibold text-sm sm:text-base text-gray-800 dark:text-neutral-200">
        Exam centers
      </h2>
    </div>
  </div>

  <!-- Body -->
  <div class="border-t border-gray-200 dark:border-neutral-700">
    <div
      x-data="{
        query: '',
        healthFilter: 'all',
        sortKey: 'name',
        sortDir: 'asc',
        rows: [
          { id: 1, name: 'Downtown Test Center', address: '123 Main St, Chennai', contactName: 'Raj Kumar', contactPhone: '+91 98765 43210', allocated: 832, total: 900, attendancePct: 92.4, verifiedPct: 88.1, online: true, clientNodes: '10/10', battery: 85 },
          { id: 2, name: 'North Campus Hub', address: '45 College Rd, Bangalore', contactName: 'Priya S.', contactPhone: '+91 87654 32109', allocated: 650, total: 700, attendancePct: 85.2, verifiedPct: 79.3, online: true, clientNodes: '10/10', battery: 72 },
          { id: 3, name: 'South Zone Centre', address: '78 MG Rd, Hyderabad', contactName: 'Anil M.', contactPhone: '+91 76543 21098', allocated: 450, total: 500, attendancePct: 0, verifiedPct: 0, online: false, clientNodes: '0/10', battery: 5 }
        ],
        setSort(key, dir) {
          this.sortKey = key
          this.sortDir = dir
        },
        barColor(pct) {
          if (pct >= 70) return 'bg-green-500 dark:bg-green-600'
          if (pct >= 40) return 'bg-amber-500 dark:bg-amber-600'
          return 'bg-red-500 dark:bg-red-600'
        },
        batteryColor(battery) {
          if (battery >= 50) return 'text-green-600 dark:text-green-400'
          if (battery >= 20) return 'text-amber-600 dark:text-amber-400'
          return 'text-red-600 dark:text-red-400'
        },
        get filteredRows() {
          let list = this.rows
          const q = this.query.trim().toLowerCase()
          if (q) list = list.filter(r => r.name.toLowerCase().includes(q))
          if (this.healthFilter === 'healthy') list = list.filter(r => r.online)
          if (this.healthFilter === 'needs_attention') list = list.filter(r => !r.online)
          return list
        },
        get sortedRows() {
          const dir = this.sortDir === 'asc' ? 1 : -1
          const key = this.sortKey
          return [...this.filteredRows].sort((a, b) => {
            if (key === 'name') return (a.name.localeCompare(b.name)) * dir
            if (key === 'allocated' || key === 'total') return (a[key] - b[key]) * dir
            if (key === 'attendancePct' || key === 'verifiedPct') return (a[key] - b[key]) * dir
            return 0
          })
        }
      }"
      class="p-5 space-y-4">
      <div class="grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5">
        <div>
          <div class="relative">
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
              <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </svg>
            </div>
            <input type="text" name="q" x-model="query" class="py-[7px] ps-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder-neutral-500" placeholder="Search center">
          </div>
        </div>
        <div class="flex md:justify-end items-center gap-x-2">
          <div class="hs-dropdown [--auto-close:true] relative inline-flex">
            <button id="hs-centers-health-filter" type="button" class="py-1.5 sm:py-2 px-2.5 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-neutral-200 shadow-xs hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-none focus:ring-2 focus:ring-emerald-500" aria-haspopup="menu" aria-expanded="false" aria-label="Filter by health">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg>
              <span x-text="healthFilter === 'all' ? 'All' : healthFilter === 'healthy' ? 'Healthy' : 'Needs attention'"></span>
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical" aria-labelledby="hs-centers-health-filter">
              <div class="p-1">
                <button type="button" @click="healthFilter = 'all'" class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700">All</button>
                <button type="button" @click="healthFilter = 'healthy'" class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700">Healthy</button>
                <button type="button" @click="healthFilter = 'needs_attention'" class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700">Needs attention</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="min-w-full inline-block align-middle">
          <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
            <thead>
              <tr class="border-t border-gray-200 dark:border-neutral-700">
                <th scope="col" class="min-w-[180px]">
                  <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                    <button id="hs-centers-sort-name" type="button" class="whitespace-nowrap px-4 py-3 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                      Center Name
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu" aria-labelledby="hs-centers-sort-name">
                      <div class="p-1">
                        <button type="button" @click="setSort('name','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort ascending</button>
                        <button type="button" @click="setSort('name','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort descending</button>
                      </div>
                    </div>
                  </div>
                </th>
                <th scope="col" class="min-w-28">
                  <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                    <button id="hs-centers-sort-capacity" type="button" class="whitespace-nowrap px-4 py-3 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                      Capacity
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu" aria-labelledby="hs-centers-sort-capacity">
                      <div class="p-1">
                        <button type="button" @click="setSort('allocated','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort ascending</button>
                        <button type="button" @click="setSort('allocated','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort descending</button>
                      </div>
                    </div>
                  </div>
                </th>
                <th scope="col" class="min-w-36">
                  <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                    <button id="hs-centers-sort-attendance" type="button" class="whitespace-nowrap px-4 py-3 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                      Attendance
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu">
                      <div class="p-1">
                        <button type="button" @click="setSort('attendancePct','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort ascending</button>
                        <button type="button" @click="setSort('attendancePct','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort descending</button>
                      </div>
                    </div>
                  </div>
                </th>
                <th scope="col" class="min-w-36">
                  <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                    <button id="hs-centers-sort-verified" type="button" class="whitespace-nowrap px-4 py-3 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                      Verified
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu" aria-labelledby="hs-centers-sort-verified">
                      <div class="p-1">
                        <button type="button" @click="setSort('verifiedPct','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort ascending</button>
                        <button type="button" @click="setSort('verifiedPct','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800">Sort descending</button>
                      </div>
                    </div>
                  </div>
                </th>
                <th scope="col" class="px-4 py-3 text-start text-sm font-normal text-gray-500 dark:text-neutral-400 whitespace-nowrap">Node health</th>
                <th scope="col" class="px-4 py-3 text-start text-sm font-normal text-gray-500 dark:text-neutral-400 whitespace-nowrap">Battery</th>
                <th scope="col" class="px-4 py-3 text-end text-sm font-normal text-gray-500 dark:text-neutral-400 whitespace-nowrap">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
              <template x-for="row in sortedRows" :key="row.id">
                <tr>
                  <td class="px-4 py-3 min-w-0">
                    <div class="flex items-center gap-x-1.5">
                      <span class="block font-medium text-gray-800 dark:text-neutral-200 truncate whitespace-nowrap" x-text="row.name"></span>
                      <div class="hs-dropdown [--auto-close:inside] [--placement:right] relative inline-flex shrink-0">
                        <button type="button" :id="'hs-center-info-' + row.id" class="text-gray-500 hover:text-gray-700 dark:text-neutral-400 dark:hover:text-neutral-300 focus:outline-none" aria-haspopup="menu" aria-expanded="false" aria-label="Center info">
                          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        </button>
                        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-72 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl p-4" role="menu" :aria-labelledby="'hs-center-info-' + row.id">
                          <div class="space-y-3">
                            <div class="flex items-start gap-x-3">
                              <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Address</p>
                              <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.address"></p>
                            </div>
                            <div class="flex items-start gap-x-3">
                              <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Contact name</p>
                              <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="row.contactName"></p>
                            </div>
                            <div class="flex items-center gap-x-3">
                              <p class="min-w-16 shrink-0 text-xs text-gray-500 dark:text-neutral-500">Contact number</p>
                              <div class="grow flex items-center gap-x-2">
                                <p class="text-sm text-gray-800 dark:text-neutral-200"><span :id="'copy-phone-' + row.id" x-text="row.contactPhone"></span></p>
                                <button type="button" class="js-clipboard [--is-toggle-tooltip:false] hs-tooltip shrink-0 inline-flex p-1 rounded text-gray-500 hover:bg-gray-100 dark:hover:bg-neutral-700" :data-clipboard-target="'#copy-phone-' + row.id" data-clipboard-action="copy" data-clipboard-success-text="Copied" title="Copy number">
                                  <svg class="size-3.5 js-clipboard-default" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                  <svg class="size-3.5 js-clipboard-success hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                                  <span class="js-clipboard-success-text sr-only">Copy</span>
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600 dark:text-neutral-400 tabular-nums" x-text="row.allocated + ' / ' + row.total"></td>
                  <td class="px-4 py-3">
                    <div class="flex items-center gap-2 min-w-[100px]">
                      <span class="text-xs text-gray-500 dark:text-neutral-500 tabular-nums shrink-0 w-9" x-text="row.attendancePct + '%'"></span>

                    </div>

                  <td class="px-4 py-3">

                        <svg x-show="!row.online" class="size-4 text-red-500 dark:text-red-400 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M12 20h.01"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><path d="M19 12.859a10 10 0 0 0-2.007-1.523"/><path d="M2 8.82a15 15 0 0 1 4.177-2.643"/><path d="M22 8.82a15 15 0 0 0-11.288-3.764"/><path d="m2 2 20 20"/></svg>
                        <span class="text-xs font-medium" :class="row.online ? 'text-emerald-700 dark:text-emerald-400' : 'text-red-700 dark:text-red-400'" x-text="row.online ? 'Online' : 'Offline'"></span>
                      </div>
                      <span class="text-[11px] text-gray-500 dark:text-neutral-400" x-text="row.clientNodes + ' client nodes'"></span>
                    </div>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap">
                    <div class="flex items-center gap-x-1.5">
                      <svg class="size-4 shrink-0" :class="batteryColor(row.battery)" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 14v-4"/><path d="M6 14v-4"/><rect x="2" y="6" width="16" height="12" rx="2"/></svg>
                      <span class="text-sm tabular-nums" :class="batteryColor(row.battery)" x-text="row.battery + '%'"></span>
                    </div>
                  </td>
                  <td class="px-4 py-3 whitespace-nowrap text-end">
                    <div class="flex items-center justify-end">
                      <a href="#" class="py-1.5 px-2 inline-flex items-center text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-xs hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">View center</a>
                    </div>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
