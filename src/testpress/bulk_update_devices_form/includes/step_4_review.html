<div class="space-y-6">
  <div>
    <h2 class="text-base font-semibold leading-7 text-gray-900">Impact Summary</h2>
    <p class="mt-1 max-w-2xl text-sm leading-6 text-gray-600">Please review the configuration before updating.</p>
  </div>

  <div class="divide-y divide-gray-100 border border-gray-200 rounded-2xl overflow-hidden bg-gray-50/30">
    <div class="p-4 sm:p-5 flex justify-between items-center group hover:bg-white transition-all">
      <div>
        <dt class="text-[11px] font-bold text-gray-400 uppercase tracking-widest border-0">Scope Selection</dt>
        <dd class="mt-1 text-sm font-bold text-gray-900" x-text="scope === 'all' ? 'Apply to ALL Courses' : (scope === 'selected' ? 'Apply to Selected' : 'Exclude Selected')"></dd>
      </div>
    </div>

    <div class="p-4 sm:p-5 flex justify-between items-center group hover:bg-white transition-all">
      <div>
        <dt class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Target Impact</dt>
        <dd class="mt-1 text-sm font-bold text-gray-900" x-text="scope === 'all' ? '98 Courses will be updated' : '3 Courses will be affected'"></dd>
      </div>
    </div>

    <div class="p-4 sm:p-5 flex justify-between items-center group hover:bg-white transition-all border-b-4 border-b-gray-100">
      <div>
        <dt class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Device Configuration</dt>
        <dd class="mt-1 text-sm font-bold text-gray-900 uppercase tracking-tighter flex gap-2">
            <template x-for="device in devices">
                <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-[10px]" x-text="device"></span>
            </template>
        </dd>
      </div>
    </div>

    <div class="p-6 bg-indigo-600/5 flex items-center justify-center">
        <p class="text-xs text-gray-500 font-medium text-center max-w-sm">
            By clicking confirm, you agree to update these courses immediately. This action cannot be undone instantly.
        </p>
    </div>
  </div>
</div>
