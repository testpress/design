<div class="space-y-6">
  <div>
    <h2 class="text-base font-semibold leading-7 text-gray-900">Device Configuration</h2>
    <p class="mt-1 max-w-2xl text-sm leading-6 text-gray-600">Select the platforms where the courses should be accessible.</p>
  </div>

  <div class="mt-6 border-t border-gray-100 divide-y divide-gray-100">
    <div class="sm:grid sm:grid-cols-3 sm:items-start sm:gap-4 sm:py-6 cursor-pointer hover:bg-gray-50/50 transition-all rounded-md px-2"
      @click="devices.includes('web') ? devices = devices.filter(d => d !== 'web') : devices.push('web')">
      <label class="block text-sm font-medium leading-6 text-gray-900 sm:pt-1.5">Web Browser</label>
      <div class="mt-2 sm:col-span-2 sm:mt-0 flex items-center gap-x-3">
        <input type="checkbox" value="web" x-model="devices" class="h-4 w-4 shrink-0 border-gray-300 rounded text-indigo-600 focus:ring-indigo-600">
        <span class="text-xs text-gray-500">Accessible via desktop and mobile browsers.</span>
      </div>
    </div>

    <div class="sm:grid sm:grid-cols-3 sm:items-start sm:gap-4 sm:py-6 cursor-pointer hover:bg-gray-50/50 transition-all rounded-md px-2"
      @click="devices.includes('mobile') ? devices = devices.filter(d => d !== 'mobile') : devices.push('mobile')">
      <label class="block text-sm font-medium leading-6 text-gray-900 sm:pt-1.5">Mobile Application</label>
      <div class="mt-2 sm:col-span-2 sm:mt-0 flex items-center gap-x-3">
        <input type="checkbox" value="mobile" x-model="devices" class="h-4 w-4 shrink-0 border-gray-300 rounded text-indigo-600 focus:ring-indigo-600">
        <span class="text-xs text-gray-500">Accessible via Android and iOS native apps.</span>
      </div>
    </div>

    <div class="sm:grid sm:grid-cols-3 sm:items-start sm:gap-4 sm:py-6 cursor-pointer hover:bg-gray-50/50 transition-all rounded-md px-2"
      @click="devices.includes('desktop') ? devices = devices.filter(d => d !== 'desktop') : devices.push('desktop')">
      <label class="block text-sm font-medium leading-6 text-gray-900 sm:pt-1.5">Desktop Application</label>
      <div class="mt-2 sm:col-span-2 sm:mt-0 flex items-center gap-x-3">
        <input type="checkbox" value="desktop" x-model="devices" class="h-4 w-4 shrink-0 border-gray-300 rounded text-indigo-600 focus:ring-indigo-600">
        <span class="text-xs text-gray-500">Accessible via Windows and macOS native apps.</span>
      </div>
    </div>
  </div>

  <div x-show="devices.length === 0" class="text-red-600 text-xs font-semibold animate-pulse">
    Please select at least one device to continue.
  </div>
</div>
