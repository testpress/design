<!-- Add Diary Entry Modal -->
<div id="hs-add-diary-entry" class="hs-overlay hidden size-full fixed top-0 inset-s-0 z-[99] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-add-diary-entry-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-neutral-800 border border-transparent rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
        <h2 id="hs-add-diary-entry-label" class="font-medium text-gray-800 dark:text-neutral-200">
          Add Diary Entry
        </h2>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-add-diary-entry">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="p-4 space-y-5">
          <!-- Input -->
          <div>
            <label for="entry-category" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
              Category <span class="text-red-600">*</span>
            </label>

            <div class="relative">
              <select id="entry-category" data-hs-select='{
                  "placeholder": "Select category...",
                  "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                  "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 sm:py-2.5 px-3 pe-9 flex items-center justify-between text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm text-gray-800 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200",
                  "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-gray-200 rounded-lg overflow-hidden overflow-y-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:bg-neutral-900 dark:border-neutral-700",
                  "optionClasses": "rounded-lg cursor-pointer hover:bg-gray-100 text-gray-900 cursor-default select-none relative py-2 pl-3 pr-3 dark:hover:bg-neutral-800 dark:text-neutral-200",
                  "optionTemplate": "<div class=\"flex items-start\"><div><div class=\"text-sm font-semibold text-gray-800 dark:text-neutral-200\" data-title></div><div class=\"text-xs text-gray-500 dark:text-neutral-500 whitespace-normal mt-0.5\" data-description></div></div><div class=\"ms-auto mt-0.5\"><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-4 text-emerald-600\" xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" fill=\"currentColor\" viewBox=\"0 0 16 16\"><path d=\"M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z\"/></svg></span></div></div>"
                }' class="hidden">
                <option value="">Select category...</option>
                <option value="SESSION_NOTE" data-hs-select-option='{
                  "description": "Use for notes from one-to-one sessions, mentorship calls, or student discussions."
                }'>Session Note</option>
                <option value="ACADEMIC_CONCERN" data-hs-select-option='{
                  "description": "Use for academic performance, weak areas, study progress, or exam-related observations."
                }'>Academic Concern</option>
                <option value="SUPPORT_ISSUE" data-hs-select-option='{
                  "description": "Use for payment issues, technical problems, platform support, or operational assistance."
                }'>Support Issue</option>
                <option value="FOLLOW_UP_REQUIRED" data-hs-select-option='{
                  "description": "Use when a future follow-up, callback, or review is required."
                }'>Follow-up Required</option>
                <option value="GENERAL_NOTE" data-hs-select-option='{
                  "description": "Use for general observations or notes that do not fit other categories."
                }'>General Note</option>
                <option value="STUDENT_GUIDANCE" data-hs-select-option='{
                  "description": "Use for motivational discussions, personal guidance, counselling, or career-related advice."
                }'>Student Guidance</option>
              </select>
              <div class="absolute top-1/2 end-3 -translate-y-1/2">
                <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-500 pointer-events-none" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </div>
            </div>
            <p class="mt-1.5 text-xs text-gray-500 dark:text-neutral-400">
              Identifies the type of student interaction being recorded.
            </p>
          </div>
          <!-- End Input -->

          <!-- Visibility Field -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
              Visibility <span class="text-red-600">*</span>
            </label>
            <div class="grid lg:grid-cols-2 gap-3 lg:gap-5">
              <!-- Checkbox -->
              <label for="visibility-internal" class="py-3 px-4 flex text-sm bg-white dark:bg-neutral-800 text-gray-800 dark:text-neutral-200 rounded-xl cursor-pointer ring-1 ring-gray-200 dark:ring-neutral-700 has-[:checked]:ring-2 has-[:checked]:ring-emerald-600 dark:has-[:checked]:ring-emerald-500">
                <input type="radio" id="visibility-internal" class="shrink-0 mt-0.5 bg-transparent border-gray-200 dark:border-neutral-700 text-emerald-600 dark:text-emerald-500 rounded-full focus:ring-0 focus:ring-offset-0 checked:bg-emerald-600 checked:border-emerald-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500" value="internal" name="entry_visibility" checked>
                <span class="grow px-4 space-y-1">
                  <span class="block font-medium">
                    Internal Only
                  </span>
                  <span class="block text-sm/6 text-gray-500 dark:text-neutral-400">
                    Only mentors and staff can see this note. Best for internal observations or sensitive context.
                  </span>
                </span>
              </label>
              <!-- End Checkbox -->
              <!-- Checkbox -->
              <label for="visibility-student" class="py-3 px-4 flex text-sm bg-white dark:bg-neutral-800 text-gray-800 dark:text-neutral-200 rounded-xl cursor-pointer ring-1 ring-gray-200 dark:ring-neutral-700 has-[:checked]:ring-2 has-[:checked]:ring-emerald-600 dark:has-[:checked]:ring-emerald-500">
                <input type="radio" id="visibility-student" class="shrink-0 mt-0.5 bg-transparent border-gray-200 dark:border-neutral-700 text-emerald-600 dark:text-emerald-500 rounded-full focus:ring-0 focus:ring-offset-0 checked:bg-emerald-600 checked:border-emerald-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500" value="student" name="entry_visibility">
                <span class="grow px-4 space-y-1">
                  <span class="block font-medium">
                    Visible to Student
                  </span>
                  <span class="block text-sm/6 text-gray-500 dark:text-neutral-400">
                    The student will be able to view this entry in their diary history.
                  </span>
                </span>
              </label>
              <!-- End Checkbox -->
            </div>
          </div>
          <!-- End Visibility Field -->
        </div>

      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2">
        <div class="flex-1 flex justify-end items-center gap-2">
          <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none" data-hs-overlay="#hs-add-diary-entry">
            Cancel
          </button>

          <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-emerald-600 dark:bg-emerald-500 border border-transparent text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-emerald-700 dark:hover:bg-emerald-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-emerald-700 dark:focus:bg-emerald-600" data-hs-overlay="#hs-add-diary-entry">
            Save entry
          </button>
        </div>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
<!-- End Add Diary Entry Modal -->
