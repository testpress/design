<div class="lg:sticky lg:top-0 z-20 bg-gray-100 dark:bg-neutral-900">
  <div class="h-5"></div>
  <div class="p-4 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-xs rounded-xl flex items-center justify-between gap-x-4">
    <!-- Left side: Filter & Sort Controls -->
    <div class="flex items-center gap-x-2">
      <!-- Filter Dropdown -->
      <div class="hs-dropdown relative inline-flex">
        <button id="filter-dropdown" type="button" class="hs-dropdown-toggle py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-none focus:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Filter selection">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4 text-gray-500 dark:text-neutral-400"><path d="M2 5h20"/><path d="M6 12h12"/><path d="M9 19h6"/></svg>
          <span class="hidden sm:inline" x-text="{
            'all': 'All entries',
            'SESSION_NOTE': 'Session Note',
            'ACADEMIC_CONCERN': 'Academic Concern',
            'SUPPORT_ISSUE': 'Support Issue',
            'FOLLOW_UP_REQUIRED': 'Follow-up Required',
            'STUDENT_GUIDANCE': 'Student Guidance',
            'GENERAL_NOTE': 'General Note'
          }[selectedFilter] || 'All entries'">All entries</span>
          <svg class="hidden sm:inline-block hs-dropdown-open:rotate-180 size-4 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>

        <div class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden min-w-48 bg-white shadow-md rounded-lg p-1 space-y-0.5 mt-2 dark:bg-neutral-800 dark:border dark:border-neutral-700 z-30" role="menu" aria-orientation="vertical" aria-labelledby="filter-dropdown">
          <button type="button" @click="selectedFilter = 'all'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'all' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            All entries
          </button>
          <button type="button" @click="selectedFilter = 'SESSION_NOTE'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'SESSION_NOTE' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Session Note
          </button>
          <button type="button" @click="selectedFilter = 'ACADEMIC_CONCERN'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'ACADEMIC_CONCERN' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Academic Concern
          </button>
          <button type="button" @click="selectedFilter = 'SUPPORT_ISSUE'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'SUPPORT_ISSUE' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Support Issue
          </button>
          <button type="button" @click="selectedFilter = 'FOLLOW_UP_REQUIRED'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'FOLLOW_UP_REQUIRED' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Follow-up Required
          </button>
          <button type="button" @click="selectedFilter = 'STUDENT_GUIDANCE'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'STUDENT_GUIDANCE' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Student Guidance
          </button>
          <button type="button" @click="selectedFilter = 'GENERAL_NOTE'" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="selectedFilter === 'GENERAL_NOTE' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            General Note
          </button>
        </div>
      </div>

      <!-- Sort Dropdown -->
      <div class="hs-dropdown relative inline-flex">
        <button id="sort-dropdown" type="button" class="hs-dropdown-toggle py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-none focus:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Sort order">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4 text-gray-500 dark:text-neutral-400"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>
          <span class="hidden sm:inline" x-text="sortOrder === 'recent' ? 'Recent first' : 'Oldest first'">Recent first</span>
          <svg class="hidden sm:inline-block hs-dropdown-open:rotate-180 size-4 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>

        <div class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden min-w-40 bg-white shadow-md rounded-lg p-1 space-y-0.5 mt-2 dark:bg-neutral-800 dark:border dark:border-neutral-700 z-30" role="menu" aria-orientation="vertical" aria-labelledby="sort-dropdown">
          <button type="button" @click="if (sortOrder !== 'recent') { sortOrder = 'recent'; Array.from($refs.feedContainer.children).reverse().forEach(c => $refs.feedContainer.appendChild(c)) }" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="sortOrder === 'recent' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Recent first
          </button>
          <button type="button" @click="if (sortOrder !== 'oldest') { sortOrder = 'oldest'; Array.from($refs.feedContainer.children).reverse().forEach(c => $refs.feedContainer.appendChild(c)) }" class="w-full flex items-center gap-x-3.5 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:hover:text-neutral-300 dark:focus:bg-neutral-700 text-left" :class="sortOrder === 'oldest' ? 'bg-gray-100 dark:bg-neutral-700 font-medium' : ''">
            Oldest first
          </button>
        </div>
      </div>
    </div>

    <!-- Right side: Add Entry Button -->
    <button type="button" class="inline-flex justify-center items-center gap-x-1.5 py-2 px-3 text-sm font-semibold rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 focus:outline-none focus:bg-emerald-700 dark:bg-emerald-500 dark:hover:bg-emerald-600 dark:focus:bg-emerald-600 whitespace-nowrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4">
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>
      <span>Add Entry</span>
    </button>
  </div>
</div>
