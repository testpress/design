      "https://esm.sh/v135/prosemirror-model@1.21.0/es2022/prosemirror-model.mjs": "https://esm.sh/v135/prosemirror-model@1.20.0/es2022/prosemirror-model.mjs",
      "https://esm.sh/v135/prosemirror-model@1.22.1/es2022/prosemirror-model.mjs": "https://esm.sh/v135/prosemirror-model@1.20.0/es2022/prosemirror-model.mjs",
      "https://esm.sh/v135/prosemirror-model@1.23.0/es2022/prosemirror-model.mjs": "https://esm.sh/v135/prosemirror-model@1.20.0/es2022/prosemirror-model.mjs",
      "https://esm.sh/v135/prosemirror-model@1.24.0/es2022/prosemirror-model.mjs": "https://esm.sh/v135/prosemirror-model@1.20.0/es2022/prosemirror-model.mjs",
      "https://esm.sh/v135/prosemirror-model@1.24.1/es2022/prosemirror-model.mjs": "https://esm.sh/v135/prosemirror-model@1.20.0/es2022/prosemirror-model.mjs"
    }

<script type="module">
  import { Editor } from 'https://esm.sh/@tiptap/core@2.11.0';
  import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.11.0';
  import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.11.0';
  import Paragraph from 'https://esm.sh/@tiptap/extension-paragraph@2.11.0';
  import Bold from 'https://esm.sh/@tiptap/extension-bold@2.11.0';
  import Underline from 'https://esm.sh/@tiptap/extension-underline@2.11.0';
  import Link from 'https://esm.sh/@tiptap/extension-link@2.11.0';
  import BulletList from 'https://esm.sh/@tiptap/extension-bullet-list@2.11.0';
  import OrderedList from 'https://esm.sh/@tiptap/extension-ordered-list@2.11.0';
  import ListItem from 'https://esm.sh/@tiptap/extension-list-item@2.11.0';
  import Blockquote from 'https://esm.sh/@tiptap/extension-blockquote@2.11.0';
  import Image from 'https://esm.sh/@tiptap/extension-image@2.11.0';

  const editorContainers = document.querySelectorAll('.tiptap-editor-container');

  editorContainers.forEach(container => {
    const editorContentDiv = container.querySelector('[data-hs-editor-content]');
    const initialContent = editorContentDiv ? editorContentDiv.innerHTML : '';

    const editor = new Editor({
      element: container.querySelector('[data-hs-editor-field]'),
      content: initialContent,
      editorProps: {
        attributes: {
          class: 'relative min-h-40 p-3'
        }
      },
      extensions: [
        StarterKit.configure({
          history: false
        }),
        Placeholder.configure({
          placeholder: 'Summarize the interaction, concerns, guidance, or follow-up actions.\n\nExample:\n• Student struggling with revision consistency\n• Recommended weekly study plan\n• Follow-up required after mock test',
          emptyNodeClass: 'before:text-gray-400'
        }),
        Paragraph.configure({
          HTMLAttributes: {
            class: 'text-sm text-gray-800 dark:text-neutral-200'
          }
        }),
        Bold.configure({
          HTMLAttributes: {
            class: 'font-bold'
          }
        }),
        Underline,
        Link.configure({
          HTMLAttributes: {
            class: 'inline-flex items-center gap-x-1 text-blue-600 decoration-2 hover:underline focus:outline-hidden focus:underline font-medium dark:text-white'
          }
        }),
        BulletList.configure({
          HTMLAttributes: {
            class: 'list-disc list-inside text-gray-800 dark:text-neutral-200'
          }
        }),
        OrderedList.configure({
          HTMLAttributes: {
            class: 'list-decimal list-inside text-gray-800 dark:text-neutral-200'
          }
        }),
        ListItem.configure({
          HTMLAttributes: {
            class: 'marker:text-sm'
          }
        }),
        Blockquote.configure({
          HTMLAttributes: {
            class: 'relative border-s-4 ps-4 sm:ps-6 border-gray-200 dark:border-neutral-700 sm:[&>p]:text-lg'
          }
        }),
        Image.configure({
          HTMLAttributes: {
            class: 'rounded-lg border border-gray-200 dark:border-neutral-700 h-48 w-auto'
          }
        })
      ]
    });

    const actions = [
      {
        id: '[data-hs-editor-bold]',
        fn: () => editor.chain().focus().toggleBold().run()
      },
      {
        id: '[data-hs-editor-italic]',
        fn: () => editor.chain().focus().toggleItalic().run()
      },
      {
        id: '[data-hs-editor-underline]',
        fn: () => editor.chain().focus().toggleUnderline().run()
      },
      {
        id: '[data-hs-editor-strike]',
        fn: () => editor.chain().focus().toggleStrike().run()
      },
      {
        id: '[data-hs-editor-link]',
        fn: () => {
          const url = window.prompt('URL');
          if (url) editor.chain().focus().extendMarkRange('link').setLink({ href: url }).run();
        }
      },
      {
        id: '[data-hs-editor-ol]',
        fn: () => editor.chain().focus().toggleOrderedList().run()
      },
      {
        id: '[data-hs-editor-ul]',
        fn: () => editor.chain().focus().toggleBulletList().run()
      },
      {
        id: '[data-hs-editor-blockquote]',
        fn: () => editor.chain().focus().toggleBlockquote().run()
      },
      {
        id: '[data-hs-editor-code]',
        fn: () => editor.chain().focus().toggleCode().run()
      },
      {
        id: '[data-hs-editor-image]',
        fn: () => {
          const fileInput = container.querySelector('.hs-editor-tiptap-file-input');
          if (fileInput) fileInput.click();
        }
      },
      {
        id: '[data-hs-editor-attachment]',
        fn: () => {
          const attachmentInput = container.querySelector('.hs-editor-tiptap-attachment-input');
          if (attachmentInput) attachmentInput.click();
        }
      }
    ];

    const fileInput = container.querySelector('.hs-editor-tiptap-file-input');
    if (fileInput) {
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            editor.chain().focus().setImage({ src: event.target.result }).run();
          };
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      });
    }

    const attachmentInput = container.querySelector('.hs-editor-tiptap-attachment-input');
    if (attachmentInput) {
      attachmentInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const fileUrl = URL.createObjectURL(file);
          editor.chain().focus().insertContent(`<a href="${fileUrl}">📎 ${file.name}</a> `).run();
        }
        e.target.value = '';
      });
    }

    actions.forEach(({ id, fn }) => {
      const action = container.querySelector(id);
      if (action) action.addEventListener('click', fn);
    });
  });


</script>
