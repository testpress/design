{% if content.type == "VIDEO" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center">
    <img src="{{'/img/content_thumbnails/video.png'|url}}" alt="Video" class="w-16 h-10 object-cover rounded" />
  </div>
{% elif content.type == "EXAM" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center">
    <img src="{{'/img/content_thumbnails/exam.png'|url}}" alt="Exam" class="w-16 h-10 object-cover rounded" />
  </div>
{% elif content.type == "ZOOM" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center items-center bg-gray-100 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded">
    <i data-lucide="video" class="w-4 h-4 text-gray-500 dark:text-neutral-400"></i>
  </div>
{% elif content.type == "NOTES" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center items-center bg-gray-100 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded">
    <i data-lucide="file-text" class="w-4 h-4 text-gray-500 dark:text-neutral-400"></i>
  </div>
{% elif content.type == "PDF" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center">
    <img src="{{'/img/content_thumbnails/pdf.png'|url}}" alt="PDF" class="w-16 h-10 object-cover rounded" />
  </div>
{% elif content.type == "ATTACHMENT" %}
  <div class="relative w-16 h-10 flex flex-shrink-0 mt-0.5 justify-center items-center bg-gray-100 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded">
    <i data-lucide="paperclip" class="w-4 h-4 text-gray-500 dark:text-neutral-400"></i>
  </div>
{% endif %}
