<!-- Fixed Bottom Panel for Mobile -->
<div class="fixed bottom-0 inset-x-0 z-[60] bg-white dark:bg-neutral-900 border-t border-gray-200 dark:border-neutral-700 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] flex flex-col transition-all duration-300"
     x-data="{ activeTab: 'chat', isExpanded: false }"
     :class="isExpanded ? 'h-[75vh]' : 'h-[60px]'">
  
  <!-- Tab Strip (Always visible) -->
  <div class="shrink-0 h-[60px] px-4 flex items-center justify-between border-b border-gray-50 dark:border-neutral-800">
    <nav class="flex space-x-6 overflow-x-auto [&::-webkit-scrollbar]:hidden py-1">
      <button @click="activeTab = 'chat'; isExpanded = true" 
              :class="activeTab === 'chat' ? 'text-emerald-600' : 'text-gray-400'"
              class="flex flex-col items-center gap-y-0.5 focus:outline-none min-w-[50px]">
        <svg class="size-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 0 1-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-tight">AI Chat</span>
      </button>
      <button @click="activeTab = 'transcript'; isExpanded = true" 
              :class="activeTab === 'transcript' ? 'text-emerald-600' : 'text-gray-400'"
              class="flex flex-col items-center gap-y-0.5 focus:outline-none min-w-[50px]">
        <svg class="size-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-tight">Transcript</span>
      </button>
      <button @click="activeTab = 'mcq'; isExpanded = true" 
              :class="activeTab === 'mcq' ? 'text-emerald-600' : 'text-gray-400'"
              class="flex flex-col items-center gap-y-0.5 focus:outline-none min-w-[50px]">
        <svg class="size-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9l2 2 4-4" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-tight">MCQ</span>
      </button>
      <button @click="activeTab = 'notes'; isExpanded = true" 
              :class="activeTab === 'notes' ? 'text-emerald-600' : 'text-gray-400'"
              class="flex flex-col items-center gap-y-0.5 focus:outline-none min-w-[50px]">
        <svg class="size-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5m-1.414-9.414a2 2 0 1 1 2.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        <span class="text-[10px] font-bold uppercase tracking-tight">Notes</span>
      </button>
    </nav>
    
    <!-- Expanded/Collapse Toggle -->
    <button @click="isExpanded = !isExpanded" 
            class="size-8 rounded-full bg-gray-50 dark:bg-neutral-800 flex items-center justify-center text-gray-500">
      <svg class="size-4 transform transition-transform duration-300" :class="isExpanded ? 'rotate-180' : ''" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
      </svg>
    </button>
  </div>

  <!-- Content (Visible when expanded) -->
  <div class="flex-1 overflow-hidden relative flex flex-col" x-show="isExpanded" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
     
    <!-- Chat Content -->
    <div x-show="activeTab === 'chat'" class="h-full flex flex-col">
       <div class="flex-1 overflow-y-auto p-4 space-y-4">
          <div class="flex">
            <div class="bg-gray-100 dark:bg-neutral-800 rounded-2xl px-4 py-2 text-sm text-gray-800 dark:text-neutral-200 max-w-[90%] font-medium">
              Introduction to SEO Basics. How can I help?
            </div>
          </div>
          <div class="flex justify-end">
            <div class="bg-emerald-600 text-white rounded-2xl px-4 py-2 text-sm max-w-[90%] font-medium">
              Explain user intent.
            </div>
          </div>
       </div>
       <!-- Chat Input -->
       <div class="p-4 border-t bg-white dark:bg-neutral-950">
          <div class="relative flex items-center bg-gray-50 dark:bg-neutral-900 rounded-full px-4 py-2">
            <input type="text" class="flex-1 bg-transparent border-none focus:ring-0 text-sm dark:text-neutral-200" placeholder="Ask AI...">
            <button class="bg-emerald-600 text-white p-1.5 rounded-full ml-2">
              <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 19V5m-7 7l7-7 7 7"/></svg>
            </button>
          </div>
       </div>
    </div>

    <!-- Transcript Content -->
    <div x-show="activeTab === 'transcript'" class="h-full overflow-y-auto p-4">
      <div class="space-y-4">
        <div class="flex gap-x-3 p-3 bg-gray-50 dark:bg-neutral-800/50 rounded-xl">
          <span class="text-emerald-600 font-bold text-xs mt-0.5">00:15</span>
          <p class="text-sm text-gray-800 dark:text-neutral-200 font-medium">Starting with SEO...</p>
        </div>
        <div class="flex gap-x-3 p-3 rounded-xl border border-gray-100 dark:border-neutral-800">
          <span class="text-emerald-600 font-bold text-xs mt-0.5">01:02</span>
          <p class="text-sm text-gray-800 dark:text-neutral-200 font-medium">User intent is everything.</p>
        </div>
      </div>
    </div>

    <!-- MCQ Content -->
    <div x-show="activeTab === 'mcq'" class="h-full overflow-y-auto p-4 bg-gray-50 dark:bg-neutral-900 shadow-inner rounded-t-3xl">
       <div class="bg-white dark:bg-neutral-800 p-5 rounded-3xl shadow-sm border border-gray-100 dark:border-neutral-700">
          <p class="text-sm font-bold mb-4">What defines 'User Intent' in search?</p>
          <div class="space-y-2">
            <button class="w-full text-left p-3 rounded-xl border-2 border-emerald-600 bg-emerald-50 text-emerald-800 text-sm font-semibold">The goal of the searcher</button>
            <button class="w-full text-left p-3 rounded-xl border-2 border-gray-100 text-gray-600 text-sm font-medium">The speed of search</button>
          </div>
       </div>
       <button class="w-full mt-4 py-3 bg-emerald-600 text-white rounded-2xl font-bold text-sm">Generate Quiz</button>
    </div>

    <!-- Notes Content -->
    <div x-show="activeTab === 'notes'" class="h-full overflow-y-auto p-4">
       <div class="prose prose-sm dark:prose-invert">
          <h4>Key Notes</h4>
          <ul>
            <li>Focus on high-intent keywords.</li>
            <li>Maintain site speed for better ranking.</li>
          </ul>
       </div>
    </div>

  </div>
</div>
