<div class="mt-8 flex items-center justify-end gap-x-6">
  <button type="button"
    class="text-sm font-semibold leading-6 text-gray-900 flex items-center gap-x-2 disabled:opacity-50 disabled:pointer-events-none transition-all"
    @click="prevStep()"
    data-hs-stepper-back-btn=""
    x-show="currentStep > 1 && currentStep < 5">
    Previous
  </button>
  
  <button type="button" 
    class="inline-flex justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:opacity-50 disabled:pointer-events-none transition-all"
    @click="nextStep()"
    data-hs-stepper-next-btn=""
    x-show="currentStep < 4"
    :disabled="currentStep === 3 && devices.length === 0"
    >
    Save and Next
  </button>

  <button type="button" 
    class="inline-flex justify-center rounded-md bg-indigo-600 px-6 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:opacity-50 disabled:pointer-events-none transition-all"
    @click="goToStep(1)"
    data-hs-stepper-finish-btn=""
    x-show="currentStep === 4">
    Confirm & Update
  </button>
</div>
