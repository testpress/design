<div class="space-y-6">
  <div>
    <h2 class="text-base font-semibold leading-7 text-gray-900">Course Selection</h2>
    <p class="mt-1 max-w-2xl text-sm leading-6 text-gray-600" x-text="scope === 'all' ? 'Reviewing full-scale application.' : 'Search and select specific courses.'"></p>
  </div>

  <div x-show="scope === 'all'" x-transition class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 dark:bg-indigo-800/10 dark:border-indigo-900">
    <div class="flex">
      <div class="shrink-0 text-indigo-600">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="ms-3">
        <p class="text-sm font-bold text-indigo-800">Applying to all courses</p>
        <p class="text-sm text-indigo-700 mt-1">This will update all active courses in the system (98 total). You don't need to select individual courses for this scope.</p>
      </div>
    </div>
  </div>


  <div x-show="scope !== 'all'" x-transition class="mt-6 border-t border-gray-100">
    <div class="sm:grid sm:grid-cols-3 sm:items-start sm:gap-4 sm:py-6">
      <label class="block text-sm font-medium leading-6 text-gray-900 sm:pt-1.5">Search and Add Courses</label>
      <div class="mt-2 sm:col-span-2 sm:mt-0 relative w-full">

        <select multiple data-hs-select='{
            "placeholder": "Select courses...",
            "wrapperClasses": "hs-select-active:ring-1 hs-select-active:ring-indigo-500 pe-9 rounded-md flex items-center flex-wrap text-nowrap w-full text-start text-sm border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 hs-select-active:dark:outline-none hs-select-active:dark:ring-1 hs-select-active:dark:ring-gray-600",
            "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
            "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative flex text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-md text-start text-sm focus:bg-gray-100 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
            "dropdownClasses": "mt-2 z-50 w-full max-h-48 p-1 space-y-0.5 bg-white rounded-md overflow-hidden overflow-y-auto shadow-xl dark:bg-neutral-900",
            "optionClasses": "hs-selected:bg-gray-100 dark:hs-selected:bg-neutral-800 py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-md focus:outline-none focus:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 dark:text-neutral-200 dark:focus:bg-neutral-800",
            "mode": "tags",
            "tagsClasses": "relative ps-0.5 pe-9 min-h-[46px] flex items-center flex-wrap text-nowrap w-full border border-gray-200 rounded-md text-start text-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-neutral-900 dark:text-neutral-400 transition-all",
            "tagsItemTemplate": "<div class=\"flex flex-nowrap items-center relative z-10 bg-white border border-gray-200 rounded-full py-1 px-2 m-1 dark:bg-neutral-900 dark:border-neutral-700 shadow-sm\"><div class=\"whitespace-nowrap ms-1 text-xs font-bold text-gray-700\" data-title></div><div class=\"inline-flex shrink-0 justify-center items-center size-5 ms-2 rounded-full text-gray-500 bg-gray-100 hover:bg-gray-200 cursor-pointer\" data-remove><svg class=\"shrink-0 size-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"/><path d=\"m6 6 12 12\"/></svg></div></div>",
            "tagsInputClasses": "py-2 px-4 grow order-1 text-sm bg-transparent rounded-md focus-visible:outline-none dark:bg-neutral-800 dark:text-neutral-400 focus:outline-none focus:ring-0 border-0"
          }' class="hidden">
          {% for course in courses %}
          <option value="{{course.id}}">{{course.name}}</option>
          {% endfor %}
        </select>
        <div class="absolute top-1/2 end-2.5 -translate-y-1/2">
          <svg class="shrink-0 size-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
        </div>
      </div>
    </div>
    
  </div>
</div>
