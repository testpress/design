<div class="space-y-6">
  <div>
    <h2 class="text-base font-semibold leading-7 text-gray-900">Define Target Scale</h2>
    <p class="mt-1 max-w-2xl text-sm leading-6 text-gray-600">Select the scope of courses you want to update.</p>
  </div>

  <div class="mt-6 space-y-4">
    <label class="relative flex p-4 border rounded-md cursor-pointer focus:outline-none transition-all" 
      :class="scope === 'all' ? 'border-indigo-600 bg-indigo-50/50 ring-1 ring-indigo-600' : 'border-gray-200 hover:bg-gray-50'">
      <input type="radio" name="scope" value="all" class="sr-only" @change="setScope('all')">
      <div class="flex items-center justify-between w-full">
        <div class="flex items-center">
          <div class="text-sm font-medium text-gray-900">Apply to All Courses</div>
        </div>
        <div x-show="scope === 'all'" class="shrink-0 text-indigo-600">
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
        </div>
      </div>
    </label>

    <label class="relative flex p-4 border rounded-md cursor-pointer focus:outline-none transition-all"
      :class="scope === 'selected' ? 'border-indigo-600 bg-indigo-50/50 ring-1 ring-indigo-600' : 'border-gray-200 hover:bg-gray-50'">
      <input type="radio" name="scope" value="selected" class="sr-only" @change="setScope('selected')">
      <div class="flex items-center justify-between w-full">
        <div class="flex items-center">
          <div class="text-sm font-medium text-gray-900">Apply to Selected Courses</div>
        </div>
         <div x-show="scope === 'selected'" class="shrink-0 text-indigo-600">
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
        </div>
      </div>
    </label>

    <label class="relative flex p-4 border rounded-md cursor-pointer focus:outline-none transition-all"
      :class="scope === 'excluded' ? 'border-indigo-600 bg-indigo-50/50 ring-1 ring-indigo-600' : 'border-gray-200 hover:bg-gray-50'">
      <input type="radio" name="scope" value="excluded" class="sr-only" @change="setScope('excluded')">
      <div class="flex items-center justify-between w-full">
        <div class="flex items-center">
          <div class="text-sm font-medium text-gray-900">Apply to All Except Selected</div>
        </div>
         <div x-show="scope === 'excluded'" class="shrink-0 text-indigo-600">
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
        </div>
      </div>
    </label>
  </div>
</div>
