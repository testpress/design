<!-- daily_question_section.html -->
<div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Section Header -->
  <div class="border-b border-gray-200 dark:border-neutral-700 pb-5">
    <div class="flex flex-wrap justify-between items-center gap-4">
      <div>
        <h3 class="text-lg font-semibold text-gray-800 dark:text-neutral-200">
          Daily Questions
        </h3>
        
        <!-- Metadata Stats List -->
        <ul class="flex flex-wrap items-center whitespace-nowrap gap-2 mt-2">
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            <span class="flex items-center gap-x-1">
              <svg class="shrink-0 size-3 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
              <span class="font-bold text-gray-800 dark:text-neutral-200" x-text="activeData.questions.length">3</span>
              <span>questions generated</span>
            </span>
          </li>
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            <span class="flex items-center gap-x-1">
              <svg class="shrink-0 size-3 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span class="font-bold text-gray-800 dark:text-neutral-200" x-text="activeData.stats.attempted">42</span>
              <span>students attempted</span>
            </span>
          </li>
          <li class="inline-flex items-center">
            <span class="inline-flex items-center gap-x-1.5 py-0.5 px-2 rounded-full text-[10px] font-medium transition-colors"
                  :class="activeData.stats.type === 'auto' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-800'">
              <span class="size-1 rounded-full" :class="activeData.stats.type === 'auto' ? 'bg-emerald-600' : 'bg-amber-600'"></span>
              <span x-text="activeData.stats.label">Auto-generated</span>
            </span>
          </li>
        </ul>
      </div>

      <!-- Header Actions: Tabs + Add Question -->
      <div class="flex items-center gap-x-3">
        <!-- Tab Navigation (Boxed Style) -->
        <nav class="flex p-1 bg-gray-100 rounded-lg dark:bg-neutral-900" aria-label="Tabs" role="tablist">
          <button type="button" @click="activeTab = 'today'" class="hs-tab-active:bg-white hs-tab-active:text-emerald-600 hs-tab-active:shadow-sm py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium text-gray-500 rounded-md hover:text-gray-700 focus:outline-none dark:hs-tab-active:bg-neutral-800 dark:hs-tab-active:text-emerald-500 active" id="questions-tab-item-1" aria-selected="true" data-hs-tab="#questions-tab-today" aria-controls="questions-tab-today" role="tab">
            Today — May 6
          </button>
          <button type="button" @click="activeTab = 'tomorrow'" class="hs-tab-active:bg-white hs-tab-active:text-emerald-600 hs-tab-active:shadow-sm py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium text-gray-500 rounded-md hover:text-gray-700 focus:outline-none dark:hs-tab-active:bg-neutral-800 dark:hs-tab-active:text-emerald-500" id="questions-tab-item-2" aria-selected="false" data-hs-tab="#questions-tab-tomorrow" aria-controls="questions-tab-tomorrow" role="tab">
            Tomorrow — May 7
          </button>
        </nav>

        <!-- Add Question Button -->
        <button @click="openAddModal()" type="button" class="py-2 px-3 inline-flex items-center gap-x-1.5 text-sm font-semibold rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm disabled:opacity-50 disabled:pointer-events-none focus:outline-none transition-colors">
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Add Question
        </button>
      </div>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="mt-3">
    <div id="questions-tab-today" role="tabpanel" aria-labelledby="questions-tab-item-1">
      {% include "./daily_questions.html" %}
    </div>
    <div id="questions-tab-tomorrow" class="hidden" role="tabpanel" aria-labelledby="questions-tab-item-2">
      {% include "./daily_questions.html" %}
    </div>
  </div>
</div>
