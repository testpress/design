<!-- header.html -->
<div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
  
  <!-- Title Header -->
  <div class="pb-5 mb-5 border-b dark:border-neutral-700">
    <div class="flex flex-wrap justify-between items-center gap-3">
      <div class="grow">
        <div class="flex items-center space-x-2">
          <h2 class="text-xl font-semibold text-gray-800 dark:text-neutral-200" x-text="configName">
            Foundation Batch Daily
          </h2>
          <template x-if="status === 'active'">
            <span class="inline-flex items-center gap-x-1.5 rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-medium text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400">
              <span class="size-1.5 rounded-full bg-emerald-600 dark:bg-emerald-500"></span>
              Active
            </span>
          </template>
        </div>
        <!-- Metadata List -->
        <ul class="flex flex-wrap items-center whitespace-nowrap gap-2 mt-1.5">
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            <span class="flex items-center gap-x-1">
              <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Applicable for:
              <span class="font-medium text-gray-800 dark:text-neutral-200">Batch A, Batch B</span>
            </span>
          </li>
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            Updated on Mar 25, 2025
          </li>
        </ul>
        <!-- End Metadata List -->
      </div>

      <div class="flex items-center gap-x-2">
        <button type="button" @click="saveChanges()"
          class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none">
          Save Changes
        </button>
      </div>
    </div>
  </div>

  <!-- Configuration Form -->
  {% include "./config_form.html" %}
</div>
