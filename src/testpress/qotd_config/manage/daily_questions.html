<div class="overflow-hidden">


  <div>
    <template x-for="(question, qIndex) in activeData.questions" :key="question.id || qIndex">
      <div class="py-6">
        <!-- Question Row -->
        <div class="flex items-start justify-between mb-5">
          <div class="flex items-start flex-1 pr-4">
            <span class="text-[15px] font-bold text-gray-900 dark:text-white mr-2" x-text="`${qIndex + 1}.` "></span>
            <p class="text-[15px] text-gray-800 font-medium dark:text-neutral-200 leading-relaxed" x-text="question.text">
              Question text loading...
            </p>
          </div>

          <!-- Actions Dropdown (End of Question Right Corner) -->
          <div class="flex shrink-0">
            <div class="hs-dropdown [--placement:bottom-right] relative inline-flex">
              <button :id="'hs-dropdown-actions-' + qIndex" type="button" class="hs-dropdown-toggle flex justify-center items-center size-8 text-sm font-semibold rounded-lg bg-white border border-gray-200 text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-none disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                <svg class="flex-none size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>

              <div class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden min-w-[140px] bg-white border border-gray-200 rounded-lg shadow-md mt-2 z-10 dark:bg-neutral-800 dark:border-neutral-700" :aria-labelledby="'hs-dropdown-actions-' + qIndex" role="menu">
                <div class="p-1 space-y-0.5">
                  <button data-hs-overlay="#replace-question-modal" @click="replacingIndex = qIndex" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none dark:text-neutral-300 dark:hover:bg-neutral-700" role="menuitem">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                    Replace 
                  </button>
                  <button @click="editQuestion(question.id)" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none dark:text-neutral-300 dark:hover:bg-neutral-700" role="menuitem">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                    Edit
                  </button>
                  <div class="my-1 border-t border-gray-100 dark:border-neutral-700"></div>
                  <button @click="deleteQuestion(question.id)" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-red-600 hover:bg-red-50 focus:outline-none dark:text-red-500 dark:hover:bg-red-900/20" role="menuitem">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    Delete
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Options List (Minimalist Round Circle Style) -->
        <div class="grid grid-cols-1 gap-y-5 ml-6">
          <template x-for="(option, index) in question.options" :key="index">
            <div class="flex items-center group">
              <!-- Round Option Badge -->
              <div 
                class="flex shrink-0 justify-center items-center size-8 rounded-full text-sm font-medium uppercase transition-colors border"
                :class="index === question.correctIndex
                  ? 'bg-emerald-500 border-emerald-500 text-white shadow-sm'
                  : 'bg-white border-gray-200 text-gray-600 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400'">
                <span x-text="String.fromCharCode(65 + index)"></span>
              </div>
              
              <!-- Option Text -->
              <div 
                class="ml-3 text-[14px] transition-colors"
                :class="index === question.correctIndex
                  ? 'text-gray-900 font-semibold dark:text-white'
                  : 'text-gray-600 dark:text-neutral-400'">
                <span x-text="option">Option text</span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</div>
