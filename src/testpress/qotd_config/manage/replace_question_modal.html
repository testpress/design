<script>
  (function () {
    /**
     * Strategy: Keep the dropdown ALWAYS open, even before the modal is shown.
     * Since the modal element is hidden (display:none / visibility), the open dropdown
     * is invisible. When the modal opens, the layout is already settled at full height
     * so the animation plays smoothly with zero flicker.
     */
    function initPermanentlyOpenDropdown() {
      const modal = document.querySelector('#replace-question-modal');
      const select = document.querySelector('#question-search-select');
      if (!modal || !select) return;

      // Poll until Preline has initialized the HSSelect instance
      const initInterval = setInterval(() => {
        const instance = window.HSSelect?.getInstance(select);
        if (!instance) return;
        clearInterval(initInterval);

        // Permanently patch close() to a no-op — dropdown must never close
        instance.close = function () { /* permanently open */ };

        // Open immediately so layout is settled before modal ever appears
        instance.open();

        // Blur the search input so it isn't auto-selected on open
        setTimeout(() => {
          instance.dropdown?.querySelector('input')?.blur();
        }, 50);

        // On modal close: reset search input so next open starts fresh
        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.attributeName === 'class') {
              const nowClosed = modal.classList.contains('hidden');
              if (nowClosed) {
                const searchInput = instance.dropdown?.querySelector('input');
                if (searchInput) {
                  searchInput.value = '';
                  searchInput.dispatchEvent(new Event('input', { bubbles: true }));
                }
              }
            }
          }
        });
        observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
      }, 50);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initPermanentlyOpenDropdown);
    } else {
      initPermanentlyOpenDropdown();
    }
  })();
</script>
