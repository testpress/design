<script>
  function useBookmarkFilter() {
  return {
    selectedType: null, // null means "All Bookmarks"
    selectedFolderId: 'all', // 'all', 'uncategorized', or folder.id
    sortOrder: 'recent',
    showFolderModal: false,
    categories: [
      { "id": "questions", "name": "Questions" },
      { "id": "videos", "name": "Videos" },
      { "id": "pdfs", "name": "PDFs" },
      { "id": "notes", "name": "Notes" },
      { "id": "exams", "name": "Exams and Quiz" },
      { "id": "live", "name": "Live Classes" }
    ],
    folders: [
      { id: 1, name: "UPSC Prelims - GS Concept Maps", count: 42 },
      { id: 2, name: "JEE Advanced Physics - Formula Sheets", count: 18 },
      { id: 3, name: "NEET Biology - Animal Kingdom Tricks", count: 25 },
      { id: 4, name: "Organic Chemistry - Reaction Mechanisms", count: 14 },
      { id: 5, name: "Data Structures - Interview Questions", count: 31 },
      { id: 6, name: "Indian Polity - Article Summaries", count: 22 },
      { id: 7, name: "Quant - Percentage Shortcuts", count: 19 },
      { id: 8, name: "Logical Reasoning - Puzzle Collections", count: 12 },
      { id: 9, name: "Verbal Ability - Root Word Lists", count: 27 },
      { id: 10, name: "Mock Test 1 - Doubt Questions", count: 9 },
      { id: 11, name: "GATE CS - OS Process Management", count: 16 },
      { id: 12, name: "Current Affairs - Jan 2026", count: 38 }
    ],

    setType(id) {  
      this.selectedType = id;
    },

    isSelected(id) {
      if (id === null) return this.selectedType === null;
      return this.selectedType === id;
    },

    getSelectedLabel() {
      if (this.selectedType === null) return 'All contents';
      const cat = this.categories.find(c => c.id === this.selectedType);
      return cat ? cat.name : 'All contents';
    },

    setFolder(id) {
      this.selectedFolderId = id;
    },

    isFolderSelected(id) {
      return this.selectedFolderId === id;
    },

    setSort(order) {
      this.sortOrder = order;
    },

    getSortLabel() {
        return this.sortOrder === 'recent' ? 'Recent' : 'Oldest';
    },

    getFolderLabel() {
        if (this.selectedFolderId === 'all') return 'All Bookmarks';
        if (this.selectedFolderId === 'uncategorized') return 'Uncategorized';
        const folder = this.folders.find(f => f.id === this.selectedFolderId);
        return folder ? folder.name : 'All Bookmarks';
    },

    getAllBookmarkCount() {
        return this.folders.reduce((acc, folder) => acc + folder.count, 0) + 8; // Including uncategorized
    }
  };
}
</script>
