<aside class="hidden w-80 shrink-0 border-r border-gray-200 lg:order-first lg:flex lg:flex-col relative z-20 h-[calc(100vh-4rem)] sticky top-16">
        <div class="shrink-0 px-6 pt-6 pb-[1.60rem] flex justify-between items-center sticky top-0 bg-white dark:bg-neutral-900 z-10 border-b border-gray-200 dark:border-neutral-800">
          <h2 class="text-lg font-medium text-gray-900 dark:text-neutral-200">Folders</h2>
          
          <!-- Add Folder Tooltip -->
          <div class="hs-tooltip [--placement:bottom] inline-block">
            <button @click="showAddFolderModal = true; console.log('Sidebar Add Folder Button Clicked')" type="button" class="hs-tooltip-toggle flex justify-center items-center size-7 text-sm text-gray-500 hover:bg-gray-100 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-[100] py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded shadow-sm dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300" role="tooltip">
              Add folder
            </span>
          </div>
        </div>

        {% include "./folder_list.html" %}
