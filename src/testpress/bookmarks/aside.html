      <aside class="hidden w-96 shrink-0 border-r border-gray-200 xl:order-first xl:flex xl:flex-col relative z-20 h-[calc(100vh-4rem)] sticky top-16">
        <div class="px-6 pt-6 pb-4 flex justify-between items-center sticky top-0 bg-white dark:bg-neutral-900 z-10 border-b border-gray-200 dark:border-neutral-800">
          <h2 class="text-lg font-medium text-gray-900 dark:text-neutral-200">Folders</h2>
          
          <!-- Add Folder Tooltip -->
          <div class="hs-tooltip [--placement:bottom] inline-block">
            <button type="button" class="hs-tooltip-toggle flex justify-center items-center size-7 text-sm text-gray-500 hover:bg-gray-100 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-[100] py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded shadow-sm dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300" role="tooltip">
              Add folder
            </span>
          </div>
        </div>
        <!-- Directory list (Scrollbar visible only on hover) -->
        <nav aria-label="Directory" class="min-h-0 flex-1 overflow-y-auto [&::-webkit-scrollbar]:w-0 hover:[&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-thumb]:bg-gray-300 [&::-webkit-scrollbar-thumb]:rounded-full dark:[&::-webkit-scrollbar-thumb]:bg-neutral-700 transition-all">
          <div class="relative">
            <ul role="list" class="relative z-0 divide-y divide-gray-100 dark:divide-neutral-800">
              <!-- All Bookmarks -->
              <li @click="setFolder('all')" class="relative flex items-center space-x-3 px-6 py-4 focus-within:ring-2 focus-within:ring-primary-500 focus-within:ring-inset hover:bg-gray-50 dark:hover:bg-neutral-800 cursor-pointer" :class="isFolderSelected('all') && 'bg-primary-50 dark:bg-primary-900/10'">
                <div class="shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 text-primary-500">
                    <path d="M19.5 21a3 3 0 003-3v-4.5a3 3 0 00-3-3h-15a3 3 0 00-3 3V18a3 3 0 003 3h15zM1.5 10.146V6a3 3 0 013-3h5.379a2.25 2.25 0 011.59.659l2.122 2.121c.14.141.331.22.53.22H19.5a3 3 0 013 3v1.146A4.483 4.483 0 0019.5 9h-15a4.483 4.483 0 00-3 1.146z"></path>
                  </svg>
                </div>
                <div class="min-w-0 flex-1">
                  <div class="focus:outline-hidden">
                    <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">All Bookmarks</p>
                    <p class="truncate text-xs text-gray-500 dark:text-neutral-500" x-text="getAllBookmarkCount() + ' contents'"></p>
                  </div>
                </div>
              </li>

              <!-- Uncategorized -->
              <li @click="setFolder('uncategorized')" class="relative flex items-center space-x-3 px-6 py-4 focus-within:ring-2 focus-within:ring-primary-500 focus-within:ring-inset hover:bg-gray-50 dark:hover:bg-neutral-800 cursor-pointer" :class="isFolderSelected('uncategorized') && 'bg-primary-50 dark:bg-primary-900/10'">
                <div class="shrink-0">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 text-gray-400">
                    <path d="M19.5 21a3 3 0 003-3v-4.5a3 3 0 00-3-3h-15a3 3 0 00-3 3V18a3 3 0 003 3h15zM1.5 10.146V6a3 3 0 013-3h5.379a2.25 2.25 0 011.59.659l2.122 2.121c.14.141.331.22.53.22H19.5a3 3 0 013 3v1.146A4.483 4.483 0 0019.5 9h-15a4.483 4.483 0 00-3 1.146z"></path>
                  </svg>
                </div>
                <div class="min-w-0 flex-1">
                  <div class="focus:outline-hidden">
                    <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">Uncategorized</p>
                    <p class="truncate text-xs text-gray-500 dark:text-neutral-500">8 contents</p>
                  </div>
                </div>
              </li>

              <!-- Divider -->
              <li class="px-6 py-2 bg-gray-50 dark:bg-neutral-800/50">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">My Collections</span>
              </li>

              <!-- Dynamic Folders -->
              <template x-for="folder in folders" :key="folder.id">
                <li @click="setFolder(folder.id)" class="relative flex items-center space-x-3 px-6 py-4 focus-within:ring-2 focus-within:ring-primary-500 focus-within:ring-inset hover:bg-gray-50 dark:hover:bg-neutral-800 cursor-pointer" :class="isFolderSelected(folder.id) && 'bg-primary-50 dark:bg-primary-900/10'">
                  <div class="shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8 text-yellow-500/80">
                      <path d="M19.5 21a3 3 0 003-3v-4.5a3 3 0 00-3-3h-15a3 3 0 00-3 3V18a3 3 0 003 3h15zM1.5 10.146V6a3 3 0 013-3h5.379a2.25 2.25 0 011.59.659l2.122 2.121c.14.141.331.22.53.22H19.5a3 3 0 013 3v1.146A4.483 4.483 0 0019.5 9h-15a4.483 4.483 0 00-3 1.146z"></path>
                    </svg>
                  </div>
                  <div class="min-w-0 flex-1">
                    <div class="focus:outline-hidden">
                      <p class="text-sm font-medium text-gray-900 dark:text-neutral-200 line-clamp-1" x-text="folder.name"></p>
                      <p class="truncate text-xs text-gray-500 dark:text-neutral-500 text-nowrap" x-text="folder.count + ' contents'"></p>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </nav>
      </aside>
