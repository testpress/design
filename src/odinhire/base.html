<!doctype html>
<html class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title | default("OdinHire") }}</title>

  <!-- Isolated Tailwind v4 build for Odinhire -->
  <link rel="stylesheet" href="/css/odinhire.css" />

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/clipboard@2.0.11/dist/clipboard.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] {
      display: none !important;
    }

    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <script>
    (function () {
      const html = document.querySelector('html');
      const isLightOrAuto = localStorage.getItem('hs_theme') === 'light' || (localStorage.getItem('hs_theme') === 'auto' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
      const isDarkOrAuto = localStorage.getItem('hs_theme') === 'dark' || (localStorage.getItem('hs_theme') === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isLightOrAuto && html.classList.contains('dark')) html.classList.remove('dark');
      else if (isDarkOrAuto && html.classList.contains('light')) html.classList.remove('light');
      else if (isDarkOrAuto && !html.classList.contains('dark')) html.classList.add('dark');
      else if (isLightOrAuto && !html.classList.contains('light')) html.classList.add('light');
    })();
  </script>
  {% block extra_head %}{% endblock %}
</head>

  <body x-data="{ 
    mobileMenuOpen: false, 
    searchOpen: false, 
    previewPath: window.location.pathname.match(/(\/pr-preview\/pr-\d+)?/)[0] || '',
    isDark: localStorage.getItem('hs_theme') === 'dark' || (!localStorage.getItem('hs_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches) 
  }" x-init="$watch('isDark', val => { 
    const theme = val ? 'dark' : 'light';
    localStorage.setItem('hs_theme', theme);
    if (val) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  })"
  class="{% block body_class %}bg-background-1 text-foreground transition-colors duration-300 antialiased min-h-screen flex flex-col{% endblock %}">

  {% include "./includes/header.html" %}

  <main id="content" class="grow pt-15 flex flex-col">
    <div class="grow flex flex-col max-w-[85rem] w-full p-4 sm:p-5 md:pt-5 lg:px-8 mx-auto">
      {% block content %}{% endblock %}
    </div>
  </main>

  <div x-cloak>
    {% include "./includes/search-modal.html" %}
  </div>




  {% block extra_scripts %}{% endblock %}
</body>

</html>
