<!doctype html>
<html class="h-full" data-theme="theme-odinhire">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default("OdinHire") }}</title>
    
    <!-- Isolated Tailwind v4 build for Odinhire -->
    <link rel="stylesheet" href="/css/odinhire.css" />
    
    <!-- Required Scripts -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/src/odinhire/node_modules/preline/dist/preline.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="{% block body_class %}bg-background text-foreground transition-colors duration-300 antialiased{% endblock %}">
  
  {% block header %}
  <!-- Navbar -->
  <header class="sticky top-0 z-50 flex w-full flex-wrap border-b border-border bg-navbar py-3 text-sm sm:flex-nowrap sm:justify-start">
    <nav class="mx-auto w-full max-w-[85rem] px-4 sm:flex sm:items-center sm:justify-between" aria-label="Global">
      <div class="flex items-center justify-between">
        <a class="flex-none text-xl font-semibold text-primary" href="#">OdinHire</a>
        <div class="sm:hidden">
          <button type="button" class="hs-collapse-toggle flex h-9 w-9 items-center justify-center rounded-lg border border-border text-foreground hover:bg-muted focus:bg-muted focus:outline-none" data-hs-collapse="#navbar-alignment" aria-controls="navbar-alignment" aria-label="Toggle navigation">
            <svg class="h-4 w-4 hs-collapse-open:hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="18" y2="18"/></svg>
            <svg class="hidden h-4 w-4 hs-collapse-open:block" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      </div>
      <div id="navbar-alignment" class="hs-collapse hidden grow basis-full overflow-hidden transition-all duration-300 sm:block">
        <div class="mt-5 flex flex-col gap-5 sm:mt-0 sm:flex-row sm:items-center sm:justify-end sm:ps-5">
          <a class="font-medium text-primary" href="#" aria-current="page">Product</a>
          <a class="font-medium text-foreground hover:text-primary transition-colors duration-200" href="#">Solutions</a>
          <a class="font-medium text-foreground hover:text-primary transition-colors duration-200" href="#">Pricing</a>
          <a class="font-medium text-foreground hover:text-primary transition-colors duration-200" href="#">Company</a>
          <button type="button" class="inline-flex items-center gap-x-2 rounded-lg border border-transparent bg-primary px-3 py-2 text-sm font-semibold text-primary-foreground hover:bg-primary-hover disabled:pointer-events-none disabled:opacity-50">
            Sign In
          </button>
        </div>
      </div>
    </nav>
  </header>
  {% endblock header %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block footer %}
  <footer class="mx-auto mt-auto w-full max-w-[85rem] px-4 py-10 sm:px-6 lg:px-8">
    <div class="grid grid-cols-2 gap-6 md:grid-cols-4 lg:grid-cols-5">
      <div class="col-span-full lg:col-span-1">
        <a class="flex-none text-xl font-semibold text-primary" href="#" aria-label="Brand">OdinHire</a>
      </div>
    </div>
    <div class="mt-5 border-t border-border pt-5 sm:flex sm:items-center sm:justify-between">
      <p class="text-sm text-muted-foreground">© 2026 Testpress. All rights reserved.</p>
    </div>
  </footer>
  {% endblock footer %}

  {% block extra_scripts %}{% endblock %}
</body>
</html>
