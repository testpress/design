<div x-show="searchOpen" 
     @keydown.escape.window="searchOpen = false" 
     class="fixed inset-0 z-[100] overflow-x-hidden overflow-y-auto" 
     x-cloak>
  
  <!-- Backdrop -->
  <div x-show="searchOpen" 
       x-transition:enter="ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 bg-black/60 backdrop-blur-sm" 
       @click="searchOpen = false"></div>

  <!-- Modal content -->
  <div x-show="searchOpen"
       x-transition:enter="ease-out duration-300"
       x-transition:enter-start="opacity-0 scale-95 -translate-y-4"
       x-transition:enter-end="opacity-100 scale-100 translate-y-0"
       x-transition:leave="ease-in duration-200"
       x-transition:leave-start="opacity-100 scale-100 translate-y-0"
       x-transition:leave-end="opacity-0 scale-95 -translate-y-4"
       class="relative sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center pointer-events-none">
    
    <div class="max-h-full relative w-full flex flex-col bg-overlay border border-overlay-line rounded-2xl pointer-events-auto shadow-2xl overflow-hidden">
      <!-- Input -->
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-4">
          <svg class="shrink-0 size-4 text-muted-foreground-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div class="border-b border-overlay-divider bg-layer">
          <input type="text" 
                 class="py-4 ps-11 pe-12 block w-full bg-transparent border-transparent rounded-t-2xl text-sm text-foreground placeholder:text-muted-foreground-1 focus:outline-hidden focus:ring-0" 
                 placeholder="Search or type a command" 
                 @keyup.enter="searchOpen = false"
                 x-init="if (searchOpen) $el.focus()">
        </div>
        <div class="absolute inset-y-0 end-0 flex items-center z-20 pe-2">
          <button @click="searchOpen = false" type="button" class="inline-flex shrink-0 justify-center items-center size-8 rounded-lg text-muted-foreground-1 hover:bg-muted-hover hover:text-foreground transition-colors">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      </div>
      <!-- End Input -->

      <!-- Body -->
      <div class="h-125 p-4 overflow-y-auto overflow-hidden">
        <div class="pb-4 mb-4 border-b border-overlay-divider">
          <span class="block mb-2 text-xs text-muted-foreground-1">Topics</span>
          <div class="flex flex-wrap gap-2">
            <a href="#" class="inline-flex items-center gap-x-1.5 text-xs text-layer-foreground bg-layer border border-layer-line hover:bg-muted-hover py-1.5 px-2.5 rounded-full">Inbox</a>
            <a href="#" class="inline-flex items-center gap-x-1.5 text-xs text-layer-foreground bg-layer border border-layer-line hover:bg-muted-hover py-1.5 px-2.5 rounded-full">Activity</a>
          </div>
        </div>

        <div class="pb-4">
          <span class="block mb-2 text-xs text-muted-foreground-1">Recent</span>
          <ul class="space-y-1">
            <li>
              <a href="#" class="flex items-center gap-x-3 p-2 rounded-lg hover:bg-muted-hover">
                <svg class="shrink-0 size-5 text-muted-foreground-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>
                <div class="grow">
                   <p class="text-sm text-foreground">Compose an email</p>
                </div>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
