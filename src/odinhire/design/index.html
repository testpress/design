{% extends "../base.html" %}

{% block content %}
<div class="grow flex flex-col justify-center max-w-3xl w-full mx-auto px-4 sm:px-6 lg:px-8" x-data="{ intent: '' }">
  <!-- Heading -->
  <div class="flex flex-col justify-center items-center mb-8">
    <h1 class="text-2xl sm:text-3xl text-center text-foreground ">
      What role are you hiring for?
    </h1>
    <div class="mt-3 text-center">
      <p class="text-sm sm:text-base text-muted-foreground-2">
        Describe the role, expectations, and key priorities. AI will generate a structured hiring plan based on your input.
      </p>
    </div>
  </div>
  <!-- Textarea -->
  <div class="bg-layer border border-gray-200 dark:border-neutral-800 rounded-2xl shadow-xs">
    <label for="hs-chat-autoheight-textarea-1" class="sr-only">Message</label>

    <div class="p-2">
      <textarea id="hs-chat-autoheight-textarea-1" rows="5" x-model="intent" class="py-2 px-2 block w-full bg-transparent border-transparent resize-none text-foreground text-sm md:text-base placeholder:text-gray-400 dark:placeholder:text-neutral-500 placeholder:text-sm focus:outline-hidden focus:border-transparent focus:ring-transparent disabled:opacity-50 disabled:pointer-events-none overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb" placeholder="e.g. We need a Senior React Developer who can design scalable frontend systems and optimize performance. Focus on system design and real-world problem solving." data-hs-textarea-auto-height=""></textarea>
    </div>
  </div>

  <div class="mt-6 flex justify-center">
    <button type="button" :disabled="intent.trim().length === 0" class="py-2 sm:py-2.5 px-3 sm:px-4 inline-flex items-center gap-x-2 text-xs sm:text-sm font-medium rounded-lg bg-primary border border-primary-line text-primary-foreground hover:bg-primary-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-primary-focus">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4"/><path d="M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      Generate Hiring Plan
    </button>
  </div>
  <!-- End Textarea -->
</div>
{% endblock content %}
