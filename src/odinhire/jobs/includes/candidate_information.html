<div class="bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl overflow-hidden p-5">
    <h2 class="font-medium text-gray-800 dark:text-neutral-200 mb-5">
        Applicant Information
    </h2>
    <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-2">
        <div class="sm:col-span-1">
            <dt class="text-sm text-gray-500">Application for</dt>
            <dd class="mt-1 text-sm text-gray-900 dark:text-neutral-200">{{ candidate.role or "Backend Developer" }}</dd>
        </div>
        <div class="sm:col-span-1">
            <dt class="text-sm text-gray-500">Email address</dt>
            <dd class="mt-1 text-sm text-gray-900 dark:text-neutral-200">{{ candidate.contact.email }}</dd>
        </div>
        <div class="sm:col-span-1">
            <dt class="text-sm text-gray-500">Salary expectation</dt>
            <dd class="mt-1 text-sm text-gray-900 dark:text-neutral-200">$120,000</dd>
        </div>
        <div class="sm:col-span-1">
            <dt class="text-sm text-gray-500">Phone</dt>
            <dd class="mt-1 text-sm text-gray-900 dark:text-neutral-200">{{ candidate.contact.phone }}</dd>
        </div>
        <div class="sm:col-span-2">
            <dt class="text-sm text-gray-500 mb-3">Attachments</dt>
            <dd>
                <ul role="list" class="divide-y divide-gray-100 rounded-md border border-gray-200 dark:divide-neutral-700 dark:border-neutral-700">
                    <li class="flex items-center justify-between py-3 px-4 text-sm">
                        <div class="flex w-0 flex-1 items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-4 shrink-0 text-gray-400">
                                <path fill-rule="evenodd" d="M15.621 4.379a3 3 0 0 0-4.242 0l-7 7a3 3 0 0 0 4.241 4.243h.001l.497-.5a.75.75 0 0 1 1.064 1.057l-.498.501-.002.002a4.5 4.5 0 0 1-6.364-6.364l7-7a4.5 4.5 0 0 1 6.368 6.36l-3.455 3.553A2.625 2.625 0 1 1 9.52 9.52l3.45-3.451a.75.75 0 1 1 1.061 1.06l-3.45 3.451a1.125 1.125 0 0 0 1.587 1.595l3.454-3.553a3 3 0 0 0 0-4.242Z" clip-rule="evenodd"></path>
                            </svg>
                            <span class="ml-2 w-0 flex-1 truncate text-gray-700 dark:text-neutral-300">resume.pdf</span>
                        </div>
                        <div class="ml-4 shrink-0">
                            <a href="#" class="font-medium text-emerald-600 hover:text-emerald-500">Download</a>
                        </div>
                    </li>
                </ul>
            </dd>
        </div>
    </dl>
</div>
