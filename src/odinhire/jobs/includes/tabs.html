<!-- Tabs Wrapper -->
<div class="border border-gray-200 bg-white px-4 rounded-xl">
  <nav class="-mb-px flex space-x-6">

    <!-- Overview Tab -->
    <button 
      @click="activeTab = 'overview'; document.dispatchEvent(new CustomEvent('tab-switched', { detail: { tab: 'overview' } }))"
      :class="activeTab === 'overview' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
      class="whitespace-nowrap border-b-2 px-1 py-4 text-sm font-semibold transition-all transition-colors duration-150">
      Overview
    </button>

    <!-- Skills Tab -->
    <button 
      @click="activeTab = 'skills'"
      :class="activeTab === 'skills' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
      class="whitespace-nowrap border-b-2 px-1 py-4 text-sm font-medium transition-all transition-colors duration-150">
      Skills
    </button>

    <!-- Behavior Tab -->
    <button 
      @click="activeTab = 'behavioral'"
      :class="activeTab === 'behavioral' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
      class="whitespace-nowrap border-b-2 px-1 py-4 text-sm font-medium transition-all transition-colors duration-150">
      Behavior
    </button>

    <!-- Transcript Tab -->
    <button 
      @click="activeTab = 'transcript'"
      :class="activeTab === 'transcript' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
      class="whitespace-nowrap border-b-2 px-1 py-4 text-sm font-medium transition-all transition-colors duration-150">
      Transcript
    </button>

  </nav>
</div>
