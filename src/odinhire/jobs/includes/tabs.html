<!-- Tabs Wrapper -->
<div x-data="{ tabs: [
    { id: 'overview', name: 'Overview' },
    { id: 'transcript', name: 'Transcript' },
    { id: 'activity', name: 'Activity' }
] }">
  <!-- Mobile select -->
  <div class="grid grid-cols-1 sm:hidden">
    <select aria-label="Select a tab" 
      @change="activeTab = $event.target.value"
      class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white py-2 pr-8 pl-3 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-primary dark:bg-neutral-800 dark:text-gray-100 dark:outline-neutral-700 dark:focus:outline-primary">
      <template x-for="tab in tabs" :key="tab.id">
        <option :value="tab.id" :selected="activeTab === tab.id" x-text="tab.name"></option>
      </template>
    </select>
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end fill-gray-500 dark:fill-gray-400">
      <path d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
    </svg>
  </div>

  <!-- Desktop tabs -->
  <div class="hidden sm:block">
    <div class="border-b border-gray-200 dark:border-white/10">
      <nav aria-label="Tabs" class="-mb-px flex space-x-8">
        <template x-for="tab in tabs" :key="tab.id">
          <button 
            @click="activeTab = tab.id; if(tab.id === 'overview') document.dispatchEvent(new CustomEvent('tab-switched', { detail: { tab: 'overview' } }))"
            class="whitespace-nowrap border-b-2 px-1 pb-4 text-sm font-medium transition-all transition-colors duration-150"
            :class="activeTab === tab.id 
              ? 'border-primary text-primary' 
              : 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 dark:text-gray-400 dark:hover:border-white/20 dark:hover:text-gray-200'"
            :aria-current="activeTab === tab.id ? 'page' : undefined"
            x-text="tab.name">
          </button>
        </template>
      </nav>
    </div>
  </div>
</div>
