<section aria-labelledby="timeline-title">
  <div class="bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl overflow-hidden shadow-xs p-5">
    <h2 id="timeline-title" class="font-medium text-gray-800 dark:text-neutral-200 mb-5">
      Timeline
    </h2>
    
    <div class="flow-root">
      <ul role="list" class="-mb-8">
        {% for event in candidate.timeline %}
        <li>
          <div class="relative pb-8">
            {% if not loop.last %}
            <span aria-hidden="true" class="absolute top-4 left-4 -ml-px h-full w-0.5 bg-gray-200 dark:bg-neutral-700"></span>
            {% endif %}
            <div class="relative flex space-x-3">
              <div>
                <span class="flex size-8 items-center justify-center rounded-full ring-8 ring-white dark:ring-neutral-800 
                  {% if event.type == 'application' %}bg-gray-400 dark:bg-neutral-600
                  {% elif event.type == 'advancement' %}bg-blue-500
                  {% elif event.type == 'completion' %}bg-emerald-500
                  {% else %}bg-gray-400{% endif %}">
                  
                  {% if event.type == 'application' %}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5 text-white">
                    <path d="M10 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM3.465 14.493a1.23 1.23 0 0 0 .41 1.412A9.957 9.957 0 0 0 10 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 0 0-13.074.003Z"></path>
                  </svg>
                  {% elif event.type == 'advancement' %}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5 text-white">
                    <path d="M1 8.25a1.25 1.25 0 1 1 2.5 0v7.5a1.25 1.25 0 1 1-2.5 0v-7.5ZM11 3V1.7c0-.268.14-.526.395-.607A2 2 0 0 1 14 3c0 .995-.182 1.948-.514 2.826-.204.54.166 1.174.744 1.174h2.52c1.243 0 2.261 1.01 2.146 2.247a23.864 23.864 0 0 1-1.341 5.974C17.153 16.323 16.072 17 14.9 17h-3.192a3 3 0 0 1-1.341-.317l-2.734-1.366A3 3 0 0 0 6.292 15H5V8h.963c.685 0 1.258-.483 1.612-1.068a4.011 4.011 0 0 1 2.166-1.73c.432-.143.853-.386 1.011-.814.16-.432.248-.9.248-1.388Z"></path>
                  </svg>
                  {% elif event.type == 'completion' %}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5 text-white">
                    <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd"></path>
                  </svg>
                  {% endif %}
                </span>
              </div>
              <div class="flex min-w-0 flex-1 justify-between space-x-4 pt-1.5">
                <div>
                  <p class="text-sm text-gray-500 dark:text-neutral-400">
                    {{ event.content | safe }}
                  </p>
                </div>
                <div class="text-right text-xs whitespace-nowrap text-gray-500 dark:text-neutral-500">
                  <time datetime="{{ event.datetime }}">{{ event.date }}</time>
                </div>
              </div>
            </div>
          </div>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</section>
