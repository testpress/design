<nav aria-label="Breadcrumb" class="flex"><ol role="list" class="flex items-center space-x-4"><li><div><a href="/odinhire/jobs/" class="text-sm font-medium text-gray-500 hover:text-gray-700">Jobs</a></div></li><li><div class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon" class="size-5 shrink-0 text-gray-400"><path fill-rule="evenodd" d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"></path></svg><a href="/odinhire/jobs/{{ job.id | slugify }}/" class="ml-4 text-sm font-medium text-gray-500 hover:text-gray-700">Senior Solutions Architect</a></div></li></ol></nav>
<div class="md:flex md:items-center md:justify-between md:space-x-5">
  <div class="flex items-center space-x-5">
    <div class="shrink-0">
      <div class="relative">
        <img alt="" src="https://images.unsplash.com/photo-1463453091185-61582044d556?ixlib=rb-=eyJhcHBfaWQiOjEyMDd9&amp;auto=format&amp;fit=facearea&amp;facepad=8&amp;w=1024&amp;h=1024&amp;q=80"
          class="size-16 rounded-full">
        <span aria-hidden="true" class="absolute inset-0 rounded-full shadow-inner"></span>
      </div>
    </div>
    <div>
 <div class="flex items-center gap-2">

  <h1 class="text-2xl font-bold text-gray-900">
    {{ candidate.name }}
  </h1>

  <span class="py-0.5 px-2 inline-flex items-center text-xs font-medium rounded-full

  {% if candidate.stage == 'Applied' %}
    bg-gray-100 text-gray-700
  {% elif candidate.stage == 'Screening' %}
    bg-orange-100 text-orange-700
  {% elif candidate.stage == 'Interviewing' %}
    bg-blue-100 text-blue-700
  {% elif candidate.stage == 'Shortlisted' %}
    bg-purple-100 text-purple-700
  {% elif candidate.stage == 'Offered' %}
    bg-teal-100 text-teal-700
  {% elif candidate.stage == 'Hired' %}
    bg-green-100 text-green-700
  {% elif candidate.stage == 'Rejected' %}
    bg-red-100 text-red-700
  {% endif %}
  ">
    {{ candidate.stage }}
  </span>

</div>
      <ul class="flex flex-wrap items-center whitespace-nowrap gap-1.5">
            <li class="inline-flex items-center relative text-sm font-medium text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
              <p class="text-sm font-medium text-gray-500">
               {{ candidate.headline }}
              </p>
            </li>
            <li class="inline-flex items-center relative text-sm font-medium text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
              <p class="text-sm font-medium text-gray-500">
                {{ candidate.experience_years }} years
              </p>
            </li>
            <li class="inline-flex items-center relative text-sm font-medium text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
              <p class="text-sm font-medium text-gray-500">
                {{ candidate.location }}
              </p>
            </li>
          </ul>
    </div>
  </div>
     {% if candidate.stage != "Rejected" %}
  <div
    class="mt-6 flex flex-c ol-reverse justify-stretch space-y-4 space-y-reverse sm:flex-row-reverse sm:justify-end sm:space-y-0 sm:space-x-3 sm:space-x-reverse md:mt-0 md:flex-row md:space-x-3">
<button type="button"
  class="inline-flex items-center justify-center rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm font-semibold text-red-700 hover:bg-red-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-600">
  Reject
</button>
      <button type="button" class="py-2 px-3 inline-flex items-center justify-center gap-x-2 text-sm font-medium rounded-md bg-primary border border-primary-line text-primary-foreground hover:bg-primary-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-primary-focus">
          <span>
        {% if candidate.stage == "Applied" %}
        Start Screening
        {% elif candidate.stage == "Screening" %}
        Move to Interview
        {% elif candidate.stage == "Interviewing" %}
        Shortlist
        {% elif candidate.stage == "Shortlisted" %}
        Send Offer
        {% elif candidate.stage == "Offered" %}
        Mark as Hired
        {% endif %}
      </span>
  </button>
  </div>
  {% endif %}
</div>
