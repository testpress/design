  <div x-data="roundsComponent([
    {% for round in job.rounds %}
      { 
        id: {{ round.round_id }}, 
        name: '{{ round.name }}', 
        type: '{% if round.type == 'AI_INTERVIEW' %}AI Automated{% elif round.type == 'TEST' %}Test{% elif round.type == 'ASSIGNMENT' %}Assignment{% else %}Live Interview{% endif %}',
        active: {{ round.counts.in_progress }}, 
        pending: {{ round.counts.assigned }} 
      }{% if not loop.last %},{% endif %}
    {% endfor %}
  ])" class="grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-5 mb-8">

    <template x-for="(round, index) in rounds" :key="round.id">
      
      <div
        class="p-5 flex flex-col bg-card border border-card-line rounded-xl shadow-xs cursor-move hover:shadow-md transition group"
        draggable="true"
        @dragstart="dragStart(index)"
        @dragover.prevent
        @drop="drop(index)"
        @click="openRound(round.id)"
        :class="draggedIndex === index ? 'opacity-50' : ''"
      >

        <!-- Header -->
        <div class="flex justify-between gap-x-3 items-start">
          <div class="grow">
            <!-- Title -->
            <div class="flex items-center gap-2 mb-1.5">
              <span class="flex items-center gap-1.5 font-medium text-lg text-foreground">
                <span class="text-muted-foreground-2" x-text="index + 1 + '.'"></span>
                <span x-text="round.name"></span>
              </span>
            </div>

            <div class="flex flex-col gap-y-0.5 mt-1.5">
              <span class="text-sm font-medium text-muted-foreground-1"
                x-text="round.type"
              ></span>
            </div>

            <!-- Stats in same line -->
            <div class="flex items-center gap-x-1.5 mt-4 pt-4 border-t border-card-line/50">
              <div class="flex items-center gap-x-1">
                <span class="text-sm leading-5 text-muted-foreground-1" x-text="round.active + ' Progress'"></span>
              </div>
              <span class="text-muted-foreground-3 opacity-30">•</span>
              <div class="flex items-center gap-x-1">
                <span class="text-sm leading-5 text-muted-foreground-1" x-text="round.pending + ' Pending'"></span>
              </div>
            </div>
          </div>

        </div>

      </div>

    </template>
  </div>

  <script>
  function roundsComponent(initialRounds) {
    return {
      draggedIndex: null,
      rounds: initialRounds,

      dragStart(index) {
        this.draggedIndex = index;
      },

      drop(index) {
        const item = this.rounds[this.draggedIndex];
        this.rounds.splice(this.draggedIndex, 1);
        this.rounds.splice(index, 0, item);
        this.draggedIndex = null;
      },

      openRound(id) {
        console.log("Open round:", id);
      }
    }
  }
  </script>
