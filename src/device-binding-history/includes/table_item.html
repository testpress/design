{% for history in device_binding_history %}
<tr>
  <td class="size-px whitespace-nowrap px-5 py-3">
    <div class="w-full flex items-center gap-x-3">
      <div class="grow flex space-x-2">
        <a class="text-sm text-stone-600 dark:text-neutral-400"
          href="#">
          {{ history.created_at }}
        </a>
      </div>
    </div>
  </td>
  <td class="size-px whitespace-nowrap px-4 py-3">
    <span class="text-sm text-stone-600 dark:text-neutral-400">
      {{ history.event_type }}
    </span>
  </td>
  <td class="size-px whitespace-nowrap px-4 py-1">
    <span class="text-sm text-stone-600 dark:text-neutral-400">
      {{ history.performed_by }}
    </span>
  </td>
  <td class="size-px whitespace-nowrap px-4 py-1">
    <span class="text-sm text-stone-600 dark:text-neutral-400">
      {{ history.device_type }}
    </span>
  </td>
  <td class="size-px whitespace-nowrap px-4 py-1">
    <span class="text-sm text-stone-600 dark:text-neutral-400">
      {{ history.device_uid }}
    </span>
  </td>
</tr>
{% endfor %}
