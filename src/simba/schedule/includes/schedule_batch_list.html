<div class="flex flex-col bg-white border border-stone-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
    <!-- Header -->
    <div class="py-3 px-5 flex justify-between items-center gap-x-5 border-b border-stone-200 dark:border-neutral-700">
      <h2 class="inline-block font-semibold text-stone-800 dark:text-neutral-200">
        Batches
      </h2>

    </div>
    <!-- End Header -->

   <!-- Orders Table Card -->
<div class="py-3 px-5 space-y-4 flex flex-col bg-white dark:bg-neutral-800">
    <div>
      <!-- Tab Content -->
      <div id="hs-pro-tabs-dut-all" role="tabpanel" aria-labelledby="hs-pro-tabs-dut-item-all">
        <!-- Table Section -->
        <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-stone-100 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
          <div class="min-w-full inline-block align-middle">
            <!-- Table -->
            <table class="border-t-0 min-w-full divide-y divide-stone-200 dark:divide-neutral-700">
              <thead>
                <tr class="">
                  <th scope="col" class="px-3 py-2.5 text-start">
                    
                  </th>
  
                  <th scope="col" class="min-w-36">
                    <!-- Sort Dropdown -->
                    <div class="hs-dropdown relative inline-flex w-full">
                      <button id="hs-pro-eptors" type="button" class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-stone-500 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                        Batch
                      </button>
                    </div>
                    <!-- End Sort Dropdown -->
                  </th>
  
                  <th scope="col">
                    <!-- Sort Dropdown -->
                    <div class="hs-dropdown relative inline-flex w-full">
                      <button id="hs-pro-eptprs" type="button" class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-stone-500 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                        Count
                      </button>
                    </div>
                    <!-- End Sort Dropdown -->
                  </th>
  
                  <th scope="col" class="min-w-36">
                    <!-- Sort Dropdown -->
                    <div class="hs-dropdown relative inline-flex w-full">
                      <button id="hs-pro-eptsts" type="button" class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-stone-500 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                        Course
                      </button>
                    </div>
                    <!-- End Sort Dropdown -->
                  </th>
  
                  <th scope="col" class="min-w-36">
                    <!-- Sort Dropdown -->
                    <div class="hs-dropdown relative inline-flex w-full">
                      <button id="hs-pro-eptcts" type="button" class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-stone-500 dark:text-neutral-500 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                        Class End Date
                      </button>
                    </div>
                    <!-- End Sort Dropdown -->
                  </th>
                  <th scope="col"></th>
                </tr>
              </thead>
  
              <tbody class="divide-y divide-stone-200 dark:divide-neutral-700">
                {% for batch in simba_batches %}
                <tr>
                  <td class="size-px whitespace-nowrap px-3 py-4">
                    <input type="checkbox" class="shrink-0 border-stone-300 rounded text-green-600 focus:ring-green-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-600 dark:checked:bg-green-500 dark:checked:border-green-500 dark:focus:ring-offset-neutral-800">
                  </td>
                  <td class="size-px whitespace-nowrap px-4 py-1">
                    <a class="text-sm text-green-600 decoration-2 hover:underline font-medium focus:outline-none focus:underline dark:text-green-400 dark:hover:text-green-500" href="../../pro/ecommerce/order-details.html">
                    {{batch.name}}
                    </a>
                  </td>
                  <td class="size-px whitespace-nowrap px-4 py-1">
                    <span class="text-sm text-stone-600 dark:text-neutral-400">
                      {{batch.count}}
                    </span>
                  </td>
                  <td class="size-px whitespace-nowrap px-4 py-1">
                    <span class="text-sm text-stone-600 dark:text-neutral-400">
                        {{batch.course}}
                    </span>
                  </td>
                  <td class="size-px whitespace-nowrap px-4 py-1">
                    <span class="text-sm text-stone-600 dark:text-neutral-400">
                        {{batch.class_end_date}}
                    </span>
                  </td>
                  <td class="size-px whitespace-nowrap px-4 py-1 text-end">
                    <div class="inline-flex">
                        <button type="button" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#hs-pro-dminvm">
                            View
                          </button>
                    </div>
                  </td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
            <p class="mt-5 text-center text-sm text-gray-500 dark:text-neutral-500">
              <span class="inline-flex items-center gap-x-2 text-sm text-gray-500 dark:text-neutral-500">
                <svg class="animate-spin shrink-0 size-4" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M24 12C24 18.6274 18.6274 24 12 24C5.37258 24 0 18.6274 0 12C0 5.37258 5.37258 0 12 0C18.6274 0 24 5.37258 24 12ZM3.13375 12C3.13375 16.8967 7.10331 20.8662 12 20.8662C16.8967 20.8662 20.8662 16.8967 20.8662 12C20.8662 7.10331 16.8967 3.13375 12 3.13375C7.10331 3.13375 3.13375 7.10331 3.13375 12Z" fill="currentColor" class="fill-gray-200 dark:fill-neutral-700"></path>
                  <path d="M12 0C9.62662 -2.83022e-08 7.30655 0.703788 5.33316 2.02236C3.35977 3.34094 1.8217 5.21509 0.913446 7.4078C0.00519403 9.60051 -0.232446 12.0133 0.230577 14.3411C0.693599 16.6689 1.83649 18.8071 3.51472 20.4853L5.73062 18.2694C4.49065 17.0294 3.64622 15.4496 3.30412 13.7297C2.96201 12.0098 3.13759 10.2271 3.80866 8.60703C4.47972 6.98694 5.61613 5.60222 7.07418 4.62798C8.53222 3.65375 10.2464 3.13375 12 3.13375L12 0Z" fill="currentColor" class="fill-gray-800 dark:fill-neutral-200"></path>
                </svg>
                Loading ...
              </span>
            </p>
            <!-- End Table -->
          </div>
        </div>
        <!-- End Table Section -->
      </div>
    </div>
  </div>

  <!-- End Orders Table Card -->
  </div>
