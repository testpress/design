<!-- Add Event Modal -->
<div id="hs-pro-daem" class="hs-overlay hidden size-full fixed top-0 start-0 z-80 overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-pro-daem-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-neutral-800 border border-Stone-200 dark:border-neutral-700 rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-Stone-200 dark:border-neutral-700">
        <h3 id="hs-pro-daem-label" class="font-semibold text-stone-800 dark:text-neutral-200">Add Follow-up Note</h3>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-Stone-100 dark:bg-neutral-700 text-Stone-800 dark:text-neutral-200 hover:bg-Stone-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-Stone-200 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-pro-daem">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-stone-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="p-4 space-y-5">
          <!-- Mentor summary -->
          <div>
            <div class="p-3.5 bg-stone-50 dark:bg-neutral-900 border border-stone-200 dark:border-neutral-700 rounded-lg">
              <div class="flex items-start gap-3">
                <img
                  class="shrink-0 size-12 rounded-full object-cover"
                  src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&auto=format&fit=facearea&facepad=2.5&w=320&h=320&q=80"
                  alt="Mentor avatar">
                <div class="min-w-0 flex-1 space-y-1">
                  <div class="flex items-center gap-2 flex-wrap">
                    <p class="text-sm font-semibold text-stone-800 dark:text-neutral-100">Chris Evans</p>
                    <span class="inline-flex items-center rounded-full px-2 py-0.5 text-[11px] font-medium bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-300">
                      At Risk
                    </span>
                  </div>
                  <div class="flex flex-wrap gap-x-3 gap-y-1">
                    <a href="tel:+919876543210" class="inline-flex items-center gap-1.5 text-xs text-stone-600 dark:text-neutral-300 hover:text-green-700 dark:hover:text-green-500">
                      <svg class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L8 9.8a16 16 0 0 0 6.2 6.2l1.34-1.28a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92z"/></svg>
                      +91 98765 43210
                    </a>
                    <a href="mailto:chris.evans@example.com" class="inline-flex items-center gap-1.5 text-xs text-stone-600 dark:text-neutral-300 hover:text-green-700 dark:hover:text-green-500 break-all">
                      <svg class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="m22 6-10 7L2 6"/></svg>
                      chris.evans@example.com
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Outcome -->
          <div>
            <label for="hs-pro-daem-outcome" class="block mb-2 text-sm font-medium text-stone-800 dark:text-neutral-200">
              Outcome
            </label>
            <select id="hs-pro-daem-outcome" name="follow_up_outcome" required aria-describedby="hs-pro-daem-outcome-help" data-hs-select='{
              "placeholder": "Choose an outcome",
              "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
              "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 sm:py-2.5 px-3 pe-9 flex text-nowrap w-full cursor-pointer bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-lg text-start text-sm text-stone-800 dark:text-white focus:outline-hidden focus:border-green-700 dark:focus:border-green-600 focus:z-10 focus:ring-1 focus:ring-green-700 dark:focus:ring-green-600",
              "dropdownClasses": "mt-2 z-50 w-full max-h-80 overflow-y-auto p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-stone-200 dark:border-neutral-700 rounded-xl shadow-xl [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-stone-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500",
              "optionClasses": "hs-selected:bg-stone-100 dark:hs-selected:bg-neutral-800 py-2 px-4 w-full text-sm text-stone-800 dark:text-neutral-200 cursor-pointer hover:bg-stone-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-hidden focus:bg-stone-100 dark:focus:bg-neutral-800",
              "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-stone-800 dark:text-neutral-200\" xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" fill=\"currentColor\" viewBox=\"0 0 16 16\"><path d=\"M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z\"/></svg></span></div>",
              "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2 pointer-events-none\"><svg class=\"shrink-0 size-3.5 text-stone-400 dark:text-neutral-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
            }' class="hidden">
              <option value="">Choose an outcome</option>
              {% for o in follow_up_outcomes %}
              <option value="{{ o.slug }}">{{ o.label }}</option>
              {% endfor %}
            </select>
            <p id="hs-pro-daem-outcome-help" class="mt-1.5 text-xs text-stone-500 dark:text-neutral-400">
              Select the outcome of this follow-up discussion to help track progress, pending commitments, escalations, and operational resolution status.
            </p>
          </div>

          <!-- Note -->
          <div>
            <label for="hs-pro-epii" class="block mb-2 text-sm font-medium text-stone-800 dark:text-neutral-200">
              Note
            </label>
            <textarea id="hs-pro-epii"
              class="py-2 sm:py-2.5 px-3 block w-full bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-lg sm:text-sm text-stone-800 dark:text-white placeholder:text-stone-500 dark:placeholder:text-neutral-400 focus:border-green-700 dark:focus:border-green-600 focus:z-10 focus:ring-1 focus:ring-green-700 dark:focus:ring-green-600"
              rows="4" placeholder="e.g., Called the mentor, discussed schedule and upcoming tasks. Mentor requested more resources." spellcheck="false"></textarea>
            <p class="mt-1.5 text-xs text-stone-500 dark:text-neutral-400">
              Briefly describe your interaction or any notes for the mentor.
            </p>
          </div>

          <!-- Optional task -->
          <div class="flex items-center gap-x-2 min-w-0">
            <input type="checkbox" class="shrink-0 size-4 bg-transparent border-stone-300 dark:border-neutral-600 rounded-sm shadow-2xs text-green-600 dark:text-green-500 focus:ring-0 focus:ring-offset-0 checked:bg-green-600 dark:checked:bg-green-500 checked:border-green-600 dark:checked:border-green-500 disabled:opacity-50 disabled:pointer-events-none" id="hs-pro-shcammdach">
            <label for="hs-pro-shcammdach" class="min-w-0 flex-1 text-sm text-stone-600 dark:text-neutral-400 inline-flex flex-nowrap items-center gap-x-1.5 overflow-x-auto sm:overflow-x-visible [scrollbar-width:thin]">
              <span class="shrink-0">Create a <strong class="font-medium text-stone-800 dark:text-neutral-200">task</strong> for the next follow-up on</span>
              <input type="date" value="2023-07-29" class="shrink-0 py-1.5 px-2 h-9 bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-lg text-sm text-stone-800 dark:text-white focus:outline-hidden focus:border-green-700 dark:focus:border-green-600 focus:ring-1 focus:ring-green-700 dark:focus:ring-green-600 w-36">
              <span class="shrink-0">at</span>
              <input type="time" value="09:00" class="shrink-0 py-1.5 px-2 h-9 bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-lg text-sm text-stone-800 dark:text-white focus:outline-hidden focus:border-green-700 dark:focus:border-green-600 focus:ring-1 focus:ring-green-700 dark:focus:ring-green-600 w-28">
            </label>
          </div>
        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2">
        <div class="flex-1 flex justify-end items-center gap-2">
          <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white dark:bg-neutral-800 border border-Stone-200 dark:border-neutral-700 text-Stone-800 dark:text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-Stone-50 dark:hover:bg-neutral-700 focus:outline-hidden focus:bg-Stone-50 dark:focus:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none" data-hs-overlay="#hs-pro-daem">
            Cancel
          </button>

          <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-green-600 dark:bg-green-500 border border-transparent text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-green-700 dark:hover:bg-green-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-green-700 dark:focus:bg-green-600" data-hs-overlay="#hs-pro-daem">
            Save
          </button>
        </div>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
<!-- End Add Event Modal -->
