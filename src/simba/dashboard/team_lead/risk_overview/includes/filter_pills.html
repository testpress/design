<!-- Grid -->
<div class="flex flex-wrap justify-between items-center gap-3">
  <div class="grow flex flex-wrap items-center gap-2">
    <button id="risk-filter-at-risk-only" type="button" data-active="false"
      class="hs-dropdown-toggle me-1 py-1 flex items-center gap-x-1 text-[13px] text-start text-stone-500 underline-offset-4 hover:underline disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:underline dark:text-neutral-500">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="21" x2="14" y1="4" y2="4" />
        <line x1="10" x2="3" y1="4" y2="4" />
        <line x1="21" x2="12" y1="12" y2="12" />
        <line x1="8" x2="3" y1="12" y2="12" />
        <line x1="21" x2="16" y1="20" y2="20" />
        <line x1="12" x2="3" y1="20" y2="20" />
        <line x1="14" x2="14" y1="2" y2="6" />
        <line x1="8" x2="8" y1="10" y2="14" />
        <line x1="16" x2="16" y1="18" y2="22" />
      </svg>
      Filters
    </button>

    <span id="risk-pill-status"
      class="hidden hs-removing:opacity-0 transition duration-300 p-1 ps-3 inline-flex items-center gap-1.5 bg-white border border-stone-200 text-stone-800 text-xs rounded-full dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700">
      <span class="font-medium">Status</span>
      <span class="h-3 mx-0.5 border-s border-stone-200 dark:border-neutral-700"></span>
      <span class="text-stone-500 dark:text-neutral-500">At Risk only</span>
      <button type="button" id="risk-pill-status-clear"
        class="inline-flex shrink-0 justify-center items-center size-5 ms-1 rounded-full text-stone-800 bg-stone-200 hover:bg-stone-300 focus:outline-hidden focus:bg-stone-300 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600 dark:text-neutral-400">
        <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </span>

    <span id="risk-pill-mentor"
      class="hidden hs-removing:opacity-0 transition duration-300 p-1 ps-3 inline-flex items-center gap-1.5 bg-white border border-stone-200 text-stone-800 text-xs rounded-full dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700">
      <span class="font-medium">Mentor</span>
      <span class="h-3 mx-0.5 border-s border-stone-200 dark:border-neutral-700"></span>
      <span id="risk-pill-mentor-value" class="text-stone-500 dark:text-neutral-500">{{
        team_lead_risk_overview.mentors[0].name }}</span>
      <button type="button" id="risk-pill-mentor-clear"
        class="inline-flex shrink-0 justify-center items-center size-5 ms-1 rounded-full text-stone-800 bg-stone-200 hover:bg-stone-300 focus:outline-hidden focus:bg-stone-300 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600 dark:text-neutral-400">
        <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </span>

    <span id="risk-pill-batch"
      class="hidden hs-removing:opacity-0 transition duration-300 p-1 ps-3 inline-flex items-center gap-1.5 bg-white border border-stone-200 text-stone-800 text-xs rounded-full dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700">
      <span class="font-medium">Batch</span>
      <span class="h-3 mx-0.5 border-s border-stone-200 dark:border-neutral-700"></span>
      <span id="risk-pill-batch-value" class="text-stone-500 dark:text-neutral-500">{{
        team_lead_risk_overview.batches[0].name }}</span>
      <button type="button" id="risk-pill-batch-clear"
        class="inline-flex shrink-0 justify-center items-center size-5 ms-1 rounded-full text-stone-800 bg-stone-200 hover:bg-stone-300 focus:outline-hidden focus:bg-stone-300 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600 dark:text-neutral-400">
        <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </span>

    <span id="risk-pill-reason"
      class="hidden hs-removing:opacity-0 transition duration-300 p-1 ps-3 inline-flex items-center gap-1.5 bg-white border border-stone-200 text-stone-800 text-xs rounded-full dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700">
      <span class="font-medium">Reason</span>
      <span class="h-3 mx-0.5 border-s border-stone-200 dark:border-neutral-700"></span>
      <span id="risk-pill-reason-value" class="text-stone-500 dark:text-neutral-500">{{
        team_lead_risk_overview.mentors[0].top_reason }}</span>
      <button type="button" id="risk-pill-reason-clear"
        class="inline-flex shrink-0 justify-center items-center size-5 ms-1 rounded-full text-stone-800 bg-stone-200 hover:bg-stone-300 focus:outline-hidden focus:bg-stone-300 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600 dark:text-neutral-400">
        <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </span>
  </div>

  <div class="flex flex-wrap justify-between items-center gap-3">
    <div class="relative min-h-7.5 inline-flex items-center">
      <span class="me-1 text-[13px] text-stone-500 dark:text-neutral-500">Sort By:</span>
      <select id="risk-sort-select" data-hs-select='{
          "placeholder": "Sort",
          "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
          "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-1 ps-1.5 pe-7 inline-flex shrink-0 justify-center items-center gap-x-1.5 border border-transparent text-sm text-stone-500 dark:text-neutral-400 rounded-lg underline-offset-4 hover:underline hover:text-stone-600 dark:hover:text-neutral-300 focus:outline-hidden focus:underline focus:text-stone-600 dark:focus:text-neutral-300 before:absolute before:inset-0 before:z-1",
          "dropdownClasses": "end-0 mt-2 p-1 z-20 w-64 bg-white dark:bg-neutral-900 border border-transparent rounded-xl shadow-xl",
          "optionClasses": "flex items-center gap-x-3 py-2 px-3 text-xs sm:text-[13px] text-stone-800 dark:text-neutral-200 hover:bg-stone-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-hidden focus:bg-stone-100 dark:focus:bg-neutral-800",
          "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-stone-800 dark:text-neutral-200\" xmlns=\"http:.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>",
          "extraMarkup": "<div class=\"absolute top-1/2 end-2 cursor-pointer -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-stone-800 dark:text-neutral-200\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"/></svg></div>"
        }' class="hidden">
        <option value="priority" selected>
          Priority (At Risk First)
        </option>
        <option value="followup_coverage_asc">
          Follow-up coverage (Low → High)
        </option>
        <option value="followup_coverage_desc">
          Follow-up coverage (High → Low)
        </option>
        <option value="attendance_asc">
          Attendance % (Low → High)
        </option>
        <option value="attendance_desc">
          Attendance % (High → Low)
        </option>
        <option value="score_asc">
          Average Score % (Low → High)
        </option>
        <option value="score_desc">
          Average Score % (High → Low)
        </option>
        <option value="review_asc">
          Avg Review (Low → High)
        </option>
        <option value="review_desc">
          Avg Review (High → Low)
        </option>
      </select>
    </div>
  </div>
</div>
<!-- End Grid -->
