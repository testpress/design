<!-- Header -->
<div class="flex gap-3">
  <!-- Icon -->
  <span
    class="flex shrink-0 justify-center items-center size-16 bg-stone-100 font-medium text-xl text-stone-800 uppercase rounded-full dark:bg-neutral-800 dark:text-neutral-200">
    <img class="shrink-0 size-16 rounded-full" src="{{ mentor.image_url }}" alt="{{ mentor.name }}'s Avatar">
    <!-- <span>LC</span> -->
  </span>
  <!-- End Icon -->

  <div class="grow">
    <div class="mt-1.5 flex flex-wrap items-center gap-y-3 gap-x-5">
      <div class="grow">
        <h1 class="font-medium text-xl text-stone-800 dark:text-neutral-200">
          {{ mentor.name }}
        </h1>


        <!-- List -->
        <ul class="mt-1 flex flex-wrap items-center gap-x-2">
          <li
            class="relative before:hidden md:before:inline-block first:before:hidden first:before:ms-0 before:content-['•'] before:text-stone-300 dark:before:text-neutral-500 before:me-1">
            <span class="text-sm text-stone-500 dark:text-neutral-500">
              Course:
            </span>
            <span class="font-medium text-sm text-stone-800 dark:text-neutral-200">
              {{ mentor.course }}
            </span>
          </li>
          <li
            class="relative before:hidden md:before:inline-block first:before:hidden first:before:ms-0 before:content-['•'] before:text-stone-300 dark:before:text-neutral-500 before:me-1">
            <span class="text-sm text-stone-500 dark:text-neutral-500">
              Joined on:
            </span>
            <span class="font-medium text-sm text-stone-800 dark:text-neutral-200">
              {{ mentor.joined_on }}
            </span>
          </li>
        </ul>
        <!-- End List -->
      </div>

      <!-- Button Group -->
      <div class="flex flex-wrap items-center gap-2">


        <!-- Button -->
        <div class="hs-tooltip inline-block">
          <a href="mailto:{{ mentor.email }}" rel="noopener" target="_blank"
            aria-label="Send email to {{ mentor.name }}"
            class="hs-tooltip-toggle size-8.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
            <span class="sr-only">Email</span>
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-stone-900 text-xs text-white rounded-lg dark:bg-neutral-700"
            role="tooltip">
            Send email to {{mentor.name}}
          </span>
        </div>
        <!-- End Button -->

        <!-- Button -->
        <div class="hs-tooltip inline-block">
          <a href="tel:{{ mentor.phone }}" rel="noopener" target="_blank" aria-label="Call {{ mentor.name }}"
            class="hs-tooltip-toggle size-8.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
            <span class="sr-only">Call</span>
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-stone-900 text-xs text-white rounded-lg dark:bg-neutral-700"
            role="tooltip">
            Call {{mentor.name}}
          </span>
        </div>
        <!-- End Button -->
        <!-- Dropdown Link -->
        <div class="hs-dropdown [--placement:bottom-right] relative inline-flex">
          <!-- Link -->
          <button id="hs-pro-pdmd" type="button"
            class="size-8.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
            aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
            <span class="sr-only">Customers</span>
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="1" />
              <circle cx="19" cy="12" r="1" />
              <circle cx="5" cy="12" r="1" />
            </svg>
          </button>
          <!-- End Link -->

          <!-- Dropdown Menu -->
          <div
            class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 z-10 transition-[opacity,margin] duration opacity-0 hidden bg-white rounded-xl shadow-lg dark:bg-neutral-950"
            role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-pdmd">
            <div class="p-1 space-y-0.5">
              <a class="relative group py-2 px-3 flex items-center gap-x-2.5 text-[13px] text-stone-800 hover:bg-stone-100 rounded-lg focus:outline-hidden focus:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                href="#">
                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                </svg>
                Download Report
              </a>
            </div>
          </div>
          <!-- End Dropdown Menu -->
        </div>
        <!-- End Dropdown Link -->
      </div>
      <!-- End Button Group -->
    </div>
  </div>
</div>
<!-- End Header -->
