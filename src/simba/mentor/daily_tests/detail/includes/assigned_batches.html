<div
  class="p-5 space-y-4 flex flex-col bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 shadow-xs rounded-xl overflow-hidden">
  <h3 class="text-base font-semibold text-stone-800 dark:text-neutral-200">
    Assigned batches
  </h3>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 md:gap-4">
    {% for batch in batch_stats %}
    <!-- Card -->
    <div
      class="mb-0.5 py-4 px-5 h-full flex flex-col bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl">
      <!-- Header -->
      <div class="mb-1.5 flex justify-between items-center">
        <h2 class="text-sm font-semibold text-stone-800 dark:text-neutral-200">
          {{batch.name}}
        </h2>


      </div>
      <!-- End Header -->

      <!-- List Group -->
      <div class="divide-y divide-dashed divide-stone-200 dark:divide-neutral-700">
        <!-- List Item -->
        <div class="flex flex-col">
          <!-- Legend Indicator List -->
          <div class="mb-3 flex flex-col gap-y-1">
            <!-- Legend Indicator -->
            <div class="flex items-center gap-2">
              <div class="grow">
                <div class="flex justify-between items-center gap-2">
                  <span class="block text-sm text-stone-600 dark:text-neutral-300">
                    Attempts
                  </span>
                  <span class="font-medium text-sm text-stone-800 dark:text-neutral-200">
                    {{batch.attempted}} / {{batch.total_students}}
                  </span>
                </div>
              </div>
            </div>
            <!-- End Legend Indicator -->
          </div>
          <!-- End Legend Indicator List -->

          <!-- Multiple Progress Bars -->
          <div class="flex w-full h-2 bg-stone-200 dark:bg-neutral-700 rounded-sm overflow-hidden">
            <div class="bg-green-600 dark:bg-green-500" role="progressbar" aria-valuenow="25.6" aria-valuemin="0"
              aria-valuemax="100" style="width: {{batch.attempted / batch.total_students * 100}}%"></div>
          </div>
          <!-- End Multiple Progress Bars -->
        </div>
        <!-- End List Item -->
        <!-- List Item -->
        <div class="pt-5 first:pt-0 flex flex-col">
          <!-- Legend Indicator List -->
          <div class="mb-3 flex flex-col gap-y-1">
            <!-- Legend Indicator -->
            <div class="flex items-center gap-2">
              <div class="grow">
                <div class="flex justify-between items-center gap-2">
                  <span class="block text-sm text-stone-600 dark:text-neutral-300">
                    Follow-up coverage
                  </span>
                  <span class="font-medium text-sm text-stone-800 dark:text-neutral-200">
                    {{batch.followed_up}} / {{batch.not_attempted}}
                  </span>
                </div>
              </div>
            </div>
            <!-- End Legend Indicator -->
          </div>
          <!-- End Legend Indicator List -->

          <!-- Multiple Progress Bars -->
          <div class="flex w-full h-2 bg-stone-200 dark:bg-neutral-700 rounded-sm overflow-hidden">
            {% if batch.not_attempted > 0 %}
            <div class="bg-green-600 dark:bg-green-500" role="progressbar" aria-valuenow="25.6" aria-valuemin="0"
              aria-valuemax="100" style="width: {{batch.followed_up / batch.not_attempted * 100}}%"></div>
            {% else %}
            <div class="bg-green-600 dark:bg-green-500" role="progressbar" aria-valuenow="0" aria-valuemin="0"
              aria-valuemax="100" style="width: 0%"></div>
            {% endif %}
          </div>
          <!-- End Multiple Progress Bars -->
        </div>
        <!-- End List Item -->
      </div>
      <!-- End List Group -->
    </div>
    <!-- End Card -->
    {% endfor %}
  </div>
</div>
