<!-- Step: Photo submitted modal -->
<div x-show="identityStep === 'success'" class="p-6 sm:p-8 text-center" x-cloak>
  <div
    class="mx-auto flex justify-center size-12 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 mb-4">
    <svg class="size-6 mt-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2">
      <path d="M20 6 9 17l-5-5" />
    </svg>
  </div>
  <h2 id="identity-modal-title" class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Photo submitted</h2>
  <p class="mt-2 text-sm text-gray-600 dark:text-neutral-400">Your photo has been received and will be reviewed to
    complete identity verification. You can continue to your exam now.</p>
  <div class="mt-6">
    <button type="button" @click="startExam()"
      class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
      Start exam
    </button>
  </div>
</div>
