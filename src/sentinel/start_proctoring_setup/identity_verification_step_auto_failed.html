<!-- Step: Manual identity check confirm modal (auto failed — suggest manual) -->
<div x-show="identityStep === 'auto_failed'" class="p-6 sm:p-8" x-cloak>
  <h2 id="identity-modal-title" class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Manual identity check
  </h2>
  <p class="mt-2 text-sm text-gray-600 dark:text-neutral-400">We couldn’t complete automatic identity verification.</p>
  <p class="mt-1 text-sm text-gray-600 dark:text-neutral-400">To avoid delays, you can continue with a manual identity
    check.</p>
  <div class="mt-6">
    <button type="button" @click="acceptManual()"
      class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:focus:ring-primary-400">
      Continue with manual verification
    </button>
  </div>
</div>
