<!-- Step: Auto failed — suggest manual (same pattern: p-4 space-y-5) -->
<div x-show="identityStep === 'auto_failed'" class="p-4 sm:p-6" x-cloak>
  <h2 id="identity-modal-title" class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Identity verification
    unsuccessful</h2>
  <p class="text-sm text-gray-600 dark:text-neutral-400 mt-5">We couldn’t verify your identity at this time.</p>
  <p class="text-sm text-gray-600 dark:text-neutral-400">You can continue by completing a manual identity check.</p>
  <button type="button" @click="acceptManual()"
    class="w-full py-2.5 px-4 mt-6 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:focus:ring-primary-400">
    Continue with manual verification
  </button>
</div>
