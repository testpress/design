<!-- Step: Manual identity check capturing modal -->
<div x-show="identityStep === 'manual_capture'" class="p-6 sm:p-8" x-cloak>
  <h2 id="identity-modal-title" class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Manual identity check
  </h2>
  <p class="mt-1 text-sm text-gray-600 dark:text-neutral-400">We couldn’t complete automatic verification. This can
    happen due to lighting or camera quality. Your photo will be reviewed to complete identity verification.</p>
  <div class="mt-4 relative aspect-[4/3] max-h-64 mx-auto bg-gray-100 dark:bg-neutral-700 rounded-lg overflow-hidden">
    <video x-ref="identityVideo" autoplay playsinline muted class="w-full h-full object-cover"
      x-show="identityStream"></video>
    <div class="absolute inset-0 flex items-center justify-center text-gray-500 dark:text-neutral-400 text-sm"
      x-show="!identityStream">Starting camera…</div>
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="w-40 h-52 border-2 border-white/50 rounded-full dark:border-neutral-500/50"></div>
    </div>
  </div>
  <p class="mt-3 text-sm text-gray-600 dark:text-neutral-400">Please take a clear photo using your camera.</p>
  <div class="mt-4">
    <button type="button" @click="capturePhoto()" :disabled="!identityStream"
      class="w-full py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:ring-2 focus:ring-primary-500">
      Capture photo
    </button>
  </div>
</div>
