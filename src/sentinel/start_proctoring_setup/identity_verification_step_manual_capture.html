<!-- Step: Manual identity check — body: instructions (close-coupled) + helper + CTA -->
<div x-show="identityStep === 'manual_capture'" class="p-4" x-cloak>
  <p class="text-center text-sm text-gray-600 dark:text-neutral-400">Please take a clear photo using your camera. Make sure your face is clearly visible and
    well-lit. This photo will be reviewed manually for
    identification.</p>
  <button type="button" @click="capturePhoto()" :disabled="!identityStream"
    class="w-full py-2.5 px-4 mt-6 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:ring-2 focus:ring-primary-500">
    Capture photo
  </button>
</div>
