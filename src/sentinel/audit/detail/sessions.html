<div class="pt-8 space-y-6">
    <!-- Filters -->
    <div class="flex flex-wrap items-center gap-x-3 gap-y-2">
    <label for="status-filter" class="text-sm font-medium text-gray-800 dark:text-neutral-200">Status:</label>
    <select id="status-filter" onchange="applyFilters()" class="py-2 px-3 pe-9 block border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
        <option value="">All Statuses</option>
        
        <option value="0">
        Active
        </option>
        
        <option value="1">
        Completed
        </option>
        
        <option value="2">
        Failed
        </option>
        
    </select>

    <label for="verdict-filter" class="text-sm font-medium text-gray-800 dark:text-neutral-200 ml-4">Integrity:</label>
    <select id="verdict-filter" onchange="applyFilters()" class="py-2 px-3 pe-9 block border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
        <option value="">All Verdicts</option>
        
        <option value="0">
        Clean
        </option>
        
        <option value="1">
        Suspicious
        </option>
        
        <option value="2">
        Compromised
        </option>
        
        <option value="3">
        Inconclusive
        </option>
        
        <option value="4">
        Failed Verification
        </option>
        
    </select>
    </div>


    <!-- Sessions Table -->
    <div class="flex flex-col">
    <div class="-m-1.5 overflow-x-auto">
        <div class="p-1.5 min-w-full inline-block align-middle">
        <div class="border border-gray-200 rounded-lg shadow-xs overflow-hidden dark:border-neutral-700 dark:shadow-gray-900">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
            <thead class="bg-gray-50 dark:bg-neutral-700">
                <tr>
                <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Session</th>
                <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Device</th>
                <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Status</th>
                <th scope="col" class="px-6 py-3 text-start text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Integrity</th>
                <th scope="col" class="px-6 py-3 text-end text-xs font-medium text-gray-500 uppercase dark:text-neutral-400">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">

                {% for i in range(1, 21) %}
                <tr>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800 dark:text-neutral-200">
                    <div class="flex flex-col">
                    <span class="text-sm">
                        Mar {{ 16 - i }}, 2026
                    </span>
                    <span class="text-xs text-gray-500 dark:text-neutral-500">
                        ID: {{ 250000 + i }}
                    </span>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">
                    <div class="flex flex-col">
                    <span>Unknown -</span>
                    <span class="text-xs text-gray-500 dark:text-neutral-500">Unknown OS</span>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">Active</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200">Pending</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                    <div class="hs-dropdown relative inline-flex">
                    <button type="button" class="hs-dropdown-toggle inline-flex items-center gap-x-2 text-sm text-gray-500 hover:text-blue-600 dark:text-neutral-400 dark:hover:text-neutral-200">
                        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="1"></circle>
                        <circle cx="12" cy="5" r="1"></circle>
                        <circle cx="12" cy="19" r="1"></circle>
                        </svg>
                    </button>
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 hidden z-10 bg-white rounded-lg shadow-xl dark:bg-neutral-900" role="menu" tabindex="-1">
                        <div class="py-1">
                        <a href="/audit/39007/activity/?session={{ 250000 + i }}" class="flex items-center gap-x-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-800">View Activity</a>
                        <button type="button" class="w-full flex items-center gap-x-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-800" data-session-id="{{ 250000 + i }}" data-verdict="None" data-progress-id="39007" data-action="open-verdict">Update Verdict</button>
                        </div>
                    </div>
                    </div>
                </td>
                </tr>
                {% endfor %}

            </tbody>
            </table>
        </div>
        </div>
    </div>
    </div>
          
    <div class="mt-5 flex flex-wrap justify-between items-center gap-2">
    <div class="inline-flex items-center space-x-2" >
    <input type="number" min="1" :max="10" class="appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none [-moz-appearance:textfield] py-1.5 sm:py-2 px-3 block w-16 border-gray-200 rounded-lg sm:text-sm font-medium text-gray-700 placeholder:text-gray-400 placeholder:font-normal focus:border-gray-300 focus:ring-0 disabled:opacity-50 disabled:pointer-events-none dark:bg-transparent dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-white/60 dark:focus:ring-neutral-600" placeholder="Go to" max="2">
    <p class="text-sm text-gray-700 dark:text-neutral-400">
      Showing
      <span class="font-medium">1</span>
      to
      <span class="font-medium">20</span>
      of
      <span class="font-medium">26</span>
      results
    </p>
    </div>

    <!-- Pagination -->
    <nav class="flex justify-end items-center gap-x-1" aria-label="Pagination">
      
        <span class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-400 bg-stone-50 dark:text-neutral-500 dark:bg-neutral-800 opacity-50 cursor-not-allowed" aria-label="Previous">
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
          <span class="sr-only">Previous</span>
        </span>
      
      <div class="flex items-center gap-x-1">
        <span class="min-h-9.5 min-w-9.5 flex justify-center items-center bg-stone-100 text-stone-800 py-2 px-3 text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-700 dark:text-white" aria-current="page">1</span>
        <span class="min-h-9.5 flex justify-center items-center text-stone-500 py-2 px-1.5 text-sm dark:text-neutral-500">of</span>
        <span class="min-h-9.5 flex justify-center items-center text-stone-500 py-2 px-1.5 text-sm dark:text-neutral-500">2</span>
      </div>
      
        <a href="?page=2" class="min-h-9.5 min-w-9.5 py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-800 hover:bg-stone-100 focus:outline-hidden focus:bg-stone-100 dark:text-white dark:hover:bg-white/10 dark:focus:bg-neutral-700" aria-label="Next">
          <span class="sr-only">Next</span>
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
        </a>
      
    </nav>
    <!-- End Pagination -->
 </div>

          
</div>
