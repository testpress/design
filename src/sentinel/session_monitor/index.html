{% extends "src/sentinel/widget_base.html" %}

{% block main_content %}
  <div class="flex flex-wrap items-center gap-3 mb-8 w-full max-w-2xl" x-data="{}">
    <button type="button" 
            @click="$dispatch('simulate-warning', 'Keep your face in view')"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Toggle Warning
    </button>

    <button type="button" 
            @click="$dispatch('simulate-state', { key: 'camera', status: 'error', message: 'Hardware failure' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Cam Error
    </button>

    <button type="button" 
            @click="$dispatch('simulate-state', { key: 'screen', status: 'degraded', message: 'Unstable connection' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Screen Error
    </button>

    <button type="button" 
            @click="$dispatch('simulate-state', { key: 'mic', status: 'degraded', message: 'High background noise' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Mic Error
    </button>
  </div>

  {% include "./includes/session_monitor.html" %}

{% endblock main_content %}
