    </div>
  </div>
  <!-- End Heading -->
  <!-- Body -->
  <div class="px-5 py-4 pt-0 space-y-4">
    <!-- Loading State - Only show on initial load (when no data yet) -->
    <template x-if="loading && workspaces.length === 0">
      <div class="space-y-2 animate-pulse">
        <div class="h-10 bg-gray-200 rounded dark:bg-neutral-700"></div>
        <div class="h-10 bg-gray-200 rounded dark:bg-neutral-700"></div>

        <div class="h-10 bg-gray-200 rounded dark:bg-neutral-700"></div>
      </div>
    </template>
    <!-- Error State -->
    <template x-if="error && !loading && workspaces.length === 0">
      <div class="text-center py-8">
        <svg class="mx-auto h-12 w-12 text-red-400"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="mt-2 text-sm text-red-600 dark:text-red-400" x-text="error"></p>
        <button @click="fetchData()"
                class="mt-4 inline-flex items-center px-3 py-2 text-sm font-medium text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">
          <svg class="mr-2 h-4 w-4"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Retry
        </button>
      </div>
    </template>
    <!-- Data State - Always show when we have data, even during refresh -->
    <template x-if="workspaces.length > 0">
      <!-- List Group -->
      <ul class="space-y-2">
        <template x-for="ws in workspaces" :key="ws.id">
          <li class="flex justify-between items-center gap-x-2">
            <div class="relative size-full truncate">
              <div class="absolute inset-y-0 start-0 bg-indigo-100 h-full rounded-sm dark:bg-indigo-500/20 z-0"
                   :style="`width: ${ws.percentage}%`"></div>
              <span class="relative z-10 block py-1 px-2 w-full text-sm truncate text-gray-800 dark:text-neutral-200"
                    x-text="ws.name"></span>
            </div>
            <div class="w-20 text-end">
              <span class="text-sm text-gray-500 dark:text-neutral-500"
                    x-text="ws.candidate_count.toLocaleString()"></span>
            </div>
            <div class="w-20 text-end">
              <span class="text-sm text-gray-500 dark:text-neutral-500"
                    x-text="ws.flag_count"></span>
            </div>
          </li>
        </template>
      </ul>
      <!-- End List Group -->
      <!-- Empty State -->
      <div x-show="workspaces.length === 0" class="text-center py-8">
        <svg class="mx-auto h-12 w-12 text-gray-400"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <p class="mt-2 text-sm text-gray-500 dark:text-neutral-500">No active workspaces found</p>
      </div>
    </template>
  </div>
  <!-- End Body -->
  <!-- Footer -->
  <div class="mt-auto text-center border-t border-gray-200 dark:border-neutral-700">
    <div class="px-5 py-3 flex justify-between items-center gap-x-2 text-sm text-indigo-600 rounded-b-lg hover:text-indigo-700 focus:outline-hidden focus:decoration-2 focus:underline focus:text-indigo-700 dark:text-indigo-500 dark:hover:text-indigo-400 dark:focus:text-indigo-400">
      <div class="text-xs text-gray-500 dark:text-neutral-400">
        <span x-text="`Last updated: ${lastUpdated}`"></span>
      </div>
      <a href="/sentinel/workspaces/?is_active=true" class="text-sm text-indigo-600 hover:text-indigo-700 dark:text-indigo-400">
        View all workspaces →
      </a>
    </div>
  </div>
  <!-- End Footer -->
</div>
<!-- End Active Workspaces Card -->

<script>
  function activeWorkspacesCard() {
    return {
      workspaces: [],
      loading: true,
      fetching: false,
      hasData: false,
      error: null,
      lastUpdated: null,
      refreshInterval: null,
      isInitialized: false,

      // Format relative time helper function
      formatRelativeTime(dateString) {
        if (!dateString) return 'Just now';
        
        const date = new Date(dateString);
        const now = new Date();
        const seconds = Math.floor((now - date) / 1000);
        
        if (seconds < 60) return 'Just now';
        
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        
        const weeks = Math.floor(days / 7);
        if (weeks < 4) return `${weeks}w ago`;
        
        const months = Math.floor(days / 30);
        return `${months}mo ago`;
      },

      async init() {
        if (this.isInitialized) {
          return;
        }
        this.isInitialized = true;

        await this.fetchData();
        // Auto-refresh every 60 seconds
        this.refreshInterval = setInterval(() => this.fetchData(), 60000);

        return () => {
          if (this.refreshInterval) {
            clearInterval(this.refreshInterval);
          }
        };
      },

      async fetchData() {
        // Prevent concurrent fetches
        if (this.fetching) {
          return;
        }

        this.fetching = true;
        if (!this.hasData) {
          this.loading = true;
        }

        try {
          this.error = null;
          
          // Get organization UUID from data attribute (configure via HTML)
          // const orgUuid = document.querySelector('[data-org-uuid]')?.getAttribute('data-org-uuid') || '';

          // if (!orgUuid) {
          //   this.error = 'Organization not configured';
          //   this.loading = false;
          //   this.fetching = false;
          //   return;
          // }

          // const response = await fetch(
          //   `/api/v1/admin/${orgUuid}/dashboard/active-workspaces`,
          //   {
          //     method: 'GET',
          //     headers: {
          //       'Content-Type': 'application/json',
          //     },
          //     credentials: 'include'
          //   }
          // );

          // if (!response.ok) {
          //   throw new Error(`Failed to fetch data: ${response.statusText}`);
          // }

          // const data = await response.json();
          const data = {
            workspaces: [
              {
                id: 1,
                name: 'Engineering Workspace',
                candidate_count: 1250,
                flag_count: 8,
                percentage: 65
              },
              {
                id: 2,
                name: 'Product Development',
                candidate_count: 890,
                flag_count: 5,
                percentage: 45
              },
              {
                id: 3,
                name: 'Quality Assurance',
                candidate_count: 620,
                flag_count: 12,
                percentage: 32
              },
              {
                id: 4,
                name: 'Design Team',
                candidate_count: 430,
                flag_count: 3,
                percentage: 22
              },
              {
                id: 5,
                name: 'Operations',
                candidate_count: 310,
                flag_count: 7,
                percentage: 16
              }
            ],
            updated_at: new Date().toISOString()
          };
          this.workspaces = data.workspaces || [];
          this.lastUpdated = this.formatRelativeTime(data.updated_at);
          this.error = null;
          this.hasData = true;
          this.loading = false;
        } catch (err) {
          console.error('Error fetching workspace data:', err);
          this.error = err.message || 'Failed to load workspace data';
          this.workspaces = [];
          this.hasData = true;
          this.loading = false;
        } finally {
          this.fetching = false;
        }
      }
    };
  }
</script>
