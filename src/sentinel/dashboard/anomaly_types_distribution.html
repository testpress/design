  {% include "./format_relative_time.html" %}
  <script>
    function anomalyTypesCard() {
      return {
        anomalies: [],
        totalAnomalies: 0,
        changePercent: 0,
        loading: true,
        fetching: false,
        hasData: false,
        error: null,
        lastUpdated: null,
        refreshInterval: null,
        isInitialized: false,
        chartInstance: null,

        async init() {
          if (this.isInitialized) {
            return;
          }
          this.isInitialized = true;

          await this.fetchData();
          this.refreshInterval = setInterval(() => this.fetchData(), 60000);

          return () => {
            if (this.refreshInterval) {
              clearInterval(this.refreshInterval);
            }
            if (this.chartInstance) {
              this.chartInstance.dispose();
            }
          };
        },

        async fetchData() {
          if (this.fetching) {
            return;
          }

          this.fetching = true;
          if (!this.hasData) {
            this.loading = true;
          }

          try {
            this.error = null;
            
            // Static mock data for Eleventy static site
            const data = {
              anomalies: [
                { name: 'Face Mismatch', count: 28, percentage: 82.4 },
                { name: 'Multiple Faces', count: 4, percentage: 11.8 },
                { name: 'No Person Detected', count: 2, percentage: 5.9 }
              ],
              total_anomalies: 34,
              change_percent: 12.0,
              updated_at: '2026-03-15T10:30:00Z'
            };

            this.anomalies = data.anomalies || [];
            this.totalAnomalies = data.total_anomalies || 0;
            this.changePercent = data.change_percent || 0;
            this.lastUpdated = formatRelativeTime(data.updated_at);
            this.error = null;
            this.hasData = true;
            this.loading = false;

            this.$nextTick(() => {
              this.initChart();
            });
          } catch (err) {
            console.error('Error loading anomaly data:', err);
            this.error = err.message || 'Failed to load anomaly data';
            this.anomalies = [];
            this.hasData = true;
            this.loading = false;
          } finally {
            this.fetching = false;
          }
        },

        initChart() {
          const chartDom = document.getElementById('anomaly-chart');
          if (!chartDom || typeof echarts === 'undefined') {
            console.warn('ECharts not loaded or chart container not found');
            return;
          }

          if (this.chartInstance) {
            this.chartInstance.dispose();
          }

          this.chartInstance = echarts.init(chartDom);

          const colors = [
            '#7c3aed',  // Deep purple
            '#a78bfa',  // Medium purple
            '#ddd6fe',  // Light purple
            '#ede9fe',  // Very light purple
            '#4b5563'   // Dark gray
          ];

          const chartData = this.anomalies.map((anomaly, index) => ({
            value: anomaly.count,
            name: anomaly.name,
            itemStyle: {
              color: colors[index % colors.length]
            }
          }));

          const option = {
            tooltip: {
              trigger: 'item',
              formatter: '{b}: {c} ({d}%)',
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              borderColor: '#e5e7eb',
              borderWidth: 1,
              textStyle: {
                color: '#1f2937',
                fontSize: 13
              }
            },
            series: [
              {
                name: 'Anomaly Types',
                type: 'pie',
                radius: ['60%', '110%'],
                center: ['45%', '80%'],
                startAngle: 180,
                endAngle: 360,
                data: chartData
              }
            ],
            grid: {
              top: 20,
              bottom: -140
            }
          };

          this.chartInstance.setOption(option);

          // Responsive resize with debouncing
          let resizeTimer;
          window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
              if (this.chartInstance) {
                this.chartInstance.resize();
              }
            }, 100);
          });
        },

        getColorForIndex(index) {
          const colors = [
            '#7c3aed',
            '#a78bfa',
            '#ddd6fe',
            '#ede9fe',
            '#4b5563'
          ];
          return colors[index % colors.length];
        }
      };
    }
  </script>
