<!-- End Risk Assessment Card -->
<script>
  function riskAssessmentCard() {
    return {
      overallRiskScore: '—',
      riskLevel: 'low',
      riskLevelLabel: 'Loading...',
      trendPercent: 0.0,
      isIncreasing: false,
      workspaces: [],
      lastUpdateTime: 'Loading...',
      loading: true,
      fetching: false,
      hasData: false,
      error: null,
      refreshInterval: null,
      isInitialized: false,

      async init() {
        if (this.isInitialized) {
          return;
        }
        this.isInitialized = true;

        await this.fetchData();
        this.refreshInterval = setInterval(() => this.fetchData(), 60000);
        return () => {
          if (this.refreshInterval) {
            clearInterval(this.refreshInterval);
          }
        };
      },

      async fetchData() {
        if (this.fetching) {
          return;
        }

        this.fetching = true;
        if (!this.hasData) {
          this.loading = true;
        }

        try {
          this.error = null;
          
          // Static mock data for Eleventy static site
          const data = {
            overall_risk_score: 6.8,
            risk_level: 'medium',
            trend_percent: 1.2,
            is_increasing: true,
            workspaces: [
              { name: 'Institute A', risk_score: 5.2, status: 'low' },
              { name: 'Institute B', risk_score: 7.8, status: 'high' },
              { name: 'Institute C', risk_score: 6.5, status: 'medium' }
            ],
            updated_at: new Date().toISOString()
          };

          this.overallRiskScore = data.overall_risk_score;
          this.riskLevel = data.risk_level;
          this.riskLevelLabel = this.formatRiskLevel(data.risk_level);
          this.trendPercent = Math.abs(data.trend_percent);
          this.isIncreasing = data.is_increasing;
          this.workspaces = data.workspaces || [];
          this.lastUpdateTime = new Date().toLocaleString();
          this.error = null;
          this.hasData = true;
          this.loading = false;
        } catch (err) {
          console.error('Error loading risk assessment data:', err);
          this.error = err.message || 'Failed to load risk assessment data';
          this.workspaces = [];
          this.hasData = true;
          this.loading = false;
        } finally {
          this.fetching = false;
        }
      },

      formatRiskLevel(level) {
        const labels = {
          'low': 'Low Risk',
          'medium': 'Medium Risk',
          'high': 'High Risk'
        };
        return labels[level] || level;
      },

    };
  }
</script>
