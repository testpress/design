<!-- What's Happening Section -->
<div class="space-y-5" x-data="dashboardMetrics()">
  <div class="flex flex-wrap justify-between items-center gap-2">
    <div class="flex flex-wrap items-center gap-3">
      <h1 class="text-lg font-semibold text-gray-900 dark:text-white">What's happening right now?</h1>
      <div class="inline-flex items-center">
        <span class="shrink-0 size-2 inline-block bg-green-500 rounded-full me-1"></span>
        <span class="text-sm text-gray-600 dark:text-neutral-400">
          <span x-text="currentVisitors"></span> current visitors
        </span>
      </div>
    </div>
  </div>

  <div class="mt-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-5">
    <!-- Active Sessions Card -->
    <div class="overflow-hidden rounded-lg bg-white dark:bg-neutral-800 shadow-sm">
      <div class="p-5">
        <div class="flex items-center">
          <div class="shrink-0">
            <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2" />
            </svg>
          </div>
          <div class="ml-5 w-0 flex-1">
            <dl>
              <dt class="truncate text-sm font-medium text-gray-600 dark:text-neutral-400">Active Sessions (last <span x-text="sessionTrendWindow"></span>)</dt>
              <dd>
                <div class="text-lg font-medium text-gray-900 dark:text-white" x-text="activeSessions"></div>
              </dd>
            </dl>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-neutral-700 px-5 py-3">
        <div class="flex items-center gap-x-1">
          <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-800 dark:text-green-200 bg-green-100 dark:bg-green-900/20 rounded-full px-2 py-0.5">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
              <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
            <span x-text="Math.abs(activeSessionsChangePercent).toFixed(1)"></span>%
          </span>
          <span class="text-xs leading-5 text-gray-600 dark:text-neutral-400">vs Prior <span x-text="sessionTrendWindow"></span></span>
        </div>
      </div>
    </div>

    <!-- Anomalies Detected Card -->
    <div class="overflow-hidden rounded-lg bg-white dark:bg-neutral-800 shadow-sm">
      <div class="p-5">
        <div class="flex items-center">
          <div class="shrink-0">
            <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 18a2 2 0 0 0-4 0" />
              <path d="m19 11-2.11-6.657a2 2 0 0 0-2.752-1.148l-1.276.61A2 2 0 0 1 12 4H8.5a2 2 0 0 0-1.925 1.456L5 11" />
              <path d="M2 11h20" />
              <circle cx="17" cy="18" r="3" />
              <circle cx="7" cy="18" r="3" />
            </svg>
          </div>
          <div class="ml-5 w-0 flex-1">
            <dl>
              <dt class="truncate text-sm font-medium text-gray-600 dark:text-neutral-400">Anomalies Detected (Last <span x-text="anomaliesTrendWindow"></span>)</dt>
              <dd>
                <div class="text-lg font-medium text-gray-900 dark:text-white" x-text="anomaliesDetected"></div>
              </dd>
            </dl>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-neutral-700 px-5 py-3">
        <div class="flex items-center gap-x-1">
          <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-800 dark:text-green-200 bg-green-100 dark:bg-green-900/20 rounded-full px-2 py-0.5">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
              <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
            <span x-text="Math.abs(anomaliesChangePercent).toFixed(1)"></span>%
          </span>
          <span class="text-xs leading-5 text-gray-600 dark:text-neutral-400">vs same time yesterday</span>
        </div>
      </div>
    </div>

    <!-- Integrity Verdicts Card -->
    <div class="overflow-hidden rounded-lg bg-white dark:bg-neutral-800 shadow-sm">
      <div class="p-5">
        <div class="flex items-center">
          <div class="shrink-0">
            <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
              <path d="m9 12 2 2 4-4" />
            </svg>
          </div>
          <div class="ml-5 w-0 flex-1">
            <dl>
              <dt class="truncate text-sm font-medium text-gray-600 dark:text-neutral-400">Integrity Verdicts (Last <span x-text="integrityTrendWindow"></span>)</dt>
              <dd>
                <div class="text-lg font-medium text-gray-900 dark:text-white">
                  <span x-text="integrityPassedPercent"></span>%<span class="text-xs font-normal leading-5 text-gray-600 dark:text-neutral-400 ml-1">Clean</span>
                </div>
              </dd>
            </dl>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-neutral-700 px-5 py-3">
        <div class="flex items-center gap-x-1">
          <span class="text-xs leading-5 text-gray-600 dark:text-neutral-400">
            <span x-text="integrityAwaitingReview"></span> awaiting review, and <span x-text="integrityFailed"></span> failed.
            <a href="#" class="text-blue-600 dark:text-blue-400 font-medium hover:decoration-2 underline underline-offset-4 focus:outline-hidden focus:decoration-2">
              Review Now
            </a>
          </span>
        </div>
      </div>
    </div>

    <!-- Evidences Captured Card -->
    <div class="overflow-hidden rounded-lg bg-white dark:bg-neutral-800 shadow-sm">
      <div class="p-5">
        <div class="flex items-center">
          <div class="shrink-0">
            <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" x2="2" y1="12" y2="12" />
              <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
              <line x1="6" x2="6.01" y1="16" y2="16" />
              <line x1="10" x2="10.01" y1="16" y2="16" />
            </svg>
          </div>
          <div class="ml-5 w-0 flex-1">
            <dl>
              <dt class="truncate text-sm font-medium text-gray-600 dark:text-neutral-400">Evidences Captured</dt>
              <dd>
                <div class="text-lg font-medium text-gray-900 dark:text-white" x-text="evidencesCapturedFormatted"></div>
              </dd>
            </dl>
          </div>
        </div>
      </div>
      <div class="bg-gray-50 dark:bg-neutral-700 px-5 py-3">
        <div class="flex items-center gap-x-1">
          <span class="text-xs leading-5 text-gray-600 dark:text-neutral-400">≈ <span x-text="evidencesStorageGb"></span> GB stored</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function dashboardMetrics() {
    return {
      currentVisitors: 1842,
      activeSessions: 1247,
      activeSessionsChangePercent: 8.2,
      anomaliesDetected: 34,
      anomaliesChangePercent: 12,
      integrityPassedPercent: 94.2,
      integrityAwaitingReview: 2,
      integrityFailed: 1,
      evidencesCaptured: 847,
      evidencesStorageGb: '2.4',
      sessionTrendWindow: '24h',
      anomaliesTrendWindow: '24h',
      integrityTrendWindow: '24h',

      init() {
        // API calling function removed
      },

      get evidencesCapturedFormatted() {
        return this.evidencesCaptured.toLocaleString('en-US');
      }
    };
  }
</script>
