<div x-show="stage === 'ready'" class="flex flex-col h-full sentinel-animate-fade-in-up">
  
  <template x-if="engineStatus === 'starting'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col">
        <div class="mb-5">
          <h1 class="m-0 mb-1.5 text-xl font-semibold sentinel-text-header leading-snug font-sans">
            Finalizing setup
          </h1>
          <p class="m-0 text-sm sentinel-text-body leading-normal font-sans">
            We're starting the proctoring engine to ensure your session is secure.
          </p>
        </div>
      </div>

      <div class="flex-none flex flex-col items-center justify-center my-6">
        <div class="relative mb-8">
          <div class="relative h-1.5 w-64 sentinel-bg-primary-tint rounded-full overflow-hidden">
            <div class="h-full w-full sentinel-gradient-primary rounded-full sentinel-animate-wobble"></div>
          </div>
        </div>
        <p class="m-0 text-sm font-medium sentinel-text-subtle font-sans text-center">
          Starting engine...
        </p>
      </div>

      
      <div class="flex-1 flex flex-col justify-end">
        <div class="flex justify-end pt-4 pb-2">
          <button disabled class="px-5 py-2 rounded-lg sentinel-bg-primary opacity-50 text-sm font-semibold text-white shadow-sm cursor-not-allowed">
            Begin
          </button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="engineStatus === 'started'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col items-center justify-center text-center sentinel-animate-fade-in">
        <div class="mb-6 flex justify-center">
          <div class="w-20 h-20 rounded-full sentinel-gradient-success border-2 border-white/20 flex items-center justify-center text-white sentinel-animate-pop-in">
            <svg width="40" height="40" viewBox="0 0 32 32" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 16L13 21L24 10"/></svg>
          </div>
        </div>

        <div class="mb-6">
          <h1 class="text-xl font-semibold sentinel-text-header leading-tight font-sans">Setup complete</h1>
          <p class="mt-2 text-sm sentinel-text-muted leading-relaxed font-sans">
            Your setup is complete. You can now begin your session.
          </p>
        </div>

        <p class="text-sm sentinel-text-subtle font-sans sentinel-animate-fade-in text-center" aria-live="polite">
          Auto begins in <span x-text="countdown" class="font-medium sentinel-text-action"></span>s…
        </p>
      </div>

      <div class="flex-none flex justify-end pt-4 pb-2">
        <button @click="goToStep('hidden')" 
                class="px-5 py-2 rounded-lg sentinel-bg-primary sentinel-bg-primary-hover text-sm font-semibold text-white shadow-sm transition-all transform active:scale-95">
          Begin
        </button>
      </div>
    </div>
  </template>

</div>
