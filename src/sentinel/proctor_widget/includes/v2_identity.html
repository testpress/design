<div x-show="stage === 'identity'" class="flex flex-col h-full v2-animate-fade-in-up">
  
  <template x-if="identitySubState !== 'failed'">
    <div class="flex flex-col h-full">
      <div class="mb-6">
        <h1 class="text-xl font-semibold text-gray-900 dark:text-white leading-tight font-sans">Verify your identity</h1>
        <p class="mt-1 text-sm text-gray-500 dark:text-neutral-200 leading-relaxed font-sans">Center your face in the frame. Capture happens automatically.</p>
      </div>

      <!-- Camera Viewport Mockup -->
      <div class="relative flex-1 w-full bg-slate-900 rounded-2xl overflow-hidden mb-4 min-h-0 flex items-center justify-center shadow-inner">
        
        <!-- REAL Webcam Video Feed -->
        <video id="v2-webcam-preview" 
               autoplay 
               playsinline 
               muted 
               class="absolute inset-0 w-full h-full object-cover grayscale-[0.2] brightness-[1.1] contrast-[1.1]"
               onloadedmetadata="this.play()"></video>

        <!-- Face Frame Overlay -->
        <template x-if="identitySubState !== 'verifying' && identitySubState !== 'verified'">
          <svg width="240" height="276" viewBox="0 0 240 276" fill="none" class="absolute z-10 transition-filter duration-500 drop-shadow-[0_0_12px_rgba(255,255,255,0.1)]">
            <ellipse cx="120" cy="138" rx="88" ry="110" :stroke="identitySubState === 'rejected' ? '#f87171' : 'rgba(255,255,255,0.8)'" stroke-width="2.5" :stroke-dasharray="identitySubState === 'rejected' ? '0' : '10 6'" fill="none" />
            <path d="M 32 80 L 32 60 Q 32 50 42 50 L 62 50" :stroke="identitySubState === 'rejected' ? '#f87171' : 'rgba(255,255,255,0.8)'" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 208 80 L 208 60 Q 208 50 198 50 L 178 50" :stroke="identitySubState === 'rejected' ? '#f87171' : 'rgba(255,255,255,0.8)'" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 32 200 L 32 220 Q 32 230 42 230 L 62 230" :stroke="identitySubState === 'rejected' ? '#f87171' : 'rgba(255,255,255,0.8)'" stroke-width="3.5" stroke-linecap="round" fill="none" />
            <path d="M 208 200 L 208 220 Q 208 230 198 230 L 178 230" :stroke="identitySubState === 'rejected' ? '#f87171' : 'rgba(255,255,255,0.8)'" stroke-width="3.5" stroke-linecap="round" fill="none" />
          </svg>
        </template>

        <!-- Verifying Overlay -->
        <template x-if="identitySubState === 'verifying'">
          <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px] z-20 flex flex-col items-center justify-center gap-4">
            <svg width="32" height="32" viewBox="0 0 16 16" fill="none" class="v2-spinner">
              <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-dasharray="28" stroke-dashoffset="10" />
              <path d="M 8 2 A 6 6 0 0 1 14 8" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            </svg>
            <span class="text-sm font-semibold text-white tracking-wide">Processing Identity...</span>
          </div>
        </template>

        <!-- Verified Overlay -->
        <template x-if="identitySubState === 'verified'">
          <div class="absolute inset-0 bg-emerald-500/20 backdrop-blur-md z-30 flex flex-col items-center justify-center gap-4 v2-animate-fade-in">
            <div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center text-white v2-animate-pop-in shadow-[0_0_30px_rgba(16,185,129,0.5)]">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            </div>
            <span class="text-base font-bold text-white tracking-widest uppercase">Verified</span>
          </div>
        </template>

        <!-- Status Bar -->
        <div x-show="identitySubState === 'capturing' || identitySubState === 'rejected'" class="absolute bottom-0 inset-x-0 p-4 bg-gradient-to-t from-black/90 via-black/40 to-transparent flex items-center justify-center z-20">
          <span class="text-[13px] font-semibold transition-all duration-300" 
                :class="identitySubState === 'rejected' ? 'text-red-400 scale-105' : 'text-white/90'"
                x-text="identitySubState === 'rejected' ? 'Verification failed — please try again' : 'Center your face in the frame and look at the camera'"></span>
        </div>
      </div>

      <!-- Attempts Notice -->
      <div x-show="identitySubState === 'rejected' && attemptsRemaining !== undefined" 
           class="mb-3 p-2 bg-[var(--v2-warning-50)] text-[var(--v2-warning-600)] text-[13px] font-bold text-center rounded-xl border-1.5 border-[var(--v2-warning-600)]/20 v2-animate-fade-in-up">
        <span x-text="attemptsRemaining === 1 ? 'Last attempt remaining' : attemptsRemaining + ' attempts remaining'"></span>
      </div>


    </div>
  </template>

  <!-- Hard Failure State -->
  <template x-if="identitySubState === 'failed'">
    <div style="flex: 1; display: flex; flex-direction: column; h-full">
      
      <!-- Centered content — icon + title + description -->
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <!-- Error icon -->
        <div style="display: flex; justify-content: center; margin-bottom: 24px;">
          <div style="width: 68px; height: 68px; border-radius: 50%; background: var(--color-error-50); border: 1.5px solid rgba(220, 38, 38, 0.1); display: flex; align-items: center; justify-content: center; animation: v2-pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;" aria-hidden="true">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-error-600);">
              <path d="M10.29 3.86l-8.47 14.14a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </div>
        </div>

        <h2 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--color-gray-900); font-family: var(--font-sans);">Verification Limit Reached</h2>
        <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.55; max-width: 320px; font-family: var(--font-sans); text-align: center;">
          You have exceeded the maximum number of attempts for identity verification. Please contact your administrator or support for further instructions.
        </p>
      </div>

      <!-- FooterActions -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 10px; margin-top: auto; padding-top: 20px;">
        <button type="button" @click="stage = 'hidden'" 
                class="px-5 py-2.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 dark:bg-neutral-800 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 transition-colors">
          Close
        </button>
      </div>
    </div>
  </template>



</div>
