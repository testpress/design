<div x-show="stage === 'preparing'" class="flex flex-col h-full v2-animate-fade-in">
  
  <template x-if="!preparingFailed">
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">

      <!-- Large ring loader -->
      <div style="position: relative; margin-bottom: 32px;">

        <!-- Outer glow pulse -->
        <div style="position: absolute; inset: -16px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%); animation: pulse-bar 2s ease-in-out infinite;"></div>

        <!-- Spinning ring -->
        <svg
          width="160"
          height="160"
          viewBox="0 0 160 160"
          fill="none"
          class="sentinel-spinner"
          aria-hidden="true"
        >
          <circle
            cx="80"
            cy="80"
            r="66"
            stroke="var(--color-gray-100)"
            stroke-width="10"
          />
          <!-- Arc — ~75% of circumference -->
          <circle
            cx="80"
            cy="80"
            r="66"
            stroke="url(#v2-prep-spinner-gradient)"
            stroke-width="10"
            stroke-dasharray="311 415"
            stroke-linecap="round"
            transform="rotate(-90 80 80)"
          />
          <defs>
            <linearGradient id="v2-prep-spinner-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#60a5fa" />
              <stop offset="100%" stop-color="#2563eb" />
            </linearGradient>
          </defs>

        </svg>

        <!-- Status text inside the ring -->
        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;">
          <span
            style="font-size: 12px; color: var(--color-gray-400); font-family: var(--font-sans); text-align: center; line-height: 1.4; max-width: 96px;"
            x-text="statusText"
          ></span>
        </div>
      </div>

      <!-- Title + subtitle -->
      <h1 style="margin: 0 0 8px 0; font-size: 20px; font-weight: 600; color: var(--color-gray-900); line-height: 1.3; font-family: var(--font-sans);">
        Preparing your setup
      </h1>
      <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.5; font-family: var(--font-sans);">
        Getting everything ready for your session.
      </p>
    </div>
  </template>

  <!-- Error State (Prep Failed) -->
  <template x-if="preparingFailed">
    <div style="flex: 1; display: flex; flex-direction: column; h-full">
      
      <!-- Centered content — icon + title + description -->
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <!-- Error icon -->
        <div style="display: flex; justify-content: center; margin-bottom: 20px;">
          <div style="width: 60px; height: 60px; border-radius: 50%; background: var(--color-error-50); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 10px var(--color-error-halo); animation: v2-pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M12 9V13M12 17H12.01M10.29 3.86L1.82 18C1.64 18.31 1.54 18.66 1.54 19.02C1.54 20.12 2.42 21 3.52 21H20.48C21.58 21 22.46 20.12 22.46 19.02C22.46 18.66 22.36 18.32 22.18 18L13.71 3.86C13.16 2.93 11.84 2.93 11.29 3.86H10.29Z" stroke="var(--color-error-600)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <h2 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--color-gray-900); font-family: var(--font-sans);">We couldn't prepare your session</h2>
        <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.55; max-width: 320px; font-family: var(--font-sans); text-align: center;">
          There was a problem during setup. This could be a browser compatibility issue or a network error. Please try again.
        </p>
      </div>

      <!-- FooterActions -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 10px; margin-top: auto; padding-top: 20px;">
        <button type="button" @click="stage = 'hidden'" 
                style="padding: 10px 20px; border-radius: 10px; border: 1.5px solid var(--color-gray-200); background: transparent; color: var(--color-gray-600); font-size: 14px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; transition: background 0.15s ease, border-color 0.15s ease; white-space: nowrap;"
                onmouseenter="this.style.background='var(--color-gray-50)'" 
                onmouseleave="this.style.background='transparent'">
          Cancel
        </button>
        <button type="button" @click="runSimulatedChecks()" 
                style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 24px; border-radius: 10px; border: none; background: var(--color-primary-600); color: #ffffff; font-size: 14px; font-weight: 600; font-family: var(--font-sans); cursor: pointer; transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease; box-shadow: var(--shadow-sm); white-space: nowrap;"
                onmouseenter="this.style.background='var(--color-primary-700)'" 
                onmouseleave="this.style.background='var(--color-primary-600)'">
          Try again
        </button>
      </div>
    </div>
  </template>


</div>
