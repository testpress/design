<div x-show="stage === 'preparing'" class="flex flex-col h-full v2-animate-fade-in">
  
  <template x-if="!preparingFailed">
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">

      <!-- Large ring loader -->
      <div style="position: relative; margin-bottom: 32px;">

        <!-- Outer glow pulse -->
        <div style="position: absolute; inset: -16px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%); animation: pulse-bar 2s ease-in-out infinite;"></div>

        <!-- Spinning ring -->
        <svg
          width="160"
          height="160"
          viewBox="0 0 160 160"
          fill="none"
          class="sentinel-spinner"
          aria-hidden="true"
        >
          <circle
            cx="80"
            cy="80"
            r="66"
            stroke="var(--v2-gray-100)"
            stroke-width="10"
          />
          <!-- Arc — ~75% of circumference -->
          <circle
            cx="80"
            cy="80"
            r="66"
            stroke="url(#v2-prep-spinner-gradient)"
            stroke-width="10"
            stroke-dasharray="311 415"
            stroke-linecap="round"
            transform="rotate(-90 80 80)"
          />
          <defs>
            <linearGradient id="v2-prep-spinner-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#60a5fa" />
              <stop offset="100%" stop-color="#2563eb" />
            </linearGradient>
          </defs>

        </svg>

        <!-- Status text inside the ring -->
        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px;">
          <span
            style="font-size: 12px; color: var(--color-gray-400); font-family: var(--font-sans); text-align: center; line-height: 1.4; max-width: 96px;"
            x-text="statusText"
          ></span>
        </div>
      </div>

      <!-- Title + subtitle -->
      <h1 style="margin: 0 0 8px 0; font-size: 20px; font-weight: 600; color: var(--color-gray-900); line-height: 1.3; font-family: var(--font-sans);">
        Preparing your setup
      </h1>
      <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.5; font-family: var(--font-sans);">
        Getting everything ready for your session.
      </p>
    </div>
  </template>

  <!-- Error State (Prep Failed) -->
  <template x-if="preparingFailed">
    <div class="flex-1 flex flex-col h-full">
      <div class="flex-1 flex flex-col items-center justify-center text-center">
        <!-- Error icon -->
        <div class="mb-5 flex justify-center">
          <div class="w-15 h-15 rounded-full bg-[var(--v2-error-50)] flex items-center justify-center shadow-[0_0_0_10px_#fff3f3] v2-animate-pop-in">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--v2-error-600)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 9V13M12 17H12.01M10.29 3.86L1.82 18C1.64 18.31 1.54 18.66 1.54 19.02C1.54 20.12 2.42 21 3.52 21H20.48C21.58 21 22.46 20.12 22.46 19.02C22.46 18.66 22.36 18.32 22.18 18L13.71 3.86C13.16 2.93 11.84 2.93 11.29 3.86H10.29Z" />
            </svg>
          </div>
        </div>

        <h2 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--color-gray-900); font-family: var(--font-sans);">We couldn't prepare your session</h2>
        <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.5; max-width: 320px; font-family: var(--font-sans); text-align: center;">
          There was a problem during setup. This could be a browser compatibility issue or a network error. Please try again.
        </p>
      </div>

      <!-- Footer Actions -->
      <div class="mt-auto pt-5 flex justify-end gap-2.5">
        <button @click="stage = 'hidden'" class="px-5 py-2.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-800 transition-colors">Cancel</button>
        <button @click="runSimulatedChecks()" class="px-6 py-2.5 rounded-lg bg-blue-600 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 transition-all">Try again</button>
      </div>
    </div>
  </template>

</div>
