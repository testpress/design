<div x-show="stage === 'preparing'" class="flex flex-col h-full v2-animate-fade-in">
  
  <template x-if="!preparingFailed">
    <div class="flex flex-col h-full">
      <!-- Spacer Top + Header -->
      <div class="flex-1 flex flex-col">
        <div style="margin-bottom: 20px;">
          <h1 style="margin: 0 0 6px 0; font-size: 20px; font-weight: 600; color: var(--color-gray-900); line-height: 1.3; font-family: var(--font-sans);">
            Preparing your setup
          </h1>
          <p style="margin: 0; font-size: 14px; color: var(--color-gray-800); line-height: 1.5; font-family: var(--font-sans);">
            We're setting up a secure and stable environment for your session. This will take a moment.
          </p>
        </div>
      </div>

      <!-- Centered Loader Area -->
      <div style="flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 24px 0;">
        
        <!-- Large ring loader -->
        <div style="position: relative; margin-bottom: 24px;">
          <!-- Outer glow pulse -->
          <div style="position: absolute; inset: -16px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%); animation: v2-pulse-bar 2s ease-in-out infinite;"></div>

          <!-- Spinning ring -->
          <svg
            width="120"
            height="120"
            viewBox="0 0 160 160"
            fill="none"
          class="sentinel-spinner"
            aria-hidden="true"
          >
            <circle
              cx="80"
              cy="80"
              r="66"
              stroke="var(--color-gray-100)"
              stroke-width="10"
            />
            <circle
              cx="80"
              cy="80"
              r="66"
              stroke="url(#v2-prep-spinner-gradient)"
              stroke-width="10"
              stroke-dasharray="311 415"
              stroke-linecap="round"
              transform="rotate(-90 80 80)"
            />
            <defs>
              <linearGradient id="v2-prep-spinner-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#60a5fa" />
                <stop offset="100%" stop-color="#2563eb" />
              </linearGradient>
            </defs>
          </svg>
        </div>

        <!-- Status line below loader -->
        <p style="margin: 0; font-size: 13px; font-weight: 500; color: var(--color-gray-400); font-family: var(--font-sans); text-align: center; min-height: 1.5em;" x-text="statusText"></p>
      </div>

      <!-- Spacer Bottom -->
      <div class="flex-1"></div>
    </div>
  </template>

  <!-- Error State (Prep Failed) -->
  <template x-if="preparingFailed">
    <div style="flex: 1; display: flex; flex-direction: column; h-full">
      
      <!-- Centered content — icon + title + description -->
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <!-- Error icon -->
        <div style="display: flex; justify-content: center; margin-bottom: 20px;">
          <div style="width: 60px; height: 60px; border-radius: 50%; background: var(--color-error-50); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 10px var(--color-error-halo); animation: v2-pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M12 9V13M12 17H12.01M10.29 3.86L1.82 18C1.64 18.31 1.54 18.66 1.54 19.02C1.54 20.12 2.42 21 3.52 21H20.48C21.58 21 22.46 20.12 22.46 19.02C22.46 18.66 22.36 18.32 22.18 18L13.71 3.86C13.16 2.93 11.84 2.93 11.29 3.86H10.29Z" stroke="var(--color-error-600)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
        </div>

        <h2 style="margin: 0 0 8px 0; font-size: 18px; font-weight: 600; color: var(--color-gray-900); font-family: var(--font-sans);">We couldn't prepare your session</h2>
        <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.55; max-width: 320px; font-family: var(--font-sans); text-align: center;">
          There was a problem during setup. This could be a browser compatibility issue or a network error. Please try again.
        </p>
      </div>

      <!-- FooterActions -->
      <div style="display: flex; flex-direction: row; align-items: center; justify-content: flex-end; gap: 10px; margin-top: auto; padding-top: 20px;">
        <button type="button" @click="stage = 'hidden'" 
                class="px-5 py-2.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 dark:bg-neutral-800 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 transition-colors">
          Cancel
        </button>
        <button type="button" @click="runSimulatedChecks()" 
                class="px-6 py-2.5 rounded-lg bg-blue-600 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 transition-all">
          Try again
        </button>
      </div>
    </div>
  </template>


</div>
