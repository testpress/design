<div x-show="['preparing', 'permissions', 'validating', 'identity', 'ready'].includes(stage)"


     class="flex items-center mb-4 text-[13px] font-semibold text-gray-500 dark:text-neutral-500 font-sans tracking-wide uppercase"
     role="progressbar"
     :aria-valuenow="currentStep + 1"
     aria-valuemin="1"
     aria-valuemax="4"
     :aria-label="'Step ' + (currentStep + 1) + ' of 4'">
  
  <span class="text-blue-600 dark:text-blue-500">
    Step <span x-text="currentStep + 1"></span>
  </span>
  
  <span class="text-gray-300 dark:text-neutral-700 mx-1.5 font-normal">/</span>
  
  <span>4</span>
</div>
