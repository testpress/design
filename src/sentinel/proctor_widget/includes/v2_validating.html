<div x-show="stage === 'validating'" class="flex flex-col h-full v2-animate-fade-in">
  
  <div class="flex-1 flex flex-col">
    <div style="margin-bottom: 20px;">
      <h1 style="margin: 0 0 6px 0; font-size: 20px; font-weight: 600; color: var(--color-gray-900); line-height: 1.3; font-family: var(--font-sans);">
        Checking your access
      </h1>
      <p style="margin: 0; font-size: 14px; color: var(--color-gray-800); line-height: 1.5; font-family: var(--font-sans);">
        We’re making sure the required access is working before your session starts.
      </p>
    </div>
  </div>

  <div style="flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 24px 0;">
    
    <div style="position: relative; margin-bottom: 24px;">
      <div style="position: absolute; inset: -16px; border-radius: 50%; background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%); animation: v2-pulse-bar 2s ease-in-out infinite;"></div>
      
      <svg width="120" height="120" viewBox="0 0 160 160" fill="none" class="sentinel-spinner" aria-hidden="true">
        <circle cx="80" cy="80" r="66" stroke="var(--color-gray-100)" stroke-width="10" />
        <circle cx="80" cy="80" r="66" stroke="url(#v2-validating-gradient)" stroke-width="10" stroke-dasharray="311 415" stroke-linecap="round" transform="rotate(-90 80 80)" />
        <defs>
          <linearGradient id="v2-validating-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#2563eb" />
          </linearGradient>
        </defs>
      </svg>
    </div>

    <p style="margin: 0; font-size: 14px; color: var(--color-gray-500); line-height: 1.5; max-width: 280px; font-family: var(--font-sans); text-align: center;">
      Finalizing access
    </p>
  </div>

  <div class="flex-1"></div>

</div>
