<div x-show="stage === 'permissions'" class="flex flex-col h-full v2-animate-fade-in-up" style="overflow: hidden;">
  
  <div class="flex-1 flex flex-col">
    <div style="margin-bottom: 20px;">
      <h1 class="text-xl font-semibold text-gray-900 dark:text-white leading-tight font-sans">Allow access to continue</h1>
      <p class="mt-1 text-sm text-gray-800 dark:text-neutral-200 leading-relaxed font-sans">
        This session requires access to camera, microphone and screen sharing. Allow each item below to proceed.
      </p>
    </div>
  </div>

  <div style="flex: 0 0 auto; margin-bottom: 20px;">
    <div class="flex flex-col gap-2.5">
      <template x-for="(perm, index) in permissions" :key="perm.name">
         <div class="flex items-start gap-3 p-3 rounded-[12px] border-[1.5px] transition-all duration-300"
              :style="{
                borderColor: perm.state === 'granted' ? 'var(--v2-success-500)' : perm.state === 'requesting' ? 'var(--v2-primary-500)' : 'var(--color-gray-200)',
                backgroundColor: perm.state === 'granted' ? 'var(--v2-success-50)' : (perm.state === 'requesting' ? 'var(--color-bg-icon)' : 'var(--color-bg-item)'),
                opacity: (permissions.findIndex(p => p.state !== 'granted') === index || perm.state === 'granted') ? '1' : '0.5',
                filter: (permissions.findIndex(p => p.state !== 'granted') === index || perm.state === 'granted') ? 'none' : 'grayscale(0.5)'
              }">

          <!-- Icon -->
          <div class="shrink-0 w-10 h-10 rounded-xl flex items-center justify-center text-blue-600"
               style="background-color: var(--color-bg-icon);">
            <template x-if="perm.name === 'camera'">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: block;">
                <path d="M15 10L19.553 7.724C19.7054 7.64784 19.8748 7.61187 20.0466 7.61955C20.2184 7.62724 20.3838 7.67832 20.5288 7.76796C20.6738 7.8576 20.794 7.98279 20.8778 8.13138C20.9617 8.27997 21.0061 8.44714 21.006 8.617V15.383C21.0061 15.5529 20.9617 15.72 20.8778 15.8686C20.794 16.0172 20.6738 16.1424 20.5288 16.232C20.3838 16.3217 20.2184 16.3728 20.0466 16.3805C19.8748 16.3881 19.7054 16.3522 19.553 16.276L15 14M5 18H13C14.1046 18 15 17.1046 15 16V8C15 6.89543 14.1046 6 13 6H5C3.89543 6 3 6.89543 3 8V16C3 17.1046 3.89543 18 5 18Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </template>
            <template x-if="perm.name === 'microphone'">
               <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: block;">
                 <path d="M12 18.5V21M8 21H16M12 2C10.9391 2 9.92172 2.42143 9.17157 3.17157C8.42143 3.92172 8 4.93913 8 6V12C8 13.0609 8.42143 14.0783 9.17157 14.8284C9.92172 15.5786 10.9391 16 12 16C13.0609 16 14.0783 15.5786 14.8284 14.8284C15.5786 14.0783 16 13.0609 16 12V6C16 4.93913 15.5786 3.92172 14.8284 3.17157C14.0783 2.42143 13.0609 2 12 2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
               </svg>
            </template>
            <template x-if="perm.name === 'screen'">
               <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </template>
          </div>

          <!-- Text -->
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-gray-800 dark:text-white" x-text="perm.label"></p>
            <p class="text-[12px] text-gray-800 dark:text-neutral-400 truncate" x-text="perm.name === 'camera' ? 'Required to monitor you during the session' : (perm.name === 'microphone' ? 'Required for audio monitoring during the session' : 'Required to record your screen during the session')"></p>
          </div>

          <!-- Status / Action -->
          <div class="shrink-0 self-center">
            <template x-if="perm.state === 'requesting'">
               <svg width="18" height="18" viewBox="0 0 16 16" fill="none" class="v2-spinner">
                 <circle cx="8" cy="8" r="6" stroke="var(--v2-primary-400)" stroke-width="2" stroke-dasharray="28" stroke-dashoffset="10" opacity="0.4" />
                 <path d="M 8 2 A 6 6 0 0 1 14 8" stroke="var(--v2-primary-600)" stroke-width="2" stroke-linecap="round" />
               </svg>
            </template>
            <template x-if="perm.state === 'granted'">
               <div class="w-6 h-6 rounded-full flex items-center justify-center text-white v2-animate-pop-in" style="background: var(--color-success-600);">
                 <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6L5 9L10 3"/></svg>
               </div>
            </template>
            <template x-if="(perm.state === 'idle' || perm.state === 'retry') && permissions.slice(0, index).every(p => p.state === 'granted')">
               <button @click="requestPermission(perm.name)" class="px-4 py-1.5 rounded-lg bg-blue-600 text-sm font-semibold text-white hover:bg-blue-700 transition-colors">Allow</button>
            </template>
          </div>
        </div>
      </template>
    </div>

  </div>

  <div class="flex-1 flex flex-col justify-end">
    <div class="flex justify-end gap-2.5">
      <button @click="stage = 'hidden'" class="px-5 py-2.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 dark:bg-neutral-800 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 transition-colors">Cancel</button>
      <button :disabled="!permissions.every(p => p.state === 'granted')" @click="goToStep('identity')" class="px-6 py-2.5 rounded-lg bg-blue-600 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none transition-all dark:disabled:bg-neutral-800 dark:disabled:text-neutral-600">Continue</button>
    </div>
  </div>
</div>
