<div x-show="stage === 'ready'" class="flex flex-col h-full v2-animate-fade-in-up">
  
  <template x-if="engineStatus === 'starting'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col">
        <div class="mb-5">
          <h1 class="m-0 mb-1.5 text-[20px] font-semibold text-gray-900 dark:text-white leading-[1.3] font-sans">
            Finalizing setup
          </h1>
          <p class="m-0 text-sm text-gray-800 dark:text-neutral-200 leading-[1.5] font-sans">
            We're starting the proctoring engine to ensure your session is secure.
          </p>
        </div>
      </div>

      <div class="flex-none flex flex-col items-center justify-center my-6">
        <div class="relative mb-8">
          <div class="relative h-1.5 w-64 v2-bg-primary-tint rounded-full overflow-hidden">
            <div class="h-full w-full v2-gradient-primary rounded-full v2-animate-wobble"></div>
          </div>
        </div>
        <p class="m-0 text-[13px] font-medium text-gray-400 dark:text-neutral-500 font-sans text-center">
          Starting engine...
        </p>
      </div>

      
      <div class="flex-1 flex flex-col justify-end">
        <div class="flex justify-end pt-4 pb-2">
          <button disabled class="px-5 py-2 rounded-lg v2-bg-primary opacity-50 text-sm font-semibold text-white shadow-sm cursor-not-allowed">
            Close and start exam
          </button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="engineStatus === 'started'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col items-center justify-center text-center v2-animate-fade-in">
        <div class="mb-6 flex justify-center">
          <div class="w-[84px] h-[84px] rounded-full v2-gradient-success border-[1.5px] border-white/20 flex items-center justify-center text-white v2-animate-pop-in">
            <svg width="40" height="40" viewBox="0 0 32 32" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 16L13 21L24 10"/></svg>
          </div>
        </div>

        <div class="mb-6">
          <h1 class="text-xl font-semibold text-gray-900 dark:text-white leading-tight font-sans">Setup complete</h1>
          <p class="mt-2 text-sm text-gray-500 dark:text-neutral-400 leading-relaxed font-sans">
            Your setup is complete. You can now begin your session.
          </p>
        </div>

        <p class="text-[13px] text-gray-400 dark:text-neutral-500 font-sans v2-animate-fade-in text-center" aria-live="polite">
          Closing in <span x-text="countdown" class="font-medium text-gray-600 dark:text-neutral-300"></span>s…
        </p>
      </div>

      <div class="flex-none flex justify-end pt-4 pb-2">
        <button @click="goToStep('hidden')" 
                class="px-5 py-2 rounded-lg v2-bg-primary v2-bg-primary-hover text-sm font-semibold text-white shadow-sm transition-all transform active:scale-[0.98]">
          Close and start exam
        </button>
      </div>
    </div>
  </template>

</div>
