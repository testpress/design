<div x-data="{ 
         isOpen: false, 
         type: 'warning',
         title: 'Multiple Faces Detected',
         message: 'We have detected multiple faces in your camera feed. This is not permitted according to the exam guidelines, and the incident has been logged for proctor review.\n\nPlease ensure that only your face is visible in the frame and adjust your camera setup to clear other individuals from the view.',
         primaryText: 'Continue',
         icon: 'danger',

         show(data) {
            this.title = data.title || 'Action Required';
            this.message = data.message || '';
            this.type = data.type || 'warning';
            this.primaryText = data.primaryText || 'I Understand';
            this.isOpen = true;
         },

         close() {
            this.isOpen = false;
         }
     }"
     @show-warning-modal.window="show($event.detail)"
     class="fixed inset-0 z-[10000] flex items-center justify-center p-4 select-none"
     x-show="isOpen"
     x-cloak>
    
    <!-- Backdrop -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-neutral-900/60"
         @click="close()">
    </div>

    <!-- Modal Content -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative w-full max-w-lg bg-white dark:bg-neutral-800 rounded-xl overflow-hidden shadow-[var(--v2-shadow-modal)] pointer-events-auto">
        
        <!-- Header -->
        <div class="py-3 px-5 border-b border-gray-100 dark:border-neutral-700 flex items-center bg-gray-50/50 dark:bg-neutral-800">
            <h3 class="text-sm font-semibold text-gray-900 dark:text-neutral-200" x-text="type === 'danger' ? 'Critical Alert' : (type === 'info' ? 'System Notification' : 'Action Required')"></h3>
        </div>

        <div class="pt-6 px-8 pb-8">
            <!-- Space-efficient horizontal layout — icon on left, content on right -->
            <div class="flex flex-row items-start gap-5 text-left">
                
                <!-- Icon Circle -->
                <div class="flex-shrink-0 w-[52px] h-[52px] rounded-full border-[1.5px] flex items-center justify-center v2-animate-pop-in"
                     :class="{
                        'bg-amber-50 border-amber-200 dark:bg-amber-500/10 dark:border-amber-500/30 text-amber-600 dark:text-amber-500': type === 'warning',
                        'bg-red-50 border-red-200 dark:bg-red-500/10 dark:border-red-500/30 text-red-600 dark:text-red-500': type === 'danger',
                        'bg-blue-50 border-blue-200 dark:bg-blue-500/10 dark:border-blue-500/30 text-blue-600 dark:text-blue-500': type === 'info'
                     }">
                    
                    <template x-if="type === 'warning'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                    </template>

                    <template x-if="type === 'danger'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </template>

                    <template x-if="type === 'info'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </template>
                </div>

                <div class="flex flex-col">
                    <h2 class="text-[17px] font-semibold text-[var(--color-gray-900)] mb-1.5 font-sans" x-text="title">Warning Escalation</h2>
                    <template x-for="(paragraph, index) in (message || '').split('\n\n')" :key="index">
                        <p class="text-[14px] text-[var(--color-gray-500)] leading-[1.55] font-sans mb-3 last:mb-0" x-text="paragraph"></p>
                    </template>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-6 py-3 border-t border-gray-100 dark:border-neutral-700 flex flex-row items-center justify-end gap-2 bg-white dark:bg-neutral-800/50">
            <button type="button"
                    @click="close()"
                    class="px-3 py-1.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 dark:bg-neutral-800 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                Cancel
            </button>
            <button type="button"
                    @click="close()"
                    class="px-4 py-1.5 rounded-lg text-sm font-semibold text-white shadow-sm transition-all transform active:scale-[0.98]"
                    :class="{
                        'bg-amber-600 hover:bg-amber-700 hover:shadow-amber-600/20': type === 'warning',
                        'bg-[var(--v2-error-600)] hover:bg-red-700 hover:shadow-red-500/20': type === 'danger',
                        'bg-blue-600 hover:bg-blue-700 hover:shadow-blue-500/20': type === 'info'
                    }">
                <span x-text="primaryText">Continue</span>
            </button>
        </div>
    </div>
</div>

<style>
    [x-cloak] { display: none !important; }
</style>
