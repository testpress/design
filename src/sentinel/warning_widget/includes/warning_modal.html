<div x-data="{ 
         isOpen: false, 
         type: 'warning',
         title: 'Action Required',
         message: 'Multiple incidents has been recorded. Please ensure you are strictly following the exam guidelines to avoid disqualification.',
         primaryText: 'I Understand',
         icon: 'warning',

         show(data) {
            this.title = data.title || 'Action Required';
            this.message = data.message || '';
            this.type = data.type || 'warning';
            this.primaryText = data.primaryText || 'I Understand';
            this.isOpen = true;
         },

         close() {
            this.isOpen = false;
         }
     }"
     @show-warning-modal.window="show($event.detail)"
     class="fixed inset-0 z-[10000] flex items-center justify-center p-4 select-none"
     x-show="isOpen"
     x-cloak>
    
    <!-- Backdrop -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-neutral-900/60"
         @click="close()">
    </div>

    <!-- Modal Content -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative w-full max-w-lg bg-white dark:bg-neutral-800 rounded-xl overflow-hidden shadow-[var(--v2-shadow-modal)] pointer-events-auto">
        
        <!-- Header -->
        <div class="py-3 px-5 border-b border-gray-100 dark:border-neutral-700 flex items-center bg-gray-50/50 dark:bg-neutral-800">
            <h3 class="text-sm font-semibold text-gray-900 dark:text-neutral-200" x-text="type === 'danger' ? 'Critical Alert' : (type === 'info' ? 'System Notification' : 'Action Required')"></h3>
        </div>

        <div class="p-8">
            <!-- Centered content — icon + title + description -->
            <div class="flex flex-col items-center text-center">
                
                <!-- Icon Circle -->
                <div class="mb-6 w-[68px] h-[68px] rounded-full border-[2.5px] flex items-center justify-center v2-animate-pop-in"
                     :class="{
                        'bg-amber-50 dark:bg-amber-500/10 border-amber-600/40 dark:border-amber-500/50 text-amber-600': type === 'warning',
                        'bg-red-50 dark:bg-red-500/10 border-red-600/40 dark:border-red-500/50 text-red-600': type === 'danger',
                        'bg-blue-50 dark:bg-blue-500/10 border-blue-500/40 dark:border-blue-500/50 text-blue-600': type === 'info'
                     }">
                    
                    <template x-if="type === 'warning'">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                    </template>

                    <template x-if="type === 'danger'">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </template>

                    <template x-if="type === 'info'">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </template>
                </div>

                <h2 class="text-[18px] font-semibold text-[var(--color-gray-900)] mb-2 font-sans" x-text="title">Warning Escalation</h2>
                <p class="text-[14px] text-[var(--color-gray-500)] leading-[1.55] max-w-[340px] font-sans" x-text="message">
                    Multiple incidents has been recorded. Please ensure you are strictly following the exam guidelines to avoid disqualification.
                </p>
            </div>

            <!-- Footer Actions -->
            <div class="mt-10 flex flex-row items-center justify-end gap-3">
                <button type="button"
                        @click="close()"
                        class="px-5 py-2.5 rounded-lg border-[1.5px] border-[var(--color-gray-200)] dark:border-neutral-700 dark:bg-neutral-800 text-sm font-medium text-gray-600 dark:text-neutral-300 hover:bg-gray-50 dark:hover:bg-neutral-700 hover:text-gray-900 dark:hover:text-white transition-colors">
                    Cancel
                </button>
                <button type="button"
                        @click="close()"
                        class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white shadow-sm transition-all transform active:scale-[0.98]"
                        :class="{
                            'bg-[var(--v2-warning-600)] hover:bg-amber-700 hover:shadow-amber-500/20': type === 'warning',
                            'bg-[var(--v2-error-600)] hover:bg-red-700 hover:shadow-red-500/20': type === 'danger',
                            'bg-blue-600 hover:bg-blue-700 hover:shadow-blue-500/20': type === 'info'
                        }">
                    <span x-text="primaryText">Continue</span>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    [x-cloak] { display: none !important; }
</style>
