<div x-show="stage === 'ready'" class="flex flex-col h-full sentinel-animate-fade-in-up">
  
  <template x-if="engineStatus === 'starting'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col">
        <div class="mb-5">
          <h1 class="m-0 mb-1.5 text-xl font-semibold text-foreground leading-snug font-sans">
            Finalizing setup
          </h1>
          <p class="m-0 text-sm text-muted-foreground-2 leading-normal font-sans">
            We're starting the proctoring engine to ensure your session is secure.
          </p>
        </div>
      </div>

      <div class="flex-none flex flex-col items-center justify-center my-6">
        <div class="relative mb-8">
          <div class="relative h-1.5 w-64 bg-primary/10 rounded-full overflow-hidden">
            <div class="h-full w-full bg-gradient-to-r from-primary-400 via-primary-500 to-primary-600 rounded-full sentinel-animate-wobble"></div>
          </div>
        </div>
        <p class="m-0 text-sm font-medium text-muted-foreground font-sans text-center">
          Starting engine...
        </p>
      </div>

      
      <div class="flex-1 flex flex-col justify-end">
        <div class="flex justify-end pt-4 pb-2">
          <button disabled class="px-5 py-2 rounded-lg bg-primary-600 opacity-50 text-sm font-semibold text-white shadow-sm cursor-not-allowed">
            Begin
          </button>
        </div>
      </div>
    </div>
  </template>

  <template x-if="engineStatus === 'started'">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col items-center justify-center text-center sentinel-animate-fade-in">
        <div class="mb-6 flex justify-center">
          <div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-400 border-1.5 border-white/20 flex items-center justify-center text-white sentinel-animate-pop-in">
            <svg width="40" height="40" viewBox="0 0 32 32" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 16L13 21L24 10"/></svg>
          </div>
        </div>

        <div class="mb-6">
          <h1 class="text-xl font-semibold text-foreground leading-tight font-sans">Setup complete</h1>
          <p class="mt-2 text-sm text-muted-foreground-1 leading-relaxed font-sans">
            Your setup is complete. You can now begin your session.
          </p>
        </div>

        <p class="text-sm text-muted-foreground font-sans sentinel-animate-fade-in text-center" aria-live="polite">
          Auto begins in <span x-text="countdown" class="font-medium text-muted-foreground-2"></span>s…
        </p>
      </div>

      <div class="flex-none flex justify-end pt-4 pb-2">
        <button @click="goToStep('hidden')" 
                class="px-5 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-sm font-semibold text-white shadow-sm transition-all transform active:scale-95">
          Begin
        </button>
      </div>
    </div>
  </template>

</div>
