<div
  x-show="statusLabel === 'Awaiting approval' || statusLabel === 'Approved' || statusLabel === 'Processing payment' || statusLabel === 'Completed' || statusLabel === 'Rejected' || statusLabel === 'Failed'"
  x-cloak
  class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700"
>
  <div class="mb-4 px-4 sm:px-0 flex items-center justify-between gap-3">
    <h2 class="font-medium text-gray-800 dark:text-neutral-200">
      Institute payouts
    </h2>
  </div>

  <!-- Search -->
  <div class="mb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div class="relative max-w-sm w-full">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg"
             width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
      </div>
      <input
        type="text"
        x-model="instituteSearch"
        class="py-[7px] ps-10 pe-3 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none"
        placeholder="Search institute"
      >
    </div>

    <div class="w-full sm:w-44" x-show="statusLabel === 'Processing payment' || statusLabel === 'Completed'">
      <select
        x-model="instituteStatusFilter"
        data-hs-select='{
          "placeholder": "All Status",
          "toggleTag": "<button type=\"button\" aria-expanded=\"false\"><span data-title></span></button>",
          "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 px-3 pe-8 flex text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm text-gray-800 focus:outline-hidden focus:ring-2 focus:ring-emerald-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600",
          "dropdownClasses": "mt-2 max-h-72 pb-1 px-1 space-y-0.5 z-20 w-full bg-white border border-gray-200 rounded-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 dark:bg-neutral-900 dark:border-neutral-700",
          "optionClasses": "py-2 px-3 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-hidden focus:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800",
          "optionTemplate": "<div><div class=\"flex items-center\"><div class=\"text-gray-800 dark:text-neutral-200\" data-title></div></div></div>",
          "extraMarkup": "<div class=\"absolute top-1/2 end-2 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500 dark:text-neutral-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
        }'
        class="hidden"
      >
        <option value="all">All Status</option>
        <option value="processing">Processing</option>
        <option value="paid">Paid</option>
        <option value="failed">Failed</option>
      </select>
    </div>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300">
    <div class="min-w-full inline-block align-middle">
      <table class="min-w-full divide-y divide-gray-200">
        <thead>
          <tr>
            <th scope="col" class="min-w-[220px]">
              <span class="px-5 py-2.5 block text-left text-sm font-normal text-gray-500">
                Institute
              </span>
            </th>
            <th scope="col" class="min-w-[160px]">
              <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                <button
                  id="payout-institute-total-sort"
                  type="button"
                  class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
                  aria-haspopup="menu"
                  aria-expanded="false"
                >
                  Total amount
                  <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                       width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m7 15 5 5 5-5" />
                    <path d="m7 9 5-5 5 5" />
                  </svg>
                </button>
                <div
                  class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                  role="menu"
                  aria-orientation="vertical"
                  aria-labelledby="payout-institute-total-sort"
                >
                  <div class="p-1">
                    <button
                      type="button"
                      @click="setInstituteSort('asc')"
                      class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                    >
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                           stroke-linecap="round" stroke-linejoin="round">
                        <path d="m5 12 7-7 7 7" />
                        <path d="M12 19V5" />
                      </svg>
                      Sort ascending
                    </button>
                    <button
                      type="button"
                      @click="setInstituteSort('desc')"
                      class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                    >
                      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                           stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14" />
                        <path d="m19 12-7 7-7-7" />
                      </svg>
                      Sort descending
                    </button>
                  </div>
                </div>
              </div>
            </th>
            <th
              scope="col"
              class="min-w-[140px]"
              x-show="statusLabel === 'Processing payment' || statusLabel === 'Completed'"
            >
              <span class="px-5 py-2.5 block text-left text-sm font-normal text-gray-500">
                Status
              </span>
            </th>
            <th scope="col" class="min-w-[160px]">
              <span class="px-5 py-2.5 block text-right text-sm font-normal text-gray-500">
                &nbsp;
              </span>
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <template x-for="institute in filteredInstitutePayouts()" :key="institute.name">
            <tr>
              <td class="size-px whitespace-nowrap px-5 py-3">
                <span class="text-sm text-gray-800 dark:text-neutral-200" x-text="institute.name"></span>
              </td>
              <td
                class="size-px whitespace-nowrap px-5 py-3"
                x-show="statusLabel === 'Processing payment' || statusLabel === 'Completed'"
              >
                <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="institute.total_amount"></span>
              </td>
              <td
                class="size-px whitespace-nowrap px-5 py-3"
                x-show="statusLabel === 'Processing payment' || statusLabel === 'Completed'"
              >
                <span
                  class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium"
                  :class="{
                    'bg-sky-100 text-sky-800 dark:bg-sky-900/40 dark:text-sky-300': institute.status === 'processing',
                    'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300': institute.status === 'paid',
                    'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300': institute.status === 'failed',
                  }"
                >
                  <span x-text="formatInstituteStatus(institute.status)"></span>
                </span>
                <template x-if="institute.status === 'failed' && institute.failure_reason">
                  <div class="hs-tooltip [--trigger:hover] [--placement:top] inline-block ml-2">
                    <button
                      type="button"
                      class="hs-tooltip-toggle text-xs text-gray-500 hover:text-gray-700 underline underline-offset-2 dark:text-neutral-400 dark:hover:text-neutral-200"
                    >
                      View reason
                    </button>
                    <span
                      class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 max-w-xs py-1.5 px-2.5 bg-white border border-gray-200 text-left text-xs font-medium text-gray-800 rounded-sm shadow-md whitespace-pre-wrap break-words dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200"
                      role="tooltip"
                      x-text="institute.failure_reason"
                    ></span>
                  </div>
                </template>
              </td>
              <td class="size-px whitespace-nowrap px-4 py-3 text-end">
                <a
                  :href="institute.ledger_url"
                  class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
                >
                  View ledger
                </a>
                <template x-if="(statusLabel === 'Processing payment' || statusLabel === 'Completed') && institute.status === 'failed'">
                  <button
                    type="button"
                    class="ml-2 py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
                  >
                    Retry
                  </button>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
