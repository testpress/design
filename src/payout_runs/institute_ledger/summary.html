  <div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700">
    <!-- Header -->
    <div class="pb-5 mb-5 border-b border-gray-200 dark:border-neutral-700">
      <div class="flex flex-wrap justify-between items-center gap-3">
        <div class="grow">
          <div class="flex items-center space-x-2">
            <h2 class="font-medium text-gray-800 dark:text-neutral-200" x-text="instituteName"></h2>
            <div class="flex items-center space-x-2">
              <span
                x-show="payoutState"
                class="inline-flex items-center gap-x-1.5 rounded-full px-1.5 py-0.5 text-xs font-medium"
                :class="{
                  'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300': payoutState === 'paid',
                  'bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300': payoutState === 'calculated',
                  'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300': payoutState === 'failed',
                }"
              >
                <svg class="h-1.5 w-1.5"
                    :class="{
                      'fill-emerald-500': payoutState === 'paid',
                      'fill-gray-500': payoutState === 'calculated',
                      'fill-red-500': payoutState === 'failed',
                    }"
                    viewBox="0 0 6 6"
                    aria-hidden="true">
                  <circle cx="3" cy="3" r="3"></circle>
                </svg>
                <span
                  x-text="payoutState === 'paid'
                    ? 'Paid'
                    : payoutState === 'calculated'
                      ? 'Calculated'
                      : 'Failed'"
                ></span>
              </span>
            </div>
          </div>

          <ul class="flex flex-wrap items-center whitespace-nowrap gap-1.5 mt-1">
            <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
              <p class="text-xs text-gray-500 dark:text-neutral-500" x-text="createdOnDisplay"></p>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <!-- End Header -->

    <!-- Payout period / Bank reference -->
    <div class="pb-4 mb-4 border-b border-gray-200 dark:border-neutral-700">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-10">
        <!-- Payout period -->
        <div class="relative w-full">
          <div class="mb-2 flex flex-col">
            <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
              Payout period
            </span>
            <div class="mt-1 flex items-start gap-x-2">
              <svg class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24" height="24" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 2v4" />
                <path d="M16 2v4" />
                <rect width="18" height="18" x="3" y="4" rx="2" />
                <path d="M3 10h18" />
                <path d="M8 14h.01" />
                <path d="M12 14h.01" />
                <path d="M16 14h.01" />
                <path d="M8 18h.01" />
                <path d="M12 18h.01" />
                <path d="M16 18h.01" />
              </svg>
              <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="timeWindowDisplay"></p>
            </div>
          </div>
        </div>

        <!-- Bank reference -->
        <div class="relative w-full">
          <div class="mb-2 flex flex-col">
            <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
              Bank reference
            </span>
            <div class="mt-1 flex items-start gap-x-2">
              <svg class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24" height="24" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="14" x="2" y="5" rx="2" />
                <path d="M2 10h20" />
                <path d="M6 15h.01" />
                <path d="M10 15h4" />
              </svg>
              <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="gatewayPayoutId || '-'"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Ledger breakdown stats -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-5">
          <!-- Gross payments -->
          <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
            <div class="sm:flex sm:gap-x-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-emerald-400">
                <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" />
                <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
                <path d="M12 18V6" />
              </svg>
              <div class="sm:order-1 grow space-y-1">
                <h2 class="sm:mb-1 text-sm text-gray-500 dark:text-neutral-400">
                  Gross payments
                </h2>
                <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200" x-text="breakdown.gross"></p>
              </div>
            </div>
          </div>

          <!-- Platform fees -->
          <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
            <div class="sm:flex sm:gap-x-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-amber-400">
                <path d="M12 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5" />
                <path d="M18 12h.01" />
                <path d="M19 22v-6" />
                <path d="m22 19-3-3-3 3" />
                <path d="M6 12h.01" />
                <circle cx="12" cy="12" r="2" />
              </svg>
              <div class="sm:order-1 grow space-y-1">
                <h2 class="sm:mb-1 text-sm text-gray-500 dark:text-neutral-400">
                  Platform fees
                </h2>
                <p class="text-lg md:text-xl font-semibold text-red-600 dark:text-red-400" x-text="breakdown.platformFee"></p>
              </div>
            </div>
          </div>

          <!-- Taxes -->
          <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
            <div class="sm:flex sm:gap-x-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-red-400">
                <path d="M13 18H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5" />
                <path d="m17 17 5 5" />
                <path d="M18 12h.01" />
                <path d="m22 17-5 5" />
                <path d="M6 12h.01" />
                <circle cx="12" cy="12" r="2" />
              </svg>
              <div class="sm:order-1 grow space-y-1">
                <h2 class="sm:mb-1 text-sm text-gray-500 dark:text-neutral-400">
                  Taxes
                </h2>
                <p class="text-lg md:text-xl font-semibold text-red-600 dark:text-red-400" x-text="breakdown.tax"></p>
              </div>
            </div>
          </div>

          <!-- Net payout -->
          <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
            <div class="sm:flex sm:gap-x-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-sky-400">
                <path d="M14 21v-3a2 2 0 0 0-4 0v3" />
                <path d="M18 12h.01" />
                <path d="M18 16h.01" />
                <path d="M22 7a1 1 0 0 0-1-1h-2a2 2 0 0 1-1.143-.359L13.143 2.36a2 2 0 0 0-2.286-.001L6.143 5.64A2 2 0 0 1 5 6H3a1 1 0 0 0-1 1v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2z" />
                <path d="M6 12h.01" />
                <path d="M6 16h.01" />
                <circle cx="12" cy="10" r="2" />
              </svg>
              <div class="sm:order-1 grow space-y-1">
                <h2 class="sm:mb-1 text-sm text-gray-500 dark:text-neutral-400">
                  Net payout
                </h2>
                <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200" x-text="breakdown.net"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
