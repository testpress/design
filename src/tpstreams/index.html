---
title: TPStreams
---
{% extends "layouts/base.html" %}

{% block body %}
<body class="h-full {% block body_class %} {% endblock %}">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <header class="mb-6">
      <nav aria-label="Breadcrumb" class="flex">
        <ol role="list" class="flex items-center space-x-4">
          <li>
            <div>
              <a href="{{ '/' | url }}" class="text-gray-400 hover:text-gray-500">
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5 shrink-0">
                  <path d="M9.293 2.293a1 1 0 0 1 1.414 0l7 7A1 1 0 0 1 17 11h-1v6a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-6H3a1 1 0 0 1-.707-1.707l7-7Z" clip-rule="evenodd" fill-rule="evenodd" />
                </svg>
                <span class="sr-only">Home</span>
              </a>
            </div>
          </li>
          <li>
            <div class="flex items-center">
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5 shrink-0 text-gray-300">
                <path d="M5.555 17.776l8-16 .894.448-8 16-.894-.448z" />
              </svg>
              <span aria-current="page" class="ml-4 text-sm font-medium text-gray-700">{{ title }}</span>
            </div>
          </li>
        </ol>
      </nav>
      <div class="mt-4 flex flex-wrap items-start justify-between gap-3 border-b border-gray-200 pb-4">
        <div>
          <h1 class="text-xl font-semibold text-gray-900">{{ title }}</h1>
          <p class="mt-1 text-sm text-gray-600">Browse all available design pages for this product.</p>
        </div>
        <a href="{{ '/' | url }}" class="inline-flex items-center rounded-md px-1 py-1 text-sm font-medium text-indigo-600 hover:text-indigo-800">
          Back to library
        </a>
      </div>
    </header>
    <ul class="list-disc mt-4 pl-5">
      {%- for item in collections.tpstreams -%}
      <li><a target="_blank" href="{{ item.url|url }}" class="text-indigo-600 hover:text-indigo-900">{{ item.data.title }}</a></li>
      {%- endfor -%}
    </ul>
  </div>
</body>
{% endblock %}
