<div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3 lg:gap-5">
  <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-sm text-gray-500">Total License Requests</p>
        <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="formatNumber(totalLicenseRequests)"></p>
      </div>
      <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
  </div>

  <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-sm text-gray-500">Average per Day</p>
        <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="averagePerDay"></p>
      </div>
      <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M3 3v18h18"></path>
        <path d="m19 9-5 5-4-4-3 3"></path>
      </svg>
    </div>
  </div>

  <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm sm:col-span-2 lg:col-span-1">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-sm text-gray-500">Highest Usage Day</p>
        <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="highestDayDisplay"></p>
      </div>
      <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="m22 7-8.5 8.5-5-5L2 17"></path>
      </svg>
    </div>
  </div>
</div>
