<script>
  const drmUsageReport = {{ drm_usage | dump | safe }};

  function drmUsageComponent() {
    return {
      selectedMonth: null,
      reportMonth: null,
      monthOptions: [],
      currentMonth: null,
      usageByDate: {},

      init() {
        this.usageByDate = this.getUsageByDate(drmUsageReport.records || []);
        this.monthOptions = this.getMonthOptions(drmUsageReport.records || []);

        if (!this.monthOptions.length) return;

        this.currentMonth = this.monthOptions[0].value;

        const params = new URLSearchParams(window.location.search);
        const monthParam = params.get('month');
        this.selectedMonth = this.monthOptions.some(month => month.value === monthParam)
          ? monthParam
          : this.currentMonth;
        this.reportMonth = this.selectedMonth;

        this.$watch('selectedMonth', value => {
          if (!value) return;
          const url = new URL(window.location);
          url.searchParams.set('month', value);
          window.history.replaceState({}, '', url.pathname + url.search);
          this.reportMonth = this.selectedMonth;
        });
      },

      get selectedMonthLabel() {
        const month = this.monthOptions.find(option => option.value === this.selectedMonth);
        return month ? month.label : '';
      },

      getUsageByDate(records) {
        return records.reduce((usageByDate, record) => {
          usageByDate[record.date] = record.drm_summary_usage || {};
          return usageByDate;
        }, {});
      },

      getMonthOptions(records) {
        const months = records.reduce((monthsByValue, record) => {
          const monthValue = record.date.slice(0, 7);
          const [year, month] = monthValue.split('-').map(Number);
          monthsByValue[monthValue] = {
            label: new Date(year, month - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' }),
            value: monthValue
          };
          return monthsByValue;
        }, {});

        return Object.values(months).sort((first, second) => second.value.localeCompare(first.value));
      },

      get daysInSelectedMonth() {
        if (!this.reportMonth) return [];
        const [year, month] = this.reportMonth.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const monthLabel = new Date(year, month - 1, 1).toLocaleString('default', { month: 'short' });
        const days = [];

        for (let day = 1; day <= daysInMonth; day++) {
          const date = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          days.push({
            date,
            label: `${day} ${monthLabel}`,
            chartLabel: String(day),
            count: this.usageByDate[date]?.total_requests || 0
          });
        }

        return days;
      },

      get totalLicenseRequests() {
        return this.daysInSelectedMonth.reduce((total, day) => total + day.count, 0);
      },

      get averagePerDay() {
        if (!this.daysInSelectedMonth.length) return 0;
        return Math.round((this.totalLicenseRequests / this.daysInSelectedMonth.length) * 10) / 10;
      },

    get highestDay() {
        if (!this.daysInSelectedMonth.length) return { label: '-', count: 0 };
        const bestDay = this.daysInSelectedMonth.reduce((best, day) => day.count > best.count ? day : best, this.daysInSelectedMonth[0]);
        return bestDay.count > 0 ? bestDay : { label: '-', count: 0 };
      },

      formatNumber(value) {
        return new Intl.NumberFormat().format(value);
      }
    };
  }
</script>
