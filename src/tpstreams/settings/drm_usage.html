{% extends "./base.html" %}

{% block settings %}
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<div class="mt-8 space-y-6" x-data="drmUsageComponent()">
  <div class="flex flex-wrap justify-between items-center gap-3">
    <div>
      <h2 class="text-lg font-semibold text-gray-900">DRM Usage</h2>
      <p class="mt-1 text-sm text-gray-500">Daily DRM license request usage overview</p>
    </div>

    <div class="inline-flex -space-x-px">
      <button type="button" @click="goToPreviousMonth"
        :disabled="selectedMonth === monthOptions[monthOptions.length - 1]?.value"
        class="group py-2 px-2.5 inline-flex items-center rounded-l-lg border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white">
        <svg class="size-3.5 group-disabled:text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>

      <div class="relative" x-data="{ open: false }">
        <button type="button" @click="open = !open"
          class="py-2 px-3 inline-flex items-center border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50">
          <span x-text="selectedMonthLabel"></span>
        </button>

        <div x-show="open" @click.away="open = false"
          class="absolute right-0 z-10 mt-2 w-48 rounded-xl bg-white shadow-lg ring-1 ring-black/5">
          <div class="p-1">
            <template x-for="month in monthOptions" :key="month.value">
              <button type="button" @click="selectedMonth = month.value; open = false"
                class="w-full rounded-lg px-3 py-2 text-left text-sm text-gray-800 hover:bg-gray-100">
                <span x-text="month.label"></span>
              </button>
            </template>
          </div>
        </div>
      </div>

      <button type="button" @click="goToNextMonth" :disabled="selectedMonth === currentMonth"
        class="group py-2 px-2.5 inline-flex items-center rounded-r-lg border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white">
        <svg class="size-3.5 group-disabled:text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3 lg:gap-5">
    <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-sm text-gray-500">Total License Requests</p>
          <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="formatNumber(totalLicenseRequests)"></p>
        </div>
        <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
    </div>

    <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-sm text-gray-500">Average per Day</p>
          <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="averagePerDay"></p>
        </div>
        <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M3 3v18h18"></path>
          <path d="m19 9-5 5-4-4-3 3"></path>
        </svg>
      </div>
    </div>

    <div class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm sm:col-span-2 lg:col-span-1">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="text-sm text-gray-500">Highest Usage Day</p>
          <p class="mt-3 text-2xl font-semibold text-gray-900" x-text="highestDayDisplay"></p>
        </div>
        <svg class="size-6 shrink-0 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="m22 7-8.5 8.5-5-5L2 17"></path>
        </svg>
      </div>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
    <div class="flex flex-wrap items-center justify-between gap-3 border-b border-gray-200 px-5 py-3">
      <h3 class="text-sm font-semibold text-gray-800 sm:text-base">Daily License Requests</h3>

      <div class="inline-flex items-center gap-x-1 rounded-md border border-gray-200 bg-gray-50 p-0.5">
        <button type="button" @click="setViewMode('graph')"
          class="inline-flex items-center justify-center rounded px-2.5 py-2 transition-colors"
          :class="viewMode === 'graph' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-600 hover:bg-white/60'"
          aria-label="Graph view">
          <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v16a2 2 0 0 0 2 2h16"></path>
            <path d="M7 16c.5-2 1.5-7 4-7 2 0 2 3 4 3 2.5 0 4.5-5 5-7"></path>
          </svg>
        </button>
        <button type="button" @click="setViewMode('table')"
          class="inline-flex items-center justify-center rounded px-2.5 py-2 transition-colors"
          :class="viewMode === 'table' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-600 hover:bg-white/60'"
          aria-label="Table view">
          <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18"></path>
            <rect width="18" height="18" x="3" y="3" rx="2"></rect>
            <path d="M3 9h18"></path>
            <path d="M3 15h18"></path>
          </svg>
        </button>
      </div>
    </div>

    <div x-show="totalLicenseRequests === 0" class="px-5 py-12 text-center">
      <svg class="mx-auto size-10 text-gray-300" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <h3 class="mt-3 text-sm font-semibold text-gray-900">No DRM usage found</h3>
      <p class="mt-1 text-sm text-gray-500">DRM license requests for the selected month will appear here.</p>
    </div>

    <div x-show="totalLicenseRequests > 0">
      <div x-show="viewMode === 'graph'" class="min-h-[315px] p-5">
        <div id="drm-usage-chart" class="min-h-[315px]"></div>
      </div>

      <div x-show="viewMode === 'table'" class="overflow-x-auto">
        <table class="min-w-full table-fixed divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="w-1/2">
                <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
                  <button type="button" @click="open = !open"
                    class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 focus:outline-none focus:bg-gray-100"
                    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort Date">
                    Date
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round">
                      <path d="m7 15 5 5 5-5"></path>
                      <path d="m7 9 5-5 5 5"></path>
                    </svg>
                  </button>
                  <div x-show="open" @click.away="open = false"
                    class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
                    role="menu" aria-orientation="vertical">
                    <div class="p-1">
                      <button type="button"
                        class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
                        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round">
                          <path d="m5 12 7-7 7 7"></path>
                          <path d="M12 19V5"></path>
                        </svg>
                        Sort ascending
                      </button>
                      <button type="button"
                        class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
                        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round">
                          <path d="M12 5v14"></path>
                          <path d="m19 12-7 7-7-7"></path>
                        </svg>
                        Sort descending
                      </button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="w-1/2">
                <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
                  <button type="button" @click="open = !open"
                    class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 focus:outline-none focus:bg-gray-100"
                    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort License Requests">
                    License Requests
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                      stroke-linejoin="round">
                      <path d="m7 15 5 5 5-5"></path>
                      <path d="m7 9 5-5 5 5"></path>
                    </svg>
                  </button>
                  <div x-show="open" @click.away="open = false"
                    class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
                    role="menu" aria-orientation="vertical">
                    <div class="p-1">
                      <button type="button"
                        class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
                        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round">
                          <path d="m5 12 7-7 7 7"></path>
                          <path d="M12 19V5"></path>
                        </svg>
                        Sort ascending
                      </button>
                      <button type="button"
                        class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
                        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round">
                          <path d="M12 5v14"></path>
                          <path d="m19 12-7 7-7-7"></path>
                        </svg>
                        Sort descending
                      </button>
                    </div>
                  </div>
                </div>
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 bg-white">
            <template x-for="day in daysInSelectedMonth" :key="day.date">
              <tr>
                <td class="whitespace-nowrap px-5 py-3 text-sm text-gray-800" x-text="day.label"></td>
                <td class="whitespace-nowrap px-5 py-3 text-sm font-semibold text-gray-900" x-text="formatNumber(day.count)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  function drmUsageComponent() {
    return {
      selectedMonth: null,
      reportMonth: null,
      monthOptions: [],
      currentMonth: null,
      viewMode: 'graph',
      usageByDate: {},
      chart: null,

      init() {
        this.monthOptions = this.getLast12Months();
        this.currentMonth = this.monthOptions[0].value;

        const params = new URLSearchParams(window.location.search);
        const monthParam = params.get('month');
        this.selectedMonth = this.monthOptions.some(month => month.value === monthParam)
          ? monthParam
          : this.currentMonth;
        this.reportMonth = this.selectedMonth;

        this.$watch('selectedMonth', value => {
          if (!value) return;
          const url = new URL(window.location);
          url.searchParams.set('month', value);
          window.history.replaceState({}, '', url.pathname + url.search);
          this.fetchUsageForMonth();
        });

        this.fetchUsageForMonth();
      },

      get selectedMonthLabel() {
        const month = this.monthOptions.find(option => option.value === this.selectedMonth);
        return month ? month.label : '';
      },

      get daysInSelectedMonth() {
        if (!this.reportMonth) return [];
        const [year, month] = this.reportMonth.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const monthLabel = new Date(year, month - 1, 1).toLocaleString('default', { month: 'short' });
        const days = [];

        for (let day = 1; day <= daysInMonth; day++) {
          const date = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          days.push({
            date,
            label: `${day} ${monthLabel}`,
            chartLabel: String(day),
            count: this.usageByDate[date] || 0
          });
        }

        return days;
      },

      get totalLicenseRequests() {
        return this.daysInSelectedMonth.reduce((total, day) => total + day.count, 0);
      },

      get averagePerDay() {
        if (!this.daysInSelectedMonth.length) return 0;
        return Math.round((this.totalLicenseRequests / this.daysInSelectedMonth.length) * 10) / 10;
      },

      get highestDay() {
        if (!this.daysInSelectedMonth.length) return { label: '-', count: 0 };
        const bestDay = this.daysInSelectedMonth.reduce((best, day) => day.count > best.count ? day : best, this.daysInSelectedMonth[0]);
        return bestDay.count > 0 ? bestDay : { label: '-', count: 0 };
      },

      get highestDayDisplay() {
        if (this.highestDay.count === 0) return 'No usage';
        return `${this.highestDay.label} · ${this.formatNumber(this.highestDay.count)}`;
      },

      getLast12Months() {
        const months = [];
        const now = new Date();

        for (let offset = 0; offset < 12; offset++) {
          const date = new Date(now.getFullYear(), now.getMonth() - offset, 1);
          months.push({
            label: date.toLocaleString('default', { month: 'long', year: 'numeric' }),
            value: `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`
          });
        }

        return months;
      },

      goToPreviousMonth() {
        const [year, month] = this.selectedMonth.split('-').map(Number);
        const previousDate = new Date(year, month - 2, 1);
        const previous = `${previousDate.getFullYear()}-${String(previousDate.getMonth() + 1).padStart(2, '0')}`;
        if (this.monthOptions.some(option => option.value === previous)) {
          this.selectedMonth = previous;
        }
      },

      goToNextMonth() {
        if (this.selectedMonth === this.currentMonth) return;
        const [year, month] = this.selectedMonth.split('-').map(Number);
        const nextDate = new Date(year, month, 1);
        const next = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}`;
        if (this.monthOptions.some(option => option.value === next)) {
          this.selectedMonth = next;
        }
      },

      setViewMode(mode) {
        this.viewMode = mode === 'table' ? 'table' : 'graph';
        if (this.viewMode === 'graph') {
          this.$nextTick(() => this.renderChart());
        }
      },

      fetchUsageForMonth() {
        const monthToRender = this.selectedMonth;
        const [year, month] = monthToRender.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const usage = {};

        for (let day = 1; day <= daysInMonth; day++) {
          const date = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          usage[date] = monthToRender === this.monthOptions[this.monthOptions.length - 1].value
            ? 0
            : this.dailyCountForDay(day, daysInMonth);
        }

        this.usageByDate = usage;
        this.reportMonth = monthToRender;
        this.$nextTick(() => {
          if (this.totalLicenseRequests === 0) {
            this.destroyChart();
            return;
          }
          this.renderChart();
        });
      },

      dailyCountForDay(day, daysInMonth) {
        const wave = Math.sin((day / daysInMonth) * Math.PI * 2 - Math.PI / 2);
        const secondWave = Math.sin((day / daysInMonth) * Math.PI * 4) * 38;
        return Math.max(0, Math.round(210 + (wave * 125) + secondWave));
      },

      renderChart() {
        const chartElement = document.querySelector('#drm-usage-chart');
        if (!chartElement || typeof ApexCharts === 'undefined') return;
        if (this.totalLicenseRequests === 0) {
          this.destroyChart();
          return;
        }

        const options = {
          chart: {
            height: 350,
            type: 'line',
            toolbar: { show: false },
            zoom: { enabled: false },
            animations: { enabled: true, dynamicAnimation: { speed: 250 } }
          },
          series: [{
            name: 'License Requests',
            data: this.daysInSelectedMonth.map(day => day.count)
          }],
          colors: ['#2563eb'],
          dataLabels: { enabled: false },
          stroke: { curve: 'smooth', width: 2 },
          markers: { size: 4, strokeWidth: 0, hover: { size: 6 } },
          grid: {
            show: true,
            borderColor: '#f0f0f0',
            strokeDashArray: 4,
            xaxis: { lines: { show: true } },
            yaxis: { lines: { show: true } }
          },
          xaxis: {
            categories: this.daysInSelectedMonth.map(day => day.chartLabel),
            tickAmount: this.daysInSelectedMonth.length - 1,
            axisBorder: { color: '#d1d5db' },
            axisTicks: { show: false },
            labels: {
              rotate: 0,
              hideOverlappingLabels: true,
              trim: false,
              style: { colors: '#6b7280', fontSize: '12px' }
            },
            crosshairs: {
              show: true,
              stroke: { color: '#d1d5db', width: 1, dashArray: 4 }
            },
            tooltip: { enabled: false }
          },
          yaxis: {
            min: 0,
            tickAmount: 4,
            labels: { style: { colors: '#6b7280', fontSize: '12px' } }
          },
          tooltip: {
            shared: false,
            intersect: false,
            y: { formatter: value => `${value} license requests` }
          }
        };

        if (this.chart) {
          this.chart.updateOptions(options);
          return;
        }

        this.chart = new ApexCharts(chartElement, options);
        this.chart.render();
      },

      destroyChart() {
        const chartElement = document.querySelector('#drm-usage-chart');
        if (this.chart) {
          this.chart.destroy();
          this.chart = null;
        }
        if (chartElement) {
          chartElement.innerHTML = '';
        }
      },

      formatNumber(value) {
        return new Intl.NumberFormat().format(value);
      }
    };
  }
</script>
{% endblock %}
