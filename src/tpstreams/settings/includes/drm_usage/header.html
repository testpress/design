<div class="flex flex-wrap justify-between items-center gap-3">
  <div>
    <h2 class="text-lg font-semibold text-gray-900">DRM Usage</h2>
    <p class="mt-1 text-sm text-gray-500">Daily DRM license request usage overview</p>
  </div>

  <div class="inline-flex -space-x-px">
    <button type="button" @click="goToPreviousMonth"
      :disabled="selectedMonth === monthOptions[monthOptions.length - 1]?.value"
      class="group py-2 px-2.5 inline-flex items-center rounded-l-lg border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white">
      <svg class="size-3.5 group-disabled:text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"></path>
      </svg>
    </button>

    <div class="relative" x-data="{ open: false }">
      <button type="button" @click="open = !open"
        class="py-2 px-3 inline-flex items-center border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50">
        <span x-text="selectedMonthLabel"></span>
      </button>

      <div x-show="open" @click.away="open = false"
        class="absolute right-0 z-10 mt-2 w-48 rounded-xl bg-white shadow-lg ring-1 ring-black/5">
        <div class="p-1">
          <template x-for="month in monthOptions" :key="month.value">
            <button type="button" @click="selectedMonth = month.value; open = false"
              class="w-full rounded-lg px-3 py-2 text-left text-sm text-gray-800 hover:bg-gray-100">
              <span x-text="month.label"></span>
            </button>
          </template>
        </div>
      </div>
    </div>

    <button type="button" @click="goToNextMonth" :disabled="selectedMonth === currentMonth"
      class="group py-2 px-2.5 inline-flex items-center rounded-r-lg border border-gray-200 bg-white text-sm font-medium text-gray-800 shadow-sm hover:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white">
      <svg class="size-3.5 group-disabled:text-gray-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"></path>
      </svg>
    </button>
  </div>
</div>
