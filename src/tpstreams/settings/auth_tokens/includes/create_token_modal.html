<div
  id="create-token-modal"
  class="hs-overlay hidden size-full fixed top-0 start-0 z-[200] overflow-x-hidden overflow-y-auto pointer-events-none"
  role="dialog"
  tabindex="-1"
  aria-labelledby="create-token-modal-label"
>
  <div
    class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center"
  >
    <div
      class="w-full max-h-full flex flex-col bg-white border border-gray-200 shadow-xl rounded-2xl pointer-events-auto"
    >
      <div
        class="flex justify-between items-center py-3.5 px-5 border-b border-gray-100"
      >
        <h3
          id="create-token-modal-label"
          class="font-bold text-gray-800 text-lg"
        >
          Create Authentication Token
        </h3>
        <button
          type="button"
          class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-50 text-gray-500 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none transition"
          aria-label="Close"
          data-hs-overlay="#create-token-modal"
        >
          <span class="sr-only">Close</span>
          <svg
            class="shrink-0 size-4"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
      <form @submit.prevent="createToken()">
        <div class="p-5 overflow-y-auto space-y-6">
          <!-- Token Name -->
          <div>
            <label for="token-name" class="block text-sm font-semibold mb-2"
              >Name <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              id="token-name"
              name="name"
              x-model="tokenName"
              maxlength="100"
              class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 disabled:opacity-50 disabled:pointer-events-none bg-gray-50/50"
              placeholder="e.g. CI/CD Deployment Script"
              required
            />
            <p class="text-xs text-gray-500 mt-2.5">
              Enter a descriptive name to help you identify the token later.
            </p>
          </div>

          <!-- Expires In Dropdown -->
          <div>
            <label for="expires-in" class="block text-sm font-semibold mb-2"
              >Expires In</label
            >
            <select
              id="expires-in"
              name="expires_in"
              class="py-3 px-4 block w-full border-gray-200 rounded-lg text-sm focus:ring-blue-500 focus:border-blue-500 disabled:opacity-50 disabled:pointer-events-none bg-gray-50/50"
            >
              <option value="7_days">7 days</option>
              <option value="30_days">30 days</option>
              <option value="60_days">60 days</option>
              <option value="90_days">90 days</option>
              <option value="never" selected>Never</option>
            </select>
            <p class="text-xs text-gray-500 mt-2.5">
              Choose how long your token will be valid for.
            </p>
          </div>
        </div>

        <div
          class="flex justify-end items-center gap-x-2 py-4 px-5 border-t border-gray-100 bg-gray-50/50 rounded-b-2xl"
        >
          <button
            type="button"
            class="py-2.5 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-100 focus:outline-none transition disabled:opacity-50 disabled:pointer-events-none"
            data-hs-overlay="#create-token-modal"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="py-2.5 px-4 inline-flex items-center gap-x-2 text-sm font-bold rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 focus:outline-none transition disabled:opacity-50 disabled:pointer-events-none shadow-sm shadow-blue-200"
          >
            Create Token
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
