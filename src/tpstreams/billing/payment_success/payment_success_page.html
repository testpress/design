<!-- Payment Success / Processing Flow -->
<div x-data="paymentFlow()" x-init="init()" class="py-20 max-w-lg mx-auto">
    
    <!-- State: Success (Default - Initial/Renewal) -->
    <template x-if="state === 'success'">
        <div>
            <!-- Icon -->
            <div class="mb-5 sm:mb-7 text-center">
              <span class="shrink-0 size-14 md:size-16 mx-auto flex justify-center items-center border-2 border-green-500 text-green-500 rounded-full">
                <svg class="shrink-0 size-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </span>
            </div>
            <!-- End Icon -->
          
            <!-- Heading -->
            <div class="mb-5 sm:mb-8 text-center">
              <h1 class="mb-1 md:mb-3 font-semibold text-xl md:text-2xl text-gray-800">
                Payment Successful
              </h1>
              <p class="text-sm text-gray-500">
                Thank you! Your payment has been processed successfully. <br>
                Your subscription is currently being activated. This may take a few seconds to complete.
              </p>
            </div>
            <!-- End Heading -->
          
            <!-- Card -->
            <div class="p-1 flex flex-col bg-gray-100 border border-gray-200 rounded-2xl dark:bg-neutral-800 dark:border-neutral-700">
              <!-- Body -->
              <div class="px-5 bg-white rounded-xl shadow-2xs divide-y divide-dashed divide-gray-300 dark:bg-neutral-900 dark:divide-neutral-700">
                <!-- Item -->
                <div class="py-5">
                  <!-- Heading -->
                  <div class="mb-3">
                    <h2 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
                      Payment Details
                    </h2>
                  </div>
                  <!-- End Heading -->
        
                  <!-- List -->
                  <dl class="grid grid-cols-1 sm:grid-cols-2 sm:gap-y-2 gap-x-4">
                    <dt class="sm:py-0.5 text-sm text-gray-500 dark:text-neutral-500">
                      Plan:
                    </dt>
                    <dd class="pb-3 sm:py-0.5 font-bold text-sm text-gray-800 dark:text-neutral-200">
                      Basic Plan
                    </dd>
        
                    <dt class="sm:py-0.5 text-sm text-gray-500 dark:text-neutral-500">
                      Billing Cycle:
                    </dt>
                    <dd class="pb-3 sm:py-0.5 text-sm text-gray-800 dark:text-neutral-200">
                      Monthly
                    </dd>
        
                    <dt class="sm:py-0.5 text-sm text-gray-500 dark:text-neutral-500">
                      Amount paid:
                    </dt>
                    <dd class="pb-3 sm:py-0.5 text-sm text-gray-800 dark:text-neutral-200">
                      ₹579
                    </dd>
                  </dl>
                  <!-- End List -->
                </div>
                <!-- End Item -->
        
              </div>
              <!-- End Body -->
            </div>
            <!-- End Card -->
        </div>
    </template>

    <!-- State: Processing (Upgrade Flow) -->
    <template x-if="state === 'processing'">
        <div class="text-center">
            <!-- Loading Spinner -->
            <div class="mb-5 sm:mb-7 flex justify-center">
                <span class="animate-spin inline-block size-14 border-[3px] border-current border-t-transparent text-blue-600 rounded-full dark:text-blue-500" role="status" aria-label="loading">
                    <span class="sr-only">Loading...</span>
                </span>
            </div>
            
            <h1 class="mb-2 text-xl font-semibold text-gray-800 dark:text-white">
                Processing Payment...
            </h1>
            <p class="text-gray-500 dark:text-neutral-400">
                Please wait while we confirm your transaction status.
            </p>
        </div>
    </template>

    <!-- State: Authorize (Upgrade Flow Success) -->
    <template x-if="state === 'authorize'">
        <div class="text-center">
            <!-- Icon -->
            <div class="mb-5 sm:mb-7 text-center">
                <span class="shrink-0 size-14 md:size-16 mx-auto flex justify-center items-center border-2 border-green-500 text-green-500 rounded-full">
                    <svg class="shrink-0 size-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </span>
            </div>
            <!-- End Icon -->

            <!-- Heading -->
            <div class="mb-6 sm:mb-8 text-center">
                <h1 class="mb-2 font-semibold text-xl md:text-2xl text-gray-800 dark:text-neutral-200">
                    Payment successful
                </h1>
                <p class="mb-4 text-base text-gray-600 dark:text-neutral-400">
                    One final step to complete your upgrade<br>
                    Please authorize recurring billing for your new plan.
                </p>
            </div>
            <!-- End Heading -->

            <!-- Button -->
            <button type="button" class="py-3 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-gray-600">
                Authorize subscription
            </button>
        </div>
    </template>

</div>

{% include "./payment_success_script.html" %}
