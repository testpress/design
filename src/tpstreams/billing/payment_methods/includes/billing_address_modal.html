<div x-show="showBillingAddressModal"
     x-cloak
     class="fixed inset-0 z-[100] overflow-y-auto"
     aria-labelledby="modal-title"
     role="dialog"
     aria-modal="true">

    <!-- Backdrop -->
    <div x-show="showBillingAddressModal"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="showBillingAddressModal = false"
         class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>

    <div class="flex items-center justify-center min-h-screen p-4">
        <!-- Modal Content -->
        <div x-show="showBillingAddressModal"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative flex flex-col bg-white border border-gray-200 shadow-2xs rounded-xl overflow-hidden md:max-w-xl w-full">

            <!-- Header -->
            <div class="py-2.5 px-4 flex justify-between items-center border-b">
                <h3 class="font-medium text-gray-800">
                    Billing Details Required
                </h3>
                <button type="button" @click="showBillingAddressModal = false" class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 focus:outline-hidden focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none" aria-label="Close">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <!-- End Header -->

            <form @submit.prevent="hasRequiredBillingDetails = true; showBillingAddressModal = false">
                <!-- Body -->
                <div class="p-4 space-y-5">
                    <p class="text-sm text-gray-500">
                        Before adding a payment method, please provide your billing address. This is required to generate invoices for your account.
                    </p>

                    <!-- Street Address -->
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-800">
                            Street Address
                        </label>
                        <div class="space-y-2">
                            <input type="text" required class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none" placeholder="Address Line 1">
                            <input type="text" class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none" placeholder="Address Line 2 (optional)">
                        </div>
                    </div>

                    <!-- City and State -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-800">
                                City
                            </label>
                            <input type="text" required class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none" placeholder="City">
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-800">
                                State / Province
                            </label>
                            <input type="text" required class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none" placeholder="State">
                        </div>
                    </div>

                    <!-- ZIP and Country -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-800">
                                ZIP / Postal Code
                            </label>
                            <input type="text" required class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none" placeholder="ZIP Code">
                        </div>
                        <div>
                            <label class="block mb-2 text-sm font-medium text-gray-800">
                                Country
                            </label>
                            <select required class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none">
                                <option value="">Select country</option>
                                <option value="IN">India</option>
                                <option value="US">United States</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- End Body -->

                <!-- Footer -->
                <div class="p-4 flex justify-end gap-x-2 border-t bg-gray-50">
                    <button type="button" @click="showBillingAddressModal = false" class="py-2 px-3 text-nowrap inline-flex justify-center items-center bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50">
                        Cancel
                    </button>
                    <button type="submit" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 bg-blue-600 border border-transparent text-white text-sm font-medium rounded-lg shadow-2xs hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:ring-2 focus:ring-blue-500">
                        Save & Continue to Payment
                    </button>
                </div>
                <!-- End Footer -->
            </form>
        </div>
    </div>
</div>
