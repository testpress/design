<div class="mt-5 flex flex-wrap justify-between items-center gap-2">
  <p class="text-sm text-stone-800 ">
    <span class="font-medium">{{ batches_list.length }}</span>
    <span class="text-stone-500 ">results</span>
  </p>

  <!-- Pagination -->
  <nav class="flex justify-end items-center gap-x-1" aria-label="Pagination">
    <button class="min-h-[38px] min-w-[38px] py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-800 disabled:opacity-50 disabled:pointer-events-none" aria-label="Previous" disabled>
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      <span class="sr-only">Previous</span>
    </button>

    <!-- Page Numbers -->
    {% for page_num in [1,2,3,4,5,6] %}
      {% if page_num == current_page %}
      <span class="min-h-[38px] min-w-[38px] flex justify-center items-center bg-stone-100 text-stone-800 py-2 px-3 text-sm rounded-lg" aria-current="page">{{ page_num }}</span>
      {% elif page_num > (current_page - 3) and page_num < (current_page + 3) %}
      <button @click="apply_pagination({{page_num}}, '{{request.path}}')" class="min-h-[38px] min-w-[38px] py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-800 hover:bg-stone-100 focus:outline-none focus:bg-stone-100 ">{{ page_num }}</button>
      {% endif %}
    {% endfor %}

    <!-- Ellipsis for Skipped Pages -->
    {% if current_page < (num_pages -3) %}
      <span class="min-h-[38px] min-w-[38px] flex justify-center items-center text-stone-500 ">...</span>
      <button @click="apply_pagination({{num_pages}}, '{{request.path}}')" class="min-h-[38px] min-w-[38px] py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-800 hover:bg-stone-100 focus:outline-none focus:bg-stone-100 ">{{ num_pages }}</button>
    {% endif %}

    <!-- Next Button -->
    <button @click="apply_pagination({{page_obj.next_page_number}}, '{{request.path}}')" class="min-h-[38px] min-w-[38px] py-2 px-2.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg text-stone-800 hover:bg-stone-100 focus:outline-none focus:bg-stone-100 " aria-label="Next">
      <span class="sr-only">Next</span>
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </nav>
  <!-- End Pagination -->
</div>
