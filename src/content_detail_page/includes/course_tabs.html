{% include "./viewer_header.html" %}
<div class="lg:mt-20 xl:mt-16">
  <div class="xl:hidden px-4 mt-6 dark:bg-neutral-800">
    <label for="tabs" class="sr-only">Select a tab</label>
    <select id="tabs" name="tabs" @change="activeTab = $event.target.value"
      class="block w-full rounded-md border-gray-300 py-2 pl-3 pr-10 text-base focus:border-emerald-500 focus:outline-none focus:ring-emerald-500 sm:text-sm">
      <option :selected="activeTab == 'home'" value="home">Home</option>
      <option :selected="activeTab == 'running'" value="running">Running (3)</option>
      <option :selected="activeTab == 'upcoming'" value="upcoming">Upcoming (5)</option>
      <option :selected="activeTab == 'history'" value="history">History (12)</option>
      <option :selected="activeTab == 'leaderboard'" value="leaderboard">LeaderBoard</option>
      <option :selected="activeTab == 'discussions'" value="discussions">Discussions</option>
    </select>
  </div>
  <div class="hidden xl:block">
    <div class=" flex justify-between border-b border-gray-200 overflow-x-scroll  dark:border-white/10">
      <nav class="-mb-px flex space-x-8 h-16 ml-4" aria-label="Tabs">
        <a href="{{'/testpress/course/detail'|url}}"
          :class="activeTab == 'home' ? 'border-emerald-500 text-emerald-600 dark:border-emerald-400 dark:text-emerald-400': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 dark:text-gray-400 dark:hover:border-white/20 dark:hover:text-gray-300'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium"
          :aria-current="activeTab == 'home' ? 'page' : undefined">Home</a>
        <a href="{{'/content_detail_page/running'|url}}"
          :class="activeTab == 'running' ? 'border-emerald-500 text-emerald-600 dark:border-emerald-400 dark:text-emerald-400': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 dark:text-gray-400 dark:hover:border-white/20 dark:hover:text-gray-300'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center"
          :aria-current="activeTab == 'running' ? 'page' : undefined">Running <span
            :class="activeTab == 'running' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">3</span></a>
        <a href="{{'/content_detail_page/upcoming'|url}}"
          :class="activeTab == 'upcoming' ? 'border-emerald-500 text-emerald-600 dark:border-emerald-400 dark:text-emerald-400': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 dark:text-gray-400 dark:hover:border-white/20 dark:hover:text-gray-300'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center"
          :aria-current="activeTab == 'upcoming' ? 'page' : undefined">Upcoming
          <span
            :class="activeTab == 'upcoming' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">5</span></a>
        <a href="{{'/content_detail_page/history'|url}}"
          :class="activeTab == 'history' ? 'border-emerald-500 text-emerald-600 dark:border-emerald-400 dark:text-emerald-400': 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 dark:text-gray-400 dark:hover:border-white/20 dark:hover:text-gray-300'"
          class="whitespace-nowrap border-b-2 py-5 px-1 text-sm font-medium inline-flex items-center"
          :aria-current="activeTab == 'history' ? 'page' : undefined">History
          <span
            :class="activeTab == 'history' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300'"
            class="ml-2 inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium">12</span></a>
      </nav>
      <nav class="-mb-px flex items-center gap-x-2 h-16 mr-4 ml-4 shrink-0" aria-label="Quick links">
        <div class="hs-tooltip [--placement:bottom] [--trigger:hover] inline-block">
          <a href="{{'/content_detail_page/leaderboard'|url}}"
            :class="activeTab == 'leaderboard' ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-500'"
            class="hs-tooltip-toggle inline-flex items-center justify-center p-2 focus:outline-none transition-colors"
            aria-label="Leaderboard">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-white text-xs text-gray-800 rounded-lg shadow-md border border-gray-200"
            role="tooltip">Leaderboard</span>
        </div>
        <div class="hs-tooltip [--placement:bottom] [--trigger:hover] inline-block">
          <a href="{{'/content_detail_page/discussions'|url}}"
            :class="activeTab == 'discussions' ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-500'"
            class="hs-tooltip-toggle inline-flex items-center justify-center p-2 focus:outline-none transition-colors"
            aria-label="Discussions">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-white text-xs text-gray-800 rounded-lg shadow-md border border-gray-200"
            role="tooltip">Discussions</span>
        </div>
        <div class="hs-tooltip [--placement:bottom] [--trigger:hover] inline-block">
          <a href="#"
            class="hs-tooltip-toggle inline-flex items-center justify-center p-2 text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-500 focus:outline-none transition-colors"
            aria-label="Custom Test">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="size-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-white text-xs text-gray-800 rounded-lg shadow-md border border-gray-200"
            role="tooltip">Custom Test</span>
        </div>
        <div class="hs-tooltip [--placement:bottom] [--trigger:hover] inline-block">
          <a href="#"
            class="hs-tooltip-toggle inline-flex items-center justify-center p-2 text-gray-500 hover:text-emerald-600 dark:text-gray-400 dark:hover:text-emerald-500 focus:outline-none transition-colors"
            aria-label="Certificate">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84 51.39 51.39 0 0 0-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-white text-xs text-gray-800 rounded-lg shadow-md border border-gray-200"
            role="tooltip">Certificate</span>
        </div>
      </nav>
    </div>
  </div>
  <div x-show="activeTab == 'running' || activeTab == 'upcoming' || activeTab == 'history'" x-data="{ isOpenContentTypeOption: false, isOpenSortOptions: false, selectedSorting: 'Latest', contentTypeDict: {1:'Exam',2:'Quiz'}, 
      removeItem(key) { 
        delete this.contentTypeDict[key]; 
        const checkbox = document.getElementById('filter-category-' + key); 
        if (checkbox) {
           checkbox.checked = false;
        }
      }, 
      addOrRemoveItem(key, value) { 
        if (this.contentTypeDict[key]) this.removeItem(key); 
        else this.contentTypeDict[key] = value; 
      }, 
    }">
    <section aria-labelledby="filter-heading" class="grid items-center">
      {% include "./content_type_filter.html" %}
    </section>
  </div>


</div>
