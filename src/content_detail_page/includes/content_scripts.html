<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('contents', () => ({
      contentPage: 'VIDEO',
      isOpen: false,
      expanded: [],
      section: 'ATTEMPT',
      showExamModeModal: false,
      showResultModal: false,
      showPreTestModal: false,
      tab: 'running',
      showAiTools: window.innerWidth >= 1024,
      activeTab: 'chat',
      isCustomizeOpen: false,
      videoTopOffset: 0,
      modalTopOffset: 0,
      contentType: 'topics',
      isFeedbackModalOpen: false,
      isFeedbackSubmitted: false,
      stickyOffset: 0,
      globalHeaderHeight: 0,
      observer: null,
      resizeHandler: null,
      notesContent: `
# Units and Measurement

## Introduction to Physical Quantities

- Physical quantities consist of a numerical value and a unit (<span class="video-timestamp" data-time="1:06">1:06</span>).
- Example: The length of a room can be expressed as 1 meter or 100 centimeters (<span class="video-timestamp" data-time="1:17">1:17</span>).

## Expression of Physical Quantities

- A physical quantity (Q) is expressed as a product of its numerical value (N) and its unit (U), i.e., \\( Q = NU \\) (<span class="video-timestamp" data-time="3:04">3:04</span>).
- Although numerical value and unit may change when the unit is altered, the physical quantity remains constant (<span class="video-timestamp" data-time="3:34">3:34</span>).

## Conversion between Units

- Different units can describe the same physical quantity. Example: \\(1 \\text{ meter} = 100 \\text{ centimeters}\\) (<span class="video-timestamp" data-time="5:33">5:33</span>).
- General formula for unit conversion: \\( N_1U_1 = N_2U_2 \\) (<span class="video-timestamp" data-time="5:42">5:42</span>).

## Types of Quantities

### Fundamental Quantities

- Fundamental quantities cannot be derived from other quantities (<span class="video-timestamp" data-time="7:27">7:27</span>).
- In the MKS system: mass, length, time (<span class="video-timestamp" data-time="8:05">8:05</span>).
- In the SI system: mass, length, time, temperature, current, luminous intensity, and amount of substance (<span class="video-timestamp" data-time="10:16">10:16</span>).

### Derived Quantities

- Derived quantities are formed from fundamental quantities (<span class="video-timestamp" data-time="10:37">10:37</span>). 
- Examples include velocity (displacement per time) and acceleration (velocity per time) (<span class="video-timestamp" data-time="10:40">10:40</span>).

## Systems of Units

- Unit systems include CGS, MKS, and SI systems (<span class="video-timestamp" data-time="7:40">7:40</span>).

### CGS System of Units
- Mass: Gram (<span class="video-timestamp" data-time="11:58">11:58</span>)
- Length: Centimeter (<span class="video-timestamp" data-time="12:00">12:00</span>)
- Time: Second (<span class="video-timestamp" data-time="12:03">12:03</span>)

### FPS System of Units
- Mass: Pound (weight) (<span class="video-timestamp" data-time="12:30">12:30</span>)
- Length: Foot (<span class="video-timestamp" data-time="12:45">12:45</span>)
- Time: Second (<span class="video-timestamp" data-time="12:58">12:58</span>)

### MK System of Units
- Length: Meter (<span class="video-timestamp" data-time="13:15">13:15</span>)
- Mass: Kilogram (<span class="video-timestamp" data-time="13:30">13:30</span>)
- Time: Second (<span class="video-timestamp" data-time="13:32">13:32</span>)

### SI System of Units
- Mass: Kilogram (<span class="video-timestamp" data-time="14:11">14:11</span>)
- Length: Metre (<span class="video-timestamp" data-time="14:16">14:16</span>)
- Time: Second (<span class="video-timestamp" data-time="14:28">14:28</span>)
- Temperature: Kelvin (<span class="video-timestamp" data-time="14:43">14:43</span>)
- Electric Current: Ampere (<span class="video-timestamp" data-time="14:53">14:53</span>)
- Amount of Substance: Mol (<span class="video-timestamp" data-time="15:05">15:05</span>)
- Luminous Intensity: Candela (<span class="video-timestamp" data-time="15:17">15:17</span>)

### Supplementary SI Units
- Radian: Unit of plane angle (<span class="video-timestamp" data-time="16:52">16:52</span>)
- Steradian: Unit of solid angle (<span class="video-timestamp" data-time="17:56">17:56</span>)

### Astronomical Units

#### Light Year

- Distance light travels in one year (<span class="video-timestamp" data-time="18:36">18:36</span>).
- Calculation: Speed of light (\\(3 \\times 10^8\\) m/s) multiplied by seconds in a year (<span class="video-timestamp" data-time="20:21">20:21</span>).
- Approximately \\(9.46 \\times 10^{15}\\) meters (<span class="video-timestamp" data-time="20:45">20:45</span>).
      `,

      parseTime(timeStr) {
        const parts = timeStr.split(':').map(Number);
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return 0;
      },

      handleNoteClick(e) {
        const timestamp = e.target.closest('.video-timestamp');
        if (timestamp) {
          const timeStr = timestamp.getAttribute('data-time');
          this.seekToNote(this.parseTime(timeStr));
        }
      },


      mcqs: [
        {
          id: 1,
          question: 'What does HTML stand for?',
          options: [
            { id: 'a', text: 'Hyper Text Markup Language' },
            { id: 'b', text: 'High Tech Modern Language' },
            { id: 'c', text: 'Hyper Transfer Markup Language' },
            { id: 'd', text: 'Home Tool Markup Language' }
          ],
          correctAnswer: 'a',
          selectedAnswer: null,
          isSubmitted: false,
          showHint: false,
          hint: 'Think about what "HT" usually stands for in web addresses.',
          explanation: 'HTML stands for Hyper Text Markup Language. It is the standard markup language for documents designed to be displayed in a web browser.'
        },
        {
          id: 2,
          question: 'Which of the following is NOT a markup language?',
          options: [
            { id: 'a', text: 'HTML' },
            { id: 'b', text: 'XML' },
            { id: 'c', text: 'Python' },
            { id: 'd', text: 'Markdown' }
          ],
          correctAnswer: 'c',
          selectedAnswer: null,
          isSubmitted: false,
          showHint: false,
          hint: 'One of these is a general-purpose programming language.',
          explanation: 'Python is a high-level, general-purpose programming language. HTML, XML, and Markdown are all markup languages used for data formatting and presentation.'
        }
      ],
      currentMcqIndex: 0,
      showSummary: false,

      submitMcq() {
        if (this.mcqs[this.currentMcqIndex].selectedAnswer) {
          this.mcqs[this.currentMcqIndex].isSubmitted = true;
        }
      },

      nextMcq() {
        if (this.currentMcqIndex < this.mcqs.length - 1) {
          this.currentMcqIndex++;
        } else {
          this.showSummary = true;
          this.$nextTick(() => {
            this.renderChart();
          });
        }
      },

      prevMcq() {
        if (this.currentMcqIndex > 0) {
          this.currentMcqIndex--;
        }
      },

      resetMcq() {
        this.mcqs.forEach(m => {
          m.selectedAnswer = null;
          m.isSubmitted = false;
          m.showHint = false;
        });
        this.currentMcqIndex = 0;
        this.showSummary = false;
      },

      renderChart() {
        const correct = this.mcqs.filter(m => m.selectedAnswer === m.correctAnswer).length;
        const incorrect = this.mcqs.filter(m => m.isSubmitted && m.selectedAnswer !== m.correctAnswer).length;
        const unanswered = this.mcqs.length - (correct + incorrect);

        const options = {
          chart: {
            height: 230,
            width: 230,
            type: 'donut',
            animations: { enabled: true }
          },
          plotOptions: {
            pie: { donut: { size: '76%' } }
          },
          series: [correct, incorrect, unanswered],
          labels: ['Correct', 'Incorrect', 'Unanswered'],
          legend: { show: false },
          dataLabels: { enabled: false },
          stroke: { width: 2, colors: ['#ffffff'] },
          colors: ['#22c55e', '#ef4444', '#f97316'],
        };

        const chart = new ApexCharts(document.querySelector("#quiz-pie-chart"), options);
        chart.render();
      },

      exam: {
        ['x-html']() {
          if (this.section === 'ATTEMPT')
            return `{% include "./previous_attempts.html" %}`
          else return `{% include "./leaderboard.html" %}`
        },
      },

      init() {
        this.$watch('activeTab', (value) => {
          const navTabs = ['running', 'upcoming', 'history', 'leaderboard', 'discussions'];
          if (navTabs.includes(value)) {
            window.location = `{{ '/content_detail_page/' | url }}${value}`;
          }
        })

        this.resizeHandler = () => this.setStickyOffset()
        window.addEventListener('resize', this.resizeHandler)

        this.$nextTick(() => {
          this.setStickyOffset()

          // Recalculate if any stackable header changes size (e.g. icon hidden/shown)
          this.observer = new ResizeObserver(() => this.setStickyOffset())
          document
            .querySelectorAll('.js-stackable-header')
            .forEach((el) => this.observer.observe(el))
        })
      },

      destroy() {
        if (this.resizeHandler) {
          window.removeEventListener('resize', this.resizeHandler)
        }
        if (this.observer) {
          this.observer.disconnect()
        }
      },

      setStickyOffset() {
        const globalHeader =
          document.getElementById('global-header') ||
          document.querySelector('header') ||
          document.querySelector('.page-header')
        const navHeader = document.getElementById('lesson-nav-header')

        const gHeight = (globalHeader && globalHeader.offsetHeight) || 0
        const nHeight = (navHeader && navHeader.offsetHeight) || 0

        this.globalHeaderHeight = gHeight
        this.stickyOffset = gHeight
        
        this.videoTopOffset = gHeight + nHeight
        this.modalTopOffset = this.videoTopOffset + (window.innerWidth * 9 / 16)
      },
    }))
  })
</script>
