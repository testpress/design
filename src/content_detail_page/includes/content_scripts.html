<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('contents', () => ({
      contentPage: 'VIDEO',
      isOpen: false,
      expanded: [],
      section: 'ATTEMPT',
      showExamModeModal: false,
      showResultModal: false,
      showPreTestModal: false,
      tab: 'running',
      activeTab: '{{ tab }}',
      isCustomizeOpen: false,
      contentType: 'topics',
      isFeedbackModalOpen: false,
      isFeedbackSubmitted: false,
      stickyOffset: 0,
      globalHeaderHeight: 0,
      observer: null,
      resizeHandler: null,
      notes: [
        { 
          id: 1, 
          time: 0, 
          timeDisplay: '00:00 - 05:20', 
          title: 'Introduction to Markup Languages',
          summary: 'Overview of document annotation systems. Explanation of how markup is distinguishable from text content using tags.',
          concepts: ['Syntax', 'Annotation', 'Tags']
        },
        { 
          id: 2, 
          time: 320, 
          timeDisplay: '05:20 - 12:45', 
          title: 'HTML Structure & Attributes',
          summary: 'Deep dive into the hierarchical nature of HTML. Rules for attributes, including the necessity of quotes and case sensitivity.',
          concepts: ['Hierarchy', 'Attributes', 'Quotes']
        },
        { 
          id: 3, 
          time: 765, 
          timeDisplay: '12:45 - 20:00', 
          title: 'Semantic Data & XML',
          summary: 'Transitioning from presentation to meaning. How XML allows for custom tag sets to define specific data structures.',
          concepts: ['Semantics', 'Data Portability', 'XML Schema']
        }
      ],
      
      seekToNote(seconds) {
        const player = videojs('my-video');
        player.currentTime(seconds);
        player.play();
      },


      mcqs: [
        {
          id: 1,
          question: 'What does HTML stand for?',
          options: [
            { id: 'a', text: 'Hyper Text Markup Language' },
            { id: 'b', text: 'High Tech Modern Language' },
            { id: 'c', text: 'Hyper Transfer Markup Language' },
            { id: 'd', text: 'Home Tool Markup Language' }
          ],
          correctAnswer: 'a',
          selectedAnswer: null,
          isSubmitted: false,
          showHint: false,
          hint: 'Think about what "HT" usually stands for in web addresses.',
          explanation: 'HTML stands for Hyper Text Markup Language. It is the standard markup language for documents designed to be displayed in a web browser.'
        },
        {
          id: 2,
          question: 'Which of the following is NOT a markup language?',
          options: [
            { id: 'a', text: 'HTML' },
            { id: 'b', text: 'XML' },
            { id: 'c', text: 'Python' },
            { id: 'd', text: 'Markdown' }
          ],
          correctAnswer: 'c',
          selectedAnswer: null,
          isSubmitted: false,
          showHint: false,
          hint: 'One of these is a general-purpose programming language.',
          explanation: 'Python is a high-level, general-purpose programming language. HTML, XML, and Markdown are all markup languages used for data formatting and presentation.'
        }
      ],
      currentMcqIndex: 0,
      showSummary: false,

      submitMcq() {
        if (this.mcqs[this.currentMcqIndex].selectedAnswer) {
          this.mcqs[this.currentMcqIndex].isSubmitted = true;
        }
      },

      nextMcq() {
        if (this.currentMcqIndex < this.mcqs.length - 1) {
          this.currentMcqIndex++;
        } else {
          this.showSummary = true;
          this.$nextTick(() => {
            this.renderChart();
          });
        }
      },

      prevMcq() {
        if (this.currentMcqIndex > 0) {
          this.currentMcqIndex--;
        }
      },

      resetMcq() {
        this.mcqs.forEach(m => {
          m.selectedAnswer = null;
          m.isSubmitted = false;
          m.showHint = false;
        });
        this.currentMcqIndex = 0;
        this.showSummary = false;
      },

      renderChart() {
        const correct = this.mcqs.filter(m => m.selectedAnswer === m.correctAnswer).length;
        const incorrect = this.mcqs.filter(m => m.isSubmitted && m.selectedAnswer !== m.correctAnswer).length;
        const unanswered = this.mcqs.length - (correct + incorrect);

        const options = {
          chart: {
            height: 230,
            width: 230,
            type: 'donut',
            animations: { enabled: true }
          },
          plotOptions: {
            pie: { donut: { size: '76%' } }
          },
          series: [correct, incorrect, unanswered],
          labels: ['Correct', 'Incorrect', 'Unanswered'],
          legend: { show: false },
          dataLabels: { enabled: false },
          stroke: { width: 2, colors: ['#ffffff'] },
          colors: ['#22c55e', '#ef4444', '#f97316'],
        };

        const chart = new ApexCharts(document.querySelector("#quiz-pie-chart"), options);
        chart.render();
      },

      exam: {
        ['x-html']() {
          if (this.section === 'ATTEMPT')
            return `{% include "./previous_attempts.html" %}`
          else return `{% include "./leaderboard.html" %}`
        },
      },

      init() {
        this.$watch('activeTab', (value) => {
          if (value == 'running')
            window.location = "{{ '/content_detail_page/running'|url }}"
          else if (value == 'upcoming')
            window.location = "{{ '/content_detail_page/upcoming'|url }}"
          else if (value == 'history')
            window.location = "{{ '/content_detail_page/history'|url }}"
          else if (value == 'leaderboard')
            window.location = "{{ '/content_detail_page/leaderboard'|url }}"
          else window.location = "{{ '/content_detail_page/discussions'|url }}"
        })

        this.resizeHandler = () => this.setStickyOffset()
        window.addEventListener('resize', this.resizeHandler)

        this.$nextTick(() => {
          this.setStickyOffset()

          // Recalculate if any stackable header changes size (e.g. icon hidden/shown)
          this.observer = new ResizeObserver(() => this.setStickyOffset())
          document
            .querySelectorAll('.js-stackable-header')
            .forEach((el) => this.observer.observe(el))
        })
      },

      destroy() {
        if (this.resizeHandler) {
          window.removeEventListener('resize', this.resizeHandler)
        }
        if (this.observer) {
          this.observer.disconnect()
        }
      },

      setStickyOffset() {
        const globalHeader =
          document.getElementById('global-header') ||
          document.querySelector('header') ||
          document.querySelector('.page-header')
        const mobileBar = document.getElementById('mobile-sticky-bar')

        const gHeight = (globalHeader && globalHeader.offsetHeight) || 0
        const mHeight = (mobileBar && mobileBar.offsetHeight) || 0

        this.globalHeaderHeight = gHeight
        this.stickyOffset = gHeight + mHeight
      },
    }))
  })
</script>
