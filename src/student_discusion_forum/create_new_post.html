{% extends "./base.html" %}

{% block content %}
<div class="h-full overflow-y-scroll min-h-screen bg-gray-100 dark:bg-neutral-900
              [&::-webkit-scrollbar]:w-2 
              [&::-webkit-scrollbar-thumb]:rounded-full
              [&::-webkit-scrollbar-track]:bg-gray-100
              dark:[&::-webkit-scrollbar-track]:bg-neutral-700
              [&::-webkit-scrollbar-thumb]:bg-gray-300
              dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
<div class="min-h-full">
  <div class="mx-auto max-w-2xl">
    <div class="items-center justify-between py-4 my-2 space-x-2">
      {% include './includes/create_post_breadcrumb.html' %}
      <h3 class="mt-2 text-2xl font-bold text-gray-900 dark:text-neutral-200">Create New Post</h3>
    </div>
    <form class="bg-white shadow-sm ring-1 ring-gray-900/5 sm:rounded-xl md:col-span-2 dark:bg-neutral-800 dark:ring-neutral-700">
      <div class="px-4 py-6 sm:p-8">
      <div class="space-y-12">
        <div class="border-b border-gray-900/10 pb-8 dark:border-neutral-700">
          <div class="grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
            <div class="col-span-full">
              <label for="title" class="block text-sm font-medium leading-6 text-gray-900 dark:text-neutral-300">Title</label>
              <div class="mt-2">
                <input type="text" name="title" id="title" autocomplete="title" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-emerald-600 sm:text-sm sm:leading-6 dark:bg-neutral-800 dark:ring-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500">
              </div>
            </div>
            <div class="col-span-full">
              <label for="description" class="block text-sm font-medium leading-6 text-gray-900 dark:text-neutral-300">Add a Description</label>
              <div class="mt-2">
                <textarea id="description" name="description" rows="3" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-emerald-600 sm:text-sm sm:leading-6 dark:bg-neutral-800 dark:ring-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500"></textarea>
              </div>
            </div>
            <div class="sm:col-span-3">
              <label for="category" class="block text-sm font-medium leading-6 text-gray-900 dark:text-neutral-300">Category</label>
              <div class="mt-2">
                <select id="category" name="category" autocomplete="category-name" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-emerald-600 sm:max-w-xs sm:text-sm sm:leading-6 dark:bg-neutral-800 dark:ring-neutral-700 dark:text-neutral-200">
                  <option>UPSC</option>
                  <option>KPSC Updates</option>
                  <option>TNPSC</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="mt-6 px-4 flex items-center justify-end gap-x-6">
        <button type="button" class="text-sm font-semibold leading-6 text-gray-900 dark:text-neutral-400 dark:hover:text-neutral-200">Cancel</button>
        <button type="submit" class="rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-emerald-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 dark:bg-emerald-500 dark:hover:bg-emerald-400">Submit</button>
      </div>
    </div>
    </form>
  </div>
</div>

<div>
{% endblock %}
