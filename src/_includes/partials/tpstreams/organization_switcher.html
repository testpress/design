<!-- Organization Switcher -->
<div x-data="{ 
    showDropdown: false,
    selectedOrg: { name: 'Testpress', email: 'hari@testpress.in', shortName: 'TS', color: 'bg-gray-100', text: 'text-gray-600', darkText: 'dark:text-neutral-400' },
    organizations: [
        { name: 'Testpress', email: 'hari@testpress.in', shortName: 'TS', color: 'bg-gray-100', text: 'text-gray-600', darkText: 'dark:text-neutral-400' },
        { name: 'TP Streams', email: 'hari@tpstreams.com', shortName: 'TS', color: 'bg-gray-100', text: 'text-gray-600', darkText: 'dark:text-neutral-400' }
    ],
    selectOrg(org) {
        this.selectedOrg = org;
        this.showDropdown = false;
    }
}" class="relative flex items-center">
    <button type="button" 
        @click="showDropdown = !showDropdown" 
        @click.away="showDropdown = false"
        class="group inline-flex items-center gap-x-2 py-2 px-3 text-start text-gray-800 rounded-lg hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" 
        aria-haspopup="menu" :aria-expanded="showDropdown">
        <div class="flex items-center gap-x-2">
            <!-- Dynamic Short Name Icon -->
            <div class="relative inline-flex items-center justify-center size-8 overflow-hidden rounded-lg dark:bg-neutral-800"
                 :class="selectedOrg.color">
                <span class="font-medium uppercase text-xs"
                      :class="[selectedOrg.text, selectedOrg.darkText]"
                      x-text="selectedOrg.shortName"></span>
            </div>
            <div class="hidden lg:block text-start">
                <span class="block text-sm font-semibold text-gray-800 dark:text-neutral-200" x-text="selectedOrg.name"></span>
                <span class="block text-xs text-gray-500 dark:text-neutral-500" x-text="selectedOrg.email"></span>
            </div>
        </div>
        <svg class="shrink-0 size-3 ms-1 text-gray-500 transition-transform duration-200" :class="{ 'rotate-180': showDropdown }" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m6 9 6 6 6-6"></path>
        </svg>
    </button>

    <!-- Dropdown Menu -->
    <div x-show="showDropdown" 
        x-transition:enter="transition ease-out duration-100"
        x-transition:enter-start="transform opacity-0 scale-95"
        x-transition:enter-end="transform opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-75"
        x-transition:leave-start="transform opacity-100 scale-100"
        x-transition:leave-end="transform opacity-0 scale-95"
        class="absolute right-0 top-full mt-2 w-60 z-30 origin-top-right bg-white border border-gray-200 rounded-xl shadow-xl dark:bg-neutral-900 dark:border-neutral-700" 
        role="menu" aria-orientation="vertical">
        <div class="p-1 space-y-0.5">
            <template x-for="org in organizations" :key="org.name">
                <button type="button" @click="selectOrg(org)" 
                    class="py-2 px-3 group block w-full text-start rounded-lg focus:outline-none"
                    :class="selectedOrg.name === org.name ? 'bg-gray-100 dark:bg-neutral-800' : 'hover:bg-gray-100 dark:hover:bg-neutral-800'">
                    <div class="flex gap-x-3">
                        <div :class="org.color" class="relative inline-flex items-center justify-center size-8 overflow-hidden rounded-lg shrink-0 dark:bg-neutral-800">
                            <span :class="[org.text, org.darkText]" class="font-medium uppercase text-xs" x-text="org.shortName"></span>
                        </div>
                        <div class="grow">
                            <p class="text-sm font-semibold text-gray-800 dark:text-neutral-200" x-text="org.name"></p>
                            <p class="text-xs text-gray-500 dark:text-neutral-500" x-text="org.email"></p>
                        </div>
                        <div class="ms-auto self-center" x-show="selectedOrg.name === org.name">
                            <svg class="shrink-0 size-4 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                    </div>
                </button>
            </template>
        </div>

        <div class="p-1 border-t border-gray-200 dark:border-neutral-700">
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 8v8"></path>
                    <path d="M8 12h8"></path>
                </svg>
                Add another organization
            </button>
        </div>
    </div>
</div>
