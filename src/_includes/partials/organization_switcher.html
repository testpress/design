<!-- Organization Switcher Component -->
<div class="px-3">
  <div class="relative flex" x-data="organizationSwitcher()">
    <!-- Organization Button -->
    <button @click="toggleDropdown()"
            class="group w-full inline-flex items-center text-start text-gray-800 align-middle disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden dark:text-white"
            aria-haspopup="menu"
            :aria-expanded="dropdownOpen.toString()"
            aria-label="Organization Dropdown">
      <!-- Organization Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
      </svg>
      <!-- Text Content - Hidden on Mobile -->
      <span class="hidden sm:block ms-3">
        <span class="block text-sm font-medium text-gray-800 group-hover:text-blue-600 group-focus-hover:text-blue-600 dark:text-neutral-200 dark:group-hover:text-blue-600 dark:group-focus-hover:text-blue-600" x-text="currentOrg ? currentOrg.name : 'Select Organization'">
        </span>
        <span class="block text-xs text-gray-500 dark:text-neutral-500" x-text="currentOrg ? currentOrg.uuid : 'Choose organization'">
        </span>
      </span>
      <!-- Dropdown Arrow - Hidden on Mobile -->
      <svg class="hidden sm:block shrink-0 size-3.5 ms-auto self-center transition-transform duration-200" :class="{ 'rotate-180': dropdownOpen }" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path></svg>
    </button>
    <!-- End Organization Button -->
    <!-- Dropdown -->
    <div x-cloak
        x-show="dropdownOpen"
         @click.away="dropdownOpen = false"
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="transform opacity-0 scale-95"
         x-transition:enter-end="transform opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="transform opacity-100 scale-100"
         x-transition:leave-end="transform opacity-0 scale-95"
         class="absolute right-0 sm:left-0 z-20 mt-1 w-56 bg-white rounded-xl shadow-xl dark:bg-neutral-900 focus:outline-hidden"
         role="menu"
         aria-orientation="vertical"
         tabindex="-1">
      <div class="p-1 space-y-0.5">
        <!-- Loading State -->
        <div x-cloak x-show="loading" class="px-4 py-3 text-center">
          <div class="inline-flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            <span class="text-sm text-gray-500 dark:text-neutral-500">Loading organizations...</span>
          </div>
        </div>

        <!-- Organizations List -->
        <div x-cloak x-show="!loading && organizations.length > 0">
          <template x-for="org in organizations" :key="org.uuid">
            <button @click="switchOrganization(org.uuid)"
                    :class="org.is_current ? 'bg-gray-100 dark:bg-neutral-800' : 'hover:bg-gray-100 dark:hover:bg-neutral-800'"
                    class="py-2 px-3 block w-full text-start rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <div class="flex gap-x-2">
                <div class="self-center">
                  <svg class="shrink-0 size-5 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M7 2a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM7 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-3 3a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm3 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
                  </svg>
                </div>
                <!-- Organization Icon -->
                <div class="self-center">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="shrink-0 size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
                  </svg>
                </div>
                <div class="grow">
                  <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="org.name"></p>
                  <p class="text-xs text-gray-500 dark:text-neutral-500" x-text="org.uuid"></p>
                </div>
                <div class="ms-auto self-center" x-show="org.is_current">
                  <svg class="shrink-0 size-4 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
              </div>
            </button>
          </template>
        </div>

        <!-- Empty State -->
        <div x-cloak x-show="!loading && organizations.length === 0" class="px-4 py-3 text-center">
          <div class="text-sm text-gray-500 dark:text-neutral-500">No organizations found</div>
        </div>

        <!-- Error State -->
        <div x-cloak x-show="error" class="px-4 py-3 border-t border-gray-200 dark:border-neutral-800">
          <div class="text-sm text-red-600 dark:text-red-400" x-text="error"></div>
        </div>
      </div>

      <div class="p-1 border-t border-gray-200 dark:border-neutral-800">
        <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
          Add another organization
        </button>
      </div>
    </div>
    <!-- End Dropdown -->
  </div>
</div>
<script>
  function organizationSwitcher() {
    return {
      dropdownOpen: false,
      loading: false,
      error: null,
      organizations: [],
      currentOrg: {
        id: 1,
        name: 'TP',
        uuid: 'e29b-41d4'
      },

      init() {
        // Load organizations when dropdown opens
        this.$watch('dropdownOpen', (value) => {
          if (value && this.organizations.length === 0) {
            this.loadOrganizations();
          }
        });
      },

      toggleDropdown() {
        this.dropdownOpen = !this.dropdownOpen;
      },

      async loadOrganizations() {
        this.loading = true;
        this.error = null;

        try {
          const response = await fetch('/api/v1/organizations/', {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
            },
            credentials: 'include'
          });

          if (!response.ok) {
            throw new Error('Failed to load organizations');
          }

          const data = await response.json();
          this.organizations = data.organizations || [];

          // Update current org if provided
          if (data.current_organization) {
            this.currentOrg = data.current_organization;
          }

        } catch (err) {
          this.error = 'Failed to load organizations. Please try again.';
          console.error('Error loading organizations:', err);
        } finally {
          this.loading = false;
        }
      },

      async switchOrganization(orgUuid) {
        this.loading = true;
        this.error = null;

        try {
          const response = await fetch('/api/v1/organizations/switch/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            credentials: 'include',
            body: JSON.stringify({
              organization_uuid: orgUuid
            })
          });

          const data = await response.json();

          if (data.success) {
            // Update current organization
            this.currentOrg = data.organization;

            // Update organizations list to reflect current selection
            this.organizations = this.organizations.map(org => ({
              ...org,
              is_current: org.uuid === orgUuid
            }));

            // Close dropdown
            this.dropdownOpen = false;

            // Show success message
            this.showMessage(data.message, 'success');

            // Reload page to update tenant context
            setTimeout(() => {
              window.location.reload();
            }, 1000);

          } else {
            this.error = data.error || 'Failed to switch organization';
          }

        } catch (err) {
          this.error = 'Failed to switch organization. Please try again.';
          console.error('Error switching organization:', err);
        } finally {
          this.loading = false;
        }
      },

      showMessage(message, type = 'info') {
        // Create a simple toast notification
        const toast = document.createElement('div');
        toast.className = `fixed top-4 right-4 z-50 px-4 py-2 rounded-md text-sm font-medium ${
        type === 'success' ? 'bg-green-100 text-green-800' :
        type === 'error' ? 'bg-red-100 text-red-800' :
        'bg-blue-100 text-blue-800'
      }`;
        toast.textContent = message;

        document.body.appendChild(toast);

        // Remove after 3 seconds
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }
    }
  }
</script>
