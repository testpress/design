
  <!-- ECharts Library -->

  <!-- Session Activity Trends Chart Script -->
  <script>
    // Initialize ECharts v6.0.0 Line Chart for Session Activity Trends
    (function () {
      // Wait for DOM to be fully loaded and ECharts to be available
      function tryInitChart() {
        if (typeof echarts === 'undefined') {
          setTimeout(tryInitChart, 100);
          return;
        }
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initSessionChart);
        } else {
          initSessionChart();
        }
      }
      
      tryInitChart();

      function initSessionChart() {
        const chartDom = document.getElementById('session-activity-chart');
        if (!chartDom) {
          console.warn('Chart container not found');
          return;
        }

        // Initialize chart
        const myChart = echarts.init(chartDom);

        // Sample data for last 7 days
        const dates = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const totalSessions = [156, 234, 189, 201, 178, 145, 144];
        const cleanSessions = [142, 198, 167, 178, 156, 128, 131];
        const flaggedSessions = [14, 36, 22, 23, 22, 17, 13];

        const option = {
          tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            borderColor: '#e5e7eb',
            borderWidth: 1,
            textStyle: {
              color: '#1f2937',
              fontSize: 13
            },
            formatter: function (params) {
              let result = params[0].axisValue + '<br/>';
              params.forEach(function (item) {
                result += item.marker + item.seriesName + ': ' + item.value + '<br/>';
              });
              return result;
            }
          },
          legend: {
            data: ['Total Sessions', 'Clean Sessions', 'Flagged Sessions'],
            top: 10,
            textStyle: {
              fontSize: 12,
              color: '#6b7280'
            }
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '15%',
            containLabel: true
          },
          xAxis: {
            type: 'category',
            boundaryGap: false,
            data: dates,
            axisLine: {
              lineStyle: {
                color: '#e5e7eb'
              }
            },
            axisTick: {
              show: false
            },
            axisLabel: {
              color: '#6b7280',
              fontSize: 11
            }
          },
          yAxis: {
            type: 'value',
            axisLine: {
              show: false
            },
            axisTick: {
              show: false
            },
            axisLabel: {
              color: '#6b7280',
              fontSize: 11
            },
            splitLine: {
              lineStyle: {
                color: '#f3f4f6',
                type: 'dashed'
              }
            }
          },
          series: [
            {
              name: 'Total Sessions',
              type: 'line',
              data: totalSessions,
              smooth: true,
              lineStyle: {
                color: '#3b82f6',
                width: 3
              },
              itemStyle: {
                color: '#3b82f6'
              },
              areaStyle: {
                color: {
                  type: 'linear',
                  x: 0,
                  y: 0,
                  x2: 0,
                  y2: 1,
                  colorStops: [{
                    offset: 0, color: 'rgba(59, 130, 246, 0.3)'
                  }, {
                    offset: 1, color: 'rgba(59, 130, 246, 0.05)'
                  }]
                }
              }
            },
            {
              name: 'Clean Sessions',
              type: 'line',
              data: cleanSessions,
              smooth: true,
              lineStyle: {
                color: '#10b981',
                width: 2
              },
              itemStyle: {
                color: '#10b981'
              }
            },
            {
              name: 'Flagged Sessions',
              type: 'line',
              data: flaggedSessions,
              smooth: true,
              lineStyle: {
                color: '#ef4444',
                width: 2
              },
              itemStyle: {
                color: '#ef4444'
              }
            }
          ]
        };

        myChart.setOption(option);

        // Responsive resize with debouncing
        let resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function () {
            myChart.resize();
          }, 100);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function () {
          myChart.dispose();
        });
      }
    })();
  </script>
