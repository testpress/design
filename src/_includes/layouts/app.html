{% extends "layouts/base.html" %}

{% block body %}
<body class="overflow-y-scroll min-h-screen bg-gray-50 dark:bg-neutral-900 h-full">
<div x-data="{ 
  sidebarOpen: false,
  accordionOpen: {
    candidates: false,
    account: false
  },
  dropdownOpen: null,
  searchOpen: false,
  notificationsOpen: false,
  activityOpen: false,
  profileOpen: false,
  searchQuery: new URLSearchParams(window.location.search).get('q') || '',
  handleWorkspaceDetailSearch() {
    const path = window.location.pathname;
    const workspaceMatch = path.match(/\/workspaces\/(\d+)\//);
    
    if (!workspaceMatch) {
      return; 
    }
    
    const workspaceId = workspaceMatch[1];
    
    const workspaceContainer = document.querySelector('.space-y-5.mx-5');
    if (workspaceContainer) {
      const workspaceContainerData = Alpine.$data(workspaceContainer);
      const currentTab = workspaceContainerData ? workspaceContainerData.tab : null;
      
      if (currentTab && ['candidates', 'checkpoints'].includes(currentTab)) {
        const endpoint = currentTab === 'candidates' ? 
          `/workspaces/${workspaceId}/candidates/` :
          `/workspaces/${workspaceId}/checkpoints/`;
        
        const url = new URL(endpoint, window.location.origin);
        if (this.searchQuery) {
          url.searchParams.set('search', this.searchQuery);
        } else {
          url.searchParams.delete('search');
        }
        
        const containerId = `#${currentTab}-container`;
        htmx.ajax('GET', url.toString(), {
          target: containerId,
          swap: 'innerHTML'
        });
      }
    }
  },
  handleGeneralSearch() {
    const url = new URL(window.location.href);
    if (this.searchQuery) {
      url.searchParams.set('search', this.searchQuery);
    } else {
      url.searchParams.delete('search');
    }
    window.location.href = url.toString();
  },
  toggleDropdown(dropdown) {
    this.dropdownOpen = this.dropdownOpen === dropdown ? null : dropdown;
  },
  getAvatarStyle(name) {
    if (!name) return {};
    
    // Generate a consistent color based on the name
    const colors = [
      '#3B82F6', // Blue
      '#EF4444', // Red
      '#10B981', // Green
      '#F59E0B', // Yellow
      '#8B5CF6', // Purple
      '#EC4899', // Pink
      '#06B6D4', // Cyan
      '#84CC16', // Lime
      '#F97316', // Orange
      '#6366F1', // Indigo
      '#14B8A6', // Teal
      '#DC2626', // Rose
    ];
    
    // Create a simple hash from the name
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
      hash = name.charCodeAt(i) + ((hash << 5) - hash);
    }
    
    // Get color index
    const colorIndex = Math.abs(hash) % colors.length;
    const backgroundColor = colors[colorIndex];
    
    // Convert hex to RGB for lighter text color
    const hex = backgroundColor.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    
    // Create a lighter tint for text (mix with white)
    const textR = Math.round(r + (255 - r) * 0.7);
    const textG = Math.round(g + (255 - g) * 0.7);
    const textB = Math.round(b + (255 - b) * 0.7);
    
    const textColor = `rgb(${textR}, ${textG}, ${textB})`;
    
    return {
      backgroundColor: backgroundColor,
      color: textColor
    };
  }
}">
<!-- ========== HEADER ========== -->
<header class="lg:ms-64 fixed top-0 inset-x-0 flex flex-wrap md:justify-start md:flex-nowrap z-50 bg-white border-b border-gray-200 dark:bg-neutral-800 dark:border-neutral-700">
  <div class="flex justify-between xl:grid xl:grid-cols-3 basis-full items-center w-full py-2.5 px-2 sm:px-5">
    <div class="xl:col-span-1 flex items-center md:gap-x-3">
      <div class="lg:hidden">
        <!-- Sidebar Toggle -->
        <button type="button" @click="sidebarOpen = !sidebarOpen" class="w-7 h-9.5 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-hidden focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="dialog" aria-expanded="false" aria-label="Toggle navigation">
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8L21 12L17 16M3 12H13M3 6H13M3 18H13"/></svg>
        </button>
        <!-- End Sidebar Toggle -->
      </div>

      <div class="hidden lg:block min-w-80 xl:w-full">
        <!-- Search Input -->
        <div class="relative">
          <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
            <svg class="shrink-0 size-4 text-gray-400 dark:text-white/60" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </div>
          <input type="text" x-model="searchQuery" 
            @keyup.enter="handleGeneralSearch()" 
            @keyup.escape="searchQuery = ''; handleGeneralSearch()"
            class="py-2 ps-10 pe-16 block w-full bg-white border-gray-200 rounded-lg text-sm focus:outline-hidden focus:ring-0 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder:text-neutral-400 dark:focus:ring-neutral-600" placeholder="Search Sentinel" @click="searchOpen = true">
          <div class="hidden absolute inset-y-0 end-0 flex items-center z-20 pe-1">
            <button type="button" class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 hover:text-blue-600 focus:outline-hidden focus:text-blue-600 dark:text-neutral-500 dark:hover:text-blue-500 dark:focus:text-blue-500" aria-label="Close">
              <span class="sr-only">Close</span>
              <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            </button>
          </div>
          <div class="absolute inset-y-0 end-0 flex items-center pointer-events-none z-20 pe-3 text-gray-400">
            <svg class="shrink-0 size-3 text-gray-400 dark:text-white/60" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>
            <span class="mx-1">
              <svg class="shrink-0 size-3 text-gray-400 dark:text-white/60" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </span>
            <span class="text-xs">/</span>
          </div>
        </div>
        <!-- End Search Input -->
      </div>
    </div>

    <div class="xl:col-span-2 flex justify-end items-center gap-x-2">
      <div class="flex items-center">
        <div class="lg:hidden">
          <!-- Search Button Icon -->
          <button type="button" @click="searchOpen = true" class="inline-flex shrink-0 justify-center items-center gap-x-2 size-9.5 rounded-full text-gray-500 hover:bg-gray-100 focus:outline-hidden focus:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <!-- End Search Button Icon -->
        </div>
        {% include "partials/organization_switcher.html" %}
      </div>

      <div class="h-9.5">
        <!-- Account Dropdown -->
        <div class="relative inline-flex text-start" @click.away="profileOpen = false">
          <button type="button" @click="profileOpen = !profileOpen" class="inline-flex shrink-0 items-center gap-x-3 text-start rounded-full focus:outline-hidden focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" aria-haspopup="menu" aria-expanded="false" aria-label="User Profile">
            <div class="shrink-0 size-10 rounded-full flex items-center justify-center font-semibold text-sm" 
                 :style="getAvatarStyle('Admin')">
              A
            </div>
          </button>

          <!-- Account Dropdown -->
          <div x-show="profileOpen" 
               x-cloak 
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 scale-95"
               x-transition:enter-end="opacity-100 scale-100"
               x-transition:leave="transition ease-in duration-75"
               x-transition:leave-start="opacity-100 scale-100"
               x-transition:leave-end="opacity-0 scale-95"
               class="absolute right-0 top-full mt-2 w-60 bg-white rounded-xl shadow-xl dark:bg-neutral-900 z-20" 
               role="menu" 
               aria-orientation="vertical">
            <div class="p-1 border-b border-gray-200 dark:border-neutral-800">
              <a class="py-2 px-3 flex items-center gap-x-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="#">
                <div class="shrink-0 size-9 rounded-full flex items-center justify-center font-bold text-sm text-white shadow-md" 
                     :style="getAvatarStyle('Admin')">
                  A
                </div>
                <div class="grow">
                  <span class="text-sm font-semibold text-gray-800 dark:text-neutral-300">Administrator</span>
                  <p class="text-xs text-gray-500 dark:text-neutral-500">admin@sentinel.local</p>
                </div>
              </a>
            </div>
            <div class="p-1">
              <a class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="#">
                <svg class="shrink-0 mt-0.5 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                Billing
              </a>
              <a class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="#">
                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                Settings
              </a>
              <a class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="#">
                <svg class="shrink-0 mt-0.5 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                My account
              </a>
            </div>
            <div class="p-1 border-t border-gray-200 dark:border-neutral-800">
              <a class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="#">
                Manage team
              </a>
              <a class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" href="/">
                Sign out
              </a>
            </div>
          </div>
          <!-- End Account Dropdown -->
        </div>
        <!-- End Account Dropdown -->
      </div>
    </div>
  </div>
</header>
<!-- ========== END HEADER ========== -->

<!-- ========== MAIN SIDEBAR ========== -->
{% include "sentinel/layout/sidebar.html" %}
<!-- ========== END MAIN SIDEBAR ========== -->

<!-- ========== MAIN CONTENT ========== -->
<main id="content" class="lg:ps-64 pt-14">
    {% block content %}
    {% endblock content %}
</main>
<!-- ========== END MAIN CONTENT ========== -->

</div>
</body>
{% endblock body %}
