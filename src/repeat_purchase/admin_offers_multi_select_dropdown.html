<div class="col-span-full"
     x-data="ProductData('{{ dropdown.api_url }}', {{ dropdown.initial_data | default('[]') }}, '{{ dropdown.data_key | default('') }}', {{ dropdown.mock_options | default('null') }})"
     x-init="fetchItems(); showSearchProductDropdown=false;">

  <div class="flex items-center gap-x-2">
    <label class="block text-sm font-medium leading-6 text-gray-900">
      {{ dropdown.label }}
    </label>

    {% if dropdown.help_text %}
    <div class="hs-tooltip inline-block">
      <button type="button" class="hs-tooltip-toggle flex justify-center items-center">
        <svg class="shrink-0 size-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>
        </svg>
        <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 max-w-60 py-2 px-2 bg-gray-900 text-xs text-white rounded-lg shadow-sm" role="tooltip">
          {{ dropdown.help_text }}
        </span>
      </button>
    </div>
    {% endif %}
  </div>

  <div class="mt-2">
    <input type="hidden" name="{{ dropdown.field }}" x-model="getSelectedItemsIds()">

    <div class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:ring-emerald-600 sm:text-sm sm:leading-6"
         @click="showSearchProductDropdown=!showSearchProductDropdown;InitializeStoredItems()"
         :class="selectedItems.length == 0 ? 'h-8' : 'h-auto'">

      <div class="flex flex-wrap space-x-2 px-2">
        <template x-for="item in selectedItems" :key="item.id">
          <span class="inline-flex items-center py-0.5 pl-2 pr-0.5 rounded-full text-xs font-medium {{ dropdown.chip_bg }} {{ dropdown.chip_text }}">
            <span x-text="item.title"></span>
            <button type="button"
                    @click.stop="removeItem(item)"
                    class="flex-shrink-0 ml-0.5 h-4 w-4 {{ dropdown.chip_icon }}">

              <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
                <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7"/>
              </svg>

            </button>
          </span>
        </template>
      </div>
    </div>

    <div class="relative"
         x-show="showSearchProductDropdown"
         @click.away="showSearchProductDropdown=false">
      <div class="absolute w-full bg-white shadow-lg rounded-md ring-1 ring-black ring-opacity-5 z-10">
        <input
          type="search"
          @input.debounce="fetchItems({search: $event.target.value})"
          class="block w-full border-0 text-sm"
          placeholder="{{ dropdown.placeholder }}"
        >
        <ul class="max-h-32 overflow-auto text-sm my-3">
          <template x-for="item in displayItems()" :key="item.id">
            <li class="cursor-pointer hover:bg-gray-100 py-2 px-3"
                @click="onItemSelect(item);showSearchProductDropdown=false">
              <span x-text="item.title"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </div>
</div>
