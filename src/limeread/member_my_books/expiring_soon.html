<div x-data="carousel()" class="relative">
  <!-- Header -->
  <div class="mb-2 flex flex-wrap justify-between items-center gap-3">
    <h2 class="font-medium text-lg text-foreground">
      Expiring Soon
    </h2>

    <!-- Nav -->
    <div x-show="showArrows" x-cloak class="flex items-center gap-x-2">
      <button type="button" @click="scrollLeft()" :disabled="!canScrollLeft" class="inline-flex justify-center items-center size-8 bg-card border border-border text-foreground rounded-full shadow-2xs hover:bg-muted focus:outline-hidden disabled:opacity-50 disabled:cursor-default">
        <span class="text-2xl" aria-hidden="true">
          <i data-lucide="chevron-left" class="shrink-0 size-4"></i>
        </span>
        <span class="sr-only">Previous</span>
      </button>
      <button type="button" @click="scrollRight()" :disabled="!canScrollRight" class="inline-flex justify-center items-center size-8 bg-card border border-border text-foreground rounded-full shadow-2xs hover:bg-muted focus:outline-hidden disabled:opacity-50 disabled:cursor-default">
        <span class="sr-only">Next</span>
        <span class="text-2xl" aria-hidden="true">
          <i data-lucide="chevron-right" class="shrink-0 size-4"></i>
        </span>
      </button>
    </div>
    <!-- End Nav -->
  </div>
  <!-- End Header -->

  <!-- Carousel -->
  <div class="w-full overflow-hidden">
    <div x-ref="slider" @mousedown="startDrag" @mousemove="onDrag" @mouseup="endDrag" @mouseleave="endDrag" @scroll="checkScroll" class="flex flex-nowrap gap-x-3 lg:gap-x-5 overflow-x-auto snap-x snap-mandatory [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
      {% for book in expiring_soon %}
      <div class="group relative shrink-0 snap-start w-[calc(50%-0.375rem)] sm:w-[calc(33.333%-0.75rem)] xl:w-[calc(20%-1rem)] 2xl:w-[calc(16.666%-1.25rem)]">
        <div class="relative">
          <a class="relative block rounded-xl overflow-hidden focus:outline-hidden bg-gray-100 dark:bg-neutral-800" :href="previewPath + '/limeread/member_ebook_detail/?status=borrowed'">
            <img class="w-full h-72 object-cover object-center rounded-xl text-transparent transition-transform duration-500 ease-in-out group-hover:scale-105 group-focus:scale-105" src="{{ book.cover }}" alt="Cover of {{ book.title }}">
            
            <div class="absolute top-0 inset-s-0 pt-2 ps-2 pointer-events-none z-10">
              {% if book.urgency == 'critical' or book.urgency == 'high' %}
              <span class="inline-flex items-center py-1 px-2 bg-layer font-medium text-xs rounded-full shadow-2xs text-red-600 dark:text-red-400">
                <i data-lucide="clock" class="shrink-0 size-3 mr-1"></i>
                <span>{{ book.time_left }}</span>
              </span>
              {% else %}
              <span class="inline-flex items-center py-1 px-2 bg-layer font-medium text-xs rounded-full shadow-2xs text-amber-600 dark:text-amber-400">
                <i data-lucide="clock" class="shrink-0 size-3 mr-1"></i>
                <span>{{ book.time_left }}</span>
              </span>
              {% endif %}
            </div>
          </a>
        </div>
        <a class="after:z-1 after:absolute after:inset-0" :href="previewPath + '/limeread/member_ebook_detail/?status=borrowed'"></a>
        <div class="pt-3">
          <h2 class="font-medium text-sm text-gray-800 group-hover:text-primary-600 dark:text-neutral-200 dark:group-hover:text-primary-500 transition-colors line-clamp-2">
            {{ book.title }}
          </h2>
          <div>
            <ul class="mt-1">
              <div class="text-xs">
                <span class="text-gray-500 dark:text-neutral-400 hover:cursor-pointer">{{ book.subject }}</span>
                <span class="text-gray-500 dark:text-neutral-400">·</span>
                <span class="text-gray-500 dark:text-neutral-400 hover:cursor-pointer">{{ book.course }}</span>
              </div>
            </ul>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
