{% macro password_input(id, label, placeholder="********", forgot_password_link="", forgot_password_text="I forgot my password") %}
<div>
  <div class="flex justify-between items-center mb-2">
    <label for="{{ id }}" class="block text-sm font-medium text-gray-800 dark:text-neutral-200">
      {{ label }}
    </label>
    {% if forgot_password_link %}
      <a class="inline-flex items-center gap-x-1.5 text-xs text-gray-500 dark:text-neutral-400 hover:text-gray-800 dark:hover:text-neutral-200 decoration-2 hover:underline focus:outline-hidden focus:underline" href="{{ forgot_password_link }}">
        {{ forgot_password_text }}
      </a>
    {% endif %}
  </div>

  <div class="relative" x-data="passwordToggle">
    <input id="{{ id }}" :type="show ? 'text' : 'password'" 
      class="py-2 sm:py-2.5 px-3 block w-full bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-400 dark:placeholder:text-neutral-500 focus:border-primary-600 focus:ring-primary-600 focus:outline-hidden disabled:opacity-50 disabled:pointer-events-none" 
      placeholder="{{ placeholder }}">
    <button type="button" @click="toggle()" class="absolute inset-y-0 inset-e-0 flex items-center z-20 px-3 cursor-pointer text-gray-400 dark:text-neutral-500 rounded-e-md hover:text-primary-700 dark:hover:text-primary-600 focus:outline-hidden focus:text-primary-600">
      <svg class="shrink-0 size-4" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path x-show="!show" d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
        <path x-show="!show" d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
        <path x-show="!show" d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
        <line x-show="!show" x1="2" x2="22" y1="2" y2="22"></line>
        <path x-show="show" x-cloak d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
        <circle x-show="show" x-cloak cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </div>
</div>
{% endmacro %}
