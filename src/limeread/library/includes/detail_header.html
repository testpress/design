<div class="space-y-2">

                    Ebook Catalog

        </div>
    </div>
    <div

            <div class="grow w-full sm:w-auto">

                        <div class="grow text-start">
                            <div class="space-y-1 flex flex-col justify-start">

                                        <p class="text-sm text-muted-foreground-1">Thibaut Meurisse</p>
                                    </li>
                                    <li
                                        class="inline-flex items-center relative text-sm text-muted-foreground-1 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">

                                    <li

                                        <p class="text-sm text-muted-foreground-1">Epub</p>
                                    </li>
                                </ul>

                                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z">
                                    </path>
                                    <path d="m15 5 4 4"></path>
                                </svg>
                                Edit
                            </button>

                            <!-- Action Dropdown -->
                            <div x-data="{ 
                                open: false, 
                                positionClass: 'left-0',
                                toggle() {
                                    this.open = !this.open;
                                    if (this.open) {
                                        this.$nextTick(() => {
                                            const rect = this.$el.getBoundingClientRect();
                                            // 192px is w-48. Add some margin.
                                            if (rect.left + 192 > window.innerWidth - 16) {
                                                this.positionClass = 'right-0';
                                            } else {
                                                this.positionClass = 'left-0';
                                            }
                                        });
                                    }
                                }
                            }" class="relative inline-flex">
                                <button @click="toggle()" @click.away="open = false" type="button"
                                    class="py-1.5 px-2.5 lg:py-1.5 lg:px-2.5 inline-flex items-center gap-x-1.5 text-[13px] font-medium whitespace-nowrap rounded-lg border border-gray-200 bg-white text-foreground shadow-2xs hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
                                    aria-haspopup="menu" :aria-expanded="open" aria-label="More actions">
                                    <span class="hidden lg:inline">Manage</span>
                                    <svg class="hidden lg:block shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24"
                                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="m6 9 6 6 6-6" />
                                    </svg>
                                    <svg class="block lg:hidden shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <circle cx="12" cy="12" r="1" />
                                        <circle cx="12" cy="5" r="1" />
                                        <circle cx="12" cy="19" r="1" />
                                    </svg>
                                </button>

                                <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-100"
                                    x-transition:enter-start="opacity-0 scale-95"
                                    x-transition:enter-end="opacity-100 scale-100"
                                    x-transition:leave="transition ease-in duration-75"
                                    x-transition:leave-start="opacity-100 scale-100"
                                    x-transition:leave-end="opacity-0 scale-95"
                                    :class="positionClass"
                                    class="absolute top-full mt-2 w-48 z-50 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl overflow-hidden"
                                    role="menu">
                                    <div class="p-1.5 space-y-0.5 text-start">
                                        <button type="button"
                                            class="lg:hidden w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <svg class="shrink-0 size-4 text-muted-foreground-1"
                                                xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">
                                                <path
                                                    d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z">
                                                </path>
                                                <path d="m15 5 4 4"></path>
                                            </svg>

                                                xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">

                                                xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round">

                                                <polyline points="7 10 12 15 17 10" />
                                                <line x1="12" x2="12" y1="15" y2="3" />
                                            </svg>

                                        </button>

                                                xmlns="http://www.w3.org/2000/svg" width="24" height="24"

                                                stroke-linecap="round" stroke-linejoin="round">

                                                <rect x="1" y="3" width="22" height="5" />
                                                <line x1="10" y1="12" x2="14" y2="12" />
                                            </svg>

                                            <svg class="shrink-0 size-4 text-muted-foreground-1"

                                                stroke-linecap="round" stroke-linejoin="round">

                                                width="24" height="24" viewBox="0 0 24 24" fill="none"

                                                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                                                <line x1="10" y1="11" x2="10" y2="17" />
                                                <line x1="14" y1="11" x2="14" y2="17" />

                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="shrink-0 size-3.5">
                                    <path d="M20 6 9 17l-5-5" />
                                </svg>

                                <!-- Label -->
                                <span>Publish</span>
                            </button>
                            <!-- End Select -->
                        </div>
                        <!-- End Button Group -->
                    </div>
                </div>

                                d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z">
