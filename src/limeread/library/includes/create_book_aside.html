<div class="p-4 h-full relative flex flex-col bg-card border border-card-line rounded-xl shadow-2xs">
  <div class="flex justify-between items-center gap-x-2">
    <h2 class="font-semibold text-foreground">
      Publishing Readiness 
    </h2>
  </div>

  <!-- Timeline -->
  <div class="mt-4 space-y-5">
    <!-- Item: Ebook Uploaded -->
    <div class="group relative flex items-center gap-x-3.5">
      <!-- Icon -->
      <div class="relative shrink-0 flex items-center justify-center">
        <span class="size-5 flex justify-center items-center rounded-full transition-all duration-300"
              :class="$store.publish.ebookUploaded ? 'bg-primary text-primary-foreground' : 'text-foreground'">
          <template x-if="$store.publish.ebookUploaded">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </template>
          <template x-if="!$store.publish.ebookUploaded">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-check-icon lucide-file-check"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="m9 15 2 2 4-4"/></svg>
          </template>
        </span>
      </div>
      <!-- End Icon -->
      <!-- Right Content -->
      <div class="grow">
        <div class="flex justify-between items-center gap-x-1.5">
          <div class="inline-flex flex-wrap gap-x-3 text-sm text-foreground">
            <span :class="$store.publish.ebookUploaded ? 'text-muted-foreground line-through' : 'text-foreground'">
              Ebook Uploaded
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Item: Metadata Completed -->
    <div class="group relative flex items-center gap-x-3.5">
      <!-- Icon -->
      <div class="relative shrink-0 flex items-center justify-center">
        <span class="size-5 flex justify-center items-center rounded-full transition-all duration-300"
              :class="$store.publish.isMetadataComplete ? 'bg-primary text-primary-foreground' : 'text-foreground'">
          <template x-if="$store.publish.isMetadataComplete">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </template>
          <template x-if="!$store.publish.isMetadataComplete">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg> 
          </template>
        </span>
      </div>
      <!-- End Icon -->
      <!-- Right Content -->
      <div class="grow">
        <div class="flex justify-between items-center gap-x-1.5">
          <div class="inline-flex flex-wrap gap-x-3 text-sm text-foreground">
            <span :class="$store.publish.isMetadataComplete ? 'text-muted-foreground line-through' : 'text-foreground'">
              Metadata Completed
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Item: Cover Uploaded -->
    <div class="group relative flex items-center gap-x-3.5">
      <!-- Icon -->
      <div class="relative shrink-0 flex items-center justify-center">
        <span class="size-5 flex justify-center items-center rounded-full transition-all duration-300"
              :class="$store.publish.coverUploaded ? 'bg-primary text-primary-foreground' : 'text-foreground'">
          <template x-if="$store.publish.coverUploaded">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </template>
          <template x-if="!$store.publish.coverUploaded">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
          </template>
        </span>
      </div>
      <!-- End Icon -->
      <!-- Right Content -->
      <div class="grow">
        <div class="flex justify-between items-center gap-x-1.5">
          <div class="inline-flex flex-wrap gap-x-3 text-sm text-foreground">
            <span :class="$store.publish.coverUploaded ? 'text-muted-foreground line-through' : 'text-foreground'">
              Cover Uploaded
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Item: Access Configured -->
    <div class="group relative flex items-center gap-x-3.5">
      <!-- Icon -->
      <div class="relative shrink-0 flex items-center justify-center">
        <span class="size-5 flex justify-center items-center rounded-full transition-all duration-300"
              :class="$store.publish.isAccessConfigured ? 'bg-primary text-primary-foreground' : 'text-foreground'">
          <template x-if="$store.publish.isAccessConfigured">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </template>
          <template x-if="!$store.publish.isAccessConfigured">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>  
          </template>
        </span>
      </div>
      <!-- End Icon -->
      <!-- Right Content -->
      <div class="grow">
        <div class="flex justify-between items-center gap-x-1.5">
          <div class="inline-flex flex-wrap gap-x-3 text-sm text-foreground">
            <span :class="$store.publish.isAccessConfigured ? 'text-muted-foreground line-through' : 'text-foreground'">
              Access Configured
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Item: License Configured -->
    <div class="group relative flex items-center gap-x-3.5">
      <!-- Icon -->
      <div class="relative shrink-0 flex items-center justify-center">
        <span class="size-5 flex justify-center items-center rounded-full transition-all duration-300"
              :class="$store.publish.isLicenseConfigured ? 'bg-primary text-primary-foreground' : 'text-foreground'">
          <template x-if="$store.publish.isLicenseConfigured">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </template>
          <template x-if="!$store.publish.isLicenseConfigured">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
          </template>
        </span>
      </div>
      <!-- End Icon -->
      <!-- Right Content -->
      <div class="grow">
        <div class="flex justify-between items-center gap-x-1.5">
          <div class="inline-flex flex-wrap gap-x-3 text-sm text-foreground">
            <span :class="$store.publish.isLicenseConfigured ? 'text-muted-foreground line-through' : 'text-foreground'">
              License Configured
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="p-4 h-full relative flex flex-col bg-card border border-card-line rounded-xl shadow-2xs">
  <div class="flex justify-between items-center gap-x-2">
    <h2 class="font-semibold text-foreground">
      Operational Summary
    </h2>
  </div>

  <!-- Summary Items -->
  <div class="mt-4 space-y-4">
    <div class="flex flex-col gap-y-4">
      <!-- Access -->
      <div class="flex items-center justify-between gap-x-3">
        <p class="text-sm text-muted-foreground-1">
          Access
        </p>
        <div class="flex items-center">
          <template x-if="$store.publish.accessSummary !== 'Not set'">
            <span class="py-px px-2 inline-flex items-center gap-x-1.5 bg-surface text-sm text-surface-foreground rounded-md" x-text="$store.publish.accessSummary"></span>
          </template>
          <template x-if="$store.publish.accessSummary === 'Not set'">
            <span class="font-medium text-sm text-foreground">Not set</span>
          </template>
        </div>
      </div>

      <!-- Max Readers -->
      <div class="flex items-center justify-between gap-x-3">
        <p class="text-sm text-muted-foreground-1">
          Max Active Readers
        </p>
        <span class="font-medium text-sm text-foreground" x-text="$store.publish.license.maxActiveReaders || 'Unlimited'"></span>
      </div>

      <!-- Total Borrow -->
      <div class="flex items-center justify-between gap-x-3">
        <p class="text-sm text-muted-foreground-1">
          Total Borrow Limits
        </p>
        <span class="font-medium text-sm text-foreground" x-text="$store.publish.license.totalBorrowLimit || 'Unlimited'"></span>
      </div>

      <!-- Duration -->
      <div class="flex items-center justify-between gap-x-3">
        <p class="text-sm text-muted-foreground-1">
          Borrow Duration
        </p>
        <span class="font-medium text-sm text-foreground" x-text="$store.publish.license.borrowDuration || 'Not Set'"></span>
      </div>

      <!-- Expiry -->
      <div class="flex items-center justify-between gap-x-3">
        <p class="text-sm text-muted-foreground-1">
          License Expiry
        </p>
        <span class="font-medium text-sm text-foreground" x-text="$store.publish.license.expiryDate || 'No Expiry'"></span>
      </div>
    </div>
  </div>
</div>
