<thead>
    <tr class="border-t border-gray-200 dark:border-neutral-700">
            <th scope="col" class="px-3 py-2.5 text-start">
              <input type="checkbox" 
                     @change="const ids = [{% for book in ebooks %}'{{ book.id }}',{% endfor %}]; selectedItems = $el.checked ? ids : []"
                     :checked="selectedItems.length === {{ ebooks | length }} && {{ ebooks | length }} > 0"
                     class="shrink-0 size-4 bg-transparent border-line-3 rounded-sm shadow-2xs text-primary focus:ring-0 focus:ring-offset-0 checked:bg-primary-checked checked:border-primary-checked disabled:opacity-50 disabled:pointer-events-none">
            </th>

        <th scope="col" class="min-w-60 px-6 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400">
            Ebook
        </th>

        <th scope="col" class="min-w-32 px-6 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400">
            Access
        </th>

        <th scope="col" class="min-w-40 px-6 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400">
            Publisher
        </th>

        <th scope="col" class="min-w-32 px-6 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400">
            Health
        </th>

        <th scope="col" class="min-w-32 px-6 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400">
            Last Updated
        </th>

        <th scope="col"></th>
    </tr>
</thead>
