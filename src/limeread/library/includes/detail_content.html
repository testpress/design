<div x-data="{ activeTab: 'overview' }" class="p-5 space-y-4 flex flex-col bg-card border border-card-line shadow-2xs rounded-xl">
  <!-- Nav Tab -->
  <nav class="flex gap-1 relative after:absolute after:bottom-0 after:inset-x-0 after:border-b after:border-line-2" aria-label="Tabs" role="tablist" aria-orientation="horizontal">
    <button 
      type="button" 
      @click="activeTab = 'overview'"
      :class="activeTab === 'overview' ? 'after:bg-foreground text-foreground' : 'text-muted-foreground-1'"
      :aria-selected="activeTab === 'overview'"
      class="px-2.5 py-1.5 mb-2 relative inline-flex justify-center items-center gap-x-2 hover:bg-muted-hover hover:text-foreground text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-muted-focus focus:text-foreground after:absolute after:-bottom-2 after:inset-x-0 after:z-10 after:h-0.5 after:pointer-events-none" 
      id="tab-overview" 
      aria-controls="panel-overview" 
      role="tab">
      Overview
    </button>
    <button 
      type="button" 
      @click="activeTab = 'active-barrow'"
      :class="activeTab === 'active-barrow' ? 'after:bg-foreground text-foreground' : 'text-muted-foreground-1'"
      :aria-selected="activeTab === 'active-barrow'"
      class="px-2.5 py-1.5 mb-2 relative inline-flex justify-center items-center gap-x-2 hover:bg-muted-hover hover:text-foreground text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-muted-focus focus:text-foreground after:absolute after:-bottom-2 after:inset-x-0 after:z-10 after:h-0.5 after:pointer-events-none" 
      id="tab-active-barrow" 
      aria-controls="panel-active-barrow" 
      role="tab">
      Active Barrow
    </button>
    <button 
      type="button" 
      @click="activeTab = 'waitlisting'"
      :class="activeTab === 'waitlisting' ? 'after:bg-foreground text-foreground' : 'text-muted-foreground-1'"
      :aria-selected="activeTab === 'waitlisting'"
      class="px-2.5 py-1.5 mb-2 relative inline-flex justify-center items-center gap-x-2 hover:bg-muted-hover hover:text-foreground text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-muted-focus focus:text-foreground after:absolute after:-bottom-2 after:inset-x-0 after:z-10 after:h-0.5 after:pointer-events-none" 
      id="tab-waitlisting" 
      aria-controls="panel-waitlisting" 
      role="tab">
      Waitlisting
    </button>
    <button 
      type="button" 
      @click="activeTab = 'barrow-history'"
      :class="activeTab === 'barrow-history' ? 'after:bg-foreground text-foreground' : 'text-muted-foreground-1'"
      :aria-selected="activeTab === 'barrow-history'"
      class="px-2.5 py-1.5 mb-2 relative inline-flex justify-center items-center gap-x-2 hover:bg-muted-hover hover:text-foreground text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-muted-focus focus:text-foreground after:absolute after:-bottom-2 after:inset-x-0 after:z-10 after:h-0.5 after:pointer-events-none" 
      id="tab-barrow-history" 
      aria-controls="panel-barrow-history" 
      role="tab">
      Barrow History  
    </button>
  </nav>

  <div x-show="activeTab === 'overview'" id="panel-overview" role="tabpanel" aria-labelledby="tab-overview" class="px-2">
<div class="space-y-4">
<div class="flex flex-wrap justify-between items-center gap-2">
    <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-base font-medium text-foreground flex items-center gap-2">
            How is this book performing?
        </h1>
    </div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
    <!-- Card: Active Viewers -->

        <div class="p-5">
            <div class="flex items-center">

                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>

                                        Users currently watching video, listening to audio, or reading ebooks.
                                    </span>
                                </div>
                            </div>
                        </dt>
                        <dd>
                            <div class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
                                1,200
                            </div>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">

                <span class="text-xs text-gray-500 dark:text-neutral-400">vs last hour</span>

    <!-- Card: New Subscribers -->
    <div class="overflow-hidden rounded-xl bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xs">
        <div class="p-5">
            <div class="flex items-center">
                <div class="shrink-0">
                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">
                <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
