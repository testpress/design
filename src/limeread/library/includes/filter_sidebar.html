<!-- Backdrop -->
<div x-show="showFilterModal" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-300"
  x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[70] bg-neutral-900/50 backdrop-blur-sm" style="display: none;"
  @click="showFilterModal = false">
</div>
<!-- End Backdrop -->

<!-- Filter Sidebar -->
<div x-show="showFilterModal" x-transition:enter="transition ease-out duration-300 transform"
  x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
  x-transition:leave="transition ease-in duration-300 transform" x-transition:leave-start="translate-x-0"
  x-transition:leave-end="translate-x-full"
  class="fixed top-0 end-0 size-full sm:w-[400px] z-[80] flex flex-col bg-white dark:bg-neutral-800 shadow-xl"
  style="display: none;" @click.away="showFilterModal = false" role="dialog" tabindex="-1"
  aria-labelledby="library-filter-label">
  
  <!-- Header -->
  <div class="py-3 px-6 flex justify-between items-center border-b dark:border-neutral-700">
    <h3 id="library-filter-label" class="font-medium text-gray-800 dark:text-neutral-200">
      Filters
    </h3>
    <button type="button" @click="showFilterModal = false"
      class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-gray-200 text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-200 dark:focus:bg-neutral-700">
      <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="flex-1 overflow-y-auto bg-gray-50 dark:bg-neutral-900/50 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
    <div class="p-4 space-y-4">
      
      <!-- Subjects -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Subjects
        </label>
        <select multiple data-hs-select='{
          "placeholder": "Select subjects...",
          "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-gray-200 rounded-lg dark:bg-neutral-800 dark:border-neutral-700",
          "optionClasses": "py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg dark:text-neutral-200 dark:hover:bg-neutral-700",
          "mode": "tags",
          "wrapperClasses": "mt-2 relative ps-0.5 pe-9 flex items-center flex-wrap w-full border border-gray-300 shadow-sm rounded-lg text-start text-sm dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
          "tagsItemTemplate": "<div class=\"flex flex-nowrap items-center relative z-10 bg-white border border-gray-200 rounded-full p-1 m-1 dark:bg-neutral-800 dark:border-neutral-700\"><div class=\"ms-2 whitespace-nowrap text-gray-800 dark:text-neutral-200\" data-title></div><div class=\"inline-flex shrink-0 justify-center items-center size-5 ms-2 rounded-full text-gray-800 bg-gray-200 hover:bg-gray-300 focus:outline-none text-sm cursor-pointer dark:bg-neutral-700 dark:text-neutral-300\" data-remove><svg class=\"shrink-0 size-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"/><path d=\"m6 6 12 12\"/></svg></div></div>"
        }' class="hidden">
          <option value="self-growth">Self Growth</option>
          <option value="productivity">Productivity</option>
          <option value="programming">Programming</option>
          <option value="business">Business</option>
          <option value="design">Design</option>
          <option value="biology">Biology</option>
        </select>
      </div>

      <!-- Format -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Format
        </label>
        <div class="flex flex-wrap gap-2">
          <label class="flex items-center gap-x-2 text-sm text-gray-800 dark:text-neutral-200 cursor-pointer bg-gray-50 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 px-3 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-700 transition-colors">
            <input type="checkbox" class="shrink-0 size-4 rounded text-primary-600 focus:ring-primary-500 border-gray-300 dark:border-neutral-700 dark:bg-neutral-900">
            PDF
          </label>
          <label class="flex items-center gap-x-2 text-sm text-gray-800 dark:text-neutral-200 cursor-pointer bg-gray-50 dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 px-3 py-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-700 transition-colors">
            <input type="checkbox" class="shrink-0 size-4 rounded text-primary-600 focus:ring-primary-500 border-gray-300 dark:border-neutral-700 dark:bg-neutral-900">
            EPUB
          </label>
        </div>
      </div>

      <!-- License Type -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          License Type
        </label>
        <select data-hs-select='{
          "placeholder": "All Licenses",
          "toggleTag": "<button type=\"button\"></button>",
          "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 px-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
          "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-gray-200 rounded-lg dark:bg-neutral-800 dark:border-neutral-700"
        }' class="hidden">
          <option value="">All Licenses</option>
          <option value="concurrent">Concurrent</option>
          <option value="unlimited">Unlimited</option>
          <option value="borrow-limit">Borrow Limit</option>
          <option value="time-based">Time Based</option>
        </select>
      </div>

    </div>
  </div>
  <!-- End Body -->

  <!-- Footer -->
  <div class="p-4 border-t dark:border-neutral-700 bg-white dark:bg-neutral-800">
    <div class="flex gap-x-2">
      <button type="button" @click="showFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300">
        Clear
      </button>
      <button type="button" @click="showFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700">
        Apply Filter
      </button>
    </div>
  </div>
  <!-- End Footer -->
</div>
