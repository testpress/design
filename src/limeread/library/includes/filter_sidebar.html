<!-- Backdrop -->
<div x-show="showFilterModal" x-cloak
  x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-300"
  x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[70] bg-gray-900/10"
  @click="showFilterModal = false">
</div>
<!-- End Backdrop -->

<!-- Filter Modal -->
<div x-show="showFilterModal" x-cloak
  x-transition:enter="transition ease-out duration-300 transform"
  x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
  x-transition:leave="transition ease-in duration-300 transform" x-transition:leave-start="translate-x-0"
  x-transition:leave-end="translate-x-full"
  class="fixed top-0 end-0 size-full sm:w-[420px] z-[80] flex flex-col bg-overlay border-s border-overlay-line shadow-xl"
  @click.away="showFilterModal = false" role="dialog" tabindex="-1">
  
  <!-- Header -->
  <div class="py-2.5 px-4 flex justify-between items-center border-b border-overlay-divider">
    <div class="flex items-center gap-x-2">
      <svg class="shrink-0 size-4 text-muted-foreground-1" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
      <h3 class="font-medium text-foreground">
        Advanced Filters
      </h3>
    </div>
    <button type="button" @click="showFilterModal = false"
      class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-surface text-foreground hover:bg-surface-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-surface-focus transition-all">
      <span class="sr-only">Close</span>
      <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="h-full overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">
    <div class="px-5 py-7 space-y-8">
      
      <!-- Saved Views -->
      <div>
        <h5 class="mb-3 text-[11px] font-semibold uppercase tracking-wider text-muted-foreground-1">
          Saved Views
        </h5>
        <div class="flex flex-wrap gap-2">
          <button type="button" class="py-1.5 px-3 inline-flex items-center gap-x-1.5 text-xs font-medium bg-surface border border-overlay-divider text-foreground rounded-full hover:bg-surface-hover transition-all">
            Needs Attention
            <span class="size-1.5 rounded-full bg-red-500"></span>
          </button>
          <button type="button" class="py-1.5 px-3 inline-flex items-center gap-x-1.5 text-xs font-medium bg-surface border border-overlay-divider text-foreground rounded-full hover:bg-surface-hover transition-all">
            High Demand
          </button>
          <button type="button" class="py-1.5 px-3 inline-flex items-center gap-x-1.5 text-xs font-medium bg-surface border border-overlay-divider text-foreground rounded-full hover:bg-surface-hover transition-all">
            Underutilized
          </button>
        </div>
      </div>

      <!-- Section: Operational Health -->
      <div class="space-y-4">
        <h5 class="text-[11px] font-semibold uppercase tracking-wider text-muted-foreground-1">Operational Health</h5>
        <div class="space-y-2">
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" class="shrink-0 size-4 rounded border-layer-line text-emerald-600 focus:ring-emerald-500 bg-layer">
            <span class="ms-3 text-sm text-muted-foreground-1 group-hover:text-foreground transition-colors">Missing Metadata</span>
          </label>
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" class="shrink-0 size-4 rounded border-layer-line text-emerald-600 focus:ring-emerald-500 bg-layer">
            <span class="ms-3 text-sm text-muted-foreground-1 group-hover:text-foreground transition-colors">Missing Cover Image</span>
          </label>
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" class="shrink-0 size-4 rounded border-layer-line text-emerald-600 focus:ring-emerald-500 bg-layer">
            <span class="ms-3 text-sm text-red-500 font-medium group-hover:text-red-600 transition-colors">License Issues</span>
          </label>
        </div>
      </div>

      <!-- Section: Status & Visibility -->
      <div class="space-y-4">
        <h5 class="text-[11px] font-semibold uppercase tracking-wider text-muted-foreground-1">Status & Visibility</h5>
        <div class="grid grid-cols-2 gap-2">
          <label class="relative flex justify-center items-center p-2 text-xs font-medium border border-overlay-divider rounded-lg cursor-pointer hover:bg-surface-hover has-[:checked]:bg-emerald-500/10 has-[:checked]:border-emerald-500/50 has-[:checked]:text-emerald-600 transition-all">
            <input type="radio" name="visibility" class="hidden">
            Public
          </label>
          <label class="relative flex justify-center items-center p-2 text-xs font-medium border border-overlay-divider rounded-lg cursor-pointer hover:bg-surface-hover has-[:checked]:bg-emerald-500/10 has-[:checked]:border-emerald-500/50 has-[:checked]:text-emerald-600 transition-all">
            <input type="radio" name="visibility" class="hidden" checked>
            Restricted
          </label>
        </div>
        <div>
          <label class="block text-[11px] font-medium text-muted-foreground-1 mb-1.5">Catalog Status</label>
          <select class="w-full text-sm py-2 px-3 border-layer-line bg-layer rounded-lg focus:ring-emerald-500 focus:border-emerald-500 text-foreground">
            <option>All Statuses</option>
            <option>Active</option>
            <option>Archived</option>
            <option>Disabled</option>
          </select>
        </div>
      </div>

      <!-- Section: License -->
      <div class="space-y-4 pt-4 border-t border-overlay-divider">
        <h5 class="text-[11px] font-semibold uppercase tracking-wider text-muted-foreground-1">License Health</h5>
        <div class="space-y-2">
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" class="shrink-0 size-4 rounded border-layer-line text-emerald-600 focus:ring-emerald-500 bg-layer">
            <span class="ms-3 text-sm text-muted-foreground-1 group-hover:text-foreground transition-colors">Expiring Soon (< 30 days)</span>
          </label>
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" class="shrink-0 size-4 rounded border-layer-line text-emerald-600 focus:ring-emerald-500 bg-layer">
            <span class="ms-3 text-sm text-muted-foreground-1 group-hover:text-foreground transition-colors">Underutilized Content</span>
          </label>
        </div>
        <div class="flex flex-wrap gap-2">
          <span class="py-1 px-2.5 text-[11px] font-medium bg-surface border border-overlay-divider text-muted-foreground-1 rounded cursor-pointer hover:text-foreground transition-colors">Concurrent</span>
          <span class="py-1 px-2.5 text-[11px] font-medium bg-surface border border-overlay-divider text-muted-foreground-1 rounded cursor-pointer hover:text-foreground transition-colors">Borrow Limit</span>
        </div>
      </div>

      <!-- Section: Content -->
      <div class="space-y-4 pt-4 border-t border-overlay-divider">
        <h5 class="text-[11px] font-semibold uppercase tracking-wider text-muted-foreground-1">Content Details</h5>
        <div class="space-y-3">
          <div>
            <label class="block text-[11px] font-medium text-muted-foreground-1 mb-1.5">Subject</label>
            <select class="w-full text-sm py-2 px-3 border-layer-line bg-layer rounded-lg focus:ring-emerald-500 focus:border-emerald-500 text-foreground">
              <option>All Subjects</option>
              <option>Technology</option>
              <option>Fiction</option>
            </select>
          </div>
          <div>
            <label class="block text-[11px] font-medium text-muted-foreground-1 mb-1.5">Publisher</label>
            <select class="w-full text-sm py-2 px-3 border-layer-line bg-layer rounded-lg focus:ring-emerald-500 focus:border-emerald-500 text-foreground">
              <option>All Publishers</option>
              <option>Penguin</option>
              <option>O'Reilly</option>
            </select>
          </div>
        </div>
      </div>

    </div>
  </div>
  <!-- End Body -->

  <!-- Footer -->
  <div class="p-4 border-t border-overlay-divider bg-overlay">
    <div class="grid grid-cols-2 gap-2">
      <button type="button" @click="showFilterModal = false"
        class="py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-xl bg-surface border border-overlay-divider text-foreground hover:bg-surface-hover focus:outline-hidden transition-all">
        Reset
      </button>

      <button type="button" @click="showFilterModal = false"
        class="py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-xl bg-emerald-600 text-white hover:bg-emerald-700 focus:outline-hidden shadow-sm shadow-emerald-500/20 transition-all">
        Apply
      </button>
    </div>
  </div>
  <!-- End Footer -->
</div>
