<div class="flex" x-data="useSubjectFilter()">
  <div class="flex flex-col space-y-4">
    <div>
      <nav class="flex items-center overflow-x-auto hide-scrollbar">
        <div class="flex gap-2 mr-2">

          <!-- All pill (always visible, deselects everything) -->
          <button type="button"
            @click="selectedSubjects = []"
            class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
            :class="selectedSubjects.length === 0
              ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500'
              : 'bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600'">

            All
          </button>

          <!-- Visible subject pills -->
          <template x-for="(subject, index) in subjects" :key="subject.id">
            <label
              x-show="index < visibleCount"
              :for="`subject-${subject.id}`"
              class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
              :class="isSelected(subject.id)
                ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500'
                : 'bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600'">

              <input type="checkbox"
                :id="`subject-${subject.id}`"
                class="hidden"
                :checked="isSelected(subject.id)"
                @change="toggleSubject(subject.id)">

              <span class="block max-w-56 truncate" x-text="subject.name"></span>
            </label>
          </template>

        </div>
      </nav>
    </div>
  </div>

  <!-- View All Button & Dropdown -->
  <div class="relative" x-data="{ viewAllOpen: false }" @click.outside="viewAllOpen = false">
    <button type="button"
      @click="viewAllOpen = !viewAllOpen"
      class="py-2 px-3 flex shrink-0 whitespace-nowrap justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600">
      View All
    </button>

    <!-- Dropdown Panel -->
    <div x-show="viewAllOpen"
      x-transition:enter="transition ease-out duration-100"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-75"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="absolute right-0 top-full mt-2 w-full sm:w-96 z-10 bg-white border border-gray-200 sm:rounded-lg shadow-md sm:shadow-xl dark:bg-neutral-900 dark:border-neutral-700 flex flex-col"
      style="display: none;">

      <div class="p-4 space-y-5">
        <div>
          <!-- Selected Tags (Emerald Badges) -->
          <div x-show="selectedSubjects.length > 0" class="flex flex-wrap gap-1 mt-1 mb-3">
            <template x-for="id in selectedSubjects" :key="id">
              <span class="inline-flex items-center py-0.5 pl-2 pr-0.5 rounded-full text-xs bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-400">
                <span x-text="subjects.find(o => o.id === id)?.name"></span>
                <button @click.stop="toggleSubject(id)" type="button" class="flex-shrink-0 ml-0.5 h-4 w-4 rounded-full inline-flex items-center justify-center text-emerald-400 dark:text-emerald-500 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 hover:text-emerald-600 dark:hover:text-emerald-300 focus:outline-none">
                  <span class="sr-only">Remove option</span>
                  <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
                    <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7"></path>
                  </svg>
                </button>
              </span>
            </template>
          </div>

          <!-- Search Input -->
          <div class="mb-3">
            <input type="text"
                   x-model="searchQuery"
                   placeholder="Search subjects..."
                   class="block w-full text-xs sm:text-sm bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-md text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:outline-none focus:ring-1 focus:ring-emerald-600 dark:focus:ring-emerald-500 focus:border-emerald-600 dark:focus:border-emerald-500 py-1.5 px-2">
          </div>

          <!-- Scrollable Option List -->
          <div class="overflow-y-auto max-h-40 mb-3 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
            <template x-for="option in filteredSubjects()" :key="option.id">
              <div @click.stop="toggleSubject(option.id)" class="py-1.5 px-2 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-md flex items-center justify-between">
                <span x-text="option.name"></span>
                <template x-if="isSelected(option.id)">
                  <i class="shrink-0 size-3.5 text-emerald-600" data-lucide="check" stroke-width="3"></i>
                </template>
              </div>
            </template>
            <div x-show="filteredSubjects().length === 0" class="w-full text-xs text-gray-400 text-center py-4">
              No subjects found
            </div>
          </div>
        </div>


      </div>

    </div>
    <!-- End Dropdown Panel -->
  </div>
</div>
  <div class="pb-4 grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 border-b border-gray-200 dark:border-neutral-700">
    <div>
      <!-- Search Input -->
      <div class="relative">
        <div class="absolute inset-y-0 inset-s-0 flex items-center pointer-events-none z-20 ps-3.5">
          <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <input type="text" class="py-1.5 sm:py-2 ps-10 pe-8 block w-full md:max-w-md bg-gray-100 dark:bg-neutral-700 border-transparent rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:bg-white dark:focus:bg-neutral-800 focus:border-emerald-700 dark:focus:border-emerald-600 focus:ring-emerald-700 dark:focus:ring-emerald-600 checked:border-emerald-700 dark:checked:border-emerald-600 disabled:opacity-50 disabled:pointer-events-none" placeholder="Search books, authors, subjects...">
        <div class="hidden absolute inset-y-0 inset-e-0 flex items-center z-20 pe-1">
          <button type="button" class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 dark:text-neutral-400 hover:text-emerald-700 dark:hover:text-emerald-600 focus:outline-hidden focus:text-emerald-700 dark:focus:text-emerald-600" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
          </button>
        </div>
      </div>
      <!-- End Search Input -->
    </div>
    <!-- End Col -->

    <div class="flex md:justify-end items-center gap-x-2">
      <!-- Sort Dropdown -->
      <div class="relative inline-flex" x-data="{ sortOpen: false, selectedSort: 'Recently Added' }" @click.outside="sortOpen = false">
        <!-- Sort Button -->
        <button type="button" @click="sortOpen = !sortOpen" class="py-2 px-2.5 inline-flex items-center justify-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700" aria-haspopup="menu" :aria-expanded="sortOpen" aria-label="Dropdown">
          <i data-lucide="arrow-up-down" class="shrink-0 size-4"></i>
          <span x-text="selectedSort"></span>
          <i data-lucide="chevron-down" class="shrink-0 size-4"></i>
        </button>
        <!-- End Sort Button -->

        <!-- Dropdown -->
        <div x-show="sortOpen"
             style="display: none;"
             x-transition:enter="transition ease-out duration-100"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-75"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="absolute right-0 top-full mt-2 w-48 z-10 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical">
          <div class="p-1 space-y-0.5">
            <button type="button" @click="selectedSort = 'Most Popular'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="star" class="shrink-0 size-4"></i>
              Most Popular
            </button>
            <button type="button" @click="selectedSort = 'Recently Added'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="sparkles" class="shrink-0 size-4"></i>
              Recently Added
            </button>
            <button type="button" @click="selectedSort = 'Title A–Z'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="arrow-up-a-z" class="shrink-0 size-4"></i>
              Title A–Z
            </button>
            <button type="button" @click="selectedSort = 'Available First'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="badge-check" class="shrink-0 size-4"></i>
              Available First
            </button>
            <button type="button" @click="selectedSort = 'Trending'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="flame" class="shrink-0 size-4"></i>
              Trending
            </button>
            <button type="button" @click="selectedSort = 'Most Borrowed'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
              <i data-lucide="book-open" class="shrink-0 size-4"></i>
              Most Borrowed
            </button>
          </div>
        </div>
        <!-- End Dropdown -->
      </div>
      <!-- End Sort Dropdown -->

      <!-- Filter Button -->
      <button type="button" @click="$dispatch('open-filter-modal')" class="py-2 px-2.5 inline-flex items-center justify-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
        Filter
        <span class="font-medium text-[10px] py-0.5 px-2 bg-gray-900 dark:bg-white text-white dark:text-neutral-800 leading-3 rounded-full" x-show="(filters?.availability?.length || 0) + (filters?.formats?.length || 0) + (filters?.reading_type ? 1 : 0) + (filters?.authors?.length || 0) + (filters?.publishers?.length || 0) + (filters?.languages?.length || 0) > 0" x-text="(filters?.availability?.length || 0) + (filters?.formats?.length || 0) + (filters?.reading_type ? 1 : 0) + (filters?.authors?.length || 0) + (filters?.publishers?.length || 0) + (filters?.languages?.length || 0)">
        </span>
      </button>
      <!-- End Filter Button -->
    </div>
    <!-- End Col -->
  </div>

  {% include "./filter_modal.html" %}
