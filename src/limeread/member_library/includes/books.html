<div class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 2xl:grid-cols-6 gap-x-3 lg:gap-x-5 gap-y-8">
  <!-- Card -->
  {% for book in member_library_books %}
                  <div class=" group relative">
                    <div class="relative">
                      
<a class="relative block rounded-xl overflow-hidden focus:outline-hidden" href="#">
  <img
    class="w-full h-72 object-cover object-center rounded-xl bg-gray-100 transition-transform duration-500 ease-in-out group-hover:scale-105 group-focus:scale-105 dark:bg-neutral-800"
    src="{{ book.cover }}"
    alt="Cover of {{ book.title }}"
  >
</a>


                    </div>

                    <a class="after:z-1 after:absolute after:inset-0" href="../../../templates/ecommerce/storefront/product-detail.html"></a>

                    <div class="pt-3">
                      <h2 class="font-medium text-sm text-gray-800 group-hover:text-primary-600 dark:text-neutral-200 dark:group-hover:text-primary-500 transition-colors">
                        {{ book.title }}
                      </h2>
<div>
        <ul class="mt-1">
          <div class="text-sm">
            <span class="font-medium text-gray-500 hover:cursor-pointer">{{ book.author }}</span>

            <span class="font-medium text-gray-500">·</span>
            <!-- space -->
            <span class="font-medium text-gray-500 hover:cursor-pointer">{{ book.subject }}</span>
          </div>
        </ul>
      </div>
                    </div>
                  </div>
  {% endfor %}
</div>
