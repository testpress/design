<!-- filter_modal.html -->
<div x-data="{ showFilterModal: false, filters: { availability: [], formats: [], reading_type: '', authors: [], publishers: [], languages: [] } }" @open-filter-modal.window="showFilterModal = true">
  <!-- Backdrop -->
  <div x-cloak x-show="showFilterModal" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-[70] bg-neutral-900/50 backdrop-blur-sm" style="display: none;"
    @click="showFilterModal = false">
  </div>
  <!-- End Backdrop -->

  <!-- Filter Sidebar -->
  <div x-cloak x-show="showFilterModal" x-transition:enter="transition ease-out duration-300 transform"
    x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
    x-transition:leave="transition ease-in duration-300 transform" x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="fixed top-0 end-0 size-full sm:w-[400px] z-[80] flex flex-col bg-white dark:bg-neutral-800 shadow-xl"
    style="display: none;" @click.away="showFilterModal = false" @keydown.window.escape="showFilterModal = false" role="dialog" tabindex="-1"
    aria-labelledby="library-filter-label">
    
    <!-- Header -->
    <div class="py-3 px-6 flex justify-between items-center border-b dark:border-neutral-700">
      <h3 id="library-filter-label" class="font-medium text-gray-800 dark:text-neutral-200">
        Filters
      </h3>
      <button type="button" @click="showFilterModal = false"
        class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-gray-200 text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-200 dark:focus:bg-neutral-700">
        <i class="shrink-0 size-4" data-lucide="x"></i>
      </button>
    </div>
    <!-- End Header -->

    <!-- Body -->
    <div class="flex-1 overflow-y-auto bg-gray-50 dark:bg-neutral-900/50 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
         @scroll="window.dispatchEvent(new CustomEvent('sidebar-scroll'))">
      <div class="p-4 space-y-4">
        
        <!-- Availability -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700">
          <div class="mb-3">
            <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
              Availability
            </h5>
          </div>
          <div class="flex flex-wrap gap-2">
            {% for a in ['Available Now', 'Borrowed', 'Waitlisted', 'Restricted', 'Unavailable'] %}
            <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
              has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
              dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
              transition-all duration-200">
              <input type="checkbox" class="hidden peer" value="{{ a }}" x-model="filters.availability">
              <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
                <i class="shrink-0 size-2.5" data-lucide="check"></i>
              </span>
              <span class="block">{{ a }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

        <!-- Format -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700">
          <div class="mb-3">
            <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
              Format
            </h5>
          </div>
          <div class="flex flex-wrap gap-2">
            {% for f in ['EPUB', 'PDF'] %}
            <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
              has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
              dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
              transition-all duration-200">
              <input type="checkbox" class="hidden peer" value="{{ f }}" x-model="filters.formats">
              <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
                <i class="shrink-0 size-2.5" data-lucide="check"></i>
              </span>
              <span class="block">{{ f }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

        <!-- Reading Type -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700"
             x-data="{ 
               open: false, 
               position: 'bottom',
               options: [
                 { id: 'trending', name: 'Trending' },
                 { id: 'recently-added', name: 'Recently Added' },
                 { id: 'most-borrowed', name: 'Most Borrowed' },
                 { id: 'recommended', name: 'Recommended' }
               ],
               toggle() {
                 this.open = !this.open;
                 if (this.open) {
                   this.$nextTick(() => {
                     const trigger = this.$refs.trigger;
                     const rect = trigger.getBoundingClientRect();
                     const spaceBelow = window.innerHeight - rect.bottom;
                     this.position = spaceBelow < 280 ? 'top' : 'bottom';
                   });
                 }
               }
             }">
          <div class="mb-3">
            <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
              Reading Type
            </h5>
          </div>
          <div class="relative">
            <!-- Trigger -->
            <button x-ref="trigger" type="button" @click="toggle()" 
                    class="relative py-3 ps-4 pe-9 flex items-center text-nowrap w-full cursor-pointer bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white rounded-lg text-start text-sm hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-none focus:bg-gray-50 dark:focus:bg-neutral-700">
              <span x-text="options.find(o => o.id === filters.reading_type)?.name || 'Select reading type'"></span>
              <div class="absolute top-1/2 end-3 -translate-y-1/2">
                <i class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" data-lucide="chevrons-up-down"></i>
              </div>
            </button>

            <!-- Dropdown -->
            <div x-show="open" @click.away="open = false" x-cloak x-transition
                 :class="position === 'bottom' ? 'top-full mt-2' : 'bottom-full mb-2'"
                 class="absolute z-50 w-full max-h-72 p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg shadow-xl overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
              
              <template x-for="option in options" :key="option.id">
                <div @click="filters.reading_type = option.id; open = false"
                     class="py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg flex justify-between items-center"
                     :class="filters.reading_type === option.id ? 'bg-gray-100 dark:bg-neutral-800' : ''">
                  <span x-text="option.name"></span>
                  <template x-if="filters.reading_type === option.id">
                    <svg class="shrink-0 size-3.5 text-primary-600 dark:text-primary-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- Author -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700"
             x-data="{ 
               open: false, 
               search: '', 
               position: 'bottom',
               options: [
                 { id: 'james-clear', name: 'James Clear' },
                 { id: 'robert-greene', name: 'Robert Greene' },
                 { id: 'morgan-housel', name: 'Morgan Housel' }
               ],
               toggle() {
                 this.open = !this.open;
                 if (this.open) {
                   this.$nextTick(() => {
                     const trigger = this.$refs.trigger;
                     const rect = trigger.getBoundingClientRect();
                     const spaceBelow = window.innerHeight - rect.bottom;
                     this.position = spaceBelow < 280 ? 'top' : 'bottom';
                   });
                 }
               },
               get filteredOptions() {
                 return this.options.filter(o => o.name.toLowerCase().includes(this.search.toLowerCase()))
               }
             }">
          <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
            Author
          </label>
          
          <div class="relative">
            <!-- Selected Tags / Trigger -->
            <div x-ref="trigger" @click="toggle()" 
                 class="relative ps-0.5 pe-9 min-h-11 flex items-center flex-wrap w-full bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 hover:bg-gray-50 dark:hover:bg-neutral-700 rounded-lg text-start text-sm cursor-pointer">
              
              <template x-if="filters.authors.length === 0">
                <span class="p-2 text-gray-400">Search author...</span>
              </template>

              <template x-for="id in filters.authors" :key="id">
                <div class="flex flex-nowrap items-center text-nowrap relative z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-full p-1 m-1">
                  <div class="whitespace-nowrap capitalize text-gray-800 dark:text-neutral-200 ps-1 text-xs" x-text="options.find(o => o.id === id)?.name"></div>
                  <div @click.stop="filters.authors = filters.authors.filter(i => i !== id)" 
                       class="inline-flex shrink-0 justify-center items-center size-4 ms-2 rounded-full bg-gray-100 dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-600 focus:outline-none text-xs cursor-pointer">
                    <svg class="shrink-0 size-2.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                  </div>
                </div>
              </template>

              <div class="absolute top-1/2 end-3 -translate-y-1/2">
                <i class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" data-lucide="chevrons-up-down"></i>
              </div>
            </div>

            <!-- Dropdown -->
            <div x-show="open" @click.away="open = false" x-cloak x-transition
                 :class="position === 'bottom' ? 'top-full mt-2' : 'bottom-full mb-2'"
                 class="absolute z-50 w-full max-h-72 p-1 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg shadow-xl overflow-hidden flex flex-col">
              
              <!-- Search Input -->
              <div class="p-2 -mx-1 sticky top-0 bg-white dark:bg-neutral-900">
                <input type="text" x-model="search" placeholder="Search..." 
                       class="block w-full sm:text-sm bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-700 rounded-lg text-gray-800 dark:text-neutral-200 placeholder:text-gray-400 focus:border-primary-500 focus:ring-primary-500 py-1.5 sm:py-2 px-3">
              </div>

              <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
                <template x-for="option in filteredOptions" :key="option.id">
                  <div @click="if(filters.authors.includes(option.id)) { filters.authors = filters.authors.filter(i => i !== option.id) } else { filters.authors.push(option.id) }"
                       class="py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg flex items-center justify-between">
                    <span x-text="option.name"></span>
                    <template x-if="filters.authors.includes(option.id)">
                      <svg class="shrink-0 size-4 text-primary-600 dark:text-primary-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </template>
                  </div>
                </template>
                <template x-if="filteredOptions.length === 0">
                  <div class="py-2 px-4 text-sm text-gray-500 italic">No results found</div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Publisher -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700"
             x-data="{ 
               open: false, 
               search: '', 
               position: 'bottom',
               options: [
                 { id: 'penguin', name: 'Penguin' },
                 { id: 'harpercollins', name: 'HarperCollins' },
                 { id: 'simon-schuster', name: 'Simon & Schuster' }
               ],
               toggle() {
                 this.open = !this.open;
                 if (this.open) {
                   this.$nextTick(() => {
                     const trigger = this.$refs.trigger;
                     const rect = trigger.getBoundingClientRect();
                     const spaceBelow = window.innerHeight - rect.bottom;
                     this.position = spaceBelow < 280 ? 'top' : 'bottom';
                   });
                 }
               },
               get filteredOptions() {
                 return this.options.filter(o => o.name.toLowerCase().includes(this.search.toLowerCase()))
               }
             }">
          <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
            Publisher
          </label>
          
          <div class="relative">
            <!-- Selected Tags / Trigger -->
            <div x-ref="trigger" @click="toggle()" 
                 class="relative ps-0.5 pe-9 min-h-11 flex items-center flex-wrap w-full bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 hover:bg-gray-50 dark:hover:bg-neutral-700 rounded-lg text-start text-sm cursor-pointer">
              
              <template x-if="filters.publishers.length === 0">
                <span class="p-2 text-gray-400">Search publisher...</span>
              </template>

              <template x-for="id in filters.publishers" :key="id">
                <div class="flex flex-nowrap items-center text-nowrap relative z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-full p-1 m-1">
                  <div class="whitespace-nowrap capitalize text-gray-800 dark:text-neutral-200 ps-1 text-xs" x-text="options.find(o => o.id === id)?.name"></div>
                  <div @click.stop="filters.publishers = filters.publishers.filter(i => i !== id)" 
                       class="inline-flex shrink-0 justify-center items-center size-4 ms-2 rounded-full bg-gray-100 dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-600 focus:outline-none text-xs cursor-pointer">
                    <svg class="shrink-0 size-2.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                  </div>
                </div>
              </template>

              <div class="absolute top-1/2 end-3 -translate-y-1/2">
                <i class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" data-lucide="chevrons-up-down"></i>
              </div>
            </div>

            <!-- Dropdown -->
            <div x-show="open" @click.away="open = false" x-cloak x-transition
                 :class="position === 'bottom' ? 'top-full mt-2' : 'bottom-full mb-2'"
                 class="absolute z-50 w-full max-h-72 p-1 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg shadow-xl overflow-hidden flex flex-col">
              
              <!-- Search Input -->
              <div class="p-2 -mx-1 sticky top-0 bg-white dark:bg-neutral-900">
                <input type="text" x-model="search" placeholder="Search..." 
                       class="block w-full sm:text-sm bg-white dark:bg-neutral-900 border-gray-200 dark:border-neutral-700 rounded-lg text-gray-800 dark:text-neutral-200 placeholder:text-gray-400 focus:border-primary-500 focus:ring-primary-500 py-1.5 sm:py-2 px-3">
              </div>

              <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
                <template x-for="option in filteredOptions" :key="option.id">
                  <div @click="if(filters.publishers.includes(option.id)) { filters.publishers = filters.publishers.filter(i => i !== option.id) } else { filters.publishers.push(option.id) }"
                       class="py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg flex items-center justify-between">
                    <span x-text="option.name"></span>
                    <template x-if="filters.publishers.includes(option.id)">
                      <svg class="shrink-0 size-4 text-primary-600 dark:text-primary-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </template>
                  </div>
                </template>
                <template x-if="filteredOptions.length === 0">
                  <div class="py-2 px-4 text-sm text-gray-500 italic">No results found</div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Language -->
        <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700">
          <div class="mb-3">
            <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
              Language
            </h5>
          </div>
          <div class="flex flex-wrap gap-2">
            {% for l in ['English', 'Tamil', 'Hindi'] %}
            <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
              has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
              dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
              transition-all duration-200">
              <input type="checkbox" class="hidden peer" value="{{ l }}" x-model="filters.languages">
              <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
                <i class="shrink-0 size-2.5" data-lucide="check"></i>
              </span>
              <span class="block">{{ l }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

      </div>
    </div>
    <!-- End Body -->

    <!-- Footer -->
    <div class="p-4 border-t dark:border-neutral-700 bg-white dark:bg-neutral-800">
      <div class="flex gap-x-2">
        <button type="button" @click="filters.availability = []; filters.formats = []; filters.reading_type = ''; filters.authors = []; filters.publishers = []; filters.languages = []; showFilterModal = false"
          class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300">
          Clear All
        </button>
        <button type="button" @click="showFilterModal = false"
          class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700">
          Apply Filters
        </button>
      </div>
    </div>
    <!-- End Footer -->
  </div>
</div>
