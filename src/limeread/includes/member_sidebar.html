<!-- Sidebar Backdrop -->
<div x-show="mobileMenuOpen" 
     @click="mobileMenuOpen = false"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-neutral-900/50 backdrop-blur-sm z-50 lg:hidden"
     style="display: none;"></div>

<aside id="hs-pro-sidebar" 
  :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'"
  class="w-65 h-full fixed inset-y-0 start-0 z-60 bg-sidebar border-e border-sidebar-line transition-all duration-300 transform lg:translate-x-0" 
  tabindex="-1" aria-label="Sidebar">
  <div class="relative flex flex-col h-full max-h-full pt-3">
    <header class="px-2 lg:px-5 flex items-center gap-x-1">
      <!-- Logo -->
        <div class="flex flex-wrap justify-between items-center gap-2">
            <img class="h-14 w-auto  dark:hidden  " :src="previewPath + '/img/lime_read/lite_theme_logo.png'" alt="LimeRead">
            <img :src="previewPath + '/img/lime_read/dark_theme_logo.png'" alt="LimeRead" class="h-14 w-auto hidden dark:block ">
        </div>
      <!-- End Logo -->

      <div class="lg:hidden ms-auto">
        <!-- Sidebar Close -->
        <button type="button" class="w-6 h-7 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-md bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus" @click="mobileMenuOpen = false">
          <i class="shrink-0 size-4" data-lucide="panel-left-close"></i>
        </button>
        <!-- End Sidebar Close -->
      </div>
      <div class="hidden lg:block ms-2">

      </div>
    </header>

    <!-- Content -->
    <div class="mt-1.5 h-full overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">
      <!-- Nav -->
      <nav class="pb-3 w-full flex flex-col flex-wrap">
        <ul class="flex flex-col gap-y-1">
          <li class="px-2 lg:px-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_dashboard/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_dashboard/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="house"></i>
              Home
            </a>
          </li>

          <li class="px-2 lg:px-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_browse/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_browse/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="library-big"></i>
              Browse
            </a>
          </li>

          <li class="px-2 lg:px-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_books/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_books/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="book-open"></i>
              My Books
            </a>
          </li>

          <li class="px-2 lg:px-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_waitlist/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_waitlist/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="clock-3"></i>
              Waitlist
            </a>
          </li>

          <li class="px-2 lg:px-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_history/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_history/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="history"></i>
              Reading History
            </a>
          </li>

          <li class="px-2 lg:px-5 pb-5">
            <a class="flex gap-x-3 py-2 px-3 text-sm text-sidebar-nav-foreground rounded-lg hover:bg-sidebar-nav-hover focus:outline-hidden focus:bg-sidebar-nav-focus" 
               :class="currentPath.includes('/member_notifications/') ? 'bg-sidebar-nav-active' : ''" 
               :href="previewPath + '/limeread/member_notifications/'"
               @click="mobileMenuOpen = false">
              <i class="shrink-0 mt-0.5 size-4" data-lucide="bell"></i>
              Notifications
            </a>
          </li>
        </ul>
      </nav>
      <!-- End Nav -->
    </div>
    <!-- End Content -->


  </div>
</aside>
