<div class="min-w-full inline-block align-middle divide-y divide-gray-100 dark:divide-neutral-700">
  {% for book in member_bookmarks.bookmarked_books %}
  <a href="{{ previewPath }}/limeread/member_ebook_detail/?status=bookmarked" class="group block p-4 bg-card hover:bg-layer-hover transition-colors focus:outline-none">
    <div class="flex items-center justify-between gap-x-6">
      
      <!-- Left side (Cover, Title, Course, Subject) -->
      <div class="flex min-w-0 gap-x-4 items-center">
        <!-- Cover -->
        <div class="shrink-0">
          <img src="{{ book.cover_image }}" alt="Cover of {{ book.title }}" class="w-12 h-16 object-cover rounded border border-layer-line shadow-sm bg-gray-50 dark:bg-neutral-800 text-transparent">
        </div>

        <!-- Title & Metadata -->
        <div class="min-w-0 flex-auto">
          <p class="text-sm/6 font-medium text-foreground truncate">
            {{ book.title }}
          </p>
          <p class="mt-1 flex text-xs/5 text-muted-foreground-1 truncate">
            {{ book.course }} &middot; {{ book.subject }}
          </p>
        </div>
      </div>

      <!-- Right Side (Bookmarks & Arrow) -->
      <div class="flex shrink-0 items-center gap-x-4">
        <!-- Bookmark stats (visible on all screens as requested) -->
        <div class="flex flex-col items-end">
          <p class="text-sm/6 text-foreground"><span class="font-medium">{{ book.bookmarks_count }}</span> bookmarks</p>
          <p class="mt-1 text-xs/5 text-muted-foreground-1">Last bookmarked <time datetime="{{ book.last_bookmarked_at }}">{{ book.last_bookmarked_at | formatDate }}</time></p>
        </div>
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="size-5 flex-none text-muted-foreground-1">
          <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd" />
        </svg>
      </div>

    </div>
  </a>
  {% endfor %}
</div>
