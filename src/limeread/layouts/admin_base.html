{% extends "../base.html" %}

{% block body %}
<div
  x-data="{ open: true, openMobile: false }"
  style="--sidebar-width: 16rem; --sidebar-width-icon: 3rem;"
  class="flex min-h-screen w-full bg-background text-foreground"
>
  <!-- 
    Developer Note:
    The layout uses admin_sidebar.html as the primary navigation component.
    Reference: https://ui.shadcn.com/docs/components/base/sidebar
  -->
  <!-- Sidebar -->
  {% include "./includes/admin_sidebar.html" %}

  <!-- Main Content container -->
  <div class="flex-1 flex flex-col min-w-0 transition-all duration-200">
    <header
      class="flex shrink-0 items-center gap-2 transition-[height] duration-200 ease-linear"
      :class="open ? 'h-16' : 'h-12'"
    >
      <div class="flex items-center gap-2 px-4">
        <!-- Sidebar Toggle Button -->
        <button
          @click="open = !open; openMobile = !openMobile"
          type="button"
          data-slot="sidebar-trigger"
          data-variant="ghost"
          data-size="icon-sm"
          class="group/button inline-flex shrink-0 items-center justify-center border border-transparent bg-clip-padding text-sm font-medium whitespace-nowrap transition-all outline-none select-none focus-visible:border-ring focus-visible:ring-3 focus-visible:ring-ring/50 active:not-aria-[haspopup]:translate-y-px disabled:pointer-events-none disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-3 aria-invalid:ring-destructive/20 dark:aria-invalid:border-destructive/50 dark:aria-invalid:ring-destructive/40 [&_svg]:pointer-events-none [&_svg]:shrink-0 [&_svg:not([class*='size-'])]:size-4 hover:bg-muted hover:text-foreground aria-expanded:bg-muted aria-expanded:text-foreground dark:hover:bg-muted/50 size-7 rounded-[min(var(--radius-md),12px)] in-data-[slot=button-group]:rounded-lg -ml-1"
          data-sidebar="trigger"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-left cn-rtl-flip"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M9 3v18"/></svg>
          <span class="sr-only">Toggle Sidebar</span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-6 overflow-auto">
      {% block content %}
      {% endblock content %}
    </main>
  </div>
</div>

{% block extra_scripts %}
{% endblock %}

{% endblock body %}
