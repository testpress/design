<div class="space-y-3 break-inside-avoid">
  <div class="flex flex-wrap justify-between items-center gap-2">
    <div>
      <h1 class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Difficulty-wise Report</h1>
    </div>
  </div>

<!-- Table -->
<div class="min-w-full">
  <div class="border border-gray-200 dark:border-neutral-700 rounded-lg overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
      <thead class="bg-gray-50 dark:bg-neutral-800">
        <tr>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Difficulty Level</th>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Cor</th>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Inc</th>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Unans</th>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Accuracy</th>
          <th scope="col" class="px-6 py-3 text-start text-sm font-medium text-gray-500 dark:text-neutral-400">Time Spent</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
        {% for item in report.difficulty_report %}
        <tr>
          <td class="px-6 py-3 text-sm font-medium text-gray-800 dark:text-neutral-200">{{ item.level }}</td>
          <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">{{ item.correct }}</td>
          <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">{{ item.incorrect }}</td>
          <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">{{ item.unanswered }}</td>
          <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">{{ item.accuracy }}</td>
          <td class="px-6 py-3 whitespace-nowrap text-sm text-gray-800 dark:text-neutral-200">{{ item.time }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
<!-- End Table -->

</div>
