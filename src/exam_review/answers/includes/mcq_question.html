<div class="p-4 sm:px-6">
  <p class="font-medium text-gray-800 dark:text-neutral-300" x-text="currentQuestion.question">
  </p>
  <div>
    <fieldset aria-label="Options" class="space-y-4">
      <template x-for="(option, index) in currentQuestion.options" :key="index">
        <div class="flex items-center  text-gray-600 dark:text-neutral-300">
          <div class="flex shrink-0 justify-center items-center size-7 border border-gray-200 rounded-full uppercase dark:border-neutral-700"
            :class="{
              'bg-emerald-400 text-white dark:bg-emerald-600 dark:text-neutral-200': currentQuestion && (currentQuestion.selectedIndex || []).includes(index) && (currentQuestion.correctIndex || []).includes(index),
              'bg-red-400 text-white dark:bg-red-600 dark:text-neutral-200': currentQuestion && (currentQuestion.selectedIndex || []).includes(index) && !(currentQuestion.correctIndex || []).includes(index),
              'bg-white text-gray-900 border-gray-300 dark:bg-neutral-600 dark:text-neutral-200': currentQuestion && !(currentQuestion.selectedIndex || []).includes(index)
            }" x-text="String.fromCharCode(97 + index)">
          </div>
          <span class="ml-3" x-text="option"></span>
        </div>
      </template>
    </fieldset>
  </div>
</div>
{% include "./question_stats.html" %}
<div class="border-t border-gray-200 dark:border-neutral-700">
  <div class="p-4 sm:px-6">
    <div>
      <button x-cloak x-show="!currentQuestion.show_solution && !showAllSolutions"
        @click="currentQuestion.show_solution=true"
        class="inline-flex items-center gap-x-1  text-emerald-600 hover:text-emerald-700 decoration-2 underline font-medium focus:outline-hidden focus:underline dark:text-emerald-400 dark:hover:text-emerald-500">
        View Solution
      </button>
    </div>
    <div class="gap-x-1.5 dark:text-neutral-300 dark:bg-neutral-800" x-cloak x-show="currentQuestion.show_solution || showAllSolutions">

      <div class="text-gray-800 dark:text-neutral-300">
        <p class="flex items-center mt-1  text-gray-600 dark:text-neutral-300">The correct answer is <span
            class="ml-1  font-medium text-gray-700 dark:text-neutral-400"
            x-html="(currentQuestion?.correctIndex || []).map(i => `(${String.fromCharCode(65 + i)}) ${(currentQuestion?.options?.[i] || '')}`).join(', ')"></span>
        </p>
      </div>
      <div class="mt-3" x-cloak x-show="currentQuestion.explanation">
        <p class=" font-medium text-gray-700 dark:text-neutral-400">Explanation</p>
        <p class="flex items-center mt-2  text-gray-600 dark:text-neutral-300" x-text="currentQuestion.explanation"></p>
      </div>
    </div>
  </div>
</div>
