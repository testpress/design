<header class=" sticky top-0 flex flex-wrap  md:justify-start md:flex-nowrap z-50 w-full bg-white border-b border-gray-200 dark:bg-neutral-900 dark:border-neutral-700">
  <div class="relative w-full mx-auto flex items-center justify-between gap-3 py-2 px-4 sm:px-6">

    <div>
      <h2 class="inline-block font-semibold text-stone-800 dark:text-neutral-200" x-text="exam.name">
        Customer
      </h2>
    </div>

    <div class="xl:col-span-2 flex justify-end items-center gap-x-2">
        <div class="hs-dropdown [--placement:bottom-right] relative inline-flex" 
          x-data="{ 
              currentTheme: localStorage.getItem('hs_theme') || 'default',
              systemDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
              
              init() {
                  this.apply(this.currentTheme);
                  // Watch for OS changes
                  const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                  const systemThemeListener = e => {
                      this.systemDark = e.matches;
                      if (this.currentTheme === 'default') this.apply('default');
                  };
                  mediaQuery.addEventListener('change', systemThemeListener);
                  this.$el.addEventListener('alpine:destroy', () => {
                      mediaQuery.removeEventListener('change', systemThemeListener);
                  });
              },
              
              apply(theme) {
                  this.currentTheme = theme;
                  localStorage.setItem('hs_theme', theme);
                  
                  const isDark = theme === 'dark' || (theme === 'default' && this.systemDark);
                  if (isDark) {
                      document.documentElement.classList.add('dark');
                  } else {
                      document.documentElement.classList.remove('dark');
                  }
              }
          }">
          
        <button id="hs-pro-theme-dropdown" type="button" class="hs-dropdown-toggle inline-flex items-center justify-center rounded-full p-2 text-gray-600 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-700">
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
        </button>

        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 start-2.5 w-48 transition-[opacity,margin] duration opacity-0 hidden z-50 bg-white rounded-xl shadow-xl dark:bg-neutral-900 border border-gray-200 dark:border-neutral-800" role="menu">
          <div class="p-1 space-y-0.5">
            <template x-for="theme in [{name: 'default', label: 'System Default'}, {name: 'light', label: 'Light'}, {name: 'dark', label: 'Dark'}]" :key="theme.name">
                <button type="button" 
                        @click="apply(theme.name)"
                        :class="currentTheme === theme.name ? 'bg-gray-100 dark:bg-neutral-800' : ''"
                        class="w-full flex items-center justify-between py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 focus:outline-hidden dark:text-neutral-300 dark:hover:bg-neutral-800">
                  <span class="flex items-center gap-x-3" x-text="theme.label"></span>
                  <svg x-show="currentTheme === theme.name" class="shrink-0 size-3.5 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                </button>
              </template>
          </div>
        </div>
      </div>

    <div class="md:order-3 flex justify-end items-center gap-x-2 md:hidden">
      {% include "./filter.html" %}
      <div class="hs-dropdown  [--placement:bottom-left] relative inline-flex">
        <div class="hs-tooltip [--placement:bottom] inline-block">
          <button type="button" id="choose_question" class="relative flex justify-center items-center text-sm font-semibold rounded-lg border border-transparent text-gray-800 hover:bg-gray-100 focus:outline-hidden focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 dark:hover:bg-neutral-700" aria-haspopup="dialog" aria-expanded="false" aria-controls="hs-header-base-offcanvas" aria-label="Toggle navigation" data-hs-overlay="#hs-header-base-offcanvas">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="shrink-0 size-4">
              <path fill-rule="evenodd" d="M3 6.75A.75.75 0 0 1 3.75 6h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 6.75ZM3 12a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 12Zm0 5.25a.75.75 0 0 1 .75-.75h16.5a.75.75 0 0 1 0 1.5H3.75a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-full sm:w-96 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white border border-gray-200  sm:rounded-lg shadow-md sm:shadow-xl dark:bg-neutral-900 dark:border-neutral-700" role="menu" aria-orientation="vertical" aria-labelledby="choose_question">
  
          <div  role="tabpanel" aria-labelledby="hs-pro-tabs-dnn-item-all">
          <div>
            {% include "./choose_question.html" %}
            <div class="p-3 flex flex-wrap items-center gap-4 text-sm text-gray-500 dark:text-neutral-400">
              <div class="flex items-center gap-1">
                <span class="w-3 h-3 inline-block rounded-full bg-emerald-400 dark:bg-emerald-500/20"></span>
                Correct
              </div>
              <div class="flex items-center gap-1">
                <span class="w-3 h-3 inline-block rounded-full bg-red-400 dark:bg-red-500/20"></span>
                Incorrect
              </div>
              <div class="flex items-center gap-1">
                <span class="w-3 h-3 inline-block rounded-full bg-gray-200 dark:bg-neutral-800"></span>
                Unanswered
              </div>
              <div class="flex items-center gap-1">
                <span class="w-3 h-3 inline-block rounded-full bg-yellow-400 dark:bg-yellow-500/20"></span>
                Pending Evaluation
              </div>
            </div>
          </div>
          </div>
        </div>
        
      </div>
    </div>

  </div>
</header>
<!-- ========== END HEADER ========== -->
