<div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
        {{ label }}
    </label>
    <div id="{{ container_id }}" role="tabpanel" aria-labelledby="hs-pro-tabs-fwb-item-open">
        <div class="mt-2 cursor-pointer p-12 flex justify-center bg-white border border-dashed border-gray-300 rounded-xl dz-message">
            <div class="text-center dz-message">
                <span class="inline-flex justify-center items-center size-16 bg-gray-100 text-gray-800 rounded-full">
                    <svg class="shrink-0 size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" x2="12" y1="3" y2="15"></line>
                    </svg>
                </span>
                <div class="mt-4 flex flex-wrap justify-center text-sm leading-6 text-gray-600">
                    <span class="pe-1 font-medium text-gray-800">
                        Drop your file here or
                    </span>
                    <span class="bg-white font-semibold text-emerald-600 hover:text-emerald-700 rounded-lg decoration-2 hover:underline focus-within:outline-none focus-within:ring-2 focus-within:ring-emerald-600 focus-within:ring-offset-2">
                        browse
                    </span>
                </div>
                <p class="mt-1 text-xs text-gray-400">
                    Only {{ accepted_files }} files accepted
                </p>
            </div>
            <template id="{{ preview_template_id }}">
                <div class="group dz-preview dz-file-preview">    
                    <div class="p-3 bg-white border border-solid border-gray-300 rounded-xl">
                        <div class="w-full flex items-center gap-x-3">
                            <svg class="size-5 shrink-0 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" data-slot="icon">
                                <path fill-rule="evenodd" d="M15.621 4.379a3 3 0 0 0-4.242 0l-7 7a3 3 0 0 0 4.241 4.243h.001l.497-.5a.75.75 0 0 1 1.064 1.057l-.498.501-.002.002a4.5 4.5 0 0 1-6.364-6.364l7-7a4.5 4.5 0 0 1 6.368 6.36l-3.455 3.553A2.625 2.625 0 1 1 9.52 9.52l3.45-3.451a.75.75 0 1 1 1.061 1.06l-3.45 3.451a1.125 1.125 0 0 0 1.587 1.595l3.454-3.553a3 3 0 0 0 0-4.242Z" clip-rule="evenodd"></path>
                            </svg>
                            <div class="grow">
                                <span class="block text-sm font-medium text-gray-800 dark:text-neutral-300">             
                                    <span data-dz-name></span>
                                    <span class="shrink-0 text-gray-400" data-dz-size></span>
                                </span>
                                <div class="dz-error-message"><span class="text-xs text-red-500" data-dz-errormessage></span></div>
                                <p class="text-xs text-red-500 hidden" data-hs-file-upload-file-error>File exceeds size limit.</p>
                            </div>

                            <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-right] relative inline-flex hidden existing-file-actions">
                                <button type="button" class="size-7 inline-flex justify-center items-center gap-x-2 rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
                                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                                </button>

                                <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-auto transition-[opacity,margin] duration opacity-0 z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900 hidden" role="menu" aria-orientation="vertical">
                                    <div class="p-1">
                                        <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800 update-view">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>                      
                                            <span data-button-label></span>
                                        </button>
                                        <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800" data-dz-remove>
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>                     
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <button type="button" class="text-gray-500 hover:text-gray-800 focus:outline-none focus:text-gray-800 uploading-file-actions" data-dz-remove>
                                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                    <line x1="10" x2="10" y1="11" y2="17"></line>
                                    <line x1="14" x2="14" y1="11" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="upload-progress flex items-center gap-x-3 whitespace-nowrap mt-3">
                            <div class="flex w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                                <div
                                    id="progress-bar"
                                    class="flex flex-col justify-center rounded-full overflow-hidden bg-emerald-600 text-xs text-white text-center whitespace-nowrap transition-all duration-500 hs-file-upload-complete:bg-emerald-500"
                                    style="width: 0%;"
                                >
                                </div>
                            </div>
                            <div class="w-10 text-end">
                                <span class="text-sm text-gray-800"> <span class="progress-text"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <div class="file-preview-container dropzone-previews mt-4 space-y-3"></div>
    </div>
</div>
