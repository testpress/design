{% macro toast_provider() %}
<div x-data="{
        toasts: [],
        addToast(options) {
            const id = Date.now() + Math.random().toString(36).substring(2, 9);
            const toast = {
                id,
                title: options.title || '',
                description: options.description || '',
                variant: options.variant || 'neutral',
                position: options.position || 'bottom-right',
                size: options.size || 'default',
                duration: options.duration || 5000,
                closable: options.closable !== undefined ? options.closable : true,
                icon: options.icon !== undefined ? options.icon : null,
                actionLabel: options.actionLabel || '',
                actionHandler: typeof options.actionHandler === 'function' ? options.actionHandler : () => {},
                showProgress: options.showProgress || false,
                autoDismiss: options.autoDismiss !== undefined ? options.autoDismiss : true,
                visible: true,
                progress: 100,
                interval: null,
                remaining: options.duration || 5000
            };
            this.toasts.push(toast);
            this.$nextTick(() => { if (window.lucide) window.lucide.createIcons(); });
            if (toast.autoDismiss) { this.startTimer(toast); }
        },
        startTimer(toast) {
            const step = 20;
            toast.interval = setInterval(() => {
                toast.remaining -= step;
                toast.progress = (toast.remaining / toast.duration) * 100;
                if (toast.remaining <= 0) {
                    this.removeToast(toast.id);
                }
            }, step);
        },
        pauseToast(toast) {
            if (toast.interval) clearInterval(toast.interval);
        },
        resumeToast(toast) {
            if (toast.autoDismiss && toast.remaining > 0) this.startTimer(toast);
        },
        removeToast(id) {
            const toast = this.toasts.find(t => t.id === id);
            if (toast) {
                toast.visible = false;
                if (toast.interval) clearInterval(toast.interval);
                setTimeout(() => {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                }, 300);
            }
        },
        getDefaultIcon(variant) {
            switch(variant) {
                case 'success': return 'check-circle';
                case 'error': return 'x-circle';
                case 'warning': return 'alert-triangle';
                case 'info': return 'info';
                default: return 'bell';
            }
        },
        getIconColor(variant) {
            switch(variant) {
                case 'success': return 'text-green-500 dark:text-green-400';
                case 'error': return 'text-red-500 dark:text-red-400';
                case 'warning': return 'text-orange-500 dark:text-orange-400';
                case 'info': return 'text-blue-500 dark:text-blue-400';
                default: return 'text-gray-400 dark:text-neutral-500';
            }
        },
        getProgressBarColor(variant) {
            switch(variant) {
                case 'success': return 'bg-green-500 dark:bg-green-400';
                case 'error': return 'bg-red-500 dark:bg-red-400';
                case 'warning': return 'bg-orange-500 dark:bg-orange-400';
                case 'info': return 'bg-blue-500 dark:bg-blue-400';
                default: return 'bg-gray-800 dark:bg-neutral-200';
            }
        }
    }"
    @toast.window="addToast($event.detail)"
    class="pointer-events-none fixed inset-0 z-[9999] flex flex-col px-4 py-6 sm:p-6"
    aria-live="assertive">

    <template x-for="pos in ['top-left', 'top-center', 'top-right', 'bottom-left', 'bottom-center', 'bottom-right']" :key="pos">
        <div :class="{
                'top-0 left-0': pos === 'top-left',
                'top-0 left-1/2 -translate-x-1/2': pos === 'top-center',
                'top-0 right-0': pos === 'top-right',
                'bottom-0 left-0 flex-col-reverse': pos === 'bottom-left',
                'bottom-0 left-1/2 -translate-x-1/2 flex-col-reverse': pos === 'bottom-center',
                'bottom-0 right-0 flex-col-reverse': pos === 'bottom-right'
             }"
             class="fixed flex flex-col gap-3 p-4 sm:p-6 w-full sm:w-96 max-w-sm pointer-events-none z-[100]">
             
             <template x-for="toast in toasts.filter(t => t.position === pos)" :key="toast.id">
                 <div x-show="toast.visible"
                      x-transition:enter="transition ease-out duration-300"
                      x-transition:enter-start="opacity-0 scale-95"
                      x-transition:enter-end="opacity-100 scale-100"
                      x-transition:leave="transition ease-in duration-200"
                      x-transition:leave-start="opacity-100 scale-100"
                      x-transition:leave-end="opacity-0 scale-95"
                      @mouseenter="pauseToast(toast)"
                      @mouseleave="resumeToast(toast)"
                      class="pointer-events-auto w-full rounded-lg bg-white dark:bg-neutral-800 shadow-lg border border-gray-200 dark:border-neutral-700 overflow-hidden relative transition-all duration-300">
                      
                      <div class="p-4" :class="{ 'p-3': toast.size === 'compact' }">
                           <div class="flex items-start">
                               <!-- Icon -->
                               <div class="shrink-0" x-show="toast.icon !== false">
                                  <template x-if="toast.icon">
                                     <i :data-lucide="toast.icon" class="size-5 mt-0.5" :class="getIconColor(toast.variant)"></i>
                                  </template>
                                  <template x-if="!toast.icon">
                                     <i :data-lucide="getDefaultIcon(toast.variant)" class="size-5 mt-0.5" :class="getIconColor(toast.variant)"></i>
                                  </template>
                               </div>

                               <div class="ml-3 w-0 flex-1">
                                   <p class="font-medium text-gray-900 dark:text-white" :class="toast.size === 'compact' ? 'text-xs' : 'text-sm'" x-text="toast.title" x-show="toast.title"></p>
                                   <p class="text-gray-500 dark:text-neutral-400" :class="[toast.size === 'compact' ? 'text-xs mt-0.5' : 'text-sm mt-1', !toast.title ? 'mt-0' : '']" x-text="toast.description" x-show="toast.description"></p>
                                   
                                   <!-- Action Button -->
                                   <div class="mt-3 flex gap-x-3" x-show="toast.actionLabel">
                                       <button type="button" @click="toast.actionHandler(); removeToast(toast.id)" class="rounded-md text-sm font-medium text-primary-600 hover:text-primary-500 focus:outline-hidden focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:text-primary-400 dark:hover:text-primary-300 dark:focus:ring-offset-neutral-800 dark:focus:ring-primary-500 bg-transparent transition-colors" x-text="toast.actionLabel"></button>
                                   </div>
                               </div>

                               <!-- Close Button -->
                               <div class="ml-4 flex shrink-0" x-show="toast.closable !== false">
                                    <button type="button" @click="removeToast(toast.id)" class="inline-flex rounded-md text-gray-400 hover:text-gray-500 focus:outline-hidden focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:hover:text-white dark:focus:ring-offset-neutral-800 dark:focus:ring-primary-500 transition-colors">
                                        <span class="sr-only">Close</span>
                                        <i data-lucide="x" class="size-4"></i>
                                    </button>
                               </div>
                           </div>
                      </div>

                      <!-- Progress Bar -->
                      <div class="absolute bottom-0 left-0 h-1 bg-gray-100 dark:bg-neutral-700 w-full" x-show="toast.showProgress && toast.autoDismiss">
                          <div class="h-full" :class="getProgressBarColor(toast.variant)" :style="`width: ${toast.progress}%`"></div>
                      </div>
                 </div>
             </template>
        </div>
    </template>
</div>
{% endmacro %}
