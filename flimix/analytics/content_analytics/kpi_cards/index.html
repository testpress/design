<div class="grid grid-cols-2 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-5">
  <!-- 1. Total Content Views -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400"
        xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10 8 16 12 10 16 10 8"/>
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">Total Content Views</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">
          1.2M
        </p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">
        vs previous period
      </span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +14%
      </span>
    </div>
  </div>

  <!-- 2. Unique Viewers -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">Unique Viewers</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">
          450k
        </p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">
        vs previous period
      </span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +8%
      </span>
    </div>
  </div>

  <!-- 3. Average Watch Time -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400"
        xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">Average Watch Time</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">
          45m
        </p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">
        vs previous period
      </span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +5%
      </span>
    </div>
  </div>

  <!-- 4. Completion Rate -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400"
        xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
          Completion Rate
        </h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200 flex items-baseline gap-x-1">
          <span>72%</span>
        </p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">
        watched ≥ 90%
      </span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          aria-hidden="true">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +2%
      </span>
    </div>
  </div>
</div>
