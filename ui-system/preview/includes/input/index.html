

<section>
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="text-cursor-input" class="w-5 h-5 text-gray-500"></i>
            <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Input</h2>
        </div>
    </div>
    
    <div class="space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Standard Input -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Standard</h3>
                
<div class="w-full">
  
    <label for="username" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Username
    </label>
  

  <div class="relative w-full">
    
    <input type="text" 
           id="username" 
           name="username"
           class="py-2 sm:py-2.5 px-3  block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none  "
           placeholder="Enter your username"
           
           
           
           
           
           >
  </div>
  
  
</div>

            </div>

            <!-- Required with Help Text -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Required + Help Text</h3>
                
<div class="w-full">
  
    <label for="email" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Email Address <span class="text-red-500">*</span>
    </label>
  

  <div class="relative w-full">
    
    <input type="email" 
           id="email" 
           name="email"
           class="py-2 sm:py-2.5 px-3  block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none  "
           placeholder=""
           
           required
           
           
           
           >
  </div>
  
  
    <p class="mt-1.5 text-xs text-gray-500 dark:text-neutral-400">We&#39;ll never share your email.</p>
  
</div>

            </div>

            <!-- Error State -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Error State</h3>
                
<div class="w-full">
  
    <label for="password" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Password
    </label>
  

  <div class="relative w-full">
    
    <input type="password" 
           id="password" 
           name="password"
           class="py-2 sm:py-2.5 px-3  block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none border-red-500 dark:border-red-500 focus:border-red-500 dark:focus:border-red-500 focus:ring-red-500 dark:focus:ring-red-500 "
           placeholder=""
           value="123"
           
           
           
           
           >
  </div>
  
  
    <p class="mt-1.5 text-xs text-red-500">Password must be at least 8 characters.</p>
  
</div>

            </div>

            <!-- Disabled State -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Disabled</h3>
                
<div class="w-full">
  
    <label for="company" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Company Name
    </label>
  

  <div class="relative w-full">
    
    <input type="text" 
           id="company" 
           name="company"
           class="py-2 sm:py-2.5 px-3  block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none  "
           placeholder=""
           value="Acme Corp"
           
           disabled
           
           
           >
  </div>
  
  
</div>

            </div>
        </div>
    </div>
</section>
