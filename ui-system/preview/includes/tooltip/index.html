

<section id="tooltip-component" class="mb-16 pt-8">
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="help-circle" class="w-6 h-6 text-gray-800 dark:text-white"></i>
            <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Tooltip</h2>
        </div>
    </div>

    <div class="space-y-8">

        <!-- Placement Examples -->
        <div>
            <div class="flex justify-center items-center py-16 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs">
                <div class="relative w-80 h-56 flex items-center justify-center">
                    
                    <!-- Top placement (no transform to avoid fixed containment) -->
                    <div class="absolute top-0 left-[calc(50%-20px)]">
                        
  
  
  
  
  

  <div x-data="{
         active: false,
         top: 0, left: 0,
         arrowOffset: '50%',
         updatePosition() {
           const trigger = this.$refs.trigger;
           const tip = this.$refs.tip;
           if (!trigger || !tip) return;
           const r = trigger.getBoundingClientRect();
           const placement = 'top';
           const gap = 8;
           // Force display to measure real dimensions (tip may still be hidden via x-show)
           const wasHidden = tip.style.display === 'none' || getComputedStyle(tip).display === 'none';
           if (wasHidden) tip.style.setProperty('display', 'block', 'important');
           const tipW = tip.offsetWidth || 100;
           const tipH = tip.offsetHeight || 28;
           if (wasHidden) tip.style.removeProperty('display');
           console.log('[tooltip] placement:', placement, '| trigger rect:', r, '| tipW:', tipW, '| tipH:', tipH);
           if (placement === 'top') {
             this.top  = r.top - tipH - gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'bottom') {
             this.top  = r.bottom + gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'left') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.left - tipW - gap;
           } else if (placement === 'right') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.right + gap;
           }
           // Clamp to viewport
           const minL = 8, maxL = window.innerWidth - tipW - 8;
           const origLeft = this.left;
           this.left = Math.max(minL, Math.min(this.left, maxL));
           if (placement === 'top' || placement === 'bottom') {
             const triggerCenter = r.left + r.width / 2;
             const shift = triggerCenter - this.left;
             this.arrowOffset = Math.max(8, Math.min(shift, tipW - 8)) + 'px';
           }
           console.log('[tooltip] final top:', this.top, '| left:', this.left);
         }
       }"
       @mouseenter="active = true; $nextTick(() => updatePosition())"
       @mouseleave="active = false"
       @focusin="active = true; $nextTick(() => updatePosition())"
       @focusout="active = false"
       @click="active = !active; if(active) $nextTick(() => updatePosition())"
       @click.outside="active = false"
       @keydown.escape.window="active = false"
       @scroll.window.capture.passive="if(active) updatePosition()"
       @resize.window.passive="if(active) updatePosition()"
       class="relative inline-flex items-center align-middle cursor-pointer">

    <!-- Trigger -->
    <div x-ref="trigger"
         class="inline-flex items-center justify-center"
         aria-describedby="tooltip-8744">
      <button class="size-10 inline-flex justify-center items-center bg-gray-50 hover:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-lg text-gray-800 dark:text-neutral-200 shadow-xs"><i data-lucide="arrow-up" class="size-4"></i></button>
    </div>

    <!-- Tooltip Card (fixed, escapes overflow containers) -->
    <div x-show="active"
         x-cloak
         x-ref="tip"
         id="tooltip-8744"
         role="tooltip"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         :style="{ top: top + 'px', left: left + 'px' }"
         class="fixed z-[9999] py-1.5 px-2.5 bg-gray-900 dark:bg-white text-xs font-medium text-white dark:text-neutral-800 rounded-md shadow-2xs break-words whitespace-normal min-w-max">

      Tooltip on top

      <!-- Arrow -->
      
        <span class="absolute top-full -translate-x-1/2 border-4 border-transparent border-t-gray-900 dark:border-t-white" :style="{ left: arrowOffset }"></span>
      
    </div>
  </div>
