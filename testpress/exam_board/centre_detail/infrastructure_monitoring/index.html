<!-- Infrastructure Monitoring: server nodes only, no Connected Clients column -->
<div class="rounded-lg border border-gray-200 bg-white shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header: title + status badge | filter at end -->
  <div class="border-b border-gray-200 px-6 py-3 dark:border-neutral-700">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <h3 class="text-sm font-semibold text-gray-900 dark:text-neutral-200">Infrastructure Monitoring</h3>
        <span class="inline-flex items-center gap-x-1.5 rounded-full px-2 py-0.5 text-xs font-medium bg-gray-100 text-gray-700 dark:bg-neutral-700 dark:text-neutral-300">
          <svg class="size-3.5 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>
          1 / 2 Online
        </span>
      </div>
      <div class="hs-dropdown relative inline-flex [--placement:bottom-end]">
        <button id="hs-infra-filter" type="button" class="py-1.5 pl-2 pr-1.5 inline-flex items-center gap-x-1 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:hover:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Filter by status">
          <span>All</span>
          <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-lg border border-gray-200 dark:bg-neutral-800 dark:border-neutral-700" role="menu" aria-orientation="vertical" aria-labelledby="hs-infra-filter">
          <div class="p-1">
            <button type="button" class="w-full flex items-center gap-x-2 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-700">All</button>
            <button type="button" class="w-full flex items-center gap-x-2 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-700">Healthy</button>
            <button type="button" class="w-full flex items-center gap-x-2 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-700">Needs Attention</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Server nodes: Battery and Last Seen only -->
  <div class="divide-y divide-gray-200 dark:divide-neutral-700">
    <!-- Server Node 1 -->
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-3">
        <div class="flex size-9 items-center justify-center rounded-lg bg-purple-100 dark:bg-purple-900/30">
          <svg class="size-4 text-purple-600 dark:text-purple-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="8" x="2" y="2" rx="2" ry="2"/>
            <rect width="20" height="8" x="2" y="14" rx="2" ry="2"/>
            <line x1="6" x2="6.01" y1="6" y2="6"/>
            <line x1="6" x2="6.01" y1="18" y2="18"/>
          </svg>
        </div>
        <div>
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">Server Node</p>
            <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">Online</span>
          </div>
          <p class="text-sm text-gray-500 dark:text-neutral-400">192.168.1.100</p>
        </div>
      </div>
      <div class="grid grid-cols-[6rem_7rem] gap-4 text-right">
        <div class="min-w-0">
          <p class="text-xs text-gray-500 dark:text-neutral-400">Battery</p>
          <div class="flex items-center justify-end gap-1.5">
            <svg class="size-3.5 shrink-0 text-green-600 dark:text-green-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="16" height="12" rx="2"/><path d="M6 10v4"/><path d="M10 10v4"/><path d="M14 10v4"/><path d="M22 14v-4"/></svg>
            <span class="text-sm font-medium text-gray-900 dark:text-neutral-200">95%</span>
          </div>
        </div>
        <div class="min-w-0">
          <p class="text-xs text-gray-500 dark:text-neutral-400">Last Seen</p>
          <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">2 mins ago</p>
        </div>
      </div>
    </div>

    <!-- Server Node 2 (Offline) -->
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-3">
        <div class="flex size-9 items-center justify-center rounded-lg bg-purple-100 dark:bg-purple-900/30">
          <svg class="size-4 text-purple-600 dark:text-purple-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="8" x="2" y="2" rx="2" ry="2"/>
            <rect width="20" height="8" x="2" y="14" rx="2" ry="2"/>
            <line x1="6" x2="6.01" y1="6" y2="6"/>
            <line x1="6" x2="6.01" y1="18" y2="18"/>
          </svg>
        </div>
        <div>
          <div class="flex items-center gap-2">
            <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">Server Node</p>
            <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium bg-gray-100 text-gray-700 dark:bg-neutral-700 dark:text-neutral-300">Offline</span>
          </div>
          <p class="text-sm text-gray-500 dark:text-neutral-400">192.168.1.101</p>
        </div>
      </div>
      <div class="grid grid-cols-[6rem_7rem] gap-4 text-right">
        <div class="min-w-0">
          <p class="text-xs text-gray-500 dark:text-neutral-400">Battery</p>
          <div class="flex items-center justify-end gap-1.5">
            <svg class="size-3.5 shrink-0 text-red-600 dark:text-red-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 14v-4"/><path d="M6 14v-4"/><rect x="2" y="6" width="16" height="12" rx="2"/></svg>
            <span class="text-sm font-medium text-gray-900 dark:text-neutral-200">12%</span>
          </div>
        </div>
        <div class="min-w-0">
          <p class="text-xs text-gray-500 dark:text-neutral-400">Last Seen</p>
          <p class="text-sm font-medium text-gray-900 dark:text-neutral-200">30 mins ago</p>
        </div>
      </div>
    </div>
  </div>
</div>
