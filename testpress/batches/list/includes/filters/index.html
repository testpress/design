<div class="pb-4 grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 border-b border-gray-200 ">
  <div>
    <!-- Search Input -->
    <form method="get" class="relative" x-data="{ ordering: '' }">
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-4 pl-4">
          <i data-lucide="search" class="shrink-0 size-4 text-gray-500"></i>
        </div>
        <input type="text"
          name="q"
          value=""
          class="py-[7px] pl-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none "
          placeholder="Search batches">
        <template x-if="ordering">
          <input type="hidden" name="o" :value="ordering">
        </template>
        <div class="hidden absolute inset-y-0 end-0 flex items-center pointer-events-none z-20 pe-1">
          <button type="button"
            class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600 "
            aria-label="Close">
            <span class="sr-only">Close</span>
            <i data-lucide="x-circle" class="shrink-0 size-4"></i>
          </button>
        </div>
      </div>
    </form>
    <!-- End Search Input -->
  </div>
  <div class="flex justify-end md:justify-end items-center gap-x-2">


    <div class="hs-dropdown [--auto-close:true] [--placement:bottom-right] relative inline-flex">
      <button id="hs-pro-dptied" type="button"
        class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 "
        aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <i data-lucide="list" class="shrink-0 size-4"></i>
        Action
        <i data-lucide="chevron-down" class="shrink-0 size-4"></i>
      </button>
      <div
        class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-48 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900"
        role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptied"
      >
        <div class="p-1">
          <a href='#'
            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
            data-hs-overlay="#hs-pro-eipm">
            <i data-lucide="receipt" class="shrink-0 size-3.5"></i>              
            Billing Categories
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
