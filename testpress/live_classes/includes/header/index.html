<div x-data="{ 
       open: false,
       top: 0,
       left: 'auto',
       right: 'auto',
       _triggerEl: null,
       _menuEl: null,
       _scrollHandler: null,
       init() {
         this.$watch('open', value => {
           console.log('Watch open value:', value);
           if (value) {
             console.log('Trigger ref:', this.$refs.trigger, 'Menu ref:', this.$refs.menu);
             this._triggerEl = this.$refs.trigger;
             this._menuEl = this.$refs.menu;
             this._scrollHandler = this._scrollHandler || this.updatePosition.bind(this);
             setTimeout(() => { 
               console.log('Calling updatePosition from setTimeout');
               this.updatePosition(); 
             }, 0);
             window.addEventListener('scroll', this._scrollHandler, true);
             window.addEventListener('resize', this._scrollHandler, true);
           } else {
             if (this._scrollHandler) {
               window.removeEventListener('scroll', this._scrollHandler, true);
               window.removeEventListener('resize', this._scrollHandler, true);
             }
           }
         });
       },
       updatePosition() {
         const trigger = this._triggerEl;
         console.log('updatePosition called, trigger:', trigger);
         if (!trigger) {
           console.log('No trigger element found!');
           return;
         }
         const rect = trigger.getBoundingClientRect();
         console.log('Trigger bounding rect:', rect);
         this.top = rect.bottom + 4;
         const placement = 'bottom-end';
         console.log('Placement:', placement);
          const menuWidth = this._menuEl ? this._menuEl.offsetWidth : 224;
          const menuHeight = this._menuEl ? this._menuEl.offsetHeight : 160;
          
          if (placement === 'bottom-end' || placement === 'top-end') {
            if (rect.right < menuWidth) {
              this.left = rect.left;
              this.right = 'auto';
            } else {
              this.left = rect.right - menuWidth;
              this.right = 'auto';
            }
            this.top = placement === 'bottom-end' ? rect.bottom + 4 : rect.top - menuHeight - 4;
          } else if (placement === 'bottom-start' || placement === 'top-start') {
            let leftPos = rect.left;
            if (window.innerWidth - leftPos < menuWidth) {
              this.left = 'auto';
              this.right = window.innerWidth - rect.right;
            } else {
              this.left = leftPos;
              this.right = 'auto';
            }
            this.top = placement === 'bottom-start' ? rect.bottom + 4 : rect.top - menuHeight - 4;
          }
       }
     }" 
     @keydown.escape.window="open = false"
     class="inline-flex ">
  
  <!-- Trigger -->
