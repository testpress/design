<div class="px-5 max-w-340 mx-auto  flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 sm:gap-5">
    <!-- Header -->
    <div class="flex flex-wrap justify-between items-center gap-4">
        <a :href="previewPath + '/limeread/library/'"
            class="size-9.5 inline-flex justify-center items-center rounded-xl bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus">

            <i class="shrink-0 size-4" data-lucide="arrow-left"></i>
        </a>
        <div>
            <h1 class="text-lg md:text-xl font-semibold text-foreground">
                Add Ebook
            </h1>
            <p class="text-sm text-muted-foreground-1">
                Upload and configure your ebook.
            </p>
        </div>
    </div>
    <!-- End Header -->

    <div class="inline-flex sm:justify-end items-center gap-x-3">
        <div class="flex justify-end items-center gap-x-2">
            <!-- Button -->
            <button type="button"
                class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-layer border border-layer-line text-layer-foreground text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-layer-hover focus:outline-hidden focus:bg-layer-focus disabled:opacity-50 disabled:pointer-events-none">
                Save as draft
            </button>
            <!-- End Button -->

            <!-- Button -->
            <button type="button"
                :disabled="!$store.publish.isReady"
                class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-primary border border-primary-line text-primary-foreground text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-primary-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-primary-focus">
                Publish
            </button>
            <!-- End Button -->
        </div>
    </div>
</div>
