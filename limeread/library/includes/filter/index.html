  <div class="grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5">
    <div>
      <!-- Search Input -->
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
          <i class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" data-lucide="search"></i>
        </div>
        <input type="text" class="py-1.5 sm:py-2 ps-10 pe-8 block w-full min-w-75 bg-surface border-surface-line rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground-1 focus:bg-layer focus:border-primary-focus focus:ring-primary-focus checked:border-primary-focus disabled:opacity-50 disabled:pointer-events-none" placeholder="Search books, authors, publishers...">
        <div class="hidden absolute inset-y-0 end-0 flex items-center z-20 pe-1">
          <button type="button" class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 dark:text-neutral-400 hover:text-blue-700 dark:hover:text-blue-600 focus:outline-hidden focus:text-blue-700 dark:focus:text-blue-600" aria-label="Close">
            <span class="sr-only">Close</span>
            <i class="shrink-0 size-4" data-lucide="x-circle"></i>
          </button>
        </div>
      </div>
      <!-- End Search Input -->
    </div>
    <!-- End Col -->

    <div class="flex flex-wrap md:justify-end items-center gap-2">
      <!-- Bulk Actions Dropdown -->
      <div x-data="{ open: false }" x-show="selectedItems.length > 0" x-cloak x-transition
           class="relative inline-flex">
        <!-- Bulk Actions Button -->
        <button @click="open = !open" @click.away="open = false" type="button" 
                class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-primary-50 dark:bg-primary-900/30 border border-primary-200 dark:border-primary-800 text-primary-600 dark:text-primary-400 shadow-2xs hover:bg-primary-100 dark:hover:bg-primary-900/50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden transition-all" aria-haspopup="menu" :aria-expanded="open" aria-label="Bulk Actions">
          <i class="shrink-0 size-4" data-lucide="list-checks"></i>
          Bulk Actions
          <span class="font-medium text-[10px] py-0.5 px-1.5 bg-primary-600 dark:bg-primary-500 text-white leading-3 rounded-full" x-text="selectedItems.length"></span>
        </button>
        <!-- End Bulk Actions Button -->

        <!-- Dropdown Menu -->
        <div x-show="open" x-cloak 
             x-transition:enter="transition ease-out duration-100" 
             x-transition:enter-start="opacity-0 scale-95" 
             x-transition:enter-end="opacity-100 scale-100" 
             x-transition:leave="transition ease-in duration-75" 
             x-transition:leave-start="opacity-100 scale-100" 
             x-transition:leave-end="opacity-0 scale-95" 
             class="absolute right-0 top-full mt-2 w-64 z-20 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl overflow-hidden" role="menu">
          <div class="p-1.5 space-y-0.5 text-start">
            <!-- Archive -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="archive"></i>
              Archive selected
            </button>
            <!-- Assign Access Groups -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="users"></i>
              Assign access groups
            </button>
            <!-- Change Visibility -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="eye"></i>
              Change visibility
            </button>
            <!-- Export Metadata -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="download"></i>
              Export metadata
            </button>
            
            <div class="my-1 border-t border-gray-200 dark:border-neutral-800"></div>
            
            <!-- Bulk License Update -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="shield"></i>
              Bulk license update
            </button>
            <!-- Bulk Publisher -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="building-2"></i>
              Bulk publisher assignment
            </button>
            <!-- Bulk Subject -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="tag"></i>
              Bulk Subject assignment
            </button>
            
            <div class="my-1 border-t border-gray-200 dark:border-neutral-800"></div>
            
            <!-- Bulk Delete -->
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
              <i class="shrink-0 size-4 text-red-600 dark:text-red-400" data-lucide="trash-2"></i>
              Bulk delete
            </button>
          </div>
        </div>
      </div>

      <!-- Sort Dropdown -->
      <div x-data="{ open: false }" class="relative inline-flex">
        <!-- Sort Button -->
        <button @click="open = !open" @click.away="open = false" type="button" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700" aria-haspopup="menu" :aria-expanded="open" aria-label="Sort">
          <i class="shrink-0 mt-0.5 size-3.5" data-lucide="arrow-up-down"></i>
          Sort
          <i class="shrink-0 size-3.5" data-lucide="chevron-down"></i>
        </button>
        <!-- End Sort Button -->

        <!-- Dropdown -->
        <div x-show="open" x-cloak 
             x-transition:enter="transition ease-out duration-100" 
             x-transition:enter-start="opacity-0 scale-95" 
             x-transition:enter-end="opacity-100 scale-100" 
             x-transition:leave="transition ease-in duration-75" 
             x-transition:leave-start="opacity-100 scale-100" 
             x-transition:leave-end="opacity-0 scale-95" 
             class="absolute right-0 top-full mt-2 w-56 z-20 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl overflow-hidden" role="menu">
          <div class="p-1.5 space-y-0.5 text-start">
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="clock"></i>
              Recently updated
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="upload-cloud"></i>
              Recently uploaded
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="bar-chart-2"></i>
              Most borrowed
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="users"></i>
              Highest waitlist
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="activity"></i>
              Highest utilization
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="sort-asc"></i>
              Alphabetical
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="calendar-check"></i>
              Expiring licenses
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="history"></i>
              Recently inactive
            </button>
            <button type="button" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-[13px] text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
              <i class="shrink-0 size-4 text-gray-400" data-lucide="user-check"></i>
              Most active readers
            </button>
          </div>
        </div>
        <!-- End Dropdown -->
      </div>
      <!-- End Sort Dropdown -->

      <div class="inline-flex">
        <button @click.stop="showFilterModal = true; calendarOpen = false" type="button" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700" aria-label="Filter">
          <i class="shrink-0 size-3.5" data-lucide="sliders-horizontal"></i>
          Filter
          <span class="font-medium text-[10px] py-0.5 px-[5px] bg-gray-900 dark:bg-white text-white dark:text-neutral-800 leading-3 rounded-full">
            5
          </span>
        </button>
      </div>
      <!-- End Filter Button -->
    </div>
    <!-- End Col -->
  </div>
