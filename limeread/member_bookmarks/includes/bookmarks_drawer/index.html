









<div x-data="{ 
        open: false,
        init() {
            this.$watch('open', value => {
                if (value) {
                    document.body.classList.add('overflow-hidden');
                } else {
                    document.body.classList.remove('overflow-hidden');
                }
            });
        }
     }" 
     @open-drawer-book-bookmarks-drawer-undefined.window="open = true" 
     @close-drawer-book-bookmarks-drawer-undefined.window="open = false"
     @keydown.window.escape="open = false">

    
    <div x-show="open" 
         x-cloak 
         x-transition:enter="transition-opacity ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-in duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="open = false"
         class="fixed inset-0 bg-gray-900/50 dark:bg-neutral-900/80 backdrop-blur-sm z-[80]"></div>
    

    <div id="book-bookmarks-drawer-undefined" 
         x-show="open"
         x-cloak
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0 translate-y-0"
         x-transition:leave="transition ease-in duration-300 transform"
         x-transition:leave-start="translate-x-0 translate-y-0"
         x-transition:leave-end="translate-x-full"
         @click.outside="open = false"
         class="fixed z-[81] bg-white dark:bg-neutral-800 flex flex-col shadow-xl top-0 right-0 h-full border-l border-gray-200 dark:border-neutral-700 max-w-[480px] w-full "
         role="dialog" 
         tabindex="-1"
         aria-labelledby="book-bookmarks-drawer-undefined-title">
        
        <!-- Header -->
        
        <div class="py-3 px-6 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700 shrink-0">
            <div>
                <div class="flex items-center gap-x-2">
                    <h3 id="book-bookmarks-drawer-undefined-title" class="font-medium text-gray-800 dark:text-neutral-200">
                        Bookmarks
                    </h3>
                    
                </div>
                
            </div>
            
            <div class="flex items-center gap-2">

                <button type="button" 
                        @click="open = false"
                        class="size-8 inline-flex shrink-0 justify-center items-center gap-x-2 rounded-full border border-gray-200 text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-200 dark:focus:bg-neutral-700">
                    <span class="sr-only">Close drawer</span>
                    <i data-lucide="x" class="size-4 shrink-0"></i>
                </button>
            </div>
        </div>
        

        <!-- Body & Footer (caller handles overflow and sticky elements) -->
        <div class="flex flex-col flex-1 overflow-hidden">
            
<div class="flex flex-col h-full bg-background">
  
  <!-- Book Header Section -->
  <div class="p-5 flex flex-col justify-center items-center text-center bg-background shrink-0">
    <img src="" alt=" Cover" class="shrink-0 w-16 h-[84px] object-cover rounded-md border border-layer-line shadow-sm bg-gray-50 dark:bg-neutral-800">
    <div class="mt-3 w-full">
      <h2 class="text-lg font-semibold text-foreground">
        
      </h2>
      <p class="text-[13px] text-muted-foreground-1">
         Bookmarks
      </p>
    </div>
  </div>

  <!-- Bookmark List -->
  <div class="flex-1 overflow-y-auto px-2 py-3 space-y-1">
    
    

    <!-- Empty State: No bookmarks at all -->
    
    <div class="py-12 flex flex-col justify-center items-center text-center">
      <div class="inline-flex size-12 items-center justify-center rounded-full bg-surface border border-surface-line text-muted-foreground mb-3">
        <i data-lucide="bookmark-minus" class="size-6"></i>
      </div>
      <p class="font-medium text-foreground">No bookmarks found</p>
      <p class="mt-1 text-xs text-muted-foreground-1">This book doesn't have any bookmarks yet.</p>
    </div>
    

  </div>


  
</div>

        </div>

    </div>
</div>
