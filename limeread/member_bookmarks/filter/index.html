<div class="sticky top-[55px] z-30 pt-4 -mt-4 px-4 sm:px-6 lg:px-8 -mx-4 sm:-mx-6 lg:-mx-8 bg-background transition-colors duration-300">
  <div class="pb-4 grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 border-b border-gray-200 dark:border-neutral-700">
    <div>
      <!-- Search Input -->
      <div class="relative">
        <div class="absolute inset-y-0 inset-s-0 flex items-center pointer-events-none z-20 ps-3.5">
          <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <input type="text" class="py-1.5 sm:py-2 ps-10 pe-8 block w-full md:max-w-md bg-gray-100 dark:bg-neutral-700 border-transparent rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:bg-white dark:focus:bg-neutral-800 focus:border-emerald-700 dark:focus:border-emerald-600 focus:ring-emerald-700 dark:focus:ring-emerald-600 checked:border-emerald-700 dark:checked:border-emerald-600 disabled:opacity-50 disabled:pointer-events-none" placeholder="Search books, subjects, courses...">
        <div class="hidden absolute inset-y-0 inset-e-0 flex items-center z-20 pe-1">
          <button type="button" class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 dark:text-neutral-400 hover:text-emerald-700 dark:hover:text-emerald-600 focus:outline-hidden focus:text-emerald-700 dark:focus:text-emerald-600" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
          </button>
        </div>
      </div>
      <!-- End Search Input -->
    </div>
    <!-- End Col -->

  <div class="flex md:justify-end items-center gap-x-2">
    <!-- Sort Dropdown -->
    <div class="relative inline-flex" x-data="{ sortOpen: false, selectedSort: 'Recently Bookmarked' }" @click.outside="sortOpen = false">
      <!-- Sort Button -->
      <button type="button" @click="sortOpen = !sortOpen" class="py-2 px-2.5 inline-flex items-center justify-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700" aria-haspopup="menu" :aria-expanded="sortOpen" aria-label="Dropdown">
        <i data-lucide="arrow-up-down" class="shrink-0 size-4"></i>
        <span x-text="selectedSort"></span>
        <i data-lucide="chevron-down" class="shrink-0 size-4"></i>
      </button>
      <!-- End Sort Button -->

      <!-- Dropdown -->
      <div x-show="sortOpen"
           style="display: none;"
           x-transition:enter="transition ease-out duration-100"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-75"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="opacity-0 scale-95"
           class="absolute right-0 top-full mt-2 w-max min-w-48 z-40 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical">
        <div class="p-1 space-y-0.5">
          <button type="button" @click="selectedSort = 'Recently Bookmarked'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800 whitespace-nowrap">
            <i data-lucide="clock" class="shrink-0 size-4"></i>
            Recently Bookmarked
          </button>
          <button type="button" @click="selectedSort = 'Book Title (A–Z)'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800 whitespace-nowrap">
            <i data-lucide="arrow-down-a-z" class="shrink-0 size-4"></i>
            Book Title (A–Z)
          </button>
          <button type="button" @click="selectedSort = 'Most Bookmarks'; sortOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800 whitespace-nowrap">
            <i data-lucide="bookmark" class="shrink-0 size-4"></i>
            Most Bookmarks
          </button>
        </div>
      </div>
      <!-- End Dropdown -->
    </div>
    <!-- End Sort Dropdown -->

    <!-- Filter Dropdown -->
    <div class="relative inline-flex" x-data="{ filterOpen: false, selectedFilter: 'All' }" @click.outside="filterOpen = false">
      <!-- Filter Button -->
      <button type="button" @click="filterOpen = !filterOpen" class="py-2 px-2.5 inline-flex items-center justify-center gap-x-1.5 text-xs font-medium rounded-lg bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white shadow-2xs hover:bg-gray-50 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700" aria-haspopup="menu" :aria-expanded="filterOpen" aria-label="Dropdown">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
        <span x-text="selectedFilter"></span>
        <i data-lucide="chevron-down" class="shrink-0 size-4"></i>
      </button>

      <!-- Dropdown -->
      <div x-show="filterOpen"
           style="display: none;"
           x-transition:enter="transition ease-out duration-100"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-75"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="opacity-0 scale-95"
           class="absolute right-0 top-full mt-2 w-40 z-40 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical">
        <div class="p-1 space-y-0.5">
          <button type="button" @click="selectedFilter = 'All'; filterOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
            <i data-lucide="layers" class="shrink-0 size-4"></i>
            <span class="flex-1 text-left">All</span>
            <i data-lucide="check" class="shrink-0 size-4 text-emerald-600" x-show="selectedFilter === 'All'"></i>
          </button>
          <button type="button" @click="selectedFilter = 'Available'; filterOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
            <i data-lucide="book-open" class="shrink-0 size-4"></i>
            <span class="flex-1 text-left">Available</span>
            <i data-lucide="check" class="shrink-0 size-4 text-emerald-600" x-show="selectedFilter === 'Available'" style="display: none;"></i>
          </button>
          <button type="button" @click="selectedFilter = 'Returned'; filterOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
            <i data-lucide="undo-2" class="shrink-0 size-4"></i>
            <span class="flex-1 text-left">Returned</span>
            <i data-lucide="check" class="shrink-0 size-4 text-emerald-600" x-show="selectedFilter === 'Returned'" style="display: none;"></i>
          </button>
          <button type="button" @click="selectedFilter = 'Expired'; filterOpen = false" class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-800 focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800">
            <i data-lucide="calendar-x" class="shrink-0 size-4"></i>
            <span class="flex-1 text-left">Expired</span>
            <i data-lucide="check" class="shrink-0 size-4 text-emerald-600" x-show="selectedFilter === 'Expired'" style="display: none;"></i>
          </button>
        </div>
      </div>
      <!-- End Dropdown -->
    </div>
    <!-- End Filter Dropdown -->
  </div>
  <!-- End Col -->
  </div>
</div>
