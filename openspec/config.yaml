schema: spec-driven

# Project context — shown to AI when creating artifacts
context: |
  Tech stack: Django, Python 3, django-environ. Multi-tenant (tenant_schemas; SHARED_APPS vs TENANT_APPS in testpress/testpress/settings/base.py). Celery for async (elearn_celery, bpala_classes_celery). DRF, django-filters, Elasticsearch (django_elasticsearch_dsl), HTMX (apps.utils.htmx). Storage: Minio/Wasabi via apps/institutes/storages/.
  Code layout: Apps live under testpress/apps/. Put business logic in app/domain/ modules; keep views thin. Custom user: AUTH_USER_MODEL = "users.User". Timezone: Asia/Kolkata.
  Formatting: Black, line-length 119 (pyproject.toml). Do not edit migrations by hand; add new migrations when changing models.
  Domain: E-learning/exam platform (Testpress). Concepts: institutes (tenants), courses, exams, attempts, study plans, products, orders, payments, subscriptions, members, posts, notifications. Consider tenant vs shared app and existing app boundaries when adding features.

# Per-artifact rules
rules:
  proposal:
    - State whether the change affects tenant data, shared data, or both (SHARED_APPS vs TENANT_APPS).
    - Include a "Non-goals" section.
    - Keep proposals under 600 words; link to existing apps (e.g. apps.exams, apps.orders) where relevant.
  design:
    - Reference existing patterns in testpress/apps/ (domain/, views, forms) before introducing new ones.
    - If adding models, state which app and whether the app is tenant or shared.
  tasks:
    - "Task names must state what the task does and why (intent and outcome), not code or implementation. Example good name: Store the actual refund time on the order for reporting and audit. Example bad name: Add Order.refunded_at field and migration (describes code, not purpose). Avoid jargon or vague labels."
    - Each task must have a short description that clearly explains what it does and what "done" looks like.
    - Order tasks progressively: dependencies first (e.g. model then view then URL), no random or dummy order; the list should be a valid workflow sequence.
    - One task = one PR: each task is intended to be implemented and merged as a separate pull request.
    - Break work into tasks of max 2–3 hours; one task per logical unit (e.g. model + migration, view + URL, domain function).
    - For model/schema changes: include a task to add and run migrations; do not modify existing migration files.
    - Call out tenant awareness (e.g. "run in tenant context" or "shared-only") where it matters.
    - If a task involves domain logic (e.g. app/domain/ code or business rules), test cases for that logic are mandatory; the task description must state that tests are part of "done".
  specs:
    - When specifying APIs or behavior, align with existing REST/HTMX patterns in the codebase.