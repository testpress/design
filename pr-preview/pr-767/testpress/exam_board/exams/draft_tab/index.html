<div id="exam-list-draft" class="hidden" role="tabpanel" aria-labelledby="exam-list-tab-draft">
  <div class="mb-4">
    <div class="relative max-w-md">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <input type="text" class="py-[7px] ps-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder-neutral-500" placeholder="Search exam">
    </div>
  </div>

  <div
    x-data="{
      sortKey: 'name',
      sortDir: 'asc',
      rows: [
        { id: 1, name: 'BCS Foundation Certificate Exam', createdDate: 'Feb 12, 2026', centreCount: 2, sessionCount: 4, capacity: 5000, allocated: 3200, detailHref: '#' },
        { id: 2, name: 'CISM Practice Exam', createdDate: 'Feb 11, 2026', centreCount: 1, sessionCount: 2, capacity: 1200, allocated: 800, detailHref: '#' },
      ],
      setSort(key, dir) {
        this.sortKey = key
        this.sortDir = dir
      },
      formatNum(n) { return n.toLocaleString() },
      get sortedRows() {
        const dir = this.sortDir === 'asc' ? 1 : -1
        const key = this.sortKey
        return [...this.rows].sort((a, b) => {
          if (key === 'name') return (a.name.localeCompare(b.name)) * dir
          return ((a[key] ?? 0) - (b[key] ?? 0)) * dir
        })
      },
    }"
    class="space-y-4">
    <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
      <div class="min-w-full inline-block align-middle">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
          <thead>
            <tr class="border-t border-gray-200 dark:border-neutral-700">
              <th scope="col" class="min-w-[200px] max-w-[280px] w-0">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-draft-sort-name" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Exam name
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-draft-sort-name">
                    <div class="p-1">
                      <button type="button" @click="setSort('name','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('name','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-20">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-draft-sort-centres" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Centres
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-draft-sort-centres">
                    <div class="p-1">
                      <button type="button" @click="setSort('centreCount','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('centreCount','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-20">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-draft-sort-sessions" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Sessions
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-draft-sort-sessions">
                    <div class="p-1">
                      <button type="button" @click="setSort('sessionCount','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('sessionCount','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-24">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-draft-sort-capacity" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Capacity
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-draft-sort-capacity">
                    <div class="p-1">
                      <button type="button" @click="setSort('capacity','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('capacity','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-24">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-draft-sort-allocated" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Allocated
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-draft-sort-allocated">
                    <div class="p-1">
                      <button type="button" @click="setSort('allocated','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('allocated','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="size-px whitespace-nowrap px-4 py-3.5 text-end text-sm font-normal text-gray-500 dark:text-neutral-400">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
            <template x-for="row in sortedRows" :key="row.id">
              <tr>
                <td class="px-4 py-3 max-w-[280px] w-0">
                  <div class="min-w-0">
                    <a :href="row.detailHref" class="block font-medium text-gray-800 dark:text-neutral-200 underline-offset-2 hover:underline hover:decoration-2 hover:text-emerald-600 focus:outline-none focus:underline focus:decoration-2 focus:text-emerald-600 truncate whitespace-nowrap" x-text="row.name"></a>
                    <p class="mt-0.5 text-xs text-gray-500 dark:text-neutral-400 truncate whitespace-nowrap" x-text="row.createdDate"></p>
                  </div>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="row.centreCount"></span>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="row.sessionCount"></span>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-sm text-gray-600 dark:text-neutral-400" x-text="formatNum(row.capacity)"></td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-sm text-gray-600 dark:text-neutral-400" x-text="formatNum(row.allocated)"></td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-end">
                  <a :href="row.detailHref"
                    class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
                    View Detail
                  </a>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
    <p class="py-4 text-sm text-gray-500 dark:text-neutral-400" x-show="sortedRows.length === 0">No draft exams.</p>
  </div>
</div>
