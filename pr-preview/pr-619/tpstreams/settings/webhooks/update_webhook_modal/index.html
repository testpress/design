<form id="update_webhook_modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[100] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="update_webhook-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white rounded-xl pointer-events-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)]">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b">
        <h3 id="update_webhook-label" class="font-medium text-gray-800">
          Update Webhook
        </h3>
        <button type="button" class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-200" aria-label="Close" data-hs-overlay="#update_webhook_modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300"
        x-data="{
          selectedEvents: [],
          hoveredMainEvent: null,
          form: {
            enabled: true
          },
          eventOptions: {
            'Video': ['Created', 'Transcoded'],
            'Livestream': ['Started', 'Streaming', 'Completed', 'Disconnected']
          },
          addEvent(mainEvent, subEvent) {
            const eventKey = subEvent ? `${mainEvent}-${subEvent}` : mainEvent;
            if (!this.selectedEvents.includes(eventKey)) {
              this.selectedEvents.push(eventKey);
            }
          },
          removeEvent(eventKey) {
            this.selectedEvents = this.selectedEvents.filter(e => e !== eventKey);
          },
          isSelected(mainEvent, subEvent) {
            const eventKey = subEvent ? `${mainEvent}-${subEvent}` : mainEvent;
            return this.selectedEvents.includes(eventKey);
          },
          init() {
            // Initialize form with webhook data when modal opens
            // This would be populated from actual webhook data
            // When modal opens, populate selectedEvents from webhook data
            // For demo purposes, showing example selected events:
            this.selectedEvents = ['Video-Created', 'Livestream-Streaming'];
          }
        }"
        x-init="init()">
        <div class="p-4 space-y-5">
          <!-- Webhook URL -->
          <div>
            <label for="webhook_url" class="block mb-2 text-sm font-medium text-gray-800">
              Webhook URL
            </label>
            <input type="url" id="webhook_url" name="url" required
              class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500"
              placeholder="Enter Enpoint URL"
              value="https://example.com/webhook">
          </div>
          <!-- Secret Token -->
          <div>
            <label for="webhook_token" class="block mb-2 text-sm font-medium text-gray-800">
              Secret Token (optional)
            </label>
            <input type="password" id="webhook_token" name="secret_token"
              class="py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500"
              placeholder="Enter secret token"
              value="secret-token">
          </div>

          <!-- Event Selection -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-800">
              Events
            </label>
            <p class="text-xs text-gray-500 mb-3">
              If no events are selected, this webhook will receive notifications for all events by default.
            </p>
            
            <!-- Main Event Buttons with Hover - Fixed Position -->
            <div class="flex gap-2 mb-3">
              <div class="relative" 
                @mouseenter="hoveredMainEvent = 'Video'"
                @mouseleave="hoveredMainEvent = null">
                <button type="button"
                  @click="addEvent('Video', null)"
                  class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-gray-800">
                  Video
                </button>
                <div x-show="hoveredMainEvent === 'Video'" 
                  class="absolute top-full left-0 mt-1 z-10 w-48 bg-white border border-gray-200 rounded-lg shadow-lg py-1"
                  @mouseenter="hoveredMainEvent = 'Video'"
                  @mouseleave="hoveredMainEvent = null">
                  <template x-for="subEvent in eventOptions['Video']" :key="subEvent">
                    <button type="button"
                      @click="addEvent('Video', subEvent)"
                      class="w-full text-left px-3 py-2 text-sm text-gray-800 hover:bg-gray-50"
                      :class="isSelected('Video', subEvent) ? 'bg-blue-50 text-blue-700' : ''">
                      <span x-text="subEvent"></span>
                    </button>
                  </template>
                </div>
              </div>

              <div class="relative"
                @mouseenter="hoveredMainEvent = 'Livestream'"
                @mouseleave="hoveredMainEvent = null">
                <button type="button"
                  @click="addEvent('Livestream', null)"
                  class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-white text-gray-800">
                  Livestream
                </button>
                <div x-show="hoveredMainEvent === 'Livestream'"
                  class="absolute top-full left-0 mt-1 z-10 w-48 bg-white border border-gray-200 rounded-lg shadow-lg py-1"
                  @mouseenter="hoveredMainEvent = 'Livestream'"
                  @mouseleave="hoveredMainEvent = null">
                  <template x-for="subEvent in eventOptions['Livestream']" :key="subEvent">
                    <button type="button"
                      @click="addEvent('Livestream', subEvent)"
                      class="w-full text-left px-3 py-2 text-sm text-gray-800 hover:bg-gray-50"
                      :class="isSelected('Livestream', subEvent) ? 'bg-blue-50 text-blue-700' : ''">
                      <span x-text="subEvent"></span>
                    </button>
                  </template>
                </div>
              </div>
            </div>

            <!-- Selected Events Display - Scrollable Area -->
            <div class="max-h-32 overflow-y-auto border border-gray-200 rounded-lg p-2 bg-gray-50" x-show="selectedEvents.length > 0">
              <div class="flex flex-wrap gap-2">
                <template x-for="eventKey in selectedEvents" :key="eventKey">
                  <div class="inline-flex items-center gap-x-1.5 px-3 py-1.5 bg-blue-100 border border-blue-300 rounded-lg text-sm text-blue-800 font-medium">
                    <span x-text="eventKey"></span>
                    <button type="button" 
                      @click="removeEvent(eventKey)"
                      class="inline-flex items-center justify-center size-4 rounded-full hover:bg-blue-200 focus:outline-none focus:ring-1 focus:ring-blue-300"
                      aria-label="Remove">
                      <svg class="size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                      </svg>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </div>
          <!-- End Event Selection -->

          <div class="flex items-center gap-x-3">
            <input type="checkbox" id="webhook_enabled" name="enabled"
              x-model="form.enabled"
              value="true"
              class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
            <label for="webhook_enabled" class="text-sm text-gray-800">
              Enabled
            </label>
            <span class="text-sm text-gray-500"> (Disabled webhooks won't receive updates) </span>
          </div>
          <!-- Hidden input to ensure form submission includes enabled status when unchecked -->
          <input type="hidden" name="enabled" value="false" x-show="!form.enabled">
        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2">
        <button type="button"
          class="py-2 px-3 inline-flex justify-center items-center bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-sm hover:bg-gray-50"
          data-hs-overlay="#update_webhook_modal">
          Cancel
        </button>
        <button type="submit"
          class="py-2 px-3 inline-flex justify-center items-center bg-blue-600 border border-blue-600 text-white text-sm font-medium rounded-lg shadow-sm hover:bg-blue-700 focus:ring-1 focus:ring-blue-300"
          data-hs-overlay="#update_webhook_modal">
          Save
        </button>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</form>
