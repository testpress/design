<div class="space-y-2">
    <div class="flex gap-x-8">
        <div
            class="relative flex last:before:hidden before:absolute before:top-1 before:-inset-e-3 before:inline-block before:h-3 before:border-s before:border-line-4">
            <div>
                <a class="inline-flex items-center gap-x-1 text-start whitespace-nowrap text-sm text-muted-foreground-2 rounded-full underline-offset-2 hover:underline hover:decoration-2 focus:outline-hidden focus:underline focus:decoration-2"
                    :href="previewPath + '/limeread/library/'">
                    <i class="shrink-0 size-4" data-lucide="chevron-left"></i>
                    Ebook Catalog
                </a>
            </div>
        </div>
    </div>
    <div
        class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
            <div class="mx-auto sm:mx-0 w-auto h-56 shrink-0">
                <img src="https://a.media-amazon.com/images/I/7165Nlq-Z+L._SY522_.jpg" alt="Atomic Habits"
                    class="w-full h-full rounded-lg object-cover">
            </div>

            <div class="grow w-full sm:w-auto">
                <div class="pb-5 mb-5">
                    <div class="flex flex-wrap justify-between items-start gap-3">
                        <div class="grow text-start">
                            <div class="space-y-1 flex flex-col justify-start">
                                <div class="flex items-center gap-x-2">
                                    <span class="block text-foreground font-semibold text-xl">
                                        Focus on the Process
                                    </span>

                                    <span class="text-lg"></span>

                                </div>

                                <ul class="flex flex-wrap items-center whitespace-nowrap gap-1.5">
                                    <li
                                        class="inline-flex items-center relative text-sm text-muted-foreground-1 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
                                        <p class="text-sm text-muted-foreground-1">Thibaut Meurisse</p>
                                    </li>
                                    <li
                                        class="inline-flex items-center relative text-sm text-muted-foreground-1 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
                                        <p class="text-sm text-muted-foreground-1">Self Growth</p>
                                    </li>
                                    <li
                                        class="inline-flex items-center relative text-sm text-muted-foreground-1 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
                                        <p class="text-sm text-muted-foreground-1">English</p>
                                    </li>
                                    <li
                                        class="inline-flex items-center relative text-sm text-muted-foreground-1 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-surface-3 after:rounded-full after:-translate-y-1/2">
                                        <p class="text-sm text-muted-foreground-1">Epub</p>
                                    </li>
                                </ul>
                            </div>
                            <!-- End List -->
                        </div>

                        <!-- Button Group -->
                        <div class="flex items-start justify-start gap-2 lg:ms-0">
                            <button type="button"
                                class="hidden lg:inline-flex py-1.5 px-2.5 items-center gap-x-1.5 text-[13px] font-medium whitespace-nowrap rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus">
                                <i class="shrink-0 size-3.5" data-lucide="edit"></i>
                                Edit
                            </button>

                            <!-- Action Dropdown -->
                            <div x-data="{ 
                                open: false, 
                                positionClass: 'left-0',
                                toggle() {
                                    this.open = !this.open;
                                    if (this.open) {
                                        this.$nextTick(() => {
                                            const rect = this.$el.getBoundingClientRect();
                                            // 192px is w-48. Add some margin.
                                            if (rect.left + 192 > window.innerWidth - 16) {
                                                this.positionClass = 'right-0';
                                            } else {
                                                this.positionClass = 'left-0';
                                            }
                                        });
                                    }
                                }
                            }" class="relative inline-flex">
                                <button @click="toggle()" @click.away="open = false" type="button"
                                    class="py-1.5 px-2.5 lg:py-1.5 lg:px-2.5 inline-flex items-center gap-x-1.5 text-[13px] font-medium whitespace-nowrap rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus"
                                    aria-haspopup="menu" :aria-expanded="open" aria-label="More actions">
                                    <span class="hidden lg:inline">Manage</span>
                                    <i class="hidden lg:block shrink-0 size-3.5" data-lucide="chevron-down"></i>
                                    <i class="block lg:hidden shrink-0 size-4" data-lucide="ellipsis-vertical"></i>
                                </button>

                                <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-100"
                                    x-transition:enter-start="opacity-0 scale-95"
                                    x-transition:enter-end="opacity-100 scale-100"
                                    x-transition:leave="transition ease-in duration-75"
                                    x-transition:leave-start="opacity-100 scale-100"
                                    x-transition:leave-end="opacity-0 scale-95"
                                    :class="positionClass"
                                    class="absolute top-full mt-2 w-48 z-50 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl overflow-hidden"
                                    role="menu">
                                    <div class="p-1.5 space-y-0.5 text-start">
                                        <button type="button"
                                            class="lg:hidden w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <i class="shrink-0 size-4 text-muted-foreground-1" data-lucide="edit"></i>
                                            Edit
                                        </button>

                                        <button type="button"
                                            class="lg:hidden w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-primary hover:bg-primary/10 transition-colors">
                                            <i class="shrink-0 size-4 text-primary" data-lucide="check"></i>
                                            Publish
                                        </button>

                                        <div class="lg:hidden my-1 border-t border-gray-100 dark:border-neutral-800"></div>

                                        <button type="button"
                                            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <i class="shrink-0 size-4 text-muted-foreground-1" data-lucide="eye"></i>
                                            Preview
                                        </button>

                                        <button type="button"
                                            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <i class="shrink-0 size-4 text-muted-foreground-1" data-lucide="download"></i>
                                            Import Data
                                        </button>

                                        <div class="my-1 border-t border-gray-100 dark:border-neutral-800"></div>

                                        <button type="button"
                                            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <i class="shrink-0 size-4 text-muted-foreground-1" data-lucide="archive"></i>
                                            Archive
                                        </button>

                                        <button type="button"
                                            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-foreground hover:bg-gray-100 dark:hover:bg-neutral-800 transition-colors">
                                            <i class="shrink-0 size-4 text-muted-foreground-1" data-lucide="ban"></i>
                                            Disable
                                        </button>

                                        <div class="my-1 border-t border-gray-100 dark:border-neutral-800"></div>

                                        <button type="button"
                                            class="w-full flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
                                            <i class="shrink-0 size-4 text-current" data-lucide="trash-2"></i>
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- End Action Dropdown -->

                            <!-- Select -->
                            <button type="button"
                                class="hidden lg:inline-flex py-1.5 px-2.5 items-center gap-x-1.5 text-[13px] font-medium whitespace-nowrap rounded-lg bg-primary text-primary-foreground hover:bg-primary-hover focus:outline-hidden focus:bg-primary-hover dark:bg-primary dark:hover:bg-primary-hover dark:focus:bg-primary-hover">

                                <i class="shrink-0 size-3.5" data-lucide="check"></i>

                                <!-- Label -->
                                <span>Publish</span>
                            </button>
                            <!-- End Select -->
                        </div>
                        <!-- End Button Group -->
                    </div>
                </div>
                <div class="grid gap-y-8 grid-cols-2 lg:grid-cols-3">
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="building-2"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">Publisher</p>
                            <p class="text-sm text-foreground font-medium">Wisdom Tree</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="calendar"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">Publication Year</p>
                            <p class="text-sm text-foreground font-medium">2022</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="tag"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">ISBN</p>
                            <p class="text-sm text-foreground font-medium">978-8183286978</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="book-open"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">Edition</p>
                            <p class="text-sm text-foreground font-medium">1st Edition</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="calendar"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">Uploaded On</p>
                            <p class="text-sm text-foreground font-medium">Jan 1 ,2025</p>
                        </div>
                    </div>
                    <div class="flex items-start gap-3">
                        <i class="h-5 w-5 text-muted-foreground mt-0.5" data-lucide="calendar"></i>
                        <div>
                            <p class="text-xs text-muted-foreground-1 mb-1">Last Updated</p>
                            <p class="text-sm text-foreground font-medium">May 14, 2026</p>
                        </div>
                    </div>
                </div>
                <!-- End List -->
            </div>

            <!-- Button Group -->

            <!-- End Button Group -->
        </div>


    </div>
</div>
