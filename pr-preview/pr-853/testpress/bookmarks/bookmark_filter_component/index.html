<script>
  function useBookmarkFilter() {
    console.log('useBookmarkFilter function called');
    return {
    selectedType: null, // null means "All Bookmarks"
    selectedFolderId: 'all', // 'all', 'uncategorized', or folder.id
    sortOrder: 'recent',
    showFolderModal: false,

    mobileFoldersOpen: false,
    showAddFolderModal: false,
    showRenameFolderModal: false,
    showDeleteFolderModal: false,
    newFolderName: '',

    isValidFolderName() {
      if (this.newFolderName.trim() === '') return true;
      const regex = /^[a-zA-Z0-9\s\-_&]+$/;
      return regex.test(this.newFolderName);
    },

    setType(id) {  
      this.selectedType = id;
    },

    isSelected(id) {
      if (id === null) return this.selectedType === null;
      return this.selectedType === id;
    },

    setFolder(id) {
      this.selectedFolderId = id;
      this.mobileFoldersOpen = false;
    },

    isFolderSelected(id) {
      return this.selectedFolderId === id;
    },

    setSort(order) {
      this.sortOrder = order;
    },

    getSortLabel() {
        return this.sortOrder === 'recent' ? 'Recent' : 'Oldest';
    },

    folderSearch: '',
    hasMatches: true,

    checkMatches() {
        // Small delay to allow Alpine transitions and DOM updates to settle
        setTimeout(() => {
            const listItems = Array.from(document.querySelectorAll('.bookmark-item'));
            const visibleItems = listItems.filter(el => {
                return el.style.display !== 'none';
            });
            this.hasMatches = visibleItems.length > 0;
            console.log('Check matches run. Total:', listItems.length, 'Visible:', visibleItems.length);
        }, 50);
    },

    resetFilters() {
        this.selectedType = null;
        this.selectedFolderId = 'all';
    },

    removeBookmark(id) {
        // In this static loop version, we'll just dispatch an event or use a local state to hide it
        // For simplicity in this mockup, we'll assume the item has its own state or just hide it via a class
        console.log('Remove bookmark:', id);
    },

    moveToFolder(bookmarkId, folderId) {
        console.log(`Moving bookmark ${bookmarkId} to folder: ${folderId}`);
    },

    openRenameModal(folderName) {
        this.newFolderName = folderName;
        this.showRenameFolderModal = true;
    },

    openDeleteModal(folderName) {
        this.newFolderName = folderName;
        this.showDeleteFolderModal = true;
    }
  };
}
</script>
