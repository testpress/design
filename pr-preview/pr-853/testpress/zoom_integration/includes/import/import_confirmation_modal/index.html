<div id="hs-import-confirmation-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[89] overflow-x-hidden overflow-y-auto pointer-events-none" role="dialog" tabindex="-1">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white border border-gray-200 rounded-xl pointer-events-auto shadow-xl dark:bg-neutral-800 dark:border-neutral-700">
      
      <div class="py-3 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
        <h3 class="font-semibold text-gray-900 dark:text-neutral-200">Confirm Import</h3>
        <button type="button" class="size-8 inline-flex justify-center items-center rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 dark:bg-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-600" data-hs-overlay="#hs-import-confirmation-modal">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <div class="p-4 space-y-4">
        <div class="flex gap-x-4">
          <div class="shrink-0 size-10 flex items-center justify-center rounded-full bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4">
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
              <path d="M8 16H3v5"/>
            </svg>
          </div>
          <div class="grow">
            <p class="text-sm text-gray-800 dark:text-neutral-300">
              Are you sure you want to import the selected <span class="font-semibold" x-text="selectedUsers.length"></span> licensed zoom users?
            </p>
            <p class="mt-1 text-sm text-gray-500 dark:text-neutral-500">
              These users' licenses will be imported and will be available for managing and scheduling zoom classes in your Testpress portal.
            </p>
          </div>
        </div>
      </div>

      <div class="p-4 flex justify-end gap-x-2 border-t border-gray-200 dark:border-neutral-700">
        <button type="button" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#hs-import-confirmation-modal">
          Cancel
        </button>
        <button type="button" @click="importUsers()" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700 focus:outline-hidden focus:bg-emerald-700 shadow-sm transition-colors" data-hs-overlay="#hs-import-confirmation-modal">
          Confirm and Import
        </button>
      </div>
    </div>
  </div>
</div>
