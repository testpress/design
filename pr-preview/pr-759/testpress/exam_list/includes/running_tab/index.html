      ],
      alertLine(alert) {
        return alert.centres === 1 ? alert.label + ' in 1 centre' : alert.label + ' in ' + alert.centres + ' centres'
      },
      setSort(key, dir) {
        this.sortKey = key
        this.sortDir = dir
      },
      barColor(pct) {
        if (pct >= 70) return 'bg-green-500 dark:bg-green-600'
        if (pct >= 40) return 'bg-amber-500 dark:bg-amber-600'
        return 'bg-red-500 dark:bg-red-600'
      },
      get filteredRows() {
        let list = this.rows
        const q = this.query.trim().toLowerCase()
        if (q) list = list.filter(r => r.name.toLowerCase().includes(q))
        if (this.healthFilter === 'healthy') list = list.filter(r => r.health === 'healthy')
        if (this.healthFilter === 'needs_attention') list = list.filter(r => r.health === 'warning' || r.health === 'critical')
        return list
      },
      get sortedRows() {
        const dir = this.sortDir === 'asc' ? 1 : -1
        const key = this.sortKey
        return [...this.filteredRows].sort((a, b) => {
          if (key === 'startedAt') return (new Date(a.startedAt) - new Date(b.startedAt)) * dir
          return (a[key] - b[key]) * dir
        })
      },
    }"
