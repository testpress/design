<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('fileUpload', (config = {}) => ({
            multiple: config.multiple || false,
            maxSize: 2 * 1024 * 1024, // default 2MB
            acceptedFormats: config.acceptedFormats || ['pdf'],
            files: [],
            isDragging: false,
            replaceIndex: null,
            errorMessage: '',

            init() {
                if (config.maxSize) {
                    this.maxSize = this.parseSize(config.maxSize);
                }
                
                // Watch files array to dynamically initialize Lucide icons on DOM changes
                this.$watch('files', () => {
                    this.$nextTick(() => {
                        if (window.lucide) {
                            window.lucide.createIcons({ root: this.$el });
                        }
                    });
                });
            },

            parseSize(sizeStr) {
                if (typeof sizeStr === 'number') return sizeStr;
                const match = sizeStr.match(/^(\d+(?:\.\d+)?)\s*(bytes|kb|mb|gb)$/i);
                if (!match) return 2 * 1024 * 1024;
                const num = parseFloat(match[1]);
                const unit = match[2].toLowerCase();
                const multipliers = {
                    bytes: 1,
                    kb: 1024,
                    mb: 1024 * 1024,
                    gb: 1024 * 1024 * 1024
                };
                return num * (multipliers[unit] || 1);
            },

            formatBytes(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            validateFile(file) {
                // Size validation
                if (file.size > this.maxSize) {
                    return `File is too large (${this.formatBytes(file.size)}). Max size is ${this.formatBytes(this.maxSize)}`;
                }
                
                // Extension validation
                const ext = file.name.split('.').pop().toLowerCase();
                const isAccepted = this.acceptedFormats.some(format => {
                    const cleaned = format.trim().toLowerCase().replace('.', '');
                    return cleaned === ext || cleaned === '*';
                });
                
                if (!isAccepted) {
                    return `Invalid file format. Accepted: ${this.acceptedFormats.join(', ')}`;
                }
                
                return null;
            },

            handleFileSelect(event) {
                const selectedFiles = Array.from(event.target.files);
                this.addFiles(selectedFiles);
                event.target.value = ''; // Reset input
            },

            handleDrop(event) {
                const droppedFiles = Array.from(event.dataTransfer.files);
                this.addFiles(droppedFiles);
            },

            addFiles(fileList) {
                if (fileList.length === 0) return;
                this.errorMessage = '';

                if (this.replaceIndex !== null) {
                    const file = fileList[0];
                    const error = this.validateFile(file);
                    
                    if (error) {
                        this.errorMessage = error;
                        this.replaceIndex = null;
                        return;
                    }

                    const fileObj = {
                        name: file.name,
                        size: this.formatBytes(file.size),
                        progress: 0,
                        status: 'uploading',
                        errorMessage: '',
                        extension: file.name.split('.').pop().toLowerCase()
                    };

                    this.files[this.replaceIndex] = fileObj;
                    const index = this.replaceIndex;
                    this.replaceIndex = null; // Reset

                    this.simulateUpload(this.files[index]);
                    return;
                }

                if (!this.multiple) {
                    // Clear previous files for single upload
                    this.files = [];
                }

                fileList.forEach(file => {
                    const error = this.validateFile(file);
                    
                    if (error) {
                        this.errorMessage = error;
                        return;
                    }

                    const fileObj = {
                        name: file.name,
                        size: this.formatBytes(file.size),
                        progress: 0,
                        status: 'uploading',
                        errorMessage: '',
                        extension: file.name.split('.').pop().toLowerCase()
                    };

                    this.files.push(fileObj);
                    this.simulateUpload(this.files[this.files.length - 1]);
                });
            },

            simulateUpload(fileObj) {
                const duration = 2000; // 2 seconds
                const stepTime = 100;
                const steps = duration / stepTime;
                let currentStep = 0;

                const interval = setInterval(() => {
                    currentStep++;
                    fileObj.progress = Math.min(100, Math.round((currentStep / steps) * 100));

                    if (currentStep >= steps) {
                        clearInterval(interval);
                        fileObj.status = 'success';
                    }
                }, stepTime);
            },

            removeFile(index) {
                this.files.splice(index, 1);
            }
        }));
    });
</script>
