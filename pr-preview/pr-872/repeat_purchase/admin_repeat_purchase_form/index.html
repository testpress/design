<script>
  function select2(searchUrl = '', multiple = false) {
    return {
      items: [],
      selectedItems: [],
      allFetchedItems: [],
      showLoading: false,
      nextPage: false,
      searchUrl: searchUrl,
      multiple: multiple,
      search_param: 'search',

      fetchItems(params = {}) {
        this.showLoading = true;
        let headers = {
          'accept': 'application/json',
          'content-type': 'application/json',
        }

        fetch(this.getSearchURL(params), {
          credentials: 'same-origin',
          headers: headers
        }).then(response => response.json())
          .then(data => {
            this.showLoading = false;
            this.items = this.processResult(data.results);
            if (!params.hasOwnProperty(this.search_param)){
              this.allFetchedItems.push(...this.items);
            }

            this.nextPage = this.processResult(data.next);
          })
          .catch(() => {
            this.showLoading = false;
          });
      },

      getSearchURL(paramsToAppend) {
        const queryParamsToAppend = new URLSearchParams(paramsToAppend).toString();
        const existingQueryString = this.searchUrl.split('?')[1];
        const searchURL = this.searchUrl.split('?')[0];

        if (existingQueryString) {
          return `${searchURL}?${existingQueryString}&${queryParamsToAppend}`;
        }
        return `${searchURL}?${queryParamsToAppend}`;
      },

      processResult(results) {
        return results
      },

      onItemSelect(selectedItem) {
        if (this.selectedItems.some(item => item.id === selectedItem.id)) {
          this.selectedItems = this.selectedItems.filter(item => item.id !== selectedItem.id)
        } else {
          if (!this.multiple) {
            this.selectedItems.pop();
          }
          this.selectedItems.push(selectedItem)
        }
      },

      removeItem(itemToRemove) {
        this.selectedItems = this.selectedItems.filter(item => item.id !== itemToRemove.id)
      },

      isItemSelected(item) {
        return this.selectedItems.some(e => e.id === item.id)
      },
    }
  }
</script>


<script>

function formValidator() {
  return {
    showError: false,
    validateForm(e) {
      this.showError = false;
      const purchased = document.querySelector('input[name="existing_purchased_products"]')?.value;
      const batches = document.querySelector('input[name="eligible_batches"]')?.value;
      const users = document.querySelector('input[name="eligible_users"]')?.value;

      const isEmpty = (val) => !val || val === '[]' || val.trim() === '';
      
      if (isEmpty(purchased) && isEmpty(batches) && isEmpty(users)) {
        e.preventDefault();
        this.showError = true;
      }
    }
  }
}

function ProductData(searchUrl, initialData = []) {

  return {

    showSearchProductDropdown: false,
    atTop: false,
    atEnd: false,

    ...select2(searchUrl, true),

    fetchItems(params = {}) {
      if (searchUrl.includes('products')) {
        this.items = [
          { id: 1, title: 'Sample Product 1' },
          { id: 2, title: 'Sample Product 2' },
          { id: 3, title: 'Sample Product 3' }
        ];
      } else if (searchUrl.includes('batches')) {
        this.items = [
          { id: 1, title: 'Sample Batch A', name: 'Sample Batch A' },
          { id: 2, title: 'Sample Batch B', name: 'Sample Batch B' },
          { id: 3, title: 'Sample Batch C', name: 'Sample Batch C' }
        ];
      } else if (searchUrl.includes('users')) {
        this.items = [
          { id: 1, title: 'user1@example.com', username: 'user1' },
          { id: 2, title: 'user2@example.com', username: 'user2' },
          { id: 3, title: 'user3@example.com', username: 'user3' }
        ];
      } else if (searchUrl.includes('repeat_purchase')) {
        this.items = [
          { id: 1, title: 'Sample Product 1' },
          { id: 2, title: 'Sample Product 2' },
          { id: 3, title: 'Sample Product 3' }
        ];
      }
    },

    selectedItems: [...initialData],
    currentPage: 1,
    storefetchedItems: [],
    inputSearch: false,

    getSelectedItemsIds() {
      return this.selectedItems.map(item => item.id);
    },

    InitializeStoredItems(){
      if(this.storefetchedItems.length === 0){
        this.storefetchedItems = [...this.items];
      }
    },

    displayItems() {
      if (this.inputSearch) {
        return this.items;
      } else {
        return this.storefetchedItems;
      }
    },

    fetchNextPage(){

      if(this.nextPage && !this.showLoading){

        this.currentPage++
        this.fetchItems({"page": this.currentPage})
        this.storefetchedItems = this.storefetchedItems.concat(this.items)

      }
    }
  };
}

</script>
