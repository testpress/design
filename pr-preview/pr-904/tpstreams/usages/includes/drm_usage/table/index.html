<div class="mx-auto mt-12 max-w-7xl flow-root 2xl:mt-14" x-show="totalLicenseRequests > 0">
  <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
    <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
      <table class="min-w-full divide-y divide-gray-300">
        <thead>
          <tr>
            <th scope="col" class="w-1/2 py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-0">
              <a href="#" @click.prevent="toggleSort('date')" class="group inline-flex">
  Date
  <span class="ml-2 flex-none rounded text-gray-900">
    <svg class="h-5 w-5 transition-transform duration-200" :class="sortBy === 'date' && sortOrder === 'desc' ? 'rotate-180 transform' : ''" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
    </svg>
  </span>
</a>

            </th>
            <th scope="col" class="w-1/2 px-3 py-3.5 text-left text-sm font-semibold text-gray-900">
              <a href="#" @click.prevent="toggleSort('count')" class="group inline-flex">
  License Requests
  <span class="ml-2 flex-none rounded text-gray-900">
    <svg class="h-5 w-5 transition-transform duration-200" :class="sortBy === 'count' && sortOrder === 'desc' ? 'rotate-180 transform' : ''" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
    </svg>
  </span>
</a>

            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 bg-white">
          <template x-for="day in daysInSelectedMonth" :key="day.date">
            <tr>
              <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 sm:pl-0" x-text="day.label"></td>
              <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500" x-text="formatNumber(day.count)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
