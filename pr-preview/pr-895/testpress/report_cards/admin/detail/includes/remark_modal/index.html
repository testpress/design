<!-- Regional Settings Modal -->
<div id="teacher-remark-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[100] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="teacher-remark-modal-label" x-data="{ remarkText: reportData.report.remarks }">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full relative overflow-hidden flex flex-col bg-white border border-overlay-line rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="py-4 px-4 md:px-6 flex justify-between items-center border-b border-overlay-divider">
        <h3 id="teacher-remark-modal-label" class="font-medium text-foreground">
          Share Your Remarks
        </h3>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:text-neutral-400 dark:focus:bg-neutral-600"
        aria-label="Close" data-hs-overlay="#teacher-remark-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-scrollbar-track [&::-webkit-scrollbar-thumb]:bg-scrollbar-thumb">
          <div class="p-4 pb-2 md:p-6 md:pb-1 space-y-6">
            <!-- Input -->
            <div>
                <label class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
                Please share your observations, comments, or suggestions
                </label>
                <textarea 
                x-model="remarkText"
                class="py-3 px-4 block w-full border-gray-200 rounded-lg sm:text-sm text-gray-700 placeholder:text-gray-400 focus:border-emerald-500 focus:ring-emerald-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-600 dark:focus:ring-neutral-600 min-h-[6rem]" rows="4" placeholder="Type your comments here…"></textarea>
            </div>
            <!-- End Input -->
          </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
        <div class="p-4 md:p-6 flex flex-col gap-2">
            <div class="flex-1 flex justify-end items-center gap-2">
                <button type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#teacher-remark-modal">
                    Cancel
                </button>

                <button 
                @click="reportData.report.remarks = remarkText"
                type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-emerald-600 border border-emerald-600 text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:ring-1 focus:ring-emerald-300 dark:focus:ring-emerald-500" data-hs-overlay="#teacher-remark-modal">
                    Add
                </button>
            </div>
        </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
<!-- End Regional Settings Modal -->
