<div id="hs-downgrade" class="hs-overlay hidden size-full fixed top-0 start-0 z-50 overflow-x-hidden overflow-y-auto" role="dialog" tabindex="-1" aria-labelledby="hs-downgrade-label">
  <div class="hs-overlay-open:opacity-100 hs-overlay-open:duration-500 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto min-h-[calc(100%-3.5rem)] flex items-center">
    <div class="w-full flex flex-col bg-white border shadow-sm rounded-xl pointer-events-auto">
      <div class="py-3 px-4 flex justify-between items-center border-b border-gray-200">
        <h3 id="hs-downgrade-label" class="font-bold text-gray-800">
          Confirm plan downgrade
        </h3>
        <button type="button" class="flex justify-center items-center size-7 text-sm font-semibold rounded-full border border-transparent text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none" aria-label="Close" data-hs-overlay="#hs-downgrade">
          <span class="sr-only">Close</span>
          <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>

      <div class="p-4 overflow-y-auto">
        <div class="space-y-4">
          <p class="text-gray-800">
            Your plan will be downgraded at the start of your next billing cycle.
            Your current plan will remain active until then.
          </p>
        </div>
      </div>

      <div class="flex justify-end items-center gap-x-2 py-3 px-4 border-t border-gray-200">
        <button type="button" class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none" data-hs-overlay="#hs-downgrade">
          Cancel
        </button>
        <button type="button" 
                @click="window.location.href = '/pr-preview/pr-769/tpstreams/billing/overview/?scheduled_downgrade=Starter'"
                class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none" 
                data-hs-overlay="#hs-downgrade">
          Confirm downgrade
        </button>
      </div>
    </div>
  </div>
</div>
