<div class="space-y-4">
<div class="flex flex-wrap justify-between items-center gap-2">
    <div class="flex flex-wrap items-center gap-3">
        <h1 class="text-lg font-medium text-foreground flex items-center gap-2">
            What's happening right now?
            <span class="relative flex size-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full size-2 bg-green-500"></span>
            </span>
        </h1>
    </div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-5">
    <!-- Card: Active Viewers -->
    <div class="overflow-hidden rounded-xl bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xs">
        <div class="p-5">
            <div class="flex items-center">
                <div class="shrink-0">
                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polygon points="10 8 16 12 10 16 10 8" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="flex items-center gap-x-2 truncate text-sm font-medium text-gray-500 dark:text-neutral-400">
                            Active Viewers
                            <div class="hs-tooltip inline-block">
                                <div class="hs-tooltip-toggle cursor-help">
                                    <svg class="shrink-0 size-4 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                                    <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-gray-900 dark:bg-white border border-transparent text-xs font-medium text-white dark:text-neutral-800 rounded-md shadow-2xs" role="tooltip">
                                        Users currently watching video, listening to audio, or reading ebooks.
                                    </span>
                                </div>
                            </div>
                        </dt>
                        <dd>
                            <div class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
                                1,200
                            </div>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">
                <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                        <polyline points="16 7 22 7 22 13"></polyline>
                    </svg>
                    15%
                </span>
                <span class="text-xs text-gray-500 dark:text-neutral-400">vs last hour</span>
            </div>
        </div>
    </div>
    <!-- End Card -->

    <!-- Card: New Signups -->
    <div class="overflow-hidden rounded-xl bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xs">
        <div class="p-5">
            <div class="flex items-center">
                <div class="shrink-0">
                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M19 8v6" />
                        <path d="M22 11h-6" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-sm font-medium text-gray-500 dark:text-neutral-400">
                            New Signups (Today)
                        </dt>
                        <dd>
                            <div class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
                                540
                            </div>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">
                <span class="inline-flex items-center gap-x-1 text-xs font-medium text-red-500 rounded-full">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline>
                        <polyline points="16 17 22 17 22 11"></polyline>
                    </svg>
                    1.7%
                </span>
                <span class="text-xs text-gray-500 dark:text-neutral-400">vs yesterday</span>
            </div>
        </div>
    </div>
    <!-- End Card -->

    <!-- Card: New Subscribers -->
    <div class="overflow-hidden rounded-xl bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xs">
        <div class="p-5">
            <div class="flex items-center">
                <div class="shrink-0">
                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <polyline points="16 11 18 13 22 9" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-sm font-medium text-gray-500 dark:text-neutral-400">
                            New Subscribers
                        </dt>
                        <dd>
                            <div class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
                                125
                            </div>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">
                <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                        <polyline points="16 7 22 7 22 13"></polyline>
                    </svg>
                    8%
                </span>
                <span class="text-xs text-gray-500 dark:text-neutral-400">vs yesterday</span>
            </div>
        </div>
    </div>
    <!-- End Card -->

    <!-- Card: Revenue -->
    <div class="overflow-hidden rounded-xl bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xs">
        <div class="p-5">
            <div class="flex items-center">
                <div class="shrink-0">
                    <svg class="shrink-0 size-6 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" x2="12" y1="2" y2="22" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg>
                </div>
                <div class="ml-5 w-0 flex-1">
                    <dl>
                        <dt class="truncate text-sm font-medium text-gray-500 dark:text-neutral-400">
                            Revenue (Today)
                        </dt>
                        <dd>
                            <div class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
                                ₹12,500
                            </div>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>
        <div class="bg-white dark:bg-neutral-800/30 px-5 py-3 border-t border-gray-100 dark:border-neutral-700">
            <div class="flex items-center gap-x-2">
                <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                        <polyline points="16 7 22 7 22 13"></polyline>
                    </svg>
                    12.5%
                </span>
                <span class="text-xs text-gray-500 dark:text-neutral-400">vs yesterday</span>
            </div>
        </div>
    </div>
    <!-- End Card -->
</div>
</div>
