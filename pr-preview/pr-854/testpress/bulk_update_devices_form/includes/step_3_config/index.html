<div>
  <div class="space-y-5">
    <!-- Web Browser -->
    <div class="flex items-start gap-x-3 cursor-pointer"
      @click="devices.includes('web') ? devices = devices.filter(d => d !== 'web') : devices.push('web')">
      <input type="checkbox" value="web" x-model="devices" 
        class="mt-1 h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600 pointer-events-none">
      <div>
        <label class="text-sm font-medium leading-6 text-gray-900">Web Browser</label>
        <p class="text-xs text-gray-500">Accessible via desktop and mobile browsers across all operating systems.</p>
      </div>
    </div>

    <!-- Mobile Application -->
    <div class="flex items-start gap-x-3 cursor-pointer"
      @click="devices.includes('mobile') ? devices = devices.filter(d => d !== 'mobile') : devices.push('mobile')">
      <input type="checkbox" value="mobile" x-model="devices" 
        class="mt-1 h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600 pointer-events-none">
      <div>
        <label class="text-sm font-medium leading-6 text-gray-900">Mobile Application</label>
        <p class="text-xs text-gray-500">Accessible via Android and iOS native applications with offline support.</p>
      </div>
    </div>

    <!-- Desktop Application -->
    <div class="flex items-start gap-x-3 cursor-pointer"
      @click="devices.includes('desktop') ? devices = devices.filter(d => d !== 'desktop') : devices.push('desktop')">
      <input type="checkbox" value="desktop" x-model="devices" 
        class="mt-1 h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-600 pointer-events-none">
      <div>
        <label class="text-sm font-medium leading-6 text-gray-900">Desktop Application</label>
        <p class="text-xs text-gray-500">Accessible via Windows and macOS native applications for a focused learning experience.</p>
      </div>
    </div>
  </div>

  <div x-show="devices.length === 0" class="mt-2 text-red-600 text-xs font-semibold animate-pulse">
    Please select at least one device to continue.
  </div>
</div>
