<script>
  function useSubjectFilter() {
    return {
      selectedSubjects: [],
      visibleCount: 4,
      searchQuery: '',
      subjects: [
        { id: 1,  name: 'Fiction' },
        { id: 2,  name: 'Non-Fiction' },
        { id: 3,  name: 'Science & Technology' },
        { id: 4,  name: 'History' },
        { id: 5,  name: 'Philosophy' },
        { id: 6,  name: 'Psychology' },
        { id: 7,  name: 'Business & Economics' },
        { id: 8,  name: 'Self-Help' },
        { id: 9,  name: 'Art & Design' },
        { id: 10, name: 'Biography & Memoir' },
        { id: 11, name: 'Politics & Society' },
        { id: 12, name: 'Health & Wellness' },
        { id: 13, name: 'Travel & Geography' },
        { id: 14, name: 'Children & Young Adult' },
        { id: 15, name: 'Religion & Spirituality' },
        { id: 16, name: 'Law & Justice' },
        { id: 17, name: 'Mathematics' },
        { id: 18, name: 'Literature & Poetry' },
        { id: 19, name: 'Environment & Nature' },
        { id: 20, name: 'Education & Teaching' },
      ],

      init() {
        this.setVisibleCount();
        window.addEventListener('resize', () => this.setVisibleCount());
      },

      setVisibleCount() {
        const isLg = window.innerWidth >= 1024;
        const maxContainerWidth = Math.min(window.innerWidth, 1280) - (isLg ? 64 : 32); 
        let availableWidth = maxContainerWidth - 250; 
        
        let count = 0;
        for (let i = 0; i < this.subjects.length; i++) {
          const pillWidth = (this.subjects[i].name.length * 7.5) + 36;
          
          if (availableWidth >= pillWidth) {
            availableWidth -= pillWidth;
            count++;
          } else {
            break;
          }
        }
        
        this.visibleCount = Math.max(1, count);
      },

      toggleSubject(id) {
        if (this.selectedSubjects.includes(id)) {
          this.selectedSubjects = this.selectedSubjects.filter(s => s !== id);
        } else {
          this.selectedSubjects.push(id);
        }
      },

      isSelected(id) {
        return this.selectedSubjects.includes(id);
      },

      filteredSubjects() {
        const q = this.searchQuery.trim().toLowerCase();
        if (!q) return this.subjects;
        return this.subjects.filter(s => s.name.toLowerCase().includes(q));
      }
    };
  }
</script>
