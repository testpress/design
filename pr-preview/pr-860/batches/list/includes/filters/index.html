<div class="pb-4 grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 border-b border-stone-200 ">
  <div>
    <!-- Search Input -->
    <form method="get" class="relative" x-data="{ ordering: '' }">
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-4 pl-4">
          <svg class="shrink-0 size-4 text-stone-500" xmlns="http://www.w3.org/2000/svg" width="24"
            height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </div>
        <input type="text"
          name="q"
          value=""
          class="py-[7px] pl-10 pe-8 block w-full bg-stone-100 border-transparent rounded-lg text-sm placeholder:text-stone-500 focus:border-green-500 focus:ring-green-600 disabled:opacity-50 disabled:pointer-events-none "
          placeholder="Search batches">
        <template x-if="ordering">
          <input type="hidden" name="o" :value="ordering">
        </template>
        <div class="hidden absolute inset-y-0 end-0 flex items-center pointer-events-none z-20 pe-1">
          <button type="button"
            class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600 "
            aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <path d="m15 9-6 6" />
              <path d="m9 9 6 6" />
            </svg>
          </button>
        </div>
      </div>
    </form>
    <!-- End Search Input -->
  </div>
  <div class="flex justify-end md:justify-end items-center gap-x-2">
    <!-- Filter By Tags Dropdown -->
    <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-right] relative inline-flex"
         x-data="{ 
           tagSearch: '',
           tags: [
             'Priority', '2024', 'UPSC', 'History', 'Economy', 'Art', 'Literature', 'Exam', 'Mock', 'Practice'
           ],
           get filteredTags() {
             return this.tags.filter(tag => tag.toLowerCase().includes(this.tagSearch.toLowerCase()));
           }
         }">
      <button id="hs-pro-dptiet" type="button"
        class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-sm hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-stone-50 "
        aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/>
          <path d="M7 7h.01"/>
        </svg>
        Filter by tags
      </button>

      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 min-w-48 w-56 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] "
        role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptiet">
        <div class="p-2 border-b border-stone-200">
          <div class="relative">
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3">
              <svg class="shrink-0 size-3 text-stone-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
            </div>
            <input type="text"
              x-model="tagSearch"
              class="py-1.5 ps-9 pe-3 block w-full bg-stone-100 border-transparent rounded-lg text-xs placeholder:text-stone-500 focus:border-green-500 focus:ring-green-600 disabled:opacity-50 disabled:pointer-events-none "
              placeholder="Search tags">
          </div>
        </div>
        <div class="p-1 space-y-0.5 max-h-60 overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300">
          <template x-for="tag in filteredTags" :key="tag">
            <label class="flex items-center gap-x-3 py-2 px-3 rounded-lg text-sm text-stone-800 hover:bg-stone-100 cursor-pointer ">
              <input type="checkbox" class="shrink-0 size-4 border-stone-200 rounded text-green-600 focus:ring-green-500 disabled:opacity-50 disabled:pointer-events-none ">
              <span x-text="tag"></span>
            </label>
          </template>
          <div x-show="filteredTags.length === 0" class="py-2 px-3 text-xs text-stone-500 italic">
            No tags found
          </div>
        </div>
      </div>
    </div>
    <!-- End Filter By Tags Dropdown -->

    <div class="hs-dropdown [--auto-close:true] relative inline-flex">
      <button id="hs-pro-dptied" type="button"
        class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-sm hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-stone-50 "
        aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="shrink-0 size-4">
          <path fill-rule="evenodd"
            d="M2.625 6.75a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Zm4.875 0A.75.75 0 0 1 8.25 6h12a.75.75 0 0 1 0 1.5h-12a.75.75 0 0 1-.75-.75ZM2.625 12a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0ZM7.5 12a.75.75 0 0 1 .75-.75h12a.75.75 0 0 1 0 1.5h-12A.75.75 0 0 1 7.5 12Zm-4.875 5.25a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Zm4.875 0a.75.75 0 0 1 .75-.75h12a.75.75 0 0 1 0 1.5h-12a.75.75 0 0 1-.75-.75Z"
            clip-rule="evenodd" />
        </svg>
        Action
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>
      <div
        class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-56 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] "
        role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptied"
      >
        <div class="p-1">
          <a href='#'
            class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-stone-800 hover:bg-stone-100 disabled:opacity-50 disabled:pointer-events-none "
            data-hs-overlay="#hs-pro-eipm">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="shrink-0 mt-0.5 size-4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 8.25H9m6 3H9m3 6-3-3h1.5a3 3 0 1 0 0-6M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>              
            Billing Categories
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
