






<div x-data="{ 
       open: false,
       toggle() { this.open = !this.open; },
       init() {
         this.$watch('open', value => {
           if (value) {
             document.body.classList.add('overflow-hidden');
             this.$nextTick(() => {
               if (this.$refs.closeBtn) this.$refs.closeBtn.focus();
               if (window.lucide) { window.lucide.createIcons(); }
             });
           } else {
             document.body.classList.remove('overflow-hidden');
           }
         });
       }
     }"
     @open-modal-approve-request-modal.window="open = true"
     @close-modal-approve-request-modal.window="open = false"
     class="inline-block">

  
  

  
  <div x-show="open"
       x-cloak
       class="fixed inset-0 z-[10000] overflow-y-auto"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modal-title-approve-request-modal">
    
    
    <div x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="open = false"
         class="fixed inset-0 bg-neutral-900/50 dark:bg-neutral-900/80 backdrop-blur-sm"></div>

    
    <div class="flex min-h-screen items-center justify-center p-4 text-center sm:p-0">
      
      
      <div x-show="open"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
           x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
           x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
           @keydown.escape.window="open = false"
           class="relative overflow-hidden rounded-xl bg-white dark:bg-neutral-800 text-start shadow-xl sm:my-8 w-full sm:max-w-lg border border-gray-200 dark:border-neutral-700 flex flex-col max-h-[90vh]">
        
        
        <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
          <div>
            <h2 id="modal-title-approve-request-modal" class="font-semibold text-gray-800 dark:text-neutral-200 text-sm sm:text-base">
              Approve Request
            </h2>
            
          </div>
          <button x-ref="closeBtn" type="button" @click="open = false" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-50 dark:bg-neutral-800 text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-700" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>

        
        <div class="overflow-y-auto p-5 flex-1 min-h-0 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 text-sm text-gray-700 dark:text-neutral-300">
          

  <p class="text-sm text-gray-800 dark:text-neutral-200 mb-4">Are you sure you want to approve this request?</p>

  <!-- Request Summary Block -->
  <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 dark:bg-neutral-800 dark:border-neutral-700 mb-4">
    <div x-html="approveModalData.requestSummary"></div>
  </div>

  <!-- Optional Comment -->
  <div class="mt-4">
    
<div class="w-full">
  
    <label for="approval-comment" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Approval Comment
    </label>
  

  <div class="relative w-full">
    <textarea id="approval-comment" 
              name=""
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Add approval notes (optional)..."
              
              
              
              
              ></textarea>
  </div>
  
  
</div>

  </div>

        </div>

        
        
          <div class="p-4 flex justify-end gap-x-2">
            
              

  
  
  

  
  

  

  
  

  
    <button type="button" class="inline-flex items-center justify-center gap-x-1.5 font-medium rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden transition-colors py-2 px-3 text-sm bg-white border border-gray-200 text-gray-800 hover:bg-gray-50 focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"   @click="open = false">
  

    
    

    Cancel

    

  
    </button>
  


            
            
              

  
  
  

  
  

  

  
  

  
    <button type="button" class="inline-flex items-center justify-center gap-x-1.5 font-medium rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden transition-colors py-2 px-3 text-sm bg-primary-600 border border-transparent text-white hover:bg-primary-700 focus:bg-primary-700 dark:focus:ring-offset-neutral-800"   @click="$dispatch('modal-confirmed-approve-request-modal'); open = false" >
  

    
    

    Approve Request

    

  
    </button>
  


            
          </div>
        

      </div>
    </div>
  </div>
</div>
