<!-- Daily Notifications card: Pricing-style layout, toggle + View Logs in header -->
<div class="flex flex-col bg-white border border-gray-200 overflow-hidden rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="py-3 px-5 flex flex-wrap justify-between items-center gap-x-5 gap-y-2 border-b border-gray-200 dark:border-neutral-700">
    <h2 class="inline-block font-semibold text-sm sm:text-base text-gray-800 dark:text-neutral-200">
      Daily Notifications
    </h2>
    <div class="flex items-center gap-x-2">
      <a href="/settings/whatsapp-usage-logs/"
        class="py-1.5 sm:py-2 px-2.5 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
        View Logs
      </a>
      <!-- Graph / Table view toggle -->
      <div class="inline-flex items-center gap-x-1 rounded-md border border-gray-200 bg-gray-50 p-0.5 dark:border-neutral-700 dark:bg-neutral-800">
        <div class="hs-tooltip [--placement:top] inline-block">
          <button
            type="button"
            @click="setViewMode('graph')"
            class="hs-tooltip-toggle py-1.5 sm:py-2 px-2.5 rounded inline-flex items-center justify-center transition-colors focus:outline-hidden"
            :class="viewMode === 'graph'
              ? 'bg-white text-gray-800 shadow-sm dark:bg-neutral-700 dark:text-neutral-200'
              : 'text-gray-600 hover:bg-white/50 dark:text-neutral-400 dark:hover:bg-neutral-700/50'"
            aria-label="Graph view"
          >
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 16c.5-2 1.5-7 4-7 2 0 2 3 4 3 2.5 0 4.5-5 5-7"/></svg>
            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded-md shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200" role="tooltip">Graph view</span>
          </button>
        </div>
        <div class="hs-tooltip [--placement:top] inline-block">
          <button
            type="button"
            @click="setViewMode('table')"
            class="hs-tooltip-toggle py-1.5 sm:py-2 px-2.5 rounded inline-flex items-center justify-center transition-colors focus:outline-hidden"
            :class="viewMode === 'table'
              ? 'bg-white text-gray-800 shadow-sm dark:bg-neutral-700 dark:text-neutral-200'
              : 'text-gray-600 hover:bg-white/50 dark:text-neutral-400 dark:hover:bg-neutral-700/50'"
            aria-label="Table view"
          >
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-10 py-1 px-2 bg-white border border-gray-200 text-xs font-medium text-gray-800 rounded-md shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200" role="tooltip">Table view</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="">
    <!-- Graph View -->
    <div x-show="viewMode === 'graph'" x-transition class="min-h-[215px] md:min-h-[315px] p-5">
      <div id="whatsapp-daily-chart" class="min-h-[215px] md:min-h-[315px] -mx-2"></div>
    </div>
    <!-- Table View -->
    <div x-show="viewMode === 'table'" x-transition>
      <!-- Table View: daily notifications for selected month (design with sort headers) -->
<div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-800 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-600">
  <div class="min-w-full inline-block align-middle">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700 dark:border-neutral-700">
      <thead class="bg-gray-50 dark:bg-neutral-800">
        <tr>
          <th scope="col" class="min-w-[10rem]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button id="hs-wa-date-sort" type="button" class="hs-dropdown-toggle px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 dark:text-neutral-400 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Sort Date">
                Date
                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
              </button>
              <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical" aria-labelledby="hs-wa-date-sort">
                <div class="p-1">
                  <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    Sort ascending
                  </button>
                  <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[10rem]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button id="hs-wa-date-sort" type="button" class="hs-dropdown-toggle px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 dark:text-neutral-400 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Sort Date">
                Notifications Sent
                <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
              </button>
              <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl" role="menu" aria-orientation="vertical" aria-labelledby="hs-wa-date-sort">
                <div class="p-1">
                  <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    Sort ascending
                  </button>
                  <button type="button" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none">
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[6rem] px-5 py-2.5 text-end text-sm font-normal text-gray-500 dark:text-neutral-400">
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
        <template x-for="day in daysInSelectedMonth" :key="day.date">
          <tr>
            <td class="size-px whitespace-nowrap">
              <div class="py-3 px-5 text-sm text-gray-800 dark:text-neutral-200" x-text="day.dayOfMonth + ' ' + (selectedMonthLabel ? selectedMonthLabel.split(' ')[0] : '')"></div>
            </td>
            <td class="size-px whitespace-nowrap">
              <div class="py-3 px-5">
                <span class="text-sm font-semibold text-gray-800 dark:text-neutral-200" x-text="day.count"></span>
              </div>
            </td>
            <td class="size-px whitespace-nowrap py-3 px-5 text-end">
              <a class="inline-flex items-center gap-x-0.5 text-[13px] text-emerald-600 underline underline-offset-2 hover:decoration-2 focus:outline-hidden focus:decoration-2 disabled:opacity-50 disabled:pointer-events-none dark:text-emerald-400 dark:hover:text-emerald-300" :href="'/settings/whatsapp-usage-logs/?date=' + day.date" target="_parent">
                View log
                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"></path></svg>
              </a>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>
<!-- End Table Content -->

    </div>
  </div>
  <!-- End Body -->
</div>
