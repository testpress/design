<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('publish', {
      ebookUploaded: false,
      metadata: {
        title: '',
        author: '',
        publisher: '',
        language: '',
        subject: ''
      },
      coverUploaded: false,
      access: {
        visibility: '',
        groups: []
      },
      license: {
        maxActiveReaders: null,
        totalBorrowLimit: null,
        expiryDate: '',
        borrowDuration: ''
      },
      get accessSummary() {
        if (this.access.visibility === 'Public') return 'Public';
        if (this.access.visibility === 'Restricted') {
          const len = this.access.groups.length;
          return len > 0 ? `${len} Group${len > 1 ? 's' : ''}` : 'Restricted';
        }
        return 'Not set';
      },
      get isMetadataComplete() {
        const m = this.metadata;
        return m.title.trim() && m.author.trim() && m.publisher.trim() && m.language.trim() && m.subject.trim();
      },
      get isAccessConfigured() {
        if (this.access.visibility === 'Public') return true;
        return this.access.visibility === 'Restricted' && this.access.groups.length > 0;
      },
      get isLicenseConfigured() {
        const l = this.license;
        return l.maxActiveReaders > 0 || l.totalBorrowLimit > 0 || l.expiryDate;
      },
      get isReady() {
        return this.ebookUploaded && this.isMetadataComplete && this.coverUploaded && this.isAccessConfigured && this.isLicenseConfigured;
      },
      get completedCount() {
        let count = 0;
        if (this.ebookUploaded) count++;
        if (this.isMetadataComplete) count++;
        if (this.coverUploaded) count++;
        if (this.isAccessConfigured) count++;
        if (this.isLicenseConfigured) count++;
        return count;
      },
      get totalCount() {
        return 5;
      }
    });

    // Form Managers
    Alpine.data('visibilityManager', () => ({
      visibility: '',
      accessGroups: [],
      open: false,
      search: '',
      position: 'bottom',
      showNewGroupModal: false,
      newGroup: { name: '', description: '' },
      options: [
        { id: 'eng', name: 'Engineering Team' },
        { id: 'mkt', name: 'Marketing Dept' },
        { id: 'pm', name: 'Product Managers' },
        { id: 'hr', name: 'HR Department' },
        { id: 'fin', name: 'Finance Dept' },
        { id: 'mod', name: 'Content Moderators' },
        { id: 'sys', name: 'System Administrators' },
        { id: 'pre', name: 'Premium Members' },
        { id: 'stu', name: 'Student Union' },
        { id: 'fac', name: 'Faculty Board' },
        { id: 'alm', name: 'Alumni Association' }
      ],
      init() {
        this.$watch('visibility', v => this.$store.publish.access.visibility = v);
        this.$watch('accessGroups', v => this.$store.publish.access.groups = v);
      },
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const trigger = this.$refs.trigger;
            const rect = trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 280 ? 'top' : 'bottom';
          });
        }
      },
      saveNewGroup() {
        if (!this.newGroup.name.trim()) return;
        const id = this.newGroup.name.toLowerCase().trim().replace(/\s+/g, '-');
        if (this.options.find(o => o.id === id)) {
          this.accessGroups.push(id);
        } else {
          const group = { id, name: this.newGroup.name.trim() };
          this.options.unshift(group);
          this.accessGroups.push(id);
        }
        this.newGroup = { name: '', description: '' };
        this.showNewGroupModal = false;
      },
      get filteredOptions() {
        return this.options.filter(o => o.name.toLowerCase().includes(this.search.toLowerCase()))
      }
    }));

    Alpine.data('publisherSelect', (defaultOptions = []) => ({
      open: false,
      search: '',
      position: 'bottom',
      options: defaultOptions,
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const trigger = this.$refs.publisherTrigger;
            const rect = trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 280 ? 'top' : 'bottom';
          });
        }
      },
      get filteredOptions() {
        return this.options.filter(o => o.toLowerCase().includes(this.search.toLowerCase()))
      },
      select(val) {
        this.metadata.publisher = this.metadata.publisher === val ? '' : val;
        this.open = false;
        this.search = '';
      }
    }));

    Alpine.data('languageSelect', () => ({
      open: false,
      search: '',
      position: 'bottom',
      options: window.getLanguageList ? window.getLanguageList() : [],
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const trigger = this.$refs.langTrigger;
            const rect = trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 280 ? 'top' : 'bottom';
          });
        }
      },
      get filteredOptions() {
        return this.options.filter(o => o.name.toLowerCase().includes(this.search.toLowerCase()))
      },
      select(option) {
        this.metadata.language = this.metadata.language === option.name ? '' : option.name;
        this.open = false;
        this.search = '';
      }
    }));

    Alpine.data('subjectSelect', (defaultOptions = []) => ({
      open: false,
      search: '',
      position: 'bottom',
      options: defaultOptions,
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const trigger = this.$refs.subjectTrigger;
            const rect = trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 280 ? 'top' : 'bottom';
          });
        }
      },
      get filteredOptions() {
        return this.options.filter(o => o.toLowerCase().includes(this.search.toLowerCase()))
      },
      select(val) {
        this.metadata.subjects = (this.metadata.subjects && this.metadata.subjects[0] === val) ? [] : [val];
        this.open = false;
        this.search = '';
      }
    }));

    Alpine.data('borrowDurationSelect', () => ({
      open: false,
      selected: '',
      options: ['1 Day', '3 Days', '7 Days', '14 Days', '21 Days', '30 Days', '60 Days', '90 Days', 'Unlimited'],
      position: 'bottom',
      init() {
        this.$store.publish.license.borrowDuration = this.selected;
        this.$watch('selected', v => this.$store.publish.license.borrowDuration = v);
      },
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const rect = this.$refs.trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 300 ? 'top' : 'bottom';
          });
        }
      },
      select(val) {
        this.selected = val;
        this.open = false;
      }
    }));
  });
</script>
