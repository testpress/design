

<section id="tooltip-component" class="mb-16 pt-8">
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="help-circle" class="w-6 h-6 text-gray-800 dark:text-white"></i>
            <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Tooltip</h2>
        </div>
    </div>

    <div class="space-y-8">

        <!-- Placement Examples -->
        <div>
            <div class="flex justify-center items-center py-16 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs">
                <div class="relative w-80 h-56 flex items-center justify-center">
                    
                    <!-- Top placement -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2">
                        
  
  
  
  
  

  

  <div x-data="{ active: false }"
       @mouseenter="active = true"
       @mouseleave="active = false"
       @focusin="active = true"
       @focusout="active = false"
       @keydown.escape.window="active = false"
       class="relative inline-flex items-center align-middle">
       
    <!-- Trigger -->
    <div class="inline-flex items-center justify-center"
         aria-describedby="tooltip-3925">
      <button class="size-10 inline-flex justify-center items-center bg-gray-50 hover:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-lg text-gray-800 dark:text-neutral-200 shadow-xs"><i data-lucide="arrow-up" class="size-4"></i></button>
    </div>

    <!-- Tooltip Card -->
    <div x-show="active"
         x-cloak
         id="tooltip-3925"
         role="tooltip"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute z-50 py-1.5 px-2.5 bg-gray-900 dark:bg-white text-xs font-medium text-white dark:text-neutral-800 rounded-md shadow-2xs break-words max-w-xs bottom-full left-1/2 -translate-x-1/2 mb-2">
      
      Tooltip on top

      <!-- Tooltip Arrow -->
      
        <span class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-gray-900 dark:border-t-white"></span>
      
    </div>
  </div>
