<script>
  function singleSelectDatePicker() {
    return {
      open: false,
      position: 'bottom',
      selectedDate: '',
      currentMonth: new Date().getMonth(),
      currentYear: new Date().getFullYear(),
      monthOpen: false,
      yearOpen: false,
      months: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
      years: Array.from({length: 10}, (_, i) => new Date().getFullYear() - 5 + i),
      get monthName() {
        return this.months[this.currentMonth];
      },
      get calendarDays() {
        const days = [];
        const firstDay = new Date(this.currentYear, this.currentMonth, 1).getDay();
        const lastDay = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
        const prevLastDay = new Date(this.currentYear, this.currentMonth, 0).getDate();

        // Days from previous month (shifted for Mo-Su)
        const shift = (firstDay + 6) % 7;
        for (let i = shift; i > 0; i--) {
          days.push({ day: prevLastDay - i + 1, month: this.currentMonth - 1, year: this.currentYear, isCurrentMonth: false });
        }

        // Days from current month
        for (let i = 1; i <= lastDay; i++) {
          days.push({ day: i, month: this.currentMonth, year: this.currentYear, isCurrentMonth: true });
        }

        // Days from next month
        const remaining = 42 - days.length;
        for (let i = 1; i <= remaining; i++) {
          days.push({ day: i, month: this.currentMonth + 1, year: this.currentYear, isCurrentMonth: false });
        }
        return days;
      },
      toggle() {
        this.open = !this.open;
        if (this.open) {
          this.$nextTick(() => {
            const trigger = this.$refs.trigger;
            const rect = trigger.getBoundingClientRect();
            const spaceBelow = window.innerHeight - rect.bottom;
            this.position = spaceBelow < 400 ? 'top' : 'bottom';
          });
        }
      },
      selectDate(day, month, year) {
        const date = new Date(year, month, day);
        this.selectedDate = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        this.open = false;
      },
      prevMonth() {
        if (this.currentMonth === 0) {
          this.currentMonth = 11;
          this.currentYear--;
        } else {
          this.currentMonth--;
        }
      },
      nextMonth() {
        if (this.currentMonth === 11) {
          this.currentMonth = 0;
          this.currentYear++;
        } else {
          this.currentMonth++;
        }
      },
      isSelected(day, month, year) {
        if (!this.selectedDate) return false;
        const d = new Date(year, month, day).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        return d === this.selectedDate;
      },
      isToday(day, month, year) {
        const today = new Date();
        return day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
      }
    };
  }
</script>
