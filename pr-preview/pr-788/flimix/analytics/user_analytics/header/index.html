<div class="flex flex-wrap justify-between items-center gap-2" x-data="userAnalyticsDateRange()" @user-analytics-date-range-applied.window="label = $event.detail.label">
  <div>
    <h1 class="text-lg md:text-xl font-semibold text-stone-800 dark:text-neutral-200">
      User analytics
    </h1>
    <p class="text-sm text-stone-500 dark:text-neutral-400">
      Track how viewers watch, return, and drop off across your OTT platform.
    </p>
  </div>
  <div class="flex justify-end items-center gap-x-2">
    <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-end] inline-flex">
      <button id="user-analytics-date-range-toggle" type="button"
        class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-stone-300 bg-white text-stone-800 shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:border-neutral-600 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false" aria-label="Date range">
        <span x-text="label"></span>
        <svg class="shrink-0 size-4 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24"
          height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="m6 9 6 6 6-6" />
        </svg>  
      </button>
      <div
        class="hs-dropdown-menu transition-[opacity,margin] duration hs-dropdown-open:opacity-100 opacity-0 hidden min-w-[11rem] z-50 bg-white rounded-lg shadow-lg border border-stone-200 py-1 dark:bg-neutral-800 dark:border-neutral-700"
        role="menu" aria-orientation="vertical" aria-labelledby="user-analytics-date-range-toggle">
        <button type="button" @click="setRange('7')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 7 days</button>
        <button type="button" @click="setRange('30')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 30 days</button>
        <button type="button" @click="setRange('60')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 2 months</button>
        <button type="button" @click="setRange('90')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 3 months</button>
        <button type="button" @click="setRange('180')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 6 months</button>
        <button type="button" @click="setRange('365')"
          class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-200 dark:hover:bg-neutral-700"
          role="menuitem">Last 12 months</button>
      </div>
    </div>
    <input type="hidden" id="user-analytics-date-range" value="30" />
    <button type="button"
      class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-stone-300 bg-white text-stone-700 hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:border-neutral-600 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
      aria-label="Export">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
        class="shrink-0">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" x2="12" y1="15" y2="3" />
      </svg>
      Export
    </button>
  </div>
</div>
<script>
  document.addEventListener('alpine:init', function () {
    Alpine.data('userAnalyticsDateRange', function () {
      const labels = {
        '7': 'Last 7 days',
        '30': 'Last 30 days',
        '60': 'Last 2 months',
        '90': 'Last 3 months',
        '180': 'Last 6 months',
        '365': 'Last 12 months'
      };
      return {
        label: 'Last 30 days',
        setRange(value) {
          const el = document.getElementById('user-analytics-date-range');
          if (!el) return;
          el.value = value;
          this.label = labels[value] || (value + ' days');
          el.dispatchEvent(new Event('change', { bubbles: true }));
          var toggle = document.getElementById('user-analytics-date-range-toggle');
          if (window.HSDropdown && toggle) {
            try {
              window.HSDropdown.getInstance(toggle).close();
            } catch (e) { }
          }
        }
      };
    });
  });
</script>
