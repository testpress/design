

<div class="mt-4 space-y-6">
  
<div class="flex items-center justify-between pb-6 border-b border-gray-200 dark:border-neutral-700">
  <span class="flex flex-grow flex-col">
    <h2 class="text-base font-semibold leading-7 text-gray-900 dark:text-neutral-200">
      Make Pre-exam Reflection Mandatory
    </h2>
    <span class="text-sm text-gray-500 dark:text-neutral-400 break-words pr-5">
      When enabled, students must complete the pre-exam reflection before starting the exam.
    </span>
  </span>
  <form>
    <input type="checkbox" name="isPreMandatory" x-model="isPreMandatory" class="hidden" />
    <button
      type="button"
      class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:ring-offset-2"
      role="switch"
      :aria-checked="isPreMandatory"
      :class="{'bg-emerald-600': isPreMandatory, 'bg-gray-200': !isPreMandatory}"
      @click="isPreMandatory = !isPreMandatory"
    >
      <span class="sr-only">Enable Mandatory Pre-exam</span>
      <span
        aria-hidden="true"
        class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
        :class="{'translate-x-5': isPreMandatory, 'translate-x-0': !isPreMandatory}"
      ></span>
    </button>
  </form>
</div>


  
<div class="flex items-center justify-between ">
  <span class="flex flex-grow flex-col">
    <h2 class="text-base font-semibold leading-7 text-gray-900 dark:text-neutral-200">
      Make Post-exam Reflection Mandatory
    </h2>
    <span class="text-sm text-gray-500 dark:text-neutral-400 break-words pr-5">
      When enabled, students must complete the post-exam reflection before viewing their results.
    </span>
  </span>
  <form>
    <input type="checkbox" name="isPostMandatory" x-model="isPostMandatory" class="hidden" />
    <button
      type="button"
      class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:ring-offset-2"
      role="switch"
      :aria-checked="isPostMandatory"
      :class="{'bg-emerald-600': isPostMandatory, 'bg-gray-200': !isPostMandatory}"
      @click="isPostMandatory = !isPostMandatory"
    >
      <span class="sr-only">Enable Mandatory Post-exam</span>
      <span
        aria-hidden="true"
        class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"
        :class="{'translate-x-5': isPostMandatory, 'translate-x-0': !isPostMandatory}"
      ></span>
    </button>
  </form>
</div>

</div>
