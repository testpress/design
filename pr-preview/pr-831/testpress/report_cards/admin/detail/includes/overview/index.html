<!-- Overview Card -->
<div class="bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-800 dark:border-neutral-700 p-5 sm:p-6">  

  <!-- Report Metadata: Student, Staff, Institute, Date -->
  <div class="grid grid-cols-3 gap-5">
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Student</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.student_name"></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Evaluated By</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.staff_name"></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 dark:text-neutral-400 mb-1">Course</p>
      <p class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="reportData.report.course"></p>
    </div>
  </div>

  <!-- Description -->
  <hr class="my-5 border-gray-200 dark:border-neutral-700">
  <p class="text-sm text-gray-600 dark:text-neutral-400 leading-relaxed max-w-3xl" x-text="reportData.report.description"></p>

</div>
