<!doctype html>
<html class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limeread</title>

  <!-- Isolated Tailwind v4 build for Limeread -->
  <link rel="stylesheet" href="/pr-preview/pr-867/css/limeread.css" />

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/clipboard@2.0.11/dist/clipboard.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>


  <style>
    [x-cloak] {
      display: none !important;
    }

    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <script>
    (function () {
      const html = document.querySelector('html');
      const isLightOrAuto = localStorage.getItem('hs_theme') === 'light' || (localStorage.getItem('hs_theme') === 'auto' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
      const isDarkOrAuto = localStorage.getItem('hs_theme') === 'dark' || (localStorage.getItem('hs_theme') === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isLightOrAuto && html.classList.contains('dark')) html.classList.remove('dark');
      else if (isDarkOrAuto && html.classList.contains('light')) html.classList.remove('light');
      else if (isDarkOrAuto && !html.classList.contains('dark')) html.classList.add('dark');
      else if (isLightOrAuto && !html.classList.contains('light')) html.classList.add('light');
    })();
  </script>
  
</head>


<div class="grid min-h-svh lg:grid-cols-2">
  <div class="flex flex-col gap-4 p-6 md:p-10">
    <div class="flex justify-center gap-2 md:justify-start">
      <a href="#" class="flex items-center gap-2 font-medium">
        <div class="flex size-6 items-center justify-center rounded-md bg-primary text-primary-foreground">
          <!-- GalleryVerticalEnd (Lucide Icon) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="size-4">
            <path d="M12 7v14" />
            <path
              d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z" />
          </svg>
        </div>
        Limeread
      </a>
    </div>
    <div class="flex flex-1 items-center justify-center">
      <div class="w-full max-w-xs">
        
<div x-data="{ sent: false, resent: false, email: '' }">
  <!-- View 1: Request Reset Form -->
  <form x-show="!sent" @submit.prevent="sent = true" class="flex flex-col gap-6">
    <div class="flex flex-col items-center gap-1 text-center">
      <h1 class="text-2xl font-bold">Forgot password?</h1>
      <p class="text-sm text-balance text-muted-foreground">
        Enter your email and we’ll send you a reset link.
      </p>
    </div>

    <div class="grid gap-2">
      
<div>
  <label for="email" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
    Email
  </label>
  <input type="email" id="email" required
    x-model="email"
    class="py-2 sm:py-2.5 px-3 block w-full bg-background border border-input rounded-lg sm:text-sm text-foreground placeholder:text-muted-foreground focus:border-primary focus:ring-1 focus:ring-primary focus:outline-hidden disabled:opacity-50 disabled:pointer-events-none"
    placeholder="m@example.com">
</div>

    </div>

    









<button
  type="submit"
  data-slot="button"
  data-variant="default"
  data-size="default"
  class="inline-flex shrink-0 items-center justify-center gap-x-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all outline-none focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 disabled:pointer-events-none disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 [&amp;_svg]:pointer-events-none [&amp;_svg]:shrink-0 [&amp;_svg:not([class*=&#39;size-&#39;])]:size-4 bg-primary text-primary-foreground hover:bg-primary/90 py-2.5 px-3 w-full"
>
  
    Send email
  
</button>


    
<p data-slot="field-description" class="text-sm leading-normal font-normal text-muted-foreground group-has-[[data-orientation=horizontal]]/field:text-balance last:mt-0 nth-last-2:-mt-1 [[data-variant=legend]+&]:-mt-1.5 [&>a]:underline [&>a]:underline-offset-4 [&>a:hover]:text-primary text-center">
  
      You didn&apos;t forget your password?
      <a href="/pr-preview/pr-867/limeread/login/" class="underline underline-offset-4">
        Sign in
      </a>
    
</p>

  </form>

  <!-- View 2: Reset Link Sent Page -->
  <div x-show="sent" x-cloak class="flex flex-col gap-6">
    <div class="flex flex-col items-center gap-1 text-center">
      <div class="mb-5 sm:mb-7 text-center">
        <span class="shrink-0 size-14 md:size-16 mx-auto flex justify-center items-center border-2 border-primary text-primary rounded-full">
          <svg class="shrink-0 size-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"></path>
          </svg>
        </span>
      </div>
      <h1 class="text-2xl font-bold">Reset link sent</h1>
      <p class="text-sm text-balance text-muted-foreground">
        We’ve sent a password reset link to <span class="font-medium text-foreground" x-text="email"></span>.
      </p>
    </div>

    <div class="grid gap-2">
      <a href="/pr-preview/pr-867/limeread/login/" class="w-full">
        









<button
  type="button"
  data-slot="button"
  data-variant="default"
  data-size="default"
  class="inline-flex shrink-0 items-center justify-center gap-x-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all outline-none focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50 disabled:pointer-events-none disabled:opacity-50 aria-invalid:border-destructive aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 [&amp;_svg]:pointer-events-none [&amp;_svg]:shrink-0 [&amp;_svg:not([class*=&#39;size-&#39;])]:size-4 bg-primary text-primary-foreground hover:bg-primary/90 py-2.5 px-3 w-full"
>
  
    Back to Login
  
</button>

      </a>
    </div>

    
<p data-slot="field-description" class="text-sm leading-normal font-normal text-muted-foreground group-has-[[data-orientation=horizontal]]/field:text-balance last:mt-0 nth-last-2:-mt-1 [[data-variant=legend]+&]:-mt-1.5 [&>a]:underline [&>a]:underline-offset-4 [&>a:hover]:text-primary text-center">
  
      Didn&apos;t receive an email?
      <button type="button" @click="resent = true; setTimeout(() => resent = false, 2000)" class="underline underline-offset-4 cursor-pointer hover:text-primary bg-transparent border-0 p-0 font-normal text-sm text-muted-foreground hover:underline">
        Resend
      </button>
      <span x-show="resent" x-transition class="block text-xs text-emerald-600 dark:text-emerald-400 mt-1 font-medium">
        Reset link resent!
      </span>
    
</p>

  </div>
</div>

      </div>
    </div>
  </div>
  <div class="relative hidden bg-muted lg:block">
    <img src="/pr-preview/pr-867/img/lime_read/library.jpg" alt="Image"
      class="absolute inset-0 h-full w-full object-cover dark:brightness-[0.2] dark:grayscale" />
  </div>
</div>








</html>
