<section id="toast-component" class="mb-16 pt-8">
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="bell-ring" class="w-6 h-6 text-gray-800 dark:text-white"></i>
            <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Toast / Notifications</h2>
        </div>
    </div>

    <div class="space-y-8">
        
        <!-- Variants -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Variants</h3>
            <div class="flex flex-wrap gap-4 items-center justify-center py-12 px-6 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs">
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Successfully saved!', description: 'Your changes have been updated.', variant: 'success' })"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-green-100 text-green-800 hover:bg-green-200 focus:outline-hidden dark:bg-green-500/10 dark:text-green-400 dark:hover:bg-green-500/20">
                    Success Toast
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Upload failed', description: 'The file size exceeds the 10MB limit.', variant: 'error' })"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-red-100 text-red-800 hover:bg-red-200 focus:outline-hidden dark:bg-red-500/10 dark:text-red-400 dark:hover:bg-red-500/20">
                    Error Toast
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'System maintenance', description: 'Server will be restarted in 5 minutes.', variant: 'warning' })"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-orange-100 text-orange-800 hover:bg-orange-200 focus:outline-hidden dark:bg-orange-500/10 dark:text-orange-400 dark:hover:bg-orange-500/20">
                    Warning Toast
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'New message received', description: 'You have 3 unread messages in your inbox.', variant: 'info' })"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-blue-100 text-blue-800 hover:bg-blue-200 focus:outline-hidden dark:bg-blue-500/10 dark:text-blue-400 dark:hover:bg-blue-500/20">
                    Info Toast
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Settings applied', description: 'Your display preferences are updated.', variant: 'neutral' })"
                        class="py-2 px-4 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
                    Neutral Toast
                </button>
            </div>
        </div>

        <!-- Features & Layouts -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Progress Bar & Actions -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Features</h3>
                <div class="flex flex-col gap-4 py-8 px-6 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs">
                    <button type="button" 
                            @click="$dispatch('toast', { title: 'Processing video', description: 'This usually takes about 10 seconds...', variant: 'info', showProgress: true, duration: 10000 })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        With Progress Bar
                    </button>
                    <button type="button" 
                            @click="$dispatch('toast', { title: 'Discussion moved', description: 'The topic was moved to general.', variant: 'neutral', actionLabel: 'Undo', actionHandler: () => alert('Undo clicked!') })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        With Action Button
                    </button>
                    <button type="button" 
                            @click="$dispatch('toast', { title: 'Critical Alert', description: 'This toast requires manual dismissal. It will stay until closed.', variant: 'error', autoDismiss: false })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        Persistent (No Auto-Dismiss)
                    </button>
                </div>
            </div>

            <!-- Content Variations -->
            <div>
                <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Content Layouts</h3>
                <div class="flex flex-col gap-4 py-8 px-6 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs">
                    <button type="button" 
                            @click="$dispatch('toast', { title: 'Document Saved', variant: 'success', icon: false })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        Title Only (No Description/Icon)
                    </button>
                    <button type="button" 
                            @click="$dispatch('toast', { description: 'This is a description-only toast without a title to show minimal layout padding adjustments.', variant: 'neutral', icon: 'zap' })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        Description Only
                    </button>
                    <button type="button" 
                            @click="$dispatch('toast', { title: 'System Update', description: 'Version 2.4.1 has been installed.', variant: 'info', size: 'compact' })"
                            class="py-2 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700">
                        Compact Size
                    </button>
                </div>
            </div>
        </div>

        <!-- Positions -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Placements & Stacking</h3>
            <div class="grid grid-cols-3 gap-4 py-8 px-6 bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xs text-center">
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Top Left', description: 'Appearing in top left.', position: 'top-left' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-up-left" class="size-5"></i>
                    Top Left
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Top Center', description: 'Appearing in top center.', position: 'top-center' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-up" class="size-5"></i>
                    Top Center
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Top Right', description: 'Appearing in top right.', position: 'top-right', variant: 'success' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-up-right" class="size-5"></i>
                    Top Right
                </button>

                <button type="button" 
                        @click="$dispatch('toast', { title: 'Bottom Left', description: 'Appearing in bottom left.', position: 'bottom-left' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-down-left" class="size-5"></i>
                    Bottom Left
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Bottom Center', description: 'Appearing in bottom center.', position: 'bottom-center' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-down" class="size-5"></i>
                    Bottom Center
                </button>
                <button type="button" 
                        @click="$dispatch('toast', { title: 'Bottom Right', description: 'Default position in bottom right.', position: 'bottom-right', variant: 'info' })"
                        class="py-6 px-4 flex flex-col items-center justify-center gap-2 text-sm font-medium rounded-lg border border-gray-200 border-dashed text-gray-500 hover:bg-gray-50 dark:border-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-800/50">
                    <i data-lucide="arrow-down-right" class="size-5"></i>
                    Bottom Right
                </button>
            </div>
            <p class="mt-4 text-xs text-center text-gray-500 dark:text-neutral-500">
                Tip: Click repeatedly to see multiple toasts stack beautifully in their respective positions.
            </p>
        </div>

    </div>
</section>
