<!-- Leave Waitlist Confirmation Modal -->
<template x-teleport="body">
  <div x-show="showLeaveModal" 
       @keydown.escape.window="showLeaveModal = false"
       class="fixed inset-0 z-100 flex items-center justify-center p-4 sm:p-6"
       x-cloak>
    <!-- Backdrop -->
    <div x-show="showLeaveModal" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm dark:bg-black/60"
         @click="showLeaveModal = false"></div>

    <!-- Modal Card -->
    <div x-show="showLeaveModal" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative w-full max-w-md bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 shadow-2xl rounded-xl overflow-hidden flex flex-col pointer-events-auto"
         @click.stop>
      
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
        <h2 class="font-medium text-gray-800 dark:text-neutral-200">
          Leave Waitlist
        </h2>
        <button @click="showLeaveModal = false" type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:focus:bg-neutral-600" aria-label="Close">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <div class="p-4 space-y-4">
          <p class="text-sm text-gray-600 dark:text-neutral-400">
            You're currently <span class="font-semibold text-gray-800 dark:text-neutral-200">#</span> in queue for <span class="font-semibold text-gray-800 dark:text-neutral-200"></span>.
          </p>
          <p class="text-sm text-gray-600 dark:text-neutral-400">
            Leaving will remove your place in line, and you may need to join again later.
          </p>
        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2">
        <div class="flex-1 flex justify-end items-center gap-2">
          <button @click="showLeaveModal = false" type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-hidden focus:bg-gray-50 dark:focus:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none">
            Cancel
          </button>

          <button @click="showLeaveModal = false" type="button" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-red-600 dark:bg-red-500 border border-transparent text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-red-700 dark:hover:bg-red-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-red-700 dark:focus:bg-red-600">
            Leave Waitlist
          </button>
        </div>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</template>
