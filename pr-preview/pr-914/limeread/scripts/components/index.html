<script>
  document.addEventListener('alpine:init', () => {
    // Dropdown component
    Alpine.data('dropdown', () => ({
      open: false,
      toggle() {
        this.open = !this.open;
      },
      close() {
        this.open = false;
      }
    }));

    // Tooltip component
    Alpine.data('tooltip', () => ({
      show: false,
      toggle() {
        this.show = !this.show;
      },
      on() {
        this.show = true;
      },
      off() {
        this.show = false;
      }
    }));

    // Tabs component
    Alpine.data('tabs', (initialTab = 'all') => ({
      current: initialTab,
      setTab(tab) {
        this.current = tab;
      },
      isTab(tab) {
        return this.current === tab;
      }
    }));

    // Collapse component
    Alpine.data('collapse', (initialOpen = false) => ({
      open: initialOpen,
      toggle() {
        this.open = !this.open;
      }
    }));

    // Select component (replaces hs-select basic functionality)
    Alpine.data('select', (config = {}) => ({
      open: false,
      selected: config.selected || '',
      placeholder: config.placeholder || 'Select...',
      toggle() { this.open = !this.open; },
      close() { this.open = false; },
      select(value) {
        this.selected = value;
        this.open = false;
      }
    }));
  });
</script>
