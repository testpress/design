<div class="flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="py-3 px-5 flex justify-between items-center gap-x-5 border-b border-gray-200 dark:border-neutral-700 rounded-t-xl">
    <h2 class="inline-block font-semibold text-gray-800 dark:text-neutral-200">
      Video Source
    </h2>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="p-5">
    <!-- Upload Area -->
    <div x-show="status === 'idle'" class="p-8 sm:p-12 flex justify-center border border-dashed border-gray-300 dark:border-neutral-700 rounded-xl transition-all">
      <div class="text-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="shrink-0 w-16 text-gray-400 dark:text-neutral-500 mx-auto"><path d="M12 13v8"></path><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="m8 17 4-4 4 4"></path></svg>

        <div class="mt-4 flex flex-wrap justify-center text-sm/6 text-gray-500 dark:text-neutral-400">
          <span class="pe-1 font-medium text-gray-800 dark:text-neutral-200">
            Drop your Movie file here or
          </span>
          <label for="hs-pro-epdupb" class="relative cursor-pointer bg-transparent font-semibold text-blue-600 dark:text-blue-500 hover:text-blue-700 dark:hover:text-blue-400 rounded-lg decoration-2 hover:underline focus-within:outline-none">
            <span>browse</span>
            <input id="hs-pro-epdupb" type="file" class="sr-only" @change="handleFileSelect" accept=".mp4,.mkv,.avi,.mov">
          </label>
        </div>

        <p class="mt-1 text-xs text-gray-400 dark:text-neutral-500">
          MP4, AVI, MKV, MOV
        </p>
      </div>
    </div>

    <!-- File Progress Card -->
    <div x-show="status !== 'idle'" x-transition style="display: none;">
      <div class="p-3 bg-gray-50 border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700 rounded-xl">
        <div class="flex gap-x-3">
          <!-- File Icon -->
          <span class="shrink-0 size-10 flex justify-center items-center bg-white border border-gray-200 text-gray-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="shrink-0 size-5"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
          </span>

          <!-- Text & Actions -->
          <div class="grow">
            <div class="flex justify-between items-start">
              <p class="text-sm font-medium text-gray-800 dark:text-neutral-200 truncate max-w-[180px] sm:max-w-xs" x-text="fileName"></p>

              <div class="flex items-center gap-x-2 ms-2">
                <!-- Cancel / Remove Button (Shown only during upload) -->
                <template x-if="status === 'uploading'">
                  <button @click="reset" type="button" class="text-gray-500 dark:text-neutral-400 hover:text-gray-800 dark:hover:text-neutral-200 focus:outline-none" title="cancel upload">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="shrink-0 size-4"><circle cx="12" cy="12" r="10"></circle><path d="m15 9-6 6"></path><path d="m9 9 6 6"></path></svg>
                  </button>
                </template>
                <!-- Replace File Link (Success) -->
                <template x-if="status === 'ready'">
                  <label for="hs-pro-epdupb" class="text-xs font-medium text-gray-500 dark:text-neutral-400 hover:text-gray-800 dark:hover:text-neutral-200 hover:underline decoration-2 underline-offset-4 cursor-pointer focus-within:outline-none">
                    Replace file
                  </label>
                </template>
              </div>
            </div>
            <p class="text-xs text-gray-500 dark:text-neutral-400" x-text="fileSize"></p>
          </div>
        </div>

        <!-- Progress Bar (Hidden on Success) -->
        <div x-show="status !== 'ready'" class="mt-2 flex items-center gap-x-3 whitespace-nowrap">
          <div class="flex w-full h-2 bg-gray-200 dark:bg-neutral-800 rounded-full overflow-hidden" role="progressbar" :aria-valuenow="progress" aria-valuemin="0" aria-valuemax="100">
            <div class="flex flex-col justify-center rounded-full overflow-hidden bg-blue-600 text-xs text-white text-center whitespace-nowrap transition-all duration-500" :style="`width: ${progress}%`" :class="{ 
                'bg-green-500': status === 'ready', 
                'bg-blue-600': status !== 'ready'
              }"></div>
          </div>
          <div class="w-10 text-end">
            <span class="text-sm text-gray-800 dark:text-neutral-200">
              <span x-text="progress">0</span>%
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- End Body -->
</div>
