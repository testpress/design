<script>
function sessionMonitor() {
    return {
        mode: 'detailed', // detailed, compact, minimized
        position: { x: window.innerWidth - 340, y: 40 },
        isDragging: false,
        dragOffset: { x: 0, y: 0 },
        duration: 5045, // 01:24:05 for demo
        warning: 'Keep your face in view',
        stream: null,
        hoverInput: null,
        inputStates: {
            camera: { status: 'healthy', message: '' },
            screen: { status: 'healthy', message: '' },
            mic: { status: 'healthy', message: '' }
        },

        init() {
            const savedPos = localStorage.getItem('sentinel_monitor_pos');
            if (savedPos) {
                try {
                    const parsed = JSON.parse(savedPos);
                    this.position = parsed;
                } catch(e) {}
            }
            
            this.clampPosition();
            this.startWebcam();

            setInterval(() => {
                this.duration++;
            }, 1000);

            window.addEventListener('mousemove', (e) => this.drag(e));
            window.addEventListener('mouseup', () => this.endDrag());
            window.addEventListener('beforeunload', () => this.stopWebcam());
        },

        toggleState(key, status, message) {
            if (this.inputStates[key].status === status) {
                this.inputStates[key].status = 'healthy';
                this.inputStates[key].message = '';
            } else {
                this.inputStates[key].status = status;
                this.inputStates[key].message = message;
            }
        },

        resetStates() {
            this.warning = '';
            Object.keys(this.inputStates).forEach(k => {
                this.inputStates[k].status = 'healthy';
                this.inputStates[k].message = '';
            });
        },

        async startWebcam() {
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                const video = document.getElementById('sentinel-webcam-preview');
                if (video) {
                    video.srcObject = this.stream;
                }
            } catch (err) {
                console.error("Error accessing webcam:", err);
                this.warning = 'Camera access denied';
                this.inputStates.camera.status = 'error';
                this.inputStates.camera.message = 'Permission denied by browser';
            }
        },

        stopWebcam() {
            if (this.stream) {
                this.stream.getTracks().forEach(track => track.stop());
                this.stream = null;
            }
        },

        get formattedDuration() {
            const h = Math.floor(this.duration / 3600);
            const m = Math.floor((this.duration % 3600) / 60);
            const s = this.duration % 60;
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        },

        startDrag(e) {
            this.isDragging = true;
            this.dragOffset.x = e.clientX - this.position.x;
            this.dragOffset.y = e.clientY - this.position.y;
        },

        drag(e) {
            if (!this.isDragging) return;
            
            let newX = e.clientX - this.dragOffset.x;
            let newY = e.clientY - this.dragOffset.y;

            this.position.x = newX;
            this.position.y = newY;
            this.clampPosition();
        },

        endDrag() {
            if (this.isDragging) {
                this.isDragging = false;
                localStorage.setItem('sentinel_monitor_pos', JSON.stringify(this.position));
            }
        },

        clampPosition() {
            const margin = 20;
            this.$nextTick(() => {
                const widget = this.$el;
                if (!widget) return;

                const rect = widget.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;

                if (this.position.x < margin) this.position.x = margin;
                if (this.position.y < margin) this.position.y = margin;
                
                if (this.position.x + width > window.innerWidth - margin) {
                    this.position.x = window.innerWidth - width - margin;
                }
                
                if (this.position.y + height > window.innerHeight - margin) {
                    this.position.y = window.innerHeight - height - margin;
                }
            });
        }
    }
}
</script>
