<div class="grid grid-cols-2 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-5">
  <!-- Total Users -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg"
        class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400 lucide lucide-info-icon lucide-info"
        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M12 16v-4" />
        <path d="M12 8h.01" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">Total Users</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">1,52,340</p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">vs previous period</span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +4.2%
      </span>
    </div>
  </div>

  <!-- New Users -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg"
        class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400 lucide lucide-user-plus-icon lucide-user-plus"
        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <line x1="19" x2="19" y1="8" y2="14" />
        <line x1="22" x2="16" y1="11" y2="11" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">New Users</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">8,420</p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">in this period</span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +8.1%
      </span>
    </div>
  </div>

  <!-- Active Users -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg"
        class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400 lucide lucide-user-check-icon lucide-user-check"
        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m16 11 2 2 4-4" />
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <div class="sm:mb-2 inline-flex items-center gap-1.5">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400">
            Active Users
          </h2>
          <div class="hs-tooltip [--placement:bottom] inline-flex items-center">
            <button
              type="button"
              class="hs-tooltip-toggle inline-flex items-center justify-center text-gray-400 hover:text-gray-600 dark:text-neutral-500 dark:hover:text-neutral-300 focus:outline-hidden"
              aria-label="What is an active user?">
              <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />
                <path d="M12 8h.01" />
              </svg>
              <span
                class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity inline-block absolute invisible z-[10] py-1.5 px-2.5 bg-white border border-tooltip-line text-xs font-medium text-tooltip-foreground rounded-md shadow-2xs max-w-xs text-left"
                role="tooltip">
                Users who had at least one viewing session of 15 minutes or more is considered as active user.
              </span>
            </button>
          </div>
        </div>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">1,02,300</p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">67% of total users</span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +3.5%
      </span>
    </div>
  </div>

  <!-- Avg Watch Time / Active User -->
  <div
    class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg"
        class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-500 dark:text-neutral-400 lucide lucide-clock8-icon lucide-clock-8"
        width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 6v6l-4 2" />
        <circle cx="12" cy="12" r="10" />
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">Avg watch time / active user</h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">42 min</p>
      </div>
    </div>
    <div class="mt-1 flex items-center gap-x-2">
      <span class="text-sm leading-5 text-gray-500 dark:text-neutral-400">vs previous period</span>
      <span class="inline-flex items-center gap-x-1 text-xs font-medium text-green-500 rounded-full">
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
          <polyline points="16 7 22 7 22 13" />
        </svg>
        +6.8%
      </span>
    </div>
  </div>
</div>
