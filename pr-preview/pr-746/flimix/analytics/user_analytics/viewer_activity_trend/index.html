<div class="bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="border-b border-gray-200 dark:border-neutral-700">
    <div class="py-3 px-5 flex flex-wrap justify-between items-center gap-y-2 gap-x-5">
      <h2 class="font-medium text-gray-800 dark:text-neutral-200">
        Are viewers actively watching content over time?
      </h2>
      <button type="button"
        class="inline-flex items-center gap-x-1.5 text-sm text-gray-600 dark:text-neutral-400 hover:underline focus:outline-none focus:underline cursor-pointer shrink-0"
        aria-label="How to read this section" data-hs-overlay="#user-activity-how-to-read-modal">
        <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg"
          width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        </svg>
        How to read this
      </button>
    </div>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="py-4 px-5 space-y-4">
    <div
      class="pb-1 flex flex-nowrap items-center gap-2 md:gap-3 overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
      <div
        class="p-2 whitespace-nowrap bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-lg shrink-0">
        <div class="flex items-center gap-2">
          <span class="shrink-0 w-1 h-3.5 inline-block rounded-full bg-[#0ea5e9]" aria-hidden="true"></span>
          <div class="grow">
            <div class="flex items-center gap-1">
              <span class="text-sm text-gray-500 dark:text-neutral-400">Active viewers</span>
            </div>
          </div>
        </div>
      </div>
      <div
        class="p-2 whitespace-nowrap bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-lg shrink-0">
        <div class="flex items-center gap-2">
          <span class="shrink-0 w-1 h-3.5 inline-block rounded-full bg-[#22c55e]" aria-hidden="true"></span>
          <div class="grow">
            <div class="flex items-center gap-1">
              <span class="text-sm text-gray-500 dark:text-neutral-400">Watch time</span>
            </div>
          </div>
        </div>
      </div>
      <div class="ms-auto shrink-0">
        <div class="hs-tooltip [--placement:bottom] inline-block">
          <span
            class="hs-tooltip-toggle py-1 px-2.5 inline-flex items-center gap-x-2 text-start whitespace-nowrap font-medium text-[13px] rounded-full cursor-pointer bg-green-100 text-green-700 dark:bg-green-500/10 dark:text-green-400"
            id="user-activity-status-badge">
            <span
              class="user-activity-status-dot relative w-2.5 h-px bg-green-700 after:absolute after:top-1/2 after:-start-1 after:size-1.5 after:bg-green-700 after:rounded-full after:-translate-y-1/2 dark:bg-green-400 dark:after:bg-green-400"
              aria-hidden="true"></span>
            <span class="user-activity-status-label">Good</span>
          </span>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-2 px-3 max-w-sm bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-600 text-xs text-gray-800 dark:text-neutral-200 rounded-lg shadow-lg"
            id="user-activity-tooltip-content" role="tooltip">
            <p class="user-activity-tooltip-text font-medium">
              More people are watching and consuming more content. Maintain content release schedule and monitor growth.
            </p>
          </span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <div id="user-analytics-active-viewers-chart" class="min-h-[220px] md:min-h-[260px] -mx-2"></div>
      </div>
      <div>
        <div id="user-analytics-watch-time-chart" class="min-h-[220px] md:min-h-[260px] -mx-2"></div>
      </div>
    </div>
  </div>
</div>
