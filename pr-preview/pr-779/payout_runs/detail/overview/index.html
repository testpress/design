<div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="pb-5 mb-5 border-b border-gray-200 dark:border-neutral-700">
    <div class="flex flex-wrap justify-between items-center gap-3">
      <div class="grow">
        <div class="flex items-center space-x-2">
          <h2 class="font-medium text-gray-800 dark:text-neutral-200">
            Payout run - #PR-20022026-001
          </h2>
          <div class="flex items-center space-x-2">
            <span
              x-show="statusLabel"
              class="inline-flex items-center gap-x-1.5 rounded-full px-1.5 py-0.5 text-xs font-medium"
              :class="{
                'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300': statusKind === 'success' && statusLabel !== 'Processing payment',
                'bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300': statusKind === 'warning' && statusLabel !== 'Awaiting approval',
                'bg-sky-100 text-sky-800 dark:bg-sky-900/40 dark:text-sky-300': statusLabel === 'Awaiting approval',
                'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300': statusLabel === 'Processing payment',
                'bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300': statusKind === 'danger',
              }"
            >
              <svg class="h-1.5 w-1.5"
                   :class="{
                     'fill-emerald-500': statusKind === 'success' && statusLabel !== 'Processing payment',
                     'fill-amber-500': statusKind === 'warning' && statusLabel !== 'Awaiting approval',
                     'fill-sky-500': statusLabel === 'Awaiting approval',
                     'fill-indigo-500': statusLabel === 'Processing payment',
                     'fill-red-500': statusKind === 'danger',
                   }"
                   viewBox="0 0 6 6"
                   aria-hidden="true">
                <circle cx="3" cy="3" r="3"></circle>
              </svg>
              <span x-text="statusLabel"></span>
            </span>
          </div>
        </div>

        <ul class="flex flex-wrap items-center whitespace-nowrap gap-1.5 mt-1">
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            <p class="text-xs text-gray-500 dark:text-neutral-500">
              Cluster 1
            </p>
          </li>
          <li class="inline-flex items-center relative text-xs text-gray-500 pe-2 last:pe-0 last:after:hidden after:absolute after:top-1/2 after:end-0 after:inline-block after:size-[3px] after:bg-gray-400 after:rounded-full after:-translate-y-1/2 dark:text-neutral-500 dark:after:bg-neutral-600">
            <p class="text-xs text-gray-500 dark:text-neutral-500">
              Added on Apr 10, 2026
            </p>
          </li>
        </ul>

        <!-- Rejected / Failed reason banner -->
        <div
          x-show="statusLabel === 'Rejected' || statusLabel === 'Failed'"
          class="mt-3 rounded-md bg-yellow-50 p-4 dark:bg-yellow-500/10 dark:outline dark:outline-yellow-500/15"
        >
          <div class="flex">
            <div class="shrink-0">
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"
                   class="size-5 text-yellow-400 dark:text-yellow-300">
                <path fill-rule="evenodd" clip-rule="evenodd"
                      d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" />
              </svg>
            </div>
            <div class="ml-3">
              <h3
                class="text-sm font-medium text-yellow-800 dark:text-yellow-100"
                x-text="statusLabel === 'Rejected'
                  ? 'Payout run rejected'
                  : statusLabel === 'Failed'
                    ? 'Payout run failed'
                    : 'Attention needed'"
              ></h3>
              <div class="mt-2 text-sm text-yellow-700 dark:text-yellow-100/80">
                <p x-text="run.status_reason || 'This payout run requires your attention. Please review the details.'"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions for Awaiting approval -->
      <div class="flex flex-wrap items-center gap-2" x-show="statusLabel === 'Awaiting approval'">
        <button
          type="button"
          @click="openRejectModal()"
          class="py-1.5 px-2.5 inline-flex items-center gap-x-1.5 text-[13px] whitespace-nowrap rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"
        >
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
          <span>Reject</span>
        </button>

        <button
          type="button"
          @click="openApproveModal()"
          class="py-1.5 px-2.5 inline-flex items-center gap-x-1.5 text-[13px] whitespace-nowrap rounded-lg border border-transparent bg-emerald-600 text-white shadow-2xs hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-emerald-700 dark:bg-emerald-500 dark:hover:bg-emerald-600 dark:focus:bg-emerald-600"
        >
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5" />
          </svg>
          <span>Approve</span>
        </button>
      </div>

      <!-- Actions for Approved -->
      <div class="flex flex-wrap items-center gap-2" x-show="statusLabel === 'Approved'">
        <button
          type="button"
          @click="openProcessPaymentModal()"
          class="py-1.5 px-2.5 inline-flex items-center gap-x-1.5 text-[13px] whitespace-nowrap rounded-lg border border-transparent bg-emerald-600 text-white shadow-2xs hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-emerald-700 dark:bg-emerald-500 dark:hover:bg-emerald-600 dark:focus:bg-emerald-600"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="shrink-0 size-3.5" width="24" height="24" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" />
            <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
            <path d="M12 18V6" />
          </svg>
          <span>Process payment</span>
        </button>
      </div>
    </div>
  </div>
  <!-- End Header -->

  <!-- Cutoff time Section -->
  <div class="pb-4 mb-4 border-b border-gray-200 dark:border-neutral-700">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-y-4 gap-x-10">
      <!-- Cutoff time -->
      <div class="relative w-full">
        <div class="mb-2 flex flex-col">
          <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
            Cutoff time
          </span>
          <div class="mt-1 flex items-start gap-x-2">
            <svg class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                 xmlns="http://www.w3.org/2000/svg"
                 width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <path d="M3 10h18" />
              <path d="M8 14h.01" />
              <path d="M12 14h.01" />
              <path d="M16 14h.01" />
              <path d="M8 18h.01" />
              <path d="M12 18h.01" />
              <path d="M16 18h.01" />
            </svg>
            <p class="text-sm text-gray-800 dark:text-neutral-200" x-text="run.cutoff_time_display"></p>
          </div>
        </div>
      </div>

      <!-- Triggered by -->
      <div class="relative w-full">
        <div class="mb-2 flex flex-col">
          <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
            Triggered by
          </span>
          <div class="mt-1 flex items-start gap-x-2">
            <svg class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                 xmlns="http://www.w3.org/2000/svg"
                 width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <p class="text-sm text-gray-800 dark:text-neutral-200">
              Bhuvanesh
            </p>
          </div>
        </div>
      </div>

      <!-- Approved by (for Approved state) -->
      <div class="relative w-full" x-show="statusLabel === 'Approved'">
        <div class="mb-2 flex flex-col">
          <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
            Approved by
          </span>
          <div class="mt-1 flex items-start gap-x-2">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                 width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="m16 11 2 2 4-4" />
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
            </svg>
            <p class="text-sm text-gray-800 dark:text-neutral-200">
              Bharath
            </p>
          </div>
        </div>
      </div>

      <!-- Rejected by (for Rejected / Failed states) -->
      <div class="relative w-full" x-show="statusLabel === 'Rejected' || statusLabel === 'Failed'">
        <div class="mb-2 flex flex-col">
          <span class="text-xs font-medium text-gray-500 dark:text-neutral-500">
            Rejected by
          </span>
          <div class="mt-1 flex items-start gap-x-2">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="shrink-0 size-4 mt-0.5 text-gray-400 dark:text-neutral-500"
                 width="24" height="24" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <p class="text-sm text-gray-800 dark:text-neutral-200">
              Bharath
            </p>
          </div>
        </div>
      </div>

    </div>
  </div>
  <!-- End 2-column status grid -->

  <!-- Stats grid for Awaiting approval / Approved / Processing payment / Completed / Rejected / Failed -->
  <div
    x-show="statusLabel === 'Awaiting approval' || statusLabel === 'Approved' || statusLabel === 'Processing payment' || statusLabel === 'Completed' || statusLabel === 'Rejected' || statusLabel === 'Failed'"
    class="grid grid-cols-2 lg:grid-cols-4 gap-2 md:gap-3 lg:gap-5"
  >
    <!-- Total payout amount -->
    <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
      <div class="sm:flex sm:gap-x-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-blue-400">
          <path d="M12 3v18" />
          <path d="M17 8H9a2 2 0 0 0 0 4h4a3 3 0 0 1 0 6H7" />
        </svg>
        <div class="sm:order-1 grow space-y-1">
          <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
            Total payout amount
          </h2>
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200"
             x-text="run.total_payout_display || 'N/A'"></p>
        </div>
      </div>
    </div>

    <!-- Total institutes -->
    <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
      <div class="sm:flex sm:gap-x-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-indigo-400">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
          <circle cx="9" cy="7" r="4"></circle>
        </svg>
        <div class="sm:order-1 grow space-y-1">
          <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
            Total institutes
          </h2>
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200"
             x-text="run.total_institutes_display || 'N/A'"></p>
        </div>
      </div>
    </div>

    <!-- Paid -->
    <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
      <div class="sm:flex sm:gap-x-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-emerald-400">
          <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
        </svg>
        <div class="sm:order-1 grow space-y-1">
          <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
            Paid
          </h2>
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200"
             x-text="run.paid_count_display || 'N/A'"></p>
        </div>
      </div>
    </div>

    <!-- Failed -->
    <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
      <div class="sm:flex sm:gap-x-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-red-400">
          <path d="M19 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="m16 11 2 2 4-4"></path>
        </svg>
        <div class="sm:order-1 grow space-y-1">
          <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
            Failed
          </h2>
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200"
             x-text="run.failed_count_display || 'N/A'"></p>
        </div>
      </div>
    </div>
  </div>
</div>
