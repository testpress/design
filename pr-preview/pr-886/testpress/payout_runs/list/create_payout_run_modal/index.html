<form
  id="hs-create-payout-run-modal"
  class="hs-overlay hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none"
  role="dialog"
  tabindex="-1"
  aria-labelledby="hs-create-payout-run-modal-label"
>
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-sm sm:w-full m-3 sm:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white rounded-xl pointer-events-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)]" x-data="payoutRunCutoffPicker()">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border">
        <h3 id="hs-create-payout-run-modal-label" class="font-medium text-gray-800">
          Create payout run
        </h3>
        <button
          type="button"
          class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-200"
          aria-label="Close"
          data-hs-overlay="#hs-create-payout-run-modal"
        >
          <span class="sr-only">Close</span>
          <svg
            class="shrink-0 size-4"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300">
        <div class="p-4 space-y-5">
          <div class="space-y-1.5">
            <div class="flex items-center justify-between gap-x-4">
              <label class="block text-sm font-medium text-gray-800">
                Ledger cutoff time
              </label>
              <p class="text-xs text-gray-500">
                Timezone: Asia/Kolkata (IST)
              </p>
            </div>

            <!-- Display field -->
            <div class="mt-3">
              <div class="relative">
                <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 2v4" />
                    <path d="M16 2v4" />
                    <rect width="18" height="18" x="3" y="4" rx="2" />
                    <path d="M3 10h18" />
                    <path d="M8 14h.01" />
                    <path d="M12 14h.01" />
                    <path d="M16 14h.01" />
                    <path d="M8 18h.01" />
                    <path d="M12 18h.01" />
                    <path d="M16 18h.01" />
                  </svg>
                </span>
                <input
                  type="text"
                  readonly
                  x-model="displayValue"
                  @click="open = !open"
                  class="block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-emerald-600 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none pl-9"
                  placeholder="Select cutoff date &amp; time"
                >
              </div>
            </div>

            <!-- Calendar + time card (design from snippet, Alpine-powered) -->
            <div
              x-show="open"
              x-transition
              @click.outside="open = false"
              class="mt-2 w-80 mx-auto flex flex-col bg-white border border-transparent shadow-lg rounded-xl overflow-hidden z-[90]"
            >
              <!-- Calendar -->
              <div class="p-3 space-y-0.5">
                <!-- Months -->
                <div class="grid grid-cols-5 items-center gap-x-3 mx-1.5 pb-3">
                  <!-- Prev Button -->
                  <div class="col-span-1">
                    <button
                      type="button"
                      @click="prevMonth()"
                      class="size-8 flex justify-center items-center text-gray-800 hover:bg-gray-100 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100"
                      aria-label="Previous"
                    >
                      <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                  </div>
                  <!-- End Prev Button -->

                  <!-- Month / Year -->
                  <div class="col-span-3 flex justify-center items-center gap-x-1">
                    <div class="relative">
                      <select
                        x-model.number="month"
                        @change="onMonthYearChange()"
                        class="hidden"
                      >
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                      </select>
                      <span class="text-sm font-medium text-gray-800" x-text="monthLabel"></span>
                    </div>

                    <span class="text-gray-800">/</span>

                    <div class="relative">
                      <select
                        x-model.number="year"
                        @change="onMonthYearChange()"
                        class="hidden"
                      >
                        <template x-for="y in years" :key="y">
                          <option :value="y" x-text="y"></option>
                        </template>
                      </select>
                      <span class="text-sm font-medium text-gray-800" x-text="year"></span>
                    </div>
                  </div>
                  <!-- End Month / Year -->

                  <!-- Next Button -->
                  <div class="col-span-1 flex justify-end">
                    <button
                      type="button"
                      @click="nextMonth()"
                      class="size-8 flex justify-center items-center text-gray-800 hover:bg-gray-100 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100"
                      aria-label="Next"
                    >
                      <svg class="shrink-0 size-4" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                  </div>
                  <!-- End Next Button -->
                </div>
                <!-- Months -->

                <!-- Weeks -->
                <div class="flex pb-1.5">
                  <template x-for="d in weekDays" :key="d">
                    <span class="m-px w-10 block text-center text-sm text-gray-500" x-text="d"></span>
                  </template>
                </div>
                <!-- Weeks -->

                <!-- Days -->
                <template x-for="row in weeks" :key="row[0].key">
                  <div class="flex">
                    <template x-for="day in row" :key="day.key">
                      <div>
                        <button
                          type="button"
                          @click="selectDay(day)"
                          :disabled="day.isDisabled"
                          :class="[
                            'm-px size-10 flex justify-center items-center border-[1.5px] text-sm rounded-full focus:outline-hidden',
                            day.isSelected
                              ? 'bg-emerald-600 border-transparent text-white hover:bg-emerald-700'
                              : day.isToday
                                ? 'border-emerald-500 text-gray-800 hover:border-emerald-600'
                                : 'border-transparent text-gray-800 hover:border-emerald-600 hover:text-emerald-700',
                            day.isDisabled ? 'opacity-50 pointer-events-none' : ''
                          ]"
                          x-text="day.label"
                        ></button>
                      </div>
                    </template>
                  </div>
                </template>
                <!-- End Days -->

                <!-- Time -->
                <div class="pt-3 flex justify-center items-center gap-x-2">
                  <!-- Hour -->
                  <div>
                    <select
                      x-model="hour12"
                      @change="updateTime()"
                      class="py-1 px-2 pe-6 border border-gray-200 rounded-lg text-sm text-gray-800 focus:border-emerald-600 focus:ring-emerald-600 appearance-none bg-transparent"
                    >
                      <template x-for="h in hoursOptions" :key="h">
                        <option :value="h" x-text="h"></option>
                      </template>
                    </select>
                  </div>

                  <span class="text-gray-800">:</span>

                  <!-- Minute -->
                  <div>
                    <select
                      x-model="minute"
                      @change="updateTime()"
                      class="py-1 px-2 pe-6 border border-gray-200 rounded-lg text-sm text-gray-800 focus:border-emerald-600 focus:ring-emerald-600 appearance-none bg-transparent"
                    >
                      <template x-for="m in minutesOptions" :key="m">
                        <option :value="m" x-text="m"></option>
                      </template>
                    </select>
                  </div>

                  <!-- AM / PM -->
                  <div>
                    <select
                      x-model="meridiem"
                      @change="updateTime()"
                      class="py-1 px-2 pe-6 border border-gray-200 rounded-lg text-sm text-gray-800 focus:border-emerald-600 focus:ring-emerald-600 appearance-none bg-transparent"
                    >
                      <option value="AM">AM</option>
                      <option value="PM">PM</option>
                    </select>
                  </div>
                </div>
                <!-- End Time -->
              </div>
              <!-- End Calendar -->
            </div>

            <input type="hidden" name="ledger_cutoff_at" :value="combinedIso">
            <p class="mt-1 text-xs text-red-500" x-show="error" x-text="error"></p>
            <p class="mt-1 text-xs text-gray-500">
              All cleared ledger entries up to this time will be included. This cannot be changed once evaluation starts.
            </p>
          </div>
        </div>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2">
        <div class="flex-1 flex justify-end items-center gap-2">
          <button
            type="button"
            class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-sm align-middle hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none"
            data-hs-overlay="#hs-create-payout-run-modal"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:ring-2 focus:ring-emerald-500"
          >
            Create run
          </button>
        </div>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</form>
