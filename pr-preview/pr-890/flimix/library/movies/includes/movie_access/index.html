<div class="flex flex-col bg-white border border-gray-200 rounded-xl shadow-sm dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Header -->
  <div class="py-3 px-5 flex justify-between items-center gap-x-5 border-b border-gray-200 dark:border-neutral-700 rounded-t-xl">
    <h2 class="inline-block font-semibold text-gray-800 dark:text-neutral-200">
      Content Access
    </h2>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div x-data="{
    accessType: 'Subscription',
    pricings: [
      { id: 1, region: 'IN', currency: 'INR', price: '' }
    ]
  }"
  x-init="$nextTick(() => { if (window.HSSelect) HSSelect.autoInit(); })"
  class="p-5 space-y-4">
    <!-- Checkbox Grid -->
    <div class="grid lg:grid-cols-2 gap-3 lg:gap-5">
      <label for="access-subscription" class="py-3 px-4 flex text-sm bg-white text-gray-800 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:ring-1 has-[:checked]:ring-blue-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:has-[:checked]:border-blue-500 dark:has-[:checked]:ring-blue-500">
        <input type="radio" id="access-subscription" x-model="accessType" class="shrink-0 mt-0.5 border-gray-200 text-blue-600 rounded-full focus:ring-0 focus:ring-offset-0 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500" value="Subscription" name="content-access">
        <span class="grow px-4 space-y-1">
          <span class="block font-medium">
            Subscription
          </span>
          <span class="block text-sm/6 text-gray-500 dark:text-neutral-400">
            Available only to viewers with an active subscription plan.
          </span>
        </span>
      </label>
      <!-- End Checkbox -->

      <!-- Free -->
      <label for="access-free" class="py-3 px-4 flex text-sm bg-white text-gray-800 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:ring-1 has-[:checked]:ring-blue-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:has-[:checked]:border-blue-500 dark:has-[:checked]:ring-blue-500">
        <input type="radio" id="access-free" x-model="accessType" class="shrink-0 mt-0.5 border-gray-200 text-blue-600 rounded-full focus:ring-0 focus:ring-offset-0 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500" value="Free" name="content-access">
        <span class="grow px-4 space-y-1">
          <span class="block font-medium">
            Free
          </span>
          <span class="block text-sm/6 text-gray-500 dark:text-neutral-400">
            Anyone with access to the platform can watch this movie for free.
          </span>
        </span>
      </label>
      <!-- End Checkbox -->

      <!-- Pay Per View -->
      <label for="access-ppv" class="py-3 px-4 flex text-sm bg-white text-gray-800 border border-gray-200 rounded-xl cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:ring-1 has-[:checked]:ring-blue-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:has-[:checked]:border-blue-500 dark:has-[:checked]:ring-blue-500">
        <input type="radio" id="access-ppv" x-model="accessType" class="shrink-0 mt-0.5 border-gray-200 text-blue-600 rounded-full focus:ring-0 focus:ring-offset-0 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500" value="Pay Per View" name="content-access">
        <span class="grow px-4 space-y-1">
          <span class="block font-medium">
            Pay Per View (PPV)
          </span>
          <span class="block text-sm/6 text-gray-500 dark:text-neutral-400">
            Viewers can rent this movie individually for a limited period.
          </span>
        </span>
      </label>
      <!-- End Checkbox -->
    </div>

    <!-- Conditional PPV Fields -->
    <div x-show="accessType === 'Pay Per View'" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" class="pt-2 space-y-5" style="display: none;">
      
      <!-- Duration Field -->
      <div class="sm:w-1/2">
        <label class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
          Rental duration
        </label>
        <div class="relative w-full" x-ignore>
          <select data-hs-select='{
              "placeholder": "Select duration",
              "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
              "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-1.5 sm:py-2 px-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:focus:outline-none dark:focus:ring-1 dark:focus:ring-neutral-600",
              "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 dark:bg-neutral-900 dark:border-neutral-700",
              "optionClasses": "py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 dark:text-neutral-200 dark:focus:bg-neutral-800",
              "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title></span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-blue-600 dark:text-blue-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg></span></div>"
            }'>
            <option value="24">24 hours</option>
            <option value="48" selected>48 hours</option>
            <option value="72">72 hours</option>
            <option value="168">1 week</option>
          </select>

          <div class="absolute top-1/2 end-2.5 -translate-y-1/2">
            <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m7 15 5 5 5-5" />
              <path d="m7 9 5-5 5 5" />
            </svg>
          </div>
        </div>
        <p class="mt-2 text-sm text-gray-500 dark:text-neutral-500">Access duration after playback starts.</p>
      </div>

      <!-- Rental Pricing Section -->
      <div class="">
        <!-- Section Header -->
        <div>
          <label class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
            Rental pricing
          </label>
        </div>

        <!-- Rows List -->
        <div class="">
          <template x-for="(pricing, index) in pricings" :key="pricing.id">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 sm:gap-5 items-center mb-3">
              
              <!-- Region/Country Column -->
              <div class="col-span-1 md:col-span-4">
                <template x-if="index === 0">
                  <div class="py-1.5 sm:py-2 px-3 block w-full bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 text-gray-800 dark:text-neutral-400 rounded-lg text-start text-sm cursor-not-allowed select-none">
                    Default pricing
                  </div>
                </template>
                <template x-if="index > 0">
                  <div class="relative w-full">
                    <select x-model="pricing.region" 
                      @change="pricing.region = $event.target.value"
                      data-hs-select='{
                        "placeholder": "Country",
                        "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                        "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-1.5 sm:py-2 px-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
                        "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-transparent rounded-lg shadow-xl overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500",
                        "optionClasses": "hs-selected:bg-gray-100 dark:hs-selected:bg-neutral-800 py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800 hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50",
                        "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title><\/span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-blue-600 dark:text-blue-500\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"\/><\/svg><\/span><\/div>",
                        "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500 dark:text-neutral-400\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"\/><\/svg><\/div>"
                      }' class="hidden">
                      <option value="">Country</option>
                      <option value="IN" :selected="pricing.region === 'IN'">India</option>
                      <option value="US" :selected="pricing.region === 'US'">United States</option>
                      <option value="DE" :selected="pricing.region === 'DE'">Germany</option>
                      <option value="FR" :selected="pricing.region === 'FR'">France</option>
                      <option value="AU" :selected="pricing.region === 'AU'">Australia</option>
                      <option value="CA" :selected="pricing.region === 'CA'">Canada</option>
                      <option value="BR" :selected="pricing.region === 'BR'">Brazil</option>
                      <option value="JP" :selected="pricing.region === 'JP'">Japan</option>
                      <option value="ZA" :selected="pricing.region === 'ZA'">South Africa</option>
                      <option value="GB" :selected="pricing.region === 'GB'">United Kingdom</option>
                    </select>
                  </div>
                </template>
              </div>

              <!-- Currency Column -->
              <div class="col-span-1 md:col-span-4">
                <div class="relative w-full">
                  <select x-model="pricing.currency" 
                    @change="pricing.currency = $event.target.value"
                    data-hs-select='{
                      "placeholder": "Currency",
                      "toggleTag": "<button type=\"button\" aria-expanded=\"false\"></button>",
                      "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-1.5 sm:py-2 px-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
                      "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-transparent rounded-lg shadow-xl overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500",
                      "optionClasses": "hs-selected:bg-gray-100 dark:hs-selected:bg-neutral-800 py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-800 hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50",
                      "optionTemplate": "<div class=\"flex justify-between items-center w-full\"><span data-title><\/span><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-3.5 text-blue-600 dark:text-blue-500\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"\/><\/svg><\/span><\/div>",
                      "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500 dark:text-neutral-400\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"\/><\/svg><\/div>"
                    }' class="hidden">
                    <option value="">Currency</option>
                    <option value="INR" :selected="pricing.currency === 'INR'">INR (₹)</option>
                    <option value="USD" :selected="pricing.currency === 'USD'">USD ($)</option>
                    <option value="EUR" :selected="pricing.currency === 'EUR'">EUR (€)</option>
                    <option value="GBP" :selected="pricing.currency === 'GBP'">GBP (£)</option>
                    <option value="JPY" :selected="pricing.currency === 'JPY'">JPY (¥)</option>
                    <option value="AUD" :selected="pricing.currency === 'AUD'">AUD (A$)</option>
                    <option value="CAD" :selected="pricing.currency === 'CAD'">CAD (C$)</option>
                    <option value="BRL" :selected="pricing.currency === 'BRL'">BRL (R$)</option>
                    <option value="ZAR" :selected="pricing.currency === 'ZAR'">ZAR (R)</option>
                    <option value="CNY" :selected="pricing.currency === 'CNY'">CNY (¥)</option>
                  </select>
                </div>
              </div>

              <!-- Price Column -->
              <div class="col-span-1 md:col-span-3">
                <input type="number" x-model="pricing.price" placeholder="Price" class="py-1.5 sm:py-2 px-3 block w-full bg-white border border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 focus:outline-none dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400">
              </div>

              <!-- Action/Delete Column -->
              <div class="col-span-1 md:col-span-1 md:text-end flex justify-end md:block mt-2 md:mt-0">
                <button type="button" 
                  x-show="index > 0"
                  @click="pricings.splice(index, 1)"
                  class="py-1 px-3 md:px-1 inline-flex justify-center items-center gap-x-1.5 font-medium text-sm rounded-full bg-gray-100 border border-transparent text-gray-600 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-200 dark:bg-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600">
                  <svg class="hidden md:block shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
                  <span class="md:hidden">Delete</span>
                </button>
                <!-- Dummy spacer for the first row to keep alignment perfect on desktop -->
                <div x-show="index === 0" class="hidden md:block size-7"></div>
              </div>

            </div>
          </template>
        </div>

        <!-- Add Pricing Button -->
        <div>
          <button type="button"
            @click="pricings.push({ id: Date.now(), region: '', currency: '', price: '' }); $nextTick(() => { if (window.HSSelect) HSSelect.autoInit(); })"
            class="py-2 px-3 inline-flex items-center gap-x-1.5 text-xs font-semibold rounded-lg border border-dashed border-gray-300 bg-white text-gray-800 hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add country pricing
          </button>
        </div>
      </div>
  </div>
  <!-- End Body -->
</div>
