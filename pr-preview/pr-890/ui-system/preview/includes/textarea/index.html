

<section id="textarea-section" class="mb-16 pt-8">
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="align-left" class="w-6 h-6 text-gray-800 dark:text-white"></i>
            <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Textarea</h2>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <!-- Default -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Default</h3>
            
<div class="w-full">
  

  <div class="relative w-full">
    <textarea id="default_ta" 
              name="default_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Enter your message..."
              
              
              
              
              ></textarea>
  </div>
  
  
</div>

        </div>

        <!-- With Label & Value -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">With Label & Value</h3>
            
<div class="w-full">
  
    <label for="description_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Description
    </label>
  

  <div class="relative w-full">
    <textarea id="description_ta" 
              name="description_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Enter description"
              
              
              
              
              >This is a pre-filled description text.</textarea>
  </div>
  
  
</div>

        </div>

        <!-- Required -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Required</h3>
            
<div class="w-full">
  
    <label for="bio_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Bio <span class="text-red-500">*</span>
    </label>
  

  <div class="relative w-full">
    <textarea id="bio_ta" 
              name="bio_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Tell us about yourself"
              required
              
              
              
              ></textarea>
  </div>
  
  
</div>

        </div>

        <!-- With Help Text -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Help Text</h3>
            
<div class="w-full">
  
    <label for="feedback_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Feedback
    </label>
  

  <div class="relative w-full">
    <textarea id="feedback_ta" 
              name="feedback_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="What do you think?"
              
              
              
              
              ></textarea>
  </div>
  
  
    <p class="mt-1.5 text-xs text-gray-500 dark:text-neutral-400">Please keep it under 500 characters.</p>
  
</div>

        </div>

        <!-- Error State -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Error State</h3>
            
<div class="w-full">
  
    <label for="ticket_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Support Ticket
    </label>
  

  <div class="relative w-full">
    <textarea id="ticket_ta" 
              name="ticket_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 border-red-500 dark:border-red-500 focus:border-red-500 dark:focus:border-red-500 focus:ring-red-500 dark:focus:ring-red-500 "
              placeholder="Describe your issue"
              
              
              
              
              ></textarea>
  </div>
  
  
    <p class="mt-1.5 text-xs text-red-500">Message is required to submit a ticket.</p>
  
</div>

        </div>

        <!-- Disabled -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Disabled</h3>
            
<div class="w-full">
  
    <label for="archived_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Archived Note
    </label>
  

  <div class="relative w-full">
    <textarea id="archived_ta" 
              name="archived_ta"
              rows="3"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Notes"
              
              disabled
              
              
              >This note can no longer be edited because it has been archived.</textarea>
  </div>
  
  
</div>

        </div>

        <!-- Custom Rows -->
        <div class="col-span-1 md:col-span-2 lg:col-span-3">
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Custom Rows (rows="6")</h3>
            <div class="w-full sm:w-2/3">
                
<div class="w-full">
  
    <label for="report_ta" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Detailed Report
    </label>
  

  <div class="relative w-full">
    <textarea id="report_ta" 
              name="report_ta"
              rows="6"
              class="py-2 px-3 sm:py-3 sm:px-4 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-blue-700 dark:focus:border-blue-600 focus:z-10 focus:ring-blue-700 dark:focus:ring-blue-600 disabled:opacity-50 disabled:pointer-events-none [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500  "
              placeholder="Type your full report here..."
              
              
              
              
              ></textarea>
  </div>
  
  
</div>

            </div>
        </div>

    </div>
</section>
