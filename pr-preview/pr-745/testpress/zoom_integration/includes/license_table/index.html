<section class="bg-white shadow sm:rounded-lg overflow-hidden border border-gray-200">
  <div class="px-4 py-5 sm:px-6 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
    <div>
      <h3 class="text-base font-semibold leading-6 text-gray-900">Available Licenses</h3>
      <p class="mt-1 text-xs text-gray-500">Map your Zoom corporate licenses to staff members.</p>
    </div>
    <button
      @click="fetchUsers()"
      :disabled="isFetching"
      class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 disabled:opacity-50 transition-all"
    >
      <svg
        x-show="isFetching"
        class="animate-spin -ml-1 mr-2 h-4 w-4 text-emerald-600"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      <span x-text="isFetching ? 'Fetching...' : 'Fetch Zoom Users'"></span>
    </button>
  </div>
  <div class="overflow-x-auto min-h-[200px]">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th
            scope="col"
            class="py-3.5 pl-4 pr-3 text-left text-xs font-bold uppercase tracking-wider text-gray-500 sm:pl-6"
          >
            Zoom Email
          </th>
          <th
            scope="col"
            class="px-3 py-3.5 text-left text-xs font-bold uppercase tracking-wider text-gray-500"
          >
            Assign to Testpress Staff
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 bg-white">
        <template x-for="user in zoomUsers" :key="user.id">
          <tr class="hover:bg-gray-50/50 transition-colors">
            <td
              class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 sm:pl-6"
              x-text="user.email"
            ></td>
            <td class="px-3 py-4 text-sm text-gray-500">
              <div class="max-w-xs relative">
                <select
                  data-hs-select='{
                    "hasSearch": true,
                    "searchPlaceholder": "Search...",
                    "searchClasses": "block w-full text-sm border-gray-200 rounded-lg focus:border-emerald-500 focus:ring-emerald-500 before:absolute before:inset-0 before:z-[1] py-2 px-3",
                    "searchWrapperClasses": "bg-white p-2 -mx-1 sticky top-0",
                    "placeholder": "Select staff...",
                    "toggleTag": "<button type=\"button\" aria-expanded=\"false\"><span class=\"text-gray-800 \" data-title></span></button>",
                    "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative mt-2 py-2 ps-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-300 shadow-sm rounded-md text-start text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500",
                    "dropdownClasses": "mt-2 max-h-72 pb-1 px-1 space-y-0.5 z-[9999] w-full bg-white border border-gray-200 rounded-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300",
                    "optionClasses": "py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100",
                    "optionTemplate": "<div><div class=\"flex items-center\"><div class=\"text-gray-800 \" data-title></div></div></div>",
                    "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500 \" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
                  }'
                  class="hidden mt-2"
                >
                  <option value="">Choose</option>
                  <option value="1">Staff 1</option>
                  <option value="2">Staff 2</option>
                </select>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</section>
