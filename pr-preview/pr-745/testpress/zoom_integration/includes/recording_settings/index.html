<section class="bg-white shadow sm:rounded-lg border border-gray-200 overflow-hidden">
  <div class="bg-gray-50/50 px-4 py-4 sm:px-6 border-b border-gray-200">
    <h3 class="text-base font-semibold text-gray-900">Recording Settings</h3>
    <p class="text-xs text-gray-500">Control what happens to your Zoom recordings after meetings end.</p>
  </div>

  <div class="px-4 py-5 sm:p-6">
    <fieldset class="border-gray-200">
      <legend class="sr-only">Recording Settings</legend>
      <div class="divide-y divide-gray-200">
        <div class="relative flex gap-3 pb-4">
          <div class="min-w-0 flex-1 text-sm/6">
            <label for="delete-after" class="font-medium text-gray-900">Delete Zoom recordings after import</label>
            <p id="delete-after-description" class="text-gray-500">
              Reduce Zoom storage costs by deleting recordings from Zoom once they have been imported into Testpress.
            </p>
          </div>
          <div class="flex h-6 shrink-0 items-center">
            <div class="group grid size-4 grid-cols-1">
              <input
                id="delete-after"
                type="checkbox"
                name="delete-after"
                x-model="deleteAfterImport"
                aria-describedby="delete-after-description"
                class="col-start-1 row-start-1 appearance-none rounded-sm border border-gray-300 bg-white text-emerald-600 focus:ring-emerald-600 checked:border-emerald-600 checked:bg-emerald-600 indeterminate:border-emerald-600 indeterminate:bg-emerald-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 disabled:border-gray-300 disabled:bg-gray-100 disabled:checked:bg-gray-100 forced-colors:appearance-auto" />
              <svg viewBox="0 0 14 14" fill="none" class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white group-has-disabled:stroke-gray-950/25">
                <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-checked:opacity-100" />
                <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-indeterminate:opacity-100" />
              </svg>
            </div>
          </div>
        </div>

        <div class="relative flex gap-3 pt-3.5 pb-4">
          <div class="min-w-0 flex-1 text-sm/6">
            <label for="no-import" class="font-medium text-gray-900">Don't import Zoom recordings</label>
            <p id="no-import-description" class="text-gray-500">
              Host meetings live on Zoom only and skip importing cloud recordings into Testpress.
            </p>
          </div>
          <div class="flex h-6 shrink-0 items-center">
            <div class="group grid size-4 grid-cols-1">
              <input
                id="no-import"
                type="checkbox"
                name="no-import"
                x-model="noImport"
                aria-describedby="no-import-description"
                class="col-start-1 row-start-1 appearance-none rounded-sm border border-gray-300 bg-white text-emerald-600 focus:ring-emerald-600 checked:border-emerald-600 checked:bg-emerald-600 indeterminate:border-emerald-600 indeterminate:bg-emerald-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-emerald-600 disabled:border-gray-300 disabled:bg-gray-100 disabled:checked:bg-gray-100 forced-colors:appearance-auto" />
              <svg viewBox="0 0 14 14" fill="none" class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white group-has-disabled:stroke-gray-950/25">
                <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-checked:opacity-100" />
                <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-0 group-has-indeterminate:opacity-100" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
</section>
