<div id="hs-assign-staff-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[89] overflow-x-hidden overflow-y-auto pointer-events-none" role="dialog" tabindex="-1">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] flex items-center">
    
    <div class="w-full max-h-full flex flex-col bg-white border border-gray-200 rounded-xl pointer-events-auto shadow-xl">
      
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200">
        <h3 class="font-semibold text-gray-900">Assign staff</h3>
        <button type="button" class="size-8 inline-flex justify-center items-center rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200" data-hs-overlay="#hs-assign-staff-modal">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <div class="p-4 space-y-4 overflow-visible">
        <div>
          <label class="block mb-2 text-sm font-medium text-gray-900">Select staff</label>
          <div class="relative">
            <select
              data-hs-select='{
                "hasSearch": true,
                "searchPlaceholder": "Search staff...",
                "searchClasses": "block w-full text-sm border-gray-300 rounded-lg focus:border-emerald-500 focus:ring-emerald-500 py-2 px-3 bg-white text-gray-800",
                "searchWrapperClasses": "bg-white p-2 -mx-1 sticky top-0",
                "placeholder": "Choose staff...",
                "toggleTag": "<button type=\"button\" aria-expanded=\"false\"><span class=\"text-gray-800\" data-title></span></button>",
                "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative mt-1 py-2 ps-3 pe-9 flex gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-300 rounded-lg text-start text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500",
                "dropdownClasses": "mt-2 max-h-72 pb-1 px-1 space-y-0.5 z-[9999] w-full bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden overflow-y-auto",
                "optionClasses": "py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100",
                "optionTemplate": "<div><div class=\"flex items-center\"><div class=\"text-gray-800\" data-title></div></div></div>",
                "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
              }'
              class="hidden"
            >
              <option value="">Choose</option>
              <option value="1">John Doe</option>
              <option value="2">Sarah Smith</option>
              <option value="3">Michael Brown</option>
              <option value="4">Emily Johnson</option>
              <option value="5">David Wilson</option>
          </select>
          </div>
        </div>
      </div>

      <div class="p-4 flex justify-end gap-x-2 border-t border-gray-200">
        <button type="button" class="py-2 px-4 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50" data-hs-overlay="#hs-assign-staff-modal">
          Cancel
        </button>

        <button type="button" class="py-2 px-4 text-sm font-semibold text-white bg-emerald-600 rounded-lg hover:bg-emerald-500 shadow-sm transition-colors" data-hs-overlay="#hs-assign-staff-modal">
          Assign Staff
        </button>
      </div>
    </div>
  </div>
</div>
