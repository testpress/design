<div id="hs-unassign-staff-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-[89] overflow-x-hidden overflow-y-auto pointer-events-none" role="dialog" tabindex="-1">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-md sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white border border-gray-200 rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="flex justify-between items-center py-3 px-4 border-b">
        <h3 id="modal-title" class="font-medium text-gray-800">Unassign staff from license</h3>
        <button type="button" data-hs-overlay="#em-delete-modal" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200" aria-label="Close">
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-4 space-y-3">
        <div class="text-sm text-gray-700">
          <p>Are you sure you want to unassign this staff member from the selected Zoom license?</p>
          <br>
          <p>This staff member will no longer be mapped to this Zoom license. You can reassign them at any time later.</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="p-4 flex justify-end gap-x-2 border-t border-gray-200">
        <button
          type="button"
          class="py-2 px-3 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50"
          data-hs-overlay="#hs-unassign-staff-modal"
        >
          Cancel
        </button>
        <button
          type="button"
          class="py-2 px-3 text-sm font-semibold text-white bg-red-600 rounded-lg hover:bg-red-500 shadow-sm transition-colors"
          data-hs-overlay="#hs-unassign-staff-modal"
        >
          Unassign staff
        </button>
      </div>
    </div>
  </div>
</div>
