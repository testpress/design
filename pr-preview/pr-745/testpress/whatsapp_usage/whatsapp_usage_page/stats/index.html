<!-- Stats Grid - same structure as course feedback stats -->
<div class="grid grid-cols-2 lg:grid-cols-3 gap-2 md:gap-3 lg:gap-5">
  <!-- Total Notifications -->
  <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-400 dark:text-neutral-500">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
          Total Notifications
        </h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200" x-text="totalNotifications">
        </p>
      </div>
    </div>
  </div>
  <!-- End Card -->

  <!-- Average per Day -->
  <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-400 dark:text-neutral-500">
        <path d="M3 3v18h18"/>
        <path d="m19 9-5 5-4-4-3 3"/>
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
          Average per Day
        </h2>
        <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200" x-text="averagePerDay">
        </p>
      </div>
    </div>
  </div>
  <!-- End Card -->

  <!-- Highest Day -->
  <div class="p-4 sm:p-5 bg-white border border-gray-200 rounded-xl shadow-2xs dark:bg-neutral-800 dark:border-neutral-700 col-span-2 lg:col-span-1">
    <div class="sm:flex sm:gap-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:order-2 mb-2 sm:mb-0 shrink-0 size-6 text-gray-400 dark:text-neutral-500">
        <path d="m22 7-8.5 8.5-5-5L2 17"/>
      </svg>
      <div class="sm:order-1 grow space-y-1">
        <h2 class="sm:mb-3 text-sm text-gray-500 dark:text-neutral-400">
          Highest Day
        </h2>
        <template x-if="highestDay">
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">
            <span x-text="highestDay.label"></span>
            <span class="text-gray-500 dark:text-neutral-400 font-normal"> · </span>
            <span x-text="highestDay.count"></span>
          </p>
        </template>
        <template x-if="!highestDay">
          <p class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">—</p>
        </template>
      </div>
    </div>
  </div>
  <!-- End Card -->
</div>
<!-- End Stats Grid -->
