<!-- Card -->
<div class="p-4 bg-white border border-gray-200 hover:border-emerald-500 hover:ring-1 hover:ring-emerald-500 hover:shadow-lg transition-all rounded-xl dark:bg-neutral-900 dark:border-neutral-700 dark:hover:border-emerald-500">
  
  <div class="mb-3 flex justify-between items-start gap-x-2">
    <div class="flex items-center space-x-2">
      <div class="hs-tooltip [--placement:bottom] hover:cursor-pointer inline-block max-w-full">
        <h2 class="hs-tooltip-toggle font-medium text-gray-800 dark:text-neutral-200 line-clamp-1 max-w-full" x-text="report.report.title">
        </h2>
        <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 max-w-72 hs-tooltip-shown:visible opacity-0 transition-opacity invisible absolute z-[99] py-1 px-2 bg-gray-900 text-sm font-medium text-white rounded-md shadow-2xs dark:bg-neutral-700" x-text="report.report.title">
        </span>
      </div>
      <template x-if="report.report.description">
        <div class="hs-tooltip [--trigger:click] [--placement:bottom] hover:cursor-pointer inline-block">
          <button type="button" class="hs-tooltip-toggle inline">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 text-gray-400 hover:cursor-pointer inline dark:text-neutral-400">
              <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"></path>
            </svg>
            <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 absolute invisible text-left z-[99] w-72 py-1 px-2 bg-gray-900 text-sm text-white rounded-md shadow-md hidden dark:text-white dark:bg-neutral-700 dark:border-none" x-text="report.report.description">
            </span>
          </button>
        </div>
      </template>
    </div>

  
    <div class="flex items-center space-x-2 text-sm">
      <a :href="'./detail/?id=' + report.id" class="flex items-center gap-x-1 text-sm underline underline-offset-4 text-gray-800 hover:text-primary-600 focus:outline-none focus:text-primary-600 dark:text-neutral-200 dark:hover:text-primary-400 dark:focus:text-primary-400">
        <span>Go to Report</span>
        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m9 18 6-6-6-6"></path>
        </svg>
      </a>
    </div>
  </div>

  <!-- Item -->
  <div class="py-1 last:pb-2 flex justify-between items-center gap-x-2">
    <span class="flex items-center gap-x-1.5 text-xs text-gray-500 dark:text-neutral-500">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
      Course:
    </span>
    <div class="hs-tooltip [--placement:bottom] hover:cursor-pointer inline-block max-w-28 truncate">
      <span class="hs-tooltip-toggle text-xs font-medium text-gray-800 dark:text-neutral-200" x-text="report.report.course"></span>
      <span class="hs-tooltip-content hs-tooltip-shown:opacity-100 max-w-72 hs-tooltip-shown:visible opacity-0 transition-opacity invisible absolute z-[99] py-1 px-2 bg-gray-900 text-sm font-medium text-white rounded-md shadow-2xs dark:bg-neutral-700" x-text="report.report.course">
      </span>
    </div>
  </div>
  <!-- End Item -->

  <!-- Item -->
  <div class="py-1 last:pb-2 flex justify-between items-center gap-x-2">
    <span class="flex items-center gap-x-1.5 text-xs text-gray-500 dark:text-neutral-500">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="7" x="3" y="3" rx="1"/><rect width="9" height="7" x="3" y="14" rx="1"/><rect width="5" height="7" x="16" y="14" rx="1"/></svg>
      Sections:
    </span>
    <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="report.sections.length || Math.floor(Math.random() * 7) + 2"></span>
  </div>
  <!-- End Item -->

  <!-- Item -->
  <div class="py-1 last:pb-2 flex justify-between items-center gap-x-2">
    <span class="flex items-center gap-x-1.5 text-xs text-gray-500 dark:text-neutral-500">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 21h8"/><path d="m15 5 4 4"/><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>
      Score:
    </span>
    <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="report.summary.total_score || 'N/A'"></span>
  </div>
  <!-- End Item -->

  <!-- Item -->
  <div class="py-1.5 mt-2 border-t border-gray-100 last:pb-2 flex justify-between items-center gap-x-2 dark:border-neutral-800">
    <span class="flex items-center gap-x-1.5 text-xs text-gray-500 dark:text-neutral-500">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M6.376 18.91a6 6 0 0 1 11.249.003"/><circle cx="12" cy="11" r="4"/></svg>
      Report by:
    </span>

    <span class="text-xs font-medium text-gray-800 dark:text-neutral-200 truncate max-w-28" x-text="report.report.staff_name || 'N/A'"></span>
  </div>
  <!-- End Item -->

</div>
<!-- End Card -->
