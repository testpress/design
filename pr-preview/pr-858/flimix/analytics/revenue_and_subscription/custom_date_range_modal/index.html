<div id="revenue-custom-date-range-modal"
  class="hs-overlay hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto [--close-when-click-inside:false] pointer-events-none"
  role="dialog" tabindex="-1" aria-labelledby="revenue-custom-date-range-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto flex items-center min-h-[calc(100%-3.5rem)]">
    <div class="w-full flex flex-col bg-white rounded-xl pointer-events-auto shadow-lg border border-stone-200 dark:bg-neutral-800 dark:border-neutral-700">
      <div class="py-3 px-4 flex justify-between items-center border-b border-stone-200 dark:border-neutral-700">
        <h3 id="revenue-custom-date-range-label" class="font-medium text-stone-800 dark:text-neutral-200">Custom range</h3>
        <button type="button" class="size-8 inline-flex justify-center items-center rounded-full border border-transparent bg-stone-100 text-stone-600 hover:bg-stone-200 focus:outline-none dark:bg-neutral-700 dark:text-neutral-400 dark:hover:bg-neutral-600" aria-label="Close" data-hs-overlay="#revenue-custom-date-range-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="p-4 space-y-4" x-data="revenueCustomDateRange()">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label for="revenue-custom-from" class="block text-sm font-medium text-stone-700 dark:text-neutral-300 mb-1">From</label>
            <input type="date" id="revenue-custom-from" x-model="fromDate"
              class="py-2 px-3 block w-full rounded-lg border border-stone-300 text-sm text-stone-800 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-neutral-800 dark:border-neutral-600 dark:text-neutral-200" />
          </div>
          <div>
            <label for="revenue-custom-to" class="block text-sm font-medium text-stone-700 dark:text-neutral-300 mb-1">To</label>
            <input type="date" id="revenue-custom-to" x-model="toDate"
              class="py-2 px-3 block w-full rounded-lg border border-stone-300 text-sm text-stone-800 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 dark:bg-neutral-800 dark:border-neutral-600 dark:text-neutral-200" />
          </div>
        </div>
        <div class="flex justify-end gap-x-2 pt-2">
          <button type="button" class="py-2 px-3 text-sm font-medium rounded-lg border border-stone-300 bg-white text-stone-700 hover:bg-stone-50 dark:border-neutral-600 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700" data-hs-overlay="#revenue-custom-date-range-modal">Cancel</button>
          <button type="button" @click="apply()" class="py-2 px-3 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500">Apply</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('alpine:init', function () {
    Alpine.data('revenueCustomDateRange', function () {
      return {
        fromDate: '',
        toDate: '',
        init() {
          var end = new Date();
          var start = new Date();
          start.setDate(start.getDate() - 30);
          this.toDate = end.toISOString().slice(0, 10);
          this.fromDate = start.toISOString().slice(0, 10);
        },
        apply() {
          var from = new Date(this.fromDate);
          var to = new Date(this.toDate);
          if (isNaN(from.getTime()) || isNaN(to.getTime()) || from > to) return;
          var days = Math.round((to - from) / 86400000) + 1;
          days = Math.min(365, Math.max(1, days));
          var el = document.getElementById('revenue-analytics-date-range');
          if (!el) return;
          el.value = String(days);
          el.dispatchEvent(new Event('change', { bubbles: true }));
          window.dispatchEvent(new CustomEvent('revenue-date-range-applied', { detail: { label: this.fromDate + ' – ' + this.toDate } }));
          window.HSOverlay && document.querySelector('#revenue-custom-date-range-modal') && window.HSOverlay.close(document.querySelector('#revenue-custom-date-range-modal'));
        }
      };
    });
  });
</script>
