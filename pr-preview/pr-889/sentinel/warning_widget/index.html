<!doctype html>
<html class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title></title>
  <link rel="stylesheet" href="/pr-preview/pr-889/css/sentinel.css" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <style>
    [x-cloak] {
      display: none !important;
    }
  </style>
  
</head>
<body class="bg-gray-50 dark:bg-neutral-900 min-h-screen">
  <div class="fixed top-4 right-4 z-50"
       x-data="{ 
           currentTheme: localStorage.getItem('hs_theme') || 'default',
           systemDark: window.matchMedia('(prefers-color-scheme: dark)').matches,
           
           init() {
               this.apply(this.currentTheme);
               const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
               const systemThemeListener = e => {
                   this.systemDark = e.matches;
                   if (this.currentTheme === 'default') this.apply('default');
               };
               mediaQuery.addEventListener('change', systemThemeListener);
           },
           
           apply(theme) {
               this.currentTheme = theme;
               localStorage.setItem('hs_theme', theme);
               
               const isDark = theme === 'dark' || (theme === 'default' && this.systemDark);
               if (isDark) {
                   document.documentElement.classList.add('dark');
               } else {
                   document.documentElement.classList.remove('dark');
               }
           }
       }">
      <button @click="apply(currentTheme === 'dark' ? 'light' : 'dark')" 
              type="button" 
              class="p-2.5 inline-flex items-center justify-center rounded-full bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 text-gray-600 dark:text-neutral-200 shadow-xs hover:bg-gray-50 dark:hover:bg-neutral-700 transition-colors">
          <svg x-show="currentTheme === 'dark'" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
          </svg>
          <svg x-show="currentTheme !== 'dark'" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
          </svg>
      </button>
  </div>

  <main id="content" class="p-2 sm:p-5 min-h-[90vh]">
    

<div class="flex flex-wrap items-center gap-3 mb-12 w-full max-w-2xl" x-data="{}">
    <button type="button" 
            @click="$dispatch('show-warning-modal', { type: 'warning', title: 'Guideline Alert', message: 'Our system detected suspicious activity in your camera feed.\n\nPlease ensure you stay in view and follow all exam rules to avoid further escalations.' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Trigger Warning
    </button>

    <button type="button" 
            @click="$dispatch('show-warning-modal', { type: 'danger', title: 'Critical Breach', message: 'Repeated unauthorized items or movements have been detected.\n\nContinued breach of guidelines will result in immediate disqualification and session termination.', primaryText: 'Acknowledge & Resume' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Trigger Critical
    </button>

    <button type="button" 
            @click="$dispatch('show-warning-modal', { type: 'info', title: 'System Notice', message: 'Your internet connection appears to be unstable at the moment.\n\nWe are continuing to monitor the session, but some data synchronization may be delayed.', primaryText: 'Got it' })"
            class="py-2 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg shadow-xs transition-colors">
        Trigger Info
    </button>
</div>

<div x-data="{ 
         isOpen: false, 
         type: 'warning',
         title: 'Multiple Faces Detected',
         message: 'We have detected multiple faces in your camera feed. This is not permitted according to the exam guidelines, and the incident has been logged for proctor review.\n\nPlease ensure that only your face is visible in the frame and adjust your camera setup to clear other individuals from the view.',
         primaryText: 'Continue',
         icon: 'danger',

         show(data) {
            this.title = data.title || 'Action Required';
            this.message = data.message || '';
            this.type = data.type || 'warning';
            this.primaryText = data.primaryText || 'I Understand';
            this.isOpen = true;
         },

         close() {
            this.isOpen = false;
         }
     }"
     @show-warning-modal.window="show($event.detail)"
     class="fixed inset-0 z-[10000] flex items-center justify-center p-4 select-none pointer-events-none"
     x-show="isOpen"
     x-cloak>
    
    <!-- Backdrop -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm pointer-events-auto"
         @click="close()">
    </div>

    <!-- Modal Content -->
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300 transform"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform"
         x-transition:leave-start="opacity-100 scale-100 translate-y-0"
         x-transition:leave-end="opacity-0 scale-95 translate-y-4"
         class="relative w-full max-w-lg bg-layer rounded-xl overflow-hidden shadow-2xl pointer-events-auto">
        <div class="pt-6 px-8 pb-8">
            <!-- Space-efficient horizontal layout — icon on left, content on right -->
            <div class="flex flex-row items-start gap-5 text-left">
                
                <!-- Icon Circle -->
                <div class="flex-shrink-0 w-12 h-12 rounded-full border-2 flex items-center justify-center sentinel-animate-pop-in"
                     :class="{
                        'bg-amber-50 dark:bg-amber-900/40 border-amber-600/20 dark:border-amber-400/20 text-amber-600 dark:text-amber-400': type === 'warning',
                        'bg-red-50 dark:bg-red-900/40 border-red-600/20 dark:border-red-400/20 text-red-600 dark:text-red-400': type === 'danger',
                        'bg-primary-600/10 border-primary-600/10 text-primary-600 dark:text-primary-500': type === 'info'
                     }">
                    
                    <template x-if="type === 'warning'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                    </template>

                    <template x-if="type === 'danger'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </template>

                    <template x-if="type === 'info'">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </template>
                </div>

                <div class="flex flex-col">
                    <h2 class="text-lg font-semibold text-foreground mb-1.5 font-sans" x-text="title">Warning Escalation</h2>
                    <template x-for="(paragraph, index) in (message || '').split('\n\n')" :key="index">
                        <p class="text-sm text-muted-foreground-1 leading-normal font-sans mb-3 last:mb-0" x-text="paragraph"></p>
                    </template>
                </div>
            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-4 py-2 border-t border-border flex flex-row items-center justify-end gap-2 bg-layer">
            <button type="button"
                    @click="close()"
                    class="px-3 py-2 rounded-lg border border-border text-sm font-medium text-neutral-700 dark:text-neutral-200 hover:bg-neutral-100 dark:hover:bg-neutral-700 transition-colors">
                Cancel
            </button>
            <button type="button"
                    @click="close()"
                    class="px-4 py-2 rounded-lg text-sm font-semibold text-white shadow-xs transition-all transform active:scale-95"
                    :class="{
                        'bg-amber-600 hover:bg-amber-700': type === 'warning',
                        'bg-red-600 hover:bg-red-700 dark:hover:bg-red-800': type === 'danger',
                        'bg-primary-600 hover:bg-primary-700': type === 'info'
                    }">
                <span x-text="primaryText">Continue</span>
            </button>
        </div>
    </div>
</div>



  </main>

  
  

  <script src="/pr-preview/pr-889/src/sentinel/node_modules/preline/dist/preline.js"></script>
</body>
</html>
