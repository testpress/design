  <script>
    (function () {
      const html = document.querySelector('html');
      const isLightOrAuto = localStorage.getItem('hs_theme') === 'light' || (localStorage.getItem('hs_theme') === 'auto' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
      const isDarkOrAuto = localStorage.getItem('hs_theme') === 'dark' || (localStorage.getItem('hs_theme') === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isLightOrAuto && html.classList.contains('dark')) html.classList.remove('dark');
      else if (isDarkOrAuto && html.classList.contains('light')) html.classList.remove('light');
      else if (isDarkOrAuto && !html.classList.contains('dark')) html.classList.add('dark');
      else if (isLightOrAuto && !html.classList.contains('light')) html.classList.add('light');
    })();
  </script>

    mobileMenuOpen: false, 
    searchOpen: false,

  }" x-init="$watch('isDark', val => { 
    const theme = val ? 'dark' : 'light';
    localStorage.setItem('hs_theme', theme);
    if (val) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');

  <script>
  document.addEventListener('alpine:init', () => {
    // Component for simple password toggling (used in Login)
    Alpine.data('passwordToggle', () => ({
      show: false,
      toggle() {
        this.show = !this.show;
      }
    }));

    // Component for password validation + toggling (used in Register)
    Alpine.data('passwordValidation', () => ({
      password: '',
      confirmPassword: '',
      showPassword: false,
      showHints: false,
      
      // Validation rules
      rules: {
        minLength: false,
        lowercase: false,
        uppercase: false,
        numbers: false,
        special: false,
        match: false
      },

      init() {
        this.$watch('password', (value) => {
          this.showHints = true;
          this.validate();
        });
        this.$watch('confirmPassword', (value) => this.validate());
      },

      validate() {
        const p = this.password;
        this.rules.minLength = p.length >= 8;
        this.rules.lowercase = /[a-z]/.test(p);
        this.rules.uppercase = /[A-Z]/.test(p);
        this.rules.numbers = /[0-9]/.test(p);
        this.rules.special = /[!"#$%&'()*+,-./:;<=>?@\[\]^_`{}|~]/.test(p);
        this.rules.match = p.length > 0 && p === this.confirmPassword;
      },

      toggle() {
        this.showPassword = !this.showPassword;
      }
    }))
  })
</script>


</body>

</html>
