

<section id="badge-section" class="mb-16 pt-8">
    <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
        <div class="flex items-center gap-2">
            <i data-lucide="tag" class="w-6 h-6 text-gray-800 dark:text-white"></i>
            <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Badge</h2>
        </div>
    </div>

    <div class="space-y-8">
        
        <!-- Variants -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Variants</h3>
            <div class="flex flex-wrap gap-3">
                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Neutral
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-green-100 text-green-800 dark:bg-green-500/10 dark:text-green-400 rounded-full ">


  
  
  
    Success
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-orange-100 text-orange-800 dark:bg-orange-500/10 dark:text-orange-400 rounded-full ">


  
  
  
    Warning
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-red-100 text-red-800 dark:bg-red-500/10 dark:text-red-400 rounded-full ">


  
  
  
    Danger
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-blue-100 text-blue-800 dark:bg-blue-500/10 dark:text-blue-400 rounded-full ">


  
  
  
    Info
  

  

  

</span>

            </div>
        </div>

        <!-- With Icons -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">With Icons</h3>
            <div class="flex flex-wrap gap-3">
                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-green-100 text-green-800 dark:bg-green-500/10 dark:text-green-400 rounded-full ">


  
    
    <i data-lucide="check" class="shrink-0 size-3.5"></i>
  
  
  
  
    Completed
  

  

  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-blue-100 text-blue-800 dark:bg-blue-500/10 dark:text-blue-400 rounded-full ">


  
    
    <i data-lucide="loader" class="shrink-0 size-3.5"></i>
  
  
  
  
    In Progress
  

  

  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-orange-100 text-orange-800 dark:bg-orange-500/10 dark:text-orange-400 rounded-full ">


  
    
    <i data-lucide="clock" class="shrink-0 size-3.5"></i>
  
  
  
  
    Pending
  

  

  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-red-100 text-red-800 dark:bg-red-500/10 dark:text-red-400 rounded-full ">


  
    
    <i data-lucide="x-circle" class="shrink-0 size-3.5"></i>
  
  
  
  
    Failed
  

  

  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
    
    <i data-lucide="file" class="shrink-0 size-3.5"></i>
  
  
  
  
    Draft
  

  

  

</span>

            </div>
        </div>

        <!-- Icon Positions -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Icon Position</h3>
            <div class="flex flex-wrap gap-3">
                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
    
    <i data-lucide="arrow-left" class="shrink-0 size-3.5"></i>
  
  
  
  
    Left Icon
  

  

  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Right Icon
  

  
    
    <i data-lucide="arrow-right" class="shrink-0 size-3.5"></i>
  
  

  

</span>

            </div>
        </div>

        <!-- Dismissible -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Dismissible</h3>
            <div class="flex flex-wrap gap-3">
                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-blue-100 text-blue-800 dark:bg-blue-500/10 dark:text-blue-400 rounded-full " x-data="{ show: true }" x-show="show" x-transition.opacity>


  
  
  
    Click to dismiss
  

  

  
    <button type="button" @click="show = false" class="inline-flex shrink-0 justify-center items-center size-5 rounded-full text-current focus:outline-none transition-colors hover:bg-blue-200 focus:bg-blue-200 dark:hover:bg-blue-500/20 dark:focus:bg-primary-500/20">
      <span class="sr-only">Dismiss</span>
      <i data-lucide="x" class="shrink-0 w-3 h-3"></i>
    </button>
  

</span>

                




  



  
  
  
  



  
  




  



<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full " x-data="{ show: true }" x-show="show" x-transition.opacity>


  
    
    <i data-lucide="filter" class="shrink-0 size-3.5"></i>
  
  
  
  
    Filter: Active
  

  

  
    <button type="button" @click="show = false" class="inline-flex shrink-0 justify-center items-center size-5 rounded-full text-current focus:outline-none transition-colors hover:bg-gray-200 focus:bg-gray-200 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600">
      <span class="sr-only">Dismiss</span>
      <i data-lucide="x" class="shrink-0 w-3 h-3"></i>
    </button>
  

</span>

            </div>
        </div>

        <!-- Shapes (Pill vs Rounded) -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Shapes</h3>
            <div class="flex flex-wrap gap-3">
                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Pill (Default)
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-md ">


  
  
  
    Rounded Rectangle
  

  

  

</span>

            </div>
        </div>

        <!-- Sizes -->
        <div>
            <h3 class="text-xs font-medium text-gray-500 dark:text-neutral-500 uppercase tracking-wider mb-4">Sizes</h3>
            <div class="flex flex-wrap items-center gap-3">
                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Small
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-xs py-1.5 px-2.5 gap-x-1.5 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Medium
  

  

  

</span>

                




  



  
  
  
  



  
  






<span class="inline-flex items-center font-medium text-sm py-2 px-3 gap-x-2 bg-gray-100 text-gray-800 dark:bg-neutral-700 dark:text-neutral-200 rounded-full ">


  
  
  
    Large
  

  

  

</span>

            </div>
        </div>

    </div>
</section>
