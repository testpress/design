  <div x-data="{
         active: false,
         top: 0, left: 0,
         arrowOffset: '50%',
         updatePosition() {
           const trigger = this.$refs.trigger;
           const tip = this.$refs.tip;
           if (!trigger || !tip) return;
           const r = trigger.getBoundingClientRect();
           const placement = 'top';
           const gap = 8;
           // Force display to measure real dimensions (tip may still be hidden via x-show)
           const wasHidden = tip.style.display === 'none' || getComputedStyle(tip).display === 'none';
           if (wasHidden) tip.style.setProperty('display', 'block', 'important');
           const tipW = tip.offsetWidth || 100;
           const tipH = tip.offsetHeight || 28;
           if (wasHidden) tip.style.removeProperty('display');
           console.log('[tooltip] placement:', placement, '| trigger rect:', r, '| tipW:', tipW, '| tipH:', tipH);
           if (placement === 'top') {
             this.top  = r.top - tipH - gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'bottom') {
             this.top  = r.bottom + gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'left') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.left - tipW - gap;
           } else if (placement === 'right') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.right + gap;
           }
           // Clamp to viewport
           const minL = 8, maxL = window.innerWidth - tipW - 8;
           const origLeft = this.left;
           this.left = Math.max(minL, Math.min(this.left, maxL));
           if (placement === 'top' || placement === 'bottom') {
             const triggerCenter = r.left + r.width / 2;
             const shift = triggerCenter - this.left;
             this.arrowOffset = Math.max(8, Math.min(shift, tipW - 8)) + 'px';
           }
           console.log('[tooltip] final top:', this.top, '| left:', this.left);
         }
       }"
       @mouseenter="active = true; $nextTick(() => updatePosition())"
       @mouseleave="active = false"
       @focusin="active = true; $nextTick(() => updatePosition())"
       @focusout="active = false"

       @click.outside="active = false"

<div class="space-y-2" x-data="{
    open: false,
    searchQuery: '',
    selectedFolderId: '',
    selectedFolderName: '',
    expandedFolders: [],
    top: 'auto',
    bottom: 'auto',
    left: 0,
    width: 0,
    placement: 'bottom',
    
    toggleFolder(id) {
        if (this.expandedFolders.includes(id)) {
            this.expandedFolders = this.expandedFolders.filter(f => f !== id);
        } else {
            this.expandedFolders.push(id);
        }
    },
    selectFolder(id, name) {
        this.selectedFolderId = id;
        this.selectedFolderName = name;
        this.open = false;
    },
    updatePosition() {
        const toggle = this.$refs.toggle;
        const dropdown = this.$refs.dropdown;
        if (!toggle || !dropdown) return;
        
        const r = toggle.getBoundingClientRect();
        
        const wasHidden = dropdown.style.display === 'none' || getComputedStyle(dropdown).display === 'none';
        if (wasHidden) dropdown.style.setProperty('display', 'block', 'important');
        const dropH = dropdown.offsetHeight || 280;
        if (wasHidden) dropdown.style.removeProperty('display');
        
        const gap = 4;
        const spaceBelow = window.innerHeight - r.bottom;
        if (spaceBelow < dropH + gap && r.top > dropH + gap) {
            this.placement = 'top';
            this.top = 'auto';
            this.bottom = window.innerHeight - r.top + gap;
        } else {
            this.placement = 'bottom';
            this.top = r.bottom + gap;
            this.bottom = 'auto';
        }
        
        this.left = r.left;
        this.width = r.width;
    }
}" @click.outside="open = false" @scroll.window.capture.passive="if(open) updatePosition()" @resize.window.passive="if(open) updatePosition()">
