<div x-cloak x-show="showReview" @keydown.escape.window="showReview = false" class="fixed inset-0 z-[99] flex items-center justify-center bg-gray-900/50 dark:bg-neutral-900/80" aria-modal="true" role="dialog">
  <div @click.outside="showReview = false" class="bg-white dark:bg-neutral-800 rounded-xl shadow-xl w-full max-w-xl mx-3" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
    <div class="w-full max-h-full flex flex-col bg-white rounded-xl pointer-events-auto shadow-xl dark:bg-neutral-800">
      <!-- Header -->
        <div class="py-3 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
          <h3 id="hs-pro-edmad-label" class="font-semibold text-gray-800 dark:text-neutral-200">Review Actions</h3>
          <button type="button" @click="showReview=false" class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-200 dark:bg-neutral-700 dark:hover:bg-neutral-600 dark:text-neutral-400 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-pro-edmad">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <!-- End Header -->
        <!-- Body -->
        <div class="[&amp;::-webkit-scrollbar]:w-2 [&amp;::-webkit-scrollbar-thumb]:rounded-full [&amp;::-webkit-scrollbar-track]:bg-gray-100 [&amp;::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&amp;::-webkit-scrollbar-track]:bg-neutral-700 dark:[&amp;::-webkit-scrollbar-thumb]:bg-neutral-500">
          <div class="p-4 space-y-5">
            <!-- Input -->
            <div>
              <label for="hs-pro-eadmnm" class="block mb-2 text-sm font-medium text-gray-800 dark:text-white">
                Review Priority
              </label>
              <select id="review_priority" name="review_priority" class="relative py-2 px-3 pe-7 flex items-center gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm text-gray-800 hover:border-gray-300 focus:outline-hidden focus:border-gray-300 dark:bg-neutral-900 dark:border-neutral-800 dark:text-neutral-200 dark:hover:border-neutral-700 dark:focus:border-neutral-700">
                <option value="">Choose</option>
                
                  <option value="1">Critical</option>
                
                  <option value="3">High</option>
                
                  <option value="5">Medium</option>
                
                  <option value="7">Low</option>
                
                  <option value="10" selected="">Routine</option>
                
              </select>
              <div class="absolute top-1/2 end-2.5 -translate-y-1/2 pointer-events-none">
                <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5"></path>
                  <path d="m7 9 5-5 5 5"></path>
                </svg>
              </div>
            </div>
            <!-- End Input -->
            <!-- Input -->
            <div>
              <label for="review_notes" class="block mb-2 text-sm font-medium text-gray-800 dark:text-white">
                Review Notes
              </label>
              <textarea id="review_notes" name="review_notes" class="py-1.5 sm:py-2 px-3 block w-full border-gray-200 rounded-lg sm:text-sm placeholder:text-gray-400 focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-transparent dark:border-neutral-700 dark:text-neutral-300 dark:placeholder:text-white/60 dark:focus:ring-neutral-600" rows="4" placeholder="Add your review notes here"></textarea>
            </div>
            <!-- End Input -->
            <!-- Input -->
            <div>
              <label for="overall_integrity_assessment" class="block mb-2 text-sm font-medium text-gray-800 dark:text-white">
                Overall Integrity Assessment
              </label>
              <select id="overall_integrity_assessment" name="overall_integrity_assessment" class="relative py-2 px-3 pe-7 flex items-center gap-x-2 text-nowrap w-full cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm text-gray-800 hover:border-gray-300 focus:outline-hidden focus:border-gray-300 dark:bg-neutral-900 dark:border-neutral-800 dark:text-neutral-200 dark:hover:border-neutral-700 dark:focus:border-neutral-700">
                <option value="">Choose</option>
                <option value="CLEAN">
                  Clean
                </option>
                <option value="FLAGGED">
                  Flagged
                </option>
                <option value="COMPROMISED">
                  Compromised
                </option>
                <option value="INCONCLUSIVE">
                  Inconclusive
                </option>
              </select>
              <div class="absolute top-1/2 end-2.5 -translate-y-1/2 pointer-events-none">
                <svg class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5"></path>
                  <path d="m7 9 5-5 5 5"></path>
                </svg>
              </div>
            </div>
            <!-- End Input -->
            <!-- Input Grid -->
            <div class="flex gap-3">
              <div class="flex h-6 shrink-0 items-center">
                <div class="group grid size-4 grid-cols-1">
                  <input type="checkbox" id="completion_verified" name="completion_verified" class="col-start-1 row-start-1 appearance-none rounded-sm text-blue-600 focus:ring-blue-600 border border-gray-300 bg-white checked:border-blue-600 checked:bg-blue-600 indeterminate:border-blue-600 indeterminate:bg-blue-600 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 disabled:border-gray-300 disabled:bg-gray-100 disabled:checked:bg-gray-100 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-600 dark:checked:border-blue-600">
                  <svg class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white group-has-disabled:stroke-gray-950/25" viewBox="0 0 14 14" fill="none">
                    <path class="opacity-0 group-has-checked:opacity-100" d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    </path>
                    <path class="opacity-0 group-has-indeterminate:opacity-100" d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    </path>
                  </svg>
                </div>
              </div>
              <div class="text-sm/6 w-full">
                <label for="completion_verified" class="font-medium text-gray-900 dark:text-neutral-100">Completion Verification</label>
                <p class="text-gray-500 dark:text-neutral-400">
                  Check this to confirm that the learner's course completion has been verified.
                </p>
              </div>
            </div>
            <!-- End Input -->
          </div>
        </div>
        <!-- End Body -->
        <!-- Footer -->
        <div class="p-4 flex justify-end gap-x-2">
          <div class="w-full flex justify-end items-center gap-x-2">
            <button type="submit" name="action" value="draft" class="py-2 px-3 inline-flex justify-center items-center text-start bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#hs-pro-edmad">Save as progress</button>
            <button type="submit" name="action" value="complete" formaction="/audit/11/complete-review/" class="py-2 px-3 inline-flex justify-center items-center gap-x-2 text-start bg-blue-600 border border-blue-600 text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:ring-1 focus:ring-blue-300 dark:focus:ring-blue-500" data-hs-overlay="#hs-pro-edmad">Mark as Reviewed</button>
          </div>
        </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
