<div id="exam-list-upcoming" class="hidden" role="tabpanel" aria-labelledby="exam-list-tab-upcoming">
  <div class="grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 mb-4">
    <div class="relative">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <input type="text" class="py-[7px] ps-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder-neutral-500" placeholder="Search exam">
    </div>
    <div class="flex md:justify-end items-center gap-x-2">
      <div class="hs-dropdown [--auto-close:inside] inline-flex">
        <button id="hs-pro-dnic" type="button" class="py-[9px] px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
          Filter by date
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div
    x-data="{
      sortKey: 'startsAt',
      sortDir: 'asc',
      rows: [
        { id: 1, name: 'BCS Foundation Certificate Exam', centreCount: 3, studentsTotal: 8200, startsAt: '2026-02-15T09:00:00Z', duration: '3h', detailHref: '#' },
        { id: 2, name: 'CISM Practice Exam', centreCount: 1, studentsTotal: 1100, startsAt: '2026-02-16T10:00:00Z', duration: '2h 30m', detailHref: '#' },
        { id: 3, name: 'PMP Certification Exam', centreCount: 2, studentsTotal: 4500, startsAt: '2026-02-16T14:00:00Z', duration: '4h', detailHref: '#' },
        { id: 4, name: 'AWS Solutions Architect Exam', centreCount: 4, studentsTotal: 6200, startsAt: '2026-02-17T09:30:00Z', duration: '3h 30m', detailHref: '#' },
        { id: 5, name: 'CompTIA Security+ Exam', centreCount: 1, studentsTotal: 1800, startsAt: '2026-02-18T11:00:00Z', duration: '2h', detailHref: '#' },
      ],
      get rowsWithTopTwoUpcoming() {
        const now = new Date()
        const in1h = new Date(now.getTime() + 60 * 60 * 1000).toISOString()
        const in2h = new Date(now.getTime() + 2 * 60 * 60 * 1000).toISOString()
        return this.rows.map((r, i) => {
          if (i === 0) return { ...r, startsAt: in1h }
          if (i === 1) return { ...r, startsAt: in2h }
          return r
        })
      },
      setSort(key, dir) {
        this.sortKey = key
        this.sortDir = dir
      },
      formatStarts(iso) {
        const d = new Date(iso)
        return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + ' · ' + d.toLocaleTimeString('en-IN', { hour: 'numeric', minute: '2-digit', hour12: true })
      },
      startsIn(iso) {
        const d = new Date(iso)
        const now = new Date()
        const diffMs = d - now
        const diffH = Math.round(diffMs / (1000 * 60 * 60))
        const diffD = Math.round(diffMs / (1000 * 60 * 60 * 24))
        if (diffD >= 1) return diffD + ' day' + (diffD > 1 ? 's' : '')
        if (diffH >= 1) return diffH + ' hr' + (diffH > 1 ? 's' : '')
        const diffM = Math.round(diffMs / (1000 * 60))
        if (diffM >= 1) return diffM + ' min'
        return 'soon'
      },
      formatNum(n) { return n.toLocaleString() },
      get sortedRows() {
        const dir = this.sortDir === 'asc' ? 1 : -1
        const key = this.sortKey
        return [...this.rowsWithTopTwoUpcoming].sort((a, b) => {
          if (key === 'startsAt') return (new Date(a.startsAt) - new Date(b.startsAt)) * dir
          if (key === 'name') return (a.name.localeCompare(b.name)) * dir
          return (a[key] - b[key]) * dir
        })
      },
    }"
    class="space-y-4">
    <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
      <div class="min-w-full inline-block align-middle">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
          <thead>
            <tr class="border-t border-gray-200 dark:border-neutral-700">
              <th scope="col" class="min-w-[200px] max-w-[280px] w-0">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-upcoming-sort-name" type="button"
                    class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400"
                    aria-haspopup="menu" aria-expanded="false">
                    Exam name
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-upcoming-sort-name">
                    <div class="p-1">
                      <button type="button" @click="setSort('name','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('name','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-36">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-upcoming-sort-centres" type="button"
                    class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400"
                    aria-haspopup="menu" aria-expanded="false">
                    Centres
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-upcoming-sort-centres">
                    <div class="p-1">
                      <button type="button" @click="setSort('centreCount','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('centreCount','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-36">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-upcoming-sort-students" type="button"
                    class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400"
                    aria-haspopup="menu" aria-expanded="false">
                    Allocated
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-upcoming-sort-students">
                    <div class="p-1">
                      <button type="button" @click="setSort('studentsTotal','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('studentsTotal','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-28 px-4 py-3.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-400 whitespace-nowrap">Duration</th>
              <th scope="col" class="min-w-40">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-upcoming-sort-starts" type="button"
                    class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400"
                    aria-haspopup="menu" aria-expanded="false">
                    Starts in
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-upcoming-sort-starts">
                    <div class="p-1">
                      <button type="button" @click="setSort('startsAt','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('startsAt','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="size-px whitespace-nowrap px-4 py-3.5 text-end text-sm font-normal text-gray-500 dark:text-neutral-400">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
            <template x-for="row in sortedRows" :key="row.id">
              <tr>
                <td class="px-4 py-3 max-w-[280px] w-0">
                  <div class="min-w-0">
                    <a :href="row.detailHref" class="block font-medium text-gray-800 dark:text-neutral-200 underline-offset-2 hover:underline hover:decoration-2 hover:text-emerald-600 focus:outline-none focus:underline focus:decoration-2 focus:text-emerald-600 truncate whitespace-nowrap" x-text="row.name"></a>
                    <p class="mt-0.5 text-xs text-gray-500 dark:text-neutral-400 truncate whitespace-nowrap" x-text="formatStarts(row.startsAt)"></p>
                  </div>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="row.centreCount"></span>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="formatNum(row.studentsTotal)"></span>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-sm text-gray-600 dark:text-neutral-400" x-text="row.duration"></td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-sm text-gray-600 dark:text-neutral-400" x-text="startsIn(row.startsAt)"></td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-end">
                  <a :href="row.detailHref"
                    class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
                    View Detail
                  </a>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
    <p x-show="sortedRows.length === 0" class="py-6 text-sm text-gray-500 dark:text-neutral-400">No upcoming exams in the next 7 days.</p>
  </div>
</div>
