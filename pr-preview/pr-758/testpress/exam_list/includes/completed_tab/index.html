<div id="exam-list-completed" class="hidden" role="tabpanel" aria-labelledby="exam-list-tab-completed">
  <div class="grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 mb-4">
    <div class="relative">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <input type="text" class="py-[7px] ps-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder-neutral-500" placeholder="Search exam">
    </div>
    <div class="flex md:justify-end items-center gap-x-2">
      <button id="hs-pro-dnic" type="button" class="py-[9px] px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg bg-layer border border-layer-line text-layer-foreground shadow-2xs hover:bg-layer-hover disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-layer-focus" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        Filter by date
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
    </div>
  </div>

  <div
    x-data="{
      query: '',
      sortKey: 'endedAt',
      sortDir: 'desc',
      rows: [
        { id: 1, name: 'ACCP Professional Certification Exam', centreCount: 2, studentsTotal: 9800, attendanceMarked: 9450, attendancePct: 96, verifiedMarked: 9200, verifiedPct: 97, timeRange: 'Feb 10, 2026', endedAt: '2026-02-10T12:00:00Z', detailHref: '#' },
        { id: 2, name: 'ADCA Certification Exam', centreCount: 1, studentsTotal: 2100, attendanceMarked: 2080, attendancePct: 99, verifiedMarked: 2050, verifiedPct: 99, timeRange: 'Feb 8, 2026', endedAt: '2026-02-08T10:30:00Z', detailHref: '#' },
      ],
      setSort(key, dir) {
        this.sortKey = key
        this.sortDir = dir
      },
      barColor(pct) {
        if (pct >= 70) return 'bg-green-500 dark:bg-green-600'
        if (pct >= 40) return 'bg-amber-500 dark:bg-amber-600'
        return 'bg-red-500 dark:bg-red-600'
      },
      get sortedRows() {
        const dir = this.sortDir === 'asc' ? 1 : -1
        const key = this.sortKey
        return [...this.rows].sort((a, b) => {
          if (key === 'endedAt') return (new Date(a.endedAt) - new Date(b.endedAt)) * dir
          if (key === 'name') return (a.name.localeCompare(b.name)) * dir
          return ((a[key] ?? 0) - (b[key] ?? 0)) * dir
        })
      },
    }"
    class="space-y-4">
    <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
      <div class="min-w-full inline-block align-middle">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
          <thead>
            <tr class="border-t border-gray-200 dark:border-neutral-700">
              <th scope="col" class="min-w-[200px] max-w-[280px] w-0">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-completed-sort-name" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Exam name
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-completed-sort-name">
                    <div class="p-1">
                      <button type="button" @click="setSort('name','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('name','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-36">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-completed-sort-centres" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Center
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-completed-sort-centres">
                    <div class="p-1">
                      <button type="button" @click="setSort('centreCount','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('centreCount','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-36">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-completed-sort-allocated" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Allocated
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-completed-sort-allocated">
                    <div class="p-1">
                      <button type="button" @click="setSort('studentsTotal','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('studentsTotal','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-40">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-completed-sort-attendance" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Attendance
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-completed-sort-attendance">
                    <div class="p-1">
                      <button type="button" @click="setSort('attendancePct','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('attendancePct','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="min-w-36">
                <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
                  <button id="hs-exam-list-completed-sort-verified" type="button" class="whitespace-nowrap px-4 py-3.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-700 dark:text-neutral-400" aria-haspopup="menu" aria-expanded="false">
                    Verified
                    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                  </button>
                  <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700" role="menu" aria-labelledby="hs-exam-list-completed-sort-verified">
                    <div class="p-1">
                      <button type="button" @click="setSort('verifiedPct','asc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort ascending</button>
                      <button type="button" @click="setSort('verifiedPct','desc')" class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 dark:hover:bg-neutral-700">Sort descending</button>
                    </div>
                  </div>
                </div>
              </th>
              <th scope="col" class="size-px whitespace-nowrap px-4 py-3.5 text-end text-sm font-normal text-gray-500 dark:text-neutral-400">Actions</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
            <template x-for="row in sortedRows" :key="row.id">
              <tr>
                <td class="px-4 py-3 max-w-[280px] w-0">
                  <div class="min-w-0">
                    <a class="block font-medium text-gray-800 dark:text-neutral-200 underline-offset-2 hover:underline hover:decoration-2 hover:text-emerald-600 focus:outline-none focus:underline focus:decoration-2 focus:text-emerald-600 truncate whitespace-nowrap"
                      :href="row.detailHref" x-text="row.name"></a>
                    <p class="mt-0.5 text-xs text-gray-500 dark:text-neutral-400 truncate whitespace-nowrap" x-text="row.timeRange"></p>
                  </div>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="row.centreCount"></span>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3">
                  <span class="text-sm text-gray-600 dark:text-neutral-400" x-text="row.studentsTotal.toLocaleString()"></span>
                </td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-500 dark:text-neutral-500 tabular-nums shrink-0" x-text="row.attendancePct + '%'"></span>
                    <div class="flex-1 min-w-0 w-24 h-1.5 bg-gray-200 dark:bg-neutral-700 rounded-full overflow-hidden" role="progressbar" :aria-valuenow="row.attendancePct" aria-valuemin="0" aria-valuemax="100">
                      <div class="h-full rounded-full" :class="barColor(row.attendancePct)" :style="'width: ' + row.attendancePct + '%'"></div>
                    </div>
                  </div>
                </td>
                <td class="px-4 py-3">
                  <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-500 dark:text-neutral-500 tabular-nums shrink-0" x-text="row.verifiedPct + '%'"></span>
                    <div class="flex-1 min-w-0 w-24 h-1.5 bg-gray-200 dark:bg-neutral-700 rounded-full overflow-hidden" role="progressbar" :aria-valuenow="row.verifiedPct" aria-valuemin="0" aria-valuemax="100">
                      <div class="h-full rounded-full" :class="barColor(row.verifiedPct)" :style="'width: ' + row.verifiedPct + '%'"></div>
                    </div>
                  </div>
                </td>
                <td class="size-px whitespace-nowrap px-4 py-3 text-end">
                  <a :href="row.detailHref"
                    class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
                    View Detail
                  </a>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
    <p class="py-4 text-sm text-gray-500 dark:text-neutral-400" x-show="sortedRows.length === 0">No completed exams.</p>
  </div>
</div>
