<div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700">
  <h2 class="mb-4 font-medium text-gray-800 dark:text-neutral-200">
    Ledger entries
  </h2>

  <!-- Filters -->
  <div class="mb-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <div class="relative max-w-xs w-full">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg"
             width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
      </div>
      <input
        type="text"
        x-model="orderSearch"
        class="py-[7px] ps-10 pe-3 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 dark:bg-neutral-700 dark:placeholder:text-neutral-400"
        placeholder="Search by Order ID"
      >
    </div>
    <div class="flex items-center justify-end gap-2 w-full sm:w-auto">
      <div class="hs-dropdown [--auto-close:inside] inline-flex w-full sm:w-auto justify-end">
        <button
          type="button"
          class="relative py-2 px-3 pe-9 inline-flex items-center text-nowrap w-full sm:w-auto cursor-pointer bg-white border border-gray-200 rounded-lg text-start text-sm text-gray-800 focus:outline-hidden focus:ring-2 focus:ring-emerald-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600"
        >
          <span class="truncate">
            Filter by date range
          </span>
          <span class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="lucide lucide-calendar-days text-gray-500 dark:text-neutral-400">
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <path d="M3 10h18" />
              <path d="M8 14h.01" />
              <path d="M12 14h.01" />
              <path d="M16 14h.01" />
              <path d="M8 18h.01" />
              <path d="M12 18h.01" />
              <path d="M16 18h.01" />
            </svg>
          </span>
        </button>
        <!-- Hidden native inputs keep current filtering behaviour -->
        <div class="hidden">
          <input type="date" x-model="dateFrom">
          <input type="date" x-model="dateTo">
        </div>
      </div>
    </div>
  </div>

  <!-- Table: Date | Order ID | Gross payments | Platform fees | Taxes | Net pay -->
  <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
      <thead>
        <tr>
          <th scope="col" class="min-w-[140px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-end w-full flex items-center  gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Date
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('date', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('date', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[140px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-end w-full flex items-center  gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Order ID
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('orderId', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('orderId', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[140px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-start w-full flex items-center justify-end gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Gross payments
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('gross', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('gross', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[140px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-start w-full flex items-center justify-end gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Platform fees
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('platformFee', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('platformFee', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[120px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-end w-full flex items-center justify-end gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Taxes
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('tax', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('tax', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
          <th scope="col" class="min-w-[140px]">
            <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
              <button
                type="button"
                class="px-5 py-2.5 text-end w-full flex items-center justify-end gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100 dark:focus:bg-neutral-800"
              >
                Net pay
                <svg class="shrink-0 size-3.5 text-gray-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                     width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m7 15 5 5 5-5" />
                  <path d="m7 9 5-5 5 5" />
                </svg>
              </button>
              <div
                class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
                role="menu"
              >
                <div class="p-1">
                  <button
                    type="button"
                    @click="setOrderSort('net', 'asc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort ascending
                  </button>
                  <button
                    type="button"
                    @click="setOrderSort('net', 'desc')"
                    class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
                  >
                    Sort descending
                  </button>
                </div>
              </div>
            </div>
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
        <template x-for="row in paginatedOrderRows" :key="row.orderId">
          <tr>
            <td class="px-4 py-3 text-sm text-gray-800 dark:text-neutral-200" x-text="row.date"></td>
            <td class="px-4 py-3 text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="row.orderId"></td>
            <td class="px-4 py-3 text-sm text-end text-gray-800 dark:text-neutral-200" x-text="row.gross"></td>
            <td class="px-4 py-3 text-sm text-end text-red-600 dark:text-red-400" x-text="row.platformFee"></td>
            <td class="px-4 py-3 text-sm text-end text-red-600 dark:text-red-400" x-text="row.tax"></td>
            <td class="px-4 py-3 text-sm text-end font-medium text-gray-800 dark:text-neutral-200" x-text="row.net"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>  
</div>
