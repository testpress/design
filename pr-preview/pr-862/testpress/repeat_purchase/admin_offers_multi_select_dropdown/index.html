<div class="col-span-full"
     x-data="ProductData('', [], '', null)"
     x-init="fetchItems(); showSearchProductDropdown=false;">

  <div class="flex items-center gap-x-2">
    <label class="block text-sm font-medium leading-6 text-gray-900">
      
    </label>

    
  </div>

  <div class="mt-2">
    <input type="hidden" name="" x-model="getSelectedItemsIds()">

    <div class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:ring-emerald-600 sm:text-sm sm:leading-6"
         @click="showSearchProductDropdown=!showSearchProductDropdown;InitializeStoredItems()"
         :class="selectedItems.length == 0 ? 'h-8' : 'h-auto'">

      <div class="flex flex-wrap space-x-2 px-2">
        <template x-for="item in selectedItems" :key="item.id">
          <span class="inline-flex items-center py-0.5 pl-2 pr-0.5 rounded-full text-xs font-medium  ">
            <span x-text="item.title"></span>
            <button type="button"
                    @click.stop="removeItem(item)"
                    class="flex-shrink-0 ml-0.5 h-4 w-4 ">

              <svg class="h-2 w-2" stroke="currentColor" fill="none" viewBox="0 0 8 8">
                <path stroke-linecap="round" stroke-width="1.5" d="M1 1l6 6m0-6L1 7"/>
              </svg>

            </button>
          </span>
        </template>
      </div>
    </div>

    <div class="relative"
         x-show="showSearchProductDropdown"
         @click.away="showSearchProductDropdown=false">
      <div class="absolute w-full bg-white shadow-lg rounded-md ring-1 ring-black ring-opacity-5 z-10">
        <input
          type="search"
          @input.debounce="fetchItems({search: $event.target.value})"
          class="block w-full border-0 text-sm"
          placeholder=""
        >
        <ul class="max-h-32 overflow-auto text-sm my-3">
          <template x-for="item in displayItems()" :key="item.id">
            <li class="cursor-pointer hover:bg-gray-100 py-2 px-3"
                @click="onItemSelect(item);showSearchProductDropdown=false">
              <span x-text="item.title"></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </div>
</div>
