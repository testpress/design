<!-- Toolbar: Search + Filters -->
<div class="pb-4 border-b border-stone-200 dark:border-neutral-700 flex flex-wrap items-center justify-between gap-2">

  <!-- Search (left) -->
  <div class="relative max-w-xs w-full sm:w-auto">
    <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
      <svg class="shrink-0 size-4 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
    </div>
    <input type="text" id="content-perf-search"
      class="py-[7px] ps-10 pe-8 block w-full bg-stone-100 border-transparent rounded-lg text-sm placeholder:text-stone-500 focus:border-primary-500 focus:ring-primary-600 dark:bg-neutral-700 dark:border-transparent dark:text-neutral-400 dark:placeholder:text-neutral-400 dark:focus:ring-neutral-600"
      placeholder="Search by content title...">
  </div>

  <!-- Filters group (right) -->
  <div class="flex items-center gap-2 flex-wrap">

    <!-- Date Range Dropdown -->
    <div class="hs-dropdown [--placement:bottom-end] relative inline-flex" x-data="{ dateLabel: 'Last 30 days' }">
      <button type="button" id="cp-date-toggle"
        class="py-[7px] px-3 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false">
        <svg class="shrink-0 size-4 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/>
        </svg>
        <span x-text="dateLabel"></span>
        <svg class="shrink-0 size-3.5 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 transition-[opacity,margin] duration opacity-0 hidden z-20 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] border border-stone-200 py-1 dark:bg-neutral-900 dark:border-neutral-700" role="menu" aria-labelledby="cp-date-toggle">
        <button type="button" @click="dateLabel='Last 7 days'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Last 7 days</button>
        <button type="button" @click="dateLabel='Last 30 days'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Last 30 days</button>
        <button type="button" @click="dateLabel='Last 90 days'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Last 90 days</button>
        <button type="button" @click="dateLabel='All time'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">All time</button>
        <div class="my-1 border-t border-stone-100 dark:border-neutral-700"></div>
        <button type="button" @click="dateLabel='Custom'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Custom</button>
      </div>
    </div>
    <!-- End Date Range -->

    <!-- Content Type Dropdown -->
    <div class="hs-dropdown [--placement:bottom-end] relative inline-flex" x-data="{ typeLabel: 'All Contents' }">
      <button type="button" id="cp-type-toggle"
        class="py-[7px] px-3 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false">
        <span x-text="typeLabel"></span>
        <svg class="shrink-0 size-3.5 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-20 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] border border-stone-200 py-1 dark:bg-neutral-900 dark:border-neutral-700" role="menu" aria-labelledby="cp-type-toggle">
        <button type="button" @click="typeLabel='All Contents'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">All Contents</button>
        <button type="button" @click="typeLabel='Movie'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Movie</button>
        <button type="button" @click="typeLabel='Series'" class="w-full flex items-center gap-x-2 py-2 px-3 text-sm text-stone-800 hover:bg-stone-100 dark:text-neutral-300 dark:hover:bg-neutral-800" role="menuitem">Series</button>
      </div>
    </div>
    <!-- End Content Type -->

    <!-- Genres Multi-select -->
    <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-end] relative inline-flex"
      x-data="{
        genres: ['Action','Comedy','Drama','Horror','Sci-Fi','Thriller','Romance','Documentary'],
        pending: [],
        applied: [],
        q: '',
        get filtered() { return this.genres.filter(g => g.toLowerCase().includes(this.q.toLowerCase())) },
        get label() { return this.applied.length === 0 ? 'All Genres' : this.applied.length + ' Genre' + (this.applied.length > 1 ? 's' : '') },
        toggle(g) { this.pending.includes(g) ? this.pending = this.pending.filter(x => x !== g) : this.pending.push(g) },
        open() { this.pending = [...this.applied]; this.q = '' },
        apply() { this.applied = [...this.pending]; this.$nextTick(() => { try { HSDropdown.getInstance(document.getElementById('cp-genre-toggle')).close() } catch(e){} }) },
        clear() { this.pending = []; this.applied = []; this.$nextTick(() => { try { HSDropdown.getInstance(document.getElementById('cp-genre-toggle')).close() } catch(e){} }) }
      }"
      @hs-dropdown-open.window="open()">

      <button type="button" id="cp-genre-toggle"
        class="py-[7px] px-3 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-sm hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:border-neutral-700 dark:bg-neutral-800 dark:text-neutral-200 dark:hover:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false">
        <span x-text="label"></span>
        <svg class="shrink-0 size-3.5 text-stone-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-56 transition-[opacity,margin] duration opacity-0 hidden z-20 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] border border-stone-200 dark:bg-neutral-900 dark:border-neutral-700" role="menu" aria-labelledby="cp-genre-toggle">
        <div class="p-2 border-b border-stone-100 dark:border-neutral-700">
          <div class="relative">
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-2.5">
              <svg class="size-3.5 text-stone-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <input type="text" x-model="q" placeholder="Search genres..."
              class="py-1.5 ps-8 pe-3 block w-full bg-stone-100 border-transparent rounded-lg text-xs placeholder:text-stone-400 focus:border-primary-500 focus:ring-primary-600 dark:bg-neutral-800 dark:border-transparent dark:text-neutral-300 dark:placeholder:text-neutral-500">
          </div>
        </div>
        <div class="p-2 space-y-0.5 max-h-48 overflow-y-auto">
          <template x-for="g in filtered" :key="g">
            <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg cursor-pointer hover:bg-stone-50 dark:hover:bg-neutral-800">
              <input type="checkbox" :checked="pending.includes(g)" @change="toggle(g)"
                class="shrink-0 border-stone-300 rounded text-primary-600 focus:ring-primary-600 dark:bg-neutral-800 dark:border-neutral-600 dark:checked:bg-primary-500 dark:checked:border-primary-500">
              <span class="text-sm text-stone-800 dark:text-neutral-200" x-text="g"></span>
            </label>
          </template>
          <p x-show="filtered.length === 0" class="py-2 px-2 text-xs text-stone-400 dark:text-neutral-500">No genres found</p>
        </div>
        <div class="p-2 border-t border-stone-100 dark:border-neutral-700 flex items-center justify-between gap-x-2">
          <button type="button" @click="clear()" class="text-xs text-stone-500 hover:text-stone-700 dark:text-neutral-400 dark:hover:text-neutral-200">Clear</button>
          <button type="button" @click="apply()" class="py-1.5 px-3 text-xs font-medium rounded-lg bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500">Apply</button>
        </div>
      </div>
    </div>
    <!-- End Genres -->

  </div>
  <!-- End Filters group -->

</div>
<!-- End Toolbar -->
