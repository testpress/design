          { id: 4, displayName: 'Sneha Reddy', imageUrl: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100', enrolmentId: 'ENR2024004', email: 'sneha.reddy@example.com', phone: '+91 98765 43213', attendance: 'unmarked', biometrics: 'pending', photo: 'pending' },
          { id: 5, displayName: 'Vikram Singh', imageUrl: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100', enrolmentId: 'ENR2024005', email: 'vikram.singh@example.com', phone: '+91 98765 43214', attendance: 'present', biometrics: 'pending', photo: 'verified' }
        ],
        setSort(key, dir) {
          this.sortKey = key
          this.sortDir = dir
        },
        statusLabel(val) {
          const map = { all: 'All students', present: 'Present', absent: 'Absent', unmarked: 'Unmarked', pending_verification: 'Pending verification', partially_verified: 'Partially verified', verified: 'Verified' }
          return map[val] || val
        },
        get filteredRows() {
          let list = this.rows
          const q = this.query.trim().toLowerCase()
          if (q) list = list.filter(r => (r.displayName || '').toLowerCase().includes(q))
          if (this.statusFilter === 'all') return list
          if (this.statusFilter === 'present') return list.filter(r => r.attendance === 'present')
          if (this.statusFilter === 'absent') return list.filter(r => r.attendance === 'absent')
          if (this.statusFilter === 'unmarked') return list.filter(r => r.attendance === 'unmarked' || !r.attendance)
          if (this.statusFilter === 'pending_verification') return list.filter(r => r.biometrics === 'pending' || r.photo === 'pending')
          if (this.statusFilter === 'partially_verified') return list.filter(r => (r.biometrics === 'verified' && r.photo !== 'verified') || (r.biometrics !== 'verified' && r.photo === 'verified'))
          if (this.statusFilter === 'verified') return list.filter(r => r.biometrics === 'verified' && r.photo === 'verified')
          return list
        },
        get sortedRows() {
          const dir = this.sortDir === 'asc' ? 1 : -1
          const key = this.sortKey
          return [...this.filteredRows].sort((a, b) => {
            if (key === 'displayName') return ((a.displayName || '').localeCompare(b.displayName || '')) * dir
            if (key === 'attendance') return ((a.attendance || '').localeCompare(b.attendance || '')) * dir
            if (key === 'biometrics') return ((a.biometrics || '').localeCompare(b.biometrics || '')) * dir
            if (key === 'photo') return ((a.photo || '').localeCompare(b.photo || '')) * dir
            return 0
          })
        }
      }"
