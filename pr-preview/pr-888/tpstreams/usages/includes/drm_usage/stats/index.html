<div class="mt-12 bg-white 2xl:mt-14" x-show="totalLicenseRequests > 0">
  <div class="mx-auto max-w-7xl">
    <dl class="grid grid-cols-1 justify-items-center gap-y-8 text-center sm:grid-cols-3">
      <div class="mx-auto flex max-w-xs flex-col">
        <dt class="text-base leading-7 text-gray-600">Total License Requests</dt>
        <dd class="order-first text-3xl font-semibold tracking-tight text-gray-900 xl:text-4xl" x-text="formatNumber(totalLicenseRequests)"></dd>
      </div>

      <div class="mx-auto flex max-w-xs flex-col">
        <dt class="text-base leading-7 text-gray-600">Average per Day</dt>
        <dd class="order-first text-3xl font-semibold tracking-tight text-gray-900 xl:text-4xl" x-text="averagePerDay"></dd>
      </div>

      <div class="mx-auto flex max-w-xs flex-col">
        <dt class="text-base leading-7 text-gray-600">Highest Usage Day</dt>
        <dd class="order-first text-3xl font-semibold tracking-tight text-gray-900 xl:text-4xl" x-text="highestDayDisplay"></dd>
      </div>
    </dl>
  </div>
</div>
