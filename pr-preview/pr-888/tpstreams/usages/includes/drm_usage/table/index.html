<div class="mx-auto mt-12 max-w-7xl flow-root 2xl:mt-14" x-show="totalLicenseRequests > 0">
  <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
    <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
      <table class="min-w-full divide-y divide-gray-300">
        <thead>
          <tr>
            <th scope="col" class="w-1/2 py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-0">
              <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
  <button type="button" @click="open = !open"
    class="text-start w-full flex items-center gap-x-1 text-nowrap whitespace-nowrap focus:outline-none"
    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort Date">
    Date
    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round">
  <path d="m7 15 5 5 5-5"></path>
  <path d="m7 9 5-5 5 5"></path>
</svg>

  </button>
  <div x-show="open" @click.away="open = false"
  class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
  role="menu" aria-orientation="vertical">
  <div class="p-1">
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"></path>
        <path d="M12 19V5"></path>
      </svg>
      Sort ascending
    </button>
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14"></path>
        <path d="m19 12-7 7-7-7"></path>
      </svg>
      Sort descending
    </button>
  </div>
</div>

</div>

            </th>
            <th scope="col" class="w-1/2 px-3 py-3.5 text-left text-sm font-semibold text-gray-900">
              <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
  <button type="button" @click="open = !open"
    class="text-start w-full flex items-center gap-x-1 text-nowrap whitespace-nowrap focus:outline-none"
    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort License Requests">
    License Requests
    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round">
  <path d="m7 15 5 5 5-5"></path>
  <path d="m7 9 5-5 5 5"></path>
</svg>

  </button>
  <div x-show="open" @click.away="open = false"
  class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
  role="menu" aria-orientation="vertical">
  <div class="p-1">
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"></path>
        <path d="M12 19V5"></path>
      </svg>
      Sort ascending
    </button>
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14"></path>
        <path d="m19 12-7 7-7-7"></path>
      </svg>
      Sort descending
    </button>
  </div>
</div>

</div>

            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 bg-white">
          <template x-for="day in daysInSelectedMonth" :key="day.date">
            <tr>
              <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 sm:pl-0" x-text="day.label"></td>
              <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500" x-text="formatNumber(day.count)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
