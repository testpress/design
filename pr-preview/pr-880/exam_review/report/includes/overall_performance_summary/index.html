<div class="space-y-3 break-inside-avoid">
  <div class="flex flex-wrap justify-between items-center gap-2">
    <div>
      <h1 class="text-lg font-semibold text-gray-800 dark:text-neutral-200">Overall Performance Summary</h1>
    </div>
  </div>

  <!-- Combined Compact Stats and Chart Container -->
  <div class="border border-gray-200 dark:border-neutral-700 rounded-lg bg-white dark:bg-neutral-800 shadow-sm flex flex-col">
    
    <!-- 2-Row Statistics Grid -->
    <div class="py-5 space-y-5">
      <!-- Row 1 -->
      <div class="grid grid-cols-4 gap-4 divide-x divide-gray-200 dark:divide-neutral-700">
        <div class="px-4 first:pl-0">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Score</h2>
          <div class="flex items-baseline gap-x-1">
            <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">75<span class="text-sm font-medium text-gray-400 dark:text-neutral-500">/100</span></p>
            <p class="text-xs text-gray-500 dark:text-neutral-400 ml-1">(75%)</p>
          </div>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Accuracy</h2>
          <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">76.5%</p>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Rank</h2>
          <div class="flex items-baseline gap-x-1">
            <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">124<span class="text-sm font-medium text-gray-400 dark:text-neutral-500">/2000</span></p>
          </div>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Percentile</h2>
          <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">92.3%</p>
        </div>
      </div>
      
      <hr class="border-gray-100 dark:border-neutral-700/50">
      
      <!-- Row 2 -->
      <div class="grid grid-cols-4 gap-4 divide-x divide-gray-200 dark:divide-neutral-700">
        <div class="px-4 first:pl-0">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Total Questions</h2>
          <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">100</p>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Attempted</h2>
          <div class="flex items-baseline gap-x-1">
            <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">90<span class="text-sm font-medium text-gray-400 dark:text-neutral-500">/100</span></p>
          </div>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Time Taken</h2>
          <div class="flex items-baseline gap-x-1">
            <p class="text-xl font-medium text-gray-800 dark:text-neutral-200">39:15</p>
            <p class="text-xs font-medium text-gray-400 dark:text-neutral-500 ml-1">/ 60m</p>
          </div>
        </div>
        
        <div class="px-4">
          <h2 class="text-sm text-gray-500 dark:text-neutral-400 mb-1">Result</h2>
          <div class="flex items-center gap-x-2 mt-1">
            <span class="inline-flex items-center gap-x-1 rounded-full bg-green-100 px-3 py-1 text-xs font-semibold text-green-800 dark:bg-green-800/30 dark:text-green-500 border border-green-200 dark:border-green-900/50 tracking-wide">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-3.5 lucide lucide-check"><path d="M20 6 9 17l-5-5"/></svg>
              PASS
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Chart Breakdown (Footer style to keep compact) -->
    <div class="bg-gray-50 dark:bg-neutral-800/50 border-t border-gray-200 dark:border-neutral-700 px-5 py-4 rounded-b-lg">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm text-gray-500 dark:text-neutral-400">Question Status Breakdown</h2>
        <!-- Legend -->
        <div class="flex items-center gap-x-5">
          <div class="flex items-center gap-x-1.5">
            <span class="size-2.5 rounded-sm bg-emerald-500"></span>
            <span class="text-sm text-gray-500 dark:text-neutral-400">Correct <span class="text-gray-800 dark:text-neutral-200 font-medium ml-0.5">75</span></span>
          </div>
          <div class="flex items-center gap-x-1.5">
            <span class="size-2.5 rounded-sm bg-rose-500"></span>
            <span class="text-sm text-gray-500 dark:text-neutral-400">Incorrect <span class="text-gray-800 dark:text-neutral-200 font-medium ml-0.5">15</span></span>
          </div>
          <div class="flex items-center gap-x-1.5">
            <span class="size-2.5 rounded-sm bg-amber-400"></span>
            <span class="text-sm text-gray-500 dark:text-neutral-400">Unanswered <span class="text-gray-800 dark:text-neutral-200 font-medium ml-0.5">10</span></span>
          </div>
        </div>
      </div>
      
      <!-- Horizontal Stacked Bar -->
      <div class="flex w-full h-2.5 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700 shadow-inner">
        <div class="flex flex-col justify-center overflow-hidden bg-emerald-500" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
        <div class="flex flex-col justify-center overflow-hidden bg-rose-500" role="progressbar" style="width: 15%" aria-valuenow="15" aria-valuemin="0" aria-valuemax="100"></div>
        <div class="flex flex-col justify-center overflow-hidden bg-amber-400" role="progressbar" style="width: 10%" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>

  </div>
</div>
