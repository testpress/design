<div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
  <div class="flex flex-wrap items-center justify-between gap-3 border-b border-gray-200 px-5 py-3">
  <h3 class="text-sm font-semibold text-gray-800 sm:text-base">Daily License Requests</h3>

  <div class="inline-flex items-center gap-x-1 rounded-md border border-gray-200 bg-gray-50 p-0.5">
    <button type="button" @click="setViewMode('graph')"
      class="inline-flex items-center justify-center rounded px-2.5 py-2 transition-colors"
      :class="viewMode === 'graph' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-600 hover:bg-white/60'"
      aria-label="Graph view">
      <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v16a2 2 0 0 0 2 2h16"></path>
        <path d="M7 16c.5-2 1.5-7 4-7 2 0 2 3 4 3 2.5 0 4.5-5 5-7"></path>
      </svg>
    </button>
    <button type="button" @click="setViewMode('table')"
      class="inline-flex items-center justify-center rounded px-2.5 py-2 transition-colors"
      :class="viewMode === 'table' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-600 hover:bg-white/60'"
      aria-label="Table view">
      <svg class="size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v18"></path>
        <rect width="18" height="18" x="3" y="3" rx="2"></rect>
        <path d="M3 9h18"></path>
        <path d="M3 15h18"></path>
      </svg>
    </button>
  </div>
</div>


  <template x-if="totalLicenseRequests === 0">
    <div class="px-5 py-12 text-center">
  <svg class="mx-auto size-10 text-gray-300" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
  </svg>
  <h3 class="mt-3 text-sm font-semibold text-gray-900">No DRM usage found</h3>
  <p class="mt-1 text-sm text-gray-500">DRM license requests for the selected month will appear here.</p>
</div>

  </template>

  <template x-if="totalLicenseRequests > 0">
    <div>
      <div x-show="viewMode === 'graph'" class="min-h-[280px] p-3 sm:min-h-[315px] sm:p-5">
  <div x-ref="drmUsageChart" class="min-h-[280px] sm:min-h-[315px]"></div>
</div>

      <div x-show="viewMode === 'table'" class="overflow-x-auto">
  <table class="min-w-full table-fixed divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th scope="col" class="w-1/2">
          <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
  <button type="button" @click="open = !open"
    class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 focus:outline-none focus:bg-gray-100"
    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort Date">
    Date
    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round">
  <path d="m7 15 5 5 5-5"></path>
  <path d="m7 9 5-5 5 5"></path>
</svg>

  </button>
  <div x-show="open" @click.away="open = false"
  class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
  role="menu" aria-orientation="vertical">
  <div class="p-1">
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"></path>
        <path d="M12 19V5"></path>
      </svg>
      Sort ascending
    </button>
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14"></path>
        <path d="m19 12-7 7-7-7"></path>
      </svg>
      Sort descending
    </button>
  </div>
</div>

</div>

        </th>
        <th scope="col" class="w-1/2">
          <div class="relative inline-flex w-full cursor-pointer" x-data="{ open: false }">
  <button type="button" @click="open = !open"
    class="px-5 py-2.5 text-start w-full flex items-center gap-x-1 text-sm text-nowrap whitespace-nowrap font-normal text-gray-500 focus:outline-none focus:bg-gray-100"
    aria-haspopup="menu" :aria-expanded="open" aria-label="Sort License Requests">
    License Requests
    <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
  stroke-linejoin="round">
  <path d="m7 15 5 5 5-5"></path>
  <path d="m7 9 5-5 5 5"></path>
</svg>

  </button>
  <div x-show="open" @click.away="open = false"
  class="absolute left-0 top-full z-10 mt-1 w-40 rounded-xl border border-gray-200 bg-white shadow-xl"
  role="menu" aria-orientation="vertical">
  <div class="p-1">
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"></path>
        <path d="M12 19V5"></path>
      </svg>
      Sort ascending
    </button>
    <button type="button"
      class="w-full flex items-center gap-x-3 rounded-lg px-2 py-1.5 text-left text-[13px] font-normal text-gray-800 hover:bg-gray-100 focus:outline-none">
      <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14"></path>
        <path d="m19 12-7 7-7-7"></path>
      </svg>
      Sort descending
    </button>
  </div>
</div>

</div>

        </th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200 bg-white">
      <template x-for="day in daysInSelectedMonth" :key="day.date">
        <tr>
          <td class="whitespace-nowrap px-5 py-3 text-sm text-gray-800" x-text="day.label"></td>
          <td class="whitespace-nowrap px-5 py-3 text-sm font-semibold text-gray-900" x-text="formatNumber(day.count)"></td>
        </tr>
      </template>
    </tbody>
  </table>
</div>

    </div>
  </template>
</div>
