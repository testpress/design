</div>

<!-- Filter Sidebar -->
<div x-show="showWaitlistFilterModal" x-transition:enter="transition ease-out duration-300 transform"

       @scroll="window.dispatchEvent(new CustomEvent('sidebar-scroll'))">
    <div class="p-4 space-y-4">
      
      <!-- Status -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700">
        <div class="mb-3">
          <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
            Status
          </h5>
        </div>
        <div class="flex flex-wrap gap-2">
          
          <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
            has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
            dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
            transition-all duration-200">
            <input type="checkbox" class="hidden peer" value="Waiting" x-model="waitlistFilters.status">
            <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
              <i class="shrink-0 size-2.5" data-lucide="check"></i>
            </span>
            <span class="block">Waiting</span>
          </label>
          
          <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
            has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
            dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
            transition-all duration-200">
            <input type="checkbox" class="hidden peer" value="Removed" x-model="waitlistFilters.status">
            <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
              <i class="shrink-0 size-2.5" data-lucide="check"></i>
            </span>
            <span class="block">Removed</span>
          </label>
          
          <label class="py-2 px-2.5 relative flex justify-center items-center text-center text-[13px] bg-white border border-gray-200 ring-1 ring-transparent text-gray-800 cursor-pointer rounded-xl hover:border-primary-600 hover:ring-primary-600 dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 dark:hover:ring-neutral-600 
            has-[:checked]:bg-primary-100 has-[:checked]:border-primary-200 has-[:checked]:ring-primary-200 has-[:checked]:text-primary-800
            dark:has-[:checked]:bg-primary-800/30 dark:has-[:checked]:border-primary-800/50 dark:has-[:checked]:ring-primary-800/50 dark:has-[:checked]:text-primary-500
            transition-all duration-200">
            <input type="checkbox" class="hidden peer" value="Expired" x-model="waitlistFilters.status">
            <span class="flex shrink-0 justify-center items-center size-0 bg-primary-500 text-transparent rounded-full transition-all duration-200 peer-checked:size-4 peer-checked:me-1.5 peer-checked:text-white">
              <i class="shrink-0 size-2.5" data-lucide="check"></i>
            </span>
            <span class="block">Expired</span>
          </label>
          
        </div>
      </div>

      <!-- Expected Access -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700"
           x-data="{ 
             open: false, 
             position: 'bottom',
             options: [
               { id: 'today', name: 'Today' },
               { id: 'tomorrow', name: 'Tomorrow' },
               { id: 'within-3-days', name: 'Within 3 days' },
               { id: 'more-than-3-days', name: 'More than 3 days' },
               { id: 'not-determined', name: 'Not determined' }
             ],
             toggle() {
               this.open = !this.open;
               if (this.open) {
                 this.$nextTick(() => {
                   const trigger = this.$refs.trigger;
                   const rect = trigger.getBoundingClientRect();
                   const spaceBelow = window.innerHeight - rect.bottom;
                   this.position = spaceBelow < 280 ? 'top' : 'bottom';
                 });
               }
             }
           }">

          <h5 class="font-medium text-sm text-gray-800 dark:text-neutral-200">
            Expected Access
          </h5>
        </div>

            <template x-for="option in options" :key="option.id">
              <div @click="waitlistFilters.expected_access = option.id; open = false"
                   class="py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg flex justify-between items-center"
                   :class="waitlistFilters.expected_access === option.id ? 'bg-gray-100 dark:bg-neutral-800' : ''">
                <span x-text="option.name"></span>
                <template x-if="waitlistFilters.expected_access === option.id">
                  <i class="shrink-0 size-3.5 text-primary-600 dark:text-primary-500" data-lucide="check"></i>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

      <div class="p-4 bg-white rounded-xl border border-gray-200 dark:bg-neutral-900 dark:border-neutral-700"
           x-data="{ 
             open: false, 
             position: 'bottom',

               { id: '1-3-days', name: '1–3 days' },
               { id: '3-7-days', name: '3–7 days' },
               { id: 'more-than-7-days', name: 'More than 7 days' }
             ],
             toggle() {
               this.open = !this.open;
               if (this.open) {
                 this.$nextTick(() => {
                   const trigger = this.$refs.trigger;
                   const rect = trigger.getBoundingClientRect();
                   const spaceBelow = window.innerHeight - rect.bottom;
                   this.position = spaceBelow < 280 ? 'top' : 'bottom';

            <span x-text="options.find(o => o.id === waitlistFilters.wait_duration)?.name || 'Select option'"></span>
            <div class="absolute top-1/2 end-3 -translate-y-1/2">
              <i class="shrink-0 size-3.5 text-gray-500 dark:text-neutral-400" data-lucide="chevrons-up-down"></i>
            </div>
          </button>

          <!-- Dropdown -->
          <div x-show="open" @click.away="open = false" x-cloak x-transition
               :class="position === 'bottom' ? 'top-full mt-2' : 'bottom-full mb-2'"
               class="absolute z-50 w-full max-h-72 p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-lg shadow-xl overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
            
            <template x-for="option in options" :key="option.id">
              <div @click="waitlistFilters.wait_duration = option.id; open = false"
                   class="py-2 px-4 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg flex justify-between items-center"
                   :class="waitlistFilters.wait_duration === option.id ? 'bg-gray-100 dark:bg-neutral-800' : ''">
                <span x-text="option.name"></span>
                <template x-if="waitlistFilters.wait_duration === option.id">
                  <i class="shrink-0 size-3.5 text-primary-600 dark:text-primary-500" data-lucide="check"></i>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

    </div>
  </div>
  <!-- End Body -->

  <!-- Footer -->
  <div class="p-4 border-t dark:border-neutral-700 bg-white dark:bg-neutral-800">
    <div class="flex gap-x-2">
      <button type="button" @click="waitlistFilters.status = []; waitlistFilters.expected_access = ''; waitlistFilters.wait_duration = ''; window.dispatchEvent(new CustomEvent('clear-waitlist-filters')); showWaitlistFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300">
        Clear
      </button>
      <button type="button" @click="showWaitlistFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700">

    </div>
  </div>
  <!-- End Footer -->
</div>
