<!-- Backdrop -->
<div x-show="showFilterModal" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-300"
  x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
  class="fixed inset-0 z-[70] bg-gray-900/50 backdrop-blur-sm" style="display: none;"
  @click="showFilterModal = false">
</div>
<!-- End Backdrop -->

<!-- Filter Sidebar -->
<div x-show="showFilterModal" x-transition:enter="transition ease-out duration-300 transform"
  x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
  x-transition:leave="transition ease-in duration-300 transform" x-transition:leave-start="translate-x-0"
  x-transition:leave-end="translate-x-full"
  class="fixed top-0 end-0 size-full sm:w-[400px] z-[80] flex flex-col bg-white dark:bg-neutral-800 shadow-xl"
  style="display: none;" @click.away="showFilterModal = false" role="dialog" tabindex="-1"
  aria-labelledby="filter-sidebar-label">
  
  <!-- Header -->
  <div class="py-3 px-6 flex justify-between items-center border-b dark:border-neutral-700">
    <h3 id="filter-sidebar-label" class="font-medium text-gray-800 dark:text-neutral-200">
      Filters
    </h3>
    <button type="button" @click="showFilterModal = false"
      class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-gray-200 text-gray-800 hover:bg-gray-100 focus:outline-none focus:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-200 dark:focus:bg-neutral-700">
      <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>
  <!-- End Header -->

  <!-- Body -->
  <div class="flex-1 overflow-y-auto bg-gray-50 dark:bg-neutral-900/50 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
    <div class="p-4 space-y-4">
      <!-- Batches -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Batches
        </label>
        <select id="batch_filter" multiple data-hs-select='{
          "placeholder": "Select batches...",
          "dropdownClasses": "mt-2 z-50 w-full max-h-72 p-1 space-y-0.5 bg-white border border-gray-200 rounded-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:bg-neutral-800 dark:border-neutral-700",
          "optionClasses": "py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100 dark:text-neutral-200 dark:hover:bg-neutral-700",
          "mode": "tags",
          "wrapperClasses": "mt-2 relative ps-0.5 pe-9 flex items-center flex-wrap w-full border border-gray-300 shadow-sm rounded-lg text-start text-sm focus:border-emerald-500 focus:ring-emerald-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400",
          "tagsItemTemplate": "<div class=\"flex flex-nowrap items-center relative z-10 bg-white border border-gray-200 rounded-full p-1 m-1 dark:bg-neutral-800 dark:border-neutral-700\"><div class=\"ms-2 whitespace-nowrap text-gray-800 dark:text-neutral-200\" data-title></div><div class=\"inline-flex shrink-0 justify-center items-center size-5 ms-2 rounded-full text-gray-800 bg-gray-200 hover:bg-gray-300 focus:outline-none text-sm cursor-pointer dark:bg-neutral-700 dark:text-neutral-300\" data-remove><svg class=\"shrink-0 size-3\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"/><path d=\"m6 6 12 12\"/></svg></div></div>",
          "tagsInputId": "hs-tags-input",
          "searchNoResultText":"No batches found",
          "tagsInputClasses": "border-0 focus:ring-0 px-2 rounded-lg order-1 text-sm outline-none dark:bg-transparent",
          "optionTemplate": "<div class=\"flex items-center\"><div><div class=\"text-sm font-semibold text-gray-800 dark:text-neutral-200\" data-title></div></div><div class=\"ms-auto\"><span class=\"hidden hs-selected:block\"><svg class=\"shrink-0 size-4 text-emerald-600\" xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" fill=\"currentColor\" viewBox=\"0 0 16 16\"><path d=\"M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z\"/></svg></span></div></div>",
          "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-gray-500\" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
        }' class="hidden mt-2">
        </select>
      </div>

      <!-- Overall Progress -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Overall progress
        </label>
        <div class="mt-8 px-3" data-hs-range-slider='{
          "start": [0, 100],
          "range": { "min": 0, "max": 100 },
          "connect": true,
          "tooltips": true,
          "formatter": "integer",
          "cssClasses": {
            "target": "relative h-2 rounded-full bg-gray-100 dark:bg-neutral-700",
            "base": "w-full h-full relative z-1",
            "origin": "absolute top-0 end-0 w-full h-full origin-[0_0] rounded-full",
            "handle": "absolute top-1/2 end-0 w-[1.125rem] h-[1.125rem] bg-white border-4 border-emerald-600 rounded-full cursor-pointer translate-x-2/4 -translate-y-2/4 dark:border-emerald-500",
            "connects": "relative z-0 w-full h-full rounded-full overflow-hidden",
            "connect": "absolute top-0 end-0 z-1 w-full h-full bg-emerald-600 origin-[0_0] dark:bg-emerald-500",
            "touchArea": "absolute -top-1 -bottom-1 -start-1 -end-1",
            "tooltip": "bg-white border border-gray-200 text-sm text-gray-800 py-1 px-2 rounded-lg mb-3 absolute bottom-full start-2/4 -translate-x-2/4 dark:bg-neutral-800 dark:border-neutral-700 dark:text-white"
          }
        }'></div>
      </div>

      <!-- Exams Taken -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Exams taken
        </label>
        <div class="flex items-center gap-x-2">
          <input type="number" class="w-full bg-gray-50 border-gray-200 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400" placeholder="Min">
          <span class="text-gray-500">-</span>
          <input type="number" class="w-full bg-gray-50 border-gray-200 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400" placeholder="Max">
        </div>
      </div>

      <!-- Videos Watched -->
      <div class="p-4 bg-white rounded-xl border border-gray-200 shadow-sm dark:bg-neutral-900 dark:border-neutral-700">
        <label class="block mb-3 font-medium text-sm text-gray-800 dark:text-neutral-200">
          Videos watched
        </label>
        <div class="flex items-center gap-x-2">
          <input type="number" class="w-full bg-gray-50 border-gray-200 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400" placeholder="Min">
          <span class="text-gray-500">-</span>
          <input type="number" class="w-full bg-gray-50 border-gray-200 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-400" placeholder="Max">
        </div>
      </div>
    </div>
  </div>
  <!-- End Body -->

  <!-- Footer -->
  <div class="p-4 border-t dark:border-neutral-700 bg-white dark:bg-neutral-800">
    <div class="flex gap-x-2">
      <button type="button" @click="showFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700">
        Clear
      </button>
      <button type="button" @click="showFilterModal = false"
        class="flex-1 py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700">
        Apply Filter
      </button>
    </div>
  </div>
  <!-- End Footer -->
</div>
