<div x-show="stage === 'permissions'" class="flex flex-col h-full sentinel-animate-fade-in-up">
  
  <div class="flex-1 flex flex-col">
    <div class="mb-5">
      <h1 class="text-xl font-semibold sentinel-text-header leading-tight font-sans">Allow access to continue</h1>
      <p class="mt-1 text-sm sentinel-text-body leading-relaxed font-sans">
        This session requires access to camera, microphone and screen sharing. Allow each item below to proceed.
      </p>
    </div>
  </div>

  <div class="flex-none mb-5">
    <div class="flex flex-col gap-2.5">
      <template x-for="(perm, index) in permissions" :key="perm.name">
         <div class="flex items-center gap-3 p-3 rounded-xl border-2 transition-all duration-300 sentinel-bg-subtle"
              :class="{
                 'sentinel-border-success': perm.state === 'granted',
                 'sentinel-border-warning': perm.state === 'denied',
                 'sentinel-border-primary': perm.state === 'requesting',
                 'sentinel-border-base': perm.state === 'idle' || perm.state === 'retry',
                 'opacity-100 grayscale-0': (permissions.findIndex(p => p.state !== 'granted') === index || perm.state === 'granted' || perm.state === 'denied'),
                 'opacity-50 grayscale': !(permissions.findIndex(p => p.state !== 'granted') === index || perm.state === 'granted' || perm.state === 'denied')
              }">

          <div class="shrink-0 w-11 h-11 rounded-xl flex items-center justify-center sentinel-text-primary border-2 sentinel-border-icon-primary sentinel-bg-icon-primary">
            <template x-if="perm.name === 'camera'">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="block">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" />
              </svg>
            </template>
            <template x-if="perm.name === 'microphone'">
               <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="block">
                 <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /><path d="M19 10v1a7 7 0 0 1-14 0v-1" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" />
               </svg>
            </template>
            <template x-if="perm.name === 'screen'">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="block">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" />
                </svg>
            </template>
          </div>

          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold sentinel-text-header" x-text="perm.label"></p>
            <p class="text-xs sentinel-text-muted" x-text="perm.name === 'camera' ? 'Required to monitor you during the session' : (perm.name === 'microphone' ? 'Required for audio monitoring during the session' : 'Required to record your screen during the session')"></p>
            <template x-if="perm.state === 'denied'">
              <p class="text-xs font-medium sentinel-text-warning mt-0.5">Please provide browser permission to continue</p>
            </template>
          </div>

          <div class="shrink-0 self-center">
            <template x-if="perm.state === 'requesting'">
               <svg width="18" height="18" viewBox="0 0 16 16" fill="none" class="sentinel-spinner">
                 <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="2" stroke-dasharray="28" stroke-dashoffset="10" opacity="0.4" class="sentinel-text-primary-muted" />
                 <path d="M 8 2 A 6 6 0 0 1 14 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="sentinel-text-primary" />
               </svg>
            </template>
            <template x-if="perm.state === 'granted'">
               <div class="w-6 h-6 rounded-full flex items-center justify-center text-white sentinel-animate-pop-in sentinel-bg-success-600">
                 <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6L5 9L10 3"/></svg>
               </div>
            </template>
            <template x-if="perm.state === 'denied'">
               <button @click="requestPermission(perm.name)" 
                       class="px-3.5 py-1.5 rounded-lg text-sm font-semibold text-white transition-colors sentinel-bg-warning sentinel-bg-warning-hover">
                 Try again
               </button>
            </template>
            <template x-if="(perm.state === 'idle' || perm.state === 'retry') && permissions.slice(0, index).every(p => p.state === 'granted')">
               <button @click="requestPermission(perm.name)" class="px-4 py-1.5 rounded-lg sentinel-bg-primary sentinel-bg-primary-hover text-sm font-semibold text-white transition-colors">Allow</button>
            </template>
          </div>
        </div>
      </template>
    </div>

  </div>

  <div class="flex-1 flex flex-col justify-end">
    <div class="flex justify-end gap-2.5">
      <button @click="stage = 'hidden'" class="px-4 py-2 rounded-lg border-2 sentinel-border-base text-sm font-medium sentinel-text-action hover:sentinel-bg-subtle transition-colors">Cancel</button>
      <button :disabled="!permissions.every(p => p.state === 'granted')" 
              @click="validatePermissions()" 
              class="px-5 py-2 rounded-lg sentinel-bg-primary sentinel-bg-primary-hover text-sm font-semibold text-white shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition-all">
        Continue
      </button>
    </div>
  </div>
</div>
