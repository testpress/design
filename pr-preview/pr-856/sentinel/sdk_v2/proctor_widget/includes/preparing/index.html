<div x-show="stage === 'preparing'" class="flex flex-col h-full sentinel-animate-fade-in">
  
  <template x-if="!preparingFailed">
    <div class="flex flex-col h-full">
      <div class="flex-1 flex flex-col">
        <div class="mb-5">
          <h1 class="m-0 mb-1.5 text-xl font-semibold text-foreground leading-snug font-sans">
            Preparing your setup
          </h1>
          <p class="m-0 text-sm text-muted-foreground-2 leading-normal font-sans">
            We're setting up a secure and stable environment for your session. This will take a moment.
          </p>
        </div>
      </div>

      <div class="flex-none flex flex-col items-center justify-center my-6">
        
        <div class="relative mb-8">
          <div class="relative h-1.5 w-64 bg-primary/10 rounded-full overflow-hidden">
            <div class="h-full w-full bg-gradient-to-r from-primary-400 via-primary-500 to-primary-600 rounded-full sentinel-animate-wobble"></div>
          </div>
        </div>

        <p class="m-0 text-sm font-medium text-muted-foreground font-sans text-center min-h-6" x-text="statusText"></p>
      </div>

      <div class="flex-1"></div>
    </div>
  </template>
  <template x-if="preparingFailed">
    <div class="flex-1 flex flex-col h-full">
      
      <div class="flex-1 flex flex-col justify-center items-center text-center">
        <div class="flex justify-center mb-6">
          <div class="w-16 h-16 rounded-full bg-red-50 dark:bg-red-900/40 border-2 border-red-600/50 dark:border-red-400/50 flex items-center justify-center sentinel-animate-pop-in" aria-hidden="true">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-red-600 dark:text-red-400">
              <path d="M10.29 3.86l-8.47 14.14a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
              <line x1="12" y1="9" x2="12" y2="13" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </div>
        </div>

        <h2 class="m-0 mb-2 text-lg font-semibold text-foreground font-sans">We couldn't prepare your session</h2>
        <p class="m-0 text-sm text-muted-foreground-1 leading-relaxed max-w-xs font-sans text-center">
          There was a problem during setup. This could be a browser compatibility issue or a network error. Please try again.
        </p>
      </div>

      <div class="flex flex-row items-center justify-end gap-2.5 mt-auto pt-5">
        <button type="button" @click="stage = 'hidden'" 
                class="px-4 py-2 rounded-lg border-2 border-border text-sm font-medium text-muted-foreground-2 hover:bg-background-1 transition-colors">
          Cancel
        </button>
        <button type="button" @click="runSimulatedChecks()" 
                class="px-5 py-2 rounded-lg bg-primary hover:bg-primary-hover text-sm font-semibold text-white shadow-sm transition-all">
          Try again
        </button>
      </div>
    </div>
  </template>

</div>
