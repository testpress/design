<div class="xl:col-span-4 flex flex-col bg-white border border-gray-200 shadow-2xs rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
  <!-- Body -->
  <div class="grid md:grid-cols-8 divide-x divide-gray-200 dark:divide-neutral-600">
    <!-- Left Section -->
    <div class="md:col-span-5 lg:col-span-6 p-5 space-y-8">
      
      <!-- Daily Progress Section -->
      <div class="space-y-6">
        <div class="flex flex-col lg:flex-row items-center gap-8">
          <!-- Completion Gauge (Green) -->
          <div class="relative size-40 shrink-0">
            <svg class="rotate-[135deg] size-full" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
              <circle cx="18" cy="18" r="16" fill="none" class="stroke-current text-green-200 dark:text-green-700" stroke-width="1.5" stroke-dasharray="75 100" stroke-linecap="round"></circle>
              <circle cx="18" cy="18" r="16" fill="none" class="stroke-current text-green-500 dark:text-green-500" stroke-width="2.5" stroke-dasharray=" 100" stroke-linecap="round"></circle>
            </svg>
            <div class="absolute top-1/2 start-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
              <span class="text-4xl font-bold text-green-600 dark:text-green-500">%</span>
              <span class="text-green-600 dark:text-green-500 block text-xs uppercase font-semibold">Completed</span>
            </div>
          </div>

          <!-- Progress Info -->
          <div class="flex-1 w-full space-y-4">
            <div class="flex justify-between items-start gap-x-4">
              <div>
                <h4 class="text-2xl font-bold text-slate-800 dark:text-neutral-200"> /  Attempted</h4>
                <p class="text-sm text-gray-500 dark:text-neutral-500 mt-1"></p>
              </div>
              <span class="shrink-0 inline-flex items-center gap-x-1.5 py-1 px-2.5 rounded-full text-[10px] font-medium  uppercase">
                
              </span>
            </div>
            <!-- Horizontal Progress Bar -->
            <div class="flex w-full h-2 bg-gray-200 rounded-full overflow-hidden dark:bg-neutral-700">
              <div class="flex flex-col justify-center overflow-hidden bg-emerald-600 text-xs text-white text-center whitespace-nowrap transition duration-500" role="progressbar" style="width: %" aria-valuenow="" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Meta Info Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <!-- Difficulty Box -->
        <div class="p-4 flex flex-col border border-gray-200 rounded-xl dark:border-neutral-700">
          <h2 class="text-xs font-semibold text-gray-500 dark:text-neutral-500 uppercase tracking-tight">Difficulty</h2>
          <div class="mt-2 flex items-center gap-x-2">
            <p class="text-xl font-bold text-gray-800 dark:text-neutral-200"></p>
          </div>
        </div>

        <!-- Subjects Box -->
        <div class="p-4 flex flex-col border border-gray-200 rounded-xl dark:border-neutral-700">
          <h2 class="text-xs font-semibold text-gray-500 dark:text-neutral-500 uppercase tracking-tight">Targeted Subjects</h2>
          <div class="mt-2 flex flex-wrap gap-2">
            
          </div>
        </div>
      </div>

    </div>

    <!-- Right Sidebar -->
    <div class="md:col-span-3 lg:col-span-2">
      <div class="py-6 px-2 sm:px-4 max-w-full overflow-hidden">
        <div class="flex flex-col justify-center items-center w-full">
          <div id="hs-pie-chart" class="min-h-[14rem] w-full flex justify-center"></div>
        
          <!-- Legend Indicator -->
          <div class="flex flex-wrap justify-center items-center gap-x-4 gap-y-2 mt-3 sm:mt-6 w-full">
            <div class="inline-flex items-center">
              <span class="shrink-0 size-2.5 inline-block bg-green-500 rounded-sm me-2"></span>
              <span class="text-[13px] text-gray-600 dark:text-neutral-400 whitespace-nowrap">
                Correct
              </span>
            </div>
            <div class="inline-flex items-center">
              <span class="shrink-0 size-2.5 inline-block bg-red-500 rounded-sm me-2"></span>
              <span class="text-[13px] text-gray-600 dark:text-neutral-400 whitespace-nowrap">
                Incorrect
              </span>
            </div>
            <div class="inline-flex items-center">
              <span class="shrink-0 size-2.5 inline-block bg-orange-500 rounded-sm me-2"></span>
              <span class="text-[13px] text-gray-600 dark:text-neutral-400 whitespace-nowrap">
                Unanswered
              </span>
            </div>
          </div>
          <!-- End Legend Indicator -->
        </div>
      </div>
    </div>
    <!-- End Col -->
  </div>
  <!-- End Body -->
</div>
