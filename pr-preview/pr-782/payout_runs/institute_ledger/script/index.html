<script>
  function institutePayoutDetail() {
    return {
      runId: '',
      statusParam: '',
      instituteName: '',
      payoutAmountDisplay: '',
      currency: 'INR',
      createdOnDisplay: '',
      payoutState: 'paid', // 'paid' | 'calculated' | 'failed'
      paymentGateway: 'Razorpay',
      timeWindowDisplay: '',
      gatewayPayoutId: '',
      failureReason: '',
      breakdown: {
        gross: '₹50,000',
        platformFee: '-₹5,000',
        tax: '-₹900',
        adjustment: '₹0',
        net: '₹44,100',
      },
      orderRows: [
        { date: '12 Feb 2026', rawDate: '2026-02-12', orderId: 'ORD-123', gross: '₹1,000', platformFee: '-₹100', tax: '-₹18', adjustment: '0', net: '₹882' },
        { date: '12 Feb 2026', rawDate: '2026-02-12', orderId: 'ORD-124', gross: '₹2,000', platformFee: '-₹200', tax: '-₹36', adjustment: '0', net: '₹1,764' },
        { date: '11 Feb 2026', rawDate: '2026-02-11', orderId: 'ORD-122', gross: '₹500', platformFee: '-₹50', tax: '-₹9', adjustment: '0', net: '₹441' },
      ],
      orderSearch: '',
      dateFrom: '',
      dateTo: '',
      orderSortKey: 'date', // 'date' | 'orderId' | 'gross' | 'platformFee' | 'tax' | 'net'
      orderSortDirection: 'asc', // 'asc' | 'desc'
      ledgerPage: 1,
      ledgerPageSize: 10,
      timeline: [
        { time: '10:00', label: 'Run evaluated' },
        { time: '10:05', label: 'Approved' },
        { time: '10:10', label: 'Sent to Razorpay' },
        { time: '10:12', label: 'Paid' },
      ],

      get runDetailUrl() {
        const base = '/payout_runs/detail/';
        const q = new URLSearchParams();
        if (this.runId) q.set('run_id', this.runId);
        if (this.statusParam) q.set('status', this.statusParam);
        return base + (q.toString() ? '?' + q.toString() : '');
      },

      get filteredOrderRows() {
        let rows = this.orderRows.slice();
        const q = (this.orderSearch || '').toLowerCase().trim();
        if (q) {
          rows = rows.filter(r => (r.orderId || '').toLowerCase().includes(q));
        }
        const from = this.dateFrom;
        const to = this.dateTo;
        if (from) rows = rows.filter(r => (r.rawDate || '') >= from);
        if (to) rows = rows.filter(r => (r.rawDate || '') <= to);
        // Sort by selected column
        const key = this.orderSortKey || 'orderId';
        const dir = this.orderSortDirection === 'desc' ? 'desc' : 'asc';
        const parseAmount = (val) => {
          if (!val && val !== 0) return 0;
          const numeric = val.toString().replace(/[^\d.-]/g, '');
          return parseFloat(numeric || '0');
        };
        rows.sort((a, b) => {
          let av, bv;
          if (key === 'date') {
            av = (a.rawDate || '').toString();
            bv = (b.rawDate || '').toString();
            if (av < bv) return dir === 'asc' ? -1 : 1;
            if (av > bv) return dir === 'asc' ? 1 : -1;
            return 0;
          }
          if (key === 'orderId') {
            av = (a.orderId || '').toString().toLowerCase();
            bv = (b.orderId || '').toString().toLowerCase();
            if (av < bv) return dir === 'asc' ? -1 : 1;
            if (av > bv) return dir === 'asc' ? 1 : -1;
            return 0;
          }
          if (key === 'gross') {
            av = parseAmount(a.gross);
            bv = parseAmount(b.gross);
          } else if (key === 'platformFee') {
            av = parseAmount(a.platformFee);
            bv = parseAmount(b.platformFee);
          } else if (key === 'tax') {
            av = parseAmount(a.tax);
            bv = parseAmount(b.tax);
          } else if (key === 'net') {
            av = parseAmount(a.net);
            bv = parseAmount(b.net);
          } else {
            av = 0;
            bv = 0;
          }
          return dir === 'asc' ? av - bv : bv - av;
        });
        return rows;
      },

      get totalLedgerPages() {
        const n = this.filteredOrderRows.length;
        return n === 0 ? 1 : Math.ceil(n / this.ledgerPageSize);
      },

      get paginatedOrderRows() {
        const list = this.filteredOrderRows;
        const start = (this.ledgerPage - 1) * this.ledgerPageSize;
        return list.slice(start, start + this.ledgerPageSize);
      },

      setOrderSort(key, direction) {
        this.orderSortKey = key;
        this.orderSortDirection = direction === 'desc' ? 'desc' : 'asc';
      },

      init() {
        const params = new URLSearchParams(window.location.search);
        this.runId = params.get('run_id') || 'PR-20022026-001';
        this.statusParam = params.get('status') || 'completed';
        const instituteId = params.get('institute_id');
        const name = params.get('name');

        this.instituteName = name ? decodeURIComponent(name) : 'Bala Institute of Technology';
        this.payoutAmountDisplay = '₹44,100';
        this.createdOnDisplay = 'Created on Apr 10, 2026';
        this.timeWindowDisplay = '10 Apr 2026 00:00 → 12 Apr 2026 23:59';
        this.gatewayPayoutId = 'rp_payout_abc123';
        this.payoutState = (params.get('state') || 'paid').toLowerCase();
        if (this.payoutState !== 'paid' && this.payoutState !== 'calculated' && this.payoutState !== 'failed') {
          this.payoutState = 'paid';
        }
        if (this.payoutState === 'failed') {
          this.failureReason = 'Payment failed due to incorrect bank details. Update the bank information and retry.';
        }
      },
    };
  }
</script>
