<!-- Step: Confirm your photo — same layout as manual check: pic, message, then buttons -->
<div x-show="identityStep === 'photo_captured'" class="p-4" x-cloak>
  <div class="aspect-[4/3] max-h-64 mx-auto bg-gray-100 dark:bg-neutral-700 rounded-lg overflow-hidden">
    <img :src="identityCapturedImage" alt="Captured photo" class="w-full h-full object-cover" />
  </div>
  <p class="mt-4 text-center text-sm text-gray-600 dark:text-neutral-400">Please review the photo captured.</p>
  <p class="text-center text-sm text-gray-600 dark:text-neutral-400 mt-0 leading-tight">Make sure your face is clearly
    visible before confirming.</p>
  <div class="mt-6 flex gap-3">
    <button type="button" @click="retakePhoto()"
      class="flex-1 py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 dark:border-neutral-600 bg-white dark:bg-neutral-700 text-gray-800 dark:text-neutral-200 hover:bg-gray-50 dark:hover:bg-neutral-600 focus:outline-none focus:ring-2 focus:ring-gray-300 dark:focus:ring-neutral-500">
      Retake photo
    </button>
    <button type="button" @click="submitForReview()"
      class="flex-1 py-2.5 px-4 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-primary-600 text-white hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500">
      Submit for review
    </button>
  </div>
</div>
