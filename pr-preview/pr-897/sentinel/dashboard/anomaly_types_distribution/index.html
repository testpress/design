  <script>
    // Initialize ECharts v6.0.0 Half Doughnut Chart for Anomaly Types
    (function () {
      // Wait for DOM to be fully loaded
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChart);
      } else {
        initChart();
      }

      function initChart() {
        const chartDom = document.getElementById('anomaly-chart');
        if (!chartDom || typeof echarts === 'undefined') {
          console.warn('ECharts not loaded or chart container not found');
          return;
        }

        // Initialize chart
        const myChart = echarts.init(chartDom);

        // Preline colors converted from OKLCH to RGB
        const colors = [
          '#7c3aed',  // Deep purple - oklch(43.2% 0.232 292.759)
          '#a78bfa',  // Medium purple - oklch(60.6% 0.25 292.717)
          '#ddd6fe',  // Light purple - oklch(81.1% 0.111 293.571)
          '#ede9fe',  // Very light purple - oklch(87.2% 0.01 258.338)
          '#4b5563'   // Dark gray - oklch(37.1% 0 0)
        ];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: '{b}: {c} ({d}%)',
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            borderColor: '#e5e7eb',
            borderWidth: 1,
            textStyle: {
              color: '#1f2937',
              fontSize: 13
            }
          },
          series: [
            {
              name: 'Anomaly Types',
              type: 'pie',
              radius: ['60%', '110%'],
              center: ['45%', '80%'],
              startAngle: 180,
              endAngle: 360,
              data: [
                {
                  value: 562,
                  name: 'Tab Switch',
                  itemStyle: {
                    color: colors[0]
                  }
                },
                {
                  value: 312,
                  name: 'Face Detection',
                  itemStyle: {
                    color: colors[1]
                  }
                },
                {
                  value: 187,
                  name: 'Navigation',
                  itemStyle: {
                    color: colors[2]
                  }
                },
                {
                  value: 124,
                  name: 'Idle Time',
                  itemStyle: {
                    color: colors[3]
                  }
                },
                {
                  value: 62,
                  name: 'Bot Detection',
                  itemStyle: {
                    color: colors[4]
                  }
                }
              ]
            }
          ],
          grid: {
            top: 20,
            bottom: -140
          }
        };

        myChart.setOption(option);

        // Responsive resize with debouncing
        let resizeTimer;
        window.addEventListener('resize', function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function () {
            myChart.resize();
          }, 100);
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', function () {
          myChart.dispose();
        });
      }
    })();
  </script>
