<!-- Header -->
<div class="flex gap-3 items-center">
  <!-- Icon -->
  <span
    class="flex shrink-0 justify-center items-center size-14 bg-stone-100 font-medium text-xl text-stone-800 uppercase rounded-full dark:bg-neutral-800 dark:text-neutral-200">
    <img id="mentor-detail-avatar" class="shrink-0 size-14 rounded-full" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&amp;w=160&amp;h=160&amp;auto=format&amp;fit=crop" alt="Harish V's Avatar">
    <!-- <span>LC</span> -->
  </span>
  <!-- End Icon -->

  <div class="grow">
    <div class="flex flex-wrap items-center gap-y-3 gap-x-5">
      <div class="grow">
        <h1 id="mentor-detail-name" class="font-medium text-xl text-stone-800 dark:text-neutral-200">
          Harish V
        </h1>


        <!-- List -->
        <ul class="flex flex-wrap items-center gap-x-2">
          <li
            class="relative before:hidden md:before:inline-block first:before:hidden first:before:ms-0 before:content-['•'] before:text-stone-300 dark:before:text-neutral-500 before:me-1">
            <span class="text-sm text-stone-500 dark:text-neutral-500">
              Enrollment ID:
            </span>
            <span id="mentor-detail-course" class="font-medium text-sm text-stone-800 dark:text-neutral-200">
              HQ-S-190126-MOR-011
            </span>
          </li>
          <li
            class="relative before:hidden md:before:inline-block first:before:hidden first:before:ms-0 before:content-['•'] before:text-stone-300 dark:before:text-neutral-500 before:me-1">
            <span class="text-sm text-stone-500 dark:text-neutral-500">
              Joined on:
            </span>
            <span id="mentor-detail-joined" class="font-medium text-sm text-stone-800 dark:text-neutral-200">
              12 Jan 2025
            </span>
          </li>
        </ul>
        <!-- End List -->
      </div>

      <!-- Button Group -->
      <div class="flex flex-wrap items-center justify-end gap-2">
        
        <div class="hs-dropdown [--auto-close:inside] relative inline-flex">
          <button id="student-switcher" type="button"
            class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-sm font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800"
            aria-haspopup="menu" aria-expanded="false" aria-label="Switch student">
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
            </svg>
            <span>Switch student</span>
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </button>

          <div
            class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-72 transition-[opacity,margin] duration opacity-0 hidden z-20 bg-white border border-stone-200 rounded-xl shadow-lg dark:bg-neutral-900 dark:border-neutral-700"
            role="menu" aria-orientation="vertical" aria-labelledby="student-switcher">
            <div class="p-3 border-b border-stone-200 dark:border-neutral-700">
              <p class="text-sm font-medium text-stone-800 dark:text-neutral-200">Select student</p>
              <div class="mt-2 relative">
                <input id="student-switch-search" type="text" placeholder="Find a student"
                  class="py-1.5 ps-8 pe-3 block w-full border-stone-200 rounded-lg text-sm focus:border-green-500 focus:ring-green-500 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:focus:ring-neutral-600">
                <div class="absolute inset-y-0 start-0 flex items-center ps-2.5 pointer-events-none">
                  <svg class="shrink-0 size-4 text-stone-400 dark:text-neutral-500" xmlns="http://www.w3.org/2000/svg"
                    width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                  </svg>
                </div>
              </div>
            </div>

            <div class="p-1 max-h-72 overflow-y-auto">
              <a href="#"
                data-student-option data-student-name="Harish V"
                class="py-2 px-3 flex items-center gap-x-2 rounded-lg bg-stone-100 dark:bg-neutral-800">
                <img class="shrink-0 size-7 rounded-full object-cover" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&amp;w=160&amp;h=160&amp;auto=format&amp;fit=crop" alt="Harish V avatar">
                <span class="text-sm font-medium text-stone-800 dark:text-neutral-200">Harish V</span>
                <span data-student-check class="ms-auto">
                  <svg class="shrink-0 size-4 text-stone-700 dark:text-neutral-300" xmlns="http://www.w3.org/2000/svg"
                    width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                </span>
              </a>
              <a href="#"
                data-student-option data-student-name="Pooja N"
                class="py-2 px-3 flex items-center gap-x-2 rounded-lg hover:bg-stone-100 focus:outline-hidden focus:bg-stone-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <img class="shrink-0 size-7 rounded-full object-cover"
                  src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?q=80&w=160&h=160&auto=format&fit=crop" alt="Pooja N avatar">
                <span class="text-sm text-stone-800 dark:text-neutral-200">Pooja N</span>
              </a>
              <a href="#"
                data-student-option data-student-name="Aarthi S"
                class="py-2 px-3 flex items-center gap-x-2 rounded-lg hover:bg-stone-100 focus:outline-hidden focus:bg-stone-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <img class="shrink-0 size-7 rounded-full object-cover"
                  src="https://images.unsplash.com/photo-1542382257-80dedb725088?q=80&w=160&h=160&auto=format&fit=crop" alt="Aarthi S avatar">
                <span class="text-sm text-stone-800 dark:text-neutral-200">Aarthi S</span>
              </a>
              <a href="#"
                data-student-option data-student-name="Sneha M"
                class="py-2 px-3 flex items-center gap-x-2 rounded-lg hover:bg-stone-100 focus:outline-hidden focus:bg-stone-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <img class="shrink-0 size-7 rounded-full object-cover"
                  src="https://images.unsplash.com/photo-1558898479-33c0057a5d12?q=80&w=160&h=160&auto=format&fit=crop" alt="Sneha M avatar">
                <span class="text-sm text-stone-800 dark:text-neutral-200">Sneha M</span>
              </a>
              <p id="student-switch-empty" class="hidden py-2 px-3 text-sm text-stone-500 dark:text-neutral-400">No students found.</p>
            </div>
          </div>
        </div>
        <div class="hs-tooltip inline-block">
          <a href="#" aria-label="Download report"
            class="hs-tooltip-toggle size-8.5 inline-flex justify-center items-center gap-x-2 text-sm rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
            <span class="sr-only">Download report</span>
            <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
          </a>
          <span
            class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 inline-block absolute invisible z-20 py-1.5 px-2.5 bg-stone-900 text-xs text-white rounded-lg dark:bg-neutral-700"
            role="tooltip">
            Download report
          </span>
        </div>
      </div>
      <!-- End Button Group -->
    </div>
  </div>
</div>
<!-- End Header -->
