<!-- Add Task Modal -->
<div id="hs-pro-add-task-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-80 overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-pro-add-task-modal-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-stone-200 dark:border-neutral-700">
        <h3 id="hs-pro-add-task-modal-label" class="font-semibold text-stone-800 dark:text-neutral-200">Add a to-do</h3>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-stone-100 dark:bg-neutral-700 text-stone-800 dark:text-neutral-200 hover:bg-stone-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-200 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-pro-add-task-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-stone-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <form class="p-4 space-y-4">
          <div class="space-y-2">
            <label for="hs-pro-add-task-title" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Title
            </label>
            <input id="hs-pro-add-task-title" type="text" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600" placeholder="e.g., Review sprint risk board and unblock top issues">
          </div>

          <div class="space-y-2">
            <label for="hs-pro-add-task-description" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Description
            </label>
            <textarea id="hs-pro-add-task-description" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600" rows="4" placeholder="Add context, expected outcome, or notes for this task." spellcheck="false"></textarea>
          </div>

          <div class="space-y-2">
            <label for="hs-pro-add-task-due-date" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Due date
            </label>
            <input id="hs-pro-add-task-due-date" type="date" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600">
          </div>

          
          <p>
            <button
              type="button"
              id="hs-pro-add-task-advanced-toggle"
              class="hs-collapse-toggle py-1.5 px-2 inline-flex items-center gap-x-1 text-xs font-medium rounded-full bg-white dark:bg-neutral-800 border border-dashed border-stone-200 dark:border-neutral-700 text-green-600 dark:text-green-500 hover:bg-stone-50 dark:hover:bg-neutral-700 focus:outline-hidden focus:bg-stone-50 dark:focus:bg-neutral-700"
              aria-expanded="false"
              aria-controls="hs-pro-add-task-followup-panel"
              data-hs-collapse="#hs-pro-add-task-followup-panel">
              <span class="hs-collapse-open:hidden inline-flex items-center gap-x-1">
                <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14"/>
                  <path d="M12 5v14"/>
                </svg>
                Show advanced options
              </span>
              <span class="hs-collapse-open:inline-flex hidden items-center gap-x-1">
                <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14"/>
                  <path d="M12 5v14"/>
                </svg>
                Hide advanced options
              </span>
            </button>
          </p>

          <div
            id="hs-pro-add-task-followup-panel"
            class="hs-collapse hidden w-full overflow-hidden transition-[height] duration-300"
            role="region"
            aria-labelledby="hs-pro-add-task-followup-legend"
            aria-describedby="hs-pro-add-task-followup-help">
            <fieldset class="rounded-lg border border-stone-200 dark:border-neutral-700 p-3 space-y-3">
              <legend id="hs-pro-add-task-followup-legend" class="px-1 text-sm font-medium text-stone-800 dark:text-neutral-200">
                Link a follow-up note to this task (optional)
              </legend>
              <div class="space-y-2">
                <label for="hs-pro-add-task-followup-select" class="block text-xs font-medium text-stone-600 dark:text-neutral-400">
                  Follow-up note
                </label>
                
                <select id="hs-pro-add-task-followup-select" name="follow_up_id" aria-describedby="hs-pro-add-task-followup-help" data-hs-select='{
                  "hasSearch": true,
                  "searchLimit": 5,
                  "searchPlaceholder": "Search...",
                  "searchClasses": "block w-full text-sm border-stone-200 rounded-lg focus:border-green-500 focus:ring-green-500 before:absolute before:inset-0 before:z-1 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 placeholder:text-stone-400 dark:placeholder:text-white/60 py-2 px-3",
                  "searchWrapperClasses": "bg-white p-2 -mx-1 sticky top-0 dark:bg-neutral-900",
                  "placeholder": "Select a follow-up note...",
                  "toggleTag": "<button type=\"button\" aria-expanded=\"false\"><span class=\"me-2\" data-icon></span><span class=\"text-stone-800 dark:text-neutral-200 \" data-title></span></button>",
                  "toggleClasses": "hs-select-disabled:pointer-events-none hs-select-disabled:opacity-50 relative py-2 px-4 pe-9 flex text-nowrap w-full cursor-pointer bg-white border border-stone-200 rounded-lg text-start text-sm text-stone-800 focus:outline-hidden focus:ring-2 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600",
                  "dropdownClasses": "mt-2 max-h-72 pb-1 px-1 space-y-0.5 z-20 w-full bg-white border border-stone-200 rounded-lg overflow-hidden overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-stone-100 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 dark:bg-neutral-900 dark:border-neutral-700",
                  "optionClasses": "py-2 px-4 w-full text-sm text-stone-800 cursor-pointer hover:bg-stone-100 rounded-lg focus:outline-hidden focus:bg-stone-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 dark:text-neutral-200 dark:focus:bg-neutral-800",
                  "optionTemplate": "<div><div class=\"flex items-center\"><div class=\"me-2\" data-icon></div><div class=\"text-stone-800 dark:text-neutral-200 \" data-title></div></div></div>",
                  "extraMarkup": "<div class=\"absolute top-1/2 end-3 -translate-y-1/2\"><svg class=\"shrink-0 size-3.5 text-stone-500 dark:text-neutral-500 \" xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m7 15 5 5 5-5\"/><path d=\"m7 9 5-5 5 5\"/></svg></div>"
                }' class="hidden">
                    <option value="">--------</option>
                    
                    <option value="fu-sophia-review-impact">April 30, 2026 · Sophia Lee — review-impact decline</option>
                    
                    <option value="fu-chris-attendance-batch-a12">April 30, 2026 · Chris Evans — attendance dip in Batch A12</option>
                    
                  </select>
                <p id="hs-pro-add-task-followup-help" class="text-xs text-stone-500 dark:text-neutral-400 leading-relaxed">
                  The note you select is linked to this task so you remember what was discussed and what still needs to happen.
                </p>
              </div>
            </fieldset>
          </div>
          
        </form>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end items-center gap-x-2 border-t border-stone-200 dark:border-neutral-700">
        <button type="button" class="py-2 px-3 inline-flex justify-center items-center text-sm font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#hs-pro-add-task-modal">
          Cancel
        </button>
        <button type="button" class="py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-green-600 text-white shadow-2xs hover:bg-green-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-green-700 dark:bg-green-500 dark:hover:bg-green-600 dark:focus:bg-green-600" data-hs-overlay="#hs-pro-add-task-modal">
          Add task
        </button>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
<!-- End Add Task Modal -->
