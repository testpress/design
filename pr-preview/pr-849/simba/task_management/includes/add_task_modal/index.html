<!-- Add Task Modal -->
<div id="hs-pro-add-task-modal" class="hs-overlay hidden size-full fixed top-0 start-0 z-80 overflow-x-hidden overflow-y-auto [--close-when-click-inside:true] pointer-events-none" role="dialog" tabindex="-1" aria-labelledby="hs-pro-add-task-modal-label">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-xl sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] min-h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white dark:bg-neutral-800 border border-stone-200 dark:border-neutral-700 rounded-xl pointer-events-auto shadow-xl">
      <!-- Header -->
      <div class="py-2.5 px-4 flex justify-between items-center border-b border-stone-200 dark:border-neutral-700">
        <h3 id="hs-pro-add-task-modal-label" class="font-semibold text-stone-800 dark:text-neutral-200">Add a to-do</h3>
        <button type="button" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-stone-100 dark:bg-neutral-700 text-stone-800 dark:text-neutral-200 hover:bg-stone-200 dark:hover:bg-neutral-600 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-200 dark:focus:bg-neutral-600" aria-label="Close" data-hs-overlay="#hs-pro-add-task-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"/>
            <path d="m6 6 12 12"/>
          </svg>
        </button>
      </div>
      <!-- End Header -->

      <!-- Body -->
      <div class="overflow-y-auto [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-stone-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-stone-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
        <form class="p-4 space-y-4">
          <div class="space-y-2">
            <label for="hs-pro-add-task-title" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Title
            </label>
            <input id="hs-pro-add-task-title" type="text" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600" placeholder="e.g., Review sprint risk board and unblock top issues">
          </div>

          <div class="space-y-2">
            <label for="hs-pro-add-task-description" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Description
            </label>
            <textarea id="hs-pro-add-task-description" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600" rows="4" placeholder="Add context, expected outcome, or notes for this task." spellcheck="false"></textarea>
          </div>

          <div class="space-y-2">
            <label for="hs-pro-add-task-due-date" class="block text-sm font-medium text-stone-800 dark:text-neutral-200">
              Due date
            </label>
            <input id="hs-pro-add-task-due-date" type="date" class="py-2 px-3 block w-full border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-500 focus:z-10 focus:border-green-600 focus:ring-green-600 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:placeholder:text-neutral-500 dark:focus:outline-hidden dark:focus:ring-1 dark:focus:ring-neutral-600">
          </div>
        </form>
      </div>
      <!-- End Body -->

      <!-- Footer -->
      <div class="p-4 flex justify-end items-center gap-x-2 border-t border-stone-200 dark:border-neutral-700">
        <button type="button" class="py-2 px-3 inline-flex justify-center items-center text-sm font-medium rounded-lg border border-stone-200 bg-white text-stone-800 shadow-2xs hover:bg-stone-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-stone-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" data-hs-overlay="#hs-pro-add-task-modal">
          Cancel
        </button>
        <button type="button" class="py-2 px-3 inline-flex justify-center items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-green-600 text-white shadow-2xs hover:bg-green-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-green-700 dark:bg-green-500 dark:hover:bg-green-600 dark:focus:bg-green-600" data-hs-overlay="#hs-pro-add-task-modal">
          Add task
        </button>
      </div>
      <!-- End Footer -->
    </div>
  </div>
</div>
<!-- End Add Task Modal -->
