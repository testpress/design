<div class="mt-4">
  <!-- Tokens Table -->
  <template x-if="hasTokens">
    <div
      class="flex flex-col bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden"
    >
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th
                scope="col"
                class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase"
              >
                Name
              </th>
              <th
                scope="col"
                class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase"
              >
                Token
              </th>
              <th
                scope="col"
                class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase"
              >
                Created by
              </th>
              <th
                scope="col"
                class="px-6 py-3 text-start text-xs font-semibold text-gray-500 uppercase"
              >
                Created At
              </th>
              <th
                scope="col"
                class="px-6 py-3 text-end text-xs font-semibold text-gray-500 uppercase"
              >
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-200">
            <template x-for="token in tokens" :key="token.id">
              <tr class="transition duration-150">
                <td
                  class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800"
                  x-text="token.name"
                ></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                  <div class="flex items-center gap-x-3">
                    <code
                      class="text-xs font-mono bg-gray-100 text-gray-800 px-2 py-1 rounded border border-gray-200"
                      x-text="token.token.substring(0, 15) + '****************'"
                    ></code>
                  </div>
                </td>
                <td
                  class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"
                  x-text="token.created_by"
                ></td>
                <td
                  class="px-6 py-4 whitespace-nowrap text-sm text-gray-600"
                  x-text="token.created_at"
                ></td>
                <td
                  class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium"
                >
                  <button
                    type="button"
                    class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-gray-500 hover:text-red-600 disabled:opacity-50 disabled:pointer-events-none transition"
                    x-on:click="tokenToDelete = token.id; if (window.HSOverlay) window.HSOverlay.open('#confirm_delete_modal')"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 size-4"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <!-- Empty State -->
  <template x-if="!hasTokens">
    <div
      class="flex flex-col items-center justify-center py-20 bg-white border border-gray-200 rounded-xl shadow-sm text-center"
    >
      <div class="p-6 bg-blue-50 rounded-full mb-5">
        <svg
          class="size-12 text-blue-600"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <h3 class="text-lg font-semibold text-gray-800">
        No authentication tokens
      </h3>
      <p class="mt-2 text-gray-500 max-w-sm mx-auto">
        Authentication tokens allow you to securely access the TPStreams API.
      </p>
    </div>
  </template>
</div>
