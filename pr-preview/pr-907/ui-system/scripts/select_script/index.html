<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('uiSelect', (config) => ({
        open: false,
        multiple: config.multiple || false,
        searchable: config.searchable || false,
        options: config.options || [],
        selected: config.multiple ? (config.selectedValue ? String(config.selectedValue).split(',') : []) : String(config.selectedValue || ''),
        searchQuery: '',
        
        top: 'auto',
        bottom: 'auto',
        left: 0,
        width: 0,
        placement: 'bottom',
        
        init() {
            this.$el.addEventListener('set-selected-values', (e) => {
                this.selected = Array.isArray(e.detail) ? e.detail.map(String) : [String(e.detail)];
            });
            this.$watch('open', value => {
                if (value) {
                    this.$nextTick(() => this.updatePosition());
                }
            });
        },

        updatePosition() {
            const toggle = this.$refs.toggle;
            const dropdown = this.$refs.dropdown;
            if (!toggle || !dropdown) return;
            
            const r = toggle.getBoundingClientRect();
            
            // Measure dimensions
            const wasHidden = dropdown.style.display === 'none' || getComputedStyle(dropdown).display === 'none';
            if (wasHidden) dropdown.style.setProperty('display', 'block', 'important');
            const dropH = dropdown.offsetHeight || 280;
            if (wasHidden) dropdown.style.removeProperty('display');
            
            const gap = 4;
            // Check available space below
            const spaceBelow = window.innerHeight - r.bottom;
            if (spaceBelow < dropH + gap && r.top > dropH + gap) {
                this.placement = 'top';
                this.top = 'auto';
                this.bottom = window.innerHeight - r.top + gap;
            } else {
                this.placement = 'bottom';
                this.top = r.bottom + gap;
                this.bottom = 'auto';
            }
            
            this.left = r.left;
            this.width = r.width;
        },
        
        get filteredOptions() {
            if (!this.searchQuery) return this.options;
            return this.options.filter(opt => opt.label.toLowerCase().includes(this.searchQuery.toLowerCase()));
        },
        
        get selectedLabels() {
            if (this.multiple) {
                return this.selected.map(val => {
                    const opt = this.options.find(o => String(o.value) === String(val));
                    return opt ? { value: val, label: opt.label, icon: opt.icon } : null;
                }).filter(Boolean);
            }
            return [];
        },
        
        get singleSelectedLabel() {
            if (this.multiple) return '';
            const opt = this.options.find(o => String(o.value) === String(this.selected));
            return opt ? opt.label : '';
        },

        get singleSelectedOption() {
            if (this.multiple) return null;
            return this.options.find(o => String(o.value) === String(this.selected)) || null;
        },
        
        toggleOption(value) {
            const strVal = String(value);
            if (this.multiple) {
                const index = this.selected.indexOf(strVal);
                if (index > -1) {
                    this.selected.splice(index, 1);
                } else {
                    this.selected.push(strVal);
                }
            } else {
                this.selected = strVal;
                this.open = false;
            }
            this.searchQuery = '';
            
            this.$nextTick(() => {
                this.$refs.select.dispatchEvent(new Event('change', { bubbles: true }));
            });
        },
        
        removeSelected(value) {
            const index = this.selected.indexOf(String(value));
            if (index > -1) {
                this.selected.splice(index, 1);
                this.$nextTick(() => {
                    this.$refs.select.dispatchEvent(new Event('change', { bubbles: true }));
                });
            }
        },
        
        isSelected(value) {
            return this.multiple ? this.selected.includes(String(value)) : this.selected === String(value);
        }
    }));
});
</script>
