

<section id="password-input-component" class="mb-16 pt-8">
  <div class="mb-6 flex items-center justify-between border-b border-gray-200 dark:border-neutral-700 pb-4">
    <div class="flex items-center gap-2">
      <i data-lucide="key" class="w-6 h-6 text-gray-800 dark:text-white"></i>
      <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Password Input</h2>
    </div>
  </div>

  <div class="space-y-12">
    <!-- Standard -->
    <div>
      <h3 class="text-lg font-medium text-gray-800 dark:text-white mb-4">Standard Password Input</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl">
        
<div class="space-y-5" x-data="{
    showPassword: false,
    showHints: false,
    password: '',
    confirmPassword: '',
    get hasLength() { return this.password.length >= 8 },
    get hasLower() { return /[a-z]/.test(this.password) },
    get hasUpper() { return /[A-Z]/.test(this.password) },
    get hasNumber() { return /[0-9]/.test(this.password) },
    get hasSpecial() { return /[^A-Za-z0-9]/.test(this.password) },
    get match() { return this.password === this.confirmPassword }
}">

  <!-- Input -->
  <div>
    
      <label for="password" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
        Password
      </label>
    

    <div class="relative">
      <input id="password" 
             name="password_std"
             :type="showPassword ? 'text' : 'password'" 
             x-model="password" 
             
             class="py-2 sm:py-2.5 px-3 pe-10 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none  " 
             placeholder="Enter your password" 
             
             
             >
      
      <button type="button" tabindex="-1" class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer text-gray-400 hover:text-gray-600 focus:outline-hidden dark:hover:text-neutral-300" @click="showPassword = !showPassword">
        <span x-show="!showPassword" class="flex items-center">
          <i data-lucide="eye-off" class="shrink-0 size-4"></i>
        </span>
        <span x-show="showPassword" x-cloak class="flex items-center">
          <i data-lucide="eye" class="shrink-0 size-4"></i>
        </span>
      </button>
    </div>
    
    

    
  </div>

  

</div>

      </div>
    </div>

    <!-- Live Validation & Confirmation -->
    <div>
      <h3 class="text-lg font-medium text-gray-800 dark:text-white mb-4">Signup Flow (Validation & Confirmation)</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-2xl">
        
<div class="space-y-5" x-data="{
    showPassword: false,
    showHints: false,
    password: '',
    confirmPassword: '',
    get hasLength() { return this.password.length >= 8 },
    get hasLower() { return /[a-z]/.test(this.password) },
    get hasUpper() { return /[A-Z]/.test(this.password) },
    get hasNumber() { return /[0-9]/.test(this.password) },
    get hasSpecial() { return /[^A-Za-z0-9]/.test(this.password) },
    get match() { return this.password === this.confirmPassword }
}">

  <!-- Input -->
  <div>
    
      <label for="password" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
        Create New Password
      </label>
    

    <div class="relative">
      <input id="password" 
             name="password_val"
             :type="showPassword ? 'text' : 'password'" 
             x-model="password" 
             @focus="showHints = true"
             class="py-2 sm:py-2.5 px-3 pe-10 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none  " 
             placeholder="Enter your new password" 
             
             
             >
      
      <button type="button" tabindex="-1" class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer text-gray-400 hover:text-gray-600 focus:outline-hidden dark:hover:text-neutral-300" @click="showPassword = !showPassword">
        <span x-show="!showPassword" class="flex items-center">
          <i data-lucide="eye-off" class="shrink-0 size-4"></i>
        </span>
        <span x-show="showPassword" x-cloak class="flex items-center">
          <i data-lucide="eye" class="shrink-0 size-4"></i>
        </span>
      </button>
    </div>
    
    

    
    <div id="password-hints" x-show="showHints" x-collapse class="mt-5">
      <ul class="space-y-2 text-xs">
        <li :class="hasLength ? 'text-primary-700 dark:text-primary-600' : 'text-gray-500 dark:text-neutral-400'" class="flex items-center gap-x-3 transition-colors duration-200">
          <span x-show="hasLength" style="display: none;">
            <i data-lucide="check-circle" class="shrink-0 size-4"></i>
          </span>
          <span x-show="!hasLength" class="size-4 border border-gray-200 dark:border-neutral-700 rounded-full"></span>
          <span>Minimum 8 characters</span>
        </li>
        <li :class="hasLower ? 'text-primary-700 dark:text-primary-600' : 'text-gray-500 dark:text-neutral-400'" class="flex items-center gap-x-3 transition-colors duration-200">
          <span x-show="hasLower" style="display: none;">
            <i data-lucide="check-circle" class="shrink-0 size-4"></i>
          </span>
          <span x-show="!hasLower" class="size-4 border border-gray-200 dark:border-neutral-700 rounded-full"></span>
          <span>Contain lowercase</span>
        </li>
        <li :class="hasUpper ? 'text-primary-700 dark:text-primary-600' : 'text-gray-500 dark:text-neutral-400'" class="flex items-center gap-x-3 transition-colors duration-200">
          <span x-show="hasUpper" style="display: none;">
            <i data-lucide="check-circle" class="shrink-0 size-4"></i>
          </span>
          <span x-show="!hasUpper" class="size-4 border border-gray-200 dark:border-neutral-700 rounded-full"></span>
          <span>Contain uppercase</span>
        </li>
        <li :class="hasNumber ? 'text-primary-700 dark:text-primary-600' : 'text-gray-500 dark:text-neutral-400'" class="flex items-center gap-x-3 transition-colors duration-200">
          <span x-show="hasNumber" style="display: none;">
            <i data-lucide="check-circle" class="shrink-0 size-4"></i>
          </span>
          <span x-show="!hasNumber" class="size-4 border border-gray-200 dark:border-neutral-700 rounded-full"></span>
          <span>Contain numbers</span>
        </li>
        <li :class="hasSpecial ? 'text-primary-700 dark:text-primary-600' : 'text-gray-500 dark:text-neutral-400'" class="flex items-center gap-x-3 transition-colors duration-200">
          <span x-show="hasSpecial" style="display: none;">
            <i data-lucide="check-circle" class="shrink-0 size-4"></i>
          </span>
          <span x-show="!hasSpecial" class="size-4 border border-gray-200 dark:border-neutral-700 rounded-full"></span>
          <span>Contain special characters: !"#$%&'()*+,-./:;<=>?@[\]^_`{|}~</span>
        </li>
      </ul>
    </div>
    
  </div>

  
  <!-- Confirm Password Input -->
  <div>
    
      <label for="confirm_password" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
        Confirm Password
      </label>
    

    <div class="relative">
      <input id="confirm_password" 
             name="confirm_password"
             :type="showPassword ? 'text' : 'password'" 
             x-model="confirmPassword" 
             class="py-2 sm:py-2.5 px-3 pe-10 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none" 
             placeholder="Enter your new password" 
             
             >
             
      <button type="button" tabindex="-1" class="absolute inset-y-0 end-0 flex items-center z-20 px-3 cursor-pointer text-gray-400 hover:text-gray-600 focus:outline-hidden dark:hover:text-neutral-300" @click="showPassword = !showPassword">
        <span x-show="!showPassword" class="flex items-center">
          <i data-lucide="eye-off" class="shrink-0 size-4"></i>
        </span>
        <span x-show="showPassword" x-cloak class="flex items-center">
          <i data-lucide="eye" class="shrink-0 size-4"></i>
        </span>
      </button>
    </div>
    <div x-show="password.length > 0 && confirmPassword.length >= password.length && !match" class="mt-2 text-xs text-red-500" style="display: none;">
      Passwords do not match
    </div>
  </div>
  

</div>

      </div>
    </div>

  </div>
</section>
