


<div x-data="{
    type: 'pdf',
    itemId: '',
    oldName: '',
    newName: '',

    openModal(e) {
        this.type = e.detail.type; // 'pdf' or 'folder'
        this.itemId = e.detail.id;
        this.oldName = e.detail.name || '';
        this.newName = this.oldName;

        const confirmBtn = document.querySelector('#rename-modal .flex.justify-end button.bg-primary-600');
        if (confirmBtn) {
            confirmBtn.innerText = 'Rename';
        }
        
        // Dynamically update modal header title
        const titleEl = document.querySelector('#modal-title-rename-modal');
        if (titleEl) {
            titleEl.innerText = this.type === 'pdf' ? 'Rename PDF' : 'Rename Folder';
        }

        this.$dispatch('open-modal-rename-modal');
        
        // Focus the input after modal finishes opening and setting its own default focus
        setTimeout(() => {
            const inputEl = document.getElementById('new_name');
            if (inputEl) {
                inputEl.focus();
            }
        }, 100);
    },

    submitRename() {
        if (!this.newName.trim() || this.newName === this.oldName) {
            this.$dispatch('close-modal-rename-modal');
            return;
        }
        
        // Dispatch the rename event to root Alpine component
        this.$dispatch('execute-rename', {
            type: this.type,
            id: this.itemId,
            newName: this.newName.trim()
        });

        this.$dispatch('close-modal-rename-modal');
    }
}" @open-modal-rename.window="openModal($event)">

    



<div x-data="{ 
       open: false,
       toggle() { this.open = !this.open; },
       init() {
         this.$watch('open', value => {
           if (value) {
             document.body.classList.add('overflow-hidden');
             this.$nextTick(() => {
               if (this.$refs.closeBtn) this.$refs.closeBtn.focus();
               if (window.lucide) { window.lucide.createIcons(); }
             });
           } else {
             document.body.classList.remove('overflow-hidden');
           }
         });
       }
     }"
     @open-modal-rename-modal.window="open = true"
     @close-modal-rename-modal.window="open = false"
     class="inline-block">

  
  

  
  <div x-show="open"
       x-cloak
       class="fixed inset-0 z-[10000] overflow-y-auto"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modal-title-rename-modal">
    
    
    <div x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="open = false"
         class="fixed inset-0 bg-neutral-900/50 dark:bg-neutral-900/80 backdrop-blur-sm"></div>

    
    <div class="flex min-h-screen items-center justify-center p-4 text-center sm:p-0">
      
      
      <div x-show="open"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
           x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
           x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
           @keydown.escape.window="open = false"
           class="relative overflow-hidden rounded-xl bg-white dark:bg-neutral-800 text-start shadow-xl sm:my-8 w-full sm:max-w-md border border-gray-200 dark:border-neutral-700 flex flex-col max-h-[90vh]">
        
        
        <div class="py-2.5 px-4 flex justify-between items-center border-b border-gray-200 dark:border-neutral-700">
          <div>
            <h2 id="modal-title-rename-modal" class="font-semibold text-gray-800 dark:text-neutral-200 text-sm sm:text-base">
              Rename
            </h2>
            
          </div>
          <button x-ref="closeBtn" type="button" @click="open = false" class="size-8 shrink-0 flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-50 dark:bg-neutral-800 text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-700" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>

        
        <div class="overflow-y-auto p-5 flex-1 min-h-0 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500 text-sm text-gray-700 dark:text-neutral-300">
          
        
        
<div class="w-full">
  
    <label for="new_name" class="block mb-2 text-sm font-medium text-gray-800 dark:text-neutral-200">
      Name
    </label>
  

  <div class="relative w-full" x-data="{ inputValue: '' }">
    
    
    
    
      
    

    <input type="text" 
           id="new_name" 
           name="new_name"
           class="py-2 sm:py-2.5 px-3 block w-full bg-white dark:bg-neutral-800 border-gray-200 dark:border-neutral-700 rounded-lg sm:text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none   "
           placeholder=""
           
           
           x-model="newName"
           x-ref="renameInput"
           @keydown.enter='submitRename()'>
           
    
  </div>
  
  
</div>

        
    
        </div>

        
        
          <div class="p-4 flex justify-end gap-x-2">
            
              

  
  
  

  
  

  

  
  

  
    <button type="button" class="inline-flex items-center justify-center gap-x-1.5 font-medium rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden transition-colors py-2 px-3 text-sm bg-white border border-gray-200 text-gray-800 hover:bg-gray-50 focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-white dark:hover:bg-neutral-700 dark:focus:bg-neutral-700"   @click="open = false">
  

    
    

    Cancel

    

  
    </button>
  


            
            
              

  
  
  

  
  

  

  
  

  
    <button type="button" class="inline-flex items-center justify-center gap-x-1.5 font-medium rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden transition-colors py-2 px-3 text-sm bg-primary-600 border border-transparent text-white hover:bg-primary-700 focus:bg-primary-700 dark:focus:ring-offset-neutral-800"   @click="$dispatch('modal-confirmed-rename-modal'); open = false" @click='submitRename()'>
  

    
    

    Rename

    

  
    </button>
  


            
          </div>
        

      </div>
    </div>
  </div>
</div>

</div>
