



<div x-data="{
    folderId: '',
    folderName: '',
    count: 0,
    subCount: 0,
    action: 'uncategorized', // 'uncategorized', 'move', 'delete'
    destFolderId: '',
    
    get isEmpty() {
        return this.count === 0 && this.subCount === 0;
    },

    openModal(e) {
        this.folderId = e.detail.id;
        this.folderName = e.detail.name || '';
        this.count = parseInt(e.detail.count) || 0;
        this.subCount = parseInt(e.detail.subCount) || 0;
        this.action = 'uncategorized';
        this.destFolderId = '';
        this.$dispatch('open-modal-delete-folder-modal');
    },

    submitDelete() {
        if (!this.folderId) return;
        
        if (!this.isEmpty && this.action === 'move') {
            const input = document.querySelector('input[name=\'destination_folder_delete\']');
            this.destFolderId = input ? input.value : '';
            if (!this.destFolderId) return; // Prevent if no destination
        }
        
        // Dispatch delete event to root component
        this.$dispatch('execute-delete-folder', {
            id: this.folderId,
            name: this.folderName,
            action: this.isEmpty ? 'delete' : this.action,
            destFolderId: this.destFolderId
        });
        
        this.$dispatch('close-modal-delete-folder-modal');
    }
}" @open-modal-delete-folder.window="openModal($event)">

<div class="space-y-2" x-data="{
    open: false,
    searchQuery: '',
    selectedFolderId: '',
    selectedFolderName: '',
    expandedFolders: [],
    top: 'auto',
    bottom: 'auto',
    left: 0,
    width: 0,
    placement: 'bottom',
    
    toggleFolder(id) {
        if (this.expandedFolders.includes(id)) {
            this.expandedFolders = this.expandedFolders.filter(f => f !== id);
        } else {
            this.expandedFolders.push(id);
        }
    },
    selectFolder(id, name) {
        this.selectedFolderId = id;
        this.selectedFolderName = name;
        this.open = false;
    },
    updatePosition() {
        const toggle = this.$refs.toggle;
        const dropdown = this.$refs.dropdown;
        if (!toggle || !dropdown) return;
        
        const r = toggle.getBoundingClientRect();
        
        const wasHidden = dropdown.style.display === 'none' || getComputedStyle(dropdown).display === 'none';
        if (wasHidden) dropdown.style.setProperty('display', 'block', 'important');
        const dropH = dropdown.offsetHeight || 280;
        if (wasHidden) dropdown.style.removeProperty('display');
        
        const gap = 4;
        const spaceBelow = window.innerHeight - r.bottom;
        if (spaceBelow < dropH + gap && r.top > dropH + gap) {
            this.placement = 'top';
            this.top = 'auto';
            this.bottom = window.innerHeight - r.top + gap;
        } else {
            this.placement = 'bottom';
            this.top = r.bottom + gap;
            this.bottom = 'auto';
        }
        
        this.left = r.left;
        this.width = r.width;
    }
}" @click.outside="open = false" @scroll.window.capture.passive="if(open) updatePosition()" @resize.window.passive="if(open) updatePosition()">
