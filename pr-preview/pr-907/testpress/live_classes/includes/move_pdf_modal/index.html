


<div x-data="{
    moveType: 'single',
    fileName: '',
    count: 0,
    itemsToMove: [],

    openModal(e) {
        this.moveType = e.detail.type;
        this.fileName = e.detail.name || '';
        this.count = e.detail.count || 0;
        this.itemsToMove = e.detail.items || [e.detail.id];
        
        // Re-render confirm button text inside the modal using a simple workaround
        const confirmBtn = document.querySelector('#move-pdf-modal .flex.justify-end button.bg-primary-600');
        if (confirmBtn) {
            confirmBtn.innerText = this.moveType === 'single' ? 'Move' : `Move ${this.count} PDFs`;
        }
        
        // Dynamically update modal header title
        const titleEl = document.querySelector('#modal-title-move-pdf-modal');
        if (titleEl) {
            titleEl.innerText = this.moveType === 'single' ? 'Move PDF' : `Move ${this.count} PDFs`;
        }

        this.$dispatch('open-modal-move-pdf-modal');
    },

    submitMove() {
        const input = document.querySelector('input[name=\'destination_folder_move\']');
        const destFolderId = input ? input.value : '';
        
        const destNameEl = document.querySelector('input[name=\'destination_folder_move\']').nextElementSibling.querySelector('span[x-show=\'selectedFolderName\']');
        const destName = destNameEl && destNameEl.innerText ? destNameEl.innerText : 'Uncategorized';
        
        // Let root Alpine handle the move logic
        this.$dispatch('execute-move', { 
            items: this.itemsToMove, 
            destFolderId: destFolderId,
            destFolderName: destName
        });

        // Update the list view state
        this.$dispatch('close-modal-move-pdf-modal');
    }
}" @open-modal-move-pdf.window="openModal($event)">

    



<div x-data="{ 
       open: false,
       toggle() { this.open = !this.open; },
       init() {
         this.$watch('open', value => {
           if (value) {
             document.body.classList.add('overflow-hidden');
             this.$nextTick(() => {
               if (this.$refs.closeBtn) this.$refs.closeBtn.focus();
               if (window.lucide) { window.lucide.createIcons(); }
             });
           } else {
             document.body.classList.remove('overflow-hidden');
           }
         });
       }
     }"

     @close-modal-move-pdf-modal.window="open = false"

    searchQuery: '',
    selectedFolderId: '',
    selectedFolderName: '',
    expandedFolders: [],
    top: 'auto',
    bottom: 'auto',
    left: 0,
    width: 0,
    placement: 'bottom',
    
    toggleFolder(id) {
        if (this.expandedFolders.includes(id)) {
            this.expandedFolders = this.expandedFolders.filter(f => f !== id);
        } else {
            this.expandedFolders.push(id);
        }
    },
    selectFolder(id, name) {
        this.selectedFolderId = id;
        this.selectedFolderName = name;
        this.open = false;
    },
    updatePosition() {
        const toggle = this.$refs.toggle;
        const dropdown = this.$refs.dropdown;
        if (!toggle || !dropdown) return;
        
        const r = toggle.getBoundingClientRect();
        
        const wasHidden = dropdown.style.display === 'none' || getComputedStyle(dropdown).display === 'none';
        if (wasHidden) dropdown.style.setProperty('display', 'block', 'important');
        const dropH = dropdown.offsetHeight || 280;
        if (wasHidden) dropdown.style.removeProperty('display');
        
        const gap = 4;
        const spaceBelow = window.innerHeight - r.bottom;
        if (spaceBelow < dropH + gap && r.top > dropH + gap) {
            this.placement = 'top';
            this.top = 'auto';
            this.bottom = window.innerHeight - r.top + gap;
        } else {
            this.placement = 'bottom';
            this.top = r.bottom + gap;
            this.bottom = 'auto';
        }
        
        this.left = r.left;
        this.width = r.width;
    }
