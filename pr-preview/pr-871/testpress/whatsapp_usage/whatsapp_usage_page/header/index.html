<header class="flex flex-wrap justify-between items-center gap-2 pt-4">

  <div>
    <h1 class="text-lg md:text-xl font-semibold text-stone-800 dark:text-neutral-200">WhatsApp Usage</h1>
    <p class="text-sm text-stone-500 dark:text-neutral-400">Daily WhatsApp notification usage overview</p>
  </div>

  <div class="flex md:justify-end items-center gap-x-2">
    <!-- Month Dropdown -->
    <div class="hs-dropdown [--auto-close:true] relative inline-flex -space-x-px">
      <button type="button" @click="goToPreviousMonth"
        :disabled="selectedMonth === monthOptions[monthOptions.length - 1]?.value"
        class="group py-1.5 sm:py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm sm:text-xs font-medium rounded-l-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700 dark:disabled:border-neutral-600 dark:disabled:hover:bg-neutral-800">
        <svg class="shrink-0 size-3.5 text-gray-800 group-disabled:text-gray-400 dark:text-neutral-300 dark:group-disabled:text-neutral-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>

      <div class="hs-dropdown [--auto-close:true] relative inline-flex -space-x-px">
        <button type="button"
          class="py-1.5 sm:py-2 px-2.5 inline-flex items-center gap-x-1.5 text-sm sm:text-xs font-medium rounded-none border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
          <span x-text="selectedMonthLabel"></span>
        </button>

        <!-- End Button -->

        <!-- Dropdown -->
        <div
          class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-auto transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-xl dark:bg-neutral-900"
          role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dptied">

          <div class="p-1">
            <template x-for="month in monthOptions" :key="month.value">
              <button type="button" @click="selectedMonth = month.value"
                class="w-full flex gap-x-3 py-2 px-3 rounded-lg text-sm text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none dark:text-neutral-300 focus:outline-hidden focus:bg-gray-100 dark:hover:bg-neutral-800 dark:focus:bg-neutral-800">
                <span x-text="month.label"></span>
              </button>
            </template>
          </div>
        </div>


        <button type="button" @click="goToNextMonth" :disabled="selectedMonth === currentMonth"
          class="group py-1.5 sm:py-2 px-2.5 inline-flex justify-center items-center gap-x-1.5 text-sm sm:text-xs font-medium rounded-r-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 focus:outline-hidden focus:bg-gray-50 disabled:pointer-events-none disabled:cursor-default disabled:hover:bg-white dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700 dark:disabled:border-neutral-600 dark:disabled:hover:bg-neutral-800">
          <svg class="shrink-0 size-3.5 text-gray-800 group-disabled:text-gray-400 dark:text-neutral-300 dark:group-disabled:text-neutral-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6"></path>
          </svg>
        </button>

        <!-- End Dropdown -->
      </div>

    </div>

  </div>
</header>
