<div class="sm:flex">
  <div class="mt-1 sm:flex-auto">
    
    <h1 class="text-2xl font-semibold text-gray-900">Assets</h1>
    
    <pre class="mt-1 pl-1 pr-3 py-1 rounded text-sm text-gray-500 bg-gray-100 inline-block">GET /api/v1/9mpasc/assets/</pre>
  </div>
  <div class="flex items-end mt-4 sm:mt-0 sm:ml-16 sm:flex-none">
    <div class="hs-dropdown [--auto-close:inside] [--placement:bottom-right] relative inline-flex mr-2">
      <button id="hs-pro-filter" type="button" class="inline-flex items-center justify-center rounded-md border bg-gray-100 px-4 py-2 text-sm font-medium text-gray-600 shadow-sm hover:bg-gray-200 focus:outline-none sm:w-auto" aria-haspopup="menu" aria-expanded="false" aria-label="Filter by status">
        <svg class="mr-2 h-4 w-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <line x1="21" x2="14" y1="4" y2="4"/>
          <line x1="10" x2="3" y1="4" y2="4"/>
          <line x1="21" x2="12" y1="12" y2="12"/>
          <line x1="8" x2="3" y1="12" y2="12"/>
          <line x1="21" x2="16" y1="20" y2="20"/>
          <line x1="12" x2="3" y1="20" y2="20"/>
          <line x1="14" x2="14" y1="2" y2="6"/>
          <line x1="8" x2="8" y1="10" y2="14"/>
          <line x1="16" x2="16" y1="18" y2="22"/>
        </svg>
        Filter
      </button>

      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-44 transition-[opacity,margin] duration-300 opacity-0 hidden z-10 bg-white border border-gray-200 rounded-xl shadow-xl dark:bg-neutral-900 dark:border-neutral-700" role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-filter">
        <div class="p-1">
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Queued" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-queued">
            <label for="filter-queued" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Queued
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Transcoding" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-transcoding">
            <label for="filter-transcoding" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Transcoding
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Completed" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-completed">
            <label for="filter-completed" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Completed
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Error" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-error">
            <label for="filter-error" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Error
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Not Started" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-not-started">
            <label for="filter-not-started" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Not started
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Uploading" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-uploading">
            <label for="filter-uploading" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Uploading
            </label>
          </div>
          <div class="flex items-center gap-x-3 py-1.5 px-2 cursor-pointer rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-800">
            <input type="checkbox" x-model="selectedStatuses" value="Input Read Error" class="shrink-0 size-4 bg-transparent border-gray-300 rounded shadow-sm text-blue-600 focus:ring-blue-500 dark:border-neutral-600 dark:bg-neutral-800 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="filter-input-read-error">
            <label for="filter-input-read-error" class="flex flex-1 items-center gap-x-3 cursor-pointer text-[13px] text-gray-800 dark:text-neutral-300">
              Input read error
            </label>
          </div>
        </div>
      </div>
    </div>
    <a href="#" type="button" @click="showAddFolderModal = true;"
      class="inline-flex mr-1 items-center justify-center rounded-md border bg-gray-100 px-4 py-2 text-sm font-medium text-gray-600 shadow-sm hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 sm:w-auto">Add Folder</a>
    <a href="/tpstreams/assets/upload/" type="button"
      class="inline-flex items-center justify-center rounded-md border border-transparent bg-blue-700 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2 sm:w-auto">Upload</a>
  </div>
</div>
<div x-show="selectedStatuses.length > 0" style="display: none;" class="mt-4 flex flex-wrap items-center gap-2">
  <template x-for="status in selectedStatuses" :key="status">
    <span class="p-1 pl-3 inline-flex items-center gap-1.5 bg-white border border-gray-200 text-gray-800 text-xs rounded-full shadow-sm">
      <span class="font-medium text-gray-600">Status</span>
      <span class="h-3 border-l border-gray-200"></span>
      <span class="text-gray-900" x-text="status"></span>
      <button type="button" @click="selectedStatuses = selectedStatuses.filter(s => s !== status)" class="inline-flex shrink-0 justify-center items-center w-5 h-5 rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 text-sm transition-colors">
        <svg class="shrink-0 w-3 h-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
      </button>
    </span>
  </template>
  <button type="button" @click="selectedStatuses = []" x-show="selectedStatuses.length > 1" class="ml-1 py-1 text-xs font-medium text-gray-500 hover:text-gray-900 focus:outline-none transition-colors">
    Clear all
  </button>
</div>
