<!-- End exam pipeline stats -->

<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.1/dist/apexcharts.min.js"></script>
<script>
(function () {
  var total = 2000;
  var pipeline = [
    { id: 'reports-chart-scheduled', completed: 1700, color: '#38bdf8', colorDark: '#7dd3fc' },
    { id: 'reports-chart-registered', completed: 1560, color: '#34d399', colorDark: '#6ee7b7' },
    { id: 'reports-chart-biometrics', completed: 1440, color: '#fbbf24', colorDark: '#fcd34d' },
    { id: 'reports-chart-photo', completed: 1360, color: '#fb923c', colorDark: '#fdba74' },
    { id: 'reports-chart-present', completed: 1280, color: '#818cf8', colorDark: '#a5b4fc' },
    { id: 'reports-chart-absent', completed: 280, color: '#fb7185', colorDark: '#fda4af' }
  ];
  var pendingColor = '#e5e7eb';
  var pendingColorDark = '#a3a3a3';

  function getOptions(completed, totalVal, accentColor, size) {
    size = size || 168;
    var pending = totalVal - completed;
    return {
      chart: { type: 'donut', height: size, width: size, sparkline: { enabled: false } },
      series: [completed, pending],
      labels: ['Completed', 'Pending'],
      legend: { show: false },
      dataLabels: { enabled: false },
      plotOptions: {
        pie: {
          donut: { size: '75%' },
          expandOnClick: false
        }
      },
      stroke: { width: 2, colors: ['#fff', '#fff'] },
      colors: [accentColor, document.documentElement.classList.contains('dark') ? pendingColorDark : pendingColor],
      states: { hover: { filter: { type: 'none' } }, active: { filter: { type: 'none' } } },
      tooltip: { enabled: false }
    };
  }

  function render() {
    var isDark = document.documentElement.classList.contains('dark');
    pipeline.forEach(function (item) {
      var el = document.getElementById(item.id);
      if (!el) return;
      var wrapper = el.parentElement;
      var size = (wrapper && wrapper.offsetWidth) ? wrapper.offsetWidth : 168;
      var color = isDark ? item.colorDark : item.color;
      var opts = getOptions(item.completed, total, color, size);
      if (el._chart) {
        el._chart.updateOptions(opts);
        return;
      }
      el._chart = new ApexCharts(el, opts);
      el._chart.render();
    });
  }

  if (typeof ApexCharts !== 'undefined') {
    render();
    document.documentElement.addEventListener('theme-change', render);
  } else {
    window.addEventListener('load', function () {
      if (typeof ApexCharts !== 'undefined') render();
    });
  }
})();
</script>
