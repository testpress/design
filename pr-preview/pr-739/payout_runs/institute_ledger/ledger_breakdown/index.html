<div class="p-5 flex flex-col bg-white border border-gray-200 shadow-xs rounded-xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700">
  <h2 class="mb-4 font-medium text-gray-800 dark:text-neutral-200">
    Ledger breakdown
  </h2>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-4">
    Summary of amounts for this payout. This is what the owner checks before approval.
  </p>
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
      <thead>
        <tr>
          <th scope="col" class="py-2.5 pe-4 text-start text-sm font-medium text-gray-700 dark:text-neutral-300">
            Type
          </th>
          <th scope="col" class="py-2.5 pe-4 text-end text-sm font-medium text-gray-700 dark:text-neutral-300">
            Amount
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
        <tr>
          <td class="py-3 pe-4 text-sm text-gray-800 dark:text-neutral-200">Gross payments</td>
          <td class="py-3 pe-4 text-sm text-end text-gray-800 dark:text-neutral-200" x-text="breakdown.gross"></td>
        </tr>
        <tr>
          <td class="py-3 pe-4 text-sm text-gray-800 dark:text-neutral-200">Platform fees</td>
          <td class="py-3 pe-4 text-sm text-end text-red-600 dark:text-red-400" x-text="breakdown.platformFee"></td>
        </tr>
        <tr>
          <td class="py-3 pe-4 text-sm text-gray-800 dark:text-neutral-200">Taxes</td>
          <td class="py-3 pe-4 text-sm text-end text-red-600 dark:text-red-400" x-text="breakdown.tax"></td>
        </tr>
        <tr>
          <td class="py-3 pe-4 text-sm text-gray-800 dark:text-neutral-200">Adjustments</td>
          <td class="py-3 pe-4 text-sm text-end text-gray-800 dark:text-neutral-200" x-text="breakdown.adjustment"></td>
        </tr>
        <tr class="border-t-2 border-gray-200 dark:border-neutral-600">
          <td class="py-3 pe-4 text-sm font-semibold text-gray-800 dark:text-neutral-200">Net payout</td>
          <td class="py-3 pe-4 text-sm text-end font-semibold text-gray-800 dark:text-neutral-200" x-text="breakdown.net"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
