<div id="hs-disconnect-zoom-account" class="hs-overlay hidden size-full fixed top-0 start-0 z-[90] overflow-x-hidden overflow-y-auto pointer-events-none" role="dialog" tabindex="-1">
  <div class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 sm:mx-auto h-[calc(100%-56px)] flex items-center">
    <div class="w-full max-h-full flex flex-col bg-white border border-gray-200 rounded-xl pointer-events-auto shadow-xl">
      <div class="py-3 px-4 flex justify-between items-center border-b border-gray-200">
        <h3 class="font-semibold text-gray-900">Disconnect Zoom account</h3>
        <button type="button" class="size-8 inline-flex justify-center items-center rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200" data-hs-overlay="#hs-disconnect-zoom-account" aria-label="Close">
          <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <div class="p-4 space-y-4">
        <div class="text-sm text-gray-700 space-y-2">
          <p>This will disconnect the current Zoom account from Testpress.</p>
          <p class="text-amber-700" x-show="hasRunningClassesWithOldLicense">
            Some classes are still running with a license from the connected account. It is not advised to remove the account while classes are still running; otherwise recordings won't be imported.
          </p>
        </div>

        <div x-show="hasRunningClassesWithOldLicense" class="space-y-2">
          <label for="disconnect-confirmation" class="text-sm font-medium text-gray-900">Type "Disconnect account" to confirm</label>
          <input
            id="disconnect-confirmation"
            type="text"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-emerald-500 focus:ring-emerald-500"
            placeholder="Disconnect account"
            x-model="disconnectConfirmationText"
          />
        </div>
      </div>

      <div class="p-4 flex justify-end gap-x-2 border-t border-gray-200">
        <button type="button" class="py-2 px-4 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50" data-hs-overlay="#hs-disconnect-zoom-account">
          Cancel
        </button>
        <button
          type="button"
          class="py-2 px-4 text-sm font-semibold text-white bg-red-600 rounded-lg hover:bg-red-500 shadow-sm transition-colors disabled:opacity-50 disabled:pointer-events-none"
          :disabled="hasRunningClassesWithOldLicense && disconnectConfirmationText !== 'Disconnect account'"
          data-hs-overlay="#hs-disconnect-zoom-account"
        >
          Disconnect account
        </button>
      </div>
    </div>
  </div>
</div>
