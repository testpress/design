<link rel="stylesheet" href="https://unpkg.com/flatpickr/dist/flatpickr.min.css" />
<script src="https://unpkg.com/flatpickr/dist/flatpickr.min.js"></script>
<script>
(function() {
    const input = document.getElementById("date-range-input");

    function formatDateParam(date) {
        const pad = v => String(v).padStart(2, "0");
        return `${pad(date.getMonth() + 1)}/${pad(date.getDate())}/${date.getFullYear()} ` +
               `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function createCancelButton(instance) {
        const btn = document.createElement("button");
        btn.textContent = "Cancel";
        btn.className =
         "py-2 px-3 text-xs rounded-lg border bg-white dark:bg-neutral-800 dark:border-neutral-700";
        btn.onclick = () => {
            instance.clear();
            instance.close();
        };
        return btn;
    }

    function createApplyButton(instance, selectedDates) {
        const btn = document.createElement("button");
        btn.textContent = "Apply";
        btn.className =
         "py-2 px-3 text-xs rounded-lg border-transparent bg-blue-600 text-white";
        btn.onclick = () => {
            // TODO: Add logic to apply date range filter using instance.selectedDates
            instance.close();
        };
        return btn;
    }

    function createFooter(instance, selectedDates) {
        const footer = document.createElement("div");
        footer.className = "flatpickr-footer flex justify-end gap-2 pr-2 py-2 dark:border-neutral-700";
        footer.appendChild(createCancelButton(instance));
        footer.appendChild(createApplyButton(instance, selectedDates));
        instance.calendarContainer.appendChild(footer);
    }

    const config = {
        mode: "range",
        showMonths: 2,
        closeOnSelect: false,
        maxDate: "today",
        dateFormat: "m-d-Y",
        onReady(selectedDates, dateStr, instance) {
            createFooter(instance, selectedDates);
        }
    };

    flatpickr(input, config);
})();
</script>
