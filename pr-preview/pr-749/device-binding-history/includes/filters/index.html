<div class="grid md:grid-cols-1 gap-y-2 md:gap-y-0 md:gap-x-5">
  <div class="flex md:justify-end items-center gap-x-2">
    <!-- Sort Dropdown -->
    <div class="hs-dropdown relative inline-flex">
      <button id="hs-sort-dropdown" type="button"
        class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700"
        aria-haspopup="menu" aria-expanded="false">

        <!-- Icon -->
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg"
          width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M11 5h10"/>
          <path d="M11 9h7"/>
          <path d="M11 13h4"/>
          <path d="m3 17 3 3 3-3"/>
          <path d="M6 20V4"/>
        </svg>
        Sort
      </button>

      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-36 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-md dark:bg-neutral-900"
        role="menu" aria-labelledby="hs-sort-dropdown">

        <div class="p-1">
          <button type="button"
            onclick="handleSort('latest')"
            class="w-full text-left px-3 py-2 text-xs rounded-lg hover:bg-stone-100 dark:hover:bg-neutral-800">
            Sort by Latest
          </button>

          <button type="button"
            onclick="handleSort('oldest')"
            class="w-full text-left px-3 py-2 text-xs rounded-lg hover:bg-stone-100 dark:hover:bg-neutral-800">
            Sort by Oldest
          </button>
        </div>
      </div>
    </div>
    <!-- End Sort Dropdown -->

    <!-- Filter Button -->
    <div class="hs-dropdown [--auto-close:inside] relative inline-flex">
      <button id="hs-pro-dashe" type="button" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown">
        <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
        Filter
      </button>

      <!-- Download Dropdown -->
      <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-48 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900" role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dashe">
        <!-- Search Input -->
        <!-- End Search Input -->
        <p class="pl-2 pt-3 space-y-0.5 text-[14px] text-stone-800 font-semibold dark:text-neutral-300">Event Type</p>

        <div class="p-1 space-y-0.5">
          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="event_type" id="event-all" value="all" checked
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">All</span>
          </label>

          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="event_type" id="event-bound" value="device_bound"
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">Device Bound</span>
          </label>

          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="event_type" id="event-reset" value="device_reset"
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">Device Reset</span>
          </label>
        </div>

        <p class="pl-2 pt-3 space-y-0.5 text-[14px] text-stone-800 font-semibold dark:text-neutral-300">Performed By</p>

        <div class="p-1 space-y-0.5">
          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="performed_by" id="performed-all" value="all" checked
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">All</span>
          </label>

          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="performed_by" id="performed-system" value="system"
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">System</span>
          </label>

          <label class="flex items-center gap-x-3 py-1.5 px-2 rounded-lg hover:bg-stone-100 cursor-pointer">
            <input type="radio" name="performed_by" id="performed-user" value="admin"
              class="shrink-0 border-stone-300 text-green-600 focus:ring-green-600">
            <span class="text-[13px]">user</span>
          </label>
        </div>
        <div class="p-2 border-t">
          <button type="submit" class="w-full py-2 px-3 text-sm font-medium rounded-lg bg-green-600 text-white">Apply</button>
        </div>
      </div>
      <!-- End Download Dropdown -->
    </div>
    <!-- End Filter Button -->
  </div>
  <!-- End Col -->
</div>
