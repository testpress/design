<!-- Tabs -->
<div class="lg:hidden relative" x-data="{ open: false, activeTab: '/tpstreams/usages/includes/tablet_tabs/' }">
  <button type="button" @click="open = !open"
    class="relative w-full cursor-pointer rounded-lg bg-white py-2.5 pl-3 pr-10 text-left text-sm font-medium text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-600 sm:leading-6">
    <span class="block truncate">
      
        DRM Usage
      
    </span>
    <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2">
      <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M10 3a.75.75 0 01.55.24l3.25 3.5a.75.75 0 11-1.1 1.02L10 4.852 7.3 7.76a.75.75 0 01-1.1-1.02l3.25-3.5A.75.75 0 0110 3zm-3.76 9.2a.75.75 0 011.06.04l2.7 2.908 2.7-2.908a.75.75 0 111.1 1.02l-3.25 3.5a.75.75 0 01-1.1 0l-3.25-3.5a.75.75 0 01.04-1.06z" clip-rule="evenodd" />
      </svg>
    </span>
  </button>

  <ul x-show="open" @click.away="open = false" style="display: none;"
    class="absolute z-10 mt-1 max-h-60 w-full overflow-auto rounded-lg bg-white py-1 text-base shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none sm:text-sm">
    
    <li class="relative cursor-pointer select-none py-2 px-3 transition-colors duration-150"
      :class="activeTab === '/pr-preview/pr-899/tpstreams/usages/' ? 'text-gray-900 bg-gray-100' : 'text-gray-700 hover:text-gray-900 hover:bg-gray-100'"
      @click="activeTab = '/pr-preview/pr-899/tpstreams/usages/'; window.location.href='/pr-preview/pr-899/tpstreams/usages/'">
      <span class="block truncate" :class="activeTab === '/pr-preview/pr-899/tpstreams/usages/' ? 'font-medium' : 'font-normal'">
        Resource Usage
      </span>
    </li>

    <li class="relative cursor-pointer select-none py-2 px-3 transition-colors duration-150"
      :class="activeTab === '/pr-preview/pr-899/tpstreams/usages/drm_usage/' ? 'text-gray-900 bg-gray-100' : 'text-gray-700 hover:text-gray-900 hover:bg-gray-100'"
      @click="activeTab = '/pr-preview/pr-899/tpstreams/usages/drm_usage/'; window.location.href='/pr-preview/pr-899/tpstreams/usages/drm_usage/'">
      <span class="block truncate" :class="activeTab === '/pr-preview/pr-899/tpstreams/usages/drm_usage/' ? 'font-medium' : 'font-normal'">
        DRM Usage
      </span>
    </li>
