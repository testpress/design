<!-- only show this if user has atlease access to more than 1 course -->
<div class="flex" x-data="useCourseFilter()">
  <div class="flex flex-col space-y-4">
    <div>
      <nav class="flex items-center overflow-x-auto hide-scrollbar">
        <div class="flex gap-2 mr-2">

          <!-- All pill (always visible, deselects everything) -->
          <button type="button"
            @click="selectedCourse = null"
            class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
            :class="!selectedCourse
              ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500'
              : 'bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600'">

            All
          </button>

          <!-- Visible course pills -->
          <template x-for="(course, index) in courses" :key="course.id">
            <label
              x-show="index < visibleCount"
              :for="`course-${course.id}`"
              class="py-2 px-3 flex justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset"
              :class="isSelected(course.id)
                ? 'bg-emerald-100 border-emerald-200 ring-emerald-200 text-emerald-800 dark:bg-emerald-800/30 dark:border-emerald-800/50 dark:ring-emerald-800/50 dark:text-emerald-500'
                : 'bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600'">

              <input type="checkbox"
                :id="`course-${course.id}`"
                class="hidden"
                :checked="isSelected(course.id)"
                @change="selectCourse(course.id)">

              <span class="block max-w-56 truncate" x-text="course.name"></span>
            </label>
          </template>

        </div>
      </nav>
    </div>
  </div>

  <!-- View All Button & Dropdown -->
  <div class="relative" x-data="{ viewAllOpen: false }" @click.outside="viewAllOpen = false">
    <button type="button"
      @click="viewAllOpen = !viewAllOpen"
      class="py-2 px-3 flex shrink-0 whitespace-nowrap justify-center items-center text-center text-[13px] cursor-pointer rounded-xl transition-all duration-200 border ring-1 ring-inset bg-white text-gray-800 border-gray-200 ring-transparent dark:bg-neutral-800 dark:text-neutral-200 dark:border-neutral-700 hover:border-emerald-600 hover:ring-emerald-600 dark:hover:ring-neutral-600">
      View All
    </button>

    <!-- Dropdown Panel -->
    <div x-show="viewAllOpen"
      x-transition:enter="transition ease-out duration-100"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-75"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="absolute right-0 top-full mt-2 w-full sm:w-96 z-[100] bg-white border border-gray-200 sm:rounded-lg shadow-md sm:shadow-xl dark:bg-neutral-900 dark:border-neutral-700 flex flex-col"
      style="display: none;">

      <div class="p-4 space-y-5">
        <div>
          <!-- Search Input -->
          <div class="mb-3">
            <input type="text"
                   x-model="searchQuery"
                   placeholder="Search courses..."
                   class="block w-full text-xs sm:text-sm bg-white dark:bg-neutral-800 border border-gray-200 dark:border-neutral-700 rounded-md text-gray-800 dark:text-neutral-200 placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:outline-none focus:ring-1 focus:ring-emerald-600 dark:focus:ring-emerald-500 focus:border-emerald-600 dark:focus:border-emerald-500 py-1.5 px-2">
          </div>

          <!-- Scrollable Option List -->
          <div class="overflow-y-auto max-h-40 mb-3 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
            <template x-for="option in filteredCourses()" :key="option.id">
              <div @click.stop="selectCourse(option.id); viewAllOpen = false" class="py-1.5 px-2 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-md flex items-center justify-between">
                <span x-text="option.name"></span>
                <template x-if="isSelected(option.id)">
                  <i class="shrink-0 size-3.5 text-emerald-600" data-lucide="check" stroke-width="3"></i>
                </template>
              </div>
            </template>
            <div x-show="filteredCourses().length === 0" class="w-full text-xs text-gray-400 text-center py-4">
              No courses found
            </div>
          </div>
        </div>

      </div>

    </div>
    <!-- End Dropdown Panel -->
  </div>
</div>
<script>
  function useCourseFilter() {
    return {
      selectedCourse: null,
      visibleCount: 4,
      searchQuery: '',
      courses: [
        { id: 'upsc-civil-services', name: 'UPSC Civil Services Prep' },
        { id: 'ssc-cgl', name: 'SSC CGL Foundation' },
        { id: 'neet-ug', name: 'NEET UG Masterclass' },
        { id: 'jee-main', name: 'JEE Main & Advanced' },
        { id: 'bank-po', name: 'Bank PO Prelims' },
        { id: 'cat-prep', name: 'CAT Prep 2026' },
        { id: 'gate-cs', name: 'GATE Computer Science' },
        { id: 'clat-prep', name: 'CLAT Preparation' },
        { id: 'nda-exam', name: 'NDA Written Exam' },
        { id: 'state-psc', name: 'State PSC Prep' }
      ],

      init() {
        this.setVisibleCount();
        window.addEventListener('resize', () => this.setVisibleCount());
      },

      setVisibleCount() {
        const isLg = window.innerWidth >= 1024;
        const maxContainerWidth = Math.min(window.innerWidth, 1280) - (isLg ? 64 : 32); 
        let availableWidth = maxContainerWidth - 250; 
        
        let count = 0;
        for (let i = 0; i < this.courses.length; i++) {
          const pillWidth = (this.courses[i].name.length * 7.5) + 36;
          
          if (availableWidth >= pillWidth) {
            availableWidth -= pillWidth;
            count++;
          } else {
            break;
          }
        }
        
        this.visibleCount = Math.max(1, count);
      },

      selectCourse(id) {
        if (this.selectedCourse === id) {
          this.selectedCourse = null;
        } else {
          this.selectedCourse = id;
          const index = this.courses.findIndex(c => c.id === id);
          if (index >= this.visibleCount) {
            const [selected] = this.courses.splice(index, 1);
            this.courses.unshift(selected);
            this.setVisibleCount();
          }
        }
      },

      isSelected(id) {
        return this.selectedCourse === id;
      },

      filteredCourses() {
        const q = this.searchQuery.trim().toLowerCase();
        if (!q) return this.courses;
        return this.courses.filter(s => s.name.toLowerCase().includes(q));
      }
    };
  }
</script>
