


<div class="flex justify-between items-center gap-x-5">
  <h2 class="inline-block text-lg font-semibold text-gray-800 dark:text-neutral-200">
    Learning Session
  </h2>
  <div class="flex flex-wrap items-center gap-2">

      
      <div x-data="{ showCalendar: false, dateRangeLabel: 'All Date' }" 
           @click="setTimeout(() => { const input = $el.querySelector('input[name=\'list_range\']'); dateRangeLabel = (input && input.value) ? input.value : 'All Date'; }, 10)"
           class="relative inline-flex">
        <button type="button" @click="showCalendar = !showCalendar" class="py-1.5 px-3 inline-flex items-center gap-x-2 text-xs font-medium border border-gray-200 bg-white text-gray-800 rounded-md shadow-2xs hover:bg-gray-100 focus:outline-hidden focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-600 dark:focus:bg-neutral-600">
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/><path d="M16 2v4"/><path d="M8 2v4"/></svg>
          <span x-text="dateRangeLabel"></span>
          <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        
        <div x-show="showCalendar" @click.outside="showCalendar = false" x-cloak class="absolute top-full mt-1.5 right-0 z-50">
           


<div class="space-y-2">
  

  <div 
    x-data="uiDatePicker({
      single: true,
      datetime: false,
      range: true,
      range_datetime: false,
      inline: true,
      disabled: false,
      required: false,
      readonly: false,
      placeholder: 'Select date',
      showTime: false,
      showClear: false,
      showToday: false,
      showFooterActions: false,
      dropdownAlign: 'left',
      min_date: '',
      max_date: '',
      selectedValue: ''
    })"
    class="relative w-full"
    @keydown.escape="open = false"
    @click.outside="if(!inline) open = false"
    @set-date-value.window="if ($event.detail.name === 'list_range') parseAndSetValue($event.detail.value)"
  >
    <!-- Hidden Input for Form Submission -->
    <input type="hidden" name="list_range" :value="inputValue">

    
      <!-- Input Trigger (only when NOT inline) -->
      <div x-show="!inline" class="relative" x-ref="trigger">
      <input 
        type="text"
        :value="inputValue"
        placeholder="Select date"
        @click="if(!disabled && !readonly) open = !open"
        :disabled="disabled"
        :required="required"
        :readonly="true"
        class="py-2 sm:py-2.5 px-3 block w-full bg-white dark:bg-neutral-800 rounded-lg text-sm text-gray-800 dark:text-white placeholder:text-gray-500 dark:placeholder:text-neutral-400 focus:outline-none focus:border-primary-700 dark:focus:border-primary-600 focus:z-10 focus:ring-primary-700 dark:focus:ring-primary-600 disabled:opacity-50 disabled:pointer-events-none cursor-pointer read-only:bg-white dark:read-only:bg-neutral-800
               border-gray-200 dark:border-neutral-700"
      />
      <div class="absolute inset-y-0 end-0 flex items-center pe-3 gap-x-1.5">
        <!-- Clear selection button -->
        <button 
          type="button" 
          x-show="showClear && hasValue()" 
          @click.stop="clearValue()" 
          class="text-gray-400 hover:text-gray-600 dark:text-neutral-500 dark:hover:text-neutral-300 focus:outline-hidden"
          x-cloak
        >
          <i data-lucide="x" class="size-4"></i>
        </button>
        <!-- Calendar Icon -->
        <i data-lucide="calendar" class="size-4 text-gray-400 dark:text-neutral-500"></i>
      </div>
    </div>
    

    <!-- Dropdown / Calendar Panel -->
    <div 
      x-show="inline || open" 
      x-ref="menu"
      
        class="w-80 max-w-fit bg-white dark:bg-neutral-900 border border-transparent shadow-lg rounded-xl overflow-hidden"
        :class="range || range_datetime ? 'sm:w-[640px]' : ''"
      
    >
      <div class="flex flex-col sm:flex-row">
        <!-- Left Pane Calendar -->
        <div class="p-3 flex-1 space-y-0.5">
          <!-- Calendar Header -->
          <div class="grid grid-cols-5 items-center gap-x-3 mx-1.5 pb-3">
            <!-- Prev Button -->
            <div class="col-span-1">
              <button 
                type="button" 
                @click="prevMonth()" 
                class="size-8 flex justify-center items-center text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-700" 
                aria-label="Previous"
              >
                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
              </button>
            </div>

            <!-- Month / Year selection dropdowns -->
            <div class="col-span-3 flex justify-center items-center gap-x-1">
              <!-- Month Custom Dropdown -->
              <div class="relative" x-data="{ monthOpen: false }" @click.outside="monthOpen = false">
                <button 
                  type="button" 
                  @click="monthOpen = !monthOpen" 
                  class="flex items-center gap-x-1 font-medium text-gray-800 dark:text-neutral-200 hover:text-primary-700 dark:hover:text-primary-600 focus:outline-hidden focus:text-primary-700 dark:focus:text-primary-600"
                >
                  <span x-text="monthNames[currentMonth]"></span>
                </button>
                <div 
                  x-show="monthOpen" 
                  x-cloak 
                  x-transition:enter="transition ease-out duration-100"
                  x-transition:enter-start="opacity-0 scale-95"
                  x-transition:enter-end="opacity-100 scale-100"
                  x-transition:leave="transition ease-in duration-75"
                  x-transition:leave-start="opacity-100 scale-100"
                  x-transition:leave-end="opacity-0 scale-95"
                  class="absolute left-1/2 -translate-x-1/2 mt-2 z-50 w-32 max-h-72 p-1 space-y-0.5 overflow-hidden overflow-y-auto bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
                >
                  <template x-for="(mName, mIdx) in monthNames" :key="mIdx">
                    <div 
                      @click="currentMonth = mIdx; monthOpen = false; handleTimeChange();"
                      class="p-2 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-md focus:outline-hidden flex justify-between items-center"
                      :class="currentMonth === mIdx ? 'bg-gray-100 dark:bg-neutral-800 font-semibold' : ''"
                    >
                      <span x-text="mName"></span>
                      <svg x-show="currentMonth === mIdx" class="shrink-0 size-3.5 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </template>
                </div>
              </div>

              <span class="text-gray-800 dark:text-neutral-200">/</span>

              <!-- Year Custom Dropdown -->
              <div class="relative" x-data="{ yearOpen: false }" @click.outside="yearOpen = false">
                <button 
                  type="button" 
                  @click="yearOpen = !yearOpen" 
                  class="flex items-center gap-x-1 font-medium text-gray-800 dark:text-neutral-200 hover:text-primary-700 dark:hover:text-primary-600 focus:outline-hidden focus:text-primary-700 dark:focus:text-primary-600"
                >
                  <span x-text="currentYear"></span>
                </button>
                <div 
                  x-show="yearOpen" 
                  x-cloak 
                  x-transition:enter="transition ease-out duration-100"
                  x-transition:enter-start="opacity-0 scale-95"
                  x-transition:enter-end="opacity-100 scale-100"
                  x-transition:leave="transition ease-in duration-75"
                  x-transition:leave-start="opacity-100 scale-100"
                  x-transition:leave-end="opacity-0 scale-95"
                  class="absolute left-1/2 -translate-x-1/2 mt-2 z-50 w-20 max-h-72 p-1 space-y-0.5 overflow-hidden overflow-y-auto bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
                >
                  <template x-for="yr in yearRange" :key="yr">
                    <div 
                      @click="currentYear = yr; yearOpen = false; handleTimeChange();"
                      class="p-2 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-md focus:outline-hidden flex justify-between items-center"
                      :class="currentYear === yr ? 'bg-gray-100 dark:bg-neutral-800 font-semibold' : ''"
                    >
                      <span x-text="yr"></span>
                      <svg x-show="currentYear === yr" class="shrink-0 size-3.5 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <!-- Next Button -->
            <div class="col-span-1 flex justify-end">
              <button 
                type="button" 
                @click="nextMonth()" 
                class="size-8 flex justify-center items-center text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-700" 
                :class="range || range_datetime ? 'opacity-0 pointer-events-none' : ''"
                aria-label="Next"
              >
                <svg class="shrink-0 size-4" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </div>

          <!-- Weeks -->
          <div class="flex pb-1.5 justify-center">
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Mo</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Tu</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">We</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Th</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Fr</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Sa</span>
            <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Su</span>
          </div>

          <!-- Days Grid -->
          <div class="grid grid-cols-7 gap-0 justify-items-center">
            <template x-for="(dayObj, dIdx) in getDays()" :key="dIdx">
              <div 
                class="relative w-10 h-10 flex items-center justify-center"
                :class="{
                  'bg-gray-100 dark:bg-neutral-800': isInRange(dayObj.date),
                  'rounded-s-full bg-gray-100 dark:bg-neutral-800': (range || range_datetime) && isRangeStart(dayObj.date) && (selectedEndDate || hoverDate),
                  'rounded-e-full bg-gray-100 dark:bg-neutral-800': (range || range_datetime) && isRangeEnd(dayObj.date) && (selectedEndDate || hoverDate)
                }"
                @mouseenter="if(range || range_datetime) hoverDate = dayObj.date"
              >
                <button 
                  type="button"
                  @click="selectDay(dayObj.date)"
                  :disabled="dayObj.isDisabled || !dayObj.isCurrentMonth"
                  class="m-px size-10 flex justify-center items-center border-[1.5px] border-transparent text-sm rounded-full transition-all duration-150 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden"
                  :class="{
                    'bg-primary-600 dark:bg-primary-500 text-white font-medium hover:border-primary-700 dark:hover:border-primary-600': isSelected(dayObj.date),
                    'text-gray-400 dark:text-neutral-600': !dayObj.isCurrentMonth && !isSelected(dayObj.date),
                    'text-gray-800 dark:text-neutral-200 hover:border-primary-700 dark:hover:border-primary-600 hover:text-primary-700 dark:hover:text-primary-600': dayObj.isCurrentMonth && !isSelected(dayObj.date),
                    'border-primary-600 dark:border-primary-500 font-semibold text-primary-600 dark:text-primary-500': isToday(dayObj.date) && !isSelected(dayObj.date) && dayObj.isCurrentMonth
                  }"
                  x-text="dayObj.day"
                >
                </button>
              </div>
            </template>
          </div>

          <!-- Time Picker at Bottom of Left Pane -->
          <template x-if="datetime || range_datetime">
            <div class="pt-3 flex justify-center items-center gap-x-2">
              <!-- Hours Select -->
              <div class="relative" x-data="{ hourOpen: false }" @click.outside="hourOpen = false">
                <button 
                  type="button" 
                  @click="hourOpen = !hourOpen" 
                  class="relative py-1 px-2 pr-6 flex text-nowrap w-16 cursor-pointer bg-transparent border border-gray-200 dark:border-neutral-700 rounded-lg text-start text-sm text-gray-800 dark:text-neutral-200 focus:border-primary-700 dark:focus:border-primary-600 focus:outline-none"
                >
                  <span x-text="startHour"></span>
                  <span class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                  </span>
                </button>
                <div 
                  x-show="hourOpen" 
                  x-cloak 
                  class="absolute bottom-full mb-2 z-50 w-24 max-h-48 p-1 space-y-0.5 overflow-y-auto bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
                >
                  <template x-for="h in 12" :key="h">
                    <div 
                      @click="startHour = h; hourOpen = false; handleTimeChange();"
                      class="flex justify-between items-center py-2 px-3 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-none"
                      :class="startHour === h ? 'bg-gray-100 dark:bg-neutral-800 font-semibold' : ''"
                    >
                      <span x-text="h"></span>
                      <svg x-show="startHour === h" class="shrink-0 size-3.5 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </template>
                </div>
              </div>

              <span class="text-gray-800 dark:text-neutral-200">:</span>

              <!-- Minutes Select -->
              <div class="relative" x-data="{ minOpen: false }" @click.outside="minOpen = false">
                <button 
                  type="button" 
                  @click="minOpen = !minOpen" 
                  class="relative py-1 px-2 pr-6 flex text-nowrap w-16 cursor-pointer bg-transparent border border-gray-200 dark:border-neutral-700 rounded-lg text-start text-sm text-gray-800 dark:text-neutral-200 focus:border-primary-700 dark:focus:border-primary-600 focus:outline-none"
                >
                  <span x-text="startMinute"></span>
                  <span class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                  </span>
                </button>
                <div 
                  x-show="minOpen" 
                  x-cloak 
                  class="absolute bottom-full mb-2 z-50 w-24 max-h-48 p-1 space-y-0.5 overflow-y-auto bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:rounded-none [&::-webkit-scrollbar-track]:bg-gray-100 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
                >
                  <template x-for="m in Array.from({length: 60}, (_, i) => String(i).padStart(2, '0'))" :key="m">
                    <div 
                      @click="startMinute = m; minOpen = false; handleTimeChange();"
                      class="flex justify-between items-center py-2 px-3 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-none"
                      :class="startMinute === m ? 'bg-gray-100 dark:bg-neutral-800 font-semibold' : ''"
                    >
                      <span x-text="m"></span>
                      <svg x-show="startMinute === m" class="shrink-0 size-3.5 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </template>
                </div>
              </div>

              <!-- AM/PM Select -->
              <div class="relative" x-data="{ ampmOpen: false }" @click.outside="ampmOpen = false">
                <button 
                  type="button" 
                  @click="ampmOpen = !ampmOpen" 
                  class="relative py-1 px-2 pr-6 flex text-nowrap w-20 cursor-pointer bg-transparent border border-gray-200 dark:border-neutral-700 rounded-lg text-start text-sm text-gray-800 dark:text-neutral-200 focus:border-primary-700 dark:focus:border-primary-600 focus:outline-none"
                >
                  <span x-text="startAmPm"></span>
                  <span class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none">
                    <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                  </span>
                </button>
                <div 
                  x-show="ampmOpen" 
                  x-cloak 
                  class="absolute bottom-full mb-2 z-50 w-20 p-1 space-y-0.5 bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-700 rounded-xl shadow-xl"
                >
                  <template x-for="ap in ['AM', 'PM']" :key="ap">
                    <div 
                      @click="startAmPm = ap; ampmOpen = false; handleTimeChange();"
                      class="flex justify-between items-center py-2 px-3 w-full text-sm text-gray-800 dark:text-neutral-200 cursor-pointer hover:bg-gray-100 dark:hover:bg-neutral-800 rounded-lg focus:outline-none"
                      :class="startAmPm === ap ? 'bg-gray-100 dark:bg-neutral-800 font-semibold' : ''"
                    >
                      <span x-text="ap"></span>
                      <svg x-show="startAmPm === ap" class="shrink-0 size-3.5 text-gray-800 dark:text-neutral-200" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Right Pane Calendar (Only in range / range_datetime mode) -->
        <template x-if="range || range_datetime">
          <div class="p-3 flex-1 space-y-0.5 border-t sm:border-t-0 sm:border-l border-gray-100 dark:border-neutral-800">
            <!-- Calendar Header -->
            <div class="grid grid-cols-5 items-center gap-x-3 mx-1.5 pb-3">
              <!-- Placeholder button for spacing alignment -->
              <div class="col-span-1">
                <button type="button" class="size-8 opacity-0 pointer-events-none" tabindex="-1"></button>
              </div>

              <!-- Right Pane Month / Year display -->
              <div class="col-span-3 flex justify-center items-center gap-x-1 font-semibold text-gray-800 dark:text-neutral-200 text-sm py-1">
                <span x-text="getRightMonthName()"></span>
                <span>/</span>
                <span x-text="getRightYear()"></span>
              </div>

              <!-- Next month button -->
              <div class="col-span-1 flex justify-end">
                <button 
                  type="button" 
                  @click="nextMonth()" 
                  class="size-8 flex justify-center items-center text-gray-800 dark:text-neutral-200 hover:bg-gray-100 dark:hover:bg-neutral-700 rounded-full disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 dark:focus:bg-neutral-700" 
                  aria-label="Next"
                >
                  <svg class="shrink-0 size-4" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <!-- Weeks -->
            <div class="flex pb-1.5 justify-center">
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Mo</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Tu</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">We</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Th</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Fr</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Sa</span>
              <span class="m-px w-10 block text-center text-sm text-gray-500 dark:text-neutral-400">Su</span>
            </div>

            <!-- Days Grid -->
            <div class="grid grid-cols-7 gap-0 justify-items-center">
              <template x-for="(dayObj, dIdx) in getRightDays()" :key="dIdx">
                <div 
                  class="relative w-10 h-10 flex items-center justify-center"
                  :class="{
                    'bg-gray-100 dark:bg-neutral-800': isInRange(dayObj.date),
                    'rounded-s-full bg-gray-100 dark:bg-neutral-800': (range || range_datetime) && isRangeStart(dayObj.date) && (selectedEndDate || hoverDate),
                    'rounded-e-full bg-gray-100 dark:bg-neutral-800': (range || range_datetime) && isRangeEnd(dayObj.date) && (selectedEndDate || hoverDate)
                  }"
                  @mouseenter="if(range || range_datetime) hoverDate = dayObj.date"
                >
                  <button 
                    type="button"
                    @click="selectDay(dayObj.date)"
                    :disabled="dayObj.isDisabled || !dayObj.isCurrentMonth"
                    class="m-px size-10 flex justify-center items-center border-[1.5px] border-transparent text-sm rounded-full transition-all duration-150 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden"
                    :class="{
                      'bg-primary-600 dark:bg-primary-500 text-white font-medium hover:border-primary-700 dark:hover:border-primary-600': isSelected(dayObj.date),
                      'text-gray-400 dark:text-neutral-600': !dayObj.isCurrentMonth && !isSelected(dayObj.date),

  <div x-data="{
         active: false,
         top: 0, left: 0,
         arrowOffset: '50%',
         updatePosition() {
           const trigger = this.$refs.trigger;
           const tip = this.$refs.tip;
           if (!trigger || !tip) return;
           const r = trigger.getBoundingClientRect();
           const placement = 'top';
           const gap = 8;
           // Force display to measure real dimensions (tip may still be hidden via x-show)
           const wasHidden = tip.style.display === 'none' || getComputedStyle(tip).display === 'none';
           if (wasHidden) tip.style.setProperty('display', 'block', 'important');
           const tipW = tip.offsetWidth || 100;
           const tipH = tip.offsetHeight || 28;
           if (wasHidden) tip.style.removeProperty('display');
           console.log('[tooltip] placement:', placement, '| trigger rect:', r, '| tipW:', tipW, '| tipH:', tipH);
           if (placement === 'top') {
             this.top  = r.top - tipH - gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'bottom') {
             this.top  = r.bottom + gap;
             this.left = r.left + (r.width - tipW) / 2;
           } else if (placement === 'left') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.left - tipW - gap;
           } else if (placement === 'right') {
             this.top  = r.top + (r.height - tipH) / 2;
             this.left = r.right + gap;
           }
           // Clamp to viewport
           const minL = 8, maxL = window.innerWidth - tipW - 8;
           const origLeft = this.left;
           this.left = Math.max(minL, Math.min(this.left, maxL));
           if (placement === 'top' || placement === 'bottom') {
             const triggerCenter = r.left + r.width / 2;
             const shift = triggerCenter - this.left;
             this.arrowOffset = Math.max(8, Math.min(shift, tipW - 8)) + 'px';
           }
           console.log('[tooltip] final top:', this.top, '| left:', this.left);
         }
       }"
       @mouseenter="active = true; $nextTick(() => updatePosition())"
       @mouseleave="active = false"
       @focusin="active = true; $nextTick(() => updatePosition())"
       @focusout="active = false"
       @click="active = !active; if(active) $nextTick(() => updatePosition())"
       @click.outside="active = false"
       @keydown.escape.window="active = false"
