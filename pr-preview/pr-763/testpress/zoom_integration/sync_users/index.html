<div class="flex flex-wrap justify-between items-center gap-2 mb-5">
  <div>
    <h1 class="text-lg md:text-xl font-semibold text-gray-800 dark:text-neutral-200">
      Sync Zoom Licensed Users
    </h1>
    <p class="text-sm text-gray-500 dark:text-neutral-500">
      Select the licensed users you want to sync into Testpress.
    </p>
  </div>
</div>


<div class="p-5 mt-5 space-y-4 flex flex-col bg-white border border-gray-200 shadow-sm rounded-xl dark:bg-neutral-800 dark:border-neutral-700">
  <nav class="relative flex space-x-1 after:absolute after:bottom-0 after:inset-x-0 after:border-b-2 after:border-gray-200 dark:after:border-neutral-700" aria-label="Tabs" role="tablist" aria-orientation="horizontal">
  <button type="button" class="text-gray-800 after:bg-gray-800 dark:text-neutral-200 dark:after:bg-neutral-400 px-2.5 py-1.5 mb-2 relative inline-flex justify-center items-center gap-x-2 hover:text-gray-800 text-sm rounded-lg disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:bg-gray-100 after:absolute after:-bottom-2 after:inset-x-0 after:z-10 after:h-0.5 after:pointer-events-none dark:hover:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700" role="tab">
    Licensed Zoom Users
    <span class="inline-flex items-center justify-center font-medium text-[10px] py-0.5 px-[5px] bg-gray-800 dark:bg-neutral-500 text-white leading-3 rounded-full min-w-[1.25rem] ml-2" x-text="zoomUsers.length"></span>
  </button>
</nav>

  <div class="flex flex-wrap items-center gap-y-2 gap-x-5 border-gray-200 dark:border-neutral-700 justify-between">
  <div class="grow min-w-0 max-w-md">
    <div class="relative">
      <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
        <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24"
          height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
      </div>
      <input type="text" x-model="searchQuery"
        class="py-[7px] ps-10 pe-8 block w-full bg-gray-100 border-transparent rounded-lg text-sm placeholder:text-gray-500 focus:border-emerald-500 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-700 dark:border-transparent dark:text-neutral-400 dark:placeholder:text-neutral-400 dark:focus:ring-neutral-600"
        placeholder="Search by name or email">
    </div>
  </div>
  <div class="flex items-center gap-x-3 shrink-0">
    <button
      @click="fetchUsers()"
      :class="{ 'opacity-60 cursor-not-allowed': isFetching }"
      class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 focus:outline-none focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-200 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700 transition"
      :aria-disabled="isFetching"
    >
      <template x-if="isFetching">
        <svg class="shrink-0 size-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0a12 12 0 00-8 12h4z"></path>
        </svg>
      </template>
      <template x-if="!isFetching">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4">
          <circle cx="10" cy="7" r="4"/>
          <path d="M10.3 15H7a4 4 0 0 0-4 4v2"/>
          <circle cx="17" cy="17" r="3"/>
          <path d="m21 21-1.9-1.9"/>
        </svg>
      </template>
      <span x-text="isFetching ? 'Fetching...' : 'Fetch users'"></span>
    </button>

    <button
      x-show="selectedUsers.length > 0"
      x-cloak
      x-transition
      @click="importUsers()"
      class="py-2 px-3 inline-flex items-center gap-x-2 text-sm font-medium rounded-lg border border-transparent bg-emerald-600 text-white hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition disabled:opacity-50 disabled:pointer-events-none"
    >
      <template x-if="isSyncing">
        <svg class="shrink-0 size-3.5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0a12 12 0 00-8 12h4z"></path>
        </svg>
      </template>
      <template x-if="!isSyncing">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </template>
      <span x-text="isSyncing ? 'Syncing...' : 'Sync users'"></span>
    </button>
  </div>
</div>

  <div class="overflow-x-auto [&::-webkit-scrollbar]:h-2 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-thumb]:bg-gray-300 dark:[&::-webkit-scrollbar-track]:bg-neutral-700 dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500">
  <div class="min-w-full inline-block align-middle">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-neutral-700">
      <thead>
        <tr class="border-t border-gray-200 dark:border-neutral-700">
          <th scope="col" class="w-[50px] px-4 py-2.5">
            <div class="flex items-center">
              <input type="checkbox" @change="toggleAll()" :checked="allSelected" class="shrink-0 border-gray-300 rounded-sm text-emerald-600 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500 dark:focus:ring-offset-emerald-800">
            </div>
          </th>
          <th scope="col" class="px-5 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-500">Name</th>
          <th scope="col" class="px-5 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-500">Email</th>
          <th scope="col" class="px-5 py-2.5 text-start text-sm font-normal text-gray-500 dark:text-neutral-500">License ID</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 dark:divide-neutral-700">
        <template x-for="(user, index) in filteredZoomUsers" :key="user.id">
          <tr :class="{'bg-emerald-50/30 dark:bg-emerald-900/10': selectedUsers.includes(user.id)}">
            <td class="size-px whitespace-nowrap px-4 py-3">
              <div class="flex items-center">
                <input type="checkbox" :value="user.id" x-model="selectedUsers" class="shrink-0 border-gray-300 rounded-sm text-emerald-600 focus:ring-emerald-600 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-600 dark:checked:bg-emerald-500 dark:checked:border-emerald-500 dark:focus:ring-offset-emerald-800">
              </div>
            </td>
            <td class="size-px whitespace-nowrap px-5 py-3">
              <div class="flex items-center gap-x-3">
                <template x-if="user.avatarUrl">
                  <img class="size-8 rounded-full" :src="user.avatarUrl" alt="">
                </template>
                <template x-if="!user.avatarUrl">
                  <div class="size-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center text-xs font-bold dark:bg-emerald-900/30 dark:text-emerald-400" x-text="user.name.charAt(0)"></div>
                </template>
                <span class="text-sm font-medium text-gray-800 dark:text-neutral-200" x-text="user.name"></span>
              </div>
            </td>
            <td class="size-px whitespace-nowrap px-5 py-3 text-sm text-gray-600 dark:text-neutral-400" x-text="user.email"></td>
            <td class="size-px whitespace-nowrap px-5 py-3 text-sm font-mono text-gray-500 dark:text-neutral-500" x-text="user.licenseId"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

  <template x-if="zoomUsers.length === 0">
  <div class="p-10 text-center">
    <p class="text-sm text-gray-500 dark:text-neutral-400">No licensed Zoom users found</p>
  </div>
</template>

</div>
