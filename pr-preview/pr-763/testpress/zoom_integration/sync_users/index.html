<div class="md:flex md:items-center md:justify-between">
  <div class="min-w-0 flex-1">
    <h1 class="text-2xl font-semibold text-gray-900">Sync Zoom Licensed Users</h1>
    <p class="mt-1 text-sm text-gray-500">Select the licensed users you want to sync into Testpress.</p>
  </div>
</div>

<section class="bg-white shadow sm:rounded-lg overflow-hidden border border-gray-200">
  <div class="px-4 py-5 sm:px-6 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
    <span class="text-sm font-medium text-gray-700" x-text="`${selectedUsers.length} users selected`"></span>
    <div class="flex items-center gap-x-3">
      <button
        @click="fetchUsers()"
        :class="{ 'opacity-60 cursor-not-allowed': isFetching }"
        class="inline-flex items-center gap-x-1.5 text-xs text-layer-foreground bg-layer border border-layer-line hover:bg-muted-hover py-1.5 px-2.5 rounded-full focus:outline-hidden focus:bg-muted-focus transition"
        :aria-disabled="isFetching"
      >
        <template x-if="isFetching">
          <svg class="shrink-0 size-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0a12 12 0 00-8 12h4z"></path>
          </svg>
        </template>
        <template x-if="!isFetching">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-3.5 lucide lucide-user-search-icon lucide-user-search">
            <circle cx="10" cy="7" r="4"/>
            <path d="M10.3 15H7a4 4 0 0 0-4 4v2"/>
            <circle cx="17" cy="17" r="3"/>
            <path d="m21 21-1.9-1.9"/>
          </svg>
        </template>
        <span x-text="isFetching ? 'Fetching...' : 'Fetch users'"></span>
      </button>

      <button
        @click="importUsers()"
        :disabled="selectedUsers.length === 0 || isSyncing"
        class="inline-flex items-center gap-x-1.5 text-xs text-layer-foreground bg-layer border border-layer-line hover:bg-muted-hover py-1.5 px-2.5 rounded-full focus:outline-hidden focus:bg-muted-focus transition"
      >
        <template x-if="isSyncing">
          <svg class="shrink-0 size-3.5 animate-spin text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0a12 12 0 00-8 12h4z"></path>
          </svg>
        </template>
        <template x-if="!isSyncing">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-3.5 lucide lucide-refresh-cw-icon lucide-refresh-cw">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M8 16H3v5"/>
          </svg>
        </template>
        <span x-text="isSyncing ? 'Syncing...' : 'Sync users'"></span>
      </button>
    </div>
  </div>

  <div class="px-4 sm:px-6 overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead>
        <tr>
          <th scope="col" class="py-3 pr-4 text-start w-10">
            <input type="checkbox" @change="toggleAll()" :checked="allSelected" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-600">
          </th>
          <th scope="col" class="py-3 px-4 text-start text-sm font-medium text-gray-900">No.</th>
          <th scope="col" class="py-3 px-4 text-start text-sm font-medium text-gray-900">Name</th>
          <th scope="col" class="py-3 px-4 text-start text-sm font-medium text-gray-900">Email</th>
          <th scope="col" class="py-3 px-4 text-start text-sm font-medium text-gray-900">License ID</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        <template x-for="(user, index) in zoomUsers" :key="user.id">
          <tr :class="{'bg-emerald-50/30': selectedUsers.includes(user.id)}">
            <td class="py-4 pr-4">
              <input type="checkbox" :value="user.id" x-model="selectedUsers" class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-600">
            </td>
            <td class="px-4 py-4 text-sm text-gray-500" x-text="index + 1"></td>
            <td class="px-4 py-4">
              <div class="flex items-center gap-x-3">
                <template x-if="user.avatarUrl">
                  <img class="size-8 rounded-full" :src="user.avatarUrl" alt="">
                </template>
                <template x-if="!user.avatarUrl">
                  <div class="size-8 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center text-xs font-bold" x-text="user.name.charAt(0)"></div>
                </template>
                <span class="text-sm font-medium text-gray-900" x-text="user.name"></span>
              </div>
            </td>
            <td class="px-4 py-4 text-sm text-gray-600" x-text="user.email"></td>
            <td class="px-4 py-4 text-sm font-mono text-gray-500" x-text="user.licenseId"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</section>
