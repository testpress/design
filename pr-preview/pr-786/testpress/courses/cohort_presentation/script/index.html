      get tableRows() {
      const rows = []
      this.filteredReadyToStart.forEach(ono => {
        rows.push({ type: 'ono', ono })

        ono.cohorts.forEach(cohort => {
          rows.push({ type: 'cohort', ono, cohort })
        })
      })
      return rows
},

      get filteredReadyToStart() {
        if (!this.searchQuery) return this.readyToStart;
        const query = this.searchQuery.toLowerCase();

        return this.readyToStart
          .map(ono => {
            const cohorts = ono.cohorts.filter(c =>
              c.name.toLowerCase().includes(query) ||
              c.course_name.toLowerCase().includes(query)
            );
            if (cohorts.length) {
              return {
                ...ono,
                cohorts
              };
            }
          })
          .filter(Boolean);
      },
      toggleOno(id) {
        this.openOno = this.openOno === id ? null : id
      },

      get filteredActiveSessions() {
        if (!this.searchQuery) return this.activeSessions;
        const query = this.searchQuery.toLowerCase();
        return this.activeSessions.filter(s =>
          s.cohort_name.toLowerCase().includes(query) ||
          s.course_name.toLowerCase().includes(query) ||
          s.presenter_name.toLowerCase().includes(query)
        );
      },

      get filteredCompleted() {
        if (!this.searchQuery) return this.completed;
        const query = this.searchQuery.toLowerCase();
        return this.completed.filter(s =>
          s.cohort_name.toLowerCase().includes(query) ||
          s.course_name.toLowerCase().includes(query) ||
          s.presenter_name.toLowerCase().includes(query)
        );
      },

      get selectedUsersCount() {
        return this.selectedUsers.length;
      },

      get allVisibleUsersSelected() {
        const visible = this.getAllVisibleUserIds();
        if (visible.length === 0) return false;
        // If we've selected as many as capacity allows, or all visible users, consider it "all selected"
        const selectedVisibleCount = visible.filter(id => this.selectedUsers.includes(id)).length;
        return selectedVisibleCount > 0 && (
          selectedVisibleCount === visible.length || 
          selectedVisibleCount >= this.maxBatchSize
        );
      },

      get presentationCourseName() {
        if (!this.presentationCohorts.length) return '';
        return this.presentationCohorts[0].course_name || '';
      },

      get totalEligibleInSelection() {
        return this.presentationCohorts.reduce((sum, cohort) =>
          sum + (cohort.learners_count || 0), 0);
      },

      get readyToStartCount() {
        return this.filteredReadyToStart.length;
      },

      get activeSessionsCount() {
        return this.filteredActiveSessions.length;
      },

      get completedCount() {
        return this.filteredCompleted.length;
      },

      get totalLearnersCount() {
        return this.readyToStart.reduce((sum, c) => sum + c.learners_count, 0) +
          this.activeSessions.reduce((sum, s) => sum + (s.learners_count || 0), 0) +
          this.completed.reduce((sum, s) => sum + (s.learners_count || 0), 0);
      },

      filterCohorts() {
        // Filtering is handled by computed properties
      },

toggleAllCohorts() {
      const ids = this.readyToStart.flatMap(o => o.cohorts.map(c => c.id))
      this.selectedCohorts =
        this.selectedCohorts.length === ids.length ? [] : ids
    },
      toggleCohortSelection(id) {
        if (this.selectedCohorts.includes(id)) {
          this.selectedCohorts = this.selectedCohorts.filter(i => i !== id)
        } else {
          this.selectedCohorts.push(id)
        }
    },

      openPresentationForCohort(cohort) {
        // Single-cohort flow: show exactly this cohort in the modal
        this.presentationMode = 'single';
        this.selectedCohorts = [cohort.id];
        this.presentationCohorts = [cohort];
        this.modalSearchQuery = '';
      },

      openBulkPresentation() {
        if (!this.selectedCohorts.length) return;
        // Group flow: show all selected cohorts in the modal
        this.presentationMode = 'group';
        this.presentationCohorts = this.readyToStart.filter(c =>
          this.selectedCohorts.includes(c.id)
        );
        this.modalSearchQuery = '';
      },

      canSelectMore(countToAdd = 1) {
        return this.selectedUsers.length + countToAdd <= this.maxBatchSize;
      },

      isUserSelected(userId) {
        return this.selectedUsers.includes(userId);
      },

      toggleUserSelection(userId) {
        if (this.isUserSelected(userId)) {
          this.selectedUsers = this.selectedUsers.filter(id => id !== userId);
        } else if (this.canSelectMore()) {
          this.selectedUsers = [...this.selectedUsers, userId];
        }
      },

      selectedCountInCohort(cohort) {
        return cohort.users.filter(u => this.selectedUsers.includes(u.id)).length;
      },

      selectedCountInOrg(org) {
        return org.cohorts.reduce((sum, cohort) => sum + this.selectedCountInCohort(cohort), 0);
      },

      toggleAllInCohort(cohort) {
        // Only toggle visible users (respects search filter)
        const visibleUsers = this.getVisibleUsersInCohort(cohort);
        const userIds = visibleUsers.map(u => u.id);
        const allSelected = userIds.length > 0 && userIds.every(id => this.selectedUsers.includes(id));
        if (allSelected) {
          this.selectedUsers = this.selectedUsers.filter(id => !userIds.includes(id));
        } else {
          userIds.forEach(id => {
            if (!this.selectedUsers.includes(id) && this.canSelectMore()) {
              this.selectedUsers = [...this.selectedUsers, id];
            }
          });
        }
      },

      toggleAllInOrg(org) {
        // Only toggle visible users (respects search filter)
        const visibleUsers = this.getVisibleUsersInOrg(org);
        const userIds = visibleUsers.map(u => u.id);
        const allSelected = userIds.length > 0 && userIds.every(id => this.selectedUsers.includes(id));
        if (allSelected) {
          this.selectedUsers = this.selectedUsers.filter(id => !userIds.includes(id));
        } else {
          userIds.forEach(id => {
            if (!this.selectedUsers.includes(id) && this.canSelectMore()) {
              this.selectedUsers = [...this.selectedUsers, id];
            }
          });
        }
      },

      matchesModalSearch(user) {
        if (!this.modalSearchQuery || !this.modalSearchQuery.trim()) return true;
        const q = this.modalSearchQuery.toLowerCase().trim();
        return (user.name && user.name.toLowerCase().includes(q)) ||
          (user.id && user.id.toLowerCase().includes(q));
      },

      cohortHasVisibleUsers(cohort) {
        return cohort.users.some(u => this.matchesModalSearch(u));
      },

      orgHasVisibleUsers(org) {
        return org.cohorts.some(c => this.cohortHasVisibleUsers(c));
      },

      getAllVisibleUserIds() {
        const ids = [];
        this.organizations.forEach(org => {
          org.cohorts.forEach(cohort => {
            cohort.users.forEach(u => {
              if (this.matchesModalSearch(u)) ids.push(u.id);
            });
          });
        });
        return ids;
      },

      getVisibleUsersInCohort(cohort) {
        return cohort.users.filter(u => this.matchesModalSearch(u));
      },

      getVisibleUsersInOrg(org) {
        return org.cohorts.flatMap(c => this.getVisibleUsersInCohort(c));
      },

      allVisibleInCohortSelected(cohort) {
        const visible = this.getVisibleUsersInCohort(cohort);
        return visible.length > 0 && visible.every(u => this.selectedUsers.includes(u.id));
      },

      allVisibleInOrgSelected(org) {
        const visible = this.getVisibleUsersInOrg(org);
        return visible.length > 0 && visible.every(u => this.selectedUsers.includes(u.id));
      },

      toggleSelectAllVisible() {
        const visibleIds = this.getAllVisibleUserIds();
        const selectedVisibleCount = visibleIds.filter(id => this.selectedUsers.includes(id)).length;
        
        // If any visible users are selected, deselect all visible
        if (selectedVisibleCount > 0) {
          this.selectedUsers = this.selectedUsers.filter(id => !visibleIds.includes(id));
        } else {
          // Select visible users up to capacity
          visibleIds.forEach(id => {
            if (!this.selectedUsers.includes(id) && this.canSelectMore()) {
              this.selectedUsers = [...this.selectedUsers, id];
            }
          });
        }
      },

      issueCertificates(session) {
        // Handle certificate issuance
        if (confirm('Issue certificates to all learners in ' + session.cohort_name + '?')) {
          // API call to issue certificates
          alert('Certificates are being issued for: ' + session.cohort_name);
        }
      },

      formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = months[date.getMonth()];
        const day = date.getDate();
        const year = date.getFullYear();
        return `${month} ${day}, ${year}`;
      },

      getAvatarNumber(userId) {
        // Generate consistent avatar number (1-70) from user ID
        let hash = 0;
        const str = String(userId || '');
        for (let i = 0; i < str.length; i++) {
          hash = ((hash << 5) - hash) + str.charCodeAt(i);
          hash = hash & hash;
        }
        return (Math.abs(hash) % 70) + 1;
      }
    };
