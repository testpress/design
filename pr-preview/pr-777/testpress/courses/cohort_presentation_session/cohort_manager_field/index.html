<td class="size-px whitespace-nowrap px-5 py-3">
              <div class="w-full flex items-center gap-x-3">
                <template x-if="cohort.cohort_manager.image_url">
                  <img class="shrink-0 size-[38px] rounded-full" :src="cohort.cohort_manager.image_url"
                    :alt="cohort.cohort_manager.display_name + ' Avatar'">
                </template>
                <template x-if="!cohort.cohort_manager.image_url">
                  <span
                    x-text="cohort.cohort_manager.display_name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2)"
                    class="flex shrink-0 justify-center items-center size-[38px] bg-white border border-gray-200 text-gray-700 text-xs font-medium uppercase rounded-full dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300">
                  </span>
                </template>
                <div class="flex flex-col gap-0.5 grow min-w-0">
                  <div class="flex items-center gap-x-2 min-w-0">
                    <a class="text-sm truncate font-medium text-gray-800 hover:text-emerald-600 decoration-2 hover:underline focus:outline-none focus:underline focus:text-emerald-600 dark:text-neutral-200 dark:hover:text-emerald-500 dark:focus:text-emerald-500"
                      :href="'/testpress/users/detail/?id=' + cohort.cohort_manager.id">
                      <span x-text="cohort.cohort_manager.display_name"></span>
                    </a>
                    <div class="hs-dropdown [--auto-close:inside] [--placement:right] relative inline-flex shrink-0">
                      <button :id="'hs-cohort_manager-info-' + cohort.cohort_manager.id" type="button"
                        class="hs-tooltip-toggle hover:cursor-pointer" aria-haspopup="menu" aria-expanded="false"
                        aria-label="cohort_manager Info">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                          class="w-4 h-5 text-gray-600 dark:text-neutral-400">
                          <circle cx="12" cy="12" r="10" />
                          <path d="M12 16v-4" />
                          <path d="M12 8h.01" />
                        </svg>
                      </button>

                      <div
                        class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-[400px] max-w-[400px] min-w-[400px] transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:shadow-[0_10px_40px_10px_rgba(0,0,0,0.2)] dark:bg-neutral-900"
                        role="menu" aria-orientation="vertical" :aria-labelledby="'hs-cohort_manager-info-' + cohort.cohort_manager.id">
                        <div class="p-4 flex flex-col gap-y-4 w-full max-w-full box-border">
                          <!-- Email -->
                          <div class="flex items-center gap-x-4">
                            <p class="min-w-20 text-sm text-gray-500 dark:text-neutral-500">
                              Email
                            </p>
                            <div class="grow flex items-center gap-x-2">
                              <p class="font-medium text-sm text-gray-800 dark:text-neutral-200">
                                <span :id="'copy-email-' + cohort.cohort_manager.id" x-text="cohort.cohort_manager.email"></span>
                              </p>
                              <button type="button"
                                class="js-clipboard [--is-toggle-tooltip:false] text-gray-500 hs-tooltip shrink-0 inline-flex justify-center items-center gap-x-2"
                                :data-clipboard-target="'#copy-email-' + cohort.cohort_manager.id" data-clipboard-action="copy"
                                data-clipboard-success-text="Copied">
                                <svg class="js-clipboard-default shrink-0 size-4 text-grey-600"
                                  xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                  stroke-linejoin="round">
                                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                                </svg>
                                <svg class="js-clipboard-success hidden size-4" xmlns="http://www.w3.org/2000/svg"
                                  width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                  <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <span
                                  class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity hidden invisible z-10 py-1 px-2 bg-gray-900 text-xs font-medium text-white rounded-lg shadow-sm dark:bg-neutral-700"
                                  role="tooltip">
                                  <span class="js-clipboard-success-text">Copy</span>
                                </span>
                              </button>
                            </div>
                          </div>
                          <!-- Phone -->
                          <div class="flex items-center gap-x-4">
                            <p class="min-w-20 text-sm text-gray-500 dark:text-neutral-500">
                              Phone
                            </p>
                            <div class="grow flex items-center gap-x-2">
                              <p class="font-medium text-sm text-gray-800 dark:text-neutral-200">
                                <span :id="'copy-phone-' + cohort.cohort_manager.id" x-text="cohort.cohort_manager.phone"></span>
                              </p>
                              <button type="button"
                                class="js-clipboard [--is-toggle-tooltip:false] text-gray-500 hs-tooltip shrink-0 inline-flex justify-center items-center gap-x-2"
                                :data-clipboard-target="'#copy-phone-' + cohort.cohort_manager.id" data-clipboard-action="copy"
                                data-clipboard-success-text="Copied">
                                <svg class="js-clipboard-default shrink-0 size-4 text-grey-600"
                                  xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                  stroke-linejoin="round">
                                  <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                                </svg>
                                <svg class="js-clipboard-success hidden size-4" xmlns="http://www.w3.org/2000/svg"
                                  width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                  <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <span
                                  class="hs-tooltip-content hs-tooltip-shown:opacity-100 hs-tooltip-shown:visible opacity-0 transition-opacity hidden invisible z-10 py-1 px-2 bg-gray-900 text-xs font-medium text-white rounded-lg shadow-sm dark:bg-neutral-700"
                                  role="tooltip">
                                  <span class="js-clipboard-success-text">Copy</span>
                                </span>
                              </button>
                            </div>
                          </div>
                          <!-- Airport -->
                          <div class="flex items-start gap-x-4 w-full">
                            <p class="w-20 shrink-0 text-sm text-gray-500 dark:text-neutral-500">
                              Airport
                            </p>
                            <div class="flex-1 min-w-0 max-w-[calc(100%-6rem)] w-0">
                              <p
                                class="font-medium text-sm text-gray-800 dark:text-neutral-200 break-words whitespace-normal"
                                x-text="cohort.cohort_manager.airport">
                              </p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <p class="text-sm text-gray-500 dark:text-neutral-400 truncate" x-text="cohort.cohort_manager.organization">
                  </p>
                </div>
            </td>
