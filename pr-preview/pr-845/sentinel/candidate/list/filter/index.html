  <div class="pb-4 grid md:grid-cols-2 gap-y-2 md:gap-y-0 md:gap-x-5 border-b border-gray-200 dark:border-neutral-700"
  x-data="{
            open: false,
            selected: [],
            options: [
                { value: 'cs101', label: 'Introduction to Computer Science' },
                { value: 'ds201', label: 'Data Structures' },
                { value: 'algo301', label: 'Algorithms' },
                { value: 'ml401', label: 'Machine Learning Basics' },
                { value: 'db210', label: 'Database Systems' }
            ],
            filteredOptions: [],
            
            init() {
                this.filteredOptions = this.options
            },

            toggle(value) {
                if (this.selected.includes(value)) {
                this.selected = this.selected.filter(v => v !== value)
                } else {
                this.selected.push(value)
                }
            },

            isSelected(value) {
                return this.selected.includes(value)
            },
            clearAll(){
                this.selected=[]
            },
            applyFilter(){
                this.selected=[]
                this.open=false
            }
            }">
    <div>
      <!-- Search Input -->
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none z-20 ps-3.5">
          <svg class="shrink-0 size-4 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>

        <div class="absolute inset-y-0 end-0 flex items-center pointer-events-none z-20 pe-1" style="display: none;">
          <button type="button" class="inline-flex shrink-0 justify-center items-center size-6 rounded-full text-gray-500 hover:text-blue-600 focus:outline-none focus:text-blue-600 dark:text-neutral-500 dark:hover:text-blue-500 dark:focus:text-blue-500" aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="m15 9-6 6"></path>
              <path d="m9 9 6 6"></path>
            </svg>
          </button>
        </div>
      </div>
      <!-- End Search Input -->
    </div>
    <!-- End Col -->
  
    <div class="flex md:justify-end items-center gap-x-2">
      <div class="inline-flex">
          <div class="before:block before:absolute before:top-1/2 before:-start-px before:w-px before:h-4 before:bg-gray-300 before:-translate-y-1/2 dark:before:bg-neutral-700">

                <button aria-haspopup="menu" aria-expanded="false" aria-label="Dropdown" id="hs-pro-dnnd" type="button" aria-controls="hs-pro-filter" class="py-2 px-2.5 inline-flex items-center gap-x-1.5 text-xs font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none focus:outline-none focus:bg-gray-50 dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
                  <svg class="shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"></line><line x1="10" x2="3" y1="4" y2="4"></line><line x1="21" x2="12" y1="12" y2="12"></line><line x1="8" x2="3" y1="12" y2="12"></line><line x1="21" x2="16" y1="20" y2="20"></line><line x1="12" x2="3" y1="20" y2="20"></line><line x1="14" x2="14" y1="2" y2="6"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="16" x2="16" y1="18" y2="22"></line></svg>
                  Filter
                </button>
            </div>
            <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-full sm:w-96 transition-[opacity,margin] duration opacity-0 z-10 bg-white border border-gray-200 sm:rounded-lg shadow-md sm:shadow-xl dark:bg-neutral-900 dark:border-neutral-700 hidden" role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-dnnd" tabindex="-1" style="transform: translate3d(1175.17px, 181.5px, 0px);" data-placement="bottom-end">
    <!-- Header -->

    <!-- Tab Content -->
    <div id="hs-pro-filter" role="tabpanel" aria-labelledby="hs-pro-tabs-dnn-item-all">
    <div class="p-4 space-y-5">

            <template x-if="selected.length &gt; 0">
              <template x-for="item in selected" :key="item">
                <div class="flex flex-nowrap items-center relative z-10 bg-white border border-gray-200 rounded-full p-[3px] m-0.5 dark:bg-neutral-900 dark:border-neutral-700">
                  <div class="size-6 me-1 flex items-center justify-center bg-gray-100 rounded dark:bg-neutral-700">
                    <svg class="shrink-0 size-3 text-gray-500 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M5 4h4l2 5l-2.5 2.5a11 11 0 0 1 5 5L12 20l5 1l1 1h4a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1l-8-6v-2z"></path>
                    </svg>
                  </div>
                  <div class="whitespace-nowrap ms-1 text-sm" x-text="options.find(o =&gt; o.value === item)?.label"></div>
                  <div class="inline-flex shrink-0 justify-center items-center size-5 ms-2 rounded-full text-gray-800 bg-gray-200 hover:bg-gray-300 text-sm dark:bg-neutral-700 dark:hover:bg-neutral-700 dark:text-neutral-400 cursor-pointer" @click.stop="remove(item)">
                    <svg class="shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                      <path d="m6 6 12 12"></path>

                <path d="m7 15 5 5 5-5"></path>
                <path d="m7 9 5-5 5 5"></path>
              </svg>
            </div>
          </div>

          <!-- Dropdown -->
          <div x-show="open" x-transition="" class="absolute z-50 w-full mt-2 p-1 space-y-0.5 bg-white rounded-lg overflow-hidden overflow-y-auto shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] dark:bg-neutral-900 max-h-48" style="display: none;">
            <template x-for="option in filteredOptions" :key="option.value">
              <button type="button" @click="toggle(option.value)" :class="isSelected(option.value) ? 'bg-gray-100 dark:bg-neutral-800' : ''" class="py-2 px-4 w-full text-sm text-gray-800 cursor-pointer hover:bg-gray-100 rounded-lg focus:outline-none focus:bg-gray-100 dark:bg-neutral-900 dark:hover:bg-neutral-800 dark:text-neutral-200 dark:focus:bg-neutral-800 flex items-center justify-between">
                <span class="text-sm font-semibold text-gray-800 dark:text-neutral-200" x-text="option.label"></span>
                <span x-show="isSelected(option.value)" class="ms-auto">
                  <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M12.736 3.97a.733.733 0 0 1 1.047 0c.286.289.29.756.01 1.05L7.88 12.01a.733.733 0 0 1-1.065.02L3.217 8.384a.757.757 0 0 1 0-1.06.733.733 0 0 1 1.047 0l3.052 3.093 5.4-6.425a.247.247 0 0 1 .02-.022Z"></path>
                  </svg>
                </span>
              </button>
            </template>
            <template x-if="filteredOptions.length === 0">
              <div class="py-2 px-4 text-sm text-gray-500 dark:text-neutral-500">No options found</div>
            </template>
          </div>
        </div>

      </div>

      <div class="flex-1 flex justify-end items-center gap-2">
        <button type="button" @click="clearAll()" class="py-2 px-3 text-nowrap inline-flex justify-center items-center text-start whitespace-nowrap bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-gray-50 disabled:opacity-50 disabled:pointer-events-none dark:bg-neutral-800 dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-700 dark:focus:bg-neutral-700">
          Clear All
        </button>

        <button type="button" @click="applyFilter()" class="py-2 px-3 text-nowrap inline-flex justify-center items-center gap-x-2 text-start whitespace-nowrap bg-blue-600 border border-blue-600 text-white text-sm font-medium rounded-lg shadow-2xs align-middle hover:bg-blue-700 disabled:opacity-50 disabled:pointer-events-none focus:outline-hidden focus:ring-1 focus:ring-blue-300 dark:focus:ring-blue-500">
          Apply Filter

    </div>
    </div>
  </div>
            </div>
          </div>
          <!-- End Filter Dropdown -->
        </div>
  </div>
  
  
  </div>
