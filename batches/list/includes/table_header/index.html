<thead>
  <tr>

    <!-- Batch Name -->
    <th scope="col" class="min-w-[250px]">
      <div class="hs-dropdown relative inline-flex w-full cursor-pointer">
        <button type="button"
          class="px-4 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100">
          Name
          <i data-lucide="chevrons-up-down" class="shrink-0 size-3.5"></i>
        </button>

        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] " role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-eptsts">
          <div class="p-1">
            <button type="button" @click="applyOrdering('', 'name')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-down" class="shrink-0 size-3.5"></i>
              A-Z
            </button>
        
            <button type="button" @click="applyOrdering('', '-name')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-up" class="shrink-0 size-3.5"></i>
              Z-A
            </button>
          </div>
        </div>
      </div>


    

    <!-- Users -->
    <th scope="col">
      <div class="hs-dropdown relative inline-flex w-full justify-center cursor-pointer">
        <button type="button"
          class="px-4 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100">
          Users
          <i data-lucide="chevrons-up-down" class="shrink-0 size-3.5"></i>
        </button>

        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] " role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-eptsts">
          <div class="p-1">
            <button type="button" @click="applyOrdering('', '-num_students')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-up" class="shrink-0 size-3.5"></i>
              Most Users
            </button>
        
            <button type="button" @click="applyOrdering('', 'num_students')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-down" class="shrink-0 size-3.5"></i>
              Least Users
            </button>
          </div>
        </div>
      </div>
    </th>

    <!-- Courses -->
    <th scope="col">
      <div class="hs-dropdown relative inline-flex w-full justify-center cursor-pointer">
        <button type="button"
          class="px-4 py-2.5 text-start w-full flex items-center gap-x-1 text-sm font-normal text-gray-500 focus:outline-none focus:bg-gray-100">
          Courses
          <i data-lucide="chevrons-up-down" class="shrink-0 size-3.5"></i>
        </button>

        <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-40 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white rounded-xl shadow-[0_10px_40px_10px_rgba(0,0,0,0.08)] " role="menu" aria-orientation="vertical" aria-labelledby="hs-pro-eptsts">
          <div class="p-1">
            <button type="button" @click="applyOrdering('', '-course_count')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-up" class="shrink-0 size-3.5"></i>
              Most Courses
            </button>
        
            <button type="button" @click="applyOrdering('', 'course_count')"
               class="w-full flex items-center gap-x-3 py-1.5 px-2 rounded-lg text-[13px] font-normal text-gray-800 hover:bg-gray-100 disabled:opacity-50 disabled:pointer-events-none ">
              <i data-lucide="arrow-down" class="shrink-0 size-3.5"></i>
              Least Courses
            </button>
          </div>
        </div>
      </div>
    </th>




    <!-- Actions -->
    <th scope="col" class="text-end">
      <div class="px-4 py-2.5"></div>
    </th>

  </tr>
</thead>
